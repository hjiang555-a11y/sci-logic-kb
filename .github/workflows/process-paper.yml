name: Process Paper with GitHub Models (claude-sonnet-4-6)

on:
  issues:
    types: [labeled, edited]

jobs:
  process:
    if: |
      github.event.label.name == 'process-paper' ||
      github.event.label.name == 'reprocess-v2' ||
      github.event.label.name == 'reprocess-schema' ||
      (
        github.event.action == 'edited' &&
        (
          contains(join(github.event.issue.labels.*.name, ','), 'process-paper') ||
          contains(join(github.event.issue.labels.*.name, ','), 'reprocess-v2') ||
          contains(join(github.event.issue.labels.*.name, ','), 'reprocess-schema')
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      models: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── Parse issue body ──────────────────────────────────────────────────
      - name: Parse issue fields
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const label = context.payload.label?.name || '';
            const title = context.payload.issue.title || '';
            const labels = (context.payload.issue.labels || []).map((item) =>
              typeof item === 'string' ? item : item.name
            );

            const fields = {};
            const normalizeKey = (raw) =>
              raw.trim().toLowerCase().replace(/\*/g, '').replace(/\s+/g, '_');
            const canonicalizeAuthorYear = (raw) => {
              const parts = raw
                .trim()
                .normalize('NFKD')
                .replace(/[\u0300-\u036f]/g, '')
                .split(/[^\p{L}\p{N}]+/u)
                .filter(Boolean);

              if (!parts.length) return raw.trim();

              const yearIndex = parts.findIndex((part, index) =>
                index > 0 && /^(\d{4}|\d{3}x)$/i.test(part)
              );

              if (yearIndex > 0) {
                const author = parts.slice(0, yearIndex).join('');
                const year = parts[yearIndex];
                const suffix = parts.slice(yearIndex + 1).join('');
                return `${author}${year}${suffix}`.toLowerCase();
              }

              return parts.join('').toLowerCase();
            };

            for (const line of body.split('\n')) {
              let m = line.match(/^\s*\*\*([^*]+)\*\*\s*:\s*(.+)$/);
              if (!m) {
                m = line.match(/^\s*([A-Za-z][A-Za-z0-9 _.-]*)\s*:\s*(.+)$/);
              }
              if (m) fields[normalizeKey(m[1])] = m[2].trim();
            }

            let authorYear  = fields.author_year || fields.file || '';
            const zoteroKey   = fields.zotero_key  || fields.key  || '';
            const pdfFilename = fields.pdf          || fields.pdf_filename || '';

            // Try to extract author_year from PDF filename as fallback
            if (!authorYear && pdfFilename) {
              const match = pdfFilename.match(/^[^_]+_(.+)\.pdf$/);
              if (match) {
                authorYear = match[1];
                console.log('Extracted authorYear from PDF filename:', authorYear);
              }
            }

            if (!authorYear && title.startsWith('Process: ')) {
              authorYear = title.slice('Process: '.length).trim();
              console.log('Extracted authorYear from issue title:', authorYear);
            }

            if (authorYear) {
              authorYear = canonicalizeAuthorYear(authorYear);
              console.log('Canonical authorYear:', authorYear);
            }

            const task = (
              label === 'reprocess-v2' ||
              label === 'reprocess-schema' ||
              labels.includes('reprocess-v2') ||
              labels.includes('reprocess-schema')
            )
              ? 'reprocess-schema'
              : 'process';

            // Debug: show available fields and body preview
            console.log('Available fields:', Object.keys(fields));
            console.log('Fields object:', fields);
            console.log('Issue body preview (first 500 chars):', body.substring(0, 500));

            if (!authorYear) core.setFailed('author_year missing from issue body. Available fields: ' + Object.keys(fields).join(', '));

            const topic = fields.topic || 'ultrastable-laser';

            core.setOutput('author_year',  authorYear);
            core.setOutput('zotero_key',   zoteroKey);
            core.setOutput('pdf_filename', pdfFilename);
            core.setOutput('task',         task);
            core.setOutput('topic',        topic);
            core.setOutput('branch',       `paper/${authorYear}-${Date.now()}`);

            core.notice(`Task: ${task} | Paper: ${authorYear} | Model: claude-sonnet-4-6 | Source of truth: SCHEMA.md`);

      # ── Python + GitHub Models API ────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai pypdf requests python-dotenv

      - name: Run Claude extraction
        env:
          GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          TASK:          ${{ steps.parse.outputs.task }}
          AUTHOR_YEAR:   ${{ steps.parse.outputs.author_year }}
          ZOTERO_KEY:    ${{ steps.parse.outputs.zotero_key }}
          PDF_FILENAME:  ${{ steps.parse.outputs.pdf_filename }}
          TOPIC:         ${{ steps.parse.outputs.topic }}
        run: python scripts/process_paper.py

      # ── Commit to new branch ──────────────────────────────────────────────
      - name: Commit generated YAML
        id: commit
        uses: actions/github-script@v7
        env:
          AUTHOR_YEAR: ${{ steps.parse.outputs.author_year }}
          BRANCH:      ${{ steps.parse.outputs.branch }}
          TASK:        ${{ steps.parse.outputs.task }}
          TOPIC:       ${{ steps.parse.outputs.topic }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const authorYear = process.env.AUTHOR_YEAR;
            const branch     = process.env.BRANCH;
            const task       = process.env.TASK;
            const topic      = process.env.TOPIC || 'ultrastable-laser';
            const filePath   = `topics/${topic}/papers/${authorYear}.yaml`;

            const { data: ref } = await github.rest.git.getRef({
              owner: context.repo.owner, repo: context.repo.repo,
              ref: 'heads/main'
            });

            await github.rest.git.createRef({
              owner: context.repo.owner, repo: context.repo.repo,
              ref: `refs/heads/${branch}`, sha: ref.object.sha
            });

            const content = fs.readFileSync(filePath, 'utf8');
            const encoded = Buffer.from(content).toString('base64');

            let existingSha;
            try {
              const { data: existing } = await github.rest.repos.getContent({
                owner: context.repo.owner, repo: context.repo.repo,
                path: filePath, ref: 'main'
              });
              existingSha = existing.sha;
            } catch (_) { /* new file */ }

            const verb = task === 'reprocess-schema' ? 'refactor' : 'add';
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner, repo: context.repo.repo,
              path: filePath, branch,
              message: `${verb} ${authorYear}: ${task === 'reprocess-schema' ? 'align with current schema' : 'knowledge extraction via claude-sonnet-4-6'}`,
              content: encoded,
              ...(existingSha ? { sha: existingSha } : {})
            });

            core.setOutput('branch', branch);
            core.setOutput('file_path', filePath);

      # ── Open PR ───────────────────────────────────────────────────────────
      - name: Create Pull Request
        uses: actions/github-script@v7
        env:
          AUTHOR_YEAR: ${{ steps.parse.outputs.author_year }}
          BRANCH:      ${{ steps.commit.outputs.branch }}
          TASK:        ${{ steps.parse.outputs.task }}
          TOPIC:       ${{ steps.parse.outputs.topic }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const authorYear = process.env.AUTHOR_YEAR;
            const branch     = process.env.BRANCH;
            const task       = process.env.TASK;
            const topic      = process.env.TOPIC || 'ultrastable-laser';
            const issueNum   = context.issue.number;

            const title = task === 'reprocess-schema'
              ? `[schema] refactor ${authorYear}: align with current SCHEMA.md`
              : `[Claude] add ${authorYear}: knowledge extraction`;

            const body = [
              `Closes #${issueNum}`,
              '',
              `**Task**: \`${task}\``,
              `**Paper**: \`topics/${topic}/papers/${authorYear}.yaml\``,
               `**Topic**: \`${topic}\``,
               `**Generated by**: claude-sonnet-4-6 via GitHub Models API`,
               `**Schema source of truth**: \`SCHEMA.md\``,
               '',
               '## Review checklist',
               '- [ ] Node IDs are globally unique',
               '- [ ] All BOUNDED-BY relations have `is_system_limit` + `breakthrough_paths`',
               '- [ ] No deprecated relation types (GOVERNED-BY, SUPPORTED-BY, BREAKTHROUGH-VIA)',
               '- [ ] External conditions use CONDITIONED-BY with interface fields',
               '- [ ] If schema wording conflicts elsewhere, SCHEMA.md was treated as the source of truth',
               '- [ ] Cross-file references are correct',
              '',
              '_AI draft — expert review required before merge._'
            ].join('\n');

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title, head: branch, base: 'main', body
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issueNum,
              body: `✅ Processing complete! PR ready for review: **#${pr.number}**\n\n${pr.html_url}`
            });

            core.notice(`PR created: #${pr.number}`);
