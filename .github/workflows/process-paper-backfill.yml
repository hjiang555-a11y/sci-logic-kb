name: Backfill Paper Processing

on:
  workflow_dispatch:
    inputs:
      issue_numbers:
        description: "Comma-separated issue numbers or ranges, e.g. 25-27,30,71"
        required: true
        default: "25-78"

jobs:
  expand:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      issue_numbers: ${{ steps.parse.outputs.issue_numbers }}
    steps:
      - id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const spec = core.getInput('issue_numbers', { required: true }).trim();
            const values = new Set();

            for (const chunk of spec.split(',').map((part) => part.trim()).filter(Boolean)) {
              const range = chunk.match(/^(\d+)-(\d+)$/);
              if (range) {
                const start = Number(range[1]);
                const end = Number(range[2]);
                const lower = Math.min(start, end);
                const upper = Math.max(start, end);
                for (let current = lower; current <= upper; current += 1) {
                  values.add(current);
                }
                continue;
              }

              if (/^\d+$/.test(chunk)) {
                values.add(Number(chunk));
                continue;
              }

              core.setFailed(`Invalid issue number segment: ${chunk}`);
              return;
            }

            const issueNumbers = [...values].sort((a, b) => a - b);
            core.info(`Resolved issue numbers: ${issueNumbers.join(', ')}`);
            core.setOutput('issue_numbers', JSON.stringify(issueNumbers));

  process:
    needs: expand
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        issue_number: ${{ fromJson(needs.expand.outputs.issue_numbers) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch issue fields
        id: fetch
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ matrix.issue_number }}
        with:
          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });

            const body = issue.body || '';
            const title = issue.title || '';
            const labels = (issue.labels || []).map((label) =>
              typeof label === 'string' ? label : label.name
            );

            const fields = {};
            const normalizeKey = (raw) =>
              raw.trim().toLowerCase().replace(/\*/g, '').replace(/\s+/g, '_');
            const canonicalizeAuthorYear = (raw) => {
              const parts = raw
                .trim()
                .normalize('NFKD')
                .replace(/[\u0300-\u036f]/g, '')
                .split(/[^\p{L}\p{N}]+/u)
                .filter(Boolean);

              if (!parts.length) return raw.trim();

              const yearIndex = parts.findIndex((part, index) =>
                index > 0 && /^(\d{4}|\d{3}x)$/i.test(part)
              );

              if (yearIndex > 0) {
                const author = parts.slice(0, yearIndex).join('');
                const year = parts[yearIndex];
                const suffix = parts.slice(yearIndex + 1).join('');
                return `${author}${year}${suffix}`.toLowerCase();
              }

              return parts.join('').toLowerCase();
            };

            for (const line of body.split('\n')) {
              let match = line.match(/^\s*\*\*([^*]+)\*\*\s*:\s*(.+)$/);
              if (!match) {
                match = line.match(/^\s*([A-Za-z][A-Za-z0-9 _.-]*)\s*:\s*(.+)$/);
              }
              if (match) fields[normalizeKey(match[1])] = match[2].trim();
            }

            let authorYear = fields.author_year || fields.file || '';
            const zoteroKey = fields.zotero_key || fields.key || '';
            const pdfFilename = fields.pdf || fields.pdf_filename || '';

            if (!authorYear && pdfFilename) {
              const match = pdfFilename.match(/^[^_]+_(.+)\.pdf$/);
              if (match) {
                authorYear = match[1];
                console.log('Extracted authorYear from PDF filename:', authorYear);
              }
            }

            if (!authorYear && title.startsWith('Process: ')) {
              authorYear = title.slice('Process: '.length).trim();
              console.log('Extracted authorYear from issue title:', authorYear);
            }

            if (authorYear) {
              authorYear = canonicalizeAuthorYear(authorYear);
              console.log('Canonical authorYear:', authorYear);
            }

            const task = labels.includes('reprocess-v2') || labels.includes('reprocess-schema')
              ? 'reprocess-schema'
              : 'process';

            if (!authorYear) {
              core.setFailed(`Issue #${issueNumber}: author_year missing from issue body/title.`);
              return;
            }

            if (!labels.some((label) => ['process-paper', 'reprocess-v2', 'reprocess-schema'].includes(label))) {
              core.setFailed(`Issue #${issueNumber}: missing processing label.`);
              return;
            }

            core.setOutput('issue_number', String(issueNumber));
            core.setOutput('author_year', authorYear);
            core.setOutput('zotero_key', zoteroKey);
            core.setOutput('pdf_filename', pdfFilename);
            core.setOutput('task', task);
            core.setOutput('branch', `paper/${authorYear}-issue-${issueNumber}-${Date.now()}`);

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai pypdf

      - name: Run Claude extraction
        env:
          GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          TASK:          ${{ steps.fetch.outputs.task }}
          AUTHOR_YEAR:   ${{ steps.fetch.outputs.author_year }}
          ZOTERO_KEY:    ${{ steps.fetch.outputs.zotero_key }}
          PDF_FILENAME:  ${{ steps.fetch.outputs.pdf_filename }}
        run: python scripts/process_paper.py

      - name: Commit generated YAML
        id: commit
        uses: actions/github-script@v7
        env:
          AUTHOR_YEAR: ${{ steps.fetch.outputs.author_year }}
          BRANCH:      ${{ steps.fetch.outputs.branch }}
          TASK:        ${{ steps.fetch.outputs.task }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const authorYear = process.env.AUTHOR_YEAR;
            const branch     = process.env.BRANCH;
            const task       = process.env.TASK;
            const filePath   = `papers/${authorYear}.yaml`;

            const { data: ref } = await github.rest.git.getRef({
              owner: context.repo.owner, repo: context.repo.repo,
              ref: 'heads/main'
            });

            await github.rest.git.createRef({
              owner: context.repo.owner, repo: context.repo.repo,
              ref: `refs/heads/${branch}`, sha: ref.object.sha
            });

            const content = fs.readFileSync(filePath, 'utf8');
            const encoded = Buffer.from(content).toString('base64');

            let existingSha;
            try {
              const { data: existing } = await github.rest.repos.getContent({
                owner: context.repo.owner, repo: context.repo.repo,
                path: filePath, ref: 'main'
              });
              existingSha = existing.sha;
            } catch (_) { /* new file */ }

            const verb = task === 'reprocess-schema' ? 'refactor' : 'add';
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner, repo: context.repo.repo,
              path: filePath, branch,
              message: `${verb} ${authorYear}: ${task === 'reprocess-schema' ? 'align with current schema' : 'knowledge extraction via claude-sonnet-4-6'}`,
              content: encoded,
              ...(existingSha ? { sha: existingSha } : {})
            });

            core.setOutput('branch', branch);
            core.setOutput('file_path', filePath);

      - name: Create Pull Request
        uses: actions/github-script@v7
        env:
          AUTHOR_YEAR: ${{ steps.fetch.outputs.author_year }}
          BRANCH:      ${{ steps.commit.outputs.branch }}
          TASK:        ${{ steps.fetch.outputs.task }}
          ISSUE_NUMBER: ${{ steps.fetch.outputs.issue_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const authorYear = process.env.AUTHOR_YEAR;
            const branch     = process.env.BRANCH;
            const task       = process.env.TASK;
            const issueNum   = Number(process.env.ISSUE_NUMBER);

            const title = task === 'reprocess-schema'
              ? `[schema] refactor ${authorYear}: align with current SCHEMA.md`
              : `[Claude] add ${authorYear}: knowledge extraction`;

            const body = [
              `Closes #${issueNum}`,
              '',
              `**Task**: \`${task}\``,
              `**Paper**: \`papers/${authorYear}.yaml\``,
              `**Generated by**: claude-sonnet-4-6 via GitHub Models API`,
              `**Schema source of truth**: \`SCHEMA.md\``,
              '',
              '## Review checklist',
              '- [ ] Node IDs are globally unique',
              '- [ ] All BOUNDED-BY relations have `is_system_limit` + `breakthrough_paths`',
              '- [ ] No deprecated relation types (GOVERNED-BY, SUPPORTED-BY, BREAKTHROUGH-VIA)',
              '- [ ] External conditions use CONDITIONED-BY with interface fields',
              '- [ ] If schema wording conflicts elsewhere, SCHEMA.md was treated as the source of truth',
              '- [ ] Cross-file references are correct',
              '',
              '_AI draft — expert review required before merge._'
            ].join('\n');

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title, head: branch, base: 'main', body
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issueNum,
              body: `✅ Processing complete! PR ready for review: **#${pr.number}**\n\n${pr.html_url}`
            });

            core.notice(`PR created for issue #${issueNum}: #${pr.number}`);
