name: Discover Papers

on:
  schedule:
    - cron: '0 2 * * 1'  # Weekly Monday 2AM UTC
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run discovery
        run: python scripts/discover_papers.py

      - name: Check for new papers
        id: check
        run: |
          COUNT=$(grep -c '^### ' reports/active/paper_queue.md || echo 0)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT new candidates"

      - name: Create Issue
        if: steps.check.outputs.count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const queue = fs.readFileSync('reports/active/paper_queue.md', 'utf8').substring(0, 3000);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📚 Paper Review Queue — ${new Date().toISOString().slice(0,10)}`,
              body: queue + '\n\n> Auto-generated by discover_papers.py. Review and check ✅/❌ for each paper.',
              labels: ['paper-review']
            });

      - name: Commit queue
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add reports/active/paper_queue.md
          git diff --staged --quiet || git commit -m "chore: update paper review queue"
          git push
