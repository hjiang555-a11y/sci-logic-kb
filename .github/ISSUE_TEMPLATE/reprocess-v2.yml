name: Reprocess to current schema
description: Align an existing paper YAML with the current SCHEMA.md
title: "Reprocess schema: {author}{year}"
labels: ["reprocess-schema"]
body:
  - type: markdown
    attributes:
      value: |
        提交后自动按当前 `SCHEMA.md` 重整 `papers/` 目录中已有的 YAML 文件。
        若其他文档与 Schema 冲突，一律以 `SCHEMA.md` 为准。

  - type: input
    id: author_year
    attributes:
      label: Author Year
      description: "已有 YAML 文件名（不含 .yaml），如 numata2004"
      placeholder: numata2004
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 重整优先级
      options:
        - "1 - numata2004（BOUNDED-BY 原型）"
        - "2 - young1999（跨论文验证关系）"
        - "3 - drever1983（ENABLED-BY 原型）"
        - "4 - shaddock1999（COMPETES-WITH + 元原理）"
        - "5 - jiang2010（外围条件层）"
    validations:
      required: false
