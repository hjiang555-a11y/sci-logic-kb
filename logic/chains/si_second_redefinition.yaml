breakthrough_narrative: >
  The SI second has been defined by the Cs hyperfine transition (9.192631770 GHz) since
  1967. Optical clocks now outperform Cs fountains by 100× in accuracy (<10⁻¹⁸ vs 3×10⁻¹⁶),
  motivating redefinition based on an optical transition.
  
  The CCTF roadmap (Dimarcq 2024) requires: validated clocks, independent ratio
  measurements, and demonstrated reliability. The scientific motivation extends beyond
  metrology: better clocks enable tests of fundamental physics (dark matter detection,
  gravitational wave detection via clock networks), relativistic geodesy (1 cm height
  resolution via gravitational redshift), and improved GNSS.
  
  Remaining challenges: (1) demonstrating sustained operation at <10⁻¹⁸ in multiple
  labs, (2) intercontinental clock comparisons at <10⁻¹⁸ via fiber links, (3) consensus
  on which optical transition(s) to adopt, and (4) the role of the Th-229 nuclear clock
  as a potential future standard with even lower sensitivity to environmental perturbations.

