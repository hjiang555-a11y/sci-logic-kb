chain_id: si_second_redefinition
question: "What are the scientific and metrological requirements for redefining the SI second from microwave (Cs) to optical frequency standards?"
domain: timescales
confidence: draft
last_updated: 2026-05-09

current_best:
  value: "Roadmap target: ≥3 independent optical clocks with systematic uncertainty < 10⁻¹⁸ and ≥3 independent frequency ratio measurements at <5×10⁻¹⁸"
  status: "Several optical clocks have demonstrated <10⁻¹⁸ uncertainty. Ratio measurements at <5×10⁻¹⁸ demonstrated (Boulder/Boulder; SYRTE/PTB; RIKEN; NICT)"
  note: "The Consultative Committee for Time and Frequency (CCTF) has proposed a roadmap. The redefinition requires demonstrating that optical clocks can realize the second with better accuracy than Cs fountains."

limiting_principle:
  id: pri.redefinition_criteria_second
  name: "CCTF criteria for SI second redefinition"
  statement: >
    The CCTF roadmap requires: (1) ≥3 independent optical clocks (different species
    and/or institutions) with validated systematic uncertainty <10⁻¹⁸; (2) ≥3 independent
    optical frequency ratio measurements at <5×10⁻¹⁸; (3) regular contributions to TAI
    from optical clocks; (4) sustained operation demonstrating reliability.
  defined_by: dimarcq2024.yaml

