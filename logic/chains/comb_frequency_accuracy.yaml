chain_id: comb_frequency_accuracy
question: How accurately can frequency combs measure absolute optical frequencies?
domain: optical-frequency-combs
confidence: draft
last_updated: '2026-05-09'
current_best:
  value: Sub-10^-16 absolute uncertainty; 100-200 as residual timing; <10^-20 instability at 10^4 s
  system: Er:fiber comb (Yan 2015)
limiting_principle:
  id: pri.gain_lifetime_servo_bandwidth_limit
  name: Comb frequency ruler accuracy limited by f_CEO and f_rep traceability
  defined_by: Multiple (Holzwarth 2000, Udem 2002, Yan 2015)
  statement: f_n = n*f_rep + f_CEO. Accuracy depends on f_CEO stabilization precision and f_rep traceability to a primary standard.
