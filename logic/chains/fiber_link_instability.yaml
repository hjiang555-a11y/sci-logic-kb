breakthrough_narrative: >
  Optical frequency transfer over fiber faced two fundamental limits: compensation
  non-reciprocity and polarization mode dispersion (PMD).
  
  Non-reciprocity has been SOLVED. Calosso (2013) demonstrated that two-way passive
  phase comparison eliminates the PLL bandwidth constraint. Bercy (2014) reached the
  fundamental non-reciprocity floor at 5×10⁻²¹ @ 4,000 s. Xu (2019) confirmed that
  residual non-reciprocity after temperature compensation is (0.5±2.0)×10⁻²¹ over
  33 days. This limit is fundamentally understood and compensated.
  
  PMD is the CURRENT DOMINANT LIMIT. Polarization mode dispersion causes differential
  group delay between orthogonal polarization states. Under environmental perturbation,
  PMD fluctuations introduce non-reciprocal phase noise that cannot be fully canceled
  by bidirectional schemes. The practical impact is severe: polarization fading causes
  optical beat signal dropout and detection loss-of-lock, limiting continuous operation.
  
  Clivati (2020) demonstrated the breakthrough: a dual-polarization coherent receiver
  that maintains frequency lock through polarization scrambling. This enables robust,
  continuous operation of fiber links. The remaining challenge is residual PMD-induced
  phase noise at the 10⁻²⁰ level for links exceeding 500 km.
  
  The path forward: dual-polarization receivers + active polarization tracking for
  national-scale links; quantum-limited detection for satellite-based global networks.

