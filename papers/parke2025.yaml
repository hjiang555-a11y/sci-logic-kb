principles:
  - id: pri.long_cavity_discriminator_enhancement
    name: "长腔鉴别系数增强原理"
    tier: engineering
    verification_status: observed
    statement: >
      PDH 归一化鉴别系数 D 正比于腔内光学存储时间 τ_cav = L/(cA)，
      其中 L 为腔长、c 为光速、A 为单镜总光功率损耗。
      增大腔长可线性提升存储时间和鉴别系数，从而降低技术噪声
      （如 RAM、检测器噪声）转换为频率噪声时的等效贡献。
      D = f_L / Γ，其中 f_L 为激光频率、Γ 为腔线宽。
    domain: "PDH 频率鉴别"
    formula: "D = f_L / Γ = f_L × τ_cav × π; τ_cav = L/(cA)"
    key_insight: "长腔通过增大存储时间线性提升鉴别系数，使 RAM 等技术噪声的频率等效贡献与腔长成反比。"
    conditions: "适用于稳态 PDH 锁频，需要腔模匹配良好且高阶模被充分抑制"
    preconditions:
      - "腔内光功率损耗 A 保持低水平，否则存储时间的提升被抵消"
      - "腔 FSR 随长度减小，高阶横模间距变密，需更严格的模式匹配"
    invalidated_when:
      - "腔长增加导致的热噪声极限（σ_y ∝ 1/L）已被其他技术噪声所掩盖"
      - "振动灵敏度随腔长增加而恶化，无法有效隔振"
    source_claim: >
      "we maximize τ_cav by developing an optical reference cavity with a length of 68 cm...
      τ_cav = (295 ± 2) μs... D = (4.7 ± 0.5) × 10¹¹"

  - id: pri.ram_bias_field_cancellation
    name: "EOM 偏置电场 RAM 主动消除原理"
    tier: domain
    verification_status: observed
    statement: >
      在退火质子交换（APE）铌酸锂波导 EOM 中，x 切晶体确保均匀 RF 场分布，
      残余振幅调制（RAM）主要由晶体双折射引起。通过在 EOM 偏置端口施加低压
      直流电场（~1 V），可补偿晶体双折射，使 RAM 降至 10⁻⁷ 水平。
      反馈环路使用独立的 RAM 监测光电探测器提取误差信号，
      闭环带宽 ~0.5 MHz，无需 EOM 温度伺服。
    domain: "PDH 调制保真度"
    formula: "Δf_RAM/f_L = (ΔV_PDH_RAM / V_PDH_PP) / D"
    key_insight: "偏置电场闭环比温度伺服更简单有效，可将 RAM 无限期稳定在 10⁻⁷ 水平。"
    conditions: "适用于 x 切 APE 铌酸锂波导 EOM，需分离的 RAM 监测光路"
    preconditions:
      - "EOM 为 x 切晶体以确保均匀 RF 场"
      - "光学隔离器抑制标准具效应导致的寄生 RAM"
      - "PDH 和 RAM 探测光路相位差 φ_RAM 正确对齐"
    invalidated_when:
      - "EOM 不是 x 切或非波导结构，偏置电场补偿机制不同"
      - "环境温度波动超出偏置电场补偿范围（本文中 ~1°C 实验室稳定度即可）"
    source_claim: >
      "we develop a simple and robust scheme to actively cancel residual amplitude modulation
      (RAM) at the 10⁻⁷ level in an annealed-proton-exchanged (APE) lithium-niobate waveguide
      electro-optic modulator (EOM)"
    open_questions:
      - "当腔长继续增大至 1 m 以上，FSR 进一步缩小，高阶模污染是否会成为 RAM 测量的新限制？"

