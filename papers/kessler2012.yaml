principles:
  - id: pri.silicon_cte_zero_crossing_124k
    name: "硅单晶 124 K 热膨胀系数零点原理"
    tier: domain
    verification_status: observed
    statement: >
      硅单晶的线热膨胀系数 α(T) 在 124 K 附近过零，
      即存在 T₀ ≈ 124.2 K 使得 dL/dT = 0，腔长对温度一阶不敏感。
      零点二次灵敏度 dα/dT = 1.71(1)×10⁻⁸ K⁻²（沿 ⟨100⟩）；
      相比 ULE（dα/dT ≈ 1.8×10⁻⁹ K⁻²）约大 10×，
      因此在 T₀ 附近运行需要更精密温控（mK 量级）。
    domain: "低温光学谐振腔"
    formula: "α(T) ≈ (dα/dT)·(T − T₀)；T₀ = 124.2(1) K，dα/dT = 1.71(1)×10⁻⁸ K⁻²"
    key_insight: >
      硅与 ULE 都有 CTE 零点，但硅在低温（124 K），
      使其能同时利用低温增强机械 Q 效应降低热噪声。
    conditions: "单晶硅，光轴沿 ⟨100⟩ 方向"
    applicable_when: "温度控制在 T₀ 附近（通常需 |ΔT| < 10 mK 量级）"
    source_claim: >
      "The minimum cavity length was found at a temperature of 124.2(1) K,
       with da/dT = 1.71(1)×10⁻⁸ K⁻²"

  - id: pri.cryogenic_mechanical_q_enhancement
    name: "低温增强机械品质因子降低热噪声"
    tier: domain
    verification_status: observed
    statement: >
      根据涨落耗散定理（FDT），材料布朗热噪声与机械损耗角 φ（= 1/Q）成正比。
      硅单晶在低温（124 K）下 Q > 10⁷，远高于室温非晶玻璃（ULE Q ~ 10³–10⁴），
      直接将间隔物和镜底物的热噪声贡献降低约 3–4 个数量级。
      此外，硅更大的杨氏模量（~130 GPa vs. ULE ~67 GPa）降低外力对腔长的耦合，
      使振动灵敏度优于同尺寸 ULE 腔约 3×。
    domain: "精密光学谐振腔，低温固体物理"
    formula: "S_x,spacer(f) ∝ φ·k_B·T / (π·f·k_eff)；φ_Si(124K) << φ_ULE(300K)"
    key_insight: >
      选择低损耗单晶材料（Si）在 CTE 零点温度下运行，
      同时利用高 Q 和零热膨胀，是将 FP 腔热噪声降低一个数量级的关键路径。
    conditions: "T = 124 K，单晶结构（无晶界，无内应力散射），⟨110⟩ 方向安装"
    applicable_when: "单晶半导体或绝缘体材料，T << 室温"
    source_claim: >
      "the high mechanical quality factor of silicon (Q > 10⁷) directly reduces
       the noise contribution from the spacer and the mirror substrates"

