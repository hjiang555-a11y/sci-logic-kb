principles:
  - id: pri.flicker_noise_linewidth_divergence
    name: "闪变频率噪声线宽发散问题与实用线宽定义"
    tier: engineering
    verification_status: calculated
    statement: >
      超稳激光的主要噪声为 flicker 频率噪声（S_y(f) ∝ 1/f），
      导致场自相关函数 R_E(τ) 发散，不存在唯一定义的稳态线宽。
      实用定义：（1）最小线宽 Δν_FWHM_min ≈ 7 mHz（测量时间 T₀=170 s，
      截断 f < 1/T₀ 的低频贡献）；（2）长时平均线宽 ~13 mHz（T₀=150 s 平均谱中心对齐后）；
      （3）相干时间：Δφ_rms 增长至 1 rad 的时刻定义，11 s（Ramsey 场景）至 55 s（回溯估计场景）。
    domain: "超稳激光噪声表征，精密光谱"
    formula: >
      S_y(f) = h_{-1}/f（flicker）；
      R_E(τ) = E₀²·exp(2πiν₀τ)·exp(−2∫₀^∞ S_φ(f)·sin²(πfτ)df)（发散）；
      Δν_FWHM_min = 7 mHz @ T₀=170 s
    key_insight: >
      对 flicker 频率噪声主导的激光，"线宽"本质上与观测时间相关；
      引用线宽时必须说明测量时间 T₀，否则无物理意义。
      coherence time 的意义依赖于应用场景（Ramsey vs. 单脉冲 Rabi vs. 回溯估计）。
    conditions: "flicker 频率噪声主导（S_y ∝ 1/f），不适用于白色频率噪声主导的激光"
    applicable_when: "热噪声极限超稳激光（mod σ_y flicker floor），特别是 Si 腔激光"
    source_claim: >
      "Flicker frequency noise and random walk frequency noise are the dominant noise processes
       in our lasers. In this case, the laser frequency ν(t) is nonstationary and R_E(τ) is
       divergent so that no unique coherence function can be assigned"
    open_questions:
      - "Can a measurement-time-independent linewidth definition be constructed for flicker-dominated lasers that is physically meaningful and universally accepted?"
      - "What is the fundamental lower bound on flicker frequency noise for crystalline coatings (AlGaAs) — will it follow the same 1/f spectral shape, or could structural differences in single-crystal materials alter the noise spectrum?"
      - "How does the coherence time scale with further reductions in thermal noise (e.g., at 10⁻¹⁸ stability) — is the Ramsey coherence time strictly proportional to 1/h₋₁, or do higher-order noise terms become relevant?"
      - "Can real-time frequency estimation algorithms (Kalman filtering, predictive tracking) effectively extend the usable coherence time beyond the bare Ramsey limit for precision spectroscopy applications?"

metrics:
  - id: met.fractional_freq_instability_m17
    name: "分数频率不稳定度（Matei 2017，Si 腔镀层极限）"
    unit: "无量纲（修正 Allan 偏差 mod σ_y(τ)）"
    description: "PTB 两套独立 Si 腔（Si2, Si3）三角帽法提取的个体分数频率不稳定度，镀层热噪声限制"
    demonstrated_value:
      value: "mod σ_y = 4×10⁻¹⁷（0.8–10 s flicker floor）；标准 Allan σ_y ≈ 5×10⁻¹⁷"
      conditions: "1.5 μm（1542 nm），T=124 K，Si2 + Si3 两台独立 Si 腔 + PTB 48cm ULE 腔（Häfner 2015）三角帽"
      verification_status: observed
      confidence: established
      source: {zotero_key: "TVY7T59A", claim: "instability of each Si-based laser system is at the expected thermal noise flicker floor of mod σ_y = 4×10⁻¹⁷"}
    theoretical_floor:
      value: "mod σ_y ≈ 4×10⁻¹⁷（与实测吻合，镀层 IBS 布朗噪声决定）"
      basis: "FDT 计算：Si 腔间隔物+底物 φ_Si ~ 10⁻⁸ at 124K，镀层 φ_IBS ~ 4×10⁻⁴ 主导"
      gap_note: "已达理论极限；改善需晶体镀层（Cole 2013，AlGaAs 可降低 10×）或更低温"
    open_questions:
      - "Is the 4×10⁻¹⁷ flicker floor truly the irreducible coating thermal noise limit, or could unknown excess technical noise (e.g., coating structural relaxation, surface contamination drift) contribute at this level?"
      - "Can next-generation crystalline coatings (AlGaAs) push the Si cavity flicker floor below 10⁻¹⁷ as predicted by FDT calculations?"

  - id: met.laser_linewidth_m17
    name: "激光线宽（Matei 2017，Si2–Si3 拍频）"
    unit: "mHz（FWHM）"
    description: "Si2–Si3 拍频 FFT 谱 FWHM；个体激光线宽 = 拍频线宽 / √2（假设相等贡献）"
    demonstrated_value:
      value: "拍频 FWHM: 7–14 mHz（43% 样本）；单激光 FWHM: 5–10 mHz"
      conditions: "1.5 μm，200 s 测量时间，FFT 分析，37 h 相位数据集"
      verification_status: observed
      confidence: established
      source: {zotero_key: "TVY7T59A", claim: "obtain FWHM linewidths of the beat signal between 7 mHz and 14 mHz... individual linewidths between 5 mHz to 10 mHz"}
    theoretical_floor:
      value: "Δν_min = 7 mHz（T₀=170 s 下理论最小线宽）"
      basis: "flicker 噪声分析：Δν_min 由测量时间 T₀ 和噪声功率谱决定（Bishof 方法）"
      gap_note: "实测与理论最小值相符；无进一步改善空间，除非降低热噪声本身"

  - id: met.optical_coherence_time_m17
    name: "光学相干时间（Matei 2017，Si 腔激光）"
    unit: "秒"
    description: "超稳 Si 腔激光的实用相干时间，不同场景下定义不同"
    demonstrated_value:
      value: "11 s（Ramsey 询问，Δφ_rms 至 1 rad）；55 s（回溯频率估计，Δφ_rms 至 1 rad）"
      conditions: "Si2 vs Si3 相位数据（1 天），Δφ_rms 分析；20,750 个样本统计"
      verification_status: observed
      confidence: established
      source: {zotero_key: "TVY7T59A", claim: "coherence time of 11 s (Ramsey scenario) to 55 s (retrospective frequency estimation)"}

