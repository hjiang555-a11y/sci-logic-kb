    overview: >
      首先将染料激光预稳到低精细度腔（线宽约 1 kHz），
      再通过 AOM 偏频锁定到高精细度 ULE 腔，最终实现 0.6 Hz 线宽。
    reference_method: "meth.pdh_locking（Drever 1983）"  # 继承 PDH 原理
