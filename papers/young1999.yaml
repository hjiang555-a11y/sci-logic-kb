methods:
  - id: meth.two_stage_pdh_visible
    name: "两级级联 PDH 锁频（可见光）"
    status: demonstrated
    applies_to: ent.fp_cavity_system
    steps_summary: >
      染料激光预稳到低精细度腔（finesse≈800，线宽~1 kHz）→
      AOM 偏频锁定到 ULE 高精细度腔 →
      光纤传输（含 Doppler 补偿）→
      最终实现 0.6 Hz 线宽。
    note: "基于 meth.pdh_locking（定义于 drever1983.yaml）的两级扩展实现"
    key_additions:
      - "预稳级（stage 1）：2 MHz 带宽，隔离激光器自身噪声"
      - "AOM 作为高频执行器（90 kHz 带宽）"
      - "光纤传输光到隔振台（含 Doppler 补偿）"
    source_claim: >
      "first prestabilize it to a cavity with a finesse of ≈800 using a
       Pound-Drever-Hall frequency modulation (FM) lock"

