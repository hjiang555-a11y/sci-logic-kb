meta:
  zotero_key: "2F3PD62T"
  source_type: technical_paper
  reliability: high
  title: "Design and Properties of Hollow Antiresonant Fibers for the Visible and Near Infrared Spectral Range"
  year: 2015
  first_author: Belardi
  journal: "Journal of Lightwave Technology"
  volume: 33
  issue: 21
  pages: "4497-4503"
  doi: "10.1109/JLT.2015.2477775"
  note: >
    系统讨论反谐振空心光纤（HC-ARF）在可见/近红外的设计自由度。
    论文给出第一反谐振窗口由壁厚决定的基础设计规则，展示 free core boundary
    结构可减弱包层模耦合，并实验实现 0.75–1.6 μm 的一阶反谐振传输与
    480 nm 处 175 dB/km 的可见光低损耗。对本知识库的意义：为后续
    空心光纤低背向散射（Michaud-Belleau 2021）与热噪声（Michaud-Belleau 2022）
    条目提供可复用的基础设计节点。

entities:
  - id: ent.antiresonant_hollow_core_fiber
    name: "反谐振空心光纤（HC-ARF）"
    aliases: ["hollow antiresonant fiber", "HC-ARF", "negative-curvature hollow-core fiber"]
    hierarchy_level: 2
    status: demonstrated
    verification_status: observed
    function: >
      以薄壁反谐振包层将光主要约束在空气核心中，尽量减小光场与玻璃的重叠，
      以获得宽传输带宽、低材料散射耦合和可用于气体填充/长延迟线的空心导光平台。
    key_parameters:
      core_structure: "单环/双环/三环 antiresonant tubes；可采用 nested tubes 或 free core boundary"
      spectral_control: "反谐振窗口由包层壁厚 t 控制，第一窗口带宽最大"
      first_window_example: "23 μm core, t = 0.34 ± 0.02 μm, transmission 0.75–1.6 μm"
      visible_example: "51 μm core, t1 ≈ 1.27 ± 0.06 μm, attenuation 175 dB/km @ 480 nm"
    key_advantage: "在可见/近红外可同时获得较宽、较平滑的透射谱和较低玻璃重叠"
    note: >
      新 Level 2 实体节点，挂接在 ent.fiber_interferometer 分支下，
      供后续空心光纤稳频/传感论文复用；节点边界待专家审核。

principles:
  - id: pri.antiresonant_hollow_core_guidance
    name: "反谐振空心光纤导光原理"
    tier: domain
    verification_status: observed
    statement: >
      反谐振空心光纤利用薄壁玻璃包层元件形成反谐振传输窗口，使导模主要局域于空气核心。
      最大透射波长近似满足 λ_k = 4t / (√(n² - 1) · (2k + 1))；
      因此减小包层壁厚 t 可把第一反谐振窗口推到可见/近红外，并获得最大的传输带宽。
    domain: "空心光纤 / 反谐振导光"
    formula: "λ_k = 4t / (√(n² - 1) · (2k + 1))"
    key_insight: "包层壁厚 t 是 HC-ARF 光谱窗口的一级设计旋钮；第一反谐振窗口提供最大带宽。"
    conditions: "适用于以薄壁硅石反谐振元件围成空心核心的 HC-ARF / NANF"
    preconditions:
      - "核心区保持中空，导模与玻璃模式耦合较弱"
      - "包层壁厚在圆周方向足够均匀，使反谐振窗口不被局部共振严重破坏"
    invalidated_when:
      - "导光机制转为光子带隙主导而非反谐振主导"
      - "壁厚起伏、节点接触或强模式耦合导致泄漏损耗不再由简单反谐振窗口描述"
    open_questions:
      - "如何在保持第一反谐振大带宽的同时进一步压低可见波段散射/泄漏损耗？"
      - "这种几何自由度在超稳激光延迟线中能否同时兼顾低背向散射与低热噪声？"
    source_claim: >
      "the wavelengths λk of maximum optical transmission ('antiresonance wavelengths')
      are given by the formula ... The first antiresonance window is the one that
      allows a larger transmission bandwidth"
    condition_variables:
      - symbol: "t"
        name: "包层玻璃壁厚"
        analytical_relation: "λ_k ∝ t；减小 t 将第一反谐振窗口移向更短波长"
        current_value: "0.3 μm（理论宽带设计）；0.34 ± 0.02 μm（首个一阶反谐振实验样品）"
        best_demonstrated:
          value: "t = 0.34 ± 0.02 μm, 0.75–1.6 μm experimental transmission"
          source: {zotero_key: "2F3PD62T"}
        constraints: "壁厚过薄时制造难度和结构均匀性要求显著提高"

  - id: pri.free_core_boundary_mode_decoupling
    name: "自由核心边界降低包层模耦合原理"
    tier: engineering
    verification_status: observed
    statement: >
      在 free core boundary 结构中，相邻包层管彼此分离，包层模与基模的耦合减弱，
      因而低泄漏损耗区更平滑、更宽。代价是最低泄漏损耗通常高于更紧凑的双反谐振结构。
    domain: "空心光纤工程设计"
    key_insight: "把包层接触点从核心边界移开，可用更平滑带宽交换部分最低损耗。"
    conditions: "适用于采用 free core boundary 的 DARfbf / 类似 HC-ARF 设计"
    preconditions:
      - "相邻 cladding tubes 保持分离而非互相接触"
      - "核心边界附近不存在显著制造塌陷或节点靠近核心的缺陷"
    invalidated_when:
      - "接触点向核心移动，重新增强包层模与基模耦合"
    source_claim: >
      "the adoption of a 'free' core boundary ... presents the advantage of reducing
      the coupling between cladding and fundamental modes"

metrics:
  - id: met.transmission_bandwidth_hcarf_b15
    name: "传输带宽（Belardi 2015，HC-ARF）"
    unit: "μm"
    description: >
      反谐振空心光纤在第一反谐振窗口中的实验透射带宽。
      论文同时给出更宽的理论设计空间：薄壁 HC-ARF 家族可在 0.65–2.5 μm
      范围内实现导光，而 free core boundary 的 DARfbf 设计可在约 0.8–1.85 μm
      内保持 <1 dB/km 泄漏损耗。
    demonstrated_value:
