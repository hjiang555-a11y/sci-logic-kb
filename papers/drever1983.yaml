# Schema版本：v2.0

meta:
  zotero_key: "694DPR5F"
  source_type: technical_paper
  reliability: high              # 经典奠基论文，结果已被广泛验证
  title: "Laser phase and frequency stabilization using an optical resonator"
  year: 1983
  first_author: Drever
  journal: "Applied Physics B: Lasers and Optics"
  volume: 31
  pages: "97-105"
  doi: "10.1007/BF00702605"
  note: >
    首次提出 PDH（Pound-Drever-Hall）激光锁频方法；
    以腔反射模式 + 射频外差探测实现亚百赫兹线宽；
    奠定了现代超稳激光技术的方法论基础。

# ═══════════════════════════════════════════════
#  NODES（节点）
# ═══════════════════════════════════════════════

entities:
  - id: ent.rf_phase_modulator
    name: "射频相位调制器"
    aliases: ["ADP crystal modulator", "EOM", "电光调制器"]
    hierarchy_level: 2
    status: demonstrated
    function: "产生偏移 ±fm 的射频边带，用于 PDH 方法中的外差探测"
    key_parameters:
      fm_example: "15–24 MHz（论文中实验值）"
      modulation_depth_example: "0.8 rad"
    note: "PDH 系统的关键硬件组件，与 ent.fp_cavity_system（定义于 numata2004.yaml）共同构成 PDH 锁频硬件"

principles:
  - id: pri.pdh_heterodyne_detection
    name: "PDH 射频边带光学外差探测原理"
    tier: domain
    verification_status: observed
    statement: >
      激光经相位调制后产生 ±fm 边带。边带频率位于 F-P 腔通带之外，
      从腔输入镜全反射；载波频率接近腔谐振，在腔内建立驻波。
      腔内场通过输入镜泄漏回的场（leakage field），与直接反射的边带
      在探测器上产生差拍，经相敏解调后得到正比于频率失谐的双极性
      误差信号，锁定点恰好在谐振中心（而非 fringe side）。
    domain: "激光频率稳定"
    applicable_when: "射频调制频率 >> 腔线宽（FWHM）"
    key_advantage: "锁定点在谐振中心；对激光强度噪声免疫；伺服带宽不受腔响应时间限制"
    source_claim: >
      "High sensitivity for detection of resonance information is achieved by
       optical heterodyne detection with sidebands produced by rf phase modulation"

  - id: pri.pdh_high_speed_regime
    name: "PDH 高速相位检测域"
    tier: domain
    verification_status: observed
    statement: >
      当激光相位变化速率远快于腔场存储时间（τ_cav = 1/πδν_cav）时，
      腔内场来不及跟随输入相位，系统从频率鉴别器变为相位检测器。
      伺服带宽因此不受腔响应时间限制，可远超腔线宽倒数。
    domain: "激光频率稳定"
    key_insight: "允许伺服带宽 >> δν_cav，同时保持窄腔谐振的低频锁定精度"
    conditions: "激光相位变化速率 >> δν_cav（腔半高宽）"
    source_claim: >
      "the servo loop bandwidth is not limited by the cavity response time"
    analogy: "光学版 Pound 微波稳频器（腔等效为相位存储元件）"

  - id: pri.shot_noise_frequency_limit
    name: "散粒噪声频率稳定度极限"
    tier: domain
    verification_status: calculated
    statement: >
      探测器光电子散粒噪声是频率控制系统的根本性能极限之一。
      在高伺服增益下，散粒噪声等效为不可区分的频率扰动，
      被强制写入激光频率。
    domain: "激光频率稳定"
    formula: "δν(τ) ∝ √(ħω · δν_c / Po · T · η) · √B"
    parameters:
      - "δν_c: 腔半高宽"
      - "Po: 注入功率"
      - "T: 腔在谐振处的透射效率"
      - "η: 探测器量子效率"
      - "B: 测量带宽 = 1/(2πτ)"
    source_claim: >
      "fundamental performance limit of any optical frequency control system
        is set by the photoelectron shot noise"

  - id: pri.shot_noise_power_efficiency_scaling
    name: "提高光功率与探测效率可压低散粒噪声极限"
    tier: engineering
    verification_status: calculated
    statement: >
      在散粒噪声受限条件下，提高注入光功率 Po、腔透射效率 T
      和探测量子效率 η，可按平方根规律压低等效频率噪声底。
      这是对散粒噪声极限的工程逼近路径，而非改变其存在性的物理豁免。
    domain: "激光频率稳定"
    formula: "δν_shot ∝ (Po · T · η)^(-1/2)"
    key_insight: "散粒噪声极限无法取消，但可通过更高光子统计和探测效率继续下压。"
    conditions: "光功率提高不会引入更强技术噪声或热效应时"
    source_claim: >
      "the shot-noise-limited performance improves with increasing detected optical power and quantum efficiency"

metrics:
  - id: met.laser_linewidth
    name: "激光线宽"
    unit: "Hz"
    description: "激光频谱的半高宽（FWHM）"
    demonstrated_value:
      value: "< 100 Hz"
      conditions: "染料激光器 + 气体激光器分别 PDH 锁定到同一 F-P 腔，测两者拍频"
      verification_status: observed
      source: {zotero_key: "694DPR5F", claim: "observed sub-100 Hz beat line width"}
      confidence: established

  - id: met.freq_spectral_density
    name: "激光频率噪声谱密度"
    unit: "Hz/√Hz"
    description: "激光频率起伏的单边功率谱密度"
    demonstrated_value:
      value: "< 0.3 Hz/√Hz @ 1 kHz"
      conditions: "氩离子激光器 PDH 锁定到三角形环形腔（10 m 臂长，finesse ≈ 100，注入功率 6 mW）"
      verification_status: observed
      source: {zotero_key: "694DPR5F", claim: "frequency spectral density of better than 0.3 Hz/√Hz at 1 kHz"}
      confidence: established

methods:
  - id: meth.pdh_locking
    name: "PDH 锁频方法"
    full_name: "Pound-Drever-Hall laser frequency stabilization"
    status: demonstrated
    applies_to: ent.fp_cavity_system
    steps_summary: >
      射频相位调制激光 →
      注入 F-P 腔（反射模式）→
      反射光（泄漏场 + 全反边带）打在光探测器上 →
      在调制频率处相敏解调 → 得到双极性频率误差信号 →
      伺服反馈校正激光频率（PZT / EOM / AOM）
    required_hardware:
      - ent.fp_cavity_system    # 提供光学频率参考（定义于 numata2004.yaml）
      - ent.rf_phase_modulator  # 产生探测边带
    advantages:
      - "锁定点在腔谐振中心（非 fringe side），长期稳定"
      - "伺服带宽不受腔响应时间限制"
      - "对激光强度噪声免疫"
    conditions:
      - "射频调制频率 fm >> 腔半高宽 δν_cav"
      - "调制深度 β ≈ 0.8–1 rad"
    source_claim: >
      "A superior configuration uses the optical resonator in the reflection mode"

