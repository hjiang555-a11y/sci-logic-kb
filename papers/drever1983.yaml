entities:
  - id: ent.eom
    name: "电光调制器（EOM）"
    aliases: ["EOM", "ADP crystal modulator", "electro-optic modulator", "rf_phase_modulator", "射频相位调制器", "waveguide EOM"]
    hierarchy_level: 2
    status: demonstrated
    function: >
      产生偏移 ±fm 的射频边带，用于 PDH 方法中的外差探测。
      自身产生的残余幅度调制（RAM）是 PDH 系统的噪声源之一。
    key_parameters:
      fm_example: "15–24 MHz（Drever 1983 实验值）"
      modulation_depth_example: "0.8 rad"
      implementations:
        bulk_crystal: "体晶体 EOM（ADP/LiNbO₃），Vπ > 100 V，通用方案"
        waveguide: "波导 EOM（Ti:LiNbO₃），Vπ ~ 4 V，保偏光纤接口，低 RAM 特化（Zhang 2014）"
      ram_suppression_interfaces:
        zhang2014_dual_servo:
          source: {zotero_key: "S5GJNVG8"}
          mechanism: "DC 偏置电场抑制同相 RAM + EOM 温度伺服抑制正交 RAM"
          performance: "56 dB RAM 抑制，~1 ppm（1–1000 s）"
        parke2025_bias_only_variant:
          source: {zotero_key: "U2LXSU62"}
          mechanism: "x-cut APE 波导 EOM 采用偏置电场闭环，省去温度伺服"
          performance: "RAM 稳定在 10⁻⁷ 水平，对应 3×10⁻¹⁹ 分数频率不稳定度"
    ram_properties:
      ram_source: "EOM 晶体双折射 + 压电致弹光效应"
      ram_level_typical: "~60 ppm（未抑制）"
      ram_level_with_servo: "~1 ppm（Zhang 2014 双通道主动消除后）"
    note: >
      合并原 ent.rf_phase_modulator（Drever 1983，通用概念）和
      ent.waveguide_eom_z14（Zhang 2014，低 RAM 波导实现）。
      两者功能相同（PDH 边带调制），区别仅在 RAM 性能。
      原 meth.ram_cancellation_z14 已并入该子单元的 ram_suppression_interfaces 字段，
      不再保留为独立方法节点。
      ent.fp_cavity_system 定义于 numata2004.yaml。

principles:
  - id: pri.pdh_heterodyne_detection
    name: "PDH 射频边带光学外差探测原理"
    tier: domain
    verification_status: observed
    statement: >
      激光经相位调制后产生 ±fm 边带。边带频率位于 F-P 腔通带之外，
      从腔输入镜全反射；载波频率接近腔谐振，在腔内建立驻波。
      腔内场通过输入镜泄漏回的场（leakage field），与直接反射的边带
      在探测器上产生差拍，经相敏解调后得到正比于频率失谐的双极性
      误差信号，锁定点恰好在谐振中心（而非 fringe side）。
    domain: "激光频率稳定"
    conditions: "射频调制频率 fm >> 腔线宽 δν_cav（FWHM）；腔为高精细度 F-P 腔；输入耦合镜部分透射"
    applicable_when: "射频调制频率 >> 腔线宽（FWHM）"
    key_advantage: "锁定点在谐振中心；对激光强度噪声免疫；伺服带宽不受腔响应时间限制"
    source_claim: >
      "High sensitivity for detection of resonance information is achieved by
       optical heterodyne detection with sidebands produced by rf phase modulation"

  - id: pri.pdh_high_speed_regime
    name: "PDH 高速相位检测域"
    tier: domain
    verification_status: observed
    statement: >
      当激光相位变化速率远快于腔场存储时间（τ_cav = 1/πδν_cav）时，
      腔内场来不及跟随输入相位，系统从频率鉴别器变为相位检测器。
      伺服带宽因此不受腔响应时间限制，可远超腔线宽倒数。
    domain: "激光频率稳定"
    key_insight: "允许伺服带宽 >> δν_cav，同时保持窄腔谐振的低频锁定精度"
    conditions: "激光相位变化速率 >> δν_cav（腔半高宽）"
    source_claim: >
      "the servo loop bandwidth is not limited by the cavity response time"
    analogy: "光学版 Pound 微波稳频器（腔等效为相位存储元件）"

  - id: pri.shot_noise_frequency_limit
    name: "散粒噪声频率稳定度极限"
    tier: domain
    verification_status: calculated
    statement: >
      探测器光电子散粒噪声是频率控制系统的根本性能极限之一。
      在高伺服增益下，散粒噪声等效为不可区分的频率扰动，
      被强制写入激光频率。
    domain: "激光频率稳定"
    conditions: "伺服增益足够高使散粒噪声成为主导限制；光功率未引入更强技术噪声（如光热效应、RAM）"
    formula: "δν(τ) ∝ √(ħω · δν_c / Po · T · η) · √B"
    parameters:
      - "δν_c: 腔半高宽"
      - "Po: 注入功率"
      - "T: 腔在谐振处的透射效率"
      - "η: 探测器量子效率"
      - "B: 测量带宽 = 1/(2πτ)"
    source_claim: >
      "fundamental performance limit of any optical frequency control system
        is set by the photoelectron shot noise"
    engineering_optimization:
      description: >
        在散粒噪声受限条件下，提高注入光功率 Po、腔透射效率 T
        和探测量子效率 η，可按平方根规律压低等效频率噪声底。
        这是对散粒噪声极限的工程逼近路径，而非改变其存在性的物理豁免。
      scaling: "δν_shot ∝ (Po · T · η)^(-1/2)"
      constraints: "光功率提高不会引入更强技术噪声或热效应时"
      note: "原独立节点 pri.shot_noise_power_efficiency_scaling 已并入此字段"

metrics:
  - id: met.laser_linewidth
    name: "激光线宽"
    unit: "Hz"
    description: "激光频谱的半高宽（FWHM）"
    demonstrated_value:
      value: "< 100 Hz"
      conditions: "染料激光器 + 气体激光器分别 PDH 锁定到同一 F-P 腔，测两者拍频"
      verification_status: observed
      source: {zotero_key: "694DPR5F", claim: "observed sub-100 Hz beat line width"}
      confidence: established

  - id: met.freq_spectral_density
    name: "激光频率噪声谱密度"
    unit: "Hz/√Hz"
    description: "激光频率起伏的单边功率谱密度"
    demonstrated_value:
      value: "< 0.3 Hz/√Hz @ 1 kHz"
      conditions: "氩离子激光器 PDH 锁定到三角形环形腔（10 m 臂长，finesse ≈ 100，注入功率 6 mW）"
      verification_status: observed
      source: {zotero_key: "694DPR5F", claim: "frequency spectral density of better than 0.3 Hz/√Hz at 1 kHz"}
      confidence: established

methods:
  - id: meth.pdh_locking
    name: "PDH 锁频方法"
    full_name: "Pound-Drever-Hall laser frequency stabilization"
    status: demonstrated
    applies_to: ent.fp_cavity_system
    steps_summary: >
      射频相位调制激光 →
      注入 F-P 腔（反射模式）→
      反射光（泄漏场 + 全反边带）打在光探测器上 →
      在调制频率处相敏解调 → 得到双极性频率误差信号 →
      伺服反馈校正激光频率（PZT / EOM / AOM）
    required_hardware:
      - ent.fp_cavity_system    # 提供光学频率参考（定义于 numata2004.yaml）
      - ent.eom                # 产生探测边带（合并原 rf_phase_modulator + waveguide_eom）
    advantages:
      - "锁定点在腔谐振中心（非 fringe side），长期稳定"
      - "伺服带宽不受腔响应时间限制"
      - "对激光强度噪声免疫"
    conditions:
      - "射频调制频率 fm >> 腔半高宽 δν_cav"
      - "调制深度 β ≈ 0.8–1 rad"
    source_claim: >
      "A superior configuration uses the optical resonator in the reflection mode"

