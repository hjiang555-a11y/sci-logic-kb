principles:
  - id: pri.fiber_delay_line_frequency_ref
    name: "光纤延迟线频率参考原理"
    statement: >
      长光纤作为光延迟线（Delay Line），使同一激光在不同时刻的相位
      通过干涉进行比较。延迟时间 τ = n·L/c（L 为光纤长度，n 为折射率）。
      激光频率起伏 δν 转化为干涉相位起伏 δφ = 2π·δν·τ，
      经 AOM 外差探测后提取误差信号并反馈。
      与刚性 FP 腔相比：以"时间延迟"代替"腔长谐振"作为频率参考。
    domain: "激光频率稳定（替代方案）"
    formula: "δφ = 2π · δν · τ = 2π · δν · nL/c"
    key_advantage: "不依赖光学谐振，天然支持扫频（可捷变）"
    key_limitation: >
      对高于 1/τ 的频率噪声敏感度下降（高频区响应弱）；
      参考本身（光纤延迟线）受温度、振动影响，长期稳定度低于刚性腔。
    source_claim: >
      "fiber interferometer as an optical frequency reference provides
       ultra-low frequency noise while allowing laser frequency agility"

  - id: pri.rayleigh_backscattering_noise
    name: "Rayleigh 背向散射（RBS）——扫频时的根本噪声极限"
    statement: >
      光纤中的微观折射率不均匀性（密度/组分涨落）产生 Rayleigh 散射。
      向后散射的光（RBS）与正向传输光在探测器上干涉，
      形成随机频率分布的"寄生干涉条纹"（fake fringe）。
      在静态锁频时，RBS 信号时间平均后相对稳定，影响可接受；
      在快速扫频（啁啾）时，每个散射点对应不同延迟，
      大量 RBS 贡献叠加后形成动态随机噪声，成为扫频误差的根本极限。
    domain: "光纤干涉仪稳频，扫频激光"
    key_insight: >
      RBS 是光纤干涉仪（对比 FP 腔）特有的根本噪声机制，
      无法通过普通滤波或信号处理消除。
      限制了光纤干涉仪参考激光的扫频速率与噪声性能。
    mitigation_strategies:
      - "降低光纤注入功率（减少受激 RBS，但会降低 SNR）"
      - "使用偏振分集接收（减少偏振相关 RBS 干涉）"
      - "采用更短光纤（减少总 RBS，但降低灵敏度/延迟时间）"
      - "使用循环延迟线替代 Michelson（避免双程放大 RBS）"
    conditions: "扫频（线性啁啾）时特别显著；静态锁频时相对可控"
    source_claim: >
      "Rayleigh backscattering is the fundamental limitation of the
       fiber interferometer reference during frequency chirping"

  - id: pri.aom_heterodyne_fiber_detection
    name: "AOM 外差检测（光纤干涉仪误差信号提取）"
    statement: >
      在参考臂中插入 AOM（声光调制器），使参考臂光偏移固定频率 f_AOM（约 40 MHz）。
      与信号臂（延迟臂）光干涉后，在探测器产生差拍信号。
      该差拍信号的相位包含激光频率起伏信息，
      经相敏解调（类 PDH）后得到误差信号，反馈到激光。
      本质上是时域版外差探测，类比 PDH 的空间（或时间）边带方案。
    domain: "光纤干涉仪稳频"
    key_advantage: "可分离载波与误差信号，抑制强度噪声（外差优势）"
    analogy: >
      在功能上类似 PDH 的射频外差探测，
      区别在于参考频率偏移来自 AOM（而非 EOM 产生的光学边带）。
    source_claim: >
      "AOM heterodyne detection in the reference arm provides the frequency
       error signal for the servo loop"

methods:
  - id: meth.fiber_delay_locking
    name: "光纤延迟线锁频（Fiber Delay Line Locking）"
    full_name: "光纤迈克尔逊干涉仪 AOM 外差稳频法"
    steps_summary: >
      激光分束 → 参考臂（含 AOM，移频 f_AOM）→ 延迟臂（长光纤 2.5 km，FRM 反射）→
      两臂干涉 → AOM 频率处外差探测 → 相敏解调得误差信号 →
      快速反馈至 AOM0（偏频）+ 慢速反馈至 PZT（腔长）
    required_hardware:
      - ent.fiber_interferometer     # 频率参考（替代刚性 FP 腔）
      - ent.faraday_rotation_mirror  # 消偏振漂移
    versus_pdh:
      common: "均使用外差探测提取误差信号，原理上同属 pri.off_resonance_reference_light 框架"
      difference: >
        PDH：以光学腔谐振为参考，误差信号源自腔反射；
        Fiber：以光纤延迟为参考，误差信号源自延迟干涉；
        本质差异：PDH 是"频域谐振"，Fiber 是"时域延迟"。
    versus_tilt_locking:
      difference: >
        Tilt Locking：空域横模干涉（仍基于 FP 腔）；
        Fiber Delay：时域延迟线干涉（不需要 FP 腔，适合扫频）
    advantages:
      - "天然支持大范围扫频（可捷变），FP 腔方案扫频困难"
      - "无需精密光学装调（ULE 腔需极其精密的机械设计）"
      - "成本低，工程化友好"
    disadvantages:
      - "长期频率稳定度不如 ULE 腔（缺乏 CTE 零点和绝对参考）"
      - "扫频时 RBS 噪声成为根本限制"
      - "温度/振动影响光纤长度（需额外隔振控温）"
    conditions:
      - "对扫频线性度要求高（如 FMCW LiDAR、光频梳锁定）"
      - "对绝对频率稳定度要求不如计量级实验严格"
    source_claim: >
      "fiber interferometer approach is particularly suited for agile lasers
       requiring low noise and high sweep linearity"

