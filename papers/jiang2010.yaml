  doi: "10.1364/OE.18.003284"
  note: >
    演示了以光纤迈克尔逊干涉仪（非刚性 FP 腔）作为频率参考的超低噪声可捷变激光。
    在非扫频条件下频率噪声接近 ULE 腔稳激光水平；
    扫频时的根本限制：Rayleigh 背向散射（RBS）产生的干涉条纹噪声。

