meta:
  zotero_key: "4QVEXY63"
  source_type: technical_paper
  reliability: high
  title: "Frequency Stability of 2.5×10⁻¹⁷ from a Si Cavity with AlGaAs Crystalline Mirrors"
  year: 2026
  first_author: Lee
  journal: "Physical Review Letters"
  volume: 136
  pages: "033801"
  doi: "10.1103/zgrm-cjbb"
  note: >
    首次从实验证明 AlGaAs 晶体镀层相对传统介质镀层具有明确优势（4×改善）：
    6 cm Si 腔，17 K（Si CTE 第二零点），mod σ_y = 2.5×10⁻¹⁷——光学参考腔世界纪录（截至 2026 年）。
    关键发现：2017 年镀层批次存在"超额全局噪声"（excess global noise），2023 年新批次无此问题，
    首次实现晶体镀层理论噪声优势。
    额外技术创新：（1）双偏振锁定（dual-polarization lock）消除晶体镀层固有双折射噪声；
    （2）两台 Si 腔光学频率平均（optical frequency averaging）→ √2 稳定度提升；
    （3）四台 Si 腔（PTB + JILA）超过十年长期频率漂移统计。
    JILA（Ye组）+ PTB（Sterr/Legero 组），1542 nm。

