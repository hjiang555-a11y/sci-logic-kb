principles:
  - id: pri.silicon_cte_zero_crossing_17k
    name: "Si 单晶 CTE 第二零点（17 K）"
    tier: domain
    verification_status: observed
    statement: >
      硅单晶热膨胀系数（CTE）在低温下存在两个零点：约 124 K（高温零点）和约 17 K（低温零点）。
      在 17 K 操作时，温度涨落引起的腔长变化为二阶效应（dα/dT × ΔT），
      且 17 K 处的 dα/dT 斜率远小于 124 K 处，使温度稳定性要求更宽松。
      此外，T = 17 K 意味着热噪声功率 ∝ k_B T 相比 124 K 降低约 7×。
    domain: "低温超稳 Si FP 腔"
    formula: "α_Si(T=17K) = 0；dα/dT|_17K ≪ dα/dT|_124K（坡度更平缓）"
    key_insight: >
      17 K 零点较 124 K 零点提供双重优势：更低热噪声（T更低）+ 更宽松的温控精度要求（坡度更平缓）。
      代价：需要更深低温冷却系统（如闭循环制冷机到 17 K）。
    conditions: "Si 单晶（111），参见 Lyon et al. 1977 热膨胀数据"
    applicable_when: "需要在 17 K 附近操作的 Si 腔；相比 124K 方案对低温恒温器要求更高"
    source_claim: >
      "Si6, on the other hand, operates at the 17 K zero crossing,
       where the much gentler slope of the [CTE vs T curve]"

  - id: pri.optical_frequency_averaging
    name: "多腔光学频率平均"
    tier: engineering
    verification_status: observed
    statement: >
      将两台独立超稳激光的频率取平均（ν_avg = (ν₁ + ν₂)/2）可使频率不稳定度降低 √2，
      前提是两台腔的噪声不相关。
      实现方式：利用光学频率梳将两台腔的频差注入反馈环路，使梳齿频率锁定到两腔频率均值；
      下游激光（如时钟激光）锁定到梳则自动获得均值稳定度。
      代价：切换询问导致 Dick 噪声增加（死时间），短时稳定度受限。
    domain: "超稳激光系统工程，光频标"
    formula: "σ_y,avg(τ) = σ_y,single(τ) / √2（两腔噪声不相关时）"
    key_insight: >
      当单腔已达技术极限时，多腔平均是提升稳定度的工程捷径，
      无需研制新型腔体，利用现有系统即可获得额外 3 dB 改善。
    conditions: "两腔噪声不相关；切换测量方案引入额外 Dick 噪声，非切换方案可恢复短时性能"
    applicable_when: "已有两台性能相当的超稳腔激光系统；特别适用于已到达记录水平的腔"
    source_claim: >
      "With two state-of-the-art cryogenic silicon cavities online at JILA,
       we improved the laser stability even further by averaging the two cavities...
       The averaged laser is more stable than the two similar individual lasers by approximately √2"

methods:
  - id: meth.multi_cavity_averaging
    name: "多腔频率平均策略"
    full_name: "Multi-cavity optical frequency averaging"
    status: demonstrated
    category: "稳频策略（高级，可叠加于核心误差探测方法之上）"
    applies_to: ent.fp_cavity_system
    steps_summary: >
      利用光学频率梳将两台（或多台）独立超稳腔激光的频差注入反馈环路，
      使梳齿频率锁定到多腔频率均值 ν_avg = (ν₁ + ν₂ + ... + ν_N) / N。
      下游激光（如时钟激光）锁定到梳则自动获得均值稳定度。
    advantages:
      - "无需研制新型腔体，利用现有系统即可获得额外 √N 改善"
      - "Lee 2026：两台 Si 腔平均 → mod σ_y ≈ 1.8×10⁻¹⁷（√2 提升）"
    disadvantages:
      - "切换询问导致 Dick 噪声增加（死时间），短时稳定度受限"
      - "需要多台性能相当的超稳腔系统（成本高）"
    note: >
      原 pri.optical_frequency_averaging 保留为该方法的 ENABLED-BY 物理原理
      （不相关噪声 √N 平均的统计基础）。
    source_claim: >
      "With two state-of-the-art cryogenic silicon cavities online at JILA,
       we improved the laser stability even further by averaging the two cavities"

