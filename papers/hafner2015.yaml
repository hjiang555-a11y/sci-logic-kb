# Häfner 2015 — 8×10⁻¹⁷ 分数频率不稳定度，48 cm ULE 室温腔
# 提取者：Claude（AI草稿，待专家确认）
# 提取日期：2026-04-14
# Schema版本：v3.2

meta:
  zotero_key: "UV6S5FFL"
  source_type: technical_paper
  reliability: high
  title: "8×10⁻¹⁷ fractional laser frequency instability with a long room-temperature cavity"
  year: 2015
  first_author: Häfner
  journal: "Optics Letters"
  volume: 40
  pages: "2112-2115"
  doi: "10.1364/OL.40.002112"
  note: >
    首次展示 48 cm ULE 室温腔达到 σ_y < 1×10⁻¹⁶（1–1000 s），
    证明长腔策略可使室温腔稳定度接近低温 Si 腔水平。
    核心创新：自平衡安装（self-balancing mount）——腔体一端铝夹具绕单玻璃球可旋转，
    自动均衡四点 Viton/Teflon 支撑受力，使 ~1.8 kg 长腔全向加速度灵敏度 < 2×10⁻¹⁰/g。
    另一创新：从激光二极管侧公共参考镜到腔镜及用户端（Sr 钟、频率梳）全链路光纤相位噪声消除。
    PTB（德国），698 nm，与 Si 腔（Kessler 2012/Matei 2017）和可搬运腔三角帽比较。

