entities:
  - id: ent.self_balancing_long_cavity_h15
    name: "自平衡安装长 ULE 腔（Häfner 2015）"
    aliases: ["48 cm ULE cavity PTB", "self-balancing mount cavity", "long room-temperature cavity 2015"]
    hierarchy_level: 2
    status: demonstrated
    function: >
      48 cm 长 ULE 间隔物 FP 腔，采用自平衡安装（self-balancing mount）：
      腔一端的两个 Teflon 柱装在铝夹具上，夹具通过单个玻璃球可绕轴旋转，
      另一端两个玻璃球防止旋转，从而自动均衡四支撑点受力，
      消除 Teflon 柱高度误差（加工精度）引起的支撑弹性不均匀，
      实现 ~1.8 kg 长腔全向加速度灵敏度 < 2×10⁻¹⁰/g。
    key_parameters:
      spacer_length: "480 mm（ULE 玻璃间隔物）"
      spacer_mass: "≈1.8 kg（长重腔，支撑力需均衡至 100 nN 精度量级）"
      mirror_substrate: "熔融石英（fused silica，低机械损耗，较 ULE 底物热噪声更低）"
      wavelength: "698 nm（Sr 光钟跃迁）"
      cte_zero_crossing: "T₀ = −0.24°C（ULE 零膨胀温度，本文实测）"
      cte_quadratic: "α(T) = 2×10⁻⁹ K⁻² × (T − T₀)"
      mount_type: "自平衡四点支撑（Viton 球 + Teflon 柱 + 铝夹具 + 玻璃球）"
      thermal_control: "两级温控：真空室 TEC（近环境温度）+ 腔体直接温控；需 < 1 μK 稳定度"
      fiber_noise_cancel: "从公共参考镜到腔镜及用户端（Sr 钟、频梳）全链路相位噪声消除"
      orientation: "水平（horizontal）"
    design_rationale: >
      长腔（48 cm）分数热噪声贡献成比例降低（∝ 1/L），
      但腔重 ~1.8 kg 使支撑力均衡问题严峻：沿光轴 100 nN 的支撑力差
      导致相对长度变化 1.3×10⁻¹⁶，与目标稳定度量级相当。
      自平衡安装通过机械自由度自动均衡受力，无需精密加工每个支撑点高度。
    interface_requirements:
      temperature: "工作于 CTE 零点 −0.24°C 附近 50 mK 内；需温度稳定度 < 1 μK"
      vibration: "主动隔振台抑制高频振动（>3 Hz）；自平衡安装解决低频和 DC 加速度灵敏度"
    note: "Level 2 PART-OF ent.fp_cavity_system（定义于 numata2004.yaml）"

principles:
  - id: pri.long_cavity_thermal_noise_reduction
    name: "增长腔长降低热噪声分数贡献"
    tier: engineering
    verification_status: observed
    statement: >
      FP 腔分数频率不稳定度（由热噪声引起）正比于 1/L：
      热噪声绝对位移谱 √S_x(f) 基本不变（与 L 无关），
      而分数频率变化 δν/ν = δx/L，故 σ_y(thermal) ∝ 1/L。
      增长腔长 L 可线性降低分数热噪声，代价是腔体更重，需专门设计振动不敏感安装。
      Häfner 2015 将腔长从典型 10–25 cm 增至 48 cm，
      使室温 ULE+熔融石英腔达到 σ_y ~ 8×10⁻¹⁷，接近同期低温 Si 腔（Matei 2017：4×10⁻¹⁷）。
    domain: "超稳 FP 腔工程设计"
    formula: "σ_y(thermal) ∝ √(S_x(f)) / (L × ν₀)；S_x 与 L 无关 → σ_y ∝ 1/L"
    key_insight: >
      长腔是室温下降低热噪声分数贡献的最直接工程路径，
      无需低温和特殊材料，代价是更复杂的振动不敏感安装设计（自平衡安装）。
    conditions: "振动不敏感安装保证长腔不因重力引入额外噪声；腔长增加不显著改变绝对热噪声"
    applicable_when: "室温 ULE 腔，热噪声为主要限制，腔长增加不受空间约束"
    source_claim: >
      "we employ the last approach and report on the design and evaluation of a
       48 cm long room temperature resonator... instability of below 1×10⁻¹⁶"

