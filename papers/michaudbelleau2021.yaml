principles:
  - id: pri.hollow_core_fiber_low_backscattering
    name: "空心光纤低背向散射原理"
    tier: domain
    verification_status: observed
    statement: >
      反谐振空心光纤（AR-HCF）中，光在中空核心传播，与玻璃材料相互作用极弱。
      背向散射不再由体 Rayleigh 散射主导（实芯光纤），而由纤芯壁表面粗糙度
      引起的散射决定，背向散射系数可低至 −118 dB/m——较实芯光纤低 >40 dB。
    domain: "光纤光学 / 空心光纤"
    key_insight: >
      空心光纤可从根本上消除实芯光纤的 Rayleigh 背向散射限制——
      这是光纤干涉仪/延迟线稳频的关键噪声源之一。
    conditions: "适用于低损耗反谐振空心光纤（NANF/AR-HCF）"
    preconditions:
      - "光纤为反谐振导光（非光子带隙）"
      - "纤芯壁表面粗糙度足够低"
    source_claim: >
      "show that it is more than 40 dB below reported values in silica-core fiber
      and hollow-core photonic bandgap fiber"

