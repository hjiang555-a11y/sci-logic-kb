principles:
  - id: pri.independent_dof_wire_mounting
    name: "独立自由度柔性钢丝安装原理"
    tier: engineering
    verification_status: observed
    statement: >
      通过将 Invar 引脚胶合于腔体侧面，每对引脚用柔性钢丝连接到安装杆或热屏蔽，
      分三组独立约束平移和旋转自由度（x: T_x+R_z, y: T_y+R_x, z: T_z+R_y）。
      柔性钢丝沿丝方向提供刚性约束，垂直方向传递力较小，
      避免过约束导致的应力耦合。适用于 L/D > 1 长细比腔体。
    domain: "可搬运参考腔安装"
    key_insight: "独立自由度约束避免过约束，柔性钢丝 + Invar 引脚实现可搬运级鲁棒性。"
    conditions: "适用于圆柱形腔体，需要引脚胶合和预应力调节"
    source_claim: >
      "Ten Invar pins are glued into holes to the side of the cavity...
      each set of mounting elements restricts one rotational and one translational degree of freedom"

