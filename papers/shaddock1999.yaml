# Shaddock 1999 — Tilt Locking 原论文
# 提取者：Claude（AI草稿，待专家确认）
# 提取日期：2026-04-14

meta:
  zotero_key: "S5PX7GHC"
  source_type: technical_paper
  reliability: medium
  title: "Frequency locking a laser to an optical cavity by use of spatial mode interference"
  year: 1999
  first_author: Shaddock
  journal: "Optics Letters"
  volume: 24
  issue: 21
  pages: "1499-1501"
  doi: "10.1364/OL.24.001499"
  note: "Tilt locking 原始提出论文；2021 年 Chabbra et al. 有高性能验证后续"

# ═══════════════════════════════════════════════
#  NODES（节点）
# ═══════════════════════════════════════════════

entities:
  - id: ent.split_photodetector
    name: "分割光电探测器"
    aliases: ["split detector", "quadrant detector", "vertically split photodetector"]
    function: >
      探测 TEM00 与 TEM10 模式叠加后的横向功率分布。
      对半差分信号 = 频率误差信号。
      替代 PDH 中的高频光电探测器 + 混频器。
    note: "Tilt locking 的核心器件，极大简化了电子学"

  - id: ent.tilting_mirror
    name: "倾斜反射镜（Tilt 镜）"
    aliases: ["tilt mirror", "input steering mirror with tilt"]
    function: "对入射光束引入精确角度倾斜，激励腔的 TEM10 高阶横模"
    parameters:
      tilt_angle_example: "约 8°（Chabbra 2021 实验值）"

principles:
  - id: pri.off_resonance_reference_light
    name: "非谐振参考光原理（PDH 与 Tilt Locking 共有）"
    statement: >
      任何激光-腔锁频方案的核心：需要一束与谐振载波同频率来源、
      但本身不谐振（直接从腔反射）的"参考光"，
      通过参考光与谐振泄漏场的干涉，提取频率误差信号。
      不同方案的区别仅在于"参考光"的产生方式：
      - PDH：时域——射频相位调制产生频率偏移边带
      - Tilt Locking：空域——角度倾斜激励高阶横模（Gouy 相位不同 → 非谐振）
    domain: "激光频率稳定（通用原理）"
    key_insight: >
      PDH 和 Tilt Locking 的差异是工程实现，不是物理本质；
      两者的量子噪声极限相同。
    source_claim: >
      "In theory, tilt locking and PDH have similar fundamental quantum noise limits"
      [Chabbra 2021, citing Shaddock PhD thesis 2000]

  - id: pri.gouy_phase_discrimination
    name: "Gouy 相位横模鉴别原理"
    statement: >
      不同横模（TEM00, TEM10, TEM20 ...）在腔内每次往返积累不同的 Gouy 相位，
      导致各横模的谐振频率不同（相差约 FSR × ξ/π，ξ 为 Gouy 相移）。
      因此，当 TEM00 谐振时，TEM10 不谐振，直接从腔镜反射，
      可作为非谐振参考光——这是 Tilt Locking 的物理基础。
    domain: "光学谐振腔横模理论"
    applicable_when: "腔为非简并腔（横模频率间隔 ≠ 0）"
    source_claim: >
      "The TEM10 component is non-resonant in the cavity, due to the different
       Gouy phase accumulation, and is reflected from the input coupler"
      [Chabbra 2021]

  - id: pri.spatial_homodyne_detection
    name: "空间零差探测（分割探测器）"
    statement: >
      TEM00（谐振泄漏场）与 TEM10（非谐振参考光）的叠加，
      在横截面上形成功率非对称分布（横向位移）。
      分割探测器取差分，直接输出正比于频率失谐的误差信号。
      无需本振，无需解调电路——这是"零差"区别于 PDH "外差"的关键。
    domain: "激光频率稳定"
    key_advantage: "无需射频调制器、信号源、混频器，电子学极简"
    key_limitation: >
      单次通过时，误差信号对入射光束的横向抖动敏感
      （双程方案可部分解决，但需行波腔）
    source_claim: >
      "By observing the interference between the carrier and the spatial mode
       one can obtain a quantum-noise-limited frequency discriminator"

methods:
  - id: meth.tilt_locking
    name: "Tilt Locking（倾斜锁定）"
    full_name: "Spatial mode interference laser frequency locking"
    steps_summary: >
      对入射光束施加角度倾斜 →
      进入 F-P 腔：TEM00 谐振建腔，TEM10 因 Gouy 相位差非谐振直接反射 →
      反射场（TEM00 泄漏 + TEM10 参考）打在分割探测器上 →
      差分信号 = 双极性频率误差信号 →
      伺服反馈校正激光频率
    required_hardware:
      - ent.fp_cavity_reference   # 提供光学频率参考（与 PDH 相同）
      - ent.tilting_mirror        # 引入角度倾斜激励 TEM10
      - ent.split_photodetector   # 空间差分探测（替代 PDH 的 RF 探测+解调）
    versus_pdh:
      advantages:
        - "无需射频信号源、EOM/AOM、高频探测器、混频器——硬件大幅简化"
        - "无射频电子学噪声"
        - "量子噪声极限与 PDH 相同"
        - "对腔前光路中的标准具效应不敏感（双程方案）"
        - "适合空间应用（LISA、GRACE-FO）"
      disadvantages:
        - "单程方案对入射光束角抖动敏感（光斑抖动直接进入误差信号）"
        - "实际伺服带宽较低（Chabbra 2021：约 230 Hz；PDH 可达 MHz）"
        - "双程方案需要行波腔（如三角形环形腔），不适用于线形腔"
        - "误差信号锁点对准直有轻微依赖（单程方案）"
    conditions:
      - "腔为非简并腔（横模频率间隔足够大）"
      - "入射光束质量良好（主要为 TEM00）"
    source_claim: >
      "Tilt locking offers a number of potential benefits over existing locking schemes,
       including low cost, high sensitivity, and simple implementation"

metrics:
  - id: met.servo_bandwidth
    name: "伺服带宽（Unity Gain Frequency）"
    unit: "Hz"
    description: "伺服环路的单位增益频率，决定高频噪声抑制能力"
    comparison:
      pdh_typical: "> 1 MHz（EOM 方案）"
      tilt_locking_demo: "约 230 Hz（Chabbra 2021，受探测器跨阻抗放大器限制）"
      tilt_locking_limit: "受分割探测器跨阻放大器带宽限制，可工程改进"
    source: {zotero_key: "S5PX7GHC", claim: "tilt locking ... simple implementation"}

