      thermal_time_constant: "τ_th ≈ 6 天（五层屏蔽计算值）"
      temperature_sensitivity_1000s: "6×10⁻¹⁰（1000 s 温度扰动对光纤温度波动的灵敏度）"
      first_stage_temp_control: "真空腔壁温控，24 h 波动 < 2.5 mK"
      second_stage_temp_control: "外层热屏蔽 TEC 温控，波动 < 0.5 mK"
      internal_stabilization:
        optical_power: "光功率稳定电路（温度灵敏度 1×10⁻⁵/K 电阻），光纤腔内安装"
        rf_power: "射频功率稳定电路（AD8361 检测器，温度灵敏度 1.5×10⁻³/K），腔内安装"
    interface_requirements:
      temperature: "外围环境温度波动 ~1000 s 周期（空调引起），经五层屏蔽后对光纤影响 < 0.63 mK"
