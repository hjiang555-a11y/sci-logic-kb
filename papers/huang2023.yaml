      Level 2 子单元，PART-OF ent.fiber_interferometer。
      这是光纤延迟线方案中工程化热管理的极致设计，
      弥补光纤缺乏 CTE 零点（不同于 ULE/Si 腔材料）的固有劣势。

principles:
  - id: pri.fiber_temperature_sensitivity_limit
    name: "光纤温度灵敏度限制——长期频率稳定度的根本约束"
    tier: domain
    verification_status: observed
    statement: >
      光纤延迟线的输出频率噪声与温度波动的关系为 Δν/ν₀ = (α + β)·ΔT，
      其中 α = dn/dT ≈ 1.1×10⁻⁵/K（热折射系数，主导项）、
      β ≈ 5.5×10⁻⁷/K（热膨胀系数，次要项）。
      与 FP 腔方案相比，光纤温度灵敏度高约 3 个数量级
      （ULE 腔 CTE 零点处 dL/L/dT ≈ 3×10⁻⁸/K vs 光纤 ~1.15×10⁻⁵/K）。
      因此，长期频率稳定度完全受限于温度控制水平。
      本文通过五层热屏蔽将温度扰动衰减到 < 0.63 mK 水平，
      最终实现 1.1×10⁻¹⁴ @ 1000 s。
    domain: "光纤干涉仪稳频"
    formula: "Δν/ν₀ = (α + β) × ΔT ≈ 1.15×10⁻⁵ × ΔT"
    key_insight: >
      光纤材料（石英）没有 CTE 零点，温度灵敏度不可消除，
      只能通过极致的热屏蔽工程降低——这是光纤方案长期稳定度的根本瓶颈。
    conditions: "标准 SMF-28 光纤，室温工作"
    preconditions:
      - "光纤为实心石英纤芯（标准 SMF-28），热折射系数 dn/dT ≈ 1.1×10⁻⁵/K 恒定"
      - "温度变化 ΔT 足够小，可忽略高阶温度效应"
    invalidated_when:
      - "使用光子晶体空心光纤——温度灵敏度可降低 2 个数量级以上"
      - "采用偏振保持光纤双折射效应实时测量并补偿温度引起的频率漂移"
    open_questions:
      - "光子晶体空心光纤+低温运行的组合能否将光纤方案长期稳定度推进到 10⁻¹⁵ 量级？"
      - "利用偏振保持光纤的双折射温度测量进行频率补偿的极限是什么？"
    source_claim: >
      "compared to the F-P cavity method, the FDL-stabilized laser is more sensitive
       to temperature fluctuation, owing to the almost 3 orders of magnitude higher
       temperature coefficient of the optical fiber"

methods: []
  # meth.fiber_delay_locking（定义于 jiang2010.yaml）——本文为极致工程化改进

