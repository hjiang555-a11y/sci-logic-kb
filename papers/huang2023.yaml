    name: "五层热屏蔽光纤延迟线封装（Huang 2023）"
    aliases: ["five-layer thermal shield FDL", "5层热屏蔽真空封装"]
    hierarchy_level: 2
    status: demonstrated
    function: >
      将光纤线轴、耦合器、法拉第旋转镜等全部封装在真空腔+五层热屏蔽中，
      配合两级主动温控（第一级在真空腔壁，第二级在外层热屏蔽），
      光功率稳定和射频功率稳定电路也安装在真空腔内部。
      将环境温度波动对光纤延迟线的影响降低约 10 个数量级。
    key_parameters:
      shield_layers: 5
      shield_material: "铝板，抛光镀金（太阳吸收率 ~0.3，发射率 ~0.03）"
