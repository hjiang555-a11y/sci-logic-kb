principles:
  - id: pri.coating_thermal_noise_material_comparison
    name: "镀层热噪声材料比较原理"
    tier: engineering
    verification_status: calculated
    statement: >
      高反射镀层的布朗热噪声功率谱密度正比于 k_B T φ d / (w² f)，
      其中 φ 为镀层机械损耗角、d 为镀层总厚度、w 为光斑半径、f 为频率。
      降低热噪声的路径包括：(1) 降低 φ（材料选择），(2) 减小 d（高折射率比 n_H/n_L），
      (3) 增大 w（增大镜面直径），(4) 降低 T（低温工作）。
      不同材料组合在不同温度下的 φ 差异显著：
      - SiO₂: 0.4×10⁻⁴ (290K) → 7.8×10⁻⁴ (20K)
      - Ti:Ta₂O₅: 2.4×10⁻⁴ (290K) → 8.6×10⁻⁴ (20K)
      - a-Si (IBS): 1.0×10⁻⁴ (290K) → 0.2×10⁻⁴ (20K)
      - SiNₓ: 0.8×10⁻⁴ (290K) → 0.1×10⁻⁴ (20K)
    domain: "镀层热噪声 / 材料科学"
    key_insight: "非晶 SiO₂/Ta₂O₅ 在低温下损耗角反而增大；a-Si 和 SiNₓ 在低温下大幅降低，是低温镀层的关键替代材料。"
    conditions: "适用于多层介电高反射镀层的热噪声评估"
    preconditions:
      - "涨落耗散定理成立（热平衡态）"
      - "镀层厚度远小于基底，可使用薄膜近似"
    invalidated_when:
      - "镀层材料在特定退火条件下出现微观结构变化，改变损耗角温度依赖关系"
    source_claim: >
      "Thermal noise arising from the highly reflective mirror coatings will limit the sensitivity
      both of current detectors and of planned future detectors"
    open_questions:
      - "a-Si 在 1550 nm 的光学吸收（~1000 ppm 对高反射率镀层）是否可降至可接受水平？"
      - "SiNₓ 的实际高反射率镀层是否能保持其低温低损耗角？"
    condition_variables:
      - symbol: "φ"
        name: "镀层机械损耗角"
        analytical_relation: "S_x ∝ φ"
        current_value: "Ti:Ta₂O₅: 2.4×10⁻⁴ @ 290K (IBS)"
        best_demonstrated:
          value: "AlGaAs: 2.5×10⁻⁵ @ 290K; a-Si: 0.2×10⁻⁴ @ 20K; SiNₓ: 0.1×10⁻⁴ @ 20K"
          source: {zotero_key: "L6KKLLSR"}
        constraints: "a-Si 光学吸收过高限制其应用于引力波探测器"

