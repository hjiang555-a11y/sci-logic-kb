metrics:
  - id: met.fractional_freq_instability_z17
    name: "分数频率不稳定度（Zhang 2017，4 K 闭循环 Si 腔）"
    unit: "无量纲（修正 Allan 偏差 mod σ_y）"
    description: >
      6 cm 4 K 硅单晶腔在连续运行闭循环低温机中的短时分数频率不稳定度，
      通过与 25 cm / 40 cm 两台 ULE 腔做相关三角帽比较获得。
    demonstrated_value:
      value: "≈1×10⁻¹⁶（0.06–100 s averaging；0.06 s 以下受振动限制）"
      conditions: >
        1542 nm，6 cm Si cavity，T≈4 K，SiO₂/Ta₂O₅ 镀层，finesse ≈ 4×10⁵；
        三角帽比较对象为 25 cm ULE 腔（1542 nm）与 40 cm ULE 腔（698 nm，经 Yb comb 连接）
      verification_status: observed
      confidence: established
      source: {zotero_key: "N9AGEQ8S", claim: "the silicon cavity supports a low instability around 1 × 10−16, which is close to the expected thermal noise floor over several decades of averaging times"}
    theoretical_floor:
      value: "6×10⁻¹⁷"
      basis: "按 4 K、6 cm 腔长与光斑尺寸计算的布朗热噪声底"
      gap_note: >
        实测值已接近该底噪，但仍高于热噪声极限；论文估计额外技术噪声总和约 3×10⁻¹⁷，
        且 τ < 0.06 s 明显受振动限制。
    historical_landmarks:
      first_demonstration:
        value: "≈1×10⁻¹⁶"
        year: 2017
        source: {zotero_key: "N9AGEQ8S"}
        note: "首次连续运行闭循环 4 K Si 腔达到 10⁻¹⁶ 级稳定度"
      best_demonstration:
        value: "6.5×10⁻¹⁷"
        year: 2019
        source: {zotero_key: "JIZCUZLY"}
        note: "Robinson 2019 在同平台后续优化后达到热噪声极限"

  - id: met.laser_linewidth_z17
    name: "激光线宽（Zhang 2017，4 K 闭循环 Si 腔）"
    unit: "mHz（FWHM）"
    description: >
      通过 771 nm 光学拍频统计分布反推得到的 1542 nm Si 腔锁定激光个体线宽。
    demonstrated_value:
      value: "中位线宽 17 mHz（1542 nm）"
      conditions: >
        40 cm ULE 腔参考；771 nm 拍频，64 s FFT 测量，15 mHz RBW，75 次重复；
        先去除由 40 cm ULE 腔主导的 20 mHz/s 线性漂移，再按 σSi/√(σSi²+σULE²)
        将拍频线宽折算为锁定到 Si 腔的 1542 nm 单激光线宽
      verification_status: observed
      confidence: established
      source: {zotero_key: "N9AGEQ8S", claim: "the computed results... reveal that the median of the linewidth distribution is 17 mHz at 1542 nm"}
    historical_landmarks:
      first_demonstration:
        value: "17 mHz"
        year: 2017
        source: {zotero_key: "N9AGEQ8S"}
        note: "首次闭循环 4 K Si 腔达到亚 20 mHz 中位线宽"
      best_demonstration:
        value: "16 mHz"
        year: 2019
        source: {zotero_key: "JIZCUZLY"}
        note: "Robinson 2019 在同平台后续优化后进一步压低到 16 mHz 中位值"

  - id: met.cavity_frequency_drift_z17
    name: "腔频率漂移率（Zhang 2017，4 K 闭循环 Si 腔）"
    unit: "Hz/s（附对应分数漂移率）"
    description: "通过 Sr 光晶格钟引用测得的 4 K Si 腔三天尺度线性频率漂移上限"
    demonstrated_value:
      value: "< 1 mHz/s @ 1542 nm（约 5×10⁻¹⁸ s⁻¹）"
      conditions: "经 Yb fiber comb 锁定到 Sr optical lattice clock，三天观测，线性拟合"
      verification_status: observed
      confidence: moderate
      source: {zotero_key: "N9AGEQ8S", claim: "Over a three-day period, the linear drift was <1 mHz/s at 1542 nm (5 × 10−18 s−1)"}
    note: "论文注明长期漂移机理仍在继续研究；后续 Robinson 2019 专门系统研究了功率相关漂移。"

