      立方体腔在三轴正交方向反转测试中测得的腔谐振频率加速度响应系数，
      通过锁频激光与参考腔拍频随重力反转的频率阶跃确定。
    demonstrated_value:
      value: "2.45(3) / 0.21(4) / 0.01(1) ×10⁻¹¹/g（轴向/横向1/横向2）"
      conditions: "被动灵敏度，1064 nm Nd:YAG，立方体 ULE 腔，尼龙半球支撑，腔室对称放置（偏心 ≤100 μm）"
      verification_status: observed
      confidence: established
      source: {zotero_key: "A96XGR82", claim: "sensitivities are 2.45(3)/0.21(4)/0.01(1) ×10⁻¹¹/g in the axial and two transverse directions"}
    max_passive_sensitivity:
      value: "2.5×10⁻¹¹/g（最大轴向，三轴中最差方向）"
      note: "当时所有光学腔中最低的被动加速度灵敏度（世界纪录）"
    comparison:
      webster2007_vertical: "< 0.1 kHz/ms⁻²（约 1×10⁻⁸/g）——Webster 2007 是振动不敏感，但非全约束；数值意义不同"
