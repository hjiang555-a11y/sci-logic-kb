entities:
  - id: ent.cubic_force_insensitive_cavity_w11
    name: "立方体力不敏感光学腔（Webster 2011）"
    aliases: ["cubic cavity", "force-insensitive optical cavity", "tetrahedral support cavity"]
    hierarchy_level: 2
    status: demonstrated
    function: >
      以立方体几何间隔物配合四点四面体支撑，使腔体在任意惯性力（加速度、支撑压力）
      作用下两腔镜面中心轴向位移为零或相消，实现全向力不敏感性。
      顶点截断设计使支撑压力引起的腔长变化为零。
      允许在任意方向（含倒置）工作，激光在反转过程中保持锁定，
      适用于卫星、飞机等非实验室平台。
    key_parameters:
      spacer_material: "超低膨胀玻璃（ULE），E=67.6 GPa，ρ=2210 kg/m³"
      spacer_geometry: "立方体，棱长 50 mm"
      vertex_truncation_depth: "6.7 mm（朝腔体中心方向截深，FEM 确定零点）"
      bore_diameter: "3 个圆柱通孔，直径 5.1 mm，穿过立方体面中心，用于抽真空"
      mirror_spec: "12.7 mm 直径，4.0 mm 厚，R=0.5 m 曲率半径，熔融石英，光学接触"
      finesse: "> 300,000"
      wavelength: "1064 nm（Nd:YAG 激光）"
      support_type: "尼龙半球，直径 12.7 mm，四点四面体（刚性固定于腔室顶点法兰）"
      compressive_force: "最大 100 N（拧紧法兰螺栓施加）"
      cavity_orientation: "任意（已在三轴正交方向验证，含倒置）"
    design_rationale: >
      立方体几何与四面体四点支撑的对称性保证：光轴方向任意加速度引起的两腔镜
      轴向位移等大反向，净腔长变化为零。顶点截断使沿立方体棱方向的差动力和
      沿腔轴的压力均不改变腔长。尼龙半球（球面接触）保证力学对称和转动约束。
      残余灵敏度来源于腔体相对支撑点的位置偏差（~100 μm 对应约 3.2×10⁻¹¹/g）。
    interface_requirements:
      vibration: "被动全向不敏感（DC 至结构谐振）；配合主动前馈可进一步降低残余敏感度"
      orientation: "任意方向，含失重环境；不依赖重力方向"
    note: "Level 2 PART-OF ent.fp_cavity_system（定义于 numata2004.yaml）；
           与 ent.cutout_cavity_mount_w07（webster2007.yaml）在同一层级 COMPETES-WITH"

principles:
  - id: pri.force_insensitive_tetrahedral_symmetry
    name: "四面体对称——力不敏感腔设计原理"
    tier: domain
    verification_status: observed
    statement: >
      四个相同支撑点以四面体排列关于光轴对称，构成刚体三维约束的充要且对称条件。
      在此对称性下，任意线性或转动惯性力引起的两腔镜面中心轴向位移或为零、
      或等大反向相消，净腔长变化 ΔL=0。
      额外：立方体顶点截断使支撑压力（指向腔体中心的压缩力）引起的
      腔长变化同样为零（FEM 确定截深参数）。
      二阶残余灵敏度：均匀旋转产生的离心力（∼10⁻¹² s² 量级）。
    domain: "精密光学谐振腔，非实验室/空间环境稳频"
    formula:
      null_condition: "ΔL = Σ(δ_mirror_i · ẑ) = 0，对任意惯性力方向成立"
      centrifugal_residual: "−5.3(+7.6)×10⁻¹² s²（绕光轴旋转/绕垂直光轴旋转）"
      alignment_sensitivity: "κ_align = (ρε/E)×9.81 ≈ 3.2×10⁻¹¹/g（ε=100 μm 偏心）"
    key_insight: >
      "振动不敏感"（Webster 2007）依赖重力方向固定，支撑点可调谐、
      腔体处于半约束状态；"力不敏感"（Webster 2011）实现刚性全约束，
      对支撑压力本身也不敏感，残余灵敏度仅由加工对称性精度决定。
    conditions: >
      腔体相对支撑点定位精度 ≤100 μm；
      振动频率 << 结构谐振频率；
      支撑力学均匀（尼龙球面接触）。
    source_claim: >
      "by symmetry, the cavity is insensitive to inertial forces due to acceleration
       in all degrees of freedom (linear and rotational): axial displacements at the
       mirror centers are either zero or cancel out so that there is no net change of
       length on axis"
    applicable_when: "刚性约束腔，任意方向加速度，包括失重或强惯性力环境"

