# 根据专家意见：meth.inertial_feedforward_correction 归入振动环境部分的方法节点
methods:
  - id: meth.inertial_feedforward_correction
    name: "惯性力实时前馈频率校正"
    status: demonstrated
    applies_to: ent.fp_cavity_system
    steps_summary: >
      三轴加速度计+陀螺仪测量腔体所受惯性力 → 标定传递函数 →
      实时前馈到激光频率（AOM） → 消除一阶+二阶惯性变形引起的频率波动。
      带宽 0–300 Hz，分量贡献：96.8% 一阶线性加速度, 2.2% 二阶线性, 0.1% 旋转加速度, 0.9% 旋转速度。
    advantages:
      - "可将加速度灵敏度从被动 ~10⁻¹¹/g 提升到 <10⁻¹²/g"
      - "同时可做温度前馈（降低漂移 70×）"
      - "产出传递函数信息可反哺腔体设计优化"
    disadvantages:
      - "需要额外传感器（加速度计、陀螺仪）"
      - "高频（>300 Hz）前馈效果有限"
      - "依赖传递函数标定精度"
    conditions:
      - "需已知腔体对惯性力的传递函数"
      - "适用于振动环境部分的主动噪声抑制"
    source_claim: >
      "real-time feedforward to correct for these sources of noise...
      reduced by a factor of 50 to below 10⁻¹² g⁻¹"

