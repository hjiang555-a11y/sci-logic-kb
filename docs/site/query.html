<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Query · sci-logic-kb</title>
<link rel="stylesheet" href="style.css">
<style>
body{max-width:800px;margin:0 auto;padding:0 20px}
.query-box{position:relative;margin:20px 0}
.query-box textarea{width:100%;padding:16px 60px 16px 16px;border:2px solid #2563eb;border-radius:12px;font-size:16px;font-family:inherit;resize:none;min-height:60px;line-height:1.5}
.query-box textarea:focus{outline:none;box-shadow:0 0 0 3px rgba(37,99,235,.2)}
.query-box button{position:absolute;right:8px;bottom:8px;background:#2563eb;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:14px;cursor:pointer;font-weight:600}
.query-box button:hover{background:#1d4ed8}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.chip{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;white-space:nowrap}
.chip:hover{background:#dbeafe;border-color:#2563eb}
.result{margin:16px 0}
.result-card{background:#fff;border-radius:12px;padding:16px;margin:12px 0;box-shadow:0 1px 3px rgba(0,0,0,.08);border-left:4px solid #2563eb}
.result-card.consensus{border-left-color:#059669}
.result-card.chain{border-left-color:#7c3aed}
.result-card.paper{border-left-color:#2563eb}
.result-title{font-size:15px;font-weight:600;color:#0f172a;margin-bottom:4px}
.result-meta{font-size:12px;color:#64748b;margin-bottom:8px}
.result-body{font-size:13px;color:#334155;line-height:1.6}
.result-body code{background:#fef3c7;color:#92400e;padding:1px 5px;border-radius:3px;font-size:12px}
.highlight{background:#fef3c7;padding:0 2px}
.answer-box{background:#f0fdf4;border:2px solid #059669;border-radius:12px;padding:16px;margin:16px 0}
.answer-box h3{color:#059669;margin:0 0 8px}
.answer-box .val{font-size:20px;font-weight:700;color:#0f172a}
.empty{text-align:center;padding:60px 20px;color:#94a3b8}
.empty h2{font-size:28px;border:none;margin-bottom:8px}
.empty p{font-size:15px}
</style>
</head>
<body>
<nav><a href="index.html">sci-logic-kb</a>
<a href="topics/">Topics</a> <a href="chains/">Chains</a>
<a href="consensus/">Consensus</a> <a href="dashboard/">Dashboard</a>
<a href="query.html" style="color:#059669">Query</a></nav>
<main>

<h1>Query</h1>
<p style="color:#64748b;margin-bottom:16px">Ask in natural language — or click an example below</p>

<div class="chips">
<span class="chip" onclick="ask('What is the best fractional frequency instability of FP cavity lasers?')">σ_y 极限？</span>
<span class="chip" onclick="ask('How to break through Brownian thermal noise limit?')">热噪声突破？</span>
<span class="chip" onclick="ask('What is the timing jitter of optical frequency combs?')">梳齿抖动？</span>
<span class="chip" onclick="ask('Show consensus on optical clock uncertainty')">光钟共识？</span>
<span class="chip" onclick="ask('What limits fiber link frequency transfer?')">光纤链路？</span>
<span class="chip" onclick="ask('Lee 2026')">Lee 2026</span>
<span class="chip" onclick="ask('AlGaAs crystalline coating loss angle')">AlGaAs涂层</span>
<span class="chip" onclick="ask('free space satellite transfer')">自由空间传递</span>
</div>

<div class="query-box">
<textarea id="q" placeholder="Ask anything... e.g. What limits σ_y? How to break through? Show me papers about PMD..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();doQuery()}"></textarea>
<button onclick="doQuery()">Ask →</button>
</div>

<div id="results"><div class="empty"><h2>🔍</h2><p>Ask a question or click an example above</p></div></div>

</main>
<footer>sci-logic-kb v5.0</footer>

<script>
let INDEX = null;
async function loadIndex() {
    if (INDEX) return INDEX;
    try { INDEX = await (await fetch('api/search_index.json')).json(); }
    catch(e) { INDEX = []; }
    return INDEX;
}

function ask(q) {
    document.getElementById('q').value = q;
    doQuery();
}

function tokenize(text) {
    return text.toLowerCase().replace(/[^\w\s\-×σ]/g,' ').split(/\s+/).filter(w => w.length > 0);
}

function score(item, queryTokens) {
    let s = 0;
    const text = (item.title + ' ' + item.author + ' ' + item.topic + ' ' + 
                  item.metrics.map(m=>m.name+' '+m.value).join(' ') + ' ' +
                  item.principles.join(' ') + ' ' + item.limits.join(' ')).toLowerCase();
    for (const t of queryTokens) {
        if (text.includes(t)) s += t.length > 3 ? 3 : 1;
    }
    if (item.type === 'consensus') s += 5;
    if (item.type === 'chain') s += 3;
    if (item.has_content) s += 2;
    return s;
}

function detectIntent(q) {
    const lower = q.toLowerCase();
    if (/what\s+is\s+the\s+best|consensus|record|极限|最佳/.test(lower)) return 'best_value';
    if (/how\s+to\s+break|突破|path|怎样/.test(lower)) return 'breakthrough';
    if (/why|limit|bound|卡|限制|极限/.test(lower)) return 'limit';
    if (/show|list|paper|论文|who|谁/.test(lower)) return 'paper';
    return 'general';
}

function highlight(text, queryTokens) {
    let result = text;
    for (const t of queryTokens) {
        if (t.length > 2) {
            const re = new RegExp(`(${t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
            result = result.replace(re, '<span class="highlight">$1</span>');
        }
    }
    return result;
}

async function doQuery() {
    const q = document.getElementById('q').value.trim();
    if (!q) return;
    
    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = '<div class="empty"><p>Searching...</p></div>';
    
    const index = await loadIndex();
    const tokens = tokenize(q);
    const intent = detectIntent(q);
    
    if (!tokens.length) {
        resultsDiv.innerHTML = '<div class="empty"><p>No search terms found</p></div>';
        return;
    }
    
    // Score and rank
    let scored = index.map(item => ({item, score: score(item, tokens)}));
    scored = scored.filter(s => s.score > 0);
    scored.sort((a,b) => b.score - a.score);
    
    // Prioritize by intent
    if (intent === 'best_value' || intent === 'consensus') {
        scored.sort((a,b) => (b.item.type==='consensus'?10:0) - (a.item.type==='consensus'?10:0) || b.score - a.score);
    }
    if (intent === 'breakthrough' || intent === 'limit') {
        scored.sort((a,b) => (b.item.type==='chain'?5:0) - (a.item.type==='chain'?5:0) || b.score - a.score);
    }
    
    const top = scored.slice(0, 15);
    
    if (!top.length) {
        resultsDiv.innerHTML = '<div class="empty"><p>No results for "' + q + '"</p><p style="font-size:13px">Try different keywords or browse Topics</p></div>';
        return;
    }
    
    // Build answer box for best_value intent
    let html = '';
    const consensusResults = top.filter(s => s.item.type === 'consensus');
    if (intent === 'best_value' && consensusResults.length > 0) {
        const cs = consensusResults[0].item;
        const bestMetric = cs.metrics[0];
        html += '<div class="answer-box"><h3>📊 Consensus Answer</h3>';
        html += '<div class="val">' + escapeHTML(bestMetric.value.substring(0,100)) + '</div>';
        html += '<p style="font-size:13px;color:#64748b;margin-top:4px">' + escapeHTML(cs.title) + ' · ' + cs.topic.replace('consensus:','') + '</p>';
        html += '</div>';
    }
    
    // Build result cards
    for (const {item, score: s} of top) {
        let cardClass = item.type === 'consensus' ? 'consensus' : item.type === 'chain' ? 'chain' : 'paper';
        let typeBadge = item.type === 'consensus' ? '📊 Consensus' : item.type === 'chain' ? '🔗 Chain' : '📄 Paper';
        let topicClean = item.topic.replace('chain:','').replace('consensus:','');
        
        html += '<div class="result-card ' + cardClass + '">';
        html += '<div class="result-title">' + highlight(item.title.substring(0,200), tokens) + '</div>';
        html += '<div class="result-meta">' + typeBadge + ' · ' + topicClean;
        if (item.year) html += ' · ' + item.year;
        if (item.author && item.type !== 'consensus') html += ' · ' + item.author;
        html += '</div>';
        
        // Show metrics
        if (item.metrics && item.metrics.length) {
            html += '<div class="result-body">';
            for (const m of item.metrics.slice(0,3)) {
                html += '<div style="margin:4px 0">' + escapeHTML(m.name.substring(0,60)) + ': <code>' + highlight(m.value.substring(0,100), tokens) + '</code></div>';
            }
            html += '</div>';
        }
        
        // Show limits for chains
        if (item.limits && item.limits.length) {
            html += '<div class="result-body" style="margin-top:6px">';
            for (const l of item.limits.slice(0,3)) {
                html += '<div style="margin:2px 0;font-size:12px">' + escapeHTML(l.substring(0,120)) + '</div>';
            }
            html += '</div>';
        }
        
        // Link
        if (item.type === 'consensus') html += '<a href="consensus/" style="font-size:12px">→ View consensus timeline</a>';
        else if (item.type === 'chain') html += '<a href="chains/" style="font-size:12px">→ View reasoning chain</a>';
        else html += '<a href="topics/' + topicClean + '/" style="font-size:12px">→ View in topic</a>';
        
        html += '</div>';
    }
    
    resultsDiv.innerHTML = html;
}

function escapeHTML(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('q').focus();
</script>
</body>
</html>
