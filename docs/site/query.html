<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Query · sci-logic-kb</title>
<link rel="stylesheet" href="style.css">
<style>
body{max-width:900px;margin:0 auto;padding:0 16px}
.query-bar{display:flex;gap:8px;margin:16px 0;flex-wrap:wrap}
.query-bar input,.query-bar select{padding:10px 14px;border:2px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit}
.query-bar input{flex:1;min-width:200px}
.query-bar input:focus,.query-bar select:focus{outline:none;border-color:#2563eb}
.query-bar button{background:#2563eb;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;cursor:pointer;font-weight:600}
.tabs{display:flex;gap:0;margin:16px 0;border-bottom:2px solid #e2e8f0}
.tab{padding:10px 20px;cursor:pointer;font-size:14px;color:#64748b;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.active{color:#2563eb;border-bottom-color:#2563eb;font-weight:600}
.tab:hover{color:#2563eb}
.result-count{font-size:12px;color:#94a3b8;margin:8px 0}
.metric-row{display:grid;grid-template-columns:100px 1fr 1fr;gap:8px;padding:10px;border-bottom:1px solid #f1f5f9;font-size:13px;align-items:center}
.metric-row:hover{background:#f8fafc}
.metric-row .val{font-weight:600;color:#0f172a}
.metric-row .name{color:#475569}
.metric-row .paper{font-size:11px;color:#94a3b8}
.chain-card{border-left:4px solid #7c3aed;padding:12px;margin:8px 0;background:#faf5ff;border-radius:4px}
.chain-card h4{color:#7c3aed;margin:0 0 4px}
.chain-card .edges{font-size:12px;color:#64748b;margin:6px 0}
.consensus-card{border-left:4px solid #059669;padding:12px;margin:8px 0;background:#f0fdf4;border-radius:4px}
.consensus-card .best{font-size:16px;font-weight:700;color:#0f172a}
.tl-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#059669;margin-right:6px}
.tl-line{padding:4px 0 4px 20px;border-left:2px solid #e2e8f0;font-size:13px}
.tl-line strong{color:#059669}
.filter-row{display:flex;gap:8px;align-items:center}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.chip-row span{padding:4px 10px;border-radius:16px;font-size:12px;cursor:pointer;border:1px solid #e2e8f0;background:#fff}
.chip-row span.on{background:#2563eb;color:#fff;border-color:#2563eb}
</style>
</head>
<body>
<nav><a href="index.html">sci-logic-kb</a>
<a href="topics/">Topics</a> <a href="chains/">Chains</a>
<a href="consensus/">Consensus</a> <a href="dashboard/">Dashboard</a>
<a href="query.html" style="color:#059669">Query</a></nav>
<main>

<div class="tabs">
<span class="tab active" onclick="switchTab('metrics')">📊 Metrics</span>
<span class="tab" onclick="switchTab('chains')">🔗 Chains</span>
<span class="tab" onclick="switchTab('consensus')">📋 Consensus</span>
<span class="tab" onclick="switchTab('papers')">📄 Papers</span>
</div>

<div class="query-bar">
<input type="text" id="search" placeholder="Filter..." oninput="doSearch()">
<select id="topicFilter" onchange="doSearch()">
<option value="">All topics</option>
<option value="ultrastable-laser">Ultra-stable Laser</option>
<option value="optical-frequency-combs">Optical Frequency Combs</option>
<option value="frequency-standards">Frequency Standards</option>
<option value="time-frequency-transfer">Time-Frequency Transfer</option>
<option value="timescales">Timescales</option>
<option value="shared">Shared</option>
</select>
</div>

<div id="results"><div class="result-count">Loading...</div></div>

</main>
<footer>sci-logic-kb v5.0</footer>

<script>
let DATA = null, activeTab = 'metrics';

async function load() {
    if (!DATA) {
        try { DATA = await (await fetch('api/structured_data.json')).json(); }
        catch(e) { DATA = {topics:{},metrics:[],principles:[],chains:[],consensus:[]}; }
    }
    doSearch();
}

function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => { if(t.textContent.includes(tab==='metrics'?'Metrics':tab==='chains'?'Chains':tab==='consensus'?'Consensus':'Papers')) t.classList.add('active'); });
    doSearch();
}

function doSearch() {
    const q = (document.getElementById('search').value || '').toLowerCase();
    const topic = document.getElementById('topicFilter').value;
    
    let html = '';
    
    if (activeTab === 'metrics') {
        let metrics = DATA.metrics || [];
        if (topic) metrics = metrics.filter(m => m.topic === topic);
        if (q) metrics = metrics.filter(m => (m.metric+' '+m.value).toLowerCase().includes(q));
        
        html = `<div class="result-count">${metrics.length} metrics</div>`;
        metrics.slice(0,100).forEach(m => {
            html += `<div class="metric-row">
                <span>${m.year||''}</span>
                <span class="val">${esc(m.value.substring(0,100))}</span>
                <span class="name">${esc(m.metric.substring(0,60))}<br><span class="paper">${esc(m.paper.substring(0,60))}</span></span>
            </div>`;
        });
        
    } else if (activeTab === 'chains') {
        let chains = DATA.chains || [];
        if (topic) chains = chains.filter(c => c.domain === topic);
        if (q) chains = chains.filter(c => (c.question+' '+c.limit).toLowerCase().includes(q));
        
        html = `<div class="result-count">${chains.length} chains</div>`;
        chains.forEach(c => {
            html += `<div class="chain-card"><h4>${esc(c.question)}</h4>
            <div class="edges">Limit: ${esc(c.limit||'N/A')} · Best: ${esc((c.best||'').substring(0,80))}</div>`;
            if (c.narrative) html += `<p style="font-size:12px;color:#475569;margin:4px 0">${esc(c.narrative.substring(0,300))}</p>`;
            html += `<div class="edges">`;
            (c.edges||[]).slice(0,5).forEach(e => html += `${esc(e.from)} → <strong>${e.relation}</strong> → ${esc(e.to)}<br>`);
            html += `</div><a href="chains/" style="font-size:12px">→ View chain</a></div>`;
        });
        
    } else if (activeTab === 'consensus') {
        let cs = DATA.consensus || [];
        if (topic) cs = cs.filter(c => c.domain === topic);
        if (q) cs = cs.filter(c => (c.name+' '+c.best).toLowerCase().includes(q));
        
        html = `<div class="result-count">${cs.length} consensus reports</div>`;
        cs.forEach(c => {
            html += `<div class="consensus-card">
            <h4>${esc(c.name||c.metric)}</h4>
            <div class="best">${esc((c.best||'').substring(0,120))}</div>
            <p style="font-size:12px;color:#64748b;margin:4px 0">${esc((c.trend||'').substring(0,200))}</p>`;
            if (c.timeline) {
                html += '<div style="margin:8px 0">';
                c.timeline.slice(0,8).forEach(t => {
                    html += `<div class="tl-line"><span class="tl-dot"></span><strong>${t.year||''}</strong> ${esc((t.value||'').substring(0,80))}<br><span style="font-size:11px;color:#94a3b8">${esc((t.system||'').substring(0,80))}</span></div>`;
                });
                html += '</div>';
            }
            html += `<a href="consensus/" style="font-size:12px">→ View consensus</a></div>`;
        });
        
    } else if (activeTab === 'papers') {
        let papers = [];
        for (const [t, plist] of Object.entries(DATA.topics||{})) {
            if (topic && t !== topic) continue;
            for (const p of plist) {
                if (q && !(p.title+' '+p.author).toLowerCase().includes(q)) continue;
                papers.push({...p, topic: t});
            }
        }
        
        html = `<div class="result-count">${papers.length} papers</div>`;
        papers.sort((a,b) => (b.year||'0').localeCompare(a.year||'0'));
        papers.slice(0,50).forEach(p => {
            html += `<div style="padding:8px;border-bottom:1px solid #f1f5f9;font-size:13px">
            <strong>${p.year||'?'}</strong> ${esc(p.author)} · <span style="color:#64748b">${p.topic}</span><br>
            ${esc((p.title||'').substring(0,150))}<br>`;
            if (p.metrics && p.metrics.length) html += `<span style="font-size:11px;color:#94a3b8">${p.metrics.length} metrics</span>`;
            html += `</div>`;
        });
    }
    
    if (!html) html = '<div style="text-align:center;padding:40px;color:#94a3b8">No results</div>';
    document.getElementById('results').innerHTML = html;
}

function esc(s) { if(!s)return''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
load();
</script>
</body>
</html>
