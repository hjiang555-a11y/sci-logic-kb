<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>sci-logic-kb · Interactive Graph Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; }
    body { display: flex; }
    #sidebar {
      width: 320px; flex-shrink: 0;
      border-right: 1px solid #ddd;
      padding: 12px 14px; overflow-y: auto;
      background: #fafafa; font-size: 13px;
    }
    #sidebar h1 { font-size: 16px; margin: 0 0 8px; }
    #sidebar h2 { font-size: 13px; margin: 14px 0 6px; color: #444; }
    #sidebar section { margin-bottom: 8px; }
    #sidebar label { display: flex; align-items: center; margin: 2px 0; cursor: pointer; }
    #sidebar input[type="checkbox"] { margin-right: 6px; }
    #sidebar input[type="text"] { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 3px; }
    #sidebar select { width: 100%; padding: 5px; border: 1px solid #ccc; border-radius: 3px; }
    #cy { flex-grow: 1; height: 100vh; background: #fff; }
    #info {
      margin-top: 14px; padding: 8px; border: 1px solid #ddd; border-radius: 4px;
      background: #fff; max-height: 260px; overflow-y: auto; font-family: monospace;
      font-size: 11px; line-height: 1.5; white-space: pre-wrap; word-break: break-all;
      display: none;
    }
    #info.visible { display: block; }
    #stats { color: #666; font-size: 11px; margin-top: 8px; }
    .legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
    button { width: 100%; padding: 5px; border: 1px solid #bbb; border-radius: 3px; background: #fff; cursor: pointer; }
    button:hover { background: #eef; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h1>sci-logic-kb · graph viewer</h1>
    <div id="stats">Loading…</div>

    <section>
      <h2>Search</h2>
      <input id="search" type="text" placeholder="Node ID or label…" />
    </section>

    <section>
      <h2>Color by</h2>
      <select id="color-mode">
        <option value="type">Node type (ent/pri/meth/met)</option>
        <option value="topic">Topic</option>
        <option value="tier">Tier</option>
      </select>
    </section>

    <section>
      <h2>Filter: Node type</h2>
      <div id="type-filters"></div>
    </section>

    <section>
      <h2>Filter: Topic</h2>
      <div id="topic-filters"></div>
    </section>

    <section>
      <h2>Filter: Predicate</h2>
      <div id="pred-filters"></div>
    </section>

    <section>
      <button id="fit">Fit to screen</button>
    </section>

    <section>
      <h2>Selection</h2>
      <div id="info">(click a node or edge)</div>
    </section>

    <section style="color:#888; font-size:11px; margin-top:20px;">
      Read-only. Data rebuilt by
      <code>python scripts/graph.py --format cytoscape --output docs/graph/graph.json</code>.
    </section>
  </div>

  <div id="cy"></div>

  <!-- Cytoscape via CDN -->
  <script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/layout-base@2/layout-base.js"></script>
  <script src="https://unpkg.com/cose-base@2/cose-base.js"></script>
  <script src="https://unpkg.com/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
