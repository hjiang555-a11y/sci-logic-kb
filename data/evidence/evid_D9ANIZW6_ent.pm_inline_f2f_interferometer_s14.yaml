definition: '紧跟波导 PPLN 后，用 45° 拼接把倍频光与基频 1064 nm 光同时投射到一段 PM 光纤的快慢轴上； ~1.6 m PM 光纤快慢轴差分群延补偿
  PPLN 后 ~0.7 ps 的基频-倍频时序差， 再一次 45° 拼接回到原基矢，偏振分束器取慢轴输出。插入损耗 ~6 dB， 由于所有光纤长度起伏对两路共模，不向
  f_ceo 引入额外相位噪声。

  '
