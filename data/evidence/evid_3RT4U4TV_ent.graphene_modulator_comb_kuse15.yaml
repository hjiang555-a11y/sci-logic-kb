definition: '腔内集成石墨烯-波导耦合型电光调制器，通过快速调控石墨烯费米能级改变腔内损耗， 从而在 >1 MHz 带宽上调制 f_CEO 与 n·f_rep。
  兼容可见光到中红外；低损耗、易集成于全保偏 Er:fiber 锁模激光谐振腔。

  '
