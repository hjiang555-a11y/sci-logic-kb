definition: '通过使用氘化硅烷（SiD₄，98% 同位素纯度）作为 PECVD/ICP-CVD 前驱体， 将传统 SiN 薄膜中的 N-H 键替换为 N-D
  键。N-D 泛频吸收带移至 ~2.04 μm （vs N-H 的 ~1.52 μm），使 C 波段（1530-1565 nm）损耗大幅降低。 低温沉积（270°C）使其
  CMOS 后端兼容，可直接在预处理硅片上沉积， 无需高温退火（vs LPCVD SiN 需 >700°C）或裂纹控制。

  '
