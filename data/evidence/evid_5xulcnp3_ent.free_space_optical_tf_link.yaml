definition: 'comb-based 飞秒光脉冲双向穿越大气/真空自由空间；两端独立测量到达脉冲 time-of-arrival 与其相对本地梳脉冲时刻的偏移，通过双向互换实现
  fs–as 级时间同步与 10⁻¹⁸ 级频率传递。 典型结构：收发光终端 + 主动 tip-tilt（抑制光束摆动）+ 自由空间几何；支持地面间、 ground-air（无人机/飞机）、ground-satellite
  部署。

  '
