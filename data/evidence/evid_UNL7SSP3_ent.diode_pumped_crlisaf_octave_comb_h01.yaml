definition: '基于 Cr:LiSAF（colquirite 晶体）的 Kerr 透镜锁模飞秒激光器，670 nm 激光二极管直接泵浦（2×350 mW），
  电池供电，输出 115 mW @ 93 MHz、894 nm 中心、24 nm FWHM 带宽（脉冲 40 fs）； 经光子晶体光纤（PCF）超连续谱展宽至覆盖
  >1 倍频程（保留梳齿结构）， 适用于光学频率计量（f-2f 自参考可行）。 首次证明"二极管泵浦"路线可实现倍频程梳，打破 Ti:sapph 垄断（后者需 Ar⁺
  或倍频 Nd:YAG 泵浦）。

  '
