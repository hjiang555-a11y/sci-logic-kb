definition: '6 cm 硅单晶 FP 腔，在 17 K（Si CTE 第二零点）操作，使用 AlGaAs/GaAs 晶体镀层（2023 年批次）。 双偏振锁定消除晶体镀层固有双折射噪声（890
  kHz 劈裂）。 实现分数频率稳定度 mod σ_y = 2.5×10⁻¹⁷，为迄今最高性能光学参考腔。 在验证晶体镀层低热噪声理论上具有里程碑意义。

  '
