name: Si 单晶低温 FP 腔（17 K，AlGaAs 晶体镀层，Lee 2026）
original_id: ent.si_crystal_17k_fp_cavity_l26
properties:
  beam_radius_at_mirror: 293 μm
  cavity_linewidth: 5 kHz（半高全宽，1542 nm）
  coating_loss_angle_upper_bound: φ < 2.3×10⁻⁵（17 K，本文实测上限）
  coating_thickness: 12.0 μm（GaAs/Al₀.₉₂Ga₀.₀₈As 48.5 周期）
  drift_rate_recent: ~10 μHz/s（~5.2×10⁻²⁰ s⁻¹，运行约 2 年后趋于稳定）
  dual_polarization_lock: 同时锁定两个正交偏振模，抵消 890 kHz 双折射噪声
  finesse: 470,000（1542 nm；理论上限由散射+吸收损耗 ~10 ppm/mirror 决定）
  mirror_coating: AlGaAs/GaAs 晶体镀层（2023 年批次），48.5 周期，厚 12.0 μm，1 m 曲率半径底物
  operating_temperature: 17 K（Si CTE 第二零点：α_Si(17K) = 0）
  orientation: 垂直安装（double-cone 双锥形，从中截面悬挂）
  ram_cancellation: AOM FM-triplet 方案，使 RAM 低于热噪声极限
  spacer_length: 60.2 mm（6 cm）
  spacer_material: Si 单晶（111）方向
  vibration_isolation: 分板设计（split-plate）+ 主动隔振台，抑制低温恒温器振动
  wavelength: 1542 nm
