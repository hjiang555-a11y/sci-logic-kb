definition: 'III-V 半导体 SESAM（InGaAs 量子阱，饱和吸收提供锁模）+ 单层石墨烯 EOM（电压调制 Fermi 能级 → 调制吸收损耗）
  异质集成在单一镜片上（graphene 直接转移到 SESAM 表面）； 插入 Er:fiber 梳腔内作为端镜 → 同时提供自启锁模 + 高带宽 fceo 稳频（>
  5 MHz，超越增益寿命限制）； 低电压驱动（graphene 栅极调制）+ 低插入损耗（graphene 单层透射率 ~97.7%）→ 紧凑鲁棒梳设计。

  '
