  comb_type: 掺铒光纤锁模激光器（Er:fiber mode-locked laser）
  dichroic_heterodyne_detection: 1543 nm 辅助拍频用于实时相位漂移补偿
  integrated_phase_noise: <200 mrad（1 Hz – 1 MHz，所有频段）
  multi_branch_architecture: 分立非线性展宽臂：1063 nm、1157 nm、1397 nm 各含 EDFA+HNLF
  optical_lock: 梳齿 n=777,445 相位锁定至 1542 nm USL
  phase_noise_floor: SSB 相噪 < -130 dBc/Hz @ 1 Hz offset（1397 nm, 1157 nm）
  repetition_rate: ~250 MHz（梳齿间距）
  spectral_coverage: 1063 nm – 1543 nm（覆盖 ~90 THz 光学间隔）
