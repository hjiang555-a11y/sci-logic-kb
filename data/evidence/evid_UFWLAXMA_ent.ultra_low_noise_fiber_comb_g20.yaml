definition: '基于掺铒光纤锁模激光器的光学频率梳系统，重复频率 ~250 MHz， 通过 f-2f 自参考锁定 f_CEO，并将一个梳齿相位锁定至超稳激光器（USL）。
  采用多分支非线性光纤展宽架构，同时产生 1063 nm、1157 nm、1397 nm 和 1543 nm 光学频率。 配合色散外差检测技术实时补偿非线性展宽链路中的相位漂移，
  实现宽带光学频率合成精度达 10⁻²⁰ 水平。

  '
