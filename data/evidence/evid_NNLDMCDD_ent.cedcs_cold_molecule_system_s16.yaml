definition: '将高精细度光学腔（FSR ~100 MHz）与缓冲气体冷却池（~10 K He 背景气）集成， 中红外 OPO 梳（2.8–4.8 μm）锁至腔模实现
  ~4 个数量级路径长度增强， 连续冷分子样品（T_rot ~ 10 K, T_trans ~ 16 K）Doppler 展宽降低 √30 倍， 振转态数降低 ~10⁵
  倍 → 谱线分辨、峰值振幅增强，实现复杂分子（>10 原子）高分辨红外光谱。

  '
