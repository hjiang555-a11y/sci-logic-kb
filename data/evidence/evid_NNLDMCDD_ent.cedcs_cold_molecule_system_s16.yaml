name: 腔增强梳光谱 + 缓冲气体冷却系统（Spaun 2016）
original_id: ent.cedcs_cold_molecule_system_s16
properties:
  buffer_gas: He（背景气，~10 K，连续流）
  cavity_finesse: ~10⁴（高精细度腔）
  cavity_fsr: ~100 MHz（需与梳 f_rep 整数倍匹配）
  comb_source: Yb:fiber 梳泵浦 OPO，2.8–4.8 μm 可调
  demonstrated_molecules: 硝基甲烷、萘、金刚烷、六亚甲基四胺（>10 原子复杂分子）
  doppler_width: FWHM ~ 33 MHz（T_trans ~ 16 K，vs. ~180 MHz @ 300 K）
  instrument_linewidth: ~50 kHz（受梳稳定度限制）
  molecular_temperature: T_rot ~ 10 K, T_trans ~ 16 K（缓冲气体热化）
  sensitivity_gain: ~4 个数量级（腔增强 + 冷却双重）
