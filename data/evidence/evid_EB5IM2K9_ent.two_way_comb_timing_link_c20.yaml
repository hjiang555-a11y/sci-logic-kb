name: 两向梳定时抖动测量链路（Caldwell 2020 系统）
original_id: ent.two_way_comb_timing_link_c20
properties:
  center_wavelength: 1560 nm
  comb_repetition_rate: ~200 MHz（signal / LO 两台）
  delta_fr: ~2 kHz
  detection: 线性光学采样 + 平衡探测
  folded_path_length: 280 m（137 m 单程 × 2）
  launch_optics: off-axis parabolic mirror → retroreflector
  optical_bandwidth: 14 nm
  received_power_range: <2 nW (scintillation fade) ~ 60 µW
  reference_laser: 场可部署型腔稳定激光（锁两台梳）
  system_drift: ~0.5 ps / 2.5 h（三脚架沉降 + 光纤温漂）
