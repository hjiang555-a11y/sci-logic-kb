definition: '两台自参考 1560 nm 光纤飞秒梳（signal / LO，~200 MHz，Δfr ≈ 2 kHz）共锁至同一台 超稳激光；signal
  光 14 nm 带通后分两路——短光纤参考支与经抛物面镜 + 137 m 角反射器 的自由空间 280 m 折返支——分别与 LO 梳在平衡探测器上线性光学采样，干涉图到达时刻
  经 δTpulse=(Δfr/fr,S)·δt_IGM 还原，两路相减得 δT_atmosphere（共模抑制梳与光纤噪声）。

  '
