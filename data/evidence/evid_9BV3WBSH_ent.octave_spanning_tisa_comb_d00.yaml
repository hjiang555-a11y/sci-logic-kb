definition: 'Kerr-lens 锁模 Ti:Sa 激光器（中心波长 ~800 nm，~10 fs 脉宽，重复频率 100 MHz） 输出耦合入空气-石英微结构光纤（air-silica
  microstructure fiber，~1.7 µm 芯径，5–10 cm 长）， 通过自相位调制与 χ³ 非线性将梳谱展宽至覆盖一个光学八度（1064 nm
  及 532 nm）， 形成 300 THz 宽带相干光学频率标尺。重频 Δ 通过 PZT 控制腔长锁定至 10 GHz 微波参考。

  '
