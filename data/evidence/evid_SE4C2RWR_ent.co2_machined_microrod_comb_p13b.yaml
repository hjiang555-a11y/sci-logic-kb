definition: '用 CO₂ 激光（10.6 μm）熔融蒸发 fused-quartz 棒（直径 2 mm）快速加工成球状微谐振器（Q ~ 5×10⁸，<1
  分钟加工，近 100% 良率）； 通过压电执行器施加机械力改变谐振器形状 → 调谐 FSR（即微梳梳齿间距 f_rep）； CW 泵浦产生 32.6 GHz 间距参量微梳（1510–1620
  nm 谱跨度）， 锁至微波频率标准后梳齿间距稳定度达 **5×10⁻¹⁵ @ 1 s**（vs. 先前微梳 ~10⁻¹³，提升 200 倍）。

  '
