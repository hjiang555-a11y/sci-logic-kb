definition: '产生偏移 ±fm 的射频边带，用于 PDH 方法中的外差探测。 自身产生的残余幅度调制（RAM）是 PDH 系统的噪声源之一。

  '
id: evid_694DPR5F_ent.eom
metadata:
  original_file: /data/sci-logic-kb/topics/ultrastable-laser/papers/drever1983.yaml
  source_paper: drever1983
  zotero_key: 694DPR5F
name: 电光调制器（EOM）
original_id: ent.eom
properties:
  fm_example: 15–24 MHz（Drever 1983 实验值）
  implementations:
    bulk_crystal: 体晶体 EOM（ADP/LiNbO₃），Vπ > 100 V，通用方案
    waveguide: 波导 EOM（Ti:LiNbO₃），Vπ ~ 4 V，保偏光纤接口，低 RAM 特化（Zhang 2014）
  modulation_depth_example: 0.8 rad
  ram_suppression_interfaces:
    parke2025_bias_only_variant:
      conditions: x-cut APE 铌酸锂波导 EOM；独立 RAM 监测光路；实验室温度稳定约 1°C
      mechanism: x-cut APE 波导 EOM 采用偏置电场闭环，省去温度伺服
      performance: RAM 稳定在 10⁻⁷ 水平，对应 3×10⁻¹⁹ 分数频率不稳定度
      source:
        zotero_key: U2LXSU62
    zhang2014_dual_servo:
      conditions: 波导型 EOM；同相伺服带宽~200 kHz；正交伺服带宽<0.1 Hz
      mechanism: DC 偏置电场抑制同相 RAM + EOM 温度伺服抑制正交 RAM
      performance: 56 dB RAM 抑制，~1 ppm（1–1000 s）
      source:
        zotero_key: S5GJNVG8
status: Determined
type: Entity/Factor
