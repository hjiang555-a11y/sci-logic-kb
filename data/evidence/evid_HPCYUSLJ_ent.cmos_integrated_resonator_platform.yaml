definition: '基于 CMOS 兼容工艺（Si₃N₄、SiO₂、SiON、Si）的片上微环谐振器或微盘， 通过光刻定义几何形状，总线波导渐逝波耦合。优势：可批量制造、可集成、
  适合商业化；劣势：Q 因子通常低于体 WGM（10⁵–10⁷），需要精密工艺控制。 Si₃N₄ 是当前最成熟的材料（Kerr 非线性 + 低双光子吸收 + 宽透明窗口）。
  Si 因 C 波段双光子吸收限制，主要用于中红外。

  '
