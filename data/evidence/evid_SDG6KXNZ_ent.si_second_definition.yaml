definition: '国际单位制中时间基本单位"秒"的定义。当前定义（1967 年起）： "秒是铯-133 原子基态两个超精细能级之间跃迁对应辐射的 9 192
  631 770 个周期的持续时间。" 铯喷泉钟当前实现精度约 ~10⁻¹⁶。 光学频率标准已展示 ~10⁻¹⁸ 级不确定度，推动秒定义从微波跃迁向光学跃迁转变。

  '
