definition: '全集成光子微波振荡器：SiN 螺旋谐振器（Q ~1.6×10⁸）预稳 DFB 激光 → 微型 F-P 腔（6.3 mm，精细度~900,000，ULE，体积
  <9 cm³）PDH 锁定 → SiN 双环微腔暗孤子梳（~20 GHz）两点 OFD 相位锁定 → MUTC 芯片探测器输出 20 GHz 微波。 全部光子元件可异质集成于单芯片，体积从数十升压缩至毫升量级。

  '
