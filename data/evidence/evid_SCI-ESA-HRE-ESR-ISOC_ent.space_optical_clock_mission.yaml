definition: '部署于 ISS（Columbus 外部载荷设施 CEPF）的空间光学原子钟 + 高性能时频传递系统。 任务通过将一套紫外性能优于地面最佳光钟的空间光钟与三条地–空时频链路组合，
  实现：(a) 大空间尺度、大引力势差的引力时间膨胀直接测量；(b) 分布在不同大陆的地面 光钟非共视比对（搜索精细结构常数时间变化、SME 参数、暗物质耦合）；(c)
  对 TAI/UTC 原子时标的超高精度贡献；(d) 厘米级大地水准面差分测量。

  '
