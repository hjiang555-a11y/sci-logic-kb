definition: '在光纤上调制一个 RF 载波（典型 1–10 GHz）或 1 PPS 脉冲，通过主动补偿电延迟 在远端恢复与发射端同步的时间/RF 标。不同于相干光学链路的光频直接传输，
  此类链路利用更成熟的电子锁相与延迟补偿技术，部署门槛低，精度 10⁻¹⁵–10⁻¹⁷ 量级。

  '
