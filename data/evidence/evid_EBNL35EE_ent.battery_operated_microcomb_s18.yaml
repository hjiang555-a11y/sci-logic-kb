definition: '毫米级异质集成 Kerr 微梳芯片组：III–V 反射型半导体光放大器（RSOA）端面对接 Si3N4 光子芯片；Si3N4 芯片内集成双
  Vernier 微环滤波器选择单纵模 + 120 µm 半径高 Q 非线性微环，后者兼做激光腔输出耦合器（Rayleigh 背散射反射 ≈40%） 与 Kerr
  FWM/耗散孤子梳产生腔。电驱动下在 Pelec 约 100 mW 量级产生 194 GHz 间距、近 1550 nm 的低噪声单孤子梳，首次可由 AAA 干电池直接供电，开创便携
  微梳系统方向。

  '
