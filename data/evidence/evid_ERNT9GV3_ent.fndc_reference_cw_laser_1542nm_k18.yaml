definition: '1542 nm 连续波激光，松锁至 CEO-锁定支梳线以稳定其输出；与三支的最近梳齿各自拍频： 与 CEO-锁定支的拍频作为 FNDC 伺服参考，与其余两支的拍频作为误差信号。
  光源本身不必超稳，只要在 FNDC 带宽内稳定即可（"loosely locked to the comb"）。

  '
