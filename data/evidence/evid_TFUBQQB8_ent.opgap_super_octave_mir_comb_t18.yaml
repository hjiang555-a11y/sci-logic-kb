definition: '基于 Er:fiber 梳（100 MHz）+ EDFA + 正常色散 HNLF 产生少周期脉冲（~10 fs）， 经 OP-GaP（取向图案化
  GaP）晶体准相位匹配χ² 脉冲内差频（intra-pulse DFG）， 产生 4–12 μm 超八度中红外频率梳（覆盖分子指纹区 2500–830 cm⁻¹），
  0.25 mW 总功率，亮度匹敌同步辐射（synchrotron IR beamline）。 用于双梳光谱（DCS）实现甲醇/乙醇高分辨（100 MHz）分子指纹测量。

  '
