definition: '基于 Kerr 透镜锁模的钛宝石飞秒激光器作为光学频率梳平台。 输出脉冲宽度 ~10 fs，重复频率 ~80 MHz–1 GHz，中心波长
  ~800 nm， 通过光子晶体光纤（PCF）展宽至倍频程后，配合 f-2f 自参考实现所有梳齿绝对频率控制。 2000–2010 年间频率梳的主要实现平台，首次实现
  RF-光学直接频率链接。

  '
