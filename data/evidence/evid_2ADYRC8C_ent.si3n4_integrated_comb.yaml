definition: '基于 CMOS 兼容工艺制造的 Si₃N₄ 微环谐振腔频率梳，波导与谐振腔集成在同一芯片上。 尽管 Q 因子较低（10⁵–10⁶），但通过强光场限制（小模式体积）和较大的
  Kerr 非线性系数 （n₂ = 2.5×10⁻¹⁵ cm²/W，约为 SiO₂ 的 10 倍）部分补偿。 支持色散工程（通过谐振腔涂层/几何调控），可与光电探测器、调制器等光子器件单片集成，
  是芯片级频率梳的最具前景平台。

  '
