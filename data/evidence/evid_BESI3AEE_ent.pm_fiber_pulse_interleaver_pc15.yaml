definition: '由 5 级级联 PM 50/50 熔接光纤分束/合束器（分光比误差 <1%）实现脉冲重频 2⁵ = 32 倍增 （100 MHz → 3.2
  GHz），第 6 级延时 104.2 ps 增强 9.6 GHz（第 3 谐波）幅度， 末端用保偏偏振合束器（PBC）将两输入通道以正交偏振合并到单一光纤输出，
  输出脉冲对具备交替正交偏振；由于光电探测对偏振不敏感，单端口功率 比非偏振 50/50 合束器高近 3 dB。使用快速采样示波器（0.2 ps 分辨率） 保证
  6 级延时误差 ≤1.5 ps，无需主动温度稳定。

  '
