definition: '由线性 Paul 阱（超高真空）共囚禁的 40Ca+–40CaH+ 双离子组成； 1051 nm 连续光纤激光产生一对 CW Raman
  光束做分子态制备与读出（通过耦合运动模式的共振边带转移）； Ti:S 飞秒 OFC 经分束 + 一对 AOM 产生两束脉冲梳 Raman 光束， 梳齿对共同驱动
  ΔJ = ±2、Δm = ±1 的 THz 级受激 Raman 转动跃迁（CRPT，comb Raman pulse train）； 色散由啁啾镜预补偿，可调延迟线保证两臂脉冲在离子位置时间重合。
  读出通过探测 40Ca+ 的运动边带状态完成，分子保留原始量子态供进一步操纵。

  '
id: evid_DUJ8VXBR_ent.single_ion_comb_spectrometer_c20
