properties:
  aom_shift: ±fAOM（两臂反向频移，扫描步长 ~frep/2）
  comb_bandwidth: ~10 THz（决定可覆盖的转动跃迁范围）
  comb_source: Ti:Sa 飞秒 OFC，frep ≈ 80 MHz，中心波长 800–850 nm
  dispersion_control: 啁啾镜预补偿 GDD + 可调延迟台使两臂脉冲时间重合
  metric_coverage_range: !!python/tuple
  - 800.0
  - 850.0
  molecular_species: 40CaH+（与 40Ca+ 共囚禁于线性 Paul 阱）
  readout: 40Ca+ 运动边带态非破坏性检测；启发式投影态制备
  selection_rules: ΔJ = 0, ±2；Δm = ±1（两光子 Raman）
  state_prep_laser: 1051 nm CW 光纤 Raman，signature transition 投影制备（启发式）
  trap_type: 线性 Paul 阱，UHV，z 方向共享运动模式
