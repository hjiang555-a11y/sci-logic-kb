definition: '基于 Er:Yb:glass 增益介质 + SESAM 被动锁模的 DPSSL 光频梳（1546 nm，220 fs，100.05 MHz），
  首次在固态激光器中引入腔内电光调制器（EOM）作为 frep 高速执行器。EOM 通过电压调制 晶体折射率改变腔内群延迟，从而快速调制重复频率。相比 PZT（典型带宽
  ~10 kHz）， EOM 提供带宽达 700 kHz 的 frep 控制，为当时所有执行器类型的最佳记录。 frep 锁定至 PDH 稳 CW 激光（1560
  nm，1 Hz 线宽），fCEO 通过 f-2f 自参考锁定至氢钟参考合成器。

  '
