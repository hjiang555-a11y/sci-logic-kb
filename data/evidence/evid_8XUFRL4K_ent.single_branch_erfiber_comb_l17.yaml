definition: 'Er:fiber 锁模激光器（~250 MHz 重频），f-2f 自参考稳 f_CEO， 单一 EDFA + HNLF 展宽路径同时覆盖多个光学频率拍频点，
  所有关键光纤路径保持共模（光学参考、f_CEO 探测、多 cw 拍频共用同一展宽路径）， 并整体处于伺服反馈环内；以此消除传统多分支架构中 EDFA/HNLF
  不同路径间的 非共模相位噪声，实现接近 10⁻¹⁹ 级光频合成。

  '
