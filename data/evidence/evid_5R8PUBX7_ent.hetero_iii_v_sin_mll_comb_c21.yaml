definition: 'III-V 增益剖面（QW 增益 + 可饱和吸收器）通过键合集成到 Si₃N₄ 低损耗波导平台上， 构成扩展腔环形 colliding-pulse
  被动锁模激光器；利用 SiN 的超低线性/非线性损耗 大幅延长腔长，使重频降至 755 MHz（远低于纯 III-V MLL 的 GHz-THz 级）， 同时保持
  RF 线宽 1 Hz、光学线宽 <200 kHz。晶圆级工艺 → 可低成本批量制造。

  '
