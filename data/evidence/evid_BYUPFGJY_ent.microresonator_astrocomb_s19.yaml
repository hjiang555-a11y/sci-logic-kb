definition: '以 silica-wedge 微腔 DKS 单孤子为源头的天文光谱仪校准梳，输出经非线性光纤展宽后 以单模光纤输送至 Keck II /
  NIRSPEC 的积分球定标端口。系统原生输出 22.1 GHz 梳线 间距，与 NIRSPEC 分辨率相匹配，无需 Fabry-Pérot 模式滤波即可被仪器分辨。
  梳的绝对频率由 frep 锁定 + f0（通过与 HCN-锁定参考激光拍频检测）共同确定， Rb 钟作为射频参考。

  '
