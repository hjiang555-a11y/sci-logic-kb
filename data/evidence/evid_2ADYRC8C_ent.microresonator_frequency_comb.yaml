definition: '基于高 Q 微谐振腔中 Kerr 非线性（χ⁽³⁾）参量四波混频产生的光学频率梳。 CW 泵浦激光器注入微谐振腔，通过简并与非简并（级联）FWM
  将泵浦光子转换为 等间距的信号-闲频光子对，形成频率梳。梳齿间距等于腔的自由光谱范围（FSR）， 典型重复频率 10–1000 GHz，远高于传统锁模激光器梳（~100
  MHz–10 GHz）， 可实现芯片级集成。泵浦激光器本身是梳齿的一部分。

  '
id: evid_2ADYRC8C_ent.microresonator_frequency_comb
