definition: '基于激光冷却 ⁸⁷Sr 中性原子的魔术波长光晶格钟，作为 I-SOC 的空间频率参考。 目标性能（#SR-PL-03 / #SR-PL-04）：分数频率不稳定度
  $8\cdot10^{-16}/\sqrt{\tau}$； 系统不确定度 $1\cdot10^{-17}$。继承欧洲 SOC → SOC2 → FACT（FP7/H2020
  ITN）地面可搬运 Sr 光钟研发路径。

  '
