definition: '覆盖中红外光谱区（2–20 μm / 500–5000 cm⁻¹）的光学频率梳。 梳齿频率仍遵循 νₙ = n·f_rep + f_CEO，但工作波段延伸至中红外"指纹区"，
  直接覆盖分子强振转吸收带和大气透明窗口（3–5 μm、8–13 μm）。 产生方案包括：(a) 直接锁模激光器（Cr²⁺:ZnSe/ZnS ~2.5 μm）；
  (b) 非线性频率转换（DFG、OPO、OPA）从近红外梳下转换； (c) 中红外光纤超连续谱（硫化物、氟化物）； (d) 微谐振腔 Kerr 梳（CaF₂、MgF₂
  晶体谐振腔）。

  '
