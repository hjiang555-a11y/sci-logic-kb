definition: 'Yb 光纤相似子振荡器（frep=136 MHz，40 nm 带宽，中心 1065 nm）经包层泵浦 CPA 放大至 13.1 W / 75
  fs，相干注入无源高精细度蝴蝶结环形腔（精细度 ~230×），腔内峰值强度达 3×10^14 W/cm²。用于贵气体光电离及腔增强高次谐波产生（HHG），将频率梳扩展至
  VUV/XUV。

  '
