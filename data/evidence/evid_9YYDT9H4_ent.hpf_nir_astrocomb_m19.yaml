definition: '以 1064 nm CW 半导体激光为种子，经集成波导 EO 调制器 + 30 GHz 微波源产生 ~100 根等间距 （30 GHz）梳齿；通过
  30 GHz Fabry–Perot 腔抑制宽带电学热噪声；Yb 光纤放大 + 色散压缩至 ~70 fs；射入 25 mm 长 SiN 纳米光子波导（750 nm
  × 690 nm）产生 700–1600 nm 超连续； 静态 + 可编程幅度滤波整形光谱平坦度；输出耦合到 HPF 光谱仪作为 NIR 实时波长标尺。 系统装配在
  60 × 152 cm 面包板上，在 HET 机房自主连续运行数月。

  '
