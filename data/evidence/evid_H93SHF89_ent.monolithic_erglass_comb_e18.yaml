definition: '以 Er:glass 增益介质和 CaF₂ 晶体腔镜构成整体式全固态光学谐振腔，工作波长 1.56 μm， 重复频率 ~1.5 GHz。整体式结构消除腔内气路波动，显著降低往返损耗与腔内非线性相位噪声，
  实现 OFC 自由运转（不锁定任何外部参考）下 ~1×10⁻¹⁹@1 s 的分数频率不稳定度—— 是已报告 OFC 自由运转性能中最优值。

  '
