definition: '将基底转移法制备的 GaAs/Al₀.₉₂Ga₀.₀₈As 多层晶体镀层扩展到 2 英寸直径， 在熔融石英和蓝宝石基底上实现引力波探测器级的光学品质。
  35.5 周期结构设计在 1064 nm 实现 6 ppm 透射率和极低吸收。

  '
