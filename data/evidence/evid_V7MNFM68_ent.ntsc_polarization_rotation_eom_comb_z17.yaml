definition: 'NPR 锁模 Er:fiber 振荡器（frep ≈ 192 MHz）→ 腔内紧邻 PBS 插入 LiNbO₃ EOM（3mm 厚，~0.12
  mrad/V）； 外加高压（-200 to +200 V）旋转偏振态 → 改变 PBS 透射/反射比例 → 调制腔损 → 驱动 frep / fceo； frep
  控制动态范围数百 Hz（比传统 EOM 方法大 >10×），fceo 控制动态范围数百 MHz（比传统泵浦调制大 >10×）； 带宽与传统腔内 EOM 相当（~MHz
  量级）。

  '
