definition: 'Er:fiber 频率梳（未明示 frep，~100-200 MHz 量级）+ SiN 波导超连续谱产生（3400 nm 宽、700 nm
  厚、1 cm 长） → 倍频程展宽至 780 nm 色散波 + 1560 nm 基频； 低功率方案（11.3 mW 入射芯片）实现 f-2f 自参考（外部 ppKTP
  倍频 + 混频）， 或更高功率下直接 f-3f（同时产生超连续谱与三次谐波）。

  '
