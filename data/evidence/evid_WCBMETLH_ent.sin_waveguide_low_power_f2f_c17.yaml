name: SiN 波导低功率 f-2f 自参考系统（Carlson 2017）
original_id: ent.sin_waveguide_low_power_f2f_c17
properties:
  coupling_loss: < 2 dB（输入耦合）
  f2f_method: 780 nm 色散波 + 1560 nm 倍频（ppKTP）混频 → fceo
  f3f_method: 同步超连续谱 + 三次谐波（直接从波导输出，无需外部晶体）
  incident_power: 11.3 mW（入射芯片）
  power_reduction: ~10× 相比传统 HNLF f-2f 方案
  pulse_energy_threshold: 110 pJ（产生两倍频程展宽）
  waveguide_geometry: SiN, 3400 nm 宽 × 700 nm 厚 × 1 cm 长
