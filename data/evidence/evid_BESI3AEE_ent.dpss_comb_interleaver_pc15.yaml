  photodiode: Discovery HLPD DSC50S (12 GHz) / DSC30S (23 GHz) PIN InGaAs
  pulse_width: 146 fs（变换极限孤子）
  rep_rate_after_5stage: 3.2 GHz (= 2⁵ × 100 MHz)
  sixth_stage_delay: 104.2 ps = 1/9.6 GHz（第 3 谐波优化）
