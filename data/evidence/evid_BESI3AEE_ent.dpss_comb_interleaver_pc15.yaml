definition: '基于 Er:Yb:glass 增益介质 + SESAM 被动锁模的二极管泵浦固态激光器（DPSSL）作为 OFC 源， 输出 1556 nm
  / 146 fs / 100 MHz / ~150 mW 变换极限孤子脉冲；75% 输出功率送入 6 级 全保偏（PM）光纤脉冲交织器，前 5 级以 PM 50/50
  分束/合束器级联将重频倍增至 2⁵ × 100 MHz = 3.2 GHz，第 6 级加入延时 104.2 ps = 1/9.6 GHz 以抬升 9.6 GHz
  第 3 谐波幅度， 并用保偏偏振合束器（PBC）将双臂合为单一输出（vs. 非偏振合束的 50/50 端口损失 3 dB）； 25% 余光用于 OFC 稳定：EDFA+HNLF
  展宽 + f-2f 稳 f₀（对泵浦电流反馈），另一支路 窄带滤波后与共同参考 cw 激光拍频稳 f_rep（对腔内 PZT 反馈），两环带宽均 ~40 kHz。
  12 GHz / 23 GHz 高线性 PIN InGaAs 光电二极管（Discovery HLPD）探测， 两台相同 OFC 互拍得 9.6 GHz 微波相位噪声。

  '
