definition: '稳频 CW 激光器（1559.9 nm，锁至分子/原子参考线）通过级联相位+强度 EO 调制器 产生电光调制梳（EOFC），梳间距由 RF
  微波源决定（可直接 10–20 GHz）， 原生匹配天文 grating 光谱仪分辨本征，无需 F-P 滤波。 商用现货搭建，简单可靠；现场部署于 NASA IRTF
  + Keck II 10 m 望远镜做概念验证。

  '
