definition: '通过 km 级光纤传递 Er:fiber 频率梳的完整结构（所有梳齿 fn = n·f_rep + f_CEO）， 接收端解调出与发射端完全相位相干的梳齿频率：
  (1) 发射端 Er:fiber 梳（100 MHz f_rep）+ f-2f 自参考； (2) 光学相位探测（参考光 vs 光纤传输光）驱动 AOM + 光纤拉伸器主动噪声抵消；
  (3) 接收端光电探测 f_rep、f_beat 拍频，Allan 偏差 <3×10⁻¹⁸ @ 1000 s（锁至 Cs 原子钟溯源 RF）。

  '
