definition: '光频梳 fceo 与 fbeat 的同时数字锁相电子学。板载 2×16-bit/100 MSPS ADC、2×DAC、 Xilinx Kintex-7
  7k325t FPGA（400 MHz 主时钟）；外部参考信号缓冲做 FPGA 时钟以实现全板同步。 Channel 1 → fceo 环（驱动泵浦电流）；Channel
  2 → fbeat 环（快 EOM + 慢 PZT）。 数字链路：IIR 一阶高通 → 低阶 FIR + 陷波 → DDS 混频 IQ 解调 → 改进 atan2（非
  CORDIC）→ 快慢级联 PID → DAC。

  '
