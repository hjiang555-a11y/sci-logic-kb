definition: '基于激光测距（SLR）站的脉冲光学时频传递链路，ACES ELT 的升级版。通过地面 SLR 站向空间段反射器发射激光脉冲并接收空间段回传脉冲，实现
  ps 级空间–地面时间比对。

  '
id: evid_SCI-ESA-HRE-ESR-ISOC_ent.pulsed_optical_link_elt_plus
metadata:
  original_file: /data/sci-logic-kb/topics/time-frequency-transfer/papers/cacciapuoti2017.yaml
  source_paper: cacciapuoti2017
  zotero_key: SCI-ESA-HRE-ESR-ISOC
name: 脉冲光学时频传递链路 ELT+（I-SOC 空间段）
original_id: ent.pulsed_optical_link_elt_plus
properties:
  calibration_uncertainty: $\leq 20\,\text{ps}$（目标 15 ps）单向延迟定标（#SR-PL-18）；$\leq 2\times
    20\,\text{ps}$ 差分定标（#SR-PL-19）
  elevation_range: 30° – 85°（大气透过率 / 低仰角模型 / 高仰角背景散射 / 跟踪速度共同限制）
  inaccuracy: $1\cdot10^{-18}$（空间–地面光钟比对不准确度，#SR-PL-16）
  pass_duration: ~200 s / ISS 过顶（比 MWL 短 100 s）
  ss_budget: $\sigma_x(10 \leq \tau < 300\,\text{s})_{\text{ELT+}(SS)} \leq 3\cdot10^{-12}\tau^{-1/2}\,\text{s}$；$\sigma_x(300
    \leq \tau \leq 10^{6}\,\text{s})_{\text{ELT+}(SS)} \leq 0.5\cdot10^{-12}\,\text{s}$（#SR-PL-20）
  tdev_target: $\sigma_x \leq 0.5\,\text{ps}$ @ 100 s；$\leq 1\,\text{ps}$ 直至 $\tau=10^{6}\,\text{s}$（#SR-PL-16）
status: Determined
type: Entity/Factor
