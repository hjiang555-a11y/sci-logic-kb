definition: '以低噪声锁模激光输出的光脉冲列作为统一主时基，经定时稳定光纤链路分发到远端站点， 再在各端站将到达的脉冲列分别与远端锁模激光或微波振荡器同步，
  从而实现大尺度设施内的统一飞秒级时序控制。

  '
