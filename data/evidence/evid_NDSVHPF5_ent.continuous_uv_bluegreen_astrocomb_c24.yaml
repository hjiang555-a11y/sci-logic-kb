definition: '在 MgO:PPLN 波导中组合 SHG（800 nm → 400 nm）+ SFM（800+1200 nm → 490 nm）， 产生连续
  390–520 nm UV–蓝绿光频梳，跨越传统单 SHG 方案的 440–480 nm 谱间隙。 经 30 GHz Fabry-Pérot 滤波后提取子梳（由
  1 GHz 源梳生成），适配天文光谱仪分辨率要求（典型 ~50 GHz）。 梳齿均匀度 <5 dB（模滤波后），覆盖 Balmer H-α/H-β 线及恒星光谱密集吸收线区，
  适用于 EPRV（极端精度径向速度，目标 <10 cm/s）光谱仪（HARPS, ESPRESSO, ANDES）波长定标。

  '
