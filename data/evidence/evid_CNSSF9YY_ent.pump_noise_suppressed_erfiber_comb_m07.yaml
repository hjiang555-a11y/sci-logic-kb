definition: '非线性偏振旋转（NPR）锁模 Er:fiber 环形腔（拉伸脉冲区，β₂ 近零略正）+ EDFA 放大 + 锗硅 HNLF 展宽至倍频程（~960–2200
  nm），以 2060 nm 二倍频 f-2f 提取 fceo；通过（i）将 1480 nm Bragg-grating 稳定 FP 泵浦二极管工作电流推至 ~1
  A 以进入低白 RIN 区、（ii）带相位超前补偿的快速伺服反馈至泵流， 实现 fceo 仪器极限线宽与积分相噪 ~1 rad。

  '
