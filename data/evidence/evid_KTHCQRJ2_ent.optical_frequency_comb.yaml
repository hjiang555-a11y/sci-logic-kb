definition: '基于锁模激光器的光学频率合成/测量工具。输出频谱包含 10⁵–10⁶ 根等间距梳齿， 每根梳齿频率 fₙ = f_CEO + n·f_rep。通过稳定
  f_rep 和 f_CEO 两个射频参数， 即可将光学频率与射频/微波频率双向关联，实现光频计数、光-光频率比较、 光学分频微波合成等核心功能。

  '
