definition: '基于单片 FPGA 实现的三环路（PDH + FNC + LPS）全数字自动锁定系统， 高速高精度 ADC/DAC 与 FPGA 协同，支持载波锁定和偏频锁定两种模式，
  中断后 10 s 内自动复锁，快反馈环路开环带宽 1.3 MHz。

  '
