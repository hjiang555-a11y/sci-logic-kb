definition: '1 GHz Ti:sapphire飞秒梳锁定至超稳FP光腔（578 nm或1070 nm）， 通过光电探测10 GHz谐波将光学超稳定性转移至微波域，
  产生10 GHz信号，分数频率不稳定度≤8×10⁻¹⁶（1 s）， 是首次无需深冷即达到此精度的电子信号。

  '
