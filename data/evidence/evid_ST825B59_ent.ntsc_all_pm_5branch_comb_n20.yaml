definition: '全 PM 光纤架构 NALM 锁模 Er:fiber 振荡器（frep 未明示，~50-100 MHz 量级）→ NALM 自启锁模 +
  低噪声； 输出经分支器 → 5 个应用端口，各自 PM-EDFA + 非线性展宽至目标波段（1064/1083/1380/1637/1750 nm）； fceo
  锁至 RF 合成器，frep 锁至 UTC 溯源 RF； 各端口与 CW 激光拍频（SNR > 30 dB @ 100 kHz RBW）→ 驱动 CRDS 光谱系统（sub-kHz
  分辨率）。

  '
