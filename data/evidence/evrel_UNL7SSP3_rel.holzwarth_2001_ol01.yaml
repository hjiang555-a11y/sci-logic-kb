  cannot be directly diode pumped;  instead, costly large-frame Ar-ion or frequency-doubled
  Nd:YAG lasers are needed for pumping.  ...Cr:LiSAF can be directly pumped by laser
  diodes at 670 nm, offering low-cost high-performance alternatives."

