definition: '以 AlGaAsOI 暗脉冲微梳（ent.algaasoi_dark_pulse_microcomb_s22）作为片上多波长光源， 驱动一体化
  CMOS 代工厂 SOI 硅光引擎（>33 GHz 带宽 PN-depletion MZM、TiN 微加热器、 自适应螺旋波导延迟线、180 GHz 通道可选微环滤波阵列、垂直外延
  Ge PD、CMOS MZM 驱动）。 同一光源下可配置成两种系统：(1) 20-通道 PAM4 WDM T/R 链路；(2) 基于 tap delay line
  的可重构 MPF。

  '
id: evid_AT5ZTB9M_ent.microcomb_driven_siph_system_s22
metadata:
  original_file: /data/sci-logic-kb/topics/optical-frequency-combs/papers/shu2022.yaml
  source_paper: shu2022
