name: 微梳驱动 CMOS 硅光集成系统（Shu 2022 完整链路）
original_id: ent.microcomb_driven_siph_system_s22
properties:
  aggregate_line_rate: 2 Tbit/s（20 × 50 Gbaud PAM4，ECL 泵浦）
  aggregate_net_rate: 1.65 Tbit/s（扣除 7% HD-FEC / 20% SD-FEC 开销）
  dfb_pumped_rate: 448 Gbit/s（7 通道通过 FEC 阈值）
  ge_photodetector_responsivity: 0.5–0.8 A/W，饱和 ~20 mW
  metric_engineering: 2.0e+51
  microring_tuning_range: 180 GHz（2 FSR），20 mW 加热功率
  modulator_EO_bandwidth: '>33 GHz（PN-depletion MZM）'
  mpf_FSR_set: 1.8 / 3.6 / 7.2 GHz（对应梳齿间距 5.6/2.8/1.4 nm）
  mpf_passband_BW_tuning: 0.9–1.1 GHz（非色散）至亚 GHz（色散方案）
  mpf_reconfiguration_time: ~53 μs
  mpf_sidelobe_suppression: ~10 dB（非色散）/ >20 dB（色散）
  num_wdm_channels: 20（C 波段）
  per_channel_baud_rate: 50 Gbaud PAM4（ECL 泵浦）/ 32 Gbaud PAM4（DFB 泵浦）
