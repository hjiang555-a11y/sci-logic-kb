definition: '由飞秒锁模激光器脉冲串注入的高非线性集成波导，通过 χ(3) 参量四波混频、自相位调制、 孤子裂变与色散波辐射，将初始光谱展宽至倍频程以上，产生
  CEO 可检测的相干频率梳。 相较光子晶体光纤，芯片波导具有更高有效非线性 γ、更强色散工程自由度以及批量制造潜力。

  '
