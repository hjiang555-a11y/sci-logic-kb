definition: '基于激光冷却囚禁原子/离子的窄线宽光学跃迁的频率标准。 分为三大类：（1）单离子钟（精度优先）；（2）光晶格钟（稳定度优先）；（3）核钟（新兴）。
  当前最佳系统不确定度 ~10⁻¹⁹，分数频率不稳定度 ~10⁻¹⁷/√τ。 光钟的性能直接依赖询问激光的线宽和稳定度（跨专题接口到超稳激光专题）。

  '
