definition: '将 100 MHz 参考信号编码在光频梳的重复频率中，通过 50 km 单模光纤传输至远端。 系统架构：(1) 本地端：参考信号 PLL
  锁定光频梳 frep；(2) 光学窄带滤波器 （OBF，0.5 nm @ 1550 nm）从宽带梳中提取窄带光，大幅抑制色散展宽； (3) 光环行器实现双向传输——前向传至远端，远端
  Faraday 镜反射回本地； (4) 本地混频器检测往返相位差，与倍频参考信号比较产生误差信号； (5) 外环 PLL 补偿相位——通过调制参考信号相位消除链路相位波动。

  '
