definition: '基于毫米尺度晶体回音壁模式（WGM）谐振腔（CaF₂、MgF₂ 等）的微梳平台。 通过抛光圆柱坯件制备，Q 因子超过 10¹⁰（光学精细度
  >10⁷）， 棱镜渐逝波耦合，可实现低至 ~12 GHz 的梳齿间距（可直接光电探测）， 透射窗口覆盖 160 nm–~8 μm，尤其适合中红外梳产生。

  '
