definition: 'NPR 锁模 Er:fiber 振荡器（frep ≈ 50.25 MHz）→ 三级 1:1 光纤耦合器（Coupler1 → 1:1 →
  2 路； Coupler2/3 各 1:1 → 4 路 → 8 路）；每路独立 EDFA + 非线性展宽（HNLF / PCF / PPLN SHG）至目标波段：
  Branch 1 → fceo（f-2f）；Branch 2-8 → 7 个应用端口（578 nm / 679 nm / 698 nm / 759 nm / 798
  nm / 813 nm / 1389 nm）。 frep 锁至 1005 MHz（20次谐波，与 UTC(NMIJ) 1 GHz 参考混频）；fceo 锁至合成器；
  各应用端口分别与 Sr/Yb 时钟相关 CW 激光拍频（SNR > 30 dB @ 300 kHz RBW）。

  '
