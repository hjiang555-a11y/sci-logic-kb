definition: 'Er/Yb 共掺杂磷酸盐玻璃晶体（QX/Er，2 mm，0.8% Er + 21% Yb）+ 自由空间线性腔（600 cm，frep ≈
  500 MHz） + SESAM 锁模 + 980 nm 二极管泵浦（450 mW）→ 65 mW 输出、180 fs 脉宽； 经 EDFA + HNLF 非线性展宽至倍频程
  → f-2f 自参考； 双自由度（frep + fceo）同时锁定至两台超稳激光（1157 nm / 1070 nm），拍频稳定度 <10⁻¹⁸ @ 1 s；
  光电探测产生 500 MHz 微波（相位噪声与 Ti:sapph 同级）。

  '
