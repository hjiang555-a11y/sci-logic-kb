definition: '钛合金（Ti）圆环形线轴，轴对称结构，通过单中心柱非对称支撑。 可容纳 >2 km 光纤，首谐振频率约 1.5 kHz。 FEM 优化 h₂
  参数（约 5.2 mm）使垂直振动灵敏度在理论上可归零。 实际缠绕 300 m SMF-28 光纤，与 1 km 非平衡迈克尔逊干涉仪配合使用。

  '
