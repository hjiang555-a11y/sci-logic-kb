definition: 'FMCW 激光器连续调频输出 + 干涉式探测（本振 + 散射信号干涉）构成相干 LIDAR； 光频梳作为调频线性度实时参考（fringe-counting/频率坐标校准）；
  针对 NLOS 场景（光漫反射混叠）用梳校准获得 ~5 dB SNR 提升； 兼顾成像（652 fs → ~200 µm 距离分辨）、测速、测振（数十 Hz 精度）。

  '
