definition: '以 CW 半导体激光器泵浦 fused-silica 盘形微腔（FSR≈33.02932 GHz，Q>10⁸）产生 Kerr 梳； 在泵浦前加入
  Mach-Zehnder 电光强度调制器，于频率 feo≈FSR 产生双边带作为 "参量种子"， 种子在腔内与泵浦经 FWM 产生等间距梳线，并与初级参量振荡（signal/idler
  at ±mi·FSR）竞争/部分注入锁定子梳， 最终使整个微梳的线间距 Δν 精确等于 feo。射频 feo 可在 ~10 MHz 范围连续调谐 Δν。

  '
