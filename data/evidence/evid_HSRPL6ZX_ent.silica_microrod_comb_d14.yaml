definition: '熔融石英微杆谐振腔（直径 2.6 mm，FSR ~25.6 GHz，加载 Q = 1.85×10⁸）， 通过锥形光纤渐逝波耦合泵浦。可调二极管激光器从蓝侧调谐入腔谐振，
  通过热锁定稳定在谐振位置。梳产生经历：(1) 阈值以上首先产生束状梳 （bunched comb，由不同模式族的色散决定各子梳偏移）；(2) 增加泵浦/调谐 使子梳重叠时，自注入锁定使偏移归零，形成连续等间距梳。

  '
