definition: '线性腔 Er:fiber 飞秒激光（50 cm 腔，~28 cm 高掺 PM Er 光纤 + ~22 cm PM 光纤，净腔色散 ~−0.02
  ps²）， 用半导体可饱和吸收镜（SESAM，3% 饱和损耗 / 6% 非饱和损耗，20 μm 光斑）实现真自锁模； FC/PC 端面介质膜（90% 反射，980
  nm 泵浦透射）作输出耦合器。重频 200 MHz，1567 nm 中心、10 nm 带宽、25 pJ/脉冲。 下游 PM Er 光纤放大（1.5 nJ → 70
  fs 压缩）+ 20 cm PM HNLF 展宽至 1.05–>2.3 μm 倍频程； 波导 PPLN 将 2128 nm 倍频到 1064 nm 后与超连续
  1064 nm 光干涉，PM "在线"光纤干涉仪（~1.6 m PM 光纤快慢轴差延补偿 0.7 ps） 探测 f_ceo，SNR 35 dB/470 kHz。整机完全基于
  PM 光纤拼接，无自由空间段， 光纤元件环氧固定于铝壳、飞秒激光灌胶阻尼；铝盒外形 29×42×5 cm。

  '
