evidence: '"The two combs of electro-optic-modulator-based systems can share a number
  of components. With some of these set-ups, the mutual-coherence time exceeds 1 s.
  Such designs without any stabilization electronics greatly facilitate dual-comb
  spectroscopy and hold promise for transportable or even portable compact and easy-to-use
  interferometers."

  '
