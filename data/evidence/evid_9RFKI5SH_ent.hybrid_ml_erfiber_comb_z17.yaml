definition: '以 50:50 光纤耦合器连接两个环：左环为主谐振腔（NPE 单元，含 SMF-28、EDF、波片、PBS、隔离器、PZT、EOM、偏振控制元件），
  右环为 NALM（利用非线性相位差实现等效快饱和吸收）。NALM 启动并维持锁模，NPE 作为快饱和吸收压缩脉冲。 976 nm 双二极管泵浦（总最大 1 W），腔内净色散约
  -5000 fs²，基频重频 168 MHz。 输出经共光程 f-2f 干涉仪产生 f_ceo（反馈至泵浦电流锁定），1555 nm 梳齿对窄线宽 CW 激光拍频锁定
  （EOM 高速通道 + PZT 低频大范围通道）。掉电 6 个月后仍可自启动。

  '
