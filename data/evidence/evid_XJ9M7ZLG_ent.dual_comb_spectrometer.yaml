definition: '基于两个重复频率略不同（Δf_rep）的光学频率梳的宽带光谱测量系统。 两梳干涉在单个光电探测器上产生 RF 梳，将光学频谱以压缩因子 m
  = f_rep/Δf_rep （典型值 3×10⁴–10⁶）映射至射频域，实现无需色散光谱仪或机械干涉仪的 宽带高分辨率光谱测量。频率分辨率由单根梳齿线宽（kHz–MHz）决定，
  频率精度继承梳齿的绝对频率标定（Hz 级），采集速度可达微秒量级。

  '
