definition: '从铯原子钟的 9.2 GHz 微波频率出发，通过非线性二极管混频器、晶体倍频器 和相锁传递振荡器逐级产生谐波，最终到达光学频域（~10¹⁵
  Hz）。 30 年间仅建成极少数频率链，每条只能测量一个特定光学频率， 系统庞大、昂贵、操作困难。被飞秒频率梳完全取代。

  '
