definition: '以固态间隔物（ULE、Zerodur、Invar 等）连接两端腔镜， 形成固定光学路径长度的频率参考。 稳定性的根本限制：腔内各部件的热噪声（布朗运动）。

  '
id: evid_VDXBPUQB_ent.fp_cavity_system
metadata:
  original_file: /data/sci-logic-kb/topics/ultrastable-laser/papers/numata2004.yaml
  source_paper: numata2004
  zotero_key: VDXBPUQB
name: 刚性 F-P 参考腔系统
original_id: ent.fp_cavity_system
properties:
  cavity_length: 24 cm（Numata 2004 分析腔型）
  cavity_linewidth: ~7 kHz（δν_c = FSR / F；FSR ≈ c/(2L) ≈ 625 MHz，F=150,000 → δν_c
    ≈ 4 kHz；实际取决于腔参数）
  finesse: '> 150,000（典型高精细度腔）'
  mirror_beam_radius: 240 μm（Numata 2004 计算值）
  mirror_substrate_material: ULE / 熔融石英
  quality_factor: Q = ν₀/δν_c ≈ 5.3×10¹³/4×10³ ~ 10¹⁰（光学 Q 值，反映频率鉴别能力）
  spacer_material: ULE / Zerodur / Invar
