definition: '两台 Er:fiber 锁模梳（重频 ~100 MHz，Δf_r ≈ 几 kHz），通过 f-2f 自参考稳 f_CEO， 并将两台梳各自的一个梳齿相位锁至独立
  cw 参考激光（1550 nm 附近），实现跨两台梳的完整相干性。 一台梳作为"信号梳"通过样品，另一台作为"本振梳"与其外差，光电探测器输出 RF 多外差拍频谱，
  经快速 ADC 数字化并相干实时平均恢复样品复透过函数 H̃(ν)。

  '
