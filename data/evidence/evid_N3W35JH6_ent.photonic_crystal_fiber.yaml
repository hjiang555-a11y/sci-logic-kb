definition: '通过微结构化的空气-石英包层设计，在 ~800 nm 波段实现反常色散， 增强自相位调制等非线性效应，将钛宝石飞秒脉冲的频谱从 ~45 THz
  展宽至覆盖 超过一个光学倍频程（>300 THz）。这使得从标准振荡器输出功率（数百 mW） 即可获得倍频程频率梳，是实现 f-2f 自参考方案的关键使能器件。

  '
