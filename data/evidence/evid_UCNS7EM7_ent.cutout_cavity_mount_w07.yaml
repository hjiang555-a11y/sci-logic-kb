definition: '通过底部方形切口（补偿竖直加速度引起的腔体不对称形变） 和四点对称橡胶球支撑（保证水平方向力学对称）， 使腔镜面中心间距在外部加速度作用下保持不变，
  从而实现全向振动不敏感性，替代依赖被动隔振来降低振动影响的传统方案。

  '
