definition: '以商用 1 GHz 锁模 Er:fiber 振荡器（MENHIR-1550，密封 PM 输出，5 V/<2 A 供电）为核心， 经 PM
  色散管理光纤放大器将功率从 12 mW 提升至 680 mW，压缩脉宽至 89 fs（峰值功率 7.4 kW）， 再经 1.7 m PM-HNLF 展宽至覆盖
  1–2 µm 八度超连续谱（孤子自频移将功率转移至 2 µm）， 通过内联 1 mm PPLN（周期 30.80 µm）f-to-2f 干涉仪实现自参考。 f_CEO
  和光学拍频分别锁定至 H-maser 与 1550 nm 腔稳 CW 激光，形成全相位稳定光频梳。

  '
