definition: '基于一个或多个电光调制器（EOM）将单频连续波激光调制产生的频率梳。 由 CW 激光种子和射频驱动的 EOM 级联产生等间距梳齿， 线间距等于射频驱动频率（可自由选择），中心频率可快速调谐。
  典型产生数十至数千根梳齿（至多 ~10,000 根），远少于锁模激光器（~10⁵–10⁶）， 但具有结构简单、无需锁模、线间距和中心频率灵活可调等独特优势。 两个
  EO 梳可共享 CW 种子激光器和调制器部件，天然具有高互相干性， 极大简化双梳光谱的相干性控制需求。

  '
