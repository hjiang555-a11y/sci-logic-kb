definition: '48 cm 长 ULE 间隔物 FP 腔，采用自平衡安装（self-balancing mount）： 腔一端的两个 Teflon 柱装在铝夹具上，夹具通过单个玻璃球可绕轴旋转，
  另一端两个玻璃球防止旋转，从而自动均衡四支撑点受力， 消除 Teflon 柱高度误差（加工精度）引起的支撑弹性不均匀， 实现 ~1.8 kg 长腔全向加速度灵敏度
  < 2×10⁻¹⁰/g。

  '
id: evid_UV6S5FFL_ent.self_balancing_long_cavity_h15
metadata:
  original_file: /data/sci-logic-kb/topics/ultrastable-laser/papers/hafner2015.yaml
  source_paper: hafner2015
  zotero_key: UV6S5FFL
name: 自平衡安装长 ULE 腔（Häfner 2015）
original_id: ent.self_balancing_long_cavity_h15
properties:
  cte_quadratic: α(T) = 2×10⁻⁹ K⁻² × (T − T₀)
  cte_zero_crossing: T₀ = −0.24°C（ULE 零膨胀温度，本文实测）
  fiber_noise_cancel: 从公共参考镜到腔镜及用户端（Sr 钟、频梳）全链路相位噪声消除
  mirror_substrate: 熔融石英（fused silica，低机械损耗，较 ULE 底物热噪声更低）
  mount_type: 自平衡四点支撑（Viton 球 + Teflon 柱 + 铝夹具 + 玻璃球）
  orientation: 水平（horizontal）
  spacer_length: 480 mm（ULE 玻璃间隔物）
  spacer_mass: ≈1.8 kg（长重腔，支撑力需均衡至 100 nN 精度量级）
  thermal_control: 两级温控：真空室 TEC（近环境温度）+ 腔体直接温控；需 < 1 μK 稳定度
  wavelength: 698 nm（Sr 光钟跃迁）
status: Determined
type: Entity/Factor
