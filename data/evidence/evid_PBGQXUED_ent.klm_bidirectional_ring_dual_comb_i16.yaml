definition: '基于单个 Ti:sapph KLM 环形腔，顺时针（CW）与逆时针（CCW）方向同时产生锁模脉冲； 因 Kerr 非线性不对称（CW 与
  CCW 光路中非线性相移不同），两方向脉冲重频略有差异（Δf_rep ~ kHz，可调）； 形成天然"双梳"配置，相对相干性被动稳定（共享同一腔长），无需主动锁相系统（f-2f
  或外部参考腔+伺服反馈）。 实现宽带双梳光谱（~700–1000 nm），互相干时间 >10 s（自由运行），简化传统双梳系统。

  '
