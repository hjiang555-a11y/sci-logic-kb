definition: '"Mode-locked femtosecond laser for which f_n, n, f_r, and f_o are measured
  and controlled"（Diddams 2010 功能性定义）。 与普通飞秒锁模激光器的区别：后者仅产生梳状频谱，但不控制梳齿；前者通过 f-2f 自参考等手段
  同时控制两个自由度（f_r 与 f_o），使全部梳齿频率可知且可调——这是 OFC 应用于精密频率计量、光钟、光谱、合成等的**前提**。 2000–2010
  十年间完成从单一技术概念到多分支应用生态的演化。

  '
