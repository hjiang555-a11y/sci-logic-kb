definition: '两台独立频率梳（本地 + 远端，各自由微波钟驱动 frep + fceo）→ 强度编码脉冲经商用光纤（205.86 km）传输； 双端 LOS（线性光学采样）测量脉冲到达时刻（质心）→
  Kalman 滤波提取时间间隔（start-stop）； 使用脉冲包络相位时间（非载波相位）进行同步 → 规避 fceo 不稳定影响； 色散补偿 + 全自动偏振控制
  + 实时反馈保证互相干性； 达到微波钟间时间同步残差 6.23 fs @ 1 s, <6×10⁻¹⁸ @ 10,000 s（首次 fs 级微波钟同步）。

  '
