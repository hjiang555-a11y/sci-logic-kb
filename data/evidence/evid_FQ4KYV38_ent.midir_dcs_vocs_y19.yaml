definition: '由两台 200 MHz 重频（Δf_rep = 100 Hz）Er 光纤梳经 PPLN 晶体差频产生 2.9–4.2 µm （2750–3150
  cm⁻¹）中红外双梳，在 50:50 合束后经 ZrF4 单模光纤送入 100 mm 口径 离轴抛物面望远镜，经 162 m 或 1 km 开阔大气链路往返于角锥回射器，
  返回光由 100 MHz 带宽 HgCdTe 探测器采集，干涉图每 10 ms 重复，FPGA 内相干平均 1 min。 0.0067 cm⁻¹（200 MHz）原生分辨率覆盖基频
  C-H 伸缩带，使窄线小分子（CH₄、C₂H₆、 H₂O 同位素体）与宽带大分子 VOC（丙酮、异丙醇）同时定量。

  '
