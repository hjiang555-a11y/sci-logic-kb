name: 公里级开阔路径中红外 VOC 双梳光谱仪（Ycas 2019）
original_id: ent.midir_dcs_vocs_y19
properties:
  comb_platform: 双分支 PPLN-DFG 中红外梳（泵浦：PM Er 光纤梳，Truong 2016）
  detector: 热电制冷 HgCdTe，100 MHz 带宽
  figure_of_merit: 1.2×10⁶ √Hz（Coddington 2016 定义）
  interferogram_rate: 100 Hz（10 ms 间隔），FPGA 内 1 min 相干平均
  mir_power_per_comb: 5 mW 耦入 ZrF4 单模光纤
  mir_spectral_coverage: 2750–3150 cm⁻¹（2.9–4.2 µm，覆盖基频 C-H 伸缩带）
  native_resolution: 0.0067 cm⁻¹（200 MHz）
  phase_stabilization: 两梳 f_CEO + 1560 nm CW 锁相至公共腔稳 CW 激光
  repetition_rate: 200 MHz（Δf_rep = 100 Hz）
  retroreflector: 63.5 mm（162 m 路径）或 127 mm（1 km 路径）
  telescope_aperture: 100 mm OAP，焦距 179 mm，发射光束 ~75 mm
status: Determined
