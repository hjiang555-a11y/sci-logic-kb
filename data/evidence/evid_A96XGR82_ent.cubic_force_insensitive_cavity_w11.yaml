definition: '以立方体几何间隔物配合四点四面体支撑，使腔体在任意惯性力（加速度、支撑压力） 作用下两腔镜面中心轴向位移为零或相消，实现全向力不敏感性。
  顶点截断设计使支撑压力引起的腔长变化为零。 允许在任意方向（含倒置）工作，激光在反转过程中保持锁定， 适用于卫星、飞机等非实验室平台。

  '
