definition: '利用锁模 Er 光纤激光器产生的频率梳，通过非线性放大和超连续谱产生（SCG）， 将锁定的光学频率从梳的一个波段精确传递到另一个波段或多个波段。
  核心挑战：SCG 和放大过程引入的额外噪声（光学非线性噪声、ASE、技术噪声） 限制了传递稳定度。关键方法：(1) 单分支 SCG 传递（直接在一根 HNLF
  上产生 倍频程频谱并锁定两端波段）；(2) 噪声抵消技术（在传递路径两端各建立 拍频检测 + 伺服反馈，主动消除 SCG 引入的噪声）； (3) 脉冲整形（在
  SCG 之前用可编程光谱整形器优化特定波段的功率和相位）。

  '
