definition: '以 1.56 µm Er:光纤锁模激光器为种子，经 EDFA 放大到 190 mW / 50 fs， 30 cm HNLF1 通过 Raman
  孤子自频移（SSFS）产生 1928 nm / 45 fs / 40 mW 2 µm 种子； PM-TDF CPA（2 m PM-TSF-9/125，前向 1550
  nm 泵浦）放大至 420 mW，两级非线性自压缩 （PM1550XP 64 cm + 椭圆芯 PM-HNLF2 6 cm）将脉冲压缩到 9.5 fs（1.4
  光周期）， 输出 327 mW 平均功率、104 kW 峰值功率、1–2.4 µm 倍频程谱，直接支持 f-2f 自参考。 整机完全采用商用 PM 光纤器件，35×30
  cm 立面盒内容纳。

  '
