definition: '通过微结构包层设计实现 800 nm 附近零群速度色散，在小芯径（~1.7 µm）中保持飞秒脉冲 峰值强度（数百 GW/cm²）不色散弥散，使自相位调制与四波混频持续积累，
  从而将 ~10 fs Ti:Sa 输出的频率梳横跨一个光学八度展宽。

  '
