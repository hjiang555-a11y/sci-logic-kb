definition: '在电信级单模光纤（SMF-28，室温地下部署为主）上双向传递超窄线宽光载波， 发射端参考与接收端比对信号的相对相位由 Michelson
  往返干涉法读出并通过 AOM 反馈修正， 实现 σ_y ≲ 10⁻¹⁸–10⁻²⁰（长平均时间）、accuracy 10⁻¹⁹–10⁻²⁰ 的频率传递。 部署在
  EURAMET/REFIMEVE+/CLONETS 等欧洲国家计量网络，作为光钟远程比对、 相对论大地测量、基本常数搜索的物理层。

  '
