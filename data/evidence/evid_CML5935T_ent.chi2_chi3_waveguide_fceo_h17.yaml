definition: "由 SiO2 包覆、800 nm 厚的 AlN 薄膜刻蚀而成的矩形波导，宽度可调 400–5100 nm， 入/出端渐变至 150 nm\
  \ 宽以改善耦合。波导强限域把 1560 nm 泵浦场压缩至亚波长模面， 显著提升有效非线性系数 γ；同时 AlN 薄膜保留 c 轴竖直取向的六角柱结构，使 竖直（TM）方向存在强\
  \ χ² 张量分量。单根波导内同时发生：\n  · χ³ 主导的 SPM + 四波混频 → 超连续展宽 500–4000 nm；\n  · 模式交叉（TE00↔TM10）导致局部相位匹配\
  \ → 800–1200 nm 强度增强 ~20 dB；\n  · χ² 主导的 SHG → 780 nm 附近倍频光与超连续谱天然时域重叠；\n  · 泵浦展宽区与长波色散波的\
  \ DFG → 3500–5500 nm 中红外宽带光。\n输出光经 780 nm 带通滤波后单片光电探测即可得到 f_CEO 拍频。\n"
