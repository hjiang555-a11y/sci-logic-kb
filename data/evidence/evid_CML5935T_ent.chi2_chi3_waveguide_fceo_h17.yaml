name: AlN 片上 χ²+χ³ 双非线性超连续波导（Hickstein 2017 系统）
original_id: ent.chi2_chi3_waveguide_fceo_h17
properties:
  coupling: aspheric NA=0.6 耦入；微物镜 NA=0.85 / InF3 多模光纤 butt 耦出
  facet_taper_width: 150 nm（改善耦合）
  fceo_detection: 780 nm 带通 + 光电二极管（无干涉仪、无延迟线）
  fceo_feedback: FPGA 数字伺服 → Er 梳泵浦二极管电流
  material: AlN 薄膜（c 轴竖直；六角柱多晶）on SiO2（全 SiO2 包覆）
  material_n2: 2.3×10⁻¹⁹ m²/W（与 Si3N4 相当）
  pump_coupled_power: ~80 mW → 0.8 nJ/脉冲（波导内）
  pump_laser: turnkey Er 光纤频率梳，1560 nm，~80 fs，100 MHz 重频
  thickness: 800 nm
  width: 400–5100 nm（工艺扫描）
status: Determined
