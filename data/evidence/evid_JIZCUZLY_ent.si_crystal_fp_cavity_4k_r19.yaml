definition: '以硅单晶为间隔物（6 cm），工作于 4 K（CTE 渐近零，α → 0 as T → 0， 非严格零点但热膨胀极小），配合三层低温热屏（内两层
  ~4 K，外层 ~40 K，铜材料+ 主动温控）及优化振动隔离（垂向灵敏度 5±2×10⁻¹²/g @ 9.5 Hz，水平 2±1×10⁻¹⁰/g）， 首次达到
  4 K 腔的热噪声极限 mod σ_y = 6.5×10⁻¹⁷（0.8–80 s）。 揭示光功率驱动的腔长漂移机制，指明超低漂移方向（低功率+晶体镀层）。

  '
id: evid_JIZCUZLY_ent.si_crystal_fp_cavity_4k_r19
metadata:
  original_file: /data/sci-logic-kb/topics/ultrastable-laser/papers/robinson2019.yaml
  source_paper: robinson2019
  zotero_key: JIZCUZLY
name: 4 K 硅单晶 FP 参考腔（Robinson 2019，Si4）
original_id: ent.si_crystal_fp_cavity_4k_r19
properties:
  cavity_length: 6 cm（60 mm，水平轴）
  circulating_power_40nW: 40 nW 传输功率对应腔内循环功率 ~2 mW
  finesse: F = 500,000（5×10⁵）
  laser_wavelength: 1542 nm（1.5 μm，Er 光纤激光）
  min_drift: -3×10⁻¹⁹ /s（40 nW 传输功率时，功率相关漂移最低点）
  mirror_coating: IBS 介质膜（SiO₂/Ta₂O₅），提取损耗角 φ = 5.15×10⁻⁴
  operating_temperature: 4 K（脉冲管制冷机，非 Si CTE 零点；CTE 在 4 K 渐近零）
  power_drift_slope: 约 -7×10⁻²¹ /s/nW（漂移率对传输功率的斜率）
  spacer_material: 硅单晶（Si）
  temperature_coupling: 4 Hz/K（室温 → 腔频率耦合，优化后；原先 200 Hz/K）
  thermal_shield_material: 外屏铜（热导率约 100× 铝在 40 K），内两屏铜 ~4 K，外屏主动温控
  total_loss: A = 4 ppm（总损耗）
  transmission: T = 2 ppm（单镜），总透射 2 ppm
  vibration_sensitivity_horizontal: 2±1×10⁻¹⁰ /g（每方向）
  vibration_sensitivity_vertical: 5±2×10⁻¹² /g（9.5 Hz 驱动频率，各向异性硅晶体优化）
status: Determined
