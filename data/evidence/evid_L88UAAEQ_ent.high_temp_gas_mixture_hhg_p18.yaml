definition: '在飞秒增强腔焦点引入高温（T ≤ 800 K）Ar+He 混合气体，通过提升气体平动速度降低稳态等离子体积累， 实现 f_rep = 77
  MHz、相位匹配的 XUV 高次谐波频率梳产生。 背压加热使原子热运动速度 v_gas = √(RT/M_avg) 提升 √8 倍（300 K → 800 K），
  束流逗留参数 ξ_beam 从 >>1 降至 <1 → 稳态等离子体密度降低两个数量级 → 中性气体色散恢复主导 → 相位匹配可达成。

  '
id: evid_L88UAAEQ_ent.high_temp_gas_mixture_hhg_p18
