definition: '以硅单晶为间隔物和镜底物，工作于 124 K（Si CTE 零点）， 同时利用硅的高机械 Q（>10⁷）和大杨氏模量（E≈130 GPa，沿
  ⟨100⟩） 将热噪声极限降低至理论值 mod σ_y ≈ 5×10⁻¹⁷，实验达到 ~1×10⁻¹⁶，激光线宽 <40 mHz， 较室温 ULE 腔（~2×10⁻¹⁶，Numata
  2004 极限）热噪声降低约一个数量级。

  '
