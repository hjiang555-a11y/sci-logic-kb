definition: '两终端各一台 400 mm/1600 mm 望远镜，辅以信标激光+可调反射镜实现方向跟踪， 偏振保持光纤+铝合金恒温箱稳定光路；低 NEP
  平衡探测器检测本地梳与远端接收梳的拍频。 相对于传统单站+远端反射镜协议（光束二次穿过大气，镜面孔径有限带来额外几何损耗）， 本链路仅单程穿过大气，消除了 GEO
  级别 >100 dB 的几何附加衰减。

  '
