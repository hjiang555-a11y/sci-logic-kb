definition: '全 PM 光纤架构 + SESAM 锁模 + 数字反馈控制的紧凑型 Er:fiber 频率梳（体积 < 1 liter，笔记本大小）： frep
  ≈ 200 MHz, 倍频程展宽 → f-2f 自参考；数字 PLL 锁 frep + fceo 至 RF 参考，>90 小时无相位滑动； 脉间时间抖动 < 3
  fs（适用于时频传递 / LADAR / 双梳光谱等应用）； 三台近似相同的梳性能指标一致，证明可重复性；设计针对移动平台（地面车辆 / 飞机 / 空间站）振动环境。

  '
