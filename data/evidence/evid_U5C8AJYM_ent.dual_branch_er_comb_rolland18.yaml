definition: '从单 Er:fiber 锁模振荡器（~1550 nm）分为两个非共路光纤分支： (a) IR 分支：EDFA + HNLF → 超连续 1000-2200
  nm + 内嵌 PPLN 产生 fceo''（单分支）； (b) Vis 分支：EDFA + PPLN 倍频至 780 nm + HNLF → 超连续 500-1100
  nm； 两分支在 ~1 µm 光谱重叠区域进行双分支干涉 → 测得 fceo_dual = (φ_IR - φ_VIS)； PLL 锁 fceo_dual +
  frep → 两台超稳 CW 激光（1560 nm / 780 nm），通过被动混频补偿分支间差分噪声， out-of-loop 验证 1560 nm → 780
  nm 稳定度传递 3×10⁻¹⁸ @ 1 s。

  '
