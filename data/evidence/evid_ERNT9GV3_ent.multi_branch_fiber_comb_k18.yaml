definition: '以非线性偏振旋转自锁模的 Er 掺杂光纤振荡器为源（4.4 mW / 135 fs / 1560 nm / f_rep=43.4 MHz），
  振荡器内集成 WG-EOM（快伺服）与 TEC（慢伺服）用于 f_beat 锁定；输出被分束到四支光纤支路 （CEO-锁定支、拍频-锁定支、应用支 + 一支未用），各支独立经
  EDFA 放大与 HNLF 展宽至不同波段。 f_CEO 由 CEO-锁定支的 f-2f 干涉仪检测，经泵浦 LD 电流反馈锁到 30 MHz RF 参考；f_beat
  由 1064 nm 超稳 CW 参考与最近梳齿拍频锁到 30 MHz。拍频-锁定支与应用支各装 PZT 鼓型光纤拉伸器， 与 1542 nm CW 参考激光的拍频构成
  FNDC 伺服，用以抵消支与 CEO-锁定支之间的独立光纤相噪差。

  '
