definition: 'AlGaAs-on-insulator 异质集成高 Q 微环谐振器（Q ≈ 1–2×10⁶，半径 ~200 μm）， 依靠 AlGaAs
  巨大三阶非线性（n₂ ≈ 2.6×10⁻¹⁷ m²/W）在正常色散 + 避免模交叉（avoided mode-crossing） 条件下由 DFB 片上激光直接
  CW 泵浦，生成 180 GHz 齿距的暗脉冲（dark-pulse）Kerr 微梳。 相对明孤子，暗脉冲通过较小的相干态跃迁功率阶跃 + 热光自稳平衡，获得十倍宽的相干态接入窗口，
  实现 turnkey 启动与 7 h 以上无反馈自由运行稳定度。

  '
