definition: 'Menlo Systems 商用核心掺铒光纤光频梳（250 MHz 重频），内含自由空间腔内 EOM 用于高带宽 frep 控制，内置 f-2f
  自参考单元。三个独立执行器： (1) PZT（腔长，低速大范围）；(2) 泵浦二极管电流（影响 f0、A、frep）； (3) EOM（主要作用于 frep，通过电压控制群延迟）。EOM
  传递函数平坦至 ~900 kHz （受晶体声学谐振限制），PZT 带宽 ~2.4 kHz（受驱动放大器限制）， 泵浦-to-f0 带宽 ~50 kHz（受 Er
  增益弛豫限制）。

  '
