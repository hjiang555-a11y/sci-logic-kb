definition: '一种替代 CW 泵浦方案的微梳产生技术：将微谐振器嵌入光纤环路中 （包含增益介质如 EDFA、窄带滤波器、隔离器），构成主动振荡器。 环路中的滤波器选择谐振器的一个或少数模式进行放大，
  通过谐振器内的四波混频（FWM）自发产生宽带相干梳。 无需外部高功率 CW 泵浦激光器，系统类似于环形激光器但以 FWM 为增益机制。

  '
