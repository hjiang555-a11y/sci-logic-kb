definition: '三个子单元级联：(1) NPR（非线性偏振旋转）锁模掺铒飞秒光纤激光源，中心波长 1572 nm， 重复频率 196.5 MHz，3dB
  带宽 35 nm，脉宽 59 fs（sech²）；(2) 频率探测与控制单元： 光纤放大 + HNLF 展宽得倍频程光谱，f-2f 共线干涉 + PPLN1 将
  2 µm 分量倍频至 1 µm 干涉 探测 fceo；泵浦电流环路锁 fceo；EOM（DO16050-1-3，高频相位）+ PZT（AE05D16F，慢调腔长）
  双驱动锁 frep；(3) 光谱扩展与拍频单元：反射式 EDFA 放大至 280 mW，单模光纤整形至 250 fs， 55 cm HNLF（SUMITOMO
  OFS HNLF02，熔接效率 96%）将能量搬移至 1342 nm，PPLN2 倍频至 671 nm，带通滤光（670 nm，70%），与 DLCpro 671
  nm 单频激光在 PD2 上拍频。

  '
