definition: '用 VIPA 高分辨色散器（FSR ~50 GHz）+ 衍射光栅（覆盖 THz 范围）将稳定 Ti:sapph 梳（1 GHz 间距） 空间分辨为二维阵列：x
  方向（VIPA 色散）分辨单个梳齿（3 GHz 经 Fabry-Pérot 滤波后）， y 方向（光栅色散）覆盖宽带（>6 THz）；CCD 成像并行读出数千梳齿的振幅（分子吸收调制），
  采集时间数毫秒（vs. 扫描单齿需数分钟），实现高速分子指纹图谱二维成像。

  '
