definition: '基于体材料（MgF₂、CaF₂、fused silica、石英）加工的毫米至厘米级微谐振腔， 利用耳语回廊模（WGM）的全内反射实现极高
  Q 因子（>10⁹–10¹¹）。 通过锥形光纤或棱镜渐逝波耦合泵浦。优势：最高 Q 因子、最低阈值； 劣势：体材料难以批量集成、需要精密机械加工和抛光。

  '
