## 3. Bottleneck Analysis (Reasoning Path)

To determine the current technical boundary:
1. Trace the values from the **Evidence Layer** for each leaf node.
2. Propagate the values up the **Logic Layer** (Branch A, B, C).
3. The branch with the highest (worst) value is the **Current Bottleneck**.
4. Identify which atomic node within that branch is the primary driver.
