# Metric Chain: Frequency Stability at 1s (sigma_y @ 1s)

> **ID**: chain.sigma_y_1s
> **Topic**: ultrastable-laser
> **Status**: Blueprint / Initial Mapping
> **Description**: Decomposition of the primary performance limit of ultrastable lasers.

---

## 1. Topology Map (Decomposition Graph)

The top-level stability $\sigma_y(1\text{s})$ is an aggregate result. The fundamental limit is defined by the most restrictive of the following branches:

$$\sigma_y(1\text{s}) = f(\text{Thermal Noise}, \text{Environmental Noise}, \text{Measurement Noise})$$

### Branch A: Fundamental Thermal Noise (The Hard Limit)
$\sigma_y(1\text{s}) \xrightarrow{\text{BOUNDED-BY}}$ **pri.brownian_thermal_noise**
- **Decomposition**:
    - $\xrightarrow{\text{DETERMINED-BY}}$ **la.mirror_coating_noise** (Crystalline vs Amorphous)
    - $\xrightarrow{\text{DETERMINED-BY}}$ **la.substrate_thermal_noise** (Si vs ULE, Cryogenic vs Room Temp)
    - $\xrightarrow{\text{DETERMINED-BY}}$ **la.cavity_geometry** (Length $L$, Aperture $a$)

### Branch B: Environmental & Technical Noise (The Engineering Layer)
$\sigma_y(1\text{s}) \xrightarrow{\text{BOUNDED-BY}}$ **la.environmental_noise**
- **Decomposition**:
    - $\xrightarrow{\text{DETERMINED-BY}}$ **la.vibration_sensitivity** $\xrightarrow{\text{MITIGATED-BY}}$ (Active Isolation, Symmetry)
    - $\xrightarrow{\text{DETERMINED-BY}}$ **la.thermal_gradients** $\xrightarrow{\text{MITIGATED-BY}}$ (Thermal Shielding, Vacuum)
    - $\xrightarrow{\text{DETERMINED-BY}}$ **la.acceleration_noise**

### Branch C: Measurement & Electronic Noise (The Observation Layer)
$\sigma_y(1\text{s}) \xrightarrow{\text{BOUNDED-BY}}$ **la.measurement_noise**
- **Decomposition**:
    - $\xrightarrow{\text{DETERMINED-BY}}$ **la.pdh_locking_error** $\xrightarrow{\text{MITIGATED-BY}}$ (RAM Suppression, High-QE Photodiodes)
    - $\xrightarrow{\text{DETERMINED-BY}}$ **la.shot_noise_limit** $\xrightarrow{\text{DETERMINED-BY}}$ (Optical Power)
    - $\xrightarrow{\text{DETERMINED-BY}}$ **la.electronic_drift**

