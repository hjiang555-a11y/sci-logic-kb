entities:
  - id: ent.predehl2012_920km_fiber_link
    name: "Predehl 2012 920 km 反平行光纤频率传递链路（PTB↔MPQ）"
    tier: system
    domain: "光纤频率传递；光学时钟比对；电信光纤计量"
    description: >
      两条 920 km 反平行部署的电信光纤链路（F1 和 F2），连接 PTB（Braunschweig）
      和 MPQ（Garching），沿德国 A7/A9 高速公路部署。每条链路在 77 个
      EDFA 站点中继（间距 ~12 km），其中 7 个站点放置双向光纤放大器（BEFA）
      进行相干放大。在输入/输出端使用两台腔稳定窄线宽激光器（~1 Hz 线宽）
      作为频率载体。往返相位噪声经光电探测器检测后反馈至声光调制器（AOM）
      进行实时噪声补偿。MDEV: 5×10⁻¹⁵@1 s, ~τ⁻³/² 积分至 10⁻¹⁸ <1000 s;
      分数频率偏差 (0.7±3.7)×10⁻¹⁹。链路不引入明显噪声至 10⁻¹⁹ 水平。
    verification_status: demonstrated
    source:
      zotero_key: "2012 Science 336,441 920-Kilometer Optical Fiber Link"
      claim: "we present phase-stabilized distribution of an optical frequency over 920 kilometers of telecommunication fiber."

principles:
  - id: pri.long_haul_fiber_phase_noise_compensation_round_trip
    name: "长距离光纤往返相位噪声主动补偿原理（Predehl 2012 方案）"
    tier: domain
    verification_status: observed
    statement: >
      超稳光学载波在光纤链路中往返传输，在输入端比较往返信号相位差
      （等于双向光纤链路相位噪声之和），利用 AOM（声光调制器）施加
      相位共轭预补偿——使前向传输的信号在光纤输出端看起来如同经过了
      完美稳定链路。往返噪声检测和补偿带宽受限于光纤延迟 τ（对 920 km
      单程 ~4.6 ms，往返 ~9.2 ms），实际伺服带宽 ~100 Hz。
      补偿后残余噪声 PSD ∝ τ²(2πf)² × 自由链路噪声 PSD。
    domain: "光纤光学频率传递；相位噪声补偿；控制理论"
    key_insight: >
      往返噪声补偿在概念上等同于让光信号"先走一次体验噪声→回家报告→
      下次带着修正走"的过程。修正精度受限于往返延迟：对于 ~1000 km 链路，
      τ ~5 ms 量级，f < 100 Hz 的噪声被有效抑制，更高频噪声因因果性
      （去程噪声已经离开，回程报告到达时噪声已变）而无法补偿。
    conditions: "光纤链路双向互易性成立；前向/后向光路完全同纤（经同一 EDFA）；往返延迟 τ ~ L·n/c；伺服带宽 < 1/(6τ)"
    source:
      zotero_key: "2012 Science 336,441 920-Kilometer Optical Fiber Link"
      claim: "We used two antiparallel fiber links to determine their fractional frequency instability"

  - id: pri.bidirectional_edfa_amplified_long_haul_fiber
    name: "双向掺铒光纤放大器（BEFA）支持长距离光纤频率传递原理"
    tier: engineering
    verification_status: observed
    statement: >
      商用单向 EDFA 通过两侧加入光环行器（optical circulator）和窄带
      滤波器改造为 BEFA，使光信号在前向和后向两个方向均能以相同增益
      放大而保持前向-后向对称性（互易性）。BEFA 增益 ~20 dB@站点，
      77 个 EDFA 站点中 7 个部署 BEFA。BEFA 自身引入的附加相位噪声
      远小于光纤噪声，不成为补偿精度的限制因素。
    domain: "光纤放大；双向光放大；相位相干链路"
    key_insight: >
      长距离光纤频率传递的根本挑战是光损耗积累（~0.2 dB/km × 920 km
      ≈ 184 dB），远超单次激光功率和探测器灵敏度范围。BEFA 以级联方式
      在保持互易性前提下提供光增益——使千公里级相干链路成为实际可能。
    conditions: "BEFA 站点间距 ~100 km（对应 ~20 dB 损耗）；光环行器+窄带滤波器确保单纵模放大；增益 < 激光起振阈值"
    source:
      zotero_key: "2012 Science 336,441 920-Kilometer Optical Fiber Link"
      claim: "Bidirectional Erbium-doped Fiber Amplifiers (BEFA), built from standard unidirectional telecom EDFAs and optical circulators, provide bidirectional amplification."

methods:
  - id: meth.antiparallel_fiber_frequency_dissemination
    name: "反平行光纤链路光学频率分发与比较方法"
    purpose: >
      利用两条独立反平行光纤链路实现远程频率实验室之间的光学频率比对，
      替代传统卫星微波链路（GPS CV/TWSTFT），支持 10⁻¹⁸ 级光学时钟比对。
    description: >
      1. 两端各有一台超窄线宽激光器（~1 Hz 线宽，腔稳定）。
      2. 激光器 A → 光纤 1 → 远端 B（920 km），同时远端激光器 B → 光纤 2 → 近端 A。
      3. 每端测量本地激光与远端到达激光之间的拍频：ν_A − ν_B'（远程频率经链路传递）。
      4. 往返相位噪声补偿在每个光纤链路独立运行（AOM 反馈）。
      5. 对两条反平行链路计算差频，消除共模偏差，提取真实频率偏移。
      6. 使用无死区 Π 型或 Λ 型频率计数器记录 Allen 方差和 MDEV。
    key_steps:
      - "部署两条反平行光纤链路（如沿公路不同光缆或同一光缆不同光纤对）"
      - "各端腔稳定窄线宽激光器（~1 Hz 线宽）作为频率载体"
      - "每链路独立执行往返相位噪声补偿（干涉仪→AOM 反馈）"
      - "测量各端本地-远程拍频，差频解算相对频率偏移"
      - "无死区频率计数器记录（Π/Λ 型），计算 MDEV"
    applicable_conditions: "两条光纤链路沿近似相同物理路径（地理互易性）；两端频率参考均具备 10⁻¹⁶ 以上稳定性；BEFA 或等效双向放大可实现"
    source:
      zotero_key: "2012 Science 336,441 920-Kilometer Optical Fiber Link"
      claim: "The active noise compensation for the two fiber links F1 and F2 are entirely independent."

