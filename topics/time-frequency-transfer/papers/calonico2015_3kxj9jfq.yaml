  reliability: high
  title: "High-accuracy coherent optical frequency transfer over a doubled 642-km fiber link"
  year: 2014
  first_author: Calonico
  authors:
  - "D. Calonico"
  - "E. K. Bertacco"
  - "C. E. Calosso"
  - "C. Clivati"
  - "G. A. Costanzo"
  - "M. Frittelli"
