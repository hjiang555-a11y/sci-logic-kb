principles:
  - id: pri.motion_compensated_otwtft
    name: "运动补偿光学双向时间频率传递原理（O-TWTFT with motion）"
    tier: domain
    verification_status: observed
    statement: >
      传统 O-TWTFT 依赖双向飞行时间互易性（T_A→B = T_B→A）来抵消路径变化。
      但运动平台引入闭合速度 v 使路径长度随时间线性变化 L(t) = L₀ ± vt，
      导致非互易性 ΔT = (L_A→B − L_B→A)/c ~ 2v·Δt/c（Δt 为双向交换时间差），
      在 24 m/s 速度下 1 ms 交换间隔即产生 ~50 ps 的不可抵消偏差。
      改进方案通过同时求解双向的码相位和载波相位测量，分别估计
      (a) 钟差 Δτ、(b) 瞬时距离 R、(c) 距离变化率 v（Doppler），
      从而在运动诱导的非互易性下仍可提取真实时钟同步。
    domain: "自由空间时频传递；运动平台；频率梳计量"
    key_insight: >
      运动引入了额外的观测量（载波 Doppler），但这反而是可利用的信息——通过联立
      求解码相位和载波相位，运动参数（v）和钟差（Δτ）可以同时分离。
      "运动不是敌人，是额外约束条件。"
    conditions: "双向交换脉冲间隔 Δt 足够短（≤1 ms）以保证 v 在间隔内恒定；载波相位连续可追踪（无周跳）；LOS 相位斜率可分辨 ps→fs 量级"
    source:
      zotero_key: "s41467-019-09768-9"
      claim: "simple one-way or standard two-way time transfer between flying clocks will completely break down because of the time-of-flight variations and Doppler shifts"

methods:
  - id: meth.motion_resilient_otwtft
    name: "运动鲁棒型 O-TWTFT 时间频率同步方法"
    purpose: >
      实现运动平台（无人机、车辆、航天器）携带时钟与地面站之间的飞秒级
      时间同步和 10⁻¹⁸ 级频率比对——支持未来空间光学时钟网络的
      机载/星载段连接。
    description: >
      1. 两套 fs 频率梳锁至各自本地超稳 CW 振荡器（或共用腔稳定）。
      2. 双向脉冲交换（自由空间 LOS，retroreflector 或 tip-tilt 跟踪终端）。
      3. 从每个干涉图提取：(a) 码相位 → 粗飞行时间；(b) 载波相位斜率 → 精细到达时间；(c) 瞬时 Doppler 偏移。
      4. 联立双向测量：建立含 Δτ（钟差）、R（距离）、v（闭合速度）的非线性方程组。
      5. 解算提取 Δτ → 时间同步 → TDEV；Δν → 频率比对 → MDEV。
    key_steps:
      - "两端 fs 梳锁至超稳 CW（同腔或独立腔均可）"
      - "双向脉冲交换（自由空间+运动 retroreflector/swept delay line）"
      - "干涉图提取：码相位+光谱相位斜率+Doppler 偏移"
      - "联立双向求解 Δτ, R(t), v(t)"
      - "TDEV 和 MDEV 评估"
    applicable_conditions: "运动速度 ≤ ~100 m/s（低速轨道 LEO 范围）；双向交换间隔 ≤ 1 ms；载波相位连续（LOS 无频繁衰落）"
    source:
      zotero_key: "s41467-019-09768-9"
      claim: "we demonstrate an advanced, frequency comb-based optical two-way time-frequency transfer (O-TWTFT) that can successfully synchronize the optical timescales at two sites connected via a time-varying turbulent air path."

