principles:
  - id: pri.chirped_carrier_symmetric_delay_cancellation
    name: "啁啾载波对称延迟抵消原理"
    tier: engineering
    verification_status: demonstrated
    statement: >
      当发射端连续线性啁啾光载波 df/dt = κ 时，远端接收到的瞬时频率
      相对发射端有延迟 τ_path 导致的 offset Δf = κ·τ_path；
      通过在两端同时测量瞬时频率并关联远端计数器门，可把 τ_path 中的
      对称部分（如几何路径延迟）与不对称部分分离，从而从频率测量直接重建同步关系，
      避免传统 1PPS 时标的严格时刻对齐要求。
    domain: "光纤时间传递；同步观测"
    conditions: "啁啾速率已知；path 对称；counter gate 由稳定振荡器驱动"
    source_claim: "suppression of symmetrical delays, such as the geometrical path delay ... Synchronizing observations based on frequency measurements ... only requires a stable oscillator driving the frequency counters"

