principles:
  - id: pri.atmospheric_non_reciprocity_satellite_twtft
    name: "卫星双向 TWTFT 大气非互易性原理"
    tier: domain
    verification_status: demonstrated
    statement: >
      卫星-地面双向时频传递中，上行与下行光束穿越大气的瞬时时段不严格相同
      (Δt 秒级，卫星仰角/速度决定)，期间湍流/折射率随时间变化 → 两方向光程差
      不再严格对消，残余贡献为"大气非互易性误差"。Zeng 2024 实测此误差量级与
      与仰角、风速、湿度的依赖关系，支持 ground↔satellite TWTFT 误差预算建模。
    domain: "卫星-地面 TF 传递；大气建模"
    conditions: "非相对静止的卫星-地面几何；大气 coherence time 与 Δt 可比"
    source_claim: "measurement of atmospheric non-reciprocity effects for satellite-based two-way time-frequency transfer"

