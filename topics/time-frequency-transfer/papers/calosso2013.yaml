  aliases:
  - two-way phase comparison link
  - 双向无源噪声抵消链路
  hierarchy_level: 1
  status: demonstrated
  function: '通过在同一光纤两端同时发射超稳激光信号，并在远端同步测量相位， 利用双向波越时间的对称性实现链路噪声的无源后处理抵消。 不需要主动锁相补偿回路，避免了锁相环带宽受限于光纤往返时间的问题。

    '
  key_parameters:
    fiber_length: 47 km（城域光纤网络）
