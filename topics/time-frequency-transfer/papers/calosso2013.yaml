  title: Frequency transfer via a two-way optical phase comparison on a multiplexed fiber network
  year: 2013
  first_author: Calosso
  journal: Optics Letters
  note: '首次演示双向光学相位比较方案实现光纤频率传递的无源噪声抵消。 在 47 km 城域光纤网络上实现 10⁻²¹ 级稳定度的频率比对，无需主动锁相补偿。 数字电子系统实现两端同步相位测量，通过后处理消除链路噪声。 方案可升级为更复杂的多任务光纤链路（含时间传递）。

    '
  doi: 10.1364/ol.39.001177
