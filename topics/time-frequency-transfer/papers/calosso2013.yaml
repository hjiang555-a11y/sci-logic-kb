    noise_cancellation: 无源后处理抵消，达到 10⁻²¹ 频率比对稳定度
    phase_measurement: Tracking DDS（数字跟踪直接频率合成器）同步测量
  note: '区别于 ent.coherent_optical_fiber_link（主动锁相噪声补偿方案）。 本方案为无源方案，不要求主动补偿回路。

    '
