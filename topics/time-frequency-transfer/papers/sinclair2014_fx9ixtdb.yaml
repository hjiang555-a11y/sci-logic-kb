principles:
  - id: pri.atmospheric_optical_phase_noise_power_law
    name: "自由空间光路光学相位噪声幂律原理（∝f⁻²·³，无 outer-scale roll-off）"
    tier: domain
    verification_status: demonstrated
    statement: >
      横穿大气的光程长抖动由湍流 + 温度 + 压力 path-averaged 折射率变化主导，其 Fourier 域
      功率谱在 100 μHz–100 Hz 宽范围内近似 ∝ f⁻²·³，不出现传统 Kolmogorov-Taylor 理论预期的
      湍流外尺度 low-frequency roll-off。这是单向自由空间光学时频传递的大气基础极限，
      也是双向链路需要通过 reciprocity 抵消的噪声来源。
    domain: "自由空间光学时频传递；大气湍流"
    conditions: "地平/近地平水平路径；典型天气条件"
    source_claim: "power-law response of ∝f^(-2.3) measured down to Fourier frequencies f of 100 μHz ... no evidence of a roll-off at low frequencies"

