principles:
  - id: pri.otwtft_reciprocity_strong_turbulence
    name: "强湍流下 O-TWTFT 双向互易性保持原理"
    tier: domain
    verification_status: observed
    statement: >
      双向时间传递假设 T_A→B = T_B→A（飞行时间互易性）以抵消路径变化。
      在弱湍流（单次散射，Rytov 方差 < 1）下互易性已被验证。但当积分湍流
      进入强区（Rytov 方差 >> 1，多次散射导致闪烁饱和），理论上已离开
      perturbative 展开的适用范围——互易性是否仍维持是个开放问题。
      Sinclair 2016 首次实验验证：在 Rytov 方差高达 7.5 的强湍流条件下，
      O-TWTFT 的残余时钟同步性能与弱湍流短距离链路相当（TDEV ~165 as
      @数百秒）——证明大气互易性在强湍流区仍适用，为 100 km 级地空链路
      提供实验支撑。但理论注意到，信号中断（dropout）是另一问题——
      即使互易性完好，链路不可用也限制系统级性能。
    domain: "大气光学；O-TWTFT；时间频率计量"
    key_insight: >
      强湍流≠互易性破缺。闪烁饱和（Rytov >> 1）是多次散射导致光强统计
      偏离对数正态——但双向传播的相位互易性（Shapiro 1971）独立于闪烁
      统计。关键瓶颈不在物理而在工程：强湍流增加 dropout 频率和深度，
      需要更好的跟踪终端和更智能的 Kalman 滤波/重同步策略。
    conditions: "单模光纤耦合接收；双向时间分隔 < 湍流相干时间；信号可用性 > 0"
    source:
      zotero_key: "nihms923383"
      claim: "These results confirm that the two-way reciprocity of the free-space time-of-flight is maintained both under strong turbulence and with the use of adaptive optics."

methods:
  - id: meth.otwtft_strong_turbulence_synchronization
    name: "强湍流 O-TWTFT 时钟同步方法"
    purpose: >
      验证 O-TWTFT 在强湍流下的可行性和性能极限，为地-空、
      长距离地面自由空间光钟网络链路提供关键证据。
    description: >
      1. 两站点经 11.6 km 折返路径交换 fs 频率梳脉冲。
      2. LOS 检测到达时间（fs 精度），cw 相干调制提供粗测和数据通信。
      3. 远程站点收集双向时延数据并计算钟差 ΔT_calc。
      4. Kalman 滤波器（带宽 ~10-100 Hz）输出驱动远程钟伺服。
      5. Out-of-loop 光纤 heterodyne 比对提供独立性能评估。
      6. 分"连续"（含 dropout）和"gated"（仅活跃同步期间）两种分析模式。
    key_steps:
      - "fs 梳双向脉冲交换（自由空间+tip-tilt/AO 终端）"
      - "LOS 精测 + cw 粗测 + 数据通信"
      - "Kalman 滤波伺服同步（含 dropout 时的自由运行+重同步）"
      - "out-of-loop 光纤 heterodyne 独立评估"
      - "连续 vs gated 双模式 TDEV 分析"
    applicable_conditions: "强湍流（Rytov > 1）；高 dropout 率（>100/s）；远程钟自由运行稳定度决定长 drop 恢复质量"
    source:
      zotero_key: "nihms923383"
      claim: "optical two-way time transfer is used to synchronize a remote clock to a master clock with femtosecond-level agreement and with a relative time deviation dropping as low as a few hundred attoseconds."

