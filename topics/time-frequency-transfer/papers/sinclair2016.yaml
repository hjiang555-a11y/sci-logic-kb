      conditions: "12 km 折返 Boulder→Valmont 路径；Cn² 从 10⁻¹⁶（弱）到 10⁻¹³（强，Rytov 7.5）；信号 dropout >100/s（强湍流）；tip-tilt 4 cm 口径"
      verification_status: observed
      confidence: established
      source:
