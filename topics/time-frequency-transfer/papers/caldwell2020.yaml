    [evidence 论文] 在近地面水平路径上使用 fs 频率梳测量湍流诱导的光脉冲时序抖动，
    同时独立记录微气象传感器（sonic anemometer、温度、湿度、气压）数据。
    将实测抖动 PSD 与基于 Monin-Obukhov 相似性理论的预测模型直接对比，
