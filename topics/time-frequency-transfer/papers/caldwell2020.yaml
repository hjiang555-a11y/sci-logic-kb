      理论预测对比——验证微气象模型作为光学链路噪声预算工具的准确性。
    verification_status: demonstrated
    source:
      zotero_key: "oe-28-18-26661"
      claim: "We measure turbulence-induced optical pulse timing jitter over a horizontal, near-ground path using frequency comb lasers while independently characterizing the atmospheric turbulence using conventional micrometeorological instruments."

principles:
  - id: pri.monin_obukhov_timing_jitter_prediction
    name: "Monin-Obukhov 相似性理论预测大气湍流光学时序抖动原理"
    tier: domain
    verification_status: observed
    statement: >
      大气湍流导致的光学时序抖动 PSD 可通过 Monin-Obukhov 相似性理论
      由标准微气象测量（sonic anemometer 的 3D 风速+虚温、温湿度、气压）
      预测。核心参数为温度结构常数 C_T² 和路径平均折射率指数，经由
      Kolmogorov 湍流谱和 Taylor 冻结假设映射到时序抖动 PSD。
      Caldwell 2020 首次以独立频率梳实测直接验证了此预测链——证明
      微气象传感器可作为光频传递链路大气噪声预算的有效工具。
    domain: "大气光学；微气象学；时频传递噪声建模"
    key_insight: >
      不依赖昂贵/复杂的主动大气相位测量系统（如双梳 LOS），微气象传感器
      （~数万美元商用现货）即可预算光链路中的时序噪声上限——这对实际链路
      选址和性能评估具有工程价值。
    conditions: "近地面水平路径；Kolmogorov 湍流惯性子区假设成立；Taylor 冻结假设成立（风速 ≫ 湍流速度涨落）"
    source:
      zotero_key: "oe-28-18-26661"
      claim: "a direct and independent comparison of these models to measured timing jitter data"

methods:
  - id: meth.comb_timing_jitter_vs_micromet_comparison
    name: "频率梳时序抖动测量与微气象传感器对比方法"
    purpose: >
      验证微气象测量是否可替代直接光学测量用于预测/预算自由空间光学
      时频传递中的大气相位噪声。
    description: >
      1. fs 频率梳通过 LOS 测量脉冲到达时间的波动（PSD 覆盖 100 μHz 到 kHz）。
      2. 同步部署 sonic anemometer（3D u,v,w + 声速虚温 T_s）、慢响应
         温湿度+气压传感器。
      3. 从微气象数据推导 C_T²、ε、u* 等 M-O 参数。
      4. 将微气象预测的时序抖动 PSD 与 LOS 实测对比。
    key_steps:
      - "fs 梳 LOS 测时序抖动 PSD（~100 μHz-kHz）"
      - "sonic anemometer + 温湿压传感器同步记录"
      - "M-O 参数推导（C_T², ε, u*）"
      - "微气象预测 PSD vs LOS 实测 PSD 对比"
    applicable_conditions: "近地面水平路径（~few 100 m）；大气近中性或弱不稳定分层"
    source:
      zotero_key: "oe-28-18-26661"
      claim: "we perform this comparison, measuring turbulence-induced optical pulse timing jitter over a horizontal, near-ground path using frequency comb lasers while independently characterizing the atmospheric turbulence."

