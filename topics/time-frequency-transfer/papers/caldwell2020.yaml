  title: "Optical timing jitter due to atmospheric turbulence: comparison of frequency comb measurements to predictions from micrometeorological sensors"
  year: 2020
  first_author: Caldwell
  authors: ["Emily D. Caldwell", "William C. Swann", "Jennifer L. Ellis", "Martha I. Bodine", "Carter Mak", "Nathan Kuczun", "Nathan R. Newbury", "Laura C. Sinclair", "Andreas Muschinski", "Gregory B. Rieker"]
