entities:
  - id: ent.caldwell2020_timing_jitter_measurement
    name: "Caldwell 2020 大气湍流光学时序抖动测量装置"
    tier: system
    domain: "大气光学；自由空间时频传递；微气象学"
    description: >
      NIST Boulder 近地面水平路径（~几百米量级），fs 频率梳脉冲线性光学采样（LOS）
