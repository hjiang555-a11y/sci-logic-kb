        claim: "we measured the frequency of a stabilized CO₂ laser at Laboratoire de Physique des Lasers (LPL) against the primary frequency standard of the Systèmes de Référence Temps Espace (SYRTE), with a resolution of 3 × 10^−14 at 1 s integration time."

