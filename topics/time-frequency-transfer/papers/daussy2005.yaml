  note: >
    [breakthrough 论文] 首次实验演示长距离光纤光学频率分发。在 SYRTE 和 LPL
    （Paris Nord）之间 43 km 标准电信光纤链路上，以激光往返相位噪声检测
    + AOM 反馈主动补偿方案，实现 86 km 往返链路的分数频率分辨率：
    8×10⁻¹⁵@1 s, 10⁻¹⁷@1 天。作为应用，将 LPL 的 CO₂/OsO₄ 频率标准
    的信号与 SYRTE 的微波基准参考比对，分辨率 3×10⁻¹⁴@1 s。
    该实验确立了"光纤往返噪声补偿"作为远程光学时钟比对的基本技术范式，
    是此后所有长距离光纤频率传递（Predehl 2012, Droste 2013 等）的
    直接先驱。

entities:
  - id: ent.daussy2005_86km_fiber_link
    name: "Daussy 2005 SYRTE–LPL 43 km 电信光纤往返频率传递链路"
    tier: system
    domain: "光纤光学频率分发；时钟比对；计量学"
    description: >
      往返 86 km 标准电信光纤（43 km 单程，SYRTE↔LPL 巴黎城区）。
      链路使用 1.55 μm 光纤耦合激光器（CO₂/OsO₄ 标准的光频信号），
      通过两次穿过 AOM 的往返相位检测方案（单 AOM 双穿以抑制其自身
      频率噪声）实现相位噪声探测和补偿。使用 ~100 MHz 飞轮振荡器
      （10⁻¹⁴@10⁵ s 稳定度）作为微波参考桥。往返光路由同一根光纤的
      前向和后向组成——保证传播路径互易性。86 km 往返光纤损耗 ~27 dB
      （@1.55 μm），无需在线光放大。
    verification_status: demonstrated
    source:
      zotero_key: "PhysRevLett.94.203904"
      claim: "In this Letter we demonstrate, for the first time, that two standards can be compared over a distance of 43 km, using a standard telecommunication optical link, with a resolution of 8 × 10^−15 at 1 s, and 10^−17 at one day integration time."

principles:
  - id: pri.fiber_round_trip_phase_noise_compensation
    name: "光纤往返相位噪声主动补偿原理（首个 86 km 演示）"
    tier: foundational
    verification_status: observed
    statement: >
      光载波在光纤中往返传播：激光器 → 光纤 A → 光纤 B 端（Faraday 反射器
      或者部分透射器件反射）→ 返回光纤 A → 输入/输出端干涉仪检测往返相位差
      Δφ_rt(t) = 2 × φ_fiber(t+τ) − 2 × φ_fiber(t)（近似）。
      利用声光调制器（AOM）在输入端施加预畸变 −Δφ_rt(t)/2，
      使输出端的光信号表现如同光纤噪声已被消除。
      该方案的精度受限于往返延迟 τ：在 Fourier 频率 f ≪ 1/(6τ) 范围内
      噪声被有效补偿；对于 86 km 光纤，τ ~ 0.4 ms，有效补偿带宽 ~400 Hz。
    domain: "光纤光学频率分发；互易性计量；相位噪声补偿"
    key_insight: >
      此方案的关键概念突破是认识到往返噪声补偿可将电信光纤的被动相位噪声
      （自由链路 86 km ~10⁻¹⁴ 量级）抑制 7 个数量级以上至所需的
      10⁻²⁰ 量级——使原本"不适合计量"的商用光纤成为比 GPS 更优的
      时钟比对介质。
    conditions: "前向/后向光信号经同一光纤传播（互易性）；往返延迟 τ < 补偿伺服带宽的 1/6；AOM 双穿设计抑制自身频率噪声；光纤中无非互易性效应（PMD、Sagnac ≤ 容许量）"
    source:
      zotero_key: "PhysRevLett.94.203904"
      claim: "The principle of the link is to compare the optical round trip phase of a fiber link with the input phase, and then use this error signal to correct the phase noise of the fiber."

methods:
  - id: meth.fiber_round_trip_phase_stabilized_dissemination
    name: "光纤往返相位稳定化频率分发方法（Daussy 2005 方案）"
    purpose: >
      利用标准电信光纤实现远程实验室之间的高分辨率光学频率比对，
      以替代卫星 GPS/TWSTFT 等传统微波比对技术。
    description: >
      1. 本地端：光频标准（如 CO₂/OsO₄ 激光器，~30 THz）经 fs 光频梳
         降至 ~1.55 μm 波段，耦合至 43 km 电信光纤。
      2. 远程端：部分光经 Faraday 反射镜返回；剩余光与远程本地振荡器比对。
      3. 本地端：往返信号与输入信号经干涉仪产生相位误差信号 →
         PID 控制 → AOM（双穿，VCO 驱动）→ 相位共轭预补偿。
      4. 使用高稳定飞轮振荡器（~100 MHz，~10⁻¹⁴@10⁵ s）提供频率测量参考。
      5. 记录 Allan 方差：OADEV 8×10⁻¹⁵@1 s → 10⁻¹⁷@1 天。
    key_steps:
      - "光频标准 → fs 梳 → 1.55 μm → 耦合至电信光纤"
      - "远程端 Faraday 反射器部分返回光 + 部分本地比对"
      - "往返光干涉生成相位误差信号"
      - "VCO 驱动 AOM 双穿（抑制 AOM 自身频噪）→ 相位预补偿"
      - "飞轮振荡器提供频率测量的稳定参考"
      - "Allan 方差评估：OADEV 和 MDEV"
    applicable_conditions: "单模电信光纤（~27 dB 损耗 @86 km）；往返延迟 τ ≤ 0.5 ms；1.55 μm 激光载波；Faraday 反射端保证互易反射"
    source:
      zotero_key: "PhysRevLett.94.203904"
      claim: "The principle of the link is to compare the optical round trip phase of a fiber link with the input phase, and then use this error signal to correct the phase noise of the fiber."

