  title: "Long-Distance Frequency Dissemination with a Resolution of 10⁻¹⁷"
  year: 2005
  first_author: Daussy
  authors: ["C. Daussy", "O. Lopez", "A. Amy-Klein", "A. Goncharov", "M. Guinet", "C. Chardonnet", "F. Narbonneau", "M. Lours", "D. Chambon", "S. Bize", "A. Clairon", "G. Santarelli", "M. E. Tobar", "A. N. Luiten"]
  journal: "Physical Review Letters"
