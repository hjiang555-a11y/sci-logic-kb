principles:
  - id: pri.otwtft_complex_maximum_likelihood_estimation
    name: "O-TWTFT 复杂最大似然时延估计原理"
    tier: method
    verification_status: observed
    statement: >
      传统 O-TWTFT 的 LOS 时延提取流程为：干涉图 → FFT → 计算相位差
      → 一维相位解缠 → 最小二乘拟合相位斜率 → 时延。这丢弃了幅度信息，
      且在低 SNR 下相位解缠极易引入周跳误差。CLS 方法直接在复数域建模：
      将参考干涉图频谱 A_k 与当前干涉图频谱 C_k 的关系表示为
      B_k = A_k·β·e^{i(kα+γ)}，通过最小化 ||B_k - C_k||² 同时估计
      α（时延，Δτ = -α·Δf_r/(2π·δf·(f_r+Δf_r))）、β（幅度变化）、
      γ（常数相位偏置）。该过程等价于复 AWGN 下的最大似然估计，
      天然利用幅度作为权重——幅度大的频率分量贡献更多信息——
      且完全规避相位解缠。
    domain: "信号处理；O-TWTFT；估计理论"
    key_insight: >
      幅度信息不仅是"噪声权重"——保留复数数据等价于在频域进行
      匹配滤波，幅度大的 bins 天然获得更高权重。相位解缠的避免
      消除了低 SNR 下最主要的系统性误差源。
    conditions: "FFT 有效谱段内 SNR 足够使复数模型 B_k ≈ A_k·β·e^{i(kα+γ)} 成立；参考干涉图相位连续"
    source:
      zotero_key: "fang2026_cpb_ae1120"
      claim: "Minimizing this loss function... is equivalent to a maximum likelihood estimation (MLE) of the parameters (α, β, γ), under the assumption that the noise... is complex additive white Gaussian noise."

methods:
  - id: meth.otwtft_cls_timing_extraction
    name: "O-TWTFT CLS 时延提取方法"
    purpose: >
      在不改变 O-TWTFT 硬件的前提下，通过纯软件后处理将检测灵敏度
      提升一个量级（~1 nW → 0.1 nW），使系统级总损耗容忍度达到 ~100 dB
      （等效地月链路），拓展 O-TWTFT 至深空应用。
    description: >
      1. 干涉图 FFT 获得复数频谱（参考 + 当前）。
      2. 在有效频段内（信号带宽内）构建复数模型 B_k = A_k·β·e^{i(kα+γ)}。
      3. 非线性最小二乘/最大似然优化估计 (α, β, γ)。
      4. 从 α 计算单向时延变化 Δτ（无需相位解缠）。
      5. 双向交换 → 差分消除共同路径波动 → 钟差。
    key_steps:
      - "干涉图 FFT → 复数频谱 A_k（参考）和 C_k（当前）"
      - "定义 loss = Σ|A_k·β·e^{i(kα+γ)} - C_k|²"
      - "非线性优化求解 (α, β, γ) → α → Δτ"
      - "双向 Δτ 差分 → 钟差 → TDEV"
    applicable_conditions: "需参考干涉图（高 SNR 标定）；有效频谱段内 SNR > 阈值；计算资源支持多参数非线性拟合"
    source:
      zotero_key: "fang2026_cpb_ae1120"
      claim: "we propose the complex least squares (CLS) method, which directly employs the full complex FFT data (amplitude and phase), avoiding phase unwrapping entirely."

