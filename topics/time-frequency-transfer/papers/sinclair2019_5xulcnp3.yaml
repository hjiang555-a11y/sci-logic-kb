principles:
  - id: pri.o_twtft_motion_reciprocity_breakdown
    name: "运动平台 O-TWTFT 互易性破坏与修正原理"
    tier: domain
    verification_status: demonstrated
    statement: >
      双向光学时频传递依赖前/后向光程互易；平台运动引入：(1) 相对论效应；
      (2) 异步采样时间戳偏移；(3) 光电色散残余；(4) 速度依赖收发机标定。
      给出完整方程与实时算法可把上述效应降到 fs 级以下。
    domain: "运动平台自由空间 TF 传递"
    conditions: "相对速度 v ≪ c（非相对论）；异步采样失配 ≤ comb 1/f_rep；速度校准可观测"
    source_claim: "breakdown in reciprocity due to relativity and due to asynchronous sampling ... active synchronization ... to below-1-fs time deviation"

