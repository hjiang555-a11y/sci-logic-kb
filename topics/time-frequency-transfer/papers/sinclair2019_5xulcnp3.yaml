meta:
  zotero_key: "5xulcnp3"
  topic: time-frequency-transfer
  source_type: journal_paper
  contribution_type: evidence
  reliability: high
  title: "Femtosecond optical two-way time-frequency transfer in the presence of motion"
  year: 2019
  first_author: Sinclair
  authors: ["L. C. Sinclair", "H. Bergeron", "W. C. Swann", "I. Khader", "K. C. Cossel",
    "M. Cermak", "N. R. Newbury", "J.-D. Deschênes"]
  journal: "Physical Review A"
  volume: 99
  issue: 2
  pages: "023844"
  doi: "10.1103/PhysRevA.99.023844"
  note: >
    [期刊论文] NIST Boulder + Université Laval. 给出 comb-based O-TWTFT 在运动平台上的完整
    理论与实时算法：(1) 相对论引起的发射/接收时刻不在同一参考系；(2) 异步采样时间戳偏移；
    (3) 光电色散；(4) 速度依赖收发机校准。实验在 ±25 m/s 下同步两站至 <1 fs 时间偏差，
    速度相关 bias < 330 as (2σ)。为 ground-air / ground-satellite 自由空间链路奠定运动平台基础。
    本文件建立 time-frequency-transfer 专题 Level 1 节点 ent.free_space_optical_tf_link。

entities:
  - id: ent.free_space_optical_tf_link
    name: "自由空间光学时频传递链路（Level 1 总节点）"
    aliases: ["free-space optical TF link", "O-TWTFT link", "自由空间 O-TWTFT 链路"]
    hierarchy_level: 1
    status: demonstrated
    function: >
      comb-based 飞秒光脉冲双向穿越大气/真空自由空间；两端独立测量到达脉冲 time-of-arrival
      与其相对本地梳脉冲时刻的偏移，通过双向互换实现 fs–as 级时间同步与 10⁻¹⁸ 级频率传递。
      典型结构：收发光终端 + 主动 tip-tilt（抑制光束摆动）+ 自由空间几何；支持地面间、
      ground-air（无人机/飞机）、ground-satellite 部署。
    key_parameters:
      base_technique: "frequency-comb-based two-way time-frequency transfer (O-TWTFT)"
      range_demonstrated: "100 m – 300 km 地面间（至 2024）"
      future_extension: "ground-to-geosynchronous orbit（Caldwell 2023）"
