principles:
  - id: pri.brillouin_amplified_long_haul_fiber_transfer
    name: "Brillouin 放大长距离光纤频率传递原理"
    tier: engineering
    verification_status: demonstrated
    statement: >
      窄带光纤 Brillouin 放大器（FBA，泵浦激光 + 受激 Brillouin 散射增益）相对 EDFA 的
      优势：(a) 窄带自选频，天然滤除 ASE 和反向反射；(b) 结构简单、可场部署；
      (c) 不需要移除隔离器就能保持两向对称，适合级联数十段。
      代价：单级增益~15 dB 为主，需级联；对温度和泵浦稳定敏感。
      在地下光纤环境（温度稳定）下，Brillouin 级联可支撑 ≥1000 km 的 10⁻²⁰ 级链路不稳定度。
    domain: "长距离光纤频率传递；放大器选择"
    conditions: "地下/海底稳定温度；泵浦激光稳定；级联间损耗 ≤ FBA 增益"
    source_claim: "largely autonomous fiber Brillouin amplifiers are the only means of intermediate amplification used here"
    related_to: pri.brillouin_amplification_long_distance_k19
    note: "与 pri.brillouin_amplification_long_distance_k19（Koke 2019）同一原理族"

