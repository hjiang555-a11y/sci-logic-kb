  note: >
    [快讯] PTB。1400 km 地下光纤环（Braunschweig↔Strasbourg往返），链路仅用 **光纤 Brillouin
    放大器（FBA）**（窄带、内禀双向对称、无 EDFA 反向反射问题），实现连续数天相位连续测量。
    3 周加权均值 fractional offset (1.1 ± 0.4)×10⁻²⁰；最佳实例 instability 6.9×10⁻²¹、
    fractional offset 4.4×10⁻²¹ @ 30000 s。为世界最佳光钟（10⁻¹⁸）比对提供可忽略链路贡献的上限。

