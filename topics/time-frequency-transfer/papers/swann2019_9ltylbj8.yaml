principles:
  - id: pri.turbulence_anisoplanatism_tf_degradation
    name: "湍流 anisoplanatism 对双向 TF 传递互易性的破坏原理"
    tier: domain
    verification_status: demonstrated
    statement: >
      当双向光学时频传递的两方向光束因平台横向运动或链路几何而穿越空间不同
      湍流 cell 时（anisoplanatism），前向/后向光程不再互易，残余抖动增加。
      实验测量 2 km 水平链路 anisoplanatism 导致的 timing 抖动与理论一致；
      线性外推到 ground↔MEO 光学卫星链路只需容忍几 fs 级额外 timing noise，
      对自由空间光钟网络可行性提供正面支持。
    domain: "自由空间 TF 传递；大气湍流"
    conditions: "两方向光束横向分离 ≥ 湍流相关尺度"
    source_claim: "transverse platform motion coupled with spatial variations in atmospheric optical turbulence will lead to a breakdown in the time-of-flight reciprocity"

