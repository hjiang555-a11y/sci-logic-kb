      confidence: established
      source:
        zotero_key: "Nature Photonics 2013 7（6） 435-439"
        claim: "our optical TWTFT achieves residual timing deviations of 1 fs, and residual uncertainties and bias below 1 × 10^−18."

  - id: met.giorgetta2013_otwtft_fractional_offset
    name: "Giorgetta 2013 O-TWTFT 分数频率偏差"
    unit: "无量纲（分数频率）"
    role: secondary
    description: >
      11 个数据集的加权平均分数频率偏移。在共钟模式下期望值为零，
      测量值一致于零——证明了 O-TWTFT 在 2 km 自由空间路径上无显著系统偏差。
    demonstrated_value:
      value: "(1.8 ± 2.1)×10⁻¹⁹（weighted mean, k=1）"
      conditions: "共钟模式（两端锁至同一超稳腔）；11 数据集 24 h 总时长；加权平均"
      verification_status: observed
      confidence: established
      source:
        zotero_key: "Nature Photonics 2013 7（6） 435-439"
        claim: "The fractional offset, or bias, across 11 data sets has a weighted average of 1.8 × 10^−19 + 2.1 × 10^−19, consistent with zero."

