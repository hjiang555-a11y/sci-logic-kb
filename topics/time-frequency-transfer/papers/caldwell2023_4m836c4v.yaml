    name: "量子极限光子计数光学时间传递原理"
    tier: domain
    verification_status: demonstrated
    statement: >
      O-TWTFT 时戳精度 σ_t ≈ τ_pulse / (SNR · sqrt(N_det))，N_det 为脉冲时戳探测中参与的
      光子数；当探测器/处理接近 shot-noise 极限时 σ_t 由 "接收光子数" 标度。
      Caldwell 2023 通过优化的脉冲采样与去卷积算法使 σ_t 接近量子极限，
      允许 102 dB 链路损耗仍维持 as 级同步——直接赋能 ground↔geostationary orbit 链路。
    domain: "光学时间传递基础极限；自由空间链路预算"
    conditions: "shot-noise-limited detection；脉冲形状与去卷积算法优化"
    source_claim: "optical time transfer has not operated at the analogous quantum limit set by the number of received photons ... nearly quantum-limited operation"

