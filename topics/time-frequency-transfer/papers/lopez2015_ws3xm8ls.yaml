entities:
  - id: ent.shared_telecom_fiber_metrology_channel
    name: "电信网络共享暗信道（计量级光纤时频传递载体）"
    hierarchy_level: 2
    status: demonstrated
    function: >
      在运营中的电信 DWDM 光纤网络中，选择一个未使用/低占用的 ITU 信道
      承载计量级超稳光信号；与数据通道共用光放大器与色散补偿模块。
    key_parameters:
      channel_grid: "ITU 100/50 GHz grid"
      coexistence: "with live internet data traffic"
      advantage: "no dedicated dark fiber needed; national scalability"
    note: "Level 2 实例，PART-OF ent.coherent_optical_fiber_link"

principles:
  - id: pri.telecom_network_metrology_coexistence
    name: "电信暗信道共存计量信号传递原理"
    tier: domain
    verification_status: demonstrated
    statement: >
      在运营电信 DWDM 网络中，选择一个低占用 ITU 信道传递计量级超稳光载波，
      可与数据业务共享光放大、色散补偿与传输光纤，而不显著劣化二者性能。
      经验证的兼容性边界：计量信号功率 ≤ 数据信号、避免波长相邻以防四波混频窜扰、
      接入点需双向对称放大。
    domain: "国家级时频计量网络工程"
    conditions: "DWDM grid available; bidirectional amplification可改造"
    source_claim: "public telecommunication network carrying Internet data can be used to compare and distribute ultra-stable metrological signals over long distances"

