  note: >
    [期刊论文] Observatoire de la Côte d'Azur + SYRTE + PTB. 直接比较两种卫星时间传递方法：
    GPS common-view (CV) 与 T2L2（Time Transfer by Laser Link，Jason-2 卫星上）。
    两者在 sub-ns（亚纳秒）一致，验证了 T2L2 光学激光链路作为独立校准方案的可靠性，
    并为 GPS CV 时间传递不确定度预算提供外部校验。

