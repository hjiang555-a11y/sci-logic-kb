#  METHODS（方法）
# ═══════════════════════════════════════════════

methods:
  - id: meth.mwl_two_way_tf_transfer
    name: "双向双频微波时频传递法（MWL 实现）"
    status: demonstrated
    applies_to: ent.microwave_link_mwl
    steps_summary: >
      1) 空间段与地面段各自产生本地时频信号（锁至各自钟）→
      2) 同时双向发射 Ku 波段调制微波信号 →
      3) 两端分别记录到达时间戳 →
      4) 双向相减消除共模大气延迟与几何路径延迟 →
      5) 得到空间–地面钟时间差与频率比。
    required_hardware:
      - ent.microwave_link_mwl
    advantages:
      - "全天候可用（不受云层影响）"
      - "相对成熟（继承 ACES 任务技术栈）"
    disadvantages:
      - "分数不准确度受限于 $5\\cdot10^{-19}$ 量级（#SR-PL-10），弱于 ELT+ 的 $1\\cdot10^{-18}$"
    conditions: "ISS 仰角 ≥ 最低跟踪仰角；地面 MWL 终端具备多用户能力（#SR-PL-23 含 ELT+；MWL 类似规定）"
    source_claim: >
      "The links are similar to those already developed for the ACES mission: the microwave link MWL"

  - id: meth.elt_plus_pulsed_optical_tf_transfer
    name: "脉冲激光光学时频传递法（ELT+ 实现）"
    status: proposed
    applies_to: ent.pulsed_optical_link_elt_plus
    steps_summary: >
      1) 地面 SLR 站发射高重频激光脉冲序列 →
      2) 空间段反射器反射 + 独立探测记录脉冲到达本地时戳 →
      3) 地面接收反射脉冲记录到达时戳 →
      4) 双向时间戳差 + 几何/大气/系统延迟定标 → 得到空间–地面同步偏差 →
      5) 定标与相对位置测量：MWL 天线相位中心与 ELT+ 参考点相对位置需知 1 mm 精度（#SR-PL-46）。
    required_hardware:
      - ent.pulsed_optical_link_elt_plus
    advantages:
      - "时偏差 $\\leq 0.5\\,\\text{ps}$ @ 100 s，可达 $1\\cdot10^{-18}$ 分数不准确度"
