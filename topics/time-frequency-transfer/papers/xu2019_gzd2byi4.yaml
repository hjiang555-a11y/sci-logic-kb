  note: >
    [期刊论文] SYRTE + LPL. 用专用链路架构可同时独立检测光纤中正向与反向传播相位噪声， 证实光学相位演化主导来自 Michelson 干涉仪参考臂的温度；33 天观测 frequency offset (4.4 ± 2.3)×10⁻²¹，用 Bayesian 温度模型后处理降至 (0.5 ± 2.0)×10⁻²¹。 这是对光纤前向/后向传播互易性（reciprocity）的最严格验证之一， 支撑 10⁻²⁰ 级光钟比对与相对论精密检验。
principles:
  - id: pri.fiber_propagation_reciprocity
    name: "光纤传播互易性原理（前向=后向传播延迟）"
    tier: foundational
    verification_status: demonstrated
    statement: >
      在单模光纤中，忽略非线性与非对称偏振效应时，同一电磁模在前向与后向的群速度
      与相位演化应严格相等；这是"往返补偿"相位噪声抵消方案的前提。任何残余不对称
      （如偏振模色散残余、非互易散射、温度梯度沿链路不均匀）会限制抵消深度。
      Xu 2019 实验证实互易性在 yoctosecond/s 量级成立，残余主要来自终端 Michelson
      干涉仪参考臂温度漂移，可后处理补偿。
    domain: "光纤时频传递基础物理"
    conditions: "SMF-28，室温；偏振模色散可忽略；端点 Michelson 干涉仪温度受控或建模"
    source_claim: "interpreted as a test of the reciprocity of the propagation delay in an optical fiber"

