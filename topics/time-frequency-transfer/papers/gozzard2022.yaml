principles:
  - id: pri.amplitude_stabilized_free_space_frequency_transfer
    name: "相位-振幅双稳定自由空间光学频率传递原理"
    tier: domain
    verification_status: observed
    statement: >
      自由空间激光频率传递的两大挑战分别由独立子系统解决：
      (1) 相位稳定（与光纤链路原理相同）：光载波往返大气路径，在输入端检测
      往返相位差并将其用于 AOM 预补偿——使输出表现为经稳定化链路传播。
      残余相位噪声 ∝ τ²·(2πf)² × 自由链路噪声PSD（受限于往返延迟 τ）。
      (2) 振幅稳定（自由空间独有）：大气湍流引起光束摆动和闪烁导致到达
      功率剧烈波动乃至链路中断。主动 tip-tilt 终端反馈将接收光束位置
      稳定在单模光纤耦合中心（~1 μrad RMS），使功率波动降至几 dB 量级
      而非原始湍流中的数十 dB 衰落。双稳定化同时工作且互不干扰。
    domain: "自由空间光学频率传递；大气自适应光学；计量学激光链路"
    key_insight: >
      之前自由空间频率传递方案仅补偿相位噪声——但湍流闪烁导致的振幅衰落
      （每秒数十次深度衰落）将有效积分时间截断至 ~10 ms，无法实现长时
      稳定度。tip-tilt 振幅稳定使链路可连续运行数百秒——这是实现 10⁻²¹ 级
      不稳定度的关键使能因素。
    conditions: "1550 nm 单波长载波；往返延迟 τ < 1 ms（链路 ≤ 300 km）；tip-tilt 闭环带宽 ≥ 100 Hz；大气湍流强度 C_n² ≤ 10⁻¹⁴"
    source:
      zotero_key: "PhysRevLett.128.020801"
      claim: "In this work, we demonstrate phase- and amplitude-stabilized free-space frequency transfer."

methods:
  - id: meth.phase_amplitude_tiptilt_free_space_frequency_transfer
    name: "相位-振幅双稳定自由空间光学频率传递方法"
    purpose: >
      在湍流大气中（等效于地面-卫星链路）实现连续相位相干光学频率传递，
      支持全球光学原子钟网络的地面-卫星和地面-地面自由空间比对。
    description: >
      1. 1550 nm 窄线宽激光经光纤送至发射/接收光学终端。
      2. 振幅稳定：CCD/四象限探测器监测接收光束位置，
         高速 tip-tilt 反馈镜实时修正光束偏斜，
         使单模光纤耦合效率在湍流闪烁中保持稳定（~1 μrad RMS）。
      3. 相位稳定：往返光信号干涉检测大气路径相位噪声，
         AOM 反馈主动预补偿（方案与光纤往返补偿相同但处理大气噪声）。
      4. 本地-远端拍频检测：链路两端信号经无死区计数器记录
         并计算 OADEV/MDEV。
      5. 推断地面-LEO：基于 Rytov 方差匹配论证等效湍流水平。
    key_steps:
      - "tip-tilt 主动光学终端（带宽 ≥ 100 Hz）抑制光束摆动"
      - "1550 nm 光载波往返大气路径 → 干涉检测相位噪声"
      - "AOM 相位预补偿（伺服带宽 ~1 kHz，受 τ 限制）"
      - "无死区计数器测量拍频 → OADEV/MDEV 评估"
      - "与地面-卫星 Rytov 方差比较验证湍流等效性"
    applicable_conditions: "自由空间单模双向链路；tip-tilt 闭环带宽覆盖湍流闪烁谱峰值（~100 Hz）；相位噪声伺服带宽 > 往返延迟倒数"
    source:
      zotero_key: "PhysRevLett.128.020801"
      claim: "we demonstrate phase- and amplitude-stabilized free-space frequency transfer."

