    [期刊论文] INRIM + Politecnico di Torino. 识别到光纤链路长期运行中的偏振扰动会 导致光学拍频信号 fading 与探测失锁，限制可用时段。提出双偏振相干接收机 + FPGA 实时信号处理方案，消除 polarization fading 并实现 endless phase tracking， 支持长时、高可靠 optical frequency dissemination——是物理实验链路（如原子物理、 VLBI）级可用性的关键工程使能。
principles:
  - id: pri.dual_polarization_coherent_endless_phase_tracking
    name: "双偏振相干接收无限相位跟踪原理"
    tier: engineering
    verification_status: demonstrated
    statement: >
      单偏振接收光学拍频时，光纤偏振随机扰动会引起拍频 amplitude fading（周期性近零），
      导致相位检测失锁。双偏振相干接收 (DP-CoR) 同时采集 X/Y 偏振分量，FPGA 实时跟踪
      偏振态变化，合成恒定 SNR 的拍频相位信号，实现跨偏振扰动事件的连续相位跟踪。
    domain: "光纤频率传递工程；相位探测"
    conditions: "偏振扰动速率 ≤ FPGA 处理带宽；光学 SNR 充足"
    source_claim: "dual-polarization coherent receiver and a dedicated signal processing ... endless tracking of the optical phase"

