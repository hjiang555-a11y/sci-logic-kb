principles:
  - id: pri.vlbi_clock_comparison_broadband
    name: "宽带 VLBI 光钟频率比对原理"
    tier: domain
    verification_status: observed
    statement: >
      VLBI 通过两地同时观测同一河外射电源（类星体），将两地记录的射电信号
      （经本地原子钟时间戳标记）进行互相关处理。互相关峰值位置给出两站钟差，
      相关相位斜率给出频率差。与传统窄带 VLBI 不同，专用宽带检测（~GHz 量级
      瞬时带宽）显著提高信噪比和频率测量精度，使频率传递不稳定度超越卫星
      TWSTFT（~10⁻¹⁵@1 天）——进入 10⁻¹⁶ 域。
      方案的核心优势：不依赖卫星（替代 TWSTFT/PPP），也不要求光纤互连——
      通过观测自然天体（河外射电源）即可实现跨洋任意两点的时钟比对。
    domain: "VLBI 时间频率传递；测地 VLBI；射电天文计量"
    key_insight: >
      河外射电源作为无限远处的被动"信标"提供了天然的双向时间传递路径——
      两地接收到同一波前，各自以本地钟标记到达时间，差分即得钟差。
      这与双向卫星时间传递（TWSTFT）在数学上同构，但不需要发射主动信号，
      不受卫星可用性和站数量的限制。
    conditions: "两 VLBI 站同时观测同一射电源（共视）；观测频率 S/X/K 波段（2–30 GHz）；钟稳定度足够支持数分钟至小时量级的观测切换周期"
    source:
      zotero_key: "s41567-020-01038-6"
      claim: "we developed dedicated transportable VLBI stations that use broadband detection and demonstrate the comparison of two optical clocks located in Italy and Japan separated by 9,000 km."

methods:
  - id: meth.vlbi_frequency_transfer_clock_comparison
    name: "VLBI 频率传递光学时钟洲际比对方法"
    purpose: >
      替代卫星 TWSTFT/GPS PPP 实现洲际（>5000 km，光纤不可达距离）的
      光学原子钟频率比对——支持国际 TAI 时间尺度构建和基本物理测试。
    description: >
      1. 两套可搬运 VLBI 站（意大利 + 日本）配备宽带接收机（~GHz 带宽）。
      2. 同时观测河外射电源（类星体），接收信号经本地钟（光钟经 fs 光频梳
         桥接至 VLBI 微波本振）标记时间戳并记录。
      3. 数据经高速互联网传输至相关中心（如 Kashima）进行互相关处理。
      4. 多个射电源 + 多 scan（防止天-钟模糊度）联合解算两站钟频率差。
      5. 分数频率不稳定度评估：OADEV 与卫星 TWSTFT/GPS PPP 对比。
    key_steps:
      - "可搬运 VLBI 站部署（含宽带接收机+高稳微波本振）"
      - "光钟 → fs 梳 → VLBI 微波本振（频率桥接）"
      - "共同观测河外射电源（共视 scan schedule）"
      - "互相关处理 → 载波相位提取 → 频率差解算"
      - "OADEV 评估并与卫星技术对比"
    applicable_conditions: "两站可视共天区（射电源在两地 horizon 以上）；宽带检测（~GHz BW）优于窄带 VLBI；光钟稳定度高于 VLBI 频率传递噪声"
    source:
      zotero_key: "s41567-020-01038-6"
      claim: "we developed dedicated transportable VLBI stations that use broadband detection and demonstrate the comparison of two optical clocks located in Italy and Japan."

