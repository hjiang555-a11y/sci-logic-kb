entities:
  - id: ent.bercy2014_100km_two_way_comparison
    name: "Bercy 2014 巴黎 100 km 城市光纤环路双向光频比对实验"
    tier: system
    domain: "光纤光学频率比对；电信网络计量"
    description: >
      巴黎城区 100 km 光纤环路（LPL 起止），由 6 段光纤组成。
      提供两套平行光纤用于 2WU 方案，和一根光纤用于 2WB 方案。
      两端各一超稳激光器（~1 Hz 线宽），2WU 中两路独立传输
      （A→B 经纤 1，B→A 经纤 2），2WB 中同纤双向传输
      （WDM 区分前后向）。彼此独立的本地-远程拍频信号经同步
      记录和数据后处理（减法 ÷2）消除传播噪声。
      同时传输数字数据（DWDM 暗信道技术）验证与通信服务的共存性。
