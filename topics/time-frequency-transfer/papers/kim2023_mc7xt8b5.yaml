    differential spectroscopy 协议：两种不同原子 (Al⁺ & Yb 光晶格) 同时由同一超稳激光询问，
    用一个钟的相位反馈扣除本振共模漂移，使另一个钟可以在 T ≫ τ_LO 下继续 Ramsey 询问。
    跨种比对稳定度显著提升（实测 σ_y 降低因子 > 3×）。对 TF transfer 相关性：
    光钟比对 = TF transfer 的终极需求；此协议扩展了"有效比对带宽"。

