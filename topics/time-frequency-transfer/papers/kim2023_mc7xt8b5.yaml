principles:
  - id: pri.differential_spectroscopy_lo_coherence_bypass
    name: "差分光谱绕过本振相干时间原理"
    tier: domain
    verification_status: demonstrated
    statement: >
      两个光钟共享同一超稳激光本振 (LO)；任一钟检测到的残余相位差主要来自 LO 漂移
      + 钟跃迁本征频差。在一个钟上反馈扣除 LO 相位后，另一个钟可在探测时间 T ≫ τ_LO
      下进行 Ramsey spectroscopy，从而提升跨种频比测量稳定度。代价：短期询问期间
      LO 漂移被"共模消除"，但跨种之间的"绝对"频率差分由两钟反馈共同承载。
    domain: "光钟比对协议；光本振共享架构"
    conditions: "共享 LO；两钟探测时间可错开；相位反馈带宽 ≥ LO 漂移特征频率"
    source_claim: "differential spectroscopy, a comparison protocol that enables interrogating ... beyond the single-clock coherence time"

