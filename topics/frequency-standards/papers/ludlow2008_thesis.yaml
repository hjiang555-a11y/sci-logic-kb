    (4) 系统效应评估体系：黑体辐射频移、Zeeman 频移、碰撞频移、AC-Stark 频移、重力
    红移、相对论 Doppler 的独立测量与误差预算合成方法；
    (5) 远程光纤比对（Sr 晶格钟 vs Ca 光钟 vs Cs 喷泉）给出 1×10⁻¹⁶ 分数不确定度，
    即 Ludlow 2008 Science 论文（zotero_key 待定）的博士论文完整版。
