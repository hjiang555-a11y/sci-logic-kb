entities:
  - id: ent.cesium_fountain_frequency_synthesizer_ntsc
    name: "NTSC铯喷泉钟频率综合器"
    aliases: ["9.2 GHz frequency synthesizer for Cs fountain", "频率综合器"]
    hierarchy_level: 2
    status: demonstrated
    function: >
      将5 MHz超稳振荡器（USO）信号通过锁相倍频和混频链综合为9.192 631 770 GHz的铯原子基态超精细跃迁询问信号。
      利用直接数字频率合成器（DDS）实现频率调制和PC控制调谐。
      整个装置置于坡莫合金磁屏蔽盒中。
    key_parameters:
      output_frequency: "9.192 631 770 GHz"
      input_reference: "5 MHz USO（相位噪声 -130 dBc/Hz @ 1 Hz offset）"
      phase_noise: "-82 dB[Rad²/Hz] @ 1 Hz offset"
      dds_resolution: "优于 10 μHz"
    feasibility_assessment:
      engineering_complexity: "medium"
      cost_estimate: "$$"
    practical_limitations:
      - description: "温度波动影响（计划后期整体控温）"
        source_claim: "考虑到温度波动的影响，我们将对频率综合器整体控温"
        impact: "长期频率稳定度"
    note: >
      Level 2 实例节点，PART-OF ent.cesium_fountain_standard_clairon1995 的本地实现方案。
      国内首次自主研制9.2 GHz铯喷泉钟频率综合器。

principles:
  - id: pri.frequency_synthesizer_phase_noise_to_fountain_stability
    name: "频率综合器相位噪声至喷泉钟稳定度传递"
    tier: engineering
    verification_status: calculated
    statement: >
      频率综合器相位噪声通过 Dick 效应影响喷泉原子钟的短期频率稳定度。
      影响量由调频闪烁噪声主导（h₋₁项），在几赫兹偏频范围内：
      σ_y(τ) ≈ √(h₋₁ · sin(πd)/πd · T_c/τ)，其中 d 为原子-场相互作用时间与周期之比。
    formula: "σ_y(τ) ≈ √(h₋₁ · sin(πd)/πd · T_c/τ)"
    key_insight: "频率综合器的闪烁频率噪声是喷泉钟秒稳的限制因素之一"
    conditions: "d = T/T_c = 0.42（NTSC喷泉钟设计参数：T = 0.5 s, T_c = 1.2 s）"
    source_claim: "频率综合器相位噪声影响喷泉钟的输出频率稳定度，影响程度与喷泉钟的时序结构有关"

methods:
  - id: meth.dds_based_frequency_synthesis_chain
    name: "基于DDS的频率综合链"
    status: demonstrated
    applies_to: ent.cesium_fountain_frequency_synthesizer_ntsc
    steps_summary: >
      5 MHz USO → 锁相倍频至100 MHz → 倍频至200 MHz → 三路分配：
      (1) 5分频至40 MHz → DDS参考 → 输出7.368230 MHz+δν；
      (2) NLTL梳状倍频至9 GHz；
      (3) 提供混频参考 → 8.993 GHz介质振荡器锁相至100 MHz → 与9 GHz混频产生7.368 MHz → 与DDS输出鉴相 → 控制介质振荡器 → 最终输出9.193 GHz
    required_hardware:
      - ent.cesium_fountain_frequency_synthesizer_ntsc
    advantages:
      - "全锁相链结构，DDS实现精密频率调谐（优10 μHz）"
      - "PC可控功率衰减和时序控制"
    disadvantages:
      - "调频闪烁噪声主导低频偏相位噪声"
    source_claim: "整个频率综合器装置放在一个坡莫合金的磁屏蔽盒子中"

