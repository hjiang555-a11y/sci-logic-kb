  - id: pri.e3_octupole_transition_optical_clock
    name: "电八极（E3）跃迁光钟原理"
    tier: domain
    verification_status: established
    statement: >
      单离子光钟的钟跃迁类型决定其性能特征：E2（电四极）
      跃迁天然线宽 ~Hz，E3（电八极）跃迁天然线宽 ~nHz。
      E3 对 Stark 频移的灵敏度比 E2 更低，但跃迁概率也更低
      （探询时间更长、死时间更大→Dick 效应更强）。
      Yb⁺ 和 Lu⁺ 是 E3 跃迁光钟的两个主要体系。
    domain: "单离子光钟；E3 跃迁；量子计量"
    key_insight: >
      E3 跃迁是"用时间换精度"——极低的天然线宽换取
      极低的系统频移敏感度，但代价是需要超长的探询时间。
    conditions: "单离子囚禁（Paul 阱）；467 nm 超稳钟激光；长探询脉冲（~100 ms-1 s）"
    source:
      zotero_key: "Yb ion Huntermann PRL 2012"
      claim: "The Yb+ E3 transition offers a Q-factor of 10^22 with exceptional insensitivity to external perturbations."

