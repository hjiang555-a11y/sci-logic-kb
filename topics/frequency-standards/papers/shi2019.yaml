principles:
  - id: pri.good_bad_cavity_active_clock
    name: "Good-bad-cavity 主动光钟原理"
    tier: method
    verification_status: demonstrated
    statement: >
      主动光钟的核心挑战：增益介质（原子）所在的腔需要
      容纳足够多的原子以获得超辐射增益（bad cavity），
      但腔本身的频率稳定性（good cavity）决定了输出频率
      的长期稳定度。Good-bad-cavity 方案将两个功能分离：
      good cavity 提供频率参考，bad cavity 提供增益——
      两者通过相位锁定的激光连接。
    domain: "主动光钟；光学腔；原子-腔耦合"
    key_insight: >
      Good-bad-cavity 方案是"分而治之"的主动光钟路线——
      将频率稳定性和增益两个功能解耦到两个物理腔中。
    conditions: "双腔耦合；相位锁定环路；增益介质（热原子/冷原子）"
    source:
      zotero_key: "oe-27-16-22040"
      claim: "The good-bad-cavity scheme separates the frequency reference and gain functions."

