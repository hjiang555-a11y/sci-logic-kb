principles:
  - id: pri.transportable_optical_clock_engineering
    name: "可搬运光钟工程化原理"
    tier: domain
    verification_status: demonstrated
    statement: >
      光钟从实验室到现场的工程化需要解决：振动隔离（超稳腔对
      加速度敏感）、温度控制（黑体辐射频移的温度依赖性）、
      紧凑化（体积和功耗约束）、自动化（无需频繁人工干预的
      长期运行）。舰载平台更进一步要求：运动补偿、姿态变化
      适应性、盐雾和湿度防护。
    domain: "光钟工程；原子分子光物理；精密测量"
    key_insight: >
      实验室光钟追求极致性能，而工程化光钟追求在非受控环境下
      维持"足够好"的性能——需要不同的设计折衷理念。
    conditions: "紧凑化、加固的光学/真空/电子学系统；抗振超稳腔设计；自动化锁频和重锁"
    source:
      zotero_key: "s41586-024-07225-2"
      claim: "Optical clocks have demonstrated impressive performance in the laboratory, but their operation outside the laboratory remains challenging."

