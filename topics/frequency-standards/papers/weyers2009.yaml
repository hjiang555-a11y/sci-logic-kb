principles:
  - id: pri.microwave_clock_quantum_projection_noise_limit
    name: "微波钟量子投影噪声极限原理"
    tier: domain
    verification_status: established
    statement: >
      喷泉钟（及所有基于原子探询的钟）的短期频率稳定度
      受限于两个因素：(a) 量子投影噪声（QPN，σ_y ∝ 1/√N，
      N 为探测原子数）；(b) 探询振荡器（微波本振）的
      相位噪声（通过 Dick 效应耦合）。传统喷泉钟的短稳
      通常受限于微波本振噪声而非 QPN。Weyers 2009 证明：
      将微波源锁相至超稳光频参考（本身相位噪声更低）
      可消除此瓶颈，使喷泉钟达到 QPN 极限。
    domain: "微波钟；量子计量；相位噪声；光频参考"
    key_insight: >
      微波钟的短稳瓶颈不在原子而在振荡器——借用光频
      参考的优良相位噪声是"曲线救国"的策略。
    conditions: "超稳激光器作为相位参考；低噪声光-微波频率转换"
    source:
      zotero_key: "2009 Weyers - Phys.Rev.A79"
      claim: "The microwave oscillator phase-locked to an ultrastable laser eliminates the local oscillator noise limitation."

