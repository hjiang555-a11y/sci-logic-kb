principles:
  - id: pri.space_ion_clock_for_deep_space_navigation
    name: "空间离子钟深空导航原理"
    tier: domain
    verification_status: demonstrated
    statement: >
      传统深空导航依赖双向测距（地面→探测器→地面）——
      通信延迟长（数小时至数天），且需要地面站持续跟踪。
      星载高性能原子钟使单向测距成为可能：探测器接收
      GNSS/地面信号并自行计算位置。这需要星载钟具有
      足够低的长期频率漂移（~10⁻¹⁵ 量级 @数天至数周）。
      离子阱（Hg⁺）天然具有低漂移特性——无缓冲气体碰撞、
      无壁碰撞，频率主要由原子物理决定而非工程参数。
    domain: "空间钟；深空导航；离子阱物理"
    key_insight: >
      空间钟的考核指标不同于地面钟——不是追求最低 σ_y(τ=1 s)，
      而是追求最低长期漂移和最简化的系统集成。
    conditions: "密封式离子阱；星载激光器和电子学；空间环境（真空/微重力/辐射）"
    source:
      zotero_key: "s41586-021-03571-7"
      claim: "Atomic clocks operating in space are essential for deep-space navigation."

