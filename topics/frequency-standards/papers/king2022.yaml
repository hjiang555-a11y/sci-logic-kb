principles:
  - id: pri.highly_charged_ion_optical_clock
    name: "高电荷离子光钟原理"
    tier: method
    verification_status: demonstrated
    statement: >
      高电荷离子（HCI）因其高电离态而具有独特的原子结构：
      光学跃迁位于可见/紫外波段（适合激光探测），同时对外部
      电磁场的极化率和 quadrupole 矩极小——天然抑制 Stark 和
      quadrupole 频移。HCI 光钟结合了中性原子光晶格钟（高稳定度）
      和单离子钟（低系统不确定度）的各自优势。
    domain: "光钟；高电荷离子；原子物理"
    key_insight: >
      HCI 是光钟的"第三条路线"：不像中性原子那样需要 magic wavelength
      光晶格来抑制光频移，也不像单离子钟那样受限于单粒子量子投影噪声。
    conditions: "HCI 需囚禁在线性 Paul 阱中并激光冷却至 mK 级；量子逻辑谱读出"
    source:
      zotero_key: "s41586-022-05245-4"
      claim: "Highly charged ions have been proposed as candidates for optical clocks with extremely high accuracy."

