principles:
  - id: pri.optical_clock_ten_minus_eighteen_geoid_bridge
    name: "光钟 10⁻¹⁸ 分数精度 ↔ 1 cm 大地水准面分辨率桥梁"
    tier: domain
    verification_status: observed
    statement: >
      "广义相对论给出引力时间膨胀 Δν/ν = −ΔU/c² ≈ −1.09×10⁻¹⁶ / m（地表），因此光钟
      分数系统不确定度 10⁻¹⁸ 对应垂直高度分辨率约 1 cm。光钟网络联网比对可直接
      测绘大地水准面差异，构成"钟-大地测量"（chronometric geodesy）新范式。"
      这一桥梁把光钟性能从纯计量指标转化为地球物理可观测量，是 2016 后 10⁻¹⁸ 级
      光钟建设的最大应用驱动力。
    domain: "时频计量；广义相对论应用；大地测量学"
    key_insight: >
      "1 cm 大地水准面"是"10⁻¹⁸ 光钟"的直觉翻译——非专业听众一句话即懂"为什么要 
      10⁻¹⁸ 光钟"。这也是 I-SOC / Einstein telescope / 可搬运光钟网络等大型项目的
      汇报模板。
    conditions: "已知 ΔU = g·Δh；已知本地重力加速度 g；比对通道相对不确定度 < 光钟不确定度"
    formula: "Delta_nu / nu = - g * Delta_h / c^2 ~ -1.09e-16 / meter near Earth's surface"
    source:
      zotero_key: "DIDDAMS2016-NATPHOT"
      claim: >
        "at a fractional frequency uncertainty of 10⁻¹⁸, an optical clock is sensitive to
        a change in height of only 1 cm on Earth's surface, opening the door to relativistic
        (chronometric) geodesy."

  - id: pri.qpn_dick_two_fundamental_limits_dfl16
    name: "光钟双重基本极限：量子投影噪声 + Dick 效应"
    tier: domain
    verification_status: observed
    statement: >
      "光钟短期分数频率不稳定度由两大基本极限共同决定：
      (a) 量子投影噪声 QPN 极限 σ_QPN(τ) = (1/(π·Q·sqrt(N·τ/T_c)))，其中 Q = ν_0/Δν
      是跃迁品质因子、N 是原子数、T_c 是时钟周期、τ 是积分时间；
      (b) Dick 效应 σ_Dick(τ)，由本地振荡器（询问激光）短期频率噪声通过时钟周期
      采样混叠到钟输出频率产生，约为 σ_LO(T_c/2) · sqrt(T_c / τ) 量级。
      任何光钟的实际 σ_y 是这两者的几何和；当 σ_Dick >> σ_QPN 时，改进询问激光线宽
      比增加原子数更有效。"
    domain: "光钟稳定度理论"
    key_insight: >
      Diddams/Fortier/Ludlow 明确指出：2016 前后的实用光钟大多在 σ_QPN 与 σ_Dick 量级
      相当的状态；进一步进步主要来自改进询问激光（降 σ_Dick，对接超稳激光专题）
      或提高钟跃迁 Q（如从 Sr 的 ~10¹⁷ 升到 In⁺/Lu⁺ 更高 Q）。
    conditions: "询问激光方差已知；Dick 效应积分权重函数已推导；钟周期 T_c 固定"
    formula: >
      sigma_y^2(tau) ~ sigma_QPN^2(tau) + sigma_Dick^2(tau);
      sigma_QPN(tau) = 1 / (pi * Q * sqrt(N * tau / T_c));
      sigma_Dick(tau) ~ sqrt( sum_{k>=1} |g_k|^2 * S_LO(k/T_c) ) * sqrt(T_c / tau)
    source:
      zotero_key: "DIDDAMS2016-NATPHOT"
      claim: >
        "optical clock instability is limited in tandem by quantum projection noise and
        the Dick effect, the latter arising from aliasing of local oscillator phase noise
        sampled at the clock cycle rate."

