    [综述论文 · B1 OFC 早期综述（归 frequency-standards）] 光钟领域 2016 年权威综述。
    三位作者覆盖 NIST（Diddams / Fortier）与 JILA（Ludlow）两大光钟重镇——文章同时
    代表离子钟（NIST ²⁷Al⁺ / ¹⁷¹Yb⁺）与中性原子晶格钟（JILA Sr）两个分支的共同视角。
    核心贡献：
    (1) 明确光钟 10⁻¹⁸ 分数系统不确定度对应 1 cm 大地水准面分辨率，将光钟性能转化为
    地球物理可观测量；
    (2) 系统阐述五大系统效应（黑体辐射频移 BBR / 碰撞频移 / Zeeman 频移 / AC-Stark
    频移 / Doppler）及其评估方法；
    (3) 分析光钟短期稳定度 σ_y(τ) = (1/Q)·sqrt(T_c/(τ·N))·N_loops 的 QPN 极限公式，
    指出实用钟已接近 QPN 极限，Dick 效应（本地振荡器频率噪声混叠）是进一步降低的
    主要瓶颈；
    (4) 预判光钟在 SI 秒重定义（2026 CIPM 建议）、引力红移厘米尺度测量、精细结构
    常数 α 时间变化搜索中的角色。
    本文件归入 frequency-standards 专题（内容与 fortier2026.yaml 同主题，但时间早 10 年；
    是光钟领域概念奠基阶段的里程碑综述），与 fortier2026 形成"早期 + 当前"综述对。
    B1 批次按原分类归 OFC，但依据论文内容实际归 frequency-standards（与批次 README
    备注一致）。

