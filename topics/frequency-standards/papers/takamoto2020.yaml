principles:
  - id: pri.optical_clock_gravitational_redshift_geodesy
    name: "光钟引力红移大地测量原理"
    tier: domain
    verification_status: established
    statement: >
      根据广义相对论，引力势差导致钟的频率差异——
      1 cm 高度差对应 ~10⁻¹⁸ 相对频率变化。
      光钟的精度（~10⁻¹⁸）已足够分辨厘米级高度变化，
      使光钟成为新型大地测量工具——"相对论测高"。
    domain: "光钟；广义相对论；大地测量"
    key_insight: >
      光钟不仅是"更好的钟"——它把频率转换为引力势的探针，
      将精密计时变成精密测地。
    conditions: "可搬运光钟（足够紧凑）；光钟频率不确定度 < 10⁻¹⁷；两个钟的高度差已知"
    source:
      zotero_key: "s41566-020-0619-8"
      claim: "Optical lattice clocks can measure the gravitational redshift with sufficient precision for geodesy."

