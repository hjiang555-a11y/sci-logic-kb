principles:
  - id: pri.ca40_single_ion_optical_clock
    name: "⁴⁰Ca⁺ 单离子光钟原理"
    tier: method
    verification_status: established
    statement: >
      ⁴⁰Ca⁺ 的钟跃迁为 4s ²S₁/₂ → 3d ²D₅/₂（~729 nm），
      自然线宽 ~0.14 Hz（Q ~ 4×10¹⁴）。相比 Sr⁺ 和 Yb⁺，
      Ca⁺ 质量更轻、极化率更小——对黑体辐射和电场的敏感性
      天然更低。但 729 nm 钟激光的实现比 674 nm（Sr⁺）和
      467 nm（Yb⁺ quadrupole）/ 436 nm（Yb⁺ octupole）更具
      技术挑战。
    domain: "单离子光钟；⁴⁰Ca⁺；量子计量"
    key_insight: >
      Ca⁺ 的低极化率是天然优势——但需要克服 729 nm 窄线宽
      激光器的技术门槛。
    conditions: "⁴⁰Ca⁺ 离子囚禁（Paul 阱）；729 nm 超稳钟激光；量子逻辑谱或电子 shelving 读出"
    source:
      zotero_key: "PhysRevLett.116.013001"
      claim: "40Ca+ is a promising candidate for optical clocks due to its relatively small electric quadrupole moment."

