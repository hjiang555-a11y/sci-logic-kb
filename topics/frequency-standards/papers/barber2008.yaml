principles:
  - id: pri.optical_lattice_light_shift_engineering
    name: "光晶格光频移控制原理"
    tier: domain
    verification_status: established
    statement: >
      光晶格钟的 magic wavelength 条件是：钟跃迁上下能级的
      scalar 极化率相等——使得晶格光引起的 differential Stark
      频移为零。然而 tensor 和 vector 分量（对非 J=0 能级）以及
      高阶效应（hyperpolarizability、multipolar 耦合）仍会导致
      残余光频移。精确的 magic wavelength 标定是光钟系统不确定度
      评估的核心。
    domain: "光晶格钟；Stark 频移；精密光谱"
    key_insight: >
      Magic wavelength 不是"一个波长"，而是一个需要精确标定的
      工作点——剩余光频移的评估直接决定光钟的准确度天花板。
    conditions: "晶格激光波长精确可调；钟跃迁线宽窄；足够长的探测时间"
    source:
      zotero_key: "PhysRevLett.100.103002"
      claim: "The lattice-induced light shifts are a key systematic effect in optical lattice clocks."

