principles:
  - id: pri.optical_clock_gravitational_wave_detection
    name: "光钟引力波探测原理"
    tier: domain
    verification_status: proposed
    statement: >
      引力波对时空度规的调制导致不同位置的光钟经历
      不同的固有时——测量光钟之间的频率差变化可反演
      GW 信号。优势：光钟天然具有极高的频率分辨率
      （~10⁻¹⁸-10⁻¹⁹），且无需激光干涉仪的臂长约束。
      挑战：地球物理噪声（地壳运动、大气负载）可能
      掩盖 GW 信号；需要多台分布式光钟进行相关探测。
    domain: "引力波探测；光钟网络；基础物理"
    key_insight: >
      光钟因其对引力势的天然敏感性（Δf/f = ΔU/c²）
      而成为广义相对论的天然探针——GW 只是其众多
      探测目标之一。
    conditions: "多台光钟（≥3 台）网络；频率比对不确定度 ~10⁻¹⁹；足够长的观测基线"
    source:
      zotero_key: "ClockGW_PhysRevD.94.124043"
      claim: "Optical lattice clocks can detect GWs through their effect on proper time differences between clocks."

