  note: >
    报道了铯原子喷泉频率标准的初步研制结果，实现了 sub-Hertz 级的 Ramsey 共振线宽（< 700 mHz），
    并初步评估了冷碰撞频移等系统误差。

entities:
  - id: ent.cesium_fountain_standard_clairon1995
    name: "铯原子喷泉频率标准 (Clairon 1995)"
    aliases: ["Cesium Fountain Frequency Standard"]
    hierarchy_level: 2
    status: demonstrated
    function: >
      利用激光冷却的冷铯原子在竖直方向上的抛射与回落，通过两次穿过微波腔实现长相干时间的 Ramsey 干涉，
      从而获得极窄的共振线宽和高频率稳定性。
    key_parameters:
      cycle_time: "1.1 s"
      C_field: "1.8 mG"
      microwave_cavity_Q: "30 000"
      launch_height: "C-field 区域约 70 cm"
    interface_requirements:
      vacuum: "C-field 区域压力 < 5*10^-10 Torr"
      magnetic_shielding: "四层磁屏蔽，轴向屏蔽因子约 10^4"

principles:
  - id: pri.ramsey_separated_oscillatory_fields_fountain
    name: "喷泉式 Ramsey 分离振荡场原理"
    tier: domain
    verification_status: observed
    statement: >
      原子在抛射过程中两次穿过微波腔，两次相互作用之间的时间间隔 $\tau$ 远大于热原子束，
      导致共振线宽 $\Delta \nu \approx 1/(2\tau)$ 显著降低。
    domain: "原子频率标准"
    formula: '$\Delta \nu_{FWHM} \approx 1/(2\tau)$'
    key_insight: "利用激光冷却降低原子速度并增加相互作用时间，将线宽降低至 sub-Hertz 量级。"
    conditions: '极低温度（$\mu 级别）且高真空环境下'
    source_claim: "The long time between the two interactions leads to a sub-Hertz Ramsey resonance, two orders of magnitude narrower than in classical thermal beam devices."

  - id: pri.cold_collisional_shift_cesium
    name: "冷铯原子碰撞频移"
    tier: domain
    verification_status: observed
    statement: >
      在极低温度下，铯原子间的 s-波散射导致频率偏移，该偏移与原子的平均密度 $\rho$ 成正比。
    domain: "系统误差"
    formula: '$\Delta \nu / \nu \propto \rho$'
    key_insight: "冷碰撞是喷泉钟长期稳定度和准确度的主要限制因素。"
    conditions: "s-wave scattering regime"
    source_claim: "A preliminary evaluation of some systematic effects shows that cold collisions will be the limiting effect for long-term stability and accuracy."

methods:
  - id: meth.cesium_fountain_operation_cycle
    name: "铯原子喷泉运行周期"
    status: demonstrated
    applies_to: ent.cesium_fountain_standard_clairon1995
    steps_summary: >
      1. 原子捕获与冷却 (0.3-0.5 s) $\rightarrow$ 2. 1-D 移动光 molasses 抛射 $\rightarrow$ 3. 第一次微波相互作用 ($\pi/2$ 脉冲) $\rightarrow$ 4.  ballistic 飞行与回落 $\rightarrow$ 5. 第二次微波相互作用 $\rightarrow$ 6. 荧光检测并计算跃迁概率。
    source_claim: "The cesium atoms are first cooled for about 0.3 s to 0.5 s, and then the 1-D moving molasses method is used to launch the atoms."

  - id: meth.time_of_flight_velocity_distribution
    name: "飞行时间法测速"
    status: demonstrated
    applies_to: ent.cesium_fountain_standard_clairon1995
    steps_summary: >
      通过检测不同时间点的原子荧光，确定原子的垂直速度分布。
    source_claim: "the time-of-flight (TOF) technique is used to determine the vertical velocity distribution."

