principles:
  - id: pri.sr_clock_systematic_uncertainty_budget
    name: "Sr 光钟系统不确定度评估原理"
    tier: domain
    verification_status: established
    statement: >
      Sr 光钟系统不确定度的主要贡献源包括：黑体辐射（BBR）频移
      （环境温度不确定导致 ~10⁻¹⁸）、晶格光频移（magic wavelength
      的精确标定）、密度频移（冷原子碰撞）、quadrupole 频移
      （晶格光场梯度）、以及 Doppler 频移。将总不确定度降至
      10⁻¹⁹ 级需对每一个系统效应进行独立评估和精确控制。
    domain: "光钟；不确定度评估；精密光谱"
    key_insight: >
      系统不确定度的降低不是一个"突破"而是一系列"完善"——
      每项系统效应都需要独立的评估方案和控制策略。
    conditions: "低温 BBR 屏蔽/精确温度监测；magic wavelength 精确标定；超稳钟激光"
    source:
      zotero_key: "Sr accuracy_PRL.133.023401.2024_0"
      claim: "We evaluate the systematic shifts with an uncertainty of 8×10^-19."

