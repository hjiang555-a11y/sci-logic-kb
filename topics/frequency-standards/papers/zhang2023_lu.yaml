principles:
  - id: pri.correlation_spectroscopy_clock_comparison
    name: "关联谱光钟比对原理"
    tier: method
    verification_status: demonstrated
    statement: >
      关联谱（correlation spectroscopy）通过同时探询两个原子/离子
      并测量它们的 correlated 响应（如 parity 或 population），
      可以提取它们的频率差而不需要高精度地知道探询激光的
      绝对频率——探询激光的共模相位噪声在关联信号中被抑制。
      这项技术特别适合多离子/多钟系统中突破探询激光噪声的
      瓶颈。
    domain: "光钟比对；关联谱；量子测量"
    key_insight: >
      关联谱将频率比对从"分别测量再相减"转变为"同步
      测量差频"——共模噪声天然抵消，降低对探询激光的
      技术要求。
    conditions: "两个离子同时探询；共模探询激光；关联信号检测"
    source:
      zotero_key: "sciadv.adg1971"
      claim: "Correlation spectroscopy suppresses common-mode probe laser noise, enabling high-precision clock comparisons."

