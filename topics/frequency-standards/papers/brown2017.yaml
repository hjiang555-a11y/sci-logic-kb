principles:
  - id: pri.hyperpolarizability_in_optical_lattice_clocks
    name: "光晶格钟 hyperpolarizability 原理"
    tier: method
    verification_status: established
    statement: >
      光晶格激光引起的原子能级 Stark 频移可分为：
      (a) 线性极化率（scalar α₀、tensor α₂、vector α₁）
      ——与晶格光强 I 成正比，可通过 magic wavelength 抵消；
      (b) hyperpolarizability（超极化率 γ）——与 I² 成正比，
      无法通过选择波长抵消，只能通过精确测量和扣除。
      Hyperpolarizability 是光晶格钟系统不确定度的重要贡献源，
      在 10⁻¹⁸ 级精度下必须考虑。
    domain: "光晶格钟；Stark 频移；原子物理；精密光谱"
    key_insight: >
      Magic wavelength 不是"零频移波长"而是"一阶抵消点"——
      高阶效应在 10⁻¹⁸ 级精度下成为可观测的系统误差。
    conditions: "晶格光强可精确调节（0-E_rec）；钟跃迁线宽足够窄；足够长的测量时间"
    source:
      zotero_key: "2923-1"
      claim: "Hyperpolarizability leads to a residual lattice light shift that must be characterized at the 10^-18 level."

