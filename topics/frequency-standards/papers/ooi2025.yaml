principles:
  - id: pri.solid_state_nuclear_clock_frequency_reproducibility
    name: "固态核光钟频率复现性原理"
    tier: method
    verification_status: observed
    statement: >
      固态基质（如 CaF₂、LiSrAlF₆ 等晶体）掺杂 ²²⁹ᵐTh 是实现
      核光钟的实用化路线——无需复杂的离子阱和激光冷却系统。
      但晶体场会通过 Stark 效应、quadrupole 相互作用等对核跃迁
      频率产生偏移。频率复现性（不同样品之间频率一致程度）
      是固态核光钟是否可以作为频率标准的关键判据。
    domain: "核光钟；固态物理；频率计量"
    key_insight: >
      固态路线代表了截然不同的核光钟实现哲学：牺牲一些
      准确度（因晶体场不确定性），换取极大的工程简化。
    conditions: "²²⁹ᵐTh 掺杂晶体（ppm 级掺杂浓度）；VUV 激光激发；低温环境（~10 K）"
    source:
      zotero_key: "s41586-025-09999-5"
      claim: "The reproducibility of the nuclear transition frequency in solid-state hosts is essential for the development of practical nuclear clocks."

