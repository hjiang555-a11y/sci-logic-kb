principles:
  - id: pri.superradiant_active_optical_clock
    name: "超辐射主动光钟原理"
    tier: domain
    verification_status: observed
    statement: >
      主动光钟（active optical clock）利用原子系统的集体
      协同辐射（超辐射）直接产生频率稳定的光输出——
      而不像传统被动光钟那样需要超稳激光探询→反馈。
      超辐射的频率由原子跃迁频率本身决定，不受探询激光
      噪声限制。这可能导致结构更简单、性能更能突破
      Dick 效应限制的新一代光钟。
    domain: "主动光钟；超辐射；量子光学；原子物理"
    key_insight: >
      被动光钟是被动的"滤波器"——需要外部本振；主动光钟是
      主动的"源"——原子自己产生频率稳定的光。
    conditions: "原子系统实现粒子数反转或集体偶极相干；超辐射线宽 < 跃迁自然线宽；光腔增强协同性"
    source:
      zotero_key: "PhysRevX.8.021036"
      claim: "Superradiance offers a route to active optical clocks where the atoms themselves serve as the frequency reference and source."

