# Peng 2020 — 电荷补偿MUTC光电二极管光子脉冲微波生成 [X/Ku/K波段，纪录峰值功率]
# 提取日期：2026-05-03
# Schema版本：v4.0
# 专题：timescales
# contribution_type: evidence — 工程改进，刷新MUTC光电二极管脉冲微波峰值功率纪录。
#   与 timescales 专题的关联：光子微波生成是光钟/光频梳参考信号向微波域传递的关键技术通道；
#   高功率光电二极管是此通道的核心器件。本文的 CC-MUTC PD 是 fortier2013 中 MUTC PD
#   的后续工程优化（更高的反向偏压、更优的脉冲峰值功率）。
#   核心贡献在微波光子学器件层面，与时间标尺的直接关系较弱，
#   列入 timescales 专题主要作为光子微波生成技术链的器件进展记录。

