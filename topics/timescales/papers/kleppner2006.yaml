entities:
  - id: ent.utc_leap_seconds
    name: "UTC 闰秒机制（协调世界时的闰秒插入管理）"
    aliases: ["Coordinated Universal Time", "UTC with leap seconds", "闰秒"]
    hierarchy_level: 0
    status: demonstrated
    function: >
      协调世界时（UTC）以原子频率标准为基础，由 IERS（国际地球自转与参考系统服务）
      决定何时插入闰秒，保持与天文时间（UT1）的同步。1972 年引入以来已插入 23 个闰秒。
      GPS 系统因无法容忍时间跳变，采用无闰秒的独立时标。
    key_parameters:
      leap_seconds_introduced_year: 1972
      leap_seconds_count_as_of_2006: 23
      managing_body: "International Earth Rotation and Reference Systems Service (IERS)"
      underlying_standard: "原子频率标准（primary 铯标准 + 55 个国际实验室的商业标准）"
      gps_decoupled: "GPS 采用无闰秒时标，避免时间跳变"
    note: >
      本文描述的 UTC 机制。闰秒废除的讨论在 2006 年已活跃；
      最终在 2022 年第 27 届 CGPM 决议中决定最迟 2035 年前废除闰秒。

  - id: ent.geoid
    name: "大地水准面（地球重力等势面——时间频率计量的高程参考）"
    aliases: ["geoid", "重力等势面", "gravitational equipotential surface"]
    hierarchy_level: 1
    status: demonstrated
    function: >
      大地水准面是地球恒定重力势的假想面，为一级近似下的地球长短轴椭球面。
      用于将各地实验室的原子钟频率校正到同一重力势，是引力红移校正的基础参考面。
      通过多年地面重力测量和卫星轨道观测绘制。
    key_parameters:
      typical_height_uncertainty: "30–50 cm"
      clock_rate_uncertainty_from_geoid: "~3×10⁻¹⁷（来自 30–50 cm 高程不确定性）"
      solid_earth_tide_amplitude: "~20 cm"
      tide_induced_frequency_fluctuation: "~2×10⁻¹⁷"
      cm_level_required_for_1e18: "需要 1 cm 级高程知识才能实现 10⁻¹⁸ 级时钟比较"
    note: >
      高程不确定度和固体潮波动构成了分布式原子时标比较的硬性物理瓶颈，
      不可通过工程改进消除——因为引力改变的是时间本身而非时钟操作。

principles:
  - id: pri.gravitational_blueshift_clock_rate
    name: "引力蓝移对时钟频率的影响——Δf/f ≈ gΔh/c²"
    tier: foundational
    verification_status: observed
    statement: >
      在地表附近，广义相对论预测（且精密实验确认）：
      时钟每升高一米的频率增快约 1×10⁻¹⁶。
      更一般地，位于引力势 U₂ 和 U₁ 的两台钟，其频率相对差异为 (U₂ − U₁)/c²。
      此效应在 10⁻¹⁶ 以上精度不可忽略——忽略它来比较不同实验室的原子钟频率
      将导致灾难性错误，已影响 GPS 定时算法和全球实验室钟比对。
    domain: "广义相对论，时间频率计量"
    formula: "Δf/f ≈ gΔh/c² ≈ 1.09×10⁻¹⁶ Δh/m"
    key_insight: >
      引力蓝移不是可被工程屏蔽的"扰动"——它是时空本身的属性。
      在 10⁻¹⁶ 精度下，高程知识不确定度直接转化为频率比较不确定度。
      这一约束从实验技术问题升级为物理原理限制。
    conditions: "忽略高阶广义相对论效应；仅考虑牛顿引力势近似"
    source_claim: >
      "if a clock is elevated it goes faster by about 1 part in 10¹⁶ for each meter
      its altitude is increased. (More generally, the rates of clocks located at gravitational
      potentials U₂ and U₁ differ fractionally by (U₂ − U₁)/c², where c is the speed of light.)"
    open_questions:
      - "How can we define a 'standard location' for the SI second in a way that avoids political conflict, given historical precedent (French meter)?"

  - id: pri.geoid_uncertainty_clock_comparison_limit
    name: "大地水准面不确定度对时钟比较的终极限制"
    tier: engineering
    verification_status: calculated
    statement: >
      大地水准面的高程典型不确定度为 30–50 cm，导致原子钟频率比较的不确定度
      通常为 3×10⁻¹⁷。此外，固体潮引起约 20 cm 振幅的起伏，
      导致钟频率波动约 2×10⁻¹⁷。加上海洋潮汐、大气压对海平面的影响、
      气候变化导致的水分重分布、冰川融化和构造板块抬升等长周期效应，
      共同造成数 10⁻¹⁷ 量级的不可控频率波动。
      要实现 10⁻¹⁸ 级比较需要 1 cm 级的高程知识——这在物理上不可能
      （除非两台钟位于同一地点）。
    domain: "大地测量学，时间频率计量"
    key_insight: >
      大地水准面的不确定性不是一个可被逐步改进的实验误差源——
      引力势的时空分布本质上不可精确固定（固体潮、洋流、冰川运动不断重塑它），
      因此构成了分布式原子时标的终极硬性界限。
    conditions: "假设钟比较通过电磁信号传输；如果两台钟在同一地点则不受此限制"
    source_claim: >
      "the uncertainty in the geoid causes an uncertainty in the relative rates of atomic clocks
      of typically 3 parts in 10¹⁷"
    invalidated_when:
      - "如果时钟比较可在同一地点完成（共站比对）"
      - "如果时钟精度未达到 10⁻¹⁷ 水平（大地水准面问题不构成实际限制）"

  - id: pri.time_entangled_with_gravity
    name: "引力与时间本质纠缠——分布式超精密时间失去意义"
    tier: foundational
    verification_status: calculated
    statement: >
      引力的效应不是干扰时钟的工作，而是改变时间本身。
      在 10⁻¹⁷ 或 10⁻¹⁸ 精度水平，比较散落全球各地的时钟不比比较散落
      大洋中各艘小船上摆钟的速率更有意义——每条船以自己的方式摇晃，
      每口钟保持自己的时间。地球的引力与时间不可分割地纠缠在一起，
      而地球本身不可预测地抖动和摇晃。没有哪口钟可以被选为"真时间"的守护者。
      明天的超级时钟将如此精确，以至于就地球上的生活而言，它们记录的时间
      将过于精确而不真实（too good to be true）。
    domain: "基础物理，广义相对论，时间计量哲学"
    key_insight: >
      此原理将引力红移从"可修正的扰动"升格为"时间的本质属性"——
      不是引力干扰了钟，而是引力定义了时间。分布式时间计的精度上限
      不是由钟的性能决定，而是由参考系（地球本身）的物理不可重复性决定。
    conditions: "适用于精度 ≥10⁻¹⁷ 的分布式时间比较；共站比对不受此限制"
    source_claim: >
      "the effect of gravity is not to perturb the operation of a clock but to alter time itself.
      At the level of accuracy of parts in 10¹⁷ or 10¹⁸, comparing clocks scattered around the world
      would be no more meaningful than comparing the rates of pendulum clocks on small ships
      scattered in the oceans, each bobbing in its own way and keeping its own time.
      Which clock could be selected to be the keeper of 'true' time? The answer, of course, is 'none.'
      Earth's gravity is inextricably entangled with time but the Earth shimmies and shakes unpredictably."
    open_questions:
      - "Does this imply a fundamental revision of what 'coordinated time' means at >10⁻¹⁷ precision?"
      - "If no Earth-based clock can claim 'true time,' should future primary standards be space-based?"

methods:
  - id: meth.gps_satellite_clock_comparison
    name: "GPS 卫星原子钟远程比较方法"
    status: demonstrated
    applies_to: ent.utc_leap_seconds
    steps_summary: >
      1. 各实验室独立运行其原子频率标准 →
      2. 所有实验室同步观测 GPS 卫星信号 →
      3. 通过比较各站接收到的时间信号差异推导各站钟的频率差异 →
      4. 也可以通过商业通信卫星直接中继信号进行双向比较。
      该方法的频率比较精度约为 1×10⁻¹⁵（2006 年水平）。
    required_hardware:
      - "GPS 接收机（各参与实验室）"
      - "通信卫星中继设备（双向模式下）"
    advantages:
      - "覆盖全球，不依赖专用光纤基础设施"
      - "已大规模部署（55 个国际实验室参与）"
    disadvantages:
      - "精度 ~10⁻¹⁵，无法支持 10⁻¹⁶–10⁻¹⁸ 级光学频率标准比较"
      - "受电离层和对流层延迟影响"
      - "需要知道各实验室高程到米级精度"
    conditions:
      - "参与比较的实验室需知道自身高程（用于引力红移校正）"
      - "信号传播路径需电离层和对流层模型校正"
    source_claim: >
      "The clocks are compared by simultaneously observing signals from GPS satellites
      or by directly relaying signals through commercial satellites. These comparisons can
      currently be carried out to an accuracy in frequency of about 1 part in 10¹⁵."

