entities:
  # ── 框架型实体节点 ─────────────────────────────────────────────────────────
  # ent.si_second_definition：本文件权威定义（timescales 专题顶层）
  # ent.optical_frequency_standard：跨专题引用，定义于
  #   topics/frequency-standards/papers/fortier2026.yaml（不在本文件重复定义）
  # ──────────────────────────────────────────────────────────────────────────
  - id: ent.si_second_definition
    name: "SI 秒定义（当前基于铯，面向光学重定义）"
    aliases: ["SI second", "definition of the second", "秒定义"]
    hierarchy_level: 0
    status: demonstrated
    function: >
      国际单位制中时间基本单位"秒"的定义。当前定义（1967 年起）：
      "秒是铯-133 原子基态两个超精细能级之间跃迁对应辐射的 9 192 631 770 个周期的持续时间。"
      铯喷泉钟当前实现精度约 ~10⁻¹⁶。
      光学频率标准已展示 ~10⁻¹⁸ 级不确定度，推动秒定义从微波跃迁向光学跃迁转变。
    key_parameters:
      current_definition_transition: "¹³³Cs 基态超精细跃迁，9 192 631 770 Hz"
      current_realization_uncertainty: "~1–2×10⁻¹⁶（铯喷泉钟最佳水平）"
      optical_standard_best_uncertainty: "9.4×10⁻¹⁹（²⁷Al⁺ 量子逻辑钟，NIST，综述汇总）"
      secondary_representations_count: "10 个光学跃迁 + 1 个微波跃迁（⁸⁷Rb）已被 CCTF 采纳为秒的次级表示"
      expected_improvement: "重定义后短期实现精度提升 10–100 倍（达 10⁻¹⁷–10⁻¹⁸）"
    note: >
      Level 0 系统级实体，是时间频率计量的最顶层概念，也是 timescales 专题的核心实体。
      本文件（dimarcq2024.yaml）是此节点的权威定义来源。

principles:
  - id: pri.redefinition_criteria_second
    name: "SI 秒重定义强制性标准体系"
    tier: engineering
    verification_status: calculated
    statement: >
      CCTF 定义了 15 条标准（mandatory criteria + ancillary conditions），
      必须在重定义前满足。核心强制性标准包括：
      I.1 — 多个光学频率标准的系统不确定度达到 10⁻¹⁸ 水平；
      I.2 — 独立光钟之间频率比测量一致性达到 5×10⁻¹⁸；
      I.3 — 与当前铯定义的连续性（在铯定义不确定度内一致）；
      I.4 — 光学频率标准定期向 TAI 提供校准数据；
      II.1 — 可持续的光钟比较技术（本地和远程）；
      II.2 — 本地重力位知识精度达到 10⁻¹⁸ 等效水平（~0.1 m² s⁻²）；
      III.1 — 新定义允许未来进一步改善。
    domain: "计量学，SI 单位制，时间频率标准"
    key_insight: >
      秒定义重定义不仅是物理精度问题，还涉及全球计量基础设施的就绪度。
      最严格的技术障碍是：多个独立实验室的光钟比较一致性须达到 5×10⁻¹⁸。
    conditions: "由 CCTF Task Force 定义和维护，CGPM 最终批准"
    preconditions:
      - "至少 3 种以上光学跃迁类型的频率标准达到 10⁻¹⁸ 系统不确定度"
      - "洲际光钟比较在 5×10⁻¹⁸ 水平一致"
      - "光学频率标准定期、可靠地向 TAI 贡献"
      - "商用光学频率标准可获取"
    invalidated_when:
      - "CGPM 决定推迟重定义（标准未满足）"
      - "新的基本物理发现使光学跃迁频率比不再是常数"
    source_claim: >
      "Offers an improvement by 10–100 of the uncertainty of the realization of the new definition 
      in the short term after the redefinition (reaching 10⁻¹⁷–10⁻¹⁸ relative frequency uncertainty)"
    open_questions:
      - "Will a single-transition or multi-transition definition be adopted? Community consensus remains elusive as of 2024."
      - "Can the I.2 criterion (frequency ratio agreement at 5×10⁻¹⁸ across independent laboratories) be reliably demonstrated within the 2026-2030 timeframe?"
      - "How will the new definition impact UTC and TAI generation algorithms? Will optical clocks need to operate continuously, or can intermittent calibration suffice?"
    contested_claims:
      - claim: "Whether a single-transition definition (Option 1) or a multi-transition weighted geometric mean (Option 2) provides better long-term metrological stability"
        status: unresolved
        disputed_by: {zotero_key: "SDG6KXNZ", claim: "The CCTF has analysed the various options... debate continues"}
        note: "Option 1（单一跃迁）简单直观但难以达成共识；Option 2（多跃迁平均）灵活但概念复杂"

  - id: pri.secondary_representation_si_second
    name: "SI 秒次级表示（Secondary Representations of the SI Second, SRS）"
    tier: engineering
    verification_status: observed
    statement: >
      CCTF 通过的"秒的次级表示"机制：除铯超精细跃迁（primary）外，
      某些光学和微波跃迁经充分测量后被赋予推荐频率值和不确定度，
      可用于辅助实现 SI 秒。当前 10 个光学跃迁和 1 个微波跃迁（⁸⁷Rb）已被采纳。
      SRS 的不确定度目前主要受限于铯标准的不确定度（~10⁻¹⁶），而非光学标准自身。
    domain: "计量学，SI 单位制"
    formula: null
    key_insight: >
      SRS 机制是从铯定义到光学定义的过渡桥梁：光学标准在重定义前就可通过 SRS
      参与 TAI 校准，积累运行经验和可靠性记录。
    conditions: "需要高精度绝对频率测量（相对于铯标准）和多个独立实验室的重复验证"
    source_claim: >
      "Presently, ten optical transitions and one microwave transition (⁸⁷Rb) are recommended as SRS"

methods:
  - id: meth.optical_clock_comparison
    name: "光钟比较方法（本地与远程）"
    status: demonstrated
    applies_to: ent.optical_frequency_standard
    steps_summary: >
      1. 本地比较：两台光钟通过频率梳直接比较频率比 →
      2. 远程比较：通过光纤链路或卫星链路传递光学/微波参考频率 →
      3. 绝对频率测量：光钟频率通过频率梳与铯喷泉钟比较（限于 ~10⁻¹⁶）→
      4. 频率比测量：直接比较两台光钟的频率比（不受铯限制，可达 <10⁻¹⁸）
    required_hardware:
      - ent.optical_frequency_standard
    advantages:
      - "频率比测量可达 <10⁻¹⁸ 精度"
      - "本地比较可在数小时内完成"
    disadvantages:
      - "远程比较需要超高稳定度光纤链路或先进卫星链路"
      - "绝对频率测量受限于铯标准精度 (~10⁻¹⁶)"
      - "重力位校正精度需达到 ~0.1 m² s⁻²"
    conditions:
      - "本地比较：同一实验室内两台独立光钟"
      - "远程比较：需光纤相位噪声补偿或卫星双向传递"
    source_claim: >
      "simultaneous measurements of the same optical frequency ratio with two independent OFCs 
      have shown agreement at the level of 10⁻²¹"

metrics:
  # ── 框架级汇总指标 ─────────────────────────────────────────────────────────
  # 综述/路线图汇总的领域最佳值。verification_status: inferred（路线图引用原始数据）。
  # 具体原始测量值由各频率标准技术论文（frequency-standards 专题）提供。
