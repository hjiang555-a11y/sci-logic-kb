  - id: met.optical_clock_systematic_uncertainty
    name: "光学频率标准系统不确定度"
    unit: "无量纲（分数频率不确定度）"
    description: >
      光学频率标准的系统效应总不确定度，是评价光钟准确度的核心指标。
      包括黑体辐射频移、碰撞频移、格子光频移、运动效应、外场效应等所有已知系统效应。
      此处为路线图汇总值（verification_status: inferred），原始测量参见 frequency-standards 专题各技术论文。
    demonstrated_value:
      value: "9.4×10⁻¹⁹（²⁷Al⁺ 量子逻辑钟，NIST，路线图汇总）"
      conditions: "²⁷Al⁺ 单离子，量子逻辑探测，NIST Boulder"
      verification_status: inferred
      confidence: established
      source: {zotero_key: "SDG6KXNZ", claim: "The current record for systematic uncertainty of an atomic clock is held by the ²⁷Al⁺ quantum logic clock, with a fractional frequency systematic uncertainty of 9.4 × 10⁻¹⁹"}
    historical_landmarks:
      first_demonstration:
        value: "~10⁻¹⁵（早期铯喷泉钟，~1990s）"
        year: 1995
        source: {zotero_key: "SDG6KXNZ"}
        note: "铯喷泉钟时代"
      best_demonstration:
        value: "9.4×10⁻¹⁹"
        year: 2019
        source: {zotero_key: "SDG6KXNZ"}
        note: "²⁷Al⁺ NIST 量子逻辑钟（Brewer et al. 2019），路线图汇总"
      selected_milestones:
        - year: 2019
          value: "9.4×10⁻¹⁹（²⁷Al⁺）"
          source: {zotero_key: "SDG6KXNZ"}
          note: "当前世界纪录（路线图汇总，2024年数据）"
        - year: 2021
          value: "~1×10⁻¹⁸（⁸⁷Sr 和 ¹⁷¹Yb 光晶格钟）"
          source: {zotero_key: "SDG6KXNZ"}
          note: "中性原子光晶格钟也进入 10⁻¹⁸ 量级"
    open_questions:
      - "Can optical lattice clocks (Sr, Yb) reach below 10⁻¹⁹ systematic uncertainty to match or surpass single-ion clocks?"
      - "Will the ²²⁹Th nuclear clock achieve competitive systematic uncertainties, leveraging nuclear transition's insensitivity to external fields?"

  - id: met.frequency_ratio_agreement_cross_lab
    name: "跨实验室光钟频率比一致性"
    unit: "无量纲（分数频率差异）"
    description: >
      不同实验室独立测量同一光学频率比的一致性，
      是验证光钟不确定度预算和秒定义重定义就绪度的关键指标。
    demonstrated_value:
      value: "部分频率比已在 ~10⁻¹⁷ 水平一致，但多数尚未达到 5×10⁻¹⁸ 目标"
      conditions: "Sr/Sr、Yb/Yb 同种比较最佳；异种比较和洲际比较仍在进行中"
      verification_status: inferred
      confidence: likely
      source: {zotero_key: "SDG6KXNZ", claim: "Mandatory criterion I.2: validation of OFS accuracy budgets through frequency ratios"}
    theoretical_floor:
      value: "原则上无基本物理限制——受限于光钟系统不确定度和比较链路噪声"
      basis: "光钟不确定度和时间频率传递技术"
      gap_note: "目标 5×10⁻¹⁸ 一致性尚未在洲际范围内普遍实现"

