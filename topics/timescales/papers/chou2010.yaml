  authors:
    - "C. W. Chou"
    - "D. B. Hume"
    - "T. Rosenband"
    - "D. J. Wineland"
  journal: "Science"
  volume: 329
  pages: "1630-1633"
  doi: "10.1126/science.1192720"
  note: >
    [实验] NIST 用两台 ²⁷Al⁺ 量子逻辑光钟（分别以 Be⁺ 和 Mg⁺ 为逻辑离子）通过 75 m 相位稳定光纤比较，
    检测到 <10 m/s 速度引发的狭义相对论时间膨胀、33 cm 高度差引发的引力红移。
    首次将相对论验证从宇宙尺度/高速带入人类日常尺度，并提出光钟测地学（clock-based geodesy）概念。

