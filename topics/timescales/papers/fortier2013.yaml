metrics:
  - id: met.mutc_10ghz_integrated_timing_jitter
    name: "MUTC PD 光子微波 10 GHz 绝对集成定时抖动"
    unit: "秒（s）"
    description: >
      从 1 Hz 到 10 MHz 积分区间内的 10 GHz 微波载波绝对定时抖动。
      通过互相关法测量两台独立光子振荡器的合成噪声（trace 3(b)），
      假定两振荡器等贡献后推算单台值。是 OFD 微波生成的最直接时域性能指标，
      直接关联到时标生成中微波参考信号的定时精度。
    demonstrated_value:
      value: "<500 as（单台振荡器；两台合成测量值为 700 as）"
      conditions: "10 GHz 载波，各 PD 21 V/19 V 偏压，~15 mA 光电流，+8 dBm 微波功率；积分区间 1 Hz–10 MHz"
      verification_status: inferred
      confidence: established
      source:
        zotero_key: "1302.5927"
        claim: "The integrated timing jitter of the combined oscillators [trace 3(b)] is only
        700 attoseconds (1 Hz to 10 MHz), or about 500 as for a single oscillator, assuming
        both oscillators are equal."

  - id: met.mutc_10ghz_phase_noise_floor
    name: "MUTC PD 光子微波 10 GHz 绝对相位噪声底"
    unit: "dBc/Hz"
    description: >
      单台光子振荡器 10 GHz 载波的绝对相位噪声底（偏移频率 >1 MHz）。
      通过互相关法测量两台振荡器合成噪声（trace 3(b)），扣除放大器噪声贡献
      （~–178 dBc/Hz，独立测量），并假定两振荡器等贡献后得到单台值。
      与残余噪声测量（trace 3(a)）的 –174 dBc/Hz 底一致——残余测量反映
      纯光电检测噪声，绝对测量还包含 OFD 自身噪声。
    demonstrated_value:
      value: "–177 dBc/Hz"
      conditions: "10 GHz 载波，>1 MHz 偏移频率；扣除放大器噪声后，假定两振荡器等贡献"
      verification_status: inferred
      confidence: established
      source:
        zotero_key: "1302.5927"
        claim: "After accounting for the noise contributed by the amplifier, and assuming
        equal contribution of noise for each OFD, we arrive at a single oscillator phase
        noise floor of –177 dBc/Hz."

  - id: met.mutc_10ghz_signal_power
    name: "MUTC PD 10 GHz 微波载波最大功率"
    unit: "dBm"
    description: >
      MUTC PD 在 980 nm ~1 ps 脉冲照明下生成的 10 GHz 微波信号功率。
      相比此前 PIN 或其他类型光电二极管 ~–10 dBm 的结果 [1,9,10]，
      功率提高 >30 倍（>15 dB），是高功率微波驱动应用的关键性能指标。
    demonstrated_value:
      value: "+14 dBm"
      conditions: "56 μm MUTC PD，21 V 偏压，~125 mW 入射的 2 GHz 脉冲序列，37 mA 平均光电流"
      verification_status: observed
      confidence: established
      source:
