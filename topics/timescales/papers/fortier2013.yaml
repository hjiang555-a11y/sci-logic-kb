entities:
  - id: ent.mutc_photonic_microwave_generator
    name: "MUTC 光电二极管光子微波发生器（基于光频率分频的低噪声 10GHz 微波源）"
    aliases: ["photonic microwave generator", "MUTC PD microwave source", "光子微波发生器", "MUTC OFD microwave generator"]
    hierarchy_level: 1
    status: demonstrated
    function: >
      利用高功率、高线性度 MUTC（modified uni-traveling carrier）光电二极管，
      结合光频率分频（OFD）技术，将飞秒 Ti:sapphire 锁模激光器 ~1 ps 脉冲序列的
      稳定定时转换为低相位噪声 10 GHz 微波载波。
      MUTC 结构通过三个关键设计抑制空间电荷效应：(1) 掺杂 InP 收集区预畸变内建电场、
      (2) 部分未耗尽吸收区维持异质结高电场、(3) 电荷"cliff"层定制电场剖面。
      采用 Mach-Zehnder 脉冲交织器将入射重复频率从 1 GHz 加倍至 2 GHz，
      进一步提高线性度。该系统在 10 GHz 实现了当时最低的 OFD 微波相位噪声。
    key_parameters:
      carrier_frequency: "10 GHz"
      max_signal_power: "+14 dBm @ 37 mA 光电流，21 V 偏压，2 GHz 脉冲序列"
      am_pm_coefficient_range: "<0.1 rad (I_ph < 20 mA, 21 V 偏压, 2 GHz 脉冲序列)"
      residual_flicker_noise: "–122 f⁻¹ dBc/Hz（21 V/18 mA）；可降至 –127 f⁻¹ dBc/Hz（10 V/15 mA）"
      residual_noise_floor: "–174 dBc/Hz @ 1 MHz offset（21 V/18 mA）"
      responsivity: "~0.3 A/W @ 980 nm（抗反射涂层，自由空间入射）"
      pd_diameter: "56 μm"
    note: >
      Level 1 子系统实体——光频率分频（OFD）微波生成链中的光→电转换环节。
      OFD 是连接光学频率标准（光钟）与微波时标的关键技术：光学稳定度通过除法
      传递到微波域而不引入额外分数不稳定度（除光电检测噪声外）。MUTC PD 在此环节
      以最小化附加噪声（AM-PM、flicker、热噪声）为目标，直接影响最终微波信号纯度。
      与 meth.mutc_pd_photonic_microwave_generation 方法配对，
      构成时标生成链路中"光参考→实用微波信号"的核心转换节点。

principles:
  - id: pri.ofd_transfers_optical_stability_to_microwave
    name: "光频率分频（OFD）将光学参考稳定度无噪声传递至微波域"
    tier: engineering
    verification_status: observed
    statement: >
      光频率分频（OFD）利用飞秒激光频率梳将稳定光学参考的相位信息
      编码到脉冲序列定时中。光电检测该稳定光脉冲序列产生电子脉冲序列，
      其频谱由高光谱纯度谐波组成（延伸至光电二极管截止带宽）。
      频率下转换过程——光频 ν_opt（~10¹⁴–10¹⁵ Hz）除以梳模数 N（~10⁴–10⁵）
      得到微波频率 f_rep（~10¹⁰ Hz）——在保留相对频率稳定度（σ_y）
      的同时引入光电检测附加噪声。OFD 实现噪声底的关键瓶颈在光→电转换环节，
      其中光电二极管的非线性（AM-PM）和固有噪声决定了最终微波信号纯度。
    domain: "光子学，时间频率计量"
    key_insight: >
      OFD 是光钟→微波时标的核心技术桥梁。光频 ν_opt 和微波频率 f_rep 的
      分数稳定度理论上相同（σ_y 在除法中不变），但实际性能受限于光电检测噪声。
      降低光电二极管的 AM-PM 转换、flicker 噪声和热噪声是提升 OFD 性能的关键。
    formula: "f_rep = ν_opt / N，其中 N 为梳模数（~10⁴–10⁵）；σ_y(f_rep) ≈ σ_y(ν_opt)（忽略检测噪声）"
    conditions: "需要稳定光学参考 + 锁模飞秒激光器 + 低噪声光电检测；OFD 自身不引入分数频率不稳定度，但光电检测引入加性相位噪声"
    source_claim: >
      "In optical frequency division (OFD), the stability of the optical reference is
      transferred to the timing in the pulse train of a modelocked laser. Photodetection
      of this stable optical pulse train generates an electronic pulse train with a spectrum
      composed of high spectral purity harmonics of the pulse repetition rate, up to the
      cut-off bandwidth of the photodiodes (PD)."

  - id: pri.am_pm_conversion_couples_rin_to_phase_noise
    name: "光电检测中的 AM-PM 转换将光脉冲 RIN 耦合为微波相位噪声"
    tier: engineering
    verification_status: observed
    statement: >
      在脉冲照明条件下，峰值光功率可比平均功率高 >1000 倍，产生极高密度的
      光生载流子。受限于有限载流子迁移率，空间电荷产生与外加反向偏压对抗的
      电场，减慢光电二极管响应时间并引入与光电流强度相关的相位延迟（AM-PM 转换）。
      AM-PM 对单边带相位噪声的贡献为 L_RIN(f) = RIN + 20 log(α) – 3 dB，
      其中 α = Δφ_rms / (ΔI/I)（RMS 相位变化 / 光电流分数变化）。
      α < 0.1 rad 时 AM-PM 贡献的相噪比 RIN 低 23 dB——使其不构成主导噪声源。
    domain: "光电检测，微波光子学"
    formula: "L_RIN(f) = RIN + 20 log(α) – 3 dB；α = Δφ_rms / (ΔI/I)"
    key_insight: >
      AM-PM 转换是脉冲 OFD 微波生成中相位噪声退化的首要机制之一。
      线性度足够高时（α < 0.1 rad），RIN 的相噪贡献可被压制在底噪之下。
      提高偏压、增加有效重复频率（脉冲交织）和使用 MUTC 结构均可降低 α。
    conditions: "脉冲照明下显著于 CW 照明（峰值功率 ~1000 倍）；低偏压时更严重；光电流接近饱和区时 α 急剧增大"
    source_claim: >
      "the AM-PM contribution to the single sideband phase noise being,
      L_RIN (f) = RIN + 20 log (α) – 3 dB, a value of α < 0.1 rad would result in
      phase noise 23 dB lower than the RIN on the optical pulse train."

  - id: pri.mutc_structure_suppresses_space_charge
    name: "MUTC 光电二极管结构通过预畸变电场设计抑制空间电荷非线性效应"
    tier: engineering
    verification_status: observed
    statement: >
      MUTC 光电二极管设计包含三个关键特征以抑制空间电荷效应：
      (1) 掺杂 InP 收集区——预畸变静态内部电场，防止高电流下异质结界面电场崩塌；
      (2) 部分未耗尽吸收区——维持异质结界面高电场；
      (3) 电荷"cliff"层——定制电场剖面，防止高光电流下耗尽吸收区电场崩塌。
      这三项特征共同作用，使 MUTC PD 在高光电流下保持高速响应和低非线性，
      此前已在 1550 nm 振幅调制 CW 光照下实现 15 GHz 近 1W 微波功率输出。
      在本工作中，该结构使 980 nm 脉冲照明下 AM-PM 系数 <0.1 rad（<20 mA）。
    domain: "半导体物理，光电探测器设计"
    key_insight: >
      传统 PIN 光电二极管通过减薄吸收区缓解空间电荷效应（牺牲响应度）。
      MUTC 设计采取不同策略：通过内建电场工程主动抵消空间电荷——
      如同预加载弹性力对抗已知负载。这实现了高光电流下线性度与响应度的兼顾，
      是 OFD 微波生成中光电检测噪声最小化的物理基础。
    conditions: "需有效散热——高偏压 + 高光电流造成显著热负载；热效应可能影响长期稳定性和 flicker 噪声水平"
    source_claim: >
      "the MUTC PDs employ an InP collector that is doped to predistort the static
      internal electric field; this prevents field collapse at the heterojunction
      interface at high current. A portion of the absorber is undepleted in order
      to maintain high field across the heterojunctions. The structure also has a
      charge or 'cliff' layer that tailors the electric field profile to prevent the
      field in the depleted absorber from collapsing at high photocurrent."

methods:
  - id: meth.mutc_pd_photonic_microwave_generation
    name: "MUTC 光电二极管光子微波生成方法（OFD + 脉冲交织 + MUTC 检测）"
    status: demonstrated
    applies_to: ent.mutc_photonic_microwave_generator
    steps_summary: >
      1. 飞秒 Ti:sapphire 锁模激光器产生 ~1 ps 啁啾脉冲序列（1 GHz 基频重复频率）→
      2. 自由空间 Mach-Zehnder 脉冲交织器将重复频率加倍至 2 GHz（提高有效重复频率以增强线性度）→
      3. 交织后的脉冲序列以 980 nm 自由空间入射至 MUTC PD（抗反射涂层，56 μm 直径，响应度 ~0.3 A/W）→
      4. 通过微波探针（GSG probe）+ bias-T 施加反向偏压（9–21 V）并提取 10 GHz 微波信号→
      5. 在 21 V 偏压、~125 mW 入射的 2 GHz 脉冲条件下获得最佳性能（+14 dBm, α < 0.1 rad）
    required_hardware:
      - "飞秒 Ti:sapphire 锁模激光器（1 GHz 重复频率，~1 ps 脉宽，980 nm 中心波长）"
      - "自由空间 Mach-Zehnder 脉冲交织器（类似光纤实现 [15,16]，但为自由空间）"
      - "MUTC 光电二极管（56 μm 直径，抗反射涂层 980 nm，响应度 ~0.3 A/W）"
      - "GSG 微波探针 + bias-T（用于偏压施加和微波提取）"
      - "稳定 CW 激光器（作为 OFD 光频参考，非本文重点描述）"
    advantages:
      - "10 GHz 载波功率 +14 dBm——比此前 PIN PD 结果高 >30 倍（此前约 –10 dBm [1,9,10]）"
      - "AM-PM 系数 <0.1 rad @ <20 mA——RIN→相噪耦合被降低至非主导水平"
      - "绝对集成定时抖动 <500 as (1 Hz–10 MHz)——单台振荡器"
    disadvantages:
      - "高偏压 + 高光电流产生显著热负载，可能影响长期稳定性和 flicker 噪声"
      - "AM-PM 零点的位置对工作条件敏感，可能随时间漂移"
      - "微波放大器噪声（~–178 dBc/Hz）成为相噪底的实际限制——而非 PD 自身"
    conditions:
      - "21 V 偏压 + 2 GHz 脉冲序列实现最佳线性度"
      - "1 GHz 脉冲序列和低偏压（9 V）下 α 更大且随光电流变化更剧烈"
      - "最终微波相噪底受限于测量系统中的放大器噪声（–178 dBc/Hz）和热噪声"
    source_claim: >
      "With 21 V bias and approximately 125 mW of the 2 GHz pulse train incident,
      the MUTC PD generated a 10 GHz carrier with +14 dBm at 37 mA of average photocurrent."

  - id: meth.am_pm_coefficient_measurement
    name: "AM-PM 转换系数 α 测量方法"
    status: demonstrated
    applies_to: pri.am_pm_conversion_couples_rin_to_phase_noise
    steps_summary: >
      1. 对光脉冲序列施加已知幅度的强度调制（产生已知 ΔI/I）→
      2. 测量 10 GHz 微波载波上由此产生的相位调制（Δφ_rms）→
      3. 计算 α = Δφ_rms / (ΔI/I) → 4. 在不同偏压（9 V/21 V）、
      不同脉冲重复频率（1 GHz/2 GHz）、不同平均光电流下重复测量获得 α 曲线
    required_hardware:
      - "光强度调制器"
      - "相位噪声测量系统"
      - "MUTC PD + bias-T + 微波探针"
    advantages:
      - "直接定量表征 AM-PM 转换强度"
      - "可识别 α 过零点作为低噪声运行的最优工作点"
    disadvantages:
      - "α 零点位置对偏压、温度、光功率等工作条件敏感"
    conditions:
      - "测量方法与 Ref. [14] (Zhang et al., Appl. Phys. B, 2012) 类似"
    source_claim: >
      "We measured α for the MUTC PD in a manner similar to that in Ref. [14]."

  - id: meth.cross_correlation_phase_noise_measurement
    name: "互相关频谱分析残余相位噪声测量方法"
    status: demonstrated
    applies_to: ent.mutc_photonic_microwave_generator
    steps_summary: >
      1. 从单个 OFD 系统（经 MZ 交织器后）分束光脉冲序列 → 2. 分别照射两个独立
      MUTC PD（相同工作条件）→ 3. 两路 10 GHz 输出馈入互相关频谱分析仪 →
      4. 通过长时间互相关平均消除非相关噪声（OFD 自身噪声、独立 PD 噪声），
      提取两路共享的共模残余噪声（反映 PD 固有噪声：AM-PM flicker + 热噪声 + 散粒噪声）
    required_hardware:
      - "光分束器"
      - "两个独立 MUTC PD"
      - "互相关频谱分析仪（cross-correlation spectral analyzer）[20,21]"
      - "10 dB 微波放大器（驱动混频器用）"
    advantages:
      - "消除 OFD 共模噪声，仅测量光电检测附加噪声"
      - "互相关增益使测量本底噪声低于单通道系统噪声底"
    disadvantages:
      - "放大器贡献的非共模噪声需单独估算和扣除"
      - "两路对称性偏差可能引入系统误差"
      - "散粒噪声贡献计算值 <–200 dBc/Hz，远低于测量本底——不构成实际限制"
    conditions:
      - "18 mA 光电流 / PD，21 V 偏压，每路 ~+10 dBm @ 10 GHz"
      - "电损耗约 –4 dB 后馈入相关器；其中一路需额外 10 dB 放大"
    source_claim: >
      "The residual measurement was obtained by splitting the pulse train from a single OFD,
      after the Mach-Zehnder interleaver, and illuminating two separate photodiodes.
      The generated 10 GHz signals were then compared using cross-correlation spectral
      analysis to determine the phase noise [20, 21]."

