# Fortier 2013 — 高功率 MUTC 光电二极管光子微波生成 [时间标尺专题]
# 提取者：Claude Code
# 提取日期：2026-05-03
# Schema版本：v4.0
# 专题：timescales
# contribution_type: evidence — 工程改进：利用 MUTC PD 实现更低附加噪声的 OFD 微波生成。
#   Fortier 2013 报告了利用高功率、高线性度 MUTC 光电二极管进行光频率分频（OFD）
#   光子微波生成的系统表征。实现了 10 GHz 微波绝对定时抖动 <500 as 和相位噪声底 –177 dBc/Hz。
#   本文是光频率分频（OFD）微波生成技术的工程优化，不提出新物理原理，
#   但大幅提升了从光学频率标准到微波域的转换性能——这对时标生成有直接意义。

