  journal: "Optics Letters"
  volume: 38
  pages: "1712"
  doi: "10.1364/OL.38.001712"
  note: >
    [实验/工程改进] timescales 专题工程证据文档。
    利用高功率、高线性度 MUTC（modified uni-traveling carrier）光电二极管，
    通过光频率分频（OFD）技术从飞秒激光频率梳生成低相位噪声 10 GHz 微波信号。
    核心成果：10 GHz 载波功率 +14 dBm、绝对集成定时抖动 <500 as (1 Hz–10 MHz)、
    相位噪声底 –177 dBc/Hz、AM-PM 系数 <0.1 rad（<20 mA 光电流）。
    OFD 是光钟→微波时标的关键技术桥梁——MUTC PD 在此转换中实现了当时最低的附加噪声，
    将光学标准稳定度以最小退化传递至微波域，为时标生成和光钟比较提供高纯度参考信号。
    本文不重新定义 OFD 原理，而是通过 MUTC 结构优化光电检测环节的性能。

