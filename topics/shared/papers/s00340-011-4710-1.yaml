  name: AM-to-PM conversion in photodiodes
  tier: engineering
  verification_status: observed
  statement: In InGaAs pin photodiodes illuminated by femtosecond pulse trains, the phase of the output microwave signal depends on the incident optical pulse energy. This AM-to-PM conversion arises from
    carrier dynamics (space charge effects and carrier screening), intensifying near and above saturation.
  domain: photodetection, microwave photonics
  key_insight: AM-to-PM conversion in photodiodes is a significant source of phase noise in photonically generated microwave signals; mitigation requires optical power stabilization or low-conversion-coefficient
    detectors
  conditions: Femtosecond laser pulse illumination; InGaAs pin structure; pulse energy from linear to saturation regime
  source_claim: the phase of these components (relative to the optical pulse train) is known to be dependent on the optical energy per pulse
