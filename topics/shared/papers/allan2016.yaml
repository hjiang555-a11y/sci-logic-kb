principles:
  - id: pri.allan_variance_time_domain_characterization
    name: "Allan 方差族时域不稳定度刻画原理（综合 AVAR/MVAR/TVAR）"
    tier: foundational
    verification_status: accepted
    statement: >
      对于非平稳随机过程（含 1/f 闪烁噪声），经典方差发散；Allan 方差（二次差分
      形式 σ²_y(τ) = ⟨(ȳ_{n+1}−ȳ_n)²⟩/2）及其 Modified/Time variants 在 1960–1980
      发展完成，成为精密钟/振荡器 short-term/medium-term 不稳定度事实标准。
      各变体通过不同带限与平均窗对不同噪声类型（白 PM、闪 PM、白 FM、闪 FM、
      random-walk FM）给出无偏高效估计，强弱各异。
    domain: "时频计量方法论；振荡器表征"
    conditions: "数据长度 N ≥ ~10 个 τ 窗；采样周期均匀"
    source_claim: "variances have been developed for characterizing the instabilities of precision clocks and oscillators"

