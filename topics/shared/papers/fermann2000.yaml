    光纤链路脉冲传输。

entities:
  - id: ent.fermann2000_parabolic_amplifier
    name: "Fermann 2000 Yb 掺杂光纤抛物线脉冲放大器"
    tier: system
    domain: "非线性光纤光学；超快脉冲放大"
    description: >
      3.6 m Yb 掺杂光纤放大器（正常色散 β₂ = +25×10⁻³ ps²/m，非线性系数
      γ = 5.8×10⁻³ W⁻¹m⁻¹，分布增益 g = 1.9 m⁻¹），以 200 fs / 12 pJ
      Gaussian 脉冲种子，30 dB 增益下输出 2.6 ps / 12 nJ 抛物线脉冲，
