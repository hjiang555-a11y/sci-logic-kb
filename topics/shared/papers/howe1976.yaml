    积分公式 σ_y²(τ) = 2 ∫₀^{f_h} S_y(f) · sin⁴(π f τ) / (π f τ)² df。本文件确立频域
    PSD 测量方法的行业规范，是所有现代相位噪声分析仪、商业频率稳定度分析软件（Stable32 
    / AllanTools / TimeLab 等）的理论基础。
