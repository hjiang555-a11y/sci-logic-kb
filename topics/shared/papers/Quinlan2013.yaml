principles:
- id: pri.shot_noise_frequency_domain_pulse_detection
  name: Shot noise frequency-domain model for pulse detection
  tier: domain
  verification_status: calculated
  statement: Shot noise in photodetection of ultrashort optical pulse trains can be described by a time-varying frequency-domain model. Spectral correlations in shot noise depend on the optical pulse width
    relative to the photodetector response time. Short pulses yield strong spectral correlations, creating an imbalance between amplitude and phase noise. Only by accounting for spectral correlations can
    shot noise be equated with the fundamental quantum limit of pulse timing jitter.
  domain: signal detection theory, optical frequency metrology
  formula: PSD_shot proportional to q * I_avg * |H(f)|^2 * S(f), S(f) = pulse train spectral shape factor
  key_insight: Spectral correlations in shot noise explain why amplitude noise can be orders of magnitude lower than phase noise in photonically generated microwave signals
  conditions: Ultrashort optical pulse trains (fs-ps); photodetector bandwidth > pulse repetition rate; linear response regime
  source_claim: the strength of the spectral correlations in the shot noise depends on the optical pulsewidth, and these correlations can create orders-of-magnitude imbalance between the shot-noise-limited
    amplitude and phase noise
methods:
- id: meth.shot_noise_spectral_correlation_analysis
  name: Shot noise spectral correlation analysis method
  status: demonstrated
  applies_to: cross-topic (OFC microwave generation, frequency transfer, optical clock interrogation)
  steps_summary: Time-varying photocurrent autocorrelation → Fourier transform to frequency domain → PSD expression with finite detector response → amplitude/phase noise imbalance analysis
  advantages:
  - First frequency-domain model explicitly including finite detector response
  - Unifies shot noise with quantum limit of timing jitter
  source_claim: a frequency domain description of the shot noise of time-varying signals revealed that spectral correlations explained a reduction in the sensitivity of some gravitational wave detectors
