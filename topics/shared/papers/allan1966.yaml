# Allan 1966 — Statistics of Atomic Frequency Standards（σ_y(τ) 两样本 Allan 方差原始定义）[framework]
# 提取者：GitHub Copilot（AI 草稿，待专家确认）
# 提取日期：2026-04-23
# Schema版本：v4.5
# 专题：shared（时频计量数学基础 · B9 Allan–Howe 奠基白名单）
# contribution_type: framework — 时频计量分数频率不稳定度表征的奠基文献。
#   定义：两样本（Allan）方差 σ_y²(τ) 作为频率稳定度标准度量；揭示经典方差在 flicker / random-walk
#         噪声下的发散问题；为后续 ADEV / MDEV / Hadamard / Theo1 全部派生方差提供出发点。

meta:
  zotero_key: "ALLAN1966-PROCIEEE"
  topic: shared
  source_type: journal_paper
  contribution_type: framework
  reliability: high
  title: "Statistics of Atomic Frequency Standards"
  year: 1966
  first_author: Allan
  authors: ["David W. Allan"]
  journal: "Proceedings of the IEEE"
  volume: 54
  issue: 2
  pages: "221-230"
  doi: "10.1109/PROC.1966.4634"
  note: >
    [奠基期刊论文 · < 1999 年白名单 §A] 时频计量统计学的开山之作。定义"两样本方差"
    σ_y²(τ) = ½⟨(ȳ_{k+1} − ȳ_k)²⟩（后世称 Allan 方差 / ADEV），作为对连续相邻两段
    归一化频率偏差平均值差的方差。与经典方差的关键区别：Allan 方差对 flicker FM 与
    random-walk FM 等非平稳噪声收敛，而经典标准差发散——这使得 σ_y(τ) 可以作为
    跨时间尺度可复现比较的不稳定度度量。本论文在频率标准/时钟表征领域已被整个学科
    共识为度量标准，所有现代时频稳定度分析（ADEV / MDEV / OADEV / HDEV / TOTDEV
    / Theo1 / Theoh）均在此基础上派生。本文件作为时频数学基础专题（topics/shared/）
    的首个 framework 种子文档。

entities: []

principles:
  - id: pri.classical_variance_divergence_for_flicker_noise
    name: "经典方差对 flicker / random-walk 频率噪声发散原理"
    tier: meta
    verification_status: observed
    statement: >
      "对于幂律谱密度 S_y(f) ∝ f^α（α ∈ {−2, −1, 0, 1, 2}）描述的频率噪声，
      经典标准差（样本方差 s² = (N−1)⁻¹ Σ(y_i − ȳ)²）在 α ≤ 0（flicker FM 或
      random-walk FM）时随样本数 N 发散——即 s² → ∞ as N → ∞，因此经典方差
      不是这类噪声下频率稳定度的可复现度量。"
      这一观察是 Allan 方差被提出的直接动因。
    domain: "时频计量；频率稳定度表征；统计学"
    key_insight: >
      将频率标准作为随机过程看待时，其噪声谱既包含 white FM（α=0，经典方差收敛）
      也包含 flicker FM / random-walk FM（α ≤ 0，经典方差发散）。若希望有一个
      "稳定度数字"可在不同实验室、不同时长样本之间比较，必须改用对非平稳噪声收敛
      的度量。这为两样本差分方差（Allan 方差）的引入奠定基础。
    conditions: "单一频率标准或两钟比对序列；采样时间 τ 固定；频率噪声可用幂律 PSD 描述"
    formula: "S_y(f) = h_alpha · f^alpha; classical s^2(N) diverges for alpha in {-1, -2} as N -> inf"
    source:
      zotero_key: "ALLAN1966-PROCIEEE"
      claim: >
        "for flicker and random-walk noise modulations, the classical variance depends on the
        data length and sample time, and does not converge to a limit as the number of data
        points is increased."

  - id: pri.two_sample_variance_converges
    name: "两样本（Allan）方差对幂律噪声收敛原理"
    tier: meta
    verification_status: observed
    statement: >
      "定义两样本方差 σ_y²(τ) = ½⟨(ȳ_{k+1} − ȳ_k)²⟩，其中 ȳ_k 是第 k 段
      长度为 τ 的归一化频率偏差平均。该量对 S_y(f) ∝ f^α（α ∈ [−2, 2]）
      所描述的全部常见频率噪声都收敛到独立于样本数 N 的有限值，且可通过对不同 τ
      绘制 log σ_y vs log τ 辨识噪声类型（斜率 μ 映射到 α）。"
      σ_y(τ) 即 Allan 偏差（ADEV），是时频计量的标准频率稳定度度量。
    domain: "时频计量；统计时频学"
    key_insight: >
      差分操作（相邻两段平均值之差）本身起到了对低频幂律噪声的抑制作用（类似一阶
      高通），使 σ_y 在 flicker / random-walk 区也有限、可复现。这是 Allan 方差
      替代经典方差成为时频领域度量标准的理论基础。
    conditions: "连续无间断频率计数数据，相邻段长 τ 等长，dead time = 0（否则需 Yoshimura 修正）"
    formula: >
      sigma_y^2(tau) = <(y_{k+1} - y_k)^2> / 2
      S_y(f) proportional_to f^alpha  =>  sigma_y^2(tau) proportional_to tau^mu
      with  mu = -alpha - 1  (for alpha <= 1)
    source:
      zotero_key: "ALLAN1966-PROCIEEE"
      claim: >
        "σ²(2, τ, τ) = ⟨(ȳ_{k+1} − ȳ_k)²⟩/2 ... is used as a standard measure of frequency
        stability because it converges for all power-law noises commonly encountered."

methods:
  - id: meth.allan_deviation_adev
    name: "Allan 偏差（两样本 Allan 方差开方，ADEV / σ_y(τ)）"
    purpose: >
      时域频率稳定度表征的标准度量。测量频率标准在积分时间 τ 下的分数频率不稳定度，
      用于跨实验室、跨代际钟比对的通用性能指标。是所有现代派生方差（MDEV / OADEV /
      HDEV / TOTDEV / Theo1）的出发点。
    description: >
      取一段无间断频率计数（或相位计数差分）数据 y_1, y_2, …, y_N（每点为 τ 长度内
      归一化频率偏差平均），计算相邻两点差分平方的均值的一半，再开方：
      σ_y(τ) = √{ (1/(2(N−1))) · Σ_{k=1}^{N−1} (y_{k+1} − y_k)² }。
      通过对数据分块改变 τ，可得稳定度曲线 σ_y(τ)。在 log-log 图中的斜率 μ 直接
      映射到噪声谱指数 α = −μ − 1（对 α ≤ 1 噪声）。
    key_steps:
      - "采集无间断 τ_0 秒一次的频率或相位数据"
      - "对相位数据，做一阶差分得到频率 y_i = (phi_{i+1} − phi_i)/(2 pi nu_0 tau_0)"
      - "对频率数据，按 τ = m·τ_0（m = 1, 2, 4, 8, …）分块平均"
      - "计算 sigma_y^2(tau) = <(y_{k+1} - y_k)^2> / 2"
      - "绘制 log σ_y vs log τ，斜率 μ 辨识噪声类型（μ=−1 white PM/FM 区；μ=0 flicker FM；μ=+½ RW FM）"
    applicable_conditions: "单次连续测量；无 dead time；零频率漂移（线性漂移须先扣除）"
    source:
      zotero_key: "ALLAN1966-PROCIEEE"
      claim: >
        "the square-root of the two-sample variance σ_y(τ) is recommended as the standard measure
        of fractional frequency stability in the time domain."
    note: >
      本方法为时频领域最核心的稳定度度量，已被本库多个论文（meyer2013 / nardelli2023 / jiang2010 
      / matei2017 / kessler2012 等）隐式使用。本文件建立 meth.allan_deviation_adev 为权威
      规范节点，供后续 papers 引用而非重复定义。

