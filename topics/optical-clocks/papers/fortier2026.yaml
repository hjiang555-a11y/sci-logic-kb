  # ──────────────────────────────────────────────────────────────────────────
  - id: ent.optical_frequency_standard
    name: "光学频率标准（通用）"
    aliases: ["OFS", "optical frequency standard", "optical clock", "光钟", "optical atomic clock"]
    hierarchy_level: 1
    status: demonstrated
    function: >
      基于激光冷却囚禁原子/离子的窄线宽光学跃迁的频率标准。
      分为三大类：（1）单离子钟（精度优先）；（2）光晶格钟（稳定度优先）；（3）核钟（新兴）。
      当前最佳系统不确定度 ~10⁻¹⁹，分数频率不稳定度 ~10⁻¹⁷/√τ。
      光钟的性能直接依赖询问激光的线宽和稳定度（跨专题接口到超稳激光专题）。
    key_parameters:
      best_systematic_uncertainty: "<10⁻¹⁸（多个系统）；5.5×10⁻¹⁹（²⁷Al⁺ NIST，综述汇总）"
      best_instability: "~5×10⁻¹⁷/√τ（最佳光晶格钟，综述汇总）"
      clock_laser_requirement: "线宽 <1 Hz；分数频率不稳定度 ~10⁻¹⁶–10⁻¹⁷ @ 1 s（见超稳激光专题）"
    note: >
      Level 1 通用实体节点，是 optical-clocks 专题的核心实体。
      本文件（fortier2026.yaml）是此节点的权威定义来源。
      跨专题引用：dimarcq2024.yaml 通过关系引用此节点（不重复定义）。

  - id: ent.trapped_ion_optical_clock
    name: "囚禁离子光钟（架构子类型）"
    aliases: ["trapped-ion clock", "single-ion clock", "离子光钟"]
    hierarchy_level: 2
    status: demonstrated
    function: >
      利用射频 Paul 阱囚禁单个或少数激光冷却离子，探测极窄光学跃迁作为频率参考。
      单离子系统具有极低的系统效应，适合追求极致准确度。
      代表性跃迁：²⁷Al⁺（626 nm）、¹⁷¹Yb⁺ E3（467 nm）。
    key_parameters:
      representative_species: "²⁷Al⁺、¹⁷¹Yb⁺（E3）、⁸⁸Sr⁺、¹¹⁵In⁺、¹⁷⁶Lu⁺"
      best_systematic_uncertainty: "5.5×10⁻¹⁹（²⁷Al⁺ NIST，综述汇总值）"
      detection_method: "电子搁置技术（electron shelving）/ 量子逻辑读出"
      stability_limit: "σ_y ∝ 1/(ν₀·T_m·√N_a)，N_a=1 → 需长时间平均"
    note: >
      Level 2 架构子节点，PART-OF ent.optical_frequency_standard。
      此为框架分类节点，具体系统参数由后续技术论文（如 Al⁺ 钟专项论文）补充。

  - id: ent.optical_lattice_clock
    name: "光晶格钟（架构子类型）"
    aliases: ["optical lattice clock", "neutral-atom lattice clock", "中性原子光钟"]
    hierarchy_level: 2
    status: demonstrated
    function: >
      利用"魔术波长"光晶格囚禁约 10⁴ 个激光冷却中性原子，
      探测 ¹S₀→³P₀ 窄跃迁。大原子数使统计灵敏度极高（σ_y ∝ 1/√N_a），
      短期不稳定度可达 ~10⁻¹⁷/√τ。代表系统：⁸⁷Sr（698 nm）、¹⁷¹Yb（578 nm）。
    key_parameters:
      representative_species: "⁸⁷Sr（698 nm）、¹⁷¹Yb（578 nm）"
      best_systematic_uncertainty: "~1×10⁻¹⁸（Sr 和 Yb 钟，综述汇总）"
      atom_number: "~10⁴"
      magic_wavelength: "813.4 nm（Sr）、759.4 nm（Yb）"
      stability: "~5×10⁻¹⁷/√τ（最佳演示，综述汇总）"
      key_systematics: "黑体辐射频移（BBR）、格子光频移、碰撞频移"
    note: >
