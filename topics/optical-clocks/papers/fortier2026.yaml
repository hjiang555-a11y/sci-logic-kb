principles:
  - id: pri.quantum_projection_noise_limit
    name: "量子投影噪声极限"
    tier: domain
    verification_status: calculated
    statement: >
      光钟的基本统计测量极限由量子投影噪声（QPN）决定。
      对于 N_a 个原子、跃迁频率 ν₀、询问时间 T_m 的钟，
      QPN 限制的 Allan 偏差为 σ_y(τ) = 1/(ν₀·T_m·√(N_a·η))·1/√(τ/T_c)，
      其中 η 为工作占空比，T_c 为时钟周期。
      这一极限设定了光钟不稳定度的基本下限。
    domain: "光学原子钟，量子计量"
    formula: >
      σ_y(τ) = 1/(2π·ν₀·T_m) · 1/√(N_a·η) · √(T_c/τ)；
      对单离子（N_a=1）：σ_y ∝ 1/(ν₀·T_m·√τ)；
      对光晶格钟（N_a~10⁴）：σ_y 降低 ~100×
    key_insight: >
      光钟的统计优势核心来源：（1）更高 ν₀（光学 vs 微波，~10⁵× 提升）；
      （2）更长 T_m（超稳激光→更长相干询问时间）；
      （3）更多 N_a（光晶格钟 ~10⁴ 原子）。
    conditions: "理想探测效率、无技术噪声、无 Dick 效应"
    preconditions:
      - "原子处于 Lamb-Dicke 域（运动量子化）"
      - "探测效率接近 100%"
    invalidated_when:
      - "询问激光的噪声（Dick 效应）超过 QPN 贡献"
      - "原子间碰撞引入相关噪声"
    source_claim: >
      "the quantum projection noise limit to stability... scales as 1/(ν₀·T_m·√N_a)"

  - id: pri.dick_effect
    name: "Dick 效应（时钟周期死时间噪声混叠）"
    tier: domain
    verification_status: observed
    statement: >
      光钟工作周期中，原子制备和检测的"死时间"期间不采样询问激光频率噪声，
      导致噪声通过采样混叠（aliasing）转化为低频不稳定度。
      Dick 效应的大小取决于：（1）询问激光的频率噪声功率谱密度；
      （2）工作占空比 η = T_m/T_c；（3）Ramsey 灵敏度函数的傅里叶分量。
      当腔稳激光的 flicker 噪声地板较高时，Dick 效应可能超过 QPN 成为主要限制。
    domain: "光学原子钟，频率稳定度"
    formula: >
      σ_y²(Dick) = Σ_k |g_k|² · S_y(k/T_c) / g₀²；
      其中 g_k 为灵敏度函数的傅里叶分量，S_y 为激光频率噪声谱
    key_insight: >
      Dick 效应是超稳激光性能直接影响光钟稳定度的核心机制——
      更好的超稳激光 → 更长 T_m → 更高占空比 → 更小 Dick 效应。
      这是超稳激光专题与光钟专题的关键接口。
    conditions: "光钟工作周期存在非零死时间（T_c > T_m）"
    preconditions:
      - "时钟周期包含原子制备/检测步骤（死时间不可避免）"
      - "询问激光频率噪声在 T_c 倒数频率处不可忽略"
    invalidated_when:
      - "零死时间操作（如连续 Bose-Einstein 凝聚装载、交替两组原子）"
      - "询问激光噪声极低（如 10⁻¹⁸ 级稳定度超稳腔），Dick 效应远低于 QPN"
    source_claim: >
      "the Dick effect... contributes to the Allan deviation as an aliased frequency noise 
      that can exceed the QPN limit when the clock laser noise is significant"
    open_questions:
      - "Can continuous-loading lattice clocks with 3D lattices completely eliminate the Dick effect, or do residual systematic effects from ongoing loading degrade accuracy?"
      - "At what ultrastable laser stability level does the Dick effect become negligible compared to QPN for state-of-the-art lattice clocks?"

  - id: pri.magic_wavelength_lattice
    name: "魔术波长光晶格原理"
    tier: domain
    verification_status: observed
    statement: >
      在特定"魔术波长"处，光晶格对钟跃迁上下能级产生相同的 AC Stark 频移，
      使净频移为零（一阶）。这使得 ~10⁴ 个原子可在深光晶格中囚禁，
      在 Lamb-Dicke 域中进行高精度光谱，而不引入与晶格强度相关的系统频移。
      高阶效应（超极化率、磁偶极跃迁）在 10⁻¹⁸ 精度下需仔细评估。
    domain: "光晶格钟，精密光谱"
    formula: >
      ΔE_AC(e) = ΔE_AC(g) @ λ_magic；
      Sr: λ_magic ≈ 813.4 nm；Yb: λ_magic ≈ 759.4 nm
    key_insight: >
      魔术波长方案解决了光晶格囚禁与光谱精度之间的根本矛盾，
      是光晶格钟概念的基础（Katori 2003 提出）。
    conditions: "晶格激光波长须精确调谐至魔术波长；多极化率和超极化率效应需在 10⁻¹⁸ 下修正"
    source_claim: >
      "the proposal of a 'magic wavelength'—a lattice laser frequency at which the AC Stark shifts 
      of the ground and excited clock states are equal"

methods:
  - id: meth.ramsey_spectroscopy_clock
    name: "Ramsey 光谱法（光钟频率测量）"
    status: demonstrated
    applies_to: ent.optical_frequency_standard
    steps_summary: >
      1. 制备原子于基态 |g⟩ →
      2. 第一个 π/2 脉冲：创建 |g⟩ 和 |e⟩ 的等权叠加 →
      3. 自由演化时间 T_m：积累相位差 Δφ = 2π(ν_laser − ν_atom)·T_m →
      4. 第二个 π/2 脉冲：将相位差映射为布居差 →
      5. 态选择荧光探测：确定原子处于 |g⟩ 还是 |e⟩ →
      6. 频率校正信号反馈至钟激光 →
      7. 重复以构建统计
    required_hardware:
      - ent.optical_frequency_standard
    advantages:
      - "对激光频率噪声的灵敏度集中在 T_m 对应的傅里叶频率"
      - "可实现极长询问时间（>1 s，受限于钟激光相干时间）"
    disadvantages:
      - "受限于询问激光的频率稳定度（T_m 不能超过激光相干时间）"
      - "存在 Dick 效应（死时间噪声混叠）"
    conditions:
      - "原子须处于 Lamb-Dicke 域"
      - "询问激光线宽须远小于跃迁线宽和 1/T_m"
    source_claim: >
      "A commonly used interferometric method for measurement of the clock laser 
      with respect to the atomic transition is Ramsey spectroscopy"

