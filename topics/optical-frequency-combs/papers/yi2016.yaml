      f_ceo: "由 CW 锁定的绝对频率 → 不需 f-2f 自参考"
      reference: "分子/原子吸收线（如 HCN 2ν₃ 带）"
      deployed_at: "IRTF + Keck II"
      components: "全商用现货（COTS）"
    note: "Level 2 实例节点；PART-OF ent.electro_optic_frequency_comb（应用层 EOFC 架构）"

principles:
  - id: pri.line_referenced_eo_comb
    name: "分子/原子线锁定 EO 梳绝对频率溯源原理"
    tier: domain
    verification_status: observed
    statement: >
      EO 调制梳中每根齿 ν_n = ν_cw + n·f_RF。若 CW 激光锁至已知分子/原子吸收线 ν_ref（如
      HCN、NH₃ 等）、f_RF 锁至原子钟/GPS 频标，则整个梳阵列绝对频率确定，无需 f-2f 自参考。
    domain: "EO 梳；绝对频率合成"
    formula: "ν_n = ν_ref + n·f_RF；不确定度由 ν_ref 和 f_RF 两项叠加决定"
    key_insight: >
      对于天文 RV 应用，绝对频率精度要求远低于金属原子光钟 → 线参考 EO 梳路线
      在工程简洁性上优于 f-2f 自参考梳。
    conditions: "CW 激光可锁至 Hz–kHz 级稳定的分子/原子线；f_RF 有高稳定源"
    invalidated_when:
      - "分子线选择压力/温度依赖过大"
      - "EO 调制器带宽不足导致齿数有限"

methods:
  - id: meth.eo_comb_line_reference_rv_calibration
    name: "线参考 EO 梳 RV 校准方法"
    status: demonstrated
    applies_to: ent.line_referenced_eo_comb_y16
    steps_summary: >
      1. 1559.9 nm CW 锁至 HCN/类似分子吸收线；
      2. 级联 EO 相位 + 强度调制器 + 色散补偿 → 10+ GHz 齿间距 EOFC；
      3. 通过单模光纤送入天文 grating 光谱仪共光路；
      4. 同帧记录梳齿 + 恒星；
      5. 拟合 RV。
    required_hardware:
      - ent.line_referenced_eo_comb_y16
    advantages:
      - "全商用组件、简单可靠"
      - "间距匹配天文仪器，免 F-P 滤波"
      - "无需 f-2f 自参考"
    disadvantages:
      - "梳覆盖带宽受 EO 调制器与非线性展宽限制"
      - "长期绝对频率漂移受分子线稳定性限制"

