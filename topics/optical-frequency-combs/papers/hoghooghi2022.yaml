  doi: "10.1038/s41377-022-00947-w"
  note: >
    [技术论文] Colorado/NIST（Diddams/Rieker 组）。以商用 1.56 µm 锁模激光 + 全光纤 Er
    放大 + χ² 非线性晶体做脉冲内差频（IP-DFG）产生少周期脉冲，实现首个 3–13 µm 覆盖
