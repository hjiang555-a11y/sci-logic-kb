principles:
  - id: pri.intra_pulse_dfg_comb_generation
    name: "脉冲内差频（IP-DFG）梳产生原理"
    tier: domain
    verification_status: observed
    statement: >
      少周期超短脉冲光谱本身覆盖足够宽度，可在单一 χ² 晶体中将脉冲内短波端与长波端
      相互作 difference-frequency generation，生成中红外梳，且 f_CEO_MIR = f_CEO_NIR − f_CEO_NIR = 0，
      本征消除载波包络偏移。
    domain: "非线性光学；中红外梳产生"
    formula: "ν_MIR(n) = n·f_rep；f_CEO_MIR ≡ 0"
    key_insight: >
      IP-DFG 以"脉冲自与自差频"取代传统 OPO/双激光 DFG，
      免除 f_CEO 主动锁定，极大简化中红外梳系统。
    conditions: "脉冲足够短（覆盖差频所需光谱跨度）；χ² 晶体相位匹配良好"
    preconditions:
      - "少周期脉冲可在 χ² 晶体中不经过色散展宽"
      - "晶体相位匹配带宽 ≥ 目标 MIR 带宽"
    invalidated_when:
      - "泵浦脉冲过长（未覆盖差频所需光谱跨度）"
      - "相位匹配带宽过窄导致有限谱覆盖"
    source_claim: >
      "intra-pulse difference frequency generation (IP-DFG) of few-cycle pulses in χ(2) nonlinear crystals"

