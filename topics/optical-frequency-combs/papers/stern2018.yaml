entities:
  - id: ent.battery_operated_microcomb_s18
    name: "电池供电全集成 III–V/Si3N4 Kerr 微梳源（Stern 2018）"
    aliases:
      - "laser-integrated Kerr frequency comb generator"
      - "hybrid III–V/Si3N4 battery-operated microcomb"
    hierarchy_level: 2
    status: demonstrated
    function: >
      毫米级异质集成 Kerr 微梳芯片组：III–V 反射型半导体光放大器（RSOA）端面对接
      Si3N4 光子芯片；Si3N4 芯片内集成双 Vernier 微环滤波器选择单纵模 + 120 µm
      半径高 Q 非线性微环，后者兼做激光腔输出耦合器（Rayleigh 背散射反射 ≈40%）
      与 Kerr FWM/耗散孤子梳产生腔。电驱动下在 Pelec 约 100 mW 量级产生 194 GHz
      间距、近 1550 nm 的低噪声单孤子梳，首次可由 AAA 干电池直接供电，开创便携
      微梳系统方向。
    key_parameters:
      platform: "III–V (RSOA) + Si3N4 光子芯片（异质端面对接）"
      laser_gain_medium: "电泵 III–V 反射型半导体光放大器 (RSOA)"
      pump_wavelength: "1579–1582 nm"
      repetition_rate: "194 GHz（梳齿间距，等于 120 µm 微环 FSR）"
      comb_ring_radius: "120 µm"
      comb_ring_intrinsic_Q: "(8.0 ± 0.8) × 10⁶"
      comb_ring_waveguide: "Si3N4, 730 nm × 1800 nm 截面（反常 GVD）"
      vernier_filters: "两个 Si3N4 微环（R = 20 µm / 22 µm，FSR 1.18 / 1.07 THz，FWHM 15 GHz）"
      lasing_threshold_current: "49 mA"
      slope_efficiency: "52 mW A⁻¹"
      max_laser_optical_power: "9.5 mW @ Pelec = 277 mW"
      wall_plug_efficiency: "3.4%"
      laser_linewidth: "40 kHz（延迟自外差）"
      SMSR: ">60 dB"
      parametric_threshold_Popt: "1.1 mW（bus 波导，环前），对应 Pelec = 78 mW"
      single_soliton_operating_point: "Pelec = 130 mW（Fig.3c）"
      battery_operating_point: "Pelec = 98 mW / Popt = 1.3 mW / comb_power = 0.24 mW（AAA 干电池）"
      soliton_30dB_bandwidth: "8.6 THz / 72 nm（单孤子，Fig.3c）"
    topology_variants:
      dual_role_ring:
        description: >
          Fig.1–3 拓扑：非线性微环同时作为激光腔输出镜（Rayleigh 背散反射）与 FWM 梳腔。
          优点：pump-comb 本征锁相对齐；缺点：腔耦合与 FWM 耦合条件强耦合，独立调节受限。
      sagnac_modular:
        description: >
          Fig.4 拓扑：Sagnac 环镜作为宽带激光腔输出耦合器（R≈20%），梳腔与激光腔解耦。
          Pelec = 162 mW，Popt = 4.9 mW，双孤子 13.4 THz / 105 nm 30 dB 谱，
          梳功率 80 µW，转换效率 1.6%。优点：模块化、调谐灵活；缺点：需更高泵功率。
    interface_requirements:
      electrical_supply: "~100 mW DC 电流源（可由 AAA 电池提供）"
      packaging: "III–V 与 Si3N4 端面对接（butt coupling）；后续可迁移为硅衬底键合 / 被动对准"
      temperature_control: "无（孤子稳定运行无需主动温控）"
    note: >
      Level-2 集成系统实例。PART-OF ent.microresonator_frequency_comb（权威定义于
      kippenberg2018.yaml）；同时是 ent.si3n4_integrated_comb（gaeta2019.yaml）家族的
