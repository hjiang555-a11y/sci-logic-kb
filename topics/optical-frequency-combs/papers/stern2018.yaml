  - id: ent.vernier_microring_filter_pair_s18
    name: "Si3N4 双微环 Vernier 单纵模选择滤波器"
    hierarchy_level: 3
    status: demonstrated
    function: >
      R = 20 µm / 22 µm 双 Si3N4 微环，FSR 分别 1.18 / 1.07 THz，只有在对齐位置才
      合成单一透射峰（Vernier 选择），FWHM 15 GHz；通过集成电阻式微加热器宽范围
      热调谐，与 120 µm 大微环的某个模式对齐以确定泵浦波长。
    note: "PART-OF ent.battery_operated_microcomb_s18。"

  - id: ent.nonlinear_microring_dual_role_s18
    name: "双用非线性 Si3N4 微环（激光输出镜 + Kerr 梳腔）"
    hierarchy_level: 3
    status: demonstrated
    function: >
      半径 120 µm、Q_i ≈ 8×10⁶ 的 Si3N4 微环。通过反向环行模 Rayleigh 散射
      耦合产生共振窄带 40% 回反射，替代传统输出镜；同时其反常 GVD + 高非线性
      支持 CW-泵 FWM 与耗散 Kerr 孤子形成，产生 194 GHz 间距梳。
    key_parameters:
      radius: "120 µm"
      FSR: "194 GHz"
      intrinsic_Q: "(8.0 ± 0.8) × 10⁶"
      on_resonance_reflection: "≈40%"
      waveguide_cross_section: "730 nm × 1800 nm"
      predicted_threshold_bus: "700 µW（仿真，bus 波导）"
    note: >
      PART-OF ent.battery_operated_microcomb_s18；本结构复用是 Stern 2018 首创
      （区别于 Fig.4 Sagnac 模块化版本的功能分离设计）。

principles:
  - id: pri.rayleigh_backscatter_self_injection_lock_s18
    name: "微环 Rayleigh 背散自注入锁定原理（双用腔实现）"
    tier: engineering
    verification_status: observed
    statement: >
      高 Q 微环因波导侧壁微弱无序散射，在共振峰附近将正向环行模部分耦合到反向环行模，
      对外表现为窄带回反射 R ≈ 40%。该回反射锁定 RSOA 外腔激光频率至微环共振，
      自动保证 "泵-梳" 对齐，不再需要外置激光 + PDH/反馈电路主动跟踪微环共振。
    domain: "集成光子激光器；Kerr 微梳泵浦对齐"
    formula: "反射率 R(ω) ≈ |κ_R / (i·Δω + κ_tot/2)|²，窄带 @ 微环共振"
    key_insight: >
      把 "稳定激光相对于微环共振" 这一控制问题折叠进被动 Rayleigh 物理，
      是移除主动反馈电子、进入电池供电级 SWaP 的关键突破。
    conditions:
      - "微环 Q 足够高，以使 Rayleigh 耦合率 κ_R 与总损耗可比"
      - "激光腔内其他损耗低，使微环回反成为主端镜"
    preconditions:
      - "RSOA 有反射端 + Vernier 单纵模选择，避免多模寄生"
    invalidated_when:
      - "微环处于强 FWM / 孤子状态时 Rayleigh 相位被 Kerr 非线性扰动 → 锁相可能漂移"
      - "温漂将微环共振拖离 Vernier 透射峰 → 失锁"
    source_claim: >
      "the microresonator generates a narrowband back-reflection due to coupling between
       counter-propagating circulating beams resulting from Rayleigh scattering ...
       effectively serving as an output mirror of the pump laser cavity"

  - id: pri.pump_comb_copackaging_swap_reduction_s18
    name: "泵源-梳腔同芯片集成的 SWaP 降低原理"
    tier: engineering
    verification_status: observed
    statement: >
      当泵浦激光与 Kerr 微环集成在同一光子平台并通过端面对接耦合时，光学插入损耗、
      偏振对齐、温控与空间隔振需求都大幅下降，从而将系统总电功耗 Pelec 从
      传统台式泵（W 级 EDFA/台式 ECL）压缩到 ~100 mW 量级，使电池供电成为可能。
      这并非新的物理机制，而是把外置链路损耗（通常 >10 dB）与附属电子功耗从系统
      功率预算中消去的工程结果。
    domain: "集成光子学；便携频率计量系统工程"
    formula: "Pelec_total = Pelec_pump + Pelec_driver + P_thermal；本工作 ≈ 98 mW（电池）"
    key_insight: >
      电池供电不是单一器件突破，而是 "RSOA 低阈值 + Si3N4 高 Q 低阈值 + 端面对接低损耗 +
      无需主动温控" 四条链路同时满足后的系统级涌现结果。
    conditions:
      - "片上泵浦激光 wall-plug 效率 ≥ few %"
      - "微环 FWM/孤子阈值（bus 波导处）≤ mW"
      - "端面对接损耗控制在 few dB"
    preconditions:
      - "孤子态无需主动反馈即可维持（见 source_claim 2）"
    invalidated_when:
      - "引入低温（如 Si 腔光钟级系统）或主动温控，功耗再次回到 W 级"
    source_claim: >
      "we generate a Kerr comb spanning more than 8 THz and achieve a mode-locked,
       single-soliton state with Pelec less than 100 mW, enabling battery-operation applications"
    open_questions:
      - "如何在保持 <100 mW 功耗同时实现 f-2f 自参考（需倍频程展宽 + 片上 SHG）？"
      - "长期稳定度（Allan 偏差）在电池供电下未被表征"

  - id: pri.packaging_loss_limits_wallplug_efficiency_s18
    name: "端面对接损耗对 wall-plug 效率与总功耗的限制"
    tier: engineering
    verification_status: inferred
    statement: >
      III–V 与 Si3N4 端面对接的耦合损耗是系统 wall-plug 效率（本工作 3.4%）与
      最低 Pelec 的主要限制之一。降低封装损耗（被动对准 / 倒装键合 / 硅衬底
      III–V 直接键合）可同步压缩 Pelec 至更低水平或释放余量给片上功能扩展。
    domain: "集成光子学封装"
    formula: "η_wallplug = Popt_laser / Pelec_pump; 进一步损耗降低直接改善 η"
    conditions:
      - "pump 增益芯片 wall-plug 效率 fixed"
      - "片上波导与微环内禀 Q 不是主限制"
    source_claim: >
      "In future implementations, the RSOA could be placed directly on the silicon substrate,
       through passively aligned mounting or material bonding, taking advantage of the
       infrastructure for assembly and packaging of III–V and silicon chips"

  - id: pri.high_Q_si3n4_low_threshold_soliton_s18
    name: "高 Q Si3N4 微环使 CW-泵孤子阈值降至 mW 级的工程原理"
    tier: engineering
    verification_status: observed
    statement: >
      Si3N4 微环内禀 Q 提升至 8×10⁶ 量级后，参量振荡阈值与孤子形成所需 bus 波导
      功率降至 ~1 mW（本工作实测 Popt_th = 1.1 mW；仿真孤子阈值 ~700 µW），
      这是在有限电泵 RSOA 输出功率（~mW 级）下仍能稳定产生孤子梳的必要条件。
    domain: "微腔非线性光学；微梳系统设计"
    formula: "P_th ∝ V_eff / (Q² · n₂)；Q 提升为两次方杠杆"
    conditions:
      - "反常 GVD（730 × 1800 nm 截面）"
      - "加载 Q 与内禀 Q 匹配良好（过耦合/欠耦合平衡）"
    invalidated_when:
      - "Si3N4 材料/界面损耗回退，Q < 10⁶，阈值升至 >10 mW 将无法电池供电"
    source_claim: >
      "Si3N4 microresonators were recently demonstrated with record low parametric
       oscillation thresholds due to the high quality factors (Q > 3 × 10⁷), high
       nonlinear refractive index ... simulations indicate that a soliton-state frequency
       comb can be generated with 700 µW of pump power in the bus waveguide"

methods:
  - id: meth.electrical_soliton_tuning_s18
    name: "集成微加热器热调谐孤子进入法（Stern 2018）"
    status: demonstrated
    applies_to: ent.battery_operated_microcomb_s18
    steps_summary: >
      1. 给 RSOA 通电至 Pelec ≈ 130 mW，先把 120 µm 微环稍失调，建立单纵模激光；
      2. 用集成电阻微加热器热调谐 Vernier 微环对齐，单模锁定于所选激光波长；
      3. 逐步调谐 120 µm 微环加热器使其共振从蓝向红扫向泵浦，依次经过
         参量振荡（Popt ≈ 1.1 mW 阈值） → 多齿 MI 梳（RF 噪声高） →
         单孤子态（RF 噪声骤降、sech² 包络）；
      4. 孤子形成后无需主动温控或电子反馈，维持稳定运行直至主动失调。
    required_hardware:
      - ent.battery_operated_microcomb_s18
      - ent.integrated_iii_v_rsoa_pump_s18
      - ent.vernier_microring_filter_pair_s18
      - ent.nonlinear_microring_dual_role_s18
    advantages:
      - "全电学调谐，零可移动光学部件"
      - "Rayleigh 自注入锁避免主动激光 scan"
      - "孤子状态自锁，无需反馈电路"
    disadvantages:
      - "热调谐带宽受微加热器响应限制（~ms）"
      - "单孤子 vs 多孤子选择仍依赖经验调谐"
    conditions:
      - "Vernier 对齐 + 120 µm 微环模式对齐激光单纵模"
      - "Pelec ≥ 78 mW（参量阈值），~130 mW 获稳定单孤子"
    source_claim: >
      "As the microresonator is tuned into resonance, greater circulating power leads to
       comb formation ... Tuning the resonance further results in stable combs with smooth
       spectral envelopes characteristic of temporal cavity solitons"
    note: >
      方法论上是 meth.laser_tuning_soliton_access（kippenberg2018/li2017）的
      电学集成变体：把激光失谐扫描替换为微环共振热扫描，主体物理相同。

