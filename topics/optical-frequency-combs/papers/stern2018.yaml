  - id: ent.integrated_iii_v_rsoa_pump_s18
    name: "片上 III–V 反射型半导体光放大器（RSOA）泵源"
    hierarchy_level: 3
    status: demonstrated
    function: >
      III–V 量子阱电泵增益波导，一端镀高反镜为固定反射端，另一端端面对接 Si3N4 芯片；
      与 Si3N4 Vernier 滤波器 + 微环 Rayleigh 反射共同构成外腔单纵模激光器。
      取代外置台式泵浦激光，是系统 SWaP（体积-功耗）降至电池级的关键。
    key_parameters:
      gain_bandwidth: "覆盖 1550 nm 波段"
      threshold_current: "49 mA"
      max_optical_output: "9.5 mW（端面对接进入 Si3N4 后测得）"
      slope_efficiency: "52 mW A⁻¹"
