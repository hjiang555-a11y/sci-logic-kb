# Stern 2018 — 首次实现电池供电、III–V/Si3N4 全集成 Kerr 微梳源 [里程碑技术论文]
# 提取者：GitHub Copilot（AI草稿，待专家确认）
# 提取日期：2026-04-19
# Schema版本：v4.1
# 专题：optical-frequency-combs
# contribution_type: technical — 便携化微梳系统里程碑
#   核心贡献：
#     (1) 首次将电泵 III–V RSOA 增益芯片与 Si3N4 高 Q (8×10⁶) 微环端面对接，整芯片
#         在 Pelec = 78–130 mW 下激发 194 GHz 耗散 Kerr 孤子梳；
#     (2) 首次用 AAA 干电池（Pelec = 98 mW）直接供电驱动产生单孤子梳，证明 Kerr 微梳
#         的 wall-plug 功率已可降至便携/电池级，打开车载、移动传感器应用空间；
#     (3) 两种拓扑并存演示：(a) 双用微谐振腔（既做激光腔 Rayleigh 反射端镜又做 FWM 腔）
#         与 (b) 独立 Sagnac 环镜 + 分离梳腔的模块化设计，展示平台灵活性与产业化路径。
#   Framework 依赖：kippenberg2018.yaml 定义 ent.microresonator_frequency_comb、
#     pri.dissipative_kerr_soliton、pri.microresonator_anomalous_dispersion、
#     meth.cw_pumped_microcomb_generation、meth.laser_tuning_soliton_access；
#     gaeta2019.yaml 定义 ent.si3n4_integrated_comb / chip-integration 语境；
#     li2017.yaml 给出 Si3N4 微梳低阈值 + thermo-optic soliton access 语境。

