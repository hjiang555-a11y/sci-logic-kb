principles:
  - id: pri.brillouin_amplification_long_distance_k19
    name: "Brillouin 放大长距离光纤频率传递原理（Koke 2019）"
    tier: domain
    verification_status: observed
    statement: >
      光纤长距离传输（>1000 km）衰减 > 200 dB；bEDFA（双向 EDFA）易自振荡 / 循环滑动（cycle slip）→ 频率不确定度 > 5×10⁻¹⁷（不适合光钟）；
      Brillouin 放大器（FBA）：窄带（~MHz）泵浦光激发受激 Brillouin 散射（SBS）→ 信号光增益（~15 dB），低噪声（无 ASE 宽带噪声）；
      优势：a) 窄带 → 低噪声；b) 双向增益对称 → 路径噪声共模抑制；c) 无自振荡（无 bEDFA 反射环路）；
      与中继激光站（RLS）组合：FBA 补偿大部分损耗，RLS 补偿剩余损耗 + 分段稳定 → 首次 Continental-scale（1400 km）链路。
    domain: "光纤频率传递；受激 Brillouin 散射"
    key_insight: >
      "Brillouin 放大的窄带特性使其天然适合光纤频率传递（MHz 级窄带信号）——
      这是 bEDFA 无法做到的（宽带 ASE 噪声 + 自振荡风险）"——
      对 Continental-scale 光钟比对关键（>1000 km，10⁻¹⁸ 级不确定度）。
    conditions: "光纤链路 > 1000 km；Brillouin 放大器（FBA）；中继激光站（RLS）"
    source_claim: >
      "This fiber link is the first to combine fiber Brillouin amplifiers with a repeater laser station."

methods:
  - id: meth.brillouin_rls_hybrid_1400km_k19
    name: "Brillouin 放大 + 中继站混合 1400 km 光纤链路方法（Koke 2019）"
    status: demonstrated
    applies_to: ent.brillouin_rls_1400km_link_k19
    steps_summary: >
      1. 1400 km 环形光纤链路（双向传输）；
      2. Brillouin 放大器（FBA）沿路分布（~100 km 间隔）→ 补偿大部分衰减（~15 dB / 站）；
      3. 中继激光站（RLS）补偿剩余损耗（~50 dB 累积）+ 分段稳定（相位锁环 PLL）；
      4. 双向噪声补偿（phase-coherent bi-directional）→ 路径噪声共模抑制（> 98% 相关性）；
      5. 相位相干运行 > 5 天（无循环滑动）。
    required_hardware:
      - "1400 km 地下光纤（双向）"
      - "Brillouin 放大器（FBA）"
      - "中继激光站（RLS）"
      - "相位锁环（PLL）伺服"
    advantages:
      - "首次 Continental-scale Brillouin-amplified link（> 1000 km）"
      - "低噪声（Brillouin 窄带增益）"
      - "无循环滑动（FBA 无自振荡）"
    disadvantages:
      - "需要沿路 FBA + RLS 站点（基础设施需求）"

