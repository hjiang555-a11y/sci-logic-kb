  note: >
    [Breakthrough 论文] PTB（德国联邦物理技术研究院）+ LNE-SYRTE（法国）。首次 Brillouin 放大 + 中继激光站组合 1400 km 光纤频率传递： (1) 1400 km 环形光纤链路（Braunschweig ↔ Strasbourg 地下光纤）：首次结合光纤 Brillouin 放大器（FBA）与中继激光站（RLS）； (2) 相位相干运行 > 5 天（累计 65 天数据）；加权平均分数频率偏移 (-1.1±0.4)×10⁻²⁰； (3) 两根光纤相位噪声相关性 > 98%（双向噪声抵消）； (4) 技术突破：a) Brillouin 放大解决长距离信号衰减（避免 bEDFA 自振荡 / 循环滑动）；
