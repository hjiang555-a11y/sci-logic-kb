principles:
  - id: pri.chirped_qpm_broadband_chi2_sc
    name: "啁啾准相位匹配实现 χ² 宽带光谱展宽原理"
    tier: domain
    verification_status: observed
    statement: >
      通过沿波导长度逐渐变化 QPM 极化周期 Λ(z)，使不同波长对在不同位置满足相位匹配，
      从而一次性高效产生跨宽带的 SHG / SFG 频率分量；与 χ³ 自相位调制 + 色散波结合，
      可在 mm 级波导内以 pJ 级脉冲能量获得 330–2400 nm 无间隙超连续谱。
    domain: "集成非线性光子学；宽带 SC 产生"
    formula: "Λ(z) 连续变化 → ∫ exp(iΔk(ω,z)) dz ≈ 0 的宽波段条件"
    key_insight: >
      "啁啾 QPM + 色散工程 + 多段级联" 构成 TF-LN 平台高效 UV/VIS 梳产生的核心工程模版；
      比 HNLF 方案功耗低 3 个数量级。
    conditions: "TF-LN 可定制极化结构；色散与 QPM 联合设计；波导损耗足够低"
    preconditions:
      - "pJ 级短脉冲（亚 ps）输入"
      - "QPM 极化精度 <µm"
    source_claim: >
      "multisegment nanophotonic thin-film lithium niobate waveguides that combine engineered
      dispersion and chirped quasi-phase matching for efficient supercontinuum generation via
      the combination of χ(2) and χ(3) nonlinearities"

methods:
  - id: meth.tf_ln_uv_vis_comb_generation
    name: "TF-LN 波导 UV/VIS 梳产生方法"
    status: demonstrated
    applies_to: ent.tf_lin_uv_vis_comb_w24
    steps_summary: >
      1. 100 MHz Er:fiber 梳输出 → 压缩至亚 ps；
      2. 透镜光纤耦合进 TF-LN 波导（90 pJ）；
      3. 多段啁啾 QPM + 色散工程同时做 χ²（SHG/SFG）+ χ³（SPM）；
      4. 输出 330–2400 nm 无间断梳；
      5. 同一波导中截取 f 与 2f 分量做 f-2f，验证 f_CEO 和相干性（短至 350 nm）。
    required_hardware:
      - ent.tf_lin_uv_vis_comb_w24
    advantages:
      - "UV/VIS 段 17% 转换效率（比 HNLF 方案高数十倍）"
      - "90 pJ 低能耗，兼容集成芯片梳"
      - "同一波导输出 f-2f → 全链路集成自参考"
      - "覆盖离子/原子钟冷却/探测跃迁波段（350–550 nm）"
    disadvantages:
      - "QPM 工艺复杂度高"
      - "UV 段波导损耗与材料吸收限制更短波长延展"
    source_claim: >
      "With only 90 pJ of pulse energy at 1,550 nm, we achieve gap-free frequency comb coverage
      spanning 330–2,400 nm. The conversion efficiency from the near-infrared pump to the
      ultraviolet–visible region of 350–550 nm is 17%"

