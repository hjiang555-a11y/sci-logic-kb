  journal: "Nature Photonics"
  doi: "10.1038/s41566-023-01364-0"
  note: >
    [技术论文] NIST/Colorado（Diddams 组）+ Caltech（Marandi 组）+ JPL。多段铌酸锂（TF-LN）
    纳米波导：色散工程 + 啁啾准相位匹配（chirped QPM），结合 χ²+χ³ 非线性；
    仅 90 pJ（1550 nm）Er:fiber 梳脉冲输入，产生 330–2400 nm 无间断梳谱；
    350–550 nm UV/VIS 转换效率 17%；同一波导 χ² 倍频 + f-2f 直接给出 f_CEO，
    并在 350 nm 处验证梳相干性。解决 UV/VIS 光梳长期缺失问题，关键服务离子/原子钟光梳参考。

