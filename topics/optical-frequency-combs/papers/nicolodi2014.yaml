entities:
  - id: ent.er_fiber_ofc_spectral_transfer_nicolodi2014
    name: "Er:fiber光频梳光谱纯度传递系统（Nicolodi 2014）"
    hierarchy_level: 2
    status: demonstrated
    function: >
      将1062 nm ULE腔稳定激光的频率稳定度通过Er:fiber OFC传递至1542 nm，
