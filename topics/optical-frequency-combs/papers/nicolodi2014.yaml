principles:
  - id: pri.ofc_spectral_purity_transfer
    name: "光频梳光谱纯度传递原理"
    tier: domain
    verification_status: observed
    statement: >
      光频梳可作为相干"齿轮"将一个光学波长的频率稳定度无退化地传递至另一波长。
      通过紧相位锁定（宽控制带宽）使梳齿噪声远低于输入激光噪声，
      传递退化可达10^-18量级（1 s），不损害源激光的频率稳定度。
    domain: "光频梳 / 精密光谱 / 光钟比对"
    key_insight: >
      决定传递保真度的不是梳本身的绝对稳定度，而是梳对参考激光的相位锁定剩余噪声。
      腔内EOM可将控制带宽扩展至>100 kHz，使剩余噪声降至10^-18以下。
    conditions: "需宽带快速相位锁定（腔内EOM）；源激光频率稳定度优于传递退化水平"
    source:
      zotero_key: "JBIG86N9"
      claim: >
        "the degradation in spectral purity due to the OFC link is below 3×10^-18
        at an integration time of 1 s"

methods:
  - id: meth.intra_cavity_eom_phase_lock
    name: "腔内EOM快速相位锁定"
    status: demonstrated
    steps_summary: >
      在Er:fiber梳谐振腔内置入电光调制器（EOM），提供远超压电陶瓷（PZT）的控制带宽
      （~100 kHz vs ~10 kHz），实现对参考激光的紧相位锁定，残差相位噪声降至10^-18以下。
    source_claim: >
      "a fast intra-cavity electro-optic modulator for tight phase locking"

