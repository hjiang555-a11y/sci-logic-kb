principles:
  - id: pri.digital_servo_latency_bandwidth_tradeoff
    name: "数字伺服延迟-带宽权衡原理"
    tier: engineering
    verification_status: observed
    statement: >
      闭环数字锁相带宽 f_BW 受总延迟 τ_total（器件 τ_dev + 处理 τ_proc）限制：
      f_BW ≲ 1/(2π·τ_total)，且受相位裕度更严约束（1/(6…10·τ_total)）。
      降低 τ_total 的代价是精度（位宽/滤波器阶数）、稳定性（高时钟 DSP 多周期流水）或镜像抑制等功能。
      数字伺服极限由"延迟 vs 精度 vs 时钟频率"三角权衡决定。
    domain: "FPGA 数字控制电子学；光频梳锁相工程"
    formula: "f_BW,max ≈ 1/(2π·τ_total)；τ_total = τ_ADC + τ_DAC + τ_filter + τ_mix + τ_arctan + τ_PID"
    key_insight: >
      (1) 低阶 FIR + 陷波把群延迟 5.5→2.5 T_s；
      (2) atan2 用 LUT + 倒数乘法（恒等式 tan⁻¹(Q/I)+tan⁻¹(I/Q)=π/2 把范围压到 [0,π/4]）替代 CORDIC，
          24→11 周期且保 18-bit 精度；
      (3) DSP 时钟牺牲频率换单周期延迟，IQ 解调 50 ns，板级 <250 ns，带宽 1.1 MHz。
    conditions: "FPGA 数字锁相；IQ 解调 + arctan 相位提取；闭环稳定工作"
    preconditions:
      - "ADC/DAC 延迟与量化噪声最小化；模拟前端群延迟可测稳定"
      - "PID 参数通过 VNA 实测环路传函整定"
    invalidated_when:
      - "致动器（PZT/EOM/泵浦）响应带宽低于 f_BW，此时延迟非主导"
      - "ADC 相噪或模拟前端噪声成为主导限制"
      - "迁至 ASIC 后延迟不再是主矛盾"
    source_claim: >
      "Through the optimization of filtering and phase detection algorithms, computational latency is reduced
      while maintaining precision, enabling a control bandwidth of 1.1 MHz ... total board latency of less than 250 ns"
    open_questions:
      - "进一步压缩到 ASIC 是否能达到 >5 MHz 数字控制带宽而不被致动器限制？"
      - "在更高 fbeat 信噪比下，该权衡曲线的 Pareto 前沿位置如何随 ADC 相噪平移？"
    contested_claims:
      - "数字锁相相比模拟 PLL 的优势是否足以抵消残余延迟惩罚，随致动器带宽和应用场景而异"

methods:
  - id: meth.low_latency_iq_phase_detection_w25
    name: "低延迟 IQ 解调 + 改进 atan2 数字鉴相方法（Wang 2025）"
    status: demonstrated
    applies_to: ent.low_latency_digital_servo_w25
    steps_summary: >
      1. ADC 采样 (100 MSPS, 16 bit)；2. 一阶 IIR 高通 + 低阶 FIR 低通 (群延迟 ~2.5 T_s)；
      3. 陷波滤波器 (单位圆 4 共轭零点 + π 处一零点) 抑制镜像，零附加延迟；
      4. DDS 本振混频得 I/Q；5. atan2：按符号/大小分类 + LUT + 倒数乘法 + 恒等式 [0,π/4] 压缩，11 周期；
      6. 相位加 DDS 相位做相位展开（突破 ±π）；7. 快/慢级联 PID → DAC 驱动 fceo 泵浦 / fbeat EOM+PZT。
    required_hardware:
      - ent.low_latency_digital_servo_w25
    advantages:
      - "相位展开突破模拟鉴相 ±π（抑制 cycle slip）"
      - "滤波器/鉴相可重构，温漂鲁棒"
      - "板级延迟 <250 ns，带宽 1.1 MHz，逼近模拟 PLL"
      - "atan2 11 周期 vs CORDIC 24 周期，同精度下延迟减半"
    disadvantages:
      - "400 MHz 高时钟 DSP 需 3 周期流水；200 MHz 才能单周期（采样率折中）"
      - "ADC 相噪本底直接限制鉴相精度"
      - "对 FPGA 布局布线敏感，复现依赖板级工程"
    conditions:
      - "输入 fceo、fbeat 已通过模拟前端带通/分频/放大预处理"
      - "FPGA 主时钟锁定至低相噪外部参考（Rb 或 frep）"
    source_claim: >
      "the demodulation latency is reduced to 50 ns, resulting in a total board latency of less than 250 ns
      and enabling a control bandwidth of 1.1 MHz"

  - id: meth.digital_comb_frep_to_usl_locking_w25
    name: "Er 光纤梳 frep 数字锁定到 1560 nm 超稳激光方法（Wang 2025）"
    status: demonstrated
    applies_to: ent.optical_frequency_comb
    steps_summary: >
      1. f-2f 干涉仪探测 fceo → Channel 1 → IQ 解调+PID → 调制泵浦电流；
      2. 选梳齿与 1560 nm USL 外差得 fbeat → Channel 2 → 快 PID 驱 EOM + 慢 PID 驱 PZT；
      3. 板载频率计数器 (1 s 门时间 × 1000 点) 评估长期稳定度；
      4. AnaPico APPH20G 相噪仪测 1 Hz–1 MHz 积分相噪。
    required_hardware:
      - ent.low_latency_digital_servo_w25
      - ent.optical_frequency_comb
      - ent.fp_cavity_system
    advantages:
      - "单板同时锁 fceo 与 fbeat，诊断/调参集成"
      - "EOM 快 + PZT 慢数字 PID 级联，无需模拟分频"
      - "cycle-slip-free 锁定可维持 10 000 s"
    conditions:
      - "100 MHz Er:fiber 梳，fceo 与 fbeat 信噪比满足数字鉴相精度要求"
      - "1560 nm USL 本身相噪低于梳本底，否则性能被参考限制"
    source_claim: >
      "A locking test was performed on a 100 MHz repetition frequency erbium-doped fiber optical comb,
      using a 1560 nm ... ultrastable laser ... fbeat exhibits 7.27 × 10⁻¹⁸ at 1 s and 1.29 × 10⁻²² at 10,000 s"

