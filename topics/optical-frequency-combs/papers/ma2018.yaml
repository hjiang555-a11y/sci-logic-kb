principles:
  - id: pri.high_frep_yb_tight_lock_challenges
    name: "高重频 Yb:fiber 梳紧锁的双重挑战原理"
    tier: engineering
    verification_status: observed
    statement: >
      高 f_rep Yb:fiber 梳相对于低 f_rep（~100 MHz）系统有两大紧锁障碍：
      (1) 内秉噪声（线宽、时延抖动）随 f_rep 通常线性甚至超线性增大，
          要求 MHz 量级 f_CEO 伺服带宽；
      (2) 腔内 EOM 与泵浦功率执行器之间的交叉耦合增强，
          纯 PID 控制难以同时保证两 DOF 紧锁。
      解决途径：体晶 EOM（而非光纤型 EOM）提供低损耗高带宽，配合前馈解耦。
    domain: "光纤梳伺服；高重频源"
    conditions: "f_rep > 200–300 MHz；泵浦电流执行器受限于增益寿命"
    source_claim: >
      "The tight phase locking in high-repetition-rate Yb:fiber frequency combs involves two issues.
      One is the insufficient servo bandwidth against high intrinsic noise, and the other is cross-talk
      between the intra-cavity electro-optic modulator (EOM) [and pump actuator]."

methods:
  - id: meth.bulk_eom_pzt_750mhz_yb_lock
    name: "体晶 EOM + 单级 PZT 在 750 MHz Yb:fiber 梳的紧锁方法"
    status: demonstrated
    applies_to: ent.yb_fiber_750mhz_comb_m18
    steps_summary: >
      1. 两台独立 750 MHz Yb:fiber 振荡器；
      2. 体晶 EOM 作 f_rep 高频执行器（>100 kHz 带宽）；
      3. 单级 PZT 作 f_rep 低频执行器；
      4. 泵浦 LD 电流调制锁 f_CEO；
      5. 与 CW 光学参考拍频 + PLL；
      6. 两 DOF 同时闭锁 → <1 rad 积分相噪、~10⁻¹⁸ @ 1 s in-loop。
    required_hardware:
      - ent.yb_fiber_750mhz_comb_m18
    advantages:
      - "将紧锁梳的 f_rep 从 ~100 MHz 推到 750 MHz"
      - "双梳同级指标支持光学互比对/同步应用"
    disadvantages:
      - "体晶 EOM 需精细光学对准"
      - "in-loop 指标未反映参考链路真实噪声"

