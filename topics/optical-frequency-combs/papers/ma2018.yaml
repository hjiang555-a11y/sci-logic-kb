  title: "Low-noise 750 MHz spaced ytterbium fiber frequency combs"
  year: 2018
  first_author: Ma
  journal: "Optics Letters"
  volume: 43
  issue: 17
  pages: "4136-4139"
  doi: "10.1364/OL.43.004136"
  note: >
    [技术论文 / A1 子域纪录] 北京大学 + UEC 东京 + Colorado（Schibli）+ JST 合作。
    两台独立 750 MHz Yb:fiber 梳紧锁到 CW 光学参考：
    (1) 首次在 750 MHz 基频 Yb:fiber 平台实现 <1 rad 积分相噪
        （0.1 Hz–10 MHz 积分，远优于此前 >100 MHz 平台的同级锁定）；
    (2) 两台梳均达到 ~10⁻¹⁸ @ 1 s in-loop fractional instability；
    (3) 执行器为腔内 EOM + 单级 PZT。
    关键突破：克服高重频 Yb:fiber 的高 f_CEO 线宽（>100 kHz）与 EOM-泵浦耦合，
    使"光学原子钟梳"的重复频率从传统 ~100 MHz 提升到 750 MHz。
    对齐 v2 子域主线：A1-Rep（750 MHz 紧锁首次）+ A1-Noise（<1 rad）+ B-FreqSyn（1e-18 in-loop）。
    注意：**10⁻¹⁸ 是 in-loop**（严格度低于 out-of-loop 比对）。

