      为下一代 EPRV 仪器（ANDES on ELT，目标 1–2 cm/s RV 精度）提供完整蓝光定标能力。

principles:
  - id: pri.shg_sfm_combined_astrocomb_continuous_coverage_c24
    name: "SHG + SFM 组合实现天文光梳连续覆盖原理（Cheng 2024）"
    tier: domain
    verification_status: observed
    statement: >
      "传统蓝光天文光梳采用单 SHG（二次谐波产生）将 ~800 nm Ti:sapph 梳转至 ~400 nm，
      但受泵浦梳谱宽（通常 <100 nm FWHM）限制，SHG 输出谱宽 <50 nm（400 nm 中心），
      无法覆盖恒星光谱密集吸收线区（440–480 nm 蓝绿波段），形成'谱间隙'——这限制了 EPRV 精度潜力。
      通过在同一 MgO:PPLN 波导中同时实现 SHG（800 → 400 nm）与 SFM（800+1200 → 490 nm），
      两个输出谱段互补拼接 → 实现 390–520 nm 连续覆盖，消除谱间隙，最大化可用恒星吸收线数量。"
      Cheng 2024 证明：组合方案仅需 ~100 pJ 脉冲（低于传统单 SHG 阈值），波导集成使 SFM 效率可行，
      且两谱段均保持梳齿相位相干性（频率溯源至源梳），实现完整蓝光定标能力。
    domain: "非线性频率转换；天文光梳工程；χ² 波导非线性光学"
    key_insight: >
      蓝光天文光梳的核心瓶颈不是单个非线性过程效率（SHG 本身成熟），
      而是"单 SHG 谱宽不足以覆盖恒星光谱关键波段"——通过 SHG + SFM 双过程组合，
      用两个独立可控的转换通道"拼接"出连续谱，比"展宽源梳谱宽"（受增益带宽限制）或"更换源梳波长"（牺牲 Ti:sapph 成熟性）更优。
    conditions: >
      需宽带 χ² 非线性介质（MgO:PPLN 波导支持多过程准相位匹配）；
      需双波长泵浦（800 nm Ti:sapph + 1200 nm 种子激光，后者可由 OPO 或光纤激光提供）；
      需精密温度/角度调谐优化 SHG 与 SFM 相位匹配效率；
      需 Fabry-Pérot 模滤波提取适配光谱仪分辨率的子梳（30 GHz 间距）。
    formula: >
      SHG: ω_800 + ω_800 → ω_400（二次谐波）；
      SFM: ω_800 + ω_1200 → ω_490（和频）；
      连续覆盖: SHG 谱（390–440 nm）+ SFM 谱（440–520 nm）→ 无谱间隙 390–520 nm
    source:
      zotero_key: "NDSVHPF5"
      claim: >
        "Here, we introduce a concept achieving a broad, continuous spectrum by combining 
        second-harmonic generation and sum-frequency-mixing in an MgO:PPLN waveguide 
        to generate 390–520 nm light from a 1 GHz Ti:sapphire frequency comb... 
        demonstrate how the approach can bridge the spectral gap present in second-harmonic-only conversion."
    breakthrough_paths:
      - step: 1
        entity: meth.astro_comb_rv_calibration
        context: "天文光梳径向速度定标方法的基本原理：多 GHz 间距梳齿提供精密波长参考（跨文件引用 ycas2012.yaml）"
      - step: 2
        entity: pri.shg_sfm_combined_astrocomb_continuous_coverage_c24
        context: "SHG + SFM 组合原理：消除单 SHG 方案的蓝绿谱间隙（440–480 nm），实现连续覆盖恒星光谱密集吸收线区"
      - step: 3
        entity: ent.continuous_uv_bluegreen_astrocomb_c24
        context: "应用该原理实现 390–520 nm 连续天文光梳，梳齿均匀度 <5 dB，适配 HARPS/ESPRESSO/ANDES 蓝光 RV 仪器（目标 <10 cm/s 精度）"

