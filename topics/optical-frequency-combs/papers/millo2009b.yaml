methods:
  - id: meth.fiber_comb_locked_usl_microwave_m09b
    name: "光纤梳锁超稳激光光生微波方法（Millo 2009b）"
    status: demonstrated
    applies_to: ent.fiber_comb_microwave_cs_fountain_m09b
    steps_summary: >
      1. Er:fiber 梳振荡器（frep ~ 250 MHz）+ 内置 f-2f 干涉仪测 fceo；
      2. 1542 nm 超稳 CW 激光（光腔锁定）与梳齿拍频 fbeat = νcw - N·frep - fceo；
      3. fbeat - fceo 混频产生 νcw - N·frep（fceo 独立）；
      4. 该信号经跟踪振荡器滤波 + 128 分频 + DDS 合成参考 → 相位误差信号；
      5. PLL 反馈到梳泵浦功率（frep 控制），伺服带宽 120 kHz；
      6. 锁定后 frep（及其倍频程）复现超稳激光稳定度；
      7. frep 的高次谐波（如 11.932 GHz = 48×frep）经高速光电探测输出光生微波；
      8. 该微波驱动 Cs 喷泉钟 Ramsey 光谱询问，替代 CSO。
    required_hardware:
      - "Er:fiber 梳（frep ~ 250 MHz，内置 f-2f）"
      - "超稳光腔 + 1542 nm CW 激光"
      - "PLL 伺服（泵浦功率调制）"
      - "高速光电探测器（frep 倍频程）"
      - "Cs 喷泉钟"
    advantages:
      - "frep 及其谐波复现超稳激光稳定度（~10⁻¹⁵ @ 1 s）"
      - "光纤梳可靠、低维护，优于 CSO（低温维护）"
      - "同时提供光学频率综合与微波产生"
    disadvantages:
      - "需要超稳光腔（额外系统）"
      - "微波稳定度受限于超稳激光长期漂移（需 DDS 线性斜坡补偿）"

