  note: >
    [技术论文] LNE-SYRTE（法国）+ U. Western Australia. 光纤梳光生微波驱动 Cs 喷泉钟：
    (1) Er:fiber 梳（frep ~ 250 MHz）锁定至超稳光腔（1542 nm CW 参考激光），frep 倍频程（11.932 GHz）作为喷泉钟询问振荡器；
    (2) 与钛宝石梳（TSOFC）+ 低温蓝宝石振荡器（CSO）三路比对，光纤梳光生微波稳定度 ~3×10⁻¹⁵ @ 1-10 s（与 Ti:sapph 同级）；
    (3) 喷泉钟 Ramsey 光谱驱动由光纤梳微波替代 CSO，钟稳定度 3.5×10⁻¹⁴ τ⁻¹/²；
    (4) 首次将光纤梳光生微波应用于喷泉钟，验证可靠性（CSO 替代方案）。
    本工作是光纤梳光生微波应用演示（达到 Ti:sapph 同级稳定度，但非首次且未刷新纪录），归 evidence。
    对齐 v2 子域主线：B-FreqSyn（光学分频到微波）。

