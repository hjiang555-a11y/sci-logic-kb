    [技术论文] NIST + JILA (Xing / Kowligy / Lesko / Lind / Diddams)。以 Menlo Figure-9 Er:光纤锁模激光器（1.56 µm，100 MHz）为种子，经 EDFA 放大到 190 mW，50 fs， 在 30 cm HNLF1 中通过 Raman 孤子自频移产生 1928 nm / 45 fs / 40 mW 的 2 µm 种子； PM-TDF CPA（Nufern PM-TSF-9/125，前向 1550 nm 泵浦）放大至 420 mW，随后两级压缩 （PM1550XP 64 cm 补偿 + PM-HNLF2 6 cm 非线性自压缩）得到 327 mW、9.5 fs（1.4 光周期） 脉冲，谱覆盖 1–2.4 µm。13 mW 旁路经 PPLN 做 f-2f，在 1075 nm 波段回读 f_ceo， 30 dB SNR @300 kHz RBW、3 dB 线宽 ~5 kHz。系统完全采用商用光纤器件，35×30 cm 立面盒可容纳。
entities:
  - id: ent.all_fiber_2um_comb_x20
    name: "全光纤 2 µm 飞秒频率梳系统（Xing 2020）"
    aliases: ["All-fiber 2 µm frequency comb", "Tm-doped fiber comb with SSFS seeding"]
    hierarchy_level: 2
    status: demonstrated
    function: >
      以 1.56 µm Er:光纤锁模激光器为种子，经 EDFA 放大到 190 mW / 50 fs，
      30 cm HNLF1 通过 Raman 孤子自频移（SSFS）产生 1928 nm / 45 fs / 40 mW 2 µm 种子；
      PM-TDF CPA（2 m PM-TSF-9/125，前向 1550 nm 泵浦）放大至 420 mW，两级非线性自压缩
      （PM1550XP 64 cm + 椭圆芯 PM-HNLF2 6 cm）将脉冲压缩到 9.5 fs（1.4 光周期），
      输出 327 mW 平均功率、104 kW 峰值功率、1–2.4 µm 倍频程谱，直接支持 f-2f 自参考。
      整机完全采用商用 PM 光纤器件，35×30 cm 立面盒内容纳。
    key_parameters:
      seed: "Menlo Figure-9 Er:fiber MLL, 1.56 µm, 100 MHz"
      ssfs_seed: "1928 nm / 45 fs / 40 mW"
      tdf_cpa: "Nufern PM-TSF-9/125, 2 m, 前向 1550 nm CW，输出 420 mW"
      compressors: "PM1550XP 64 cm → ~90 fs；PM-HNLF2 6 cm → 9.5 fs"
      final_output: "327 mW, 9.5 fs, 100 MHz, 1–2.4 µm"
      pump_efficiency: "~17% (1.94 W C-band → 327 mW @2 µm)"
    interface_requirements:
      input: "1.56 µm Er:fiber 梳种子"
      output: "倍频程相干 2 µm 梳；f-2f CEO 稳定；下游 MIR DFG/SCG"
