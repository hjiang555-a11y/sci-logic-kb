  - id: ent.hnlf_ssfs_stage_x20
    name: "HNLF 孤子自频移级（Xing 2020）"
    aliases: ["HNLF1 Raman soliton stage"]
    hierarchy_level: 3
    status: demonstrated
    function: >
      30 cm PM-HNLF（β₂=-7.82 ps²/km, γ=10 (W·km)⁻¹ @1550 nm）承接 50 fs 1.56 µm 脉冲，
      脉冲内 Raman 散射把孤子红移到 1928 nm / 45 fs / 40 mW，
      单级实现"波段切换+种子成形"，连接 Er:fiber 与 Tm:fiber 放大窗口。
    note: "PART-OF ent.all_fiber_2um_comb_x20"

  - id: ent.hnlf_self_compression_stage_x20
    name: "HNLF2 非线性自压缩级（Xing 2020）"
    aliases: ["Elliptical-core PM-HNLF2 self-compression"]
    hierarchy_level: 3
    status: demonstrated
    function: >
      6 cm 椭圆芯 PM-HNLF（β₂=-13 ps²/km, γ=3.1 (W·km)⁻¹ @1930 nm）同时完成频谱展宽与时域压缩，
      末端 ~1 cm 内把 ~90 fs 脉冲自压缩到 9.5 fs 并在 1 µm 产生 dispersive wave，
      使 2 µm SHG 与 DW 在时域上自然重叠，支撑 inline f-2f。长度容差 ±2 mm。
    note: "PART-OF ent.all_fiber_2um_comb_x20"

principles:
  - id: pri.soliton_self_frequency_shift_2um
    name: "2 µm 孤子自频移原理（Raman SSFS 波段切换）"
    tier: domain
    verification_status: observed
    statement: >
      反常色散光纤中亚皮秒孤子通过脉冲内受激 Raman 散射持续红移（dν/dz ∝ -|β₂|/τ⁴），
      利用该机制可在单段 HNLF 内把 1.56 µm Er:fiber 梳平移到 1.9 µm，保持梳线相位相干性，
      得到 Tm:fiber 可直接放大的 2 µm 种子。
    domain: "非线性光纤光学；频率梳波段扩展"
    key_insight: >
      SSFS 把成熟 1.5 µm 电信级 Er:fiber 梳 "搬" 到 2 µm Tm:fiber 放大窗口，
      避开直接锁模 Tm:fiber 在少周期区未成熟的问题，是全光纤 2 µm 梳的使能桥梁。
    conditions: "反常色散 HNLF；亚皮秒基阶孤子输入；PM 光纤维持偏振相干"
    invalidated_when:
      - "脉冲进入多孤子分裂与色散波剥离的强噪声区"
    source_claim: >
      "the seed laser converts the commercially available low noise 1.56 µm frequency comb to 2 µm
       by soliton self-frequency shift in highly nonlinear fiber (HNLF)"

  - id: pri.all_fiber_nonlinear_self_compression_2um
    name: "2 µm 全光纤非线性自压缩原理（反常色散 HNLF 中 SPM + 孤子压缩）"
    tier: domain
    verification_status: observed
    statement: >
      反常色散 HNLF 中高阶孤子（N² = γ P₀ τ₀² / |β₂|，N>1）在 z_c ≈ L_D/N 处同时完成
      SPM 展宽与孤子压缩，脉宽降至亚 2 光周期，频谱展宽到倍频程（1–2.4 µm），
      且在 dispersive wave 波段自然形成与基频 SHG 时域重合的光场。该机制把"展宽+压缩"
      合并在单段 ~6 cm 光纤，避免自由空间光栅压缩器在 2 µm 处被三阶色散限制在 ~80 fs。
    domain: "非线性光纤光学；少周期脉冲产生"
    key_insight: >
      "带宽展宽"与"时间压缩"在同一段反常色散 HNLF 中耦合完成，是实现全光纤 <2 光周期
      2 µm 输出与倍频程谱的关键；并天然让 SHG 与 DW 时域重叠，方便同纤 f-2f。
    conditions: "反常色散 HNLF；近傅里叶极限 ~90 fs 输入；光纤长度匹配最优自压缩长度"
    invalidated_when:
      - "光纤长度超过最优压缩长度 → 孤子分裂，卫星脉冲恶化"
      - "输入脉冲畸变（非近傅里叶）→ 峰值强度不足"
    source_claim: >
      "nonlinear self-compression method combines spectral broadening and compression in one single fiber,
       making it ideal for implementation in an all-fiber setup"

  - id: pri.octave_self_compression_enables_inline_f2f
    name: "自压缩倍频程谱使同纤 f-2f 免延迟化"
    tier: engineering
    verification_status: observed
    statement: >
      非线性自压缩产生的 1 µm dispersive wave 与 2 µm 基频 PPLN SHG 在时域上本征重合
      （走离 <2 mm HNLF 长度），无需外部延迟线即可得到高 SNR 的 f-2f 拍频。
    domain: "光学频率梳自参考"
    formula: "f_CEO = 2ν_n(2 µm) − ν_{2n}(DW @1 µm)；SH 与 DW 时间走离 <2 mm 光纤传播"
    key_insight: >
      把 DW 直接当作 f-2f 高频支，而非外加分频器或延迟，是全光纤少周期梳 inline f_ceo 的工程拐点。
    conditions: "SHG 与 DW 时间走离小于光路传播时间"
    source_claim: >
      "the SHG of the 2 µm pulse falls right on the DW pulse peak ... using no extra pulse delay control"

methods:
  - id: meth.ssfs_tdf_cpa_self_compression_comb_x20
    name: "SSFS + Tm:fiber CPA + 两级自压缩 2 µm 全光纤梳产生方法"
    status: demonstrated
    applies_to: ent.all_fiber_2um_comb_x20
    steps_summary: >
      (1) Er:fiber MLL 种子 → EDFA 190 mW / 50 fs；
      (2) 30 cm HNLF1 SSFS → 1928 nm / 45 fs / 40 mW；
      (3) PM2000D 预伸展 + 2 m PM-TSF-9/125 TDF CPA（1550 nm 前向泵浦）→ 420 mW；
      (4) 两级压缩：PM1550XP 64 cm → ~90 fs，PM-HNLF2 6 cm 自压缩 → 9.5 fs / 327 mW / 1–2.4 µm；
      (5) 13 mW 旁路经 1 mm PPLN (Λ=30 µm) SHG + BP (1075±25 nm) → f_ceo SNR≥30 dB @300 kHz RBW。
    required_hardware:
      - ent.all_fiber_2um_comb_x20
      - ent.hnlf_ssfs_stage_x20
      - ent.hnlf_self_compression_stage_x20
    advantages:
      - "全商用 PM 光纤器件，可重复、免对齐"
      - "首次全光纤 <2 光周期 2 µm，峰值 ~104 kW"
      - "倍频程谱支持同纤 f-2f，无需外部延迟"
    disadvantages:
      - "主峰仅含 ~32% 总能量，卫星脉冲限制峰值效率"
      - "~17% 泵浦效率；重频固定 100 MHz"
    conditions:
      - "HNLF2 长度 6 cm ±2 mm；C 波段泵浦 ~1.9 W"
    source_claim: >
      "we present the first sub-2-cycle (9.5 fs) frequency comb source implemented using an all-fiber configuration at 2 µm"

