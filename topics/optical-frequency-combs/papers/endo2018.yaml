- id: met.ofc_timing_jitter_floor
  name: OFC 模间定时抖动本底
  unit: fs（飞秒，均方根）
  description: '光学频率梳输出脉冲序列的定时抖动（即 frep 相位噪声积分值），
    表征 OFC 作为微波/光学时钟信号源的相位纯净度下限。
    在不同平台（光纤梳 vs. 固态梳）和稳定化方案（自由运转 vs. 主动锁定）下数值差异显著。

    '
  demonstrated_value:
    value: <1 fs（主动锁定至超稳激光后，BOMPD 方案）
    conditions: 'OFC frep 通过 BOMPD 锁定至光学参考，积分频率范围 1 Hz–1 MHz

      '
    verification_status: observed
    confidence: high
    source:
      zotero_key: H93SHF89
      claim: BOMPD achieves sub-femtosecond residual timing jitter between OFC and
        optical reference
  note: '通用指标节点，适用于所有 OFC 类型。具体数值随平台和稳定化方案变化。
    与 met.free_running_freq_instability_e18 互补：前者描述锁定后残余，后者描述自由运转本底。

    '

