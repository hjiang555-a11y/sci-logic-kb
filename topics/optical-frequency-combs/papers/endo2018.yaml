    聚焦"超低噪声"维度：(1) 介绍 OFC 两个自由度 frep、f_CEO 及其稳定化原理（f-2f 自参考、BOMPD）；
    (2) 对比 Ti:sapphire、Er/Yb/Tm 光纤梳、VECSEL/MIXSEL 半导体梳、微谐振腔 Kerr 梳、EO 梳的噪声机制与工程特点；
