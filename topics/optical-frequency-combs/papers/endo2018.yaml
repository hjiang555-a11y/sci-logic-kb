principles:
- id: pri.ofc_two_dof_stabilization
  name: OFC 双自由度独立稳定化原理
  tier: meta
  verification_status: observed
  statement: '光学频率梳由两个独立自由度完全描述：重复频率 frep 和载波包络偏移频率 f_CEO（梳齿方程 fₙ = f_CEO + n·frep）。
    实现绝对频率计量要求两个自由度同时受控，各自可独立溯源至光学或微波参考：
    f_CEO 通常通过 f-2f 自参考方案检测和锁定（需倍频程频谱）；
    frep 通过将梳齿拍频至光学频率参考（光钟/超稳激光）或锁定至微波频率标准实现稳定化。
    两路稳定化相互独立，工程上可分别优化带宽与残余噪声。

    '
  domain: 光学频率计量，超快光学
  formula: 'fₙ = f_CEO + n·frep（n ~ 10⁵–10⁶）；
    f_CEO 通过 f-2f 拍频检测：f_beat = 2f_n − f_{2n} = f_CEO；
    frep 通过光-微波拍频或光-光拍频锁定

    '
  key_insight: '将 OFC 理解为双自由度可控系统，是实现全光学原子钟和超低噪声微波合成的框架基础——
    两个自由度可分别溯源至光钟（超高精度）或微波基准，并可单独或联合优化。

    '
  conditions: 'f-2f 自参考要求 OFC 频谱覆盖至少一个光学倍频程；
    frep 光学锁定要求有可用的超稳激光参考

    '
  preconditions:
  - 激光器处于稳定锁模状态，脉冲序列周期性满足
  - f_CEO 检测需倍频程频谱（直接或经非线性展宽）
  invalidated_when:
  - OFC 非锁模运转（CW 或多脉冲不稳定）
  - 光谱带宽不足以实现 f-2f 拍频
  source_claim: '"optical frequency combs require simultaneous stabilization of both
    the repetition rate frep and the carrier-envelope offset frequency f_CEO,
    each of which can be referenced independently to an optical or microwave standard"

    '
  open_questions:
  - Can frep and f_CEO be simultaneously locked with sub-attosecond residual jitter
    using purely optical references?

- id: pri.ofc_noise_hierarchy
  name: OFC 噪声层级原理
  tier: domain
  verification_status: observed
  statement: 'OFC 的频率噪声来源分为量子层和技术层：
    (1) 量子极限：Schawlow-Townes 相位噪声（自发辐射驱动），设定 OFC 线宽下限，
    对于高 Q 腔的固态激光器此极限在 mHz 量级以下；
    (2) 技术噪声（主导实际性能）：泵浦 RIN 通过 KK（Kramers-Kronig）耦合转化为频率噪声，
    机械振动和温度波动通过腔长变化引入 frep 和 f_CEO 噪声，
    光纤激光器额外受 ASE（自发辐射放大）和非线性相位噪声影响（Raman、SPM），
    导致光纤梳的自由运转技术噪声通常高于固态梳。
    固态低损耗腔（如 Ti:sapphire、Er:glass 整体式腔）因往返损耗低、非线性效应弱，
    技术噪声本底显著低于光纤平台。

    '
  domain: 激光噪声理论，光学频率计量
  formula: 'S_f(f) = S_ST + S_pump-RIN + S_vib + S_temp + S_ASE + S_NL；
    光纤激光器：S_ASE ∝ N_sp·hν·δν / P（N_sp 反转因子，δν 带宽，P 信号功率）；
    非线性相位噪声 S_NL ∝ γ·P_peak²（γ 非线性系数）

    '
  key_insight: '同一 OFC 平台（如整体式 Er:glass 腔）可通过同时降低往返损耗、
    消除腔内气路、减少非线性相互作用，协同压制多个技术噪声源——
    这解释了为何整体式固态腔能在自由运转下达到 ~10⁻¹⁹ 水平。

    '
  conditions: '固态低损耗腔优势在自由运转下最为显著；
    经主动稳定后，所有 OFC 类型均可达到参考源水平

    '
  preconditions:
  - 激光器工作在稳定锁模状态
  breakthrough_paths:
  - direction: pri.monolithic_cavity_intrinsic_noise_reduction
    expected_gain: 自由运转 frep 不稳定度从典型光纤梳 ~10⁻¹³ 提升至 ~10⁻¹⁹ @ 1 s
    status: demonstrated
    source: 'Endo et al. 2018: monolithic Er:glass + CaF₂ OFC free-running ~1×10⁻¹⁹ @ 1 s'
  source_claim: '"fiber lasers have larger technical noise than solid-state due to
    high round-trip loss and nonlinearity; solid-state: lower intrinsic noise"

    '
  open_questions:
  - What is the quantum (Schawlow-Townes) noise floor for a monolithic Er:glass cavity
    at 1.5 GHz frep?
  - Can integrated photonic OFCs reach solid-state intrinsic noise levels through
    ultra-low-loss waveguides?

- id: pri.monolithic_cavity_intrinsic_noise_reduction
  name: 整体式全固态腔 OFC 内禀噪声压制原理
  tier: domain
  verification_status: observed
  statement: '采用整体式（空气路径为零）全固态激光腔（如 Er:glass 增益 + CaF₂ 晶体腔镜），
    可同时实现以下噪声压制效果：
    (1) 消除腔内气路引起的空气折射率波动（消除气流 frep 噪声）；
    (2) 降低往返损耗（固态介质损耗 << 光纤往返损耗），减少 ASE 噪声；
    (3) 减少非线性相位积累（无单模光纤非线性），抑制 Raman/SPM 引起的 f_CEO 噪声；
    (4) 热机械稳定性高（腔体单一材料，热膨胀均匀）。
    综合效果使 OFC 在自由运转（不锁任何外部参考）下达到 ~1×10⁻¹⁹@1 s 分数频率不稳定度。

    '
  domain: 激光腔设计，光学频率计量
  key_insight: '整体式腔将多个独立噪声源（气路、往返损耗、非线性）同步消除，
    是实现"近量子极限"自由运转 OFC 的核心工程路径。

    '
  conditions: '需腔体材料热膨胀系数低且均匀（CaF₂ 低热膨胀，Er:glass 增益匹配）；
    整体式设计需精密光学接触或键合，增加制造难度

    '
  preconditions:
  - 增益介质与腔镜材料光学接触良好（无胶黏引入的吸收和膨胀噪声）
  - frep 较高（~GHz 级）以减少模式间距相对不确定度
  invalidated_when:
  - 腔内引入任何气隙或调谐压电元件（破坏整体性）
  - 热功耗过大导致 Er:glass 热透镜效应显著
  source_claim: '"monolithic all-solid-state cavity (Er:glass + CaF2) eliminates
    air-path fluctuations, reduces round-trip loss, and achieves free-running
    stability at the 10^-19 level"

    '
  breakthrough_paths:
  - direction: meth.balanced_optical_microwave_phase_detector
    expected_gain: 进一步从 10⁻¹⁹ 自由运转基础上实现锁定后 <10⁻¹⁸ 定时抖动（残余）
    status: proposed
    source: 'Endo 2018: BOMPD as the next step for locking monolithic OFC to optical reference'

methods:
- id: meth.balanced_optical_microwave_phase_detector
  name: 平衡光-微波相位探测器（BOMPD）
  aliases:
  - BOMPD
  - balanced optical-microwave phase detector
  status: demonstrated
  applies_to: ent.optical_frequency_comb
  steps_summary: '1. 从超稳激光（光学参考）采样 OFC 的重复频率谐波 n·frep；
    2. 利用光电探测器将 OFC 脉冲转换为微波信号，与本地微波振荡器比较相位；
    3. 通过平衡探测架构抵消 AM 噪声对 PM 探测的串扰（消除幅度-相位转换误差）；
    4. 输出残余相位误差信号，用于锁定 frep 至光学参考，实现亚飞秒定时抖动。

    '
  advantages:
  - 相位探测灵敏度达 sub-fs 量级（消除 AM→PM 串扰）
  - 可同时测量和锁定 OFC 光-微波相位相干性
  - 适用于高 frep（GHz 级）OFC 的微波合成
  disadvantages:
  - 需要超稳激光作为光学参考
  - 平衡探测对光路对称性要求高
  conditions:
  - 需要高功率 OFC（光电探测 SNR 足够）
  - 需要频谱纯净的微波本振作为比较基准
  source_claim: '"balanced optical-microwave phase detector (BOMPD) measures residual
    phase noise between optical reference and microwave with sub-femtosecond precision"

    '
  note: '如 meth.balanced_optical_microwave_phase_detector 已在其他文件定义，本定义以首次出现文件为权威来源。
    本文件为首次引入本方法节点，待查重后确认。

    '

