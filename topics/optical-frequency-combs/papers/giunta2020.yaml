principles:
  - id: pri.dichroic_heterodyne_detection
    name: "色散外差检测（Dichroic Heterodyne Detection）相位漂移补偿原理"
    tier: engineering
    verification_status: observed
    statement: >
      在多分支光学频率梳系统中，非线性展宽链路（EDFA + HNLF）引入的附加相位噪声和漂移
      通过以下方式实时补偿：将展宽臂中残存的基频光 ṽ₁ 与来自短参考路径的同一梳齿 ν₁ 
      分别与共同的连续波参考激光 ν_ref 拍频，提取两路径间的相位差 (φ̃₁ − φ₁)。
      对非线性频移后的目标光 ṽ₂ 上的相位噪声 φ̃₂，利用实验确定的比例因子 r 
      进行校正：φ₂ = φ̃₂ − r(φ̃₁ − φ₁)。
      该比例因子 r 近似等于两个外差检测中光学频率的比值（r ≈ ν₂/ν₁），
      忽略小量色散效应后即可获得 Doppler 补偿后的纯净相位 φ₂。
    domain: "光学频率梳，精密频率合成"
    formula: >
      φ₂ = φ̃₂ − r·(φ̃₁ − φ₁)，其中 r ≈ ν₂/ν₁；
      效果：消除非线性光纤链路中累积的短期和长期相位漂移
    key_insight: >
      通过在同一非线性链路末端同时提取基频光（受同样噪声污染）和目标频率光的拍频，
      利用频率比例关系实现被动式相位漂移补偿，无需反向传输光束的主动补偿环路。
    conditions: "多分支频率梳系统，非线性展宽引入的光纤相位漂移为主要噪声源"
    preconditions:
      - "需要共同的连续波参考激光（USL）覆盖基频光频段"
      - "非线性链路中的色散效应须足够小，使 r ≈ ν₂/ν₁ 成立"
      - "基频光和目标频率光经历相同的光纤路径（共路传输）"
    invalidated_when:
      - "色散效应不可忽略（大光学间隔+高色散光纤），需要额外色散校正"
      - "非线性展宽过程引入非共模噪声（如四波混频产生的随机相位贡献）"
    source_claim: >
      "we introduce passive dichroic heterodyne detection, an innovative concept 
      to compensate such phase drifts, which allows us to demonstrate unprecedented 
      agreement between two combs in the 10⁻²⁰ range within only 100 s"
    open_questions:
      - "Can dichroic heterodyne detection be extended to even broader spectral gaps (>200 THz) where dispersive effects may become non-negligible?"
      - "What is the fundamental limit of the correction factor r accuracy in the presence of chromatic dispersion in HNLF?"

  - id: pri.optical_phase_tracking
    name: "实时光学相位追踪原理"
    tier: domain
    verification_status: observed
    statement: >
      通过对光学频率梳的多个梳齿同时进行实时相位追踪（而非时间平均频率计数），
      可以在短时间尺度（~100 s）内分辨并消除微小的系统性频率偏差。
      传统频率计数器在 10⁻¹⁹ 以下精度时受限于计数死时间和平均效应，
      而连续相位追踪可直接监测累积相位差，实现对频率偏移的实时灵敏检测。
      该技术使得频率梳的合成精度可与光钟的不稳定度（10⁻¹⁷ @ 1 s）匹配，
      而不引入额外误差。
    domain: "光学频率测量，精密计量"
    formula: >
      Δφ(t) = 2π∫₀ᵗ [ν_comb(t') − ν_ref(t')] dt'；
      分数频率偏差 = Δφ/(2π·ν_opt·T_meas)
    key_insight: >
      从"计数频率"到"追踪相位"的范式转换，使得 10⁻²⁰ 级的频率偏差检测
      成为可能，而不需要超长积分时间。
    conditions: "需要相位连续（无周期滑动）的锁相环运行"
    source_claim: >
      "we introduce real-time optical phase tracking with ultra-low-noise frequency combs 
      as a fundamental means to constantly monitor frequency offsets"

methods:
  - id: meth.wideband_optical_frequency_synthesis
    name: "宽带光学频率合成方法（多分支梳+色散外差检测）"
    status: demonstrated
    applies_to: ent.ultra_low_noise_fiber_comb_g20
    steps_summary: >
      1. 超稳激光器提供 1542 nm 相位参考 →
      2. 一个梳齿相位锁定至 USL（传递稳定度至整个梳谱）→
      3. 多个非线性展宽臂分别产生 1063/1157/1397 nm 光 →
      4. 色散外差检测：在每个展宽臂末端提取基频光拍频用于相位漂移补偿 →
      5. 实时相位追踪：连续监测各频段梳齿与外部光源的相位差 →
      6. 输出：宽带（~90 THz）光学频率合成，精度 10⁻²⁰
    required_hardware:
      - ent.ultra_low_noise_fiber_comb_g20
    advantages:
      - "无需 transfer oscillator 方案，大幅简化系统"
      - "实时相位追踪，100 s 内达到 10⁻²⁰ 精度"
      - "被动补偿方案，无需额外反馈环路"
      - "支持 ~90 THz 光学间隔的高保真频率桥接"
    disadvantages:
      - "仍需超稳激光作为相位参考（系统复杂度转移至参考源）"
      - "多分支架构增加光学对准复杂度"
      - "色散外差检测的 r 因子需要实验标定"
    conditions:
      - "实验室环境，光纤链路温控"
      - "相位锁定须无周期滑动（cycle-slip-free）运行"
    source_claim: >
      "we demonstrate similar performance in a much reduced acquisition time, 
      while simultaneously dropping the need for the technically complex transfer oscillator scheme"

