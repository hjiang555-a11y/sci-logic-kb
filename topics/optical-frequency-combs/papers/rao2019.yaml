entities:
  - id: ent.erfiber_comb_li_d1_r19
    name: "面向 Li D1 线测量的 Er:fiber 飞秒光纤光梳系统（Rao 2019）"
    aliases: ["Er:fiber comb for Li D1", "NTSC Er:fiber comb @671 nm"]
    hierarchy_level: 2
    status: demonstrated
    function: >
      三个子单元级联：(1) NPR（非线性偏振旋转）锁模掺铒飞秒光纤激光源，中心波长 1572 nm，
      重复频率 196.5 MHz，3dB 带宽 35 nm，脉宽 59 fs（sech²）；(2) 频率探测与控制单元：
      光纤放大 + HNLF 展宽得倍频程光谱，f-2f 共线干涉 + PPLN1 将 2 µm 分量倍频至 1 µm 干涉
      探测 fceo；泵浦电流环路锁 fceo；EOM（DO16050-1-3，高频相位）+ PZT（AE05D16F，慢调腔长）
      双驱动锁 frep；(3) 光谱扩展与拍频单元：反射式 EDFA 放大至 280 mW，单模光纤整形至 250 fs，
      55 cm HNLF（SUMITOMO OFS HNLF02，熔接效率 96%）将能量搬移至 1342 nm，PPLN2 倍频至
      671 nm，带通滤光（670 nm，70%），与 DLCpro 671 nm 单频激光在 PD2 上拍频。
    key_parameters:
      laser_type: "NPR 锁模掺铒飞秒光纤激光器"
      gain_fiber: "Er110-4/125，长度 40 cm"
      pump_wavelength: "976 nm"
      pump_power: "590 mW"
      center_wavelength: "1572 nm"
      spectrum_3db_bw: "35 nm"
      repetition_rate: "196.5 MHz"
      pulse_width: "59 fs（sech²）"
      output_power_co3: "52 mW"
      amplified_power_fceo_arm: "220 mW"
      octave_hnlf_length: "30 cm"
      spectral_extension_hnlf: "55 cm SUMITOMO OFS HNLF02（96% 熔接效率）"
      power_at_1342nm: "0.210 mW/nm（单模 251 nW）"
      power_at_671nm: "0.681 mW/nm（单模 208 nW）"
    interface_requirements:
      microwave_reference: "外部参考频率源（合成器 SYN），频率稳定度传递给光梳"
      single_frequency_laser: "Toptica DLCpro 671 nm 激光器"
      detection: "EOT3000A 光电探测器 × 2；Rohde&Schwarz FSL 频谱仪"
    note: "Level-2 实例节点，PART-OF ent.optical_frequency_comb（顶层定义于 udem2002.yaml）。"

principles:
  - id: pri.nir_to_visible_shg_comb_link_r19
    name: "红外飞秒梳经 HNLF 展宽 + PPLN 倍频链接至可见光原子跃迁线原理"
    tier: engineering
    verification_status: observed
    statement: >
      在 Er:fiber 梳直接输出光谱（1520–1607 nm）不能覆盖可见光原子跃迁的情况下，
      通过 HNLF 非线性展宽将部分能量搬移至 2·λ_target（本文 1342 nm），
      再用准相位匹配 MgO:PPLN 晶体将其倍频到目标波长（671 nm），
      即可在可见光端与单频激光拍频，将梳的相位稳定性传递到可见波段。
    domain: "非线性光纤光学；准相位匹配二次谐波；光梳-原子跃迁链路"
    formula: >
      λ_target = λ_HNLF / 2；单模能量 > ~100 nW @ RBW 300 kHz → 可产生 > ~30 dB 拍频信号；
      本文 208 nW @671 nm 对应 RBW 1 Hz 下 ~60 dB 拍频。
    key_insight: >
      对于 Er:fiber 这类红外梳，"HNLF 频谱搬移 + PPLN 倍频" 是扩展到可见原子线的标准工程路径，
      关键在于 HNLF 长度和激光偏振态的联合优化使足够能量落在 2·λ_target 附近。
    conditions: "输入脉冲宽度 ~250 fs；HNLF 熔接效率足够；PPLN 准相位匹配 @1342→671 nm；PM 保持"
    preconditions:
      - "Er:fiber 梳已完成 fceo 与 frep 锁定，梳齿相位稳定"
      - "HNLF 长度与输入偏振共同优化使 1342 nm 单模功率最大化"
    invalidated_when:
      - "HNLF 过长导致脉冲分裂、孤子漂移，破坏相干性"
      - "PPLN 温度/相位匹配条件未满足，倍频效率塌陷"
    source_claim: >
      "利用高非线性光纤和倍频晶体将光纤光梳直接输出光谱由 1520~1607 nm 扩展到 671 nm，
       获得了单模功率为 208 nW 的光信号…与 671 nm 单频激光拍频产生约为 60 dB（分辨率带宽 1 Hz）信号"

  - id: pri.dual_actuator_eom_pzt_frep_control
    name: "EOM + PZT 双驱动 frep 控制原理（高频相位 + 低频慢调）"
    tier: engineering
    verification_status: observed
    statement: >
      frep 的伺服需要同时覆盖宽带（高频相位修正）与大动态范围（慢漂修正）。
      PZT 粘接反射镜改变几何腔长，提供 Hz~kHz 的慢调节大行程；
      EOM（电光晶体）通过电压驱动折射率变化提供快速（数十 kHz 以上）相位调节，
      两者叠加在同一误差信号闭环中，形成宽带 + 大动态的 frep 锁定。
    domain: "光梳伺服工程"
    formula: "误差信号 → LP 滤波 → 并联驱动 PZT（低频段）与 EOM（高频段）"
    key_insight: >
      单独 PZT 带宽不足以压缩 frep 快速抖动，单独 EOM 行程不足以跟随慢漂；
      双驱动是 Er:fiber 光梳实现 10⁻¹³/√τ 量级 frep 内环稳定度的标准架构。
    conditions: "反射镜粘接 PZT（AE05D16F）；EOM（DO16050-1-3）插入腔内自由空间段"
    preconditions:
      - "fceo 已先锁定，frep 抖动占主导"
      - "两路驱动的传递函数交叠区无相位反转"
    source_claim: >
      "通过电光晶体和压电陶瓷改变飞秒激光光源腔长来控制重复频率 frep，
       频率稳定度是 1.75×10⁻¹³/τ¹ᐟ²"

  - id: pri.microwave_reference_transfer_to_optical_comb
    name: "微波参考频率源通过 frep/fceo 锁定传递稳定度给光梳原理"
    tier: engineering
    verification_status: observed
    statement: >
      将 frep 与 fceo 分别分频（本文 fceo 经 80 分频，frep 经 40 分频）后与外部参考频率源混频得
      误差信号，反馈到飞秒激光源的泵浦电流与腔长驱动，即可把外部参考源的频率稳定度
      通过 ν_n = N·frep + fceo 传递给每一根梳齿。
      因此光梳任一梳齿的长期稳定度不可能优于所用微波参考源。
    domain: "光梳-微波链路；绝对频率计量"
    formula: "σ_y(梳齿，长期) ≥ σ_y(微波参考)；短期受限于伺服带宽"
    key_insight: >
      本文 frep 的 100 s 稳定度 2×10⁻¹⁴ 对应 Li D1 频率 ~10 Hz 量级，恰好够用于 kHz 量级绝对测量；
      若希望测量精度继续提升，需将参考从微波升级为光频标准（超稳激光 / 光钟）。
    conditions: "frep / fceo 均连续锁定无 cycle slip；分频器、混频器相噪可忽略"
    preconditions:
      - "参考源自身稳定度优于目标测量精度"
      - "frep 伺服带宽内 PZT+EOM 组合可压制激光腔长扰动"
    invalidated_when:
      - "参考源跳跃或 GPS 失锁"
      - "frep / fceo 任一路发生 cycle slip"
    source_claim: >
      "将这两个频率信号锁定，可以获得稳定的任意梳齿频率的输出…
       利用锁相技术分别将这两个信号锁定到稳定的外部参考频率源上，
       从而将外部参考源的稳定度传递给光梳"

methods:
  - id: meth.pump_current_fceo_lock_r19
    name: "泵浦电流反馈锁定 fceo 方法（Rao 2019 实现）"
    status: demonstrated
    applies_to: ent.erfiber_comb_li_d1_r19
    steps_summary: >
      f-2f 光电探测器输出经带通滤波后得 fceo 射频信号；80 分频后与同频参考源混频产生误差；
      经环路滤波器（LP）反馈至 976 nm 泵浦激光器驱动，通过泵浦电流改变腔内增益/SPM
      从而调节载波包络相移频率。
    required_hardware:
      - "EOT3000A 光电探测器"
      - "带通滤波器 + ÷80 分频器 + 混频器 + 环路滤波"
      - "976 nm 泵浦激光驱动电流源"
    advantages:
      - "泵浦电流调节响应快，可达 kHz 级伺服带宽"
      - "无需额外机械/EO 执行器，结构简洁"
    disadvantages:
      - "泵浦电流同时影响 frep 与 RIN，存在耦合"
      - "in-loop 稳定度受限于分频后参考相噪与计数器噪底"
    conditions: "fceo SNR ≥ ~30 dB（RBW 300 kHz）；参考源相噪低于环路目标"
    source_claim: >
      "将 fceo 信号经 80 分频器后与同频率的参考信号源进行混频，
       最后通过环路滤波器反馈到飞秒激光源的泵浦控制器上，通过改变激光源的泵浦电流实现对 fceo 信号的实时控制"

  - id: meth.eom_pzt_cavity_length_frep_lock_r19
    name: "EOM+PZT 双驱动锁定 frep 方法（Rao 2019 实现）"
    status: demonstrated
    applies_to: ent.erfiber_comb_li_d1_r19
    steps_summary: >
      光电探测 frep → 滤波 → ÷40 分频 → 与参考源混频得误差信号 →
      LP 环路滤波后并联驱动 PZT（慢、大行程）与 EOM（快、小行程）改变腔长，闭环稳定 frep。
    required_hardware:
      - "PZT（AE05D16F）+ 粘接反射镜"
      - "EOM（DO16050-1-3）"
      - "÷40 分频器 + 混频器 + 环路滤波"
    advantages:
      - "双执行器覆盖宽伺服带宽 + 大行程，内环 frep 稳定度 1.75×10⁻¹³/√τ"
    disadvantages:
      - "高压驱动 EOM 复杂，须防放电；PZT 共振可能引入峰"
    conditions: "fceo 已先锁定；两执行器交叠带宽相位匹配"
    source_claim: >
      "通过外加电压到 PZT 和 EOM 上改变飞秒激光源的腔长来控制 frep"

  - id: meth.hnlf_pplc_671nm_comb_extension_r19
    name: "HNLF 展宽 + PPLN 倍频扩展光梳至 671 nm 方法（Rao 2019）"
    status: demonstrated
    applies_to: ent.erfiber_comb_li_d1_r19
    steps_summary: >
      1. 反射式 EDFA 将 Er:fiber 梳输出放大至 280 mW；
      2. 熔接一段普通 SMF 进行脉冲整形至 ~250 fs；
      3. 熔接 55 cm SUMITOMO OFS HNLF02（96% 熔接效率），优化长度与输入偏振
         使足够能量落在 1342 nm（0.210 mW/nm，3dB 带宽 0.2 nm，单模 251 nW）；
      4. 进入倍频光路（准直器 + λ/2 + MgO:PPLN2 + 带通滤光片 670 nm 70%），
         得 671 nm 输出 0.681 mW/nm，单模 208 nW；
      5. 与 DLCpro 671 nm 单频激光在 PD2 拍频，得 ~60 dB SNR（RBW 1 Hz）信号，
         驱动商用锁频伺服将光梳稳定性传递给单频激光，用于 Li 原子 D1 线精密测量。
    required_hardware:
      - "反射式 Er:fiber 放大器"
      - "SUMITOMO OFS HNLF02（55 cm）"
      - "MgO:PPLN 倍频晶体"
      - "带通滤光片 670 nm / 70%"
      - "EOT3000A 光电探测器（PD2）"
      - "DLCpro 671 nm 单频激光器"
    advantages:
      - "单模 208 nW > 100 nW 经验阈值，拍频 SNR 60 dB 可直接驱动商用锁频电路"
      - "链路全固态、纤维化，利于 Li D1 线测量实验集成"
    disadvantages:
      - "HNLF 长度与偏振敏感，需手工优化"
      - "PPLN 倍频效率对温度/准相位匹配敏感"
    conditions: "Er:fiber 梳已锁定；HNLF 偏振与长度优化；PPLN 温控稳定"
    source_claim: >
      "最终得到的输出光强为 0.25 mW…671 nm 处光功率为 0.681 mW/nm，对应单模能量为 208 nW…
       其信噪比为 60 dB（RBW 1 Hz），可以驱动商用锁频伺服系统对单频激光器进行锁定"

