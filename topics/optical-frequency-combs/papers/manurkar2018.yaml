principles:
  - id: pri.fiber_resistive_modulator_frep_tuning_m18
    name: "光纤电阻调制器 frep 调谐原理（Manurkar 2018）"
    tier: engineering
    verification_status: observed
    statement: >
      在 PM 光纤表面镀金-钯（Au-Pd）层 → 通电流加热光纤本体（电阻加热）→ 热折射效应改变光纤群折射率 → 腔长改变 → frep 调谐。
      仅加热腔内少量光纤（~m 级），热质量极小（相比传统温控腔体 kg 级），
      因此功耗降低 ~30×（0.077 W/°C vs 2.5 W/°C）且时间常数快（0.5 s，足够抑制环境温度扰动）。
    domain: "光纤激光器；温度控制"
    key_insight: >
      "将温控从'整个腔体'缩小到'腔内光纤本身'——极致的最小化热质量策略，
      是低功率空间应用的关键"——对 CubeSat 等功率受限平台至关重要。
    conditions: "PM 光纤镀金-钯层；低电阻涂层；腔内光纤长度 ~m 级"
    source_claim: >
      "By direct resistive heating of intra-cavity gold-palladium-coated fiber, which we refer to as a 'fiber resistive modulator,'
      we demonstrate a simple and low-power temperature tuning solution consuming ~77 mW/°C."

