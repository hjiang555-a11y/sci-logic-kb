  zotero_key: ""
  topic: optical-frequency-combs
  source_type: review
  contribution_type: framework
  reliability: high
  title: "Optical frequency metrology"
  year: 2002
  first_author: Udem
  journal: "Nature"
  volume: 416
  pages: "233-237"
  doi: "10.1038/416233a"
  note: >
    [综述论文 / 奠基文献] Hänsch 组（2005 Nobel 获奖工作核心团队）2002 年 Nature 综述。
    首次系统阐述飞秒锁模激光器频率梳作为通用光学频率合成/计数工具的原理与应用。
    核心贡献：(1) 阐明梳齿方程 fₙ = n·f_rep + f_CEO 的物理来源（脉冲包络周期性 + 载波-包络相移）；
    (2) 描述 f-2f 自参考方案（倍频程展宽 + SHG 拍频检测 f_CEO）；
    (3) 引入光子晶体光纤 / 微结构光纤实现超连续谱展宽至倍频程；
    (4) 演示氢 1S-2S 测量、Ca/Hg⁺/In⁺/I₂ 等光学频率绝对测量；
    (5) 提出基于窄线宽光跃迁 + 频率梳的全光学原子钟概念。
    本文标志着谐波频率链被淘汰、频率梳成为光学频率计量标准工具的转折点。
    ent.optical_frequency_comb 定义于 giunta2019.yaml；pri.self_referencing_f2f 定义于 giunta2019.yaml。

