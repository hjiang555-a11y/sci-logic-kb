# Udem 2002 — 光学频率计量：飞秒频率梳革命性综述 [光学频率梳专题奠基文献]
# 提取者：GitHub Copilot（AI草稿，待专家确认）
# 提取日期：2026-07-15
# Schema版本：v4.0
# 专题：optical-frequency-combs
# contribution_type: framework — 本文是光学频率梳领域的奠基性综述（Nobel 团队 2002 Nature review），
#   早于 giunta2019.yaml 框架文档。定义：飞秒梳频率标尺原理、超连续谱展宽、光频计数方法。
#   ent.optical_frequency_comb 和 pri.self_referencing_f2f 已在 giunta2019.yaml 中定义，本文引用之。

