  - id: met.out_of_loop_instability_z22b
    name: "out-of-loop 多支路相对稳定度（Zhang 2022b）"
    unit: "无量纲（分数频率 Allan 偏差）"
    description: >
      以 1068 nm 与 1156 nm 两支路的 SC 分别与同一 1555 nm 超稳激光拍频计数得到的
      非共模（out-of-loop）分数频率不稳定度。
    is_interface_metric: true
    coupling_formula: "σ_clock_comparison² ≥ σ_OOL² + σ_clock²（若 σ_OOL << σ_clock，则不限制比对结果）"
    demonstrated_value:
      value: "9×10⁻¹⁷ @1 s → 5.5×10⁻¹⁹ @4000 s"
      conditions: "支路长度差 ±1 cm、温度 ±0.2 °C；同一 1555 nm 超稳激光作共同参考；无实时光相位追踪"
      verification_status: observed
      confidence: established
      source: {zotero_key: "BPQDL4DN", claim: "The relative instability is 9×10⁻¹⁷ at an averaging time of 1 s, and decreases to 5.5×10⁻¹⁹ with an averaging time of approximately 4000 s"}
    theoretical_floor:
