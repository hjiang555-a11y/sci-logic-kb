principles:
  - id: pri.multibranch_vs_single_branch_tradeoff
    name: "多支路 vs 单支路超连续架构权衡原理"
    tier: engineering
    verification_status: observed
    statement: >
      单支路倍频程 SC 方案能在共光程中同时覆盖多个靶波长并共模抑制光纤热噪声，但在任一靶波长上的单模功率
      都被分摊、拍频 SNR 难以同时达标；多支路架构为每个靶波长单独做 EDFA+PM-HNLF（±PPLN），
      能把 SNR 推到 >30 dB @300 kHz，代价是每条支路都是"out-of-loop"未补偿光纤路径，
      其热致光程漂移直接进入 out-of-loop 稳定度。
    domain: "光学频率梳系统架构"
    formula: >
      σ_OOL(τ) ≈ Σ_i [∂φ_i/∂T · δT_i(τ)] / (2π · f_opt)；
      支路长度不匹配 ΔL、温差 ΔT 直接产生非共模噪声
    key_insight: >
      多支路是"SNR-vs-稳定度"的工程折中；本文用严格的支路长度匹配（±1 cm）与温度控制（±0.2 °C）
      避开了实时光相位追踪（Nicolodi 2014）带来的系统复杂度，仍达到 5.5×10⁻¹⁹ @4000 s。
    conditions: "多靶波长光钟比对应用；对 SNR 的需求压倒对极端长期稳定度的需求"
    preconditions:
      - "各支路光纤热膨胀系数相近（全 PM 同批次光纤）"
      - "温度控制优于 ±0.2 °C"
      - "支路光纤长度差 ≤1 cm 量级"
    invalidated_when:
      - "支路数增多到热/振动噪声不可协同压制"
      - "需比对的光钟稳定度进入 10⁻¹⁹ 以下需要实时相位追踪"
    source_claim: >
      "multi-branch architecture can easily produce high power OFC signals at specific wavelengths ...
      However, this results in more uncompensated fiber paths, which degrades the out-of-loop frequency instability of an OFC"

  - id: pri.figure9_nalm_pm_self_starting
    name: "figure-9 NALM + 全保偏 + 非互易 π/2 偏置自启动原理"
    tier: engineering
    verification_status: observed
    statement: >
      figure-9 NALM 结构中，Faraday 旋转器 + λ/8 波片对环内反向传播的两束脉冲产生 π/2 互易相位偏置，
      使反射率-强度曲线工作在最大斜率点，从而实现低阈值自启动锁模；全保偏光纤保证偏振态长期稳定，
      避免 NPE 方案因光纤双折射漂移导致的锁模失稳。
    domain: "光纤飞秒激光锁模"
    formula: "R_NALM(P) = sin²[ (φ_NL(P) + π/2) / 2 ]（线性化工作点）"
    key_insight: >
      这是把"figure-8/NALM 启动差"的经典缺陷在全 PM 架构下工程化解决的标准方案，
      代价是放弃 NPE 所提供的更快饱和吸收响应（脉冲宽度、RIN、f_ceo 线宽略逊 hybrid 方案）。
    conditions: "全 PM 光纤环；非互易 π/2 相位偏置器件；腔净色散近零"
    preconditions:
      - "非互易器件相位偏置稳定在 π/2 附近"
      - "环内增益光纤色散被 SMF-PM 抵消（净色散 ≈ 0）"
    source_claim: >
      "a non-reciprocal phase device, consisting of a Faraday rotator (FR) and a λ/8 wave plate,
      is installed on the space linear arm to ensure the self-starting operation by introducing a
      phase bias of π/2 between the counter-propagating portions of laser pulses in the fiber loop"

  - id: pri.thermal_drift_out_of_loop_fiber_noise
    name: "Out-of-loop 光纤热漂移限制原理"
    tier: engineering
    verification_status: observed
    statement: >
      光纤 OFC 中只有环内 + in-loop 光程被 f_ceo / f_beat 伺服闭环锁定，支路 EDFA 与 PM-HNLF
      等 out-of-loop 光纤段的长度随温度变化产生非共模光程漂移，直接附加到输出梳齿相位，
      主导长期（>1 s）out-of-loop Allan 偏差。
    domain: "光纤飞秒梳稳定性"
    formula: "δν/ν ≈ (1/L)·(∂L/∂T)·δT + (1/n)·(∂n/∂T)·δT ≈ 7×10⁻⁶·δT（石英 PM 光纤）"
    key_insight: >
      这是多支路架构的结构性瓶颈；实时光相位追踪（Nicolodi 2014）或严格热管理是两条工程路径。
    conditions: "out-of-loop 光纤段 >几十 cm；未采用实时光相位追踪"
    preconditions:
      - "支路光纤暴露在非共模温度环境"
      - "伺服带宽无法覆盖 out-of-loop 光程"
    invalidated_when:
      - "引入实时光相位追踪使 out-of-loop 光程进入伺服闭环"
    source_claim: >
      "the main factor affecting the frequency instability of fiber OFCs is environmental disturbance
      in the out-of-loop fiber"

methods:
  - id: meth.temperature_matched_multibranch_stabilization
    name: "支路长度/温度匹配以抑制 out-of-loop 热漂移的方法"
    status: demonstrated
    applies_to: ent.all_pm_erfiber_comb_z22b
    steps_summary: >
      (1) 将所有应用支路封装在同一温控盒内，温度波动 ≤±0.2 °C；
      (2) 把每条支路的总 PM 光纤长度裁剪到彼此差 ≤±1 cm，使热致光程漂移在支路间近似共模；
      (3) 以 1068 nm 与 1156 nm 两支路的 SC 分别与同一 1555 nm 超稳激光拍频，
          一路作为 in-loop 锁定通道（经 EOM+PZT 反馈腔内），另一路作为 out-of-loop 计数通道；
      (4) 用频率计（Agilent 53230A，Λ-type）长期计数 out-of-loop 拍频，给出 Allan 偏差曲线。
    required_hardware:
      - ent.all_pm_erfiber_comb_z22b
      - ent.multi_branch_supercontinuum_z22b
    advantages:
      - "无需 Nicolodi 2014 式实时光相位追踪电子学"
      - "out-of-loop 稳定度优于 Sr/Yb 最佳光钟比对水平（不构成系统极限）"
    disadvantages:
      - "若支路进一步增多或光纤延长则方案可扩展性受限"
      - "无法跨越非共模振动/声学扰动"
    conditions:
      - "支路光纤同材质同批次"
      - "应用环境振动较低"
    source_claim: >
      "we ensure that the fiber length error between different branches is within ±1 cm,
      and the temperature control range is within ±0.2 °C"

