# Zhang 2022b — 全 PM 保偏光纤 figure-9 NALM Er:fiber 梳用于光钟频率比对 [技术论文]
# 提取者：GitHub Copilot（AI草稿，待专家确认）
# 提取日期：2026-04-19
# Schema版本：v4.1
# 专题：optical-frequency-combs
# contribution_type: technical
# 文件名说明：本目录已有 zhang2022.yaml 对应另一篇 Zhang 2022（229mTh VUV 梳光谱）论文，
#   本文为同年不同课题组的 Er:fiber 梳论文，故加后缀 "b"。
#   核心贡献：
#     (1) 全保偏（all-PM）光纤 + figure-9 NALM 自启动锁模的 turnkey Er:fiber 光频梳，专为多种光钟频率比对设计；
#     (2) 四支路分别输出 698/729/1068/1156 nm（对应 Sr / Ca+ / Al+ / Yb 光钟跃迁波长），SNR >30 dB @300 kHz；
#     (3) 通过严格匹配支路光纤长度（±1 cm）与恒温控制（±0.2 °C）压低共模外的热漂移，out-of-loop 稳定度 9×10⁻¹⁷ @1 s → 5.5×10⁻¹⁹ @4000 s；
#     (4) 证明在不引入实时光相位追踪（Nicolodi 2014 方案）的前提下，仅靠热管理即可满足 10⁻¹⁸ 级光钟比对需求。
#   Framework 依赖：ent.optical_frequency_comb 权威定义于 udem2002.yaml；
#     pri.self_referencing_f2f 定义于 udem2002.yaml / giunta2019.yaml；
#     本系统相对 zhang2017.yaml 的 NPE+NALM 混合锁模方案属工程演进（全 PM + 纯 figure-9 NALM + 多支路应用结构）。

