entities:
  - id: ent.all_pm_erfiber_comb_z22b
    name: "全保偏 figure-9 NALM Er:fiber 光学频率梳（Zhang 2022b 系统）"
    aliases: ["all-PM Er:fiber frequency comb", "figure-9 NALM PM Er:fiber comb", "turnkey Er:fiber OFC for optical clock comparison"]
    hierarchy_level: 2
    status: demonstrated
    function: >
      以 figure-9 结构的 NALM（非线性放大环镜）作为唯一锁模机制，所有腔内及支路光纤均采用保偏（PM）光纤，
      并以 Faraday 旋转器 + λ/8 波片构成非互易相位偏置器件（π/2）实现自启动锁模。腔净色散近零；
      基频重频 200 MHz，光谱 FWHM 75 nm（变换极限 46 fs）。
      主输出端 6 mW 平均分配给五支路：一支用于 PM-HNLF 单支路超连续展宽（倍频程）+ 共光程 f-2f 干涉仪产生 f_ceo；
      四支应用支路分别通过 CPA（EDFA + PM 色散管理 + PM-HNLF + 可选 PPLN 倍频）在 698/729/1068/1156 nm 处
      生成目标波长供 Sr、Ca+、Al+（1064 nm 四倍频自 Al+ 钟方案）、Yb（1156 nm 倍频）光钟比对。
    key_parameters:
      mode_locking_scheme: "figure-9 NALM（纯 NALM，不含 NPE）"
      polarization_architecture: "全保偏（all-PM）光纤"
      self_start_mechanism: "Faraday 旋转器 + λ/8 WP 产生 π/2 非互易相位偏置"
