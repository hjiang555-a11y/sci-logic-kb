principles:
  - id: pri.ofc_unified_electromagnetic_spectrum_framework
    name: "OFC 作为统一电磁波谱相干标尺框架"
    tier: meta
    verification_status: observed
    statement: >
      "光学频率梳提供一套由 (f_rep, f_o) 两参数完全决定的等间距相干频率网格，此网格
      本身不受波段限制——通过非线性频率转换（差频生成 DFG、高次谐波产生 HHG、
      参数下转换 OPO 等）可扩展至 mHz 量子钟跃迁、mid/far-IR、THz、XUV、软 X 射线
      全频段。结果：整个电磁波谱从 RF 到 XUV 可以用同一把 OFC 基准标尺做相干度量与
      频率合成。"
      这是 OFC 在 2020 年代获得的新学科定位——不再是"光频计数器"，而是"电磁波谱
      的相干统一工具"。
    domain: "光学频率计量；非线性光学；电磁波谱学"
    key_insight: >
      2000 年 OFC 打破 "光频测不准" 的诅咒（与微波锁相）；2020 年 OFC 打破 "不同波段
      之间无相干参考" 的诅咒（RF–XUV 统一）。这两次突破的共同本质：f_n = n·f_rep + f_o
      的整数 n 可跨越 10+ 个数量级变化，只要存在足够强的非线性转换通道。本原理
      是 OFC 的"万能标尺"身份证明。
    conditions: "OFC 短期相位噪声足够低以维持转换后相干；非线性通道效率足够；谱覆盖与应用波段匹配"
    formula: "f_n = n * f_rep + f_o  with n spanning ~10^3 (THz) to ~10^8 (XUV)"
    source:
      zotero_key: "DIDDAMS2020-SCIENCE"
      claim: >
        "the optical frequency comb now serves as a phase-coherent ruler that spans
        from radio frequencies to the extreme ultraviolet, coherently unifying the
        electromagnetic spectrum from mHz atomic-clock transitions to attosecond
        harmonic generation."

  - id: pri.three_comb_platforms_triumvirate_dvu20
    name: "Ti:sapph / fiber / 微梳 三足鼎立平台生态原理"
    tier: domain
    verification_status: observed
    statement: >
      "2020 年 OFC 硬件生态稳定在三大类并行共存的平台：
      (T1) Ti:sapphire Kerr-lens 锁模（最低相位噪声，研究实验室首选）；
      (T2) Er/Yb:fiber 锁模（鲁棒、商业化、外场应用）；
      (T3) microresonator Kerr 孤子梳（芯片级集成、低功耗、新兴应用）。
      三者不互相淘汰，而是分工：T1 做极限精度参考，T2 做量产现场应用，T3 做片上
      集成与便携系统。"
    domain: "OFC 系统工程；硬件生态"
    key_insight: >
      与 fortier2019.yaml 的 pri.comb_platform_tradeoffs_f19 互补——本节点给出 2020
      后的"三足鼎立"共识（QCL 仍边缘，EO 梳尚未主流化），是 Diddams/Vahala/Udem
      三位学者的联合判断，权威性高。Vahala 是微梳开拓者，Udem 是 Ti:sapph 奠基者，
      Diddams 是光纤梳工程化推手，三人的联合综述相当于三大社区共同签字。
    conditions: "2020 年代前后行业共识；2025+ 新平台（集成 MB 锁模、电泵浦孤子梳）可能扩展此框架"
    formula: null
    source:
