entities:
  - id: ent.single_ion_comb_spectrometer_c20
    name: "单分子离子 + 飞秒梳 Raman 光谱仪（Chou 2020 系统）"
    aliases:
      - "quantum-logic + OFC molecular spectrometer"
      - "trapped CaH+ comb Raman spectrometer"
    hierarchy_level: 2
    status: demonstrated
    function: >
      由线性 Paul 阱（超高真空）共囚禁的 40Ca+–40CaH+ 双离子组成；
      1051 nm 连续光纤激光产生一对 CW Raman 光束做分子态制备与读出（通过耦合运动模式的共振边带转移）；
      Ti:S 飞秒 OFC 经分束 + 一对 AOM 产生两束脉冲梳 Raman 光束，
      梳齿对共同驱动 ΔJ = ±2、Δm = ±1 的 THz 级受激 Raman 转动跃迁（CRPT，comb Raman pulse train）；
      色散由啁啾镜预补偿，可调延迟线保证两臂脉冲在离子位置时间重合。
      读出通过探测 40Ca+ 的运动边带状态完成，分子保留原始量子态供进一步操纵。
    key_parameters:
      molecular_species: "40CaH+（与 40Ca+ 共囚禁于线性 Paul 阱）"
      trap_type: "线性 Paul 阱，UHV，z 方向共享运动模式"
      state_prep_laser: "1051 nm CW 光纤 Raman，signature transition 投影制备（启发式）"
      comb_source: "Ti:Sa 飞秒 OFC，frep ≈ 80 MHz，中心波长 800–850 nm"
      comb_bandwidth: "~10 THz（决定可覆盖的转动跃迁范围）"
      aom_shift: "±fAOM（两臂反向频移，扫描步长 ~frep/2）"
      selection_rules: "ΔJ = 0, ±2；Δm = ±1（两光子 Raman）"
      dispersion_control: "啁啾镜预补偿 GDD + 可调延迟台使两臂脉冲时间重合"
      readout: "40Ca+ 运动边带态非破坏性检测；启发式投影态制备"
    interface_requirements:
      magnetic_field: "静态 B ≈ 0.357(1) mT 量子化轴"
      comb_frep_reference: "微波参考（限制当前相干时间，见 breakthrough_paths）"
      vacuum_and_trap_stability: "阱 RF 电场稳定性直接决定系统不确定度 (~kHz 级)"
