principles:
  - id: pri.comb_driven_stimulated_raman_terahertz
    name: "飞秒梳驱动的 THz 受激 Raman 转动跃迁原理"
    tier: domain
    verification_status: observed
    statement: >
      两束同源飞秒梳光束经 AOM 反向频移后同时照射分子离子；
      每一束中大量梳齿彼此离电子共振远失谐，但其任一对（一束中第 n 齿、另一束中第 m 齿）
      可满足两光子共振条件 fRaman = |N·frep − 2·fAOM|，集体驱动 ΔJ = ±2 型受激 Raman 跃迁。
      由于失谐远大于振动/电子共振（~10 THz 带宽离电子共振 ~100 THz），
      自发散射率极低，而受激 Raman 拉比频率由梳齿对数 N 相干累加增强。
    domain: "分子光谱；相干量子控制；飞秒梳应用"
    formula: "fRaman = |N·frep − 2·fAOM|；Ω_eff ∝ Σ_n E_n^(p) E_{n+N}^(s*) / Δ"
    key_insight: >
      相比窄线 CW Raman，OFC 可覆盖任意 THz 范围跃迁而无需专门合成相应频率光源，
      通过扫描 fAOM（在 frep/2 内）即可在 ~10 THz 带宽内搜索未知跃迁；
      适合预知不精确的分子常数情形。
    conditions:
      - "OFC 带宽覆盖目标 Raman 频率"
      - "梳齿对电子/振动态远失谐（抑制自发散射）"
      - "两臂脉冲在分子位置时间重合（需 GDD 补偿 + 可调延迟）"
    preconditions:
      - "frep 相干稳定性足以支撑所需相干时间"
      - "两 AOM 相对相位噪声可控"
    invalidated_when:
      - "失谐不足导致散射率不可忽略"
      - "脉冲时间不重合导致梳齿对相干相消"
    source_claim: >
      "We coherently drive stimulated terahertz Raman rotational transitions using an optical frequency
      comb with a spectrum far off-resonant from most vibrational and all electronic transitions"

  - id: pri.state_prepared_single_ion_spectroscopy
    name: "单离子纯量子态光谱原理（heralded QLS 制备 + 非破坏读出）"
    tier: domain
    verification_status: observed
    statement: >
      将分子离子与逻辑原子（40Ca+）通过共享运动模式耦合；
      用 CW Raman 对"signature transition"施加 π 脉冲，尝试把分子从未知转动态投影到已知态，
      成功与否通过原子运动态变化启发式检测。重复序列抑制制备错误，
      最终制备出确定的 |J; m; χ⟩ 单量子态。读出同样基于原子运动边带，分子保留可继续操纵。
      由此消除了分子系综中常见的热分布、环境扰动、碰撞等效应，光谱线形接近自然线宽极限。
    domain: "量子逻辑光谱；单离子精密计量"
    key_insight: >
      纯量子态 + 非破坏读出使"单分子"成为有效统计样本：
      既规避系综加宽，又保留分子供重复测量与进一步量子操纵。
    conditions:
      - "逻辑原子可通过共享运动模式与分子离子耦合"
      - "存在可重复驱动的 signature transition 用作投影态制备"
    preconditions:
      - "阱冷却使运动模式可初始化到 |n=0⟩ 或 |n=1⟩"
      - "分子转动态变化时间 ≫ 制备 + 探测序列时长（本工作：10 ms 至 s 级）"
    invalidated_when:
      - "signature transition 不存在或不可辨（m、χ 简并）"
      - "黑体辐射率过高致制备期间态跳变"
    source_claim: >
      "We use quantum-logic techniques to prepare a trapped molecular ion in a single quantum state,
      drive terahertz rotational transitions with an optical frequency comb, and read out the final state
      nondestructively, leaving the molecule ready for further manipulation."

  - id: pri.microwave_referenced_comb_coherence_limit
    name: "微波参考飞秒梳相干性限制原理（分子光谱场景）"
    tier: engineering
    verification_status: observed
    statement: >
      当 OFC 的 frep（及等效 fCEO/光频链路）锁定至微波本振时，
      Raman 差频 fRaman = |N·frep − 2·fAOM| 的相位噪声由微波参考主导，
      限制相干驱动时间与谱线线宽；sub-Hz 级分辨率需将参考从微波迁移到超稳激光 / 光钟。
    domain: "光学频率梳 — 精密光谱链路"
    key_insight: >
      本工作 <1 kHz FWHM 主要是 ~1.6 ms 方脉冲的傅里叶极限，尚未到微波参考极限；
      但进一步延长脉冲至秒级相干探询将触及此极限，需按 Bartels 2004（Opt. Lett. 29, 1081）方案
      把梳锁到光学参考。
    conditions: "梳 frep 仅锁定至微波本振；分子跃迁线宽源于探询脉冲时长"
    invalidated_when:
      - "梳锁至超稳激光 / 光钟，限制转移至光参考"
    source_claim: >
      "Our resolution is currently limited by the coherence of the microwave-referenced OFC and
      can be further improved to the sub-hertz level"

  - id: pri.trap_rf_field_stark_systematic
    name: "阱 RF 电场诱导 Stark 移动系统误差原理"
    tier: engineering
    verification_status: observed
    statement: >
      线性 Paul 阱的射频电场在分子离子位置并非严格为零，耦合分子电偶极/极化率导致
      跃迁频率系统性偏移；外推至零电场的过程含百 Hz 至 kHz 级剩余不确定度。
      该项构成当前绝对频率不确定度的主导来源，对电子极化率较大的分子尤甚。
    domain: "囚禁离子精密光谱；系统误差"
    key_insight: >
      单离子 + 纯量子态已消除系综效应，但"单离子仍在电磁势中"——
      阱场 Stark 移动成为新的主导系统项；后续突破依赖于更好的阱场控制，
      或改用对阱场不敏感的分子物种。
    conditions: "线性 Paul 阱 RF 场；分子极化率显著"
    invalidated_when:
      - "迁移至对阱场不敏感物种（例如同核反平行对）"
      - "采用 RF-null 阱构型或补偿电极精细对准"
    source_claim: >
      "uncertainty in the trap radio-frequency electric field in our current setup limits
      uncertainties in extrapolation of line centers to zero electric field to hundreds of hertz"

methods:
  - id: meth.single_ion_ofc_quantum_logic_spectroscopy_c20
    name: "单分子离子 + OFC 量子逻辑光谱方法（Chou 2020）"
    status: demonstrated
    applies_to: ent.single_ion_comb_spectrometer_c20
    steps_summary: >
      1. 共囚禁 40Ca+–40CaH+，基态冷却共享 z 向运动模式；
      2. 用 1051 nm CW Raman 对 signature transition 施加边带 π 脉冲，
         成功时运动态由 |n=0⟩ 翻到 |n=1⟩，用原子检测启发式投影制备分子到已知 |J;m;χ⟩；
      3. 序列重复以抑制制备错误；
      4. Ti:Sa OFC 分束 + 两 AOM 产生 comb Raman 脉冲串（CRPT），
         两梳齿对共同驱动 ΔJ=±2 转动跃迁，fRaman=|N·frep−2·fAOM|；
      5. 扫描 fAOM（或扫描脉冲时长探 Rabi 振荡）；
      6. 用 CW Raman 依次检测初态 |J″⟩ 与末态 |J′⟩ 的占据，获得转移概率；
      7. 扣除 B 场与自旋-转动耦合修正得到 centroid 频率；
      8. 用 Eq. (1) 的多阶 J(J+1) 展开拟合 C₁–C₄ 转动常数。
    required_hardware:
      - ent.single_ion_comb_spectrometer_c20
      - ent.optical_frequency_comb
    advantages:
      - "纯量子态 + 非破坏读出：单分子可重复测量"
      - "OFC ~10 THz 带宽内任意转动跃迁可通过 fAOM 扫描找到，适合先验不精确的物种"
      - "ΔJ=±2 选择定则与 signature transition 结合，同时检测初末态，简化谱图"
      - "原理通用，可推广到多原子分子与手性分子"
    disadvantages:
      - "依赖与逻辑原子的运动模式耦合，对阱稳定性要求高"
      - "当前相干时间受微波参考 OFC 限制"
      - "阱 RF Stark 移动外推引入 kHz 级系统误差"
    conditions:
      - "OFC 带宽覆盖目标跃迁"
      - "分子转动态变化时间远长于序列时长"
    source_claim: >
      "With the molecule prepared in a known state, the ~10-THz bandwidth OFC can probe all allowed
      transitions up to several terahertz by scanning fAOM over frep/2."

