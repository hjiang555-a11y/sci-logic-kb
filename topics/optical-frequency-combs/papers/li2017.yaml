principles:
  - id: pri.thermo_optic_soliton_access_barrier
    name: "热光效应导致孤子区访问困难原理"
    tier: domain
    verification_status: observed
    statement: >
      Kerr 微腔 DKS 孤子存在于腔模红失谐侧。蓝失谐 → 红失谐的跃迁过程中，
      腔内功率骤降导致腔温快速下降（τ_thermal ~ μs），Kerr 频移 + 热光频移的耦合使
      泵浦 detuning 不稳定，常常错过孤子态窗口而回到 MI 或无光梳状态。
    domain: "微腔 Kerr 光梳；DKS 形成动力学"
    formula: >
      Δν_cavity(t) = Δν_Kerr(P(t)) + Δν_thermo(T(t))；
      从 MI → 孤子：P 突降 → T 下降 → 谐振蓝移 → detuning 再移动
    key_insight: >
      孤子访问的"热陷阱"是微梳从实验室演示走向实用化的核心工程瓶颈。
    conditions: "任何有限 dn/dT、μs 热时常数的微腔平台"
    invalidated_when:
      - "使用快速泵浦控制（功率踢动/快速频率反馈，τ_control << τ_thermal）"
      - "使用极低热光系数材料或低温平台"
    source_claim: >
      "accessing such states is complicated by thermo-optic dispersion ... microsecond thermal time
      constants often require fast pump power or frequency control to stabilize the solitons"
    open_questions:
      - "是否存在仅靠腔设计（而非快反馈）完全消除热陷阱的通用方案？"

  - id: pri.adjacent_mode_thermal_stabilization
    name: "邻近模族被动热稳定原理（Li 2017 新提出）"
    tier: engineering
    verification_status: observed
    statement: >
      当泵浦谐振红失谐侧存在来自邻近横模族的模式时，其蓝失谐加热效应为总腔温提供负反馈，
      使孤子形成期间的温度下降速率减缓，扩大了孤子态可访问的 detuning 窗口，
      使慢扫描（无快反馈）即可稳定进入单孤子态。
    domain: "微腔热-非线性耦合动力学"
    formula: "dT/dt 来自 P_pump_mode + P_adjacent_mode 双项加热"
    key_insight: >
      将"模式工程"纳入热动力学设计，以被动手段替代快速反馈，是微梳集成化的关键思路。
    conditions: "邻近横模族 FSR 接近泵浦模 + 可通过模交叉工程设计"
    source_claim: >
      "an adjacent mode family member on the red-detuned side of the pump resonance helps stabilize
      the thermal dynamics during soliton formation"
    open_questions:
      - "邻近模族位置如何在设计阶段精确预测并裁剪？"

