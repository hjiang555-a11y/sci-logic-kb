methods:
  - id: meth.red_pitaya_fpga_comb_servo_s19
    name: "Red Pitaya FPGA 梳数字伺服方法（Shaw 2019）"
    status: demonstrated
    applies_to: ent.fpga_digital_servo_er_comb_s19
    steps_summary: >
      1. fceo 探测：f-2f 干涉仪（1560 nm → PPLN 倍频 → 与 780 nm 混频）→ fceo 拍频（~20 MHz）；
      2. frep 探测：1560 nm CW 激光 + 梳齿拍频 → fbeat（~20 MHz）；
      3. Red Pitaya FPGA：a) 输入 fceo / fbeat 拍频（125 MS/s ADC）；b) 数字 PLL（相位展开 + PID 滤波）；
          c) 输出控制信号（125 MS/s DAC）→ a) fceo：泵浦电流（慢执行器）+ EOM（快执行器）；
              b) frep：PZT 镜（慢执行器）+ intra-cavity EOM（快执行器）；
      4. 开源软件：PyRPL（Python Red Pitaya Lockbox）。
    required_hardware:
      - "Red Pitaya 125-14 FPGA 板（~$500）"
      - "Er:fiber 梳（250 MHz）"
      - "1560 nm CW 激光（frep 参考）"
      - "f-2f 干涉仪（fceo 探测）"
    advantages:
      - "低成本（Red Pitaya ~$500 vs 商业系统 $10k+）"
      - "开源（降低技术门槛）"
      - "模块化（易适配多种梳平台）"
    disadvantages:
      - "ADC/DAC 分辨率 14 bit（商业系统可能 16-18 bit）"
      - "依赖社区开源软件（长期维护风险）"

