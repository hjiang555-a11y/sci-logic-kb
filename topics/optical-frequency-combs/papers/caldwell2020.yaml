principles:
  - id: pri.kolmogorov_turbulence_timing_jitter
    name: "Kolmogorov 湍流定时抖动功率谱原理"
    tier: domain
    verification_status: observed
    statement: >
      大气折射率湍流惯性子区服从 Kolmogorov 谱 Φn(κ)=0.033 Cn² κ^{-11/3}；经 Tatarskii
      路径积分 + Taylor 冻结湍流假设转为时间谱 Sφ(f)=0.0326 k² Cn² L f^{-8/3} V⊥^{5/3}，
      再乘 (ng λ₀/2πc)² 得 timing PSD；惯性子区 -8/3（timing）/-5/3（折射率）幂律。
    domain: "大气光学；湍流统计；时频传递噪声建模"
    formula: |
      S_jitter(f) = (ng λ₀/2πc)² · 0.0326 k² Cn² L f^{-8/3} V⊥^{5/3}
      （折返路径乘 4：var(Z)=var(X+Y)=4 var(X)，因 X, Y 完全相关）
    key_insight: >
      Cn²、V⊥、L、L₀ 四个可独立测量的气象/几何参数即可定量预测梳 timing PSD，
      使梳测噪声可事前估算、事后归因。
    conditions:
      - "路径平坦、地形均匀、湍流局部各向同性"
      - "V⊥ 足够大以使 Taylor 假设成立（σ_V⊥/⟨V⊥⟩ ≲ 0.33）"
      - "κ_⊥² L / k ≪ 1（远场条件，diffraction filter g≈2）"
    preconditions:
      - "Cn² 相对稳态，且被同址 sonic 以 r=1 m 结构函数法反演"
      - "两梳相干时间 > 单次 PSD 估计段长"
    invalidated_when:
      - "V⊥ < 1 m/s 导致 Taylor 冻结湍流假设失效（σ_V⊥/⟨V⊥⟩>0.33）"
      - "路径非均匀（建筑/坡地）导致各向异性湍流"
      - "外尺度 L₀ 贡献主导（低频 f<1/L₀·V⊥ 区）"
    source_claim: >
      "Substituting Eq. (1) for Φn in Eq. (7) we get the Kolmogorov model for the phase power
      spectral density, Sφ(f) = 0.0326 k² Cn² L f^{-8/3} V⊥^{5/3}"
    open_questions:
      - "V⊥ → 0 时湍流统计的正确描述（Taylor 假设破坏后的替代模型）？"
      - "测得 f^{-6.7/3} 缓坡的物理来源（内禀 vs. 测量假象）？"

  - id: pri.greenwood_tarazano_outer_scale_rolloff
    name: "Greenwood-Tarazano 外尺度缓滚降谱"
    tier: domain
    verification_status: observed
    statement: >
      经验修正的空间谱 Φn(κ)=0.033 Cn²[κ²+κ/L₀]^{-11/6}，在 κ<1/L₀ 比 von Kármán 的
      [κ²+1/L₀²]^{-11/6} 滚降更缓，timing PSD 在 f<V⊥/(2π L₀) 渐进压平，
      物理上反映 >L₀ 的大涡仍贡献 timing。
    domain: "大气光学；近地湍流谱"
    formula: "Φn(κ) = 0.033 Cn² [κ² + κ/L₀]^{-11/6}，0<κ<1/l₀"
    key_insight: >
      近地水平路径（L₀ 取 beam height ≈ 1.6 m）中 G-T 模型比 von Kármán 更好地
      拟合低频 PSD；忽视外尺度会系统性低估 timing 方差。
    conditions: "近地水平路径；L₀ 取 beam 高度量级"
    preconditions:
      - "外尺度 L₀ 可由 beam 高度近似（Ref. 4,21,22,26）"
    invalidated_when:
      - "高海拔或自由大气路径，L₀ 可远大于 beam 高度"
    source_claim: >
      "we found the Greenwood-Tarazano model best describes the low frequency behavior of the
      timing jitter power spectral density. In contrast, we found the von Kármán model
      underestimates the low-frequency power spectrum."
    contested_claims:
      - "von Kármán 形式在某些上层大气场景仍被推荐；低频拟合 L₀ 具有几何依赖"

  - id: pri.folded_path_turbulence_correlation_c20
    name: "折返路径湍流扰动完全相关 → 方差 ×4"
    tier: engineering
    verification_status: inferred
    statement: >
      若光在脉冲往返时间内湍流相位"冻结"，出射 X 与返回 Y 积累相位扰动完全相关，
      Z=X+Y 的方差 var(Z)=var(X)+var(Y)+2cov(X,Y)=4 var(X)；折返 PSD 相对单程乘 4 而非 2。
    domain: "两向链路几何；光学 timing noise"
    formula: "S_jitter,round-trip(f) = 4 · S_jitter,one-way(f)  （Taylor 成立时）"
    key_insight: >
      与 two-way 时频传递的"互易性抵消"相反：folded 单路回返放大噪声；
      两点各配一台梳的 bistatic two-way（han2024 AZ25GQE3）才能利用互易性抵消 piston。
    conditions: "单梳 + 远端被动反射器；往返时间 < 湍流相干时间"
    invalidated_when:
      - "往返时间 ≥ 湍流相干时间（高频极限）"
      - "双向独立随机（部分去相关）"
    source_claim: >
      "Since the turbulence is perfectly correlated over the timescales of the pulse propagation,
      cov(X,Y)=var(X) and var(Z) = 4 var(X). ... we can multiply the one-way temporal spectrum
      by 4 to get the two-way temporal spectrum."

  - id: pri.taylor_frozen_turbulence_hypothesis
    name: "Taylor 冻结湍流假设（时间↔空间谱等价）"
    tier: domain
    verification_status: observed
    statement: >
      若湍流涡在穿过光束的时间尺度内近似不变，则横向空间波数 κ₂ 与时间频率 f
      经 κ₂ = 2π f / V⊥ 等价，允许把空间 3D 谱转为时间 1D 谱。
      经验上需要 σ_V⊥ / ⟨V⊥⟩ ≲ 0.33。
    domain: "湍流统计；时频对偶"
    formula: "κ₂ = 2π f / V⊥"
    conditions: "中高风速；湍流 eddy 随 mean flow 平移"
    invalidated_when:
      - "σ_V⊥ / ⟨V⊥⟩ > 0.33（本文 June 7 测得 1.09，假设失效）"
      - "V⊥ ≈ 0 m/s 情形"
    source_claim: >
      "we measured the standard deviation of V⊥ divided by its time average to be 1.09,
      which is much greater than the value 0.33 empirically set as the upper limit for the
      validity of Taylor's Hypothesis"

methods:
  - id: meth.micrometeorological_cn2_retrieval_c20
    name: "直接结构函数法反演 Cn²（sonic + barometer）"
    status: demonstrated
    applies_to: ent.two_way_comb_timing_link_c20
    steps_summary: >
      1. 超声风温仪（32 Hz）测 T、V_k、V_⊥,H、V_⊥,V；气压计（10 Hz）测 P；
      2. n(t)=1+a·⟨P⟩/T，a=7.8×10⁻⁷ K/Pa；3. 取 τ 使 r=U τ=1 m；
      4. Cn²=⟨[n(t+τ)−n(t)]²⟩/(U τ)^{2/3}，1 min 平均；
      5. 梳 PSD 在 0.19–5 Hz 拟 Kolmogorov 反演梳-Cn²；6. 两路按 1 min 对齐比较。
    required_hardware:
      - "4 台超声风温仪（6 m 气象塔，z₁ = 1.59 m ≈ 光束高度）"
      - "石英压力计 + Quad Disk（抑制风噪）"
      - ent.two_way_comb_timing_link_c20
    advantages:
      - "跨仪器独立验证湍流参数"
      - "可用现成商用微气象设备部署成本低"
    disadvantages:
      - "V⊥ < 1 m/s 时系统性偏差 >5×"
      - "超声路径长度引入 >3 Hz 空间低通滤波"
    source_claim: >
      "Cn² = ⟨[n(t+τ)−n(t)]²⟩/(Uτ)^{2/3} ... For r = 1 m, a typical wind speed of U = 1 m/s
      corresponds to a time lag of τ = 1 s."

  - id: meth.linear_optical_sampling_timing_jitter_c20
    name: "线性光学采样定时抖动提取"
    status: demonstrated
    applies_to: ent.two_way_comb_timing_link_c20
    steps_summary: >
      1. LO 梳与 signal 梳 Δfr≈2 kHz 差拍，每 1/Δfr 秒生成一个干涉图；
      2. 平衡探测器记录干涉图峰值时刻 δt_IGM；
      3. 下采样得脉冲到达时刻 δT_pulse=(Δfr/fr,S) δt_IGM；
      4. 短光纤支 δT_pulse^shorted 与开放支 δT_pulse^openpath 相减得 δT_atmosphere；
      5. Welch + Hamming 窗估 PSD；噪声底 >10× 低于大气谱（10 mHz–10 Hz）。
    required_hardware:
      - ent.two_way_comb_timing_link_c20
    conditions:
      - "无 cycle slip 发生（本文未见明确 cycle slip 证据）"
      - "接收功率 >2 nW 时可持续采样；fade 期信号丢失但相位连续性系统容错"
    source_claim: >
      "Using frequency combs and linear optical sampling to measure the timing jitter of pulses"

metrics:
  - id: met.timing_jitter_psd_atmospheric_c20
    name: "大气 timing jitter 功率谱密度 S_jitter(f)（Caldwell 2020）"
    unit: "fs²/Hz 或 ps²/Hz"
    description: >
      2019 年 6 月于 Table Mountain 280 m 折返路径、1560 nm 梳测得的 timing jitter PSD。
      低频（<5 Hz）近似 -8/3 幂律，实测斜率 ~f^{-6.7/3}；~0.1 Hz 附近滚降，
      G-T 模型最优。
    demonstrated_value:
      value: "时间序列 ~2 ps（169 min 最长段）；PSD 低频 ∝ f^{-6.7/3}"
      conditions:
        - "280 m folded outdoor path，1.6 m 高"
        - "V⊥ 0–2 m/s，T 8–27 °C，L₀ ≈ 1.6 m"
        - "系统噪声底 >10× 低于大气谱（10 mHz–10 Hz）"
      verification_status: observed
      confidence: established
      source: {zotero_key: "EB5IM2K9", claim: "we detect ~2 ps of variation in the time of flight over almost three hours ... For frequencies, f, below 5 Hz, the PSD approximately follows the -8/3 power law"}
    historical_landmarks:
      first_demonstration:
        value: "飞秒梳 timing PSD 与同址气象 Cn² 传感器预测首次定量对齐（G-T 模型）"
        year: 2020
        source: {zotero_key: "EB5IM2K9"}
        note: "此前（NRL 2 km slant path, Sinclair 2018 / Ref. [13]）为 order-of-magnitude 对齐，无同址 Cn²。"

  - id: met.cn2_cross_validation_c20
    name: "Cn² 跨方法一致性指标"
    unit: "无量纲比值"
    description: >
      以 sonic + barometer 反演 Cn² 为参考，梳 timing PSD 拟合 Kolmogorov 模型
      反演的 Cn² 与之比值；V⊥ 依赖明显。
    is_interface_metric: true
    coupling_formula: "ratio = Cn²_comb / Cn²_sonic = f(⟨V⊥⟩)"
    demonstrated_value:
      value: "V⊥ > 1 m/s 时比值 ≲ 5；V⊥ → 0 时比值发散"
      conditions:
        - "1 min 分辨率"
        - "Kolmogorov 模型在 0.19–5 Hz 区间拟合梳 PSD"
      verification_status: observed
      confidence: established
      source: {zotero_key: "EB5IM2K9", claim: "agreement to within a factor of 5 for wind speed >1 m/s, and further improvement is possible as wind speed increases"}

  - id: met.outer_scale_length_c20
    name: "近地水平路径外尺度 L₀（拟合值）"
    unit: "m"
    description: >
      Greenwood-Tarazano / von Kármán 模型中外尺度参数，本文经验取为 beam 高度。
    demonstrated_value:
      value: "1.6 m（beam 高度）；敏感性测试范围 1–10 m"
      conditions: "L₀ ≈ 光束离地高度（Refs. [4,21,22,26]）"
      verification_status: inferred
      confidence: medium
      source: {zotero_key: "EB5IM2K9", claim: "L0 which we have set to the beam height above ground (1.6 m)"}

