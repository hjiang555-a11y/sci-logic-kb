# Caldwell 2020 — 飞秒梳测大气定时抖动 PSD 与同址微气象 Cn² 首次定量对齐 [技术论文]
# 提取者：GitHub Copilot（AI草稿，待专家确认）
# 提取日期：2026-04-19
# Schema版本：v4.1
# 专题：optical-frequency-combs
# contribution_type: technical
#   核心贡献：NIST Table Mountain 280 m 折返路径上，两台 1560 nm 自参考光纤梳
#   + 线性光学采样测 δT_atmosphere；同址 sonic + 气压计独立反演 Cn² 与 V⊥；
#   三种湍流谱模型（Kolmogorov / von Kármán / Greenwood-Tarazano）以气象数据为
#   输入直接预测 S_jitter(f)，首次与梳实测 PSD 定量对齐；V⊥>1 m/s 时梳-Cn² 与
#   sonic-Cn² 一致到 5× 内，V⊥→0 时 Taylor 冻结湍流假设失效。
#   Framework 依赖：ent.optical_frequency_comb（udem2002.yaml）；
#   ent.atmospheric_turbulence_channel（han2024.yaml）；
#   ent.dual_comb_spectrometer（coddington2016.yaml，技术基线）。

