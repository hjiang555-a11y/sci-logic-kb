methods:
  - id: meth.frep_lock_to_cw_reference_m13
    name: "f_rep 锁至 CW 参考激光方法（Meyer 2013 Yb:KYW 实施）"
    status: demonstrated
    applies_to: ent.yb_kyw_fs_comb_meyer13
    steps_summary: >
      1. Yb:KYW 孤子锁模激光器 + f-2f 锁 f_0；
      2. 梳齿与 1068 nm 腔稳 CW 参考拍频探测 f_rep 波动；
      3. 通过腔长/泵浦电流伺服锁 f_rep 至 CW；
      4. 同时光电探测脉冲序列得到相干 10 GHz 微波；
      5. 与独立 Ti:sapph 梳比对得到 Allan 偏差 <2.6×10⁻¹⁵ @ 1 s。
    required_hardware:
      - ent.yb_kyw_fs_comb_meyer13
    advantages:
      - "Yb:KYW 平台结构紧凑、热管理优于 Ti:sapph"
      - "锁至光学参考可避开 RF 基准相噪限制"
    disadvantages:
      - "晶体增益寿命有限，泵浦功率伺服带宽不够高"

