        year: 2015
        source: {zotero_key: "BESI3AEE"}
        note: "PIN InGaAs 探测器架构下当时 photonic microwave 远载波本底纪录；后续 Kalubovilage 2022 用自由运行单片梳 + 低温 RF 链路达 <-180 dBc/Hz。"

  - id: met.dpssl_ofc_timing_jitter_pc15
    name: "锁定 DPSSL OFC 本征定时抖动（BOC 光学测量，Portuondo-Campa 2015）"
