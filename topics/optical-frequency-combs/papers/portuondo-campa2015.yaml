principles:
  - id: pri.pulse_interleaver_rep_rate_multiplication
    name: "光纤脉冲交织器重频倍增与光生微波散粒噪声降底原理"
    tier: domain
    verification_status: observed
    statement: >
      在光生微波方案中，光电探测散粒噪声对相噪本底贡献近似为
      L_shot(f) ≈ q·ē / (2·P_RF · ī²) ，受平均光电流 ī 与 RF 载波功率 P_RF 限制；
      若将重频 f_rep 通过 2ⁿ 级光纤交织器（分束+延时+合束）倍增至接近目标微波载频 f_µw，
      则：(a) 探测器在目标载频附近的饱和电流上限大幅提升（因相邻脉冲间光功率更均匀）；
      (b) 目标谐波的微波功率在固定平均光电流下提高；
      (c) 从而将散粒噪声底 L_shot(f) 按 ī 与 P_RF 的提升幅度同步下压。
      交织过程保持梳齿相干性，不引入随机相位噪声（仅窄带附加谱分布由延时误差决定）。
      使用保偏光纤 + 末级 PBC 可将双臂功率合为单输出，相对非偏振合束器额外获得 ~3 dB 输出光功率。
    domain: "光子微波生成；光纤脉冲成形；探测器饱和管理"
    formula: >
      f_out = 2ⁿ · f_rep （前 n 级 50/50 分束/延时/合束）；
      目标谐波延时匹配：Δτ_last = k / f_µw （k ∈ ℤ₊）；
      L_shot(f) ∝ 1 / (ī · P_RF) ，ī 与 P_RF 均随交织倍增提高 → L_shot(f) 下移
    key_insight: >
      交织器是解耦"激光稳定锁模重频（受限于腔 FSR 与增益动力学）"与
      "探测器最佳工作重频（越接近 f_µw 饱和电流越高）"两个约束的关键工程手段。
      PM + PBC 末级合束是把双臂功率"零损耗"合入单探测器的额外工程窍门。
    conditions:
      - "所有级延时误差 << 1/f_µw（这里 ≤1.5 ps << 104 ps）"
      - "光纤保偏以避免偏振模式色散破坏脉冲时序"
      - "末级延时 Δτ = k/f_µw 以使目标谐波幅度最大"
    preconditions:
      - "入射脉冲宽度 << 交织延时 Δτ（避免相邻脉冲重叠）"
      - "分束比误差足够小以维持各支路等幅"
    invalidated_when:
      - "交织器长度波动导致 Δτ 漂移超过 1/(f_µw × SNR) 等效预算"
      - "HNLF/光纤中非线性引入附加相位噪声超过基底"
    source_claim: >
      "the power ... can be increased through multiplication of the optical repetition rate
      by using a cascaded fibered pulse interleaver ... In this configuration each pair of
      pulses in the output has alternating orthogonal polarizations ... such a construction
      allows for a net output power almost 3 dB higher than in the case of non-polarizing
      fiber combiners"
    open_questions:
      - "多级 PM 光纤交织器的长期热/机械稳定性对 1 Hz 偏移以下近载波相噪的影响尚未完全量化（本文推测为闭环外主导源之一）"

  - id: pri.amplifier_residual_phase_noise_limit
    name: "微波放大器残余相位噪声限制原理（光微波链路远载波本底）"
    tier: engineering
    verification_status: observed
    statement: >
      光生微波链路中，PIN 光电二极管的饱和光电流限制了无放大器情况下可送入混频器的
      RF 功率；当必须经微波放大器匹配混频器工作点时，放大器的残余相位噪声（flicker +
      白相噪）直接叠加到测量结果上，在远载波（~10 MHz 偏移）形成新的不可消除本底。
      该本底可比实际 cw 散粒噪声高数 dB，使 Quinlan 等报道的"短脉冲光电探测散粒噪声
      相关性压低于 cw 散粒本底"效应无法被观测到。
    domain: "光子微波链路；RF 后端相位噪声"
    key_insight: >
      在 PIN 架构下，放大器残余相噪而非光电探测散粒噪声本身，
      构成了远载波测得本底的"准极限"；解除此限制必须提高光电二极管饱和电流（即 RF 无放大输出功率），
      例如换用 mUTC（modified uni-traveling carrier）探测器，使混频器可无放大器直接驱动。
    conditions: "光电二极管饱和功率 < 混频器所需 LO/RF 功率；需插入微波放大器"
    invalidated_when:
      - "改用高饱和 mUTC 光电二极管（>100 mW 光功率、无放大 10 dBm @ 10 GHz）使放大器可去除"
      - "采用无放大器相噪测量方案（相关接收机等）"
    source_claim: >
      "the residual phase-noise of the amplifiers limits the achieved phase-noise floor
      far from the carrier ... prevents observation of shot-noise correlations leading to
      phase-noise floors below the cw shot-noise limit"

methods:
  - id: meth.dpssl_interleaver_photonic_microwave_pc15
    name: "DPSSL 梳 + PM 交织器 + PIN 探测的光生 9.6 GHz 微波产生方法"
    status: demonstrated
    applies_to: ent.dpss_comb_interleaver_pc15
    steps_summary: >
      1. Er:Yb:glass DPSSL 输出 100 MHz / 146 fs / 1556 nm 脉冲；
      2. 75% 光功率入 6 级 PM 光纤交织器：5 级 2⁵ 倍增至 3.2 GHz + 1 级 104.2 ps 延时强化 9.6 GHz；
      3. 25% 余光分两路：(a) EDFA+HNLF 展宽→f-2f 稳 f₀（反馈至泵浦电流）；
         (b) 窄带滤波与共同参考 cw 激光拍频→稳 f_rep（反馈至腔内 PZT），两环 ~40 kHz 带宽；
      4. 高线性 PIN InGaAs 光电探测（12 / 23 GHz HLPD，最大 20 mA 光电流）；
      5. 带通滤波出 9.6 GHz → 平衡混频器以相位鉴别器模式运行
         （两台相同 OFC 互拍得相对相噪）；
      6. FFT 分析得 SSB 相噪 L(f)；用 BOC 独立测锁定 OFC 本征定时抖动作为对照。
    required_hardware:
      - ent.dpss_comb_interleaver_pc15
      - ent.pm_fiber_pulse_interleaver_pc15
    advantages:
      - "DPSSL Er:Yb:glass 亚 100 as 定时抖动本征（10 kHz–50 MHz 积分）"
      - "PM 交织器 + PBC 末级双臂合束额外 3 dB 输出功率"
      - "InGaAs PIN + 6 级交织实现 −171 dBc/Hz @ 10 MHz 单源本底（PIN 纪录）"
      - "电信波段 1556 nm + SESAM 锁模适合空间应用"
    disadvantages:
      - "远载波本底受微波放大器残余相噪限制（+3 dB 于 cw 散粒极限）"
      - "PIN 饱和电流限制 → 无法去掉放大器以利用短脉冲散粒相关性"
      - "近载波相噪（1–1 kHz）被交织器光纤机械/热扰动与自由空间耦合抖动限制"
    conditions:
      - "OFC 双环锁定稳定（f_rep 与 f₀ 均闭环）"
      - "共同 cw 光参考与氢钟参考"
    source_claim: >
      "Ultralow phase-noise microwave generation through the photodetection of a stabilized
      passively mode-locked DPSSL has been demonstrated using commercially available InGaAs
      PIN photodetectors ... the lowest far-from-the-carrier phase-noise floor so far using
      PIN photodetectors (−171 dBc/Hz @ 10 MHz offset, single source contribution)"

metrics:
  - id: met.photonic_microwave_phase_noise_pc15
    name: "9.6 GHz 光生微波 SSB 相位噪声（Portuondo-Campa 2015）"
    unit: "dBc/Hz"
    description: >
      基于 DPSSL Er:Yb:glass OFC + PM 6 级交织器 + PIN InGaAs 探测的 9.6 GHz 光生微波
      相位噪声 L(f)，分频段记录（近载波 / 中频 / 远载波本底）。
    is_interface_metric: false
    demonstrated_value:
      value: >
        −100 dBc/Hz @ 1 Hz（近载波）；
        −148 dBc/Hz（BOC 光学测得 OFC 本征定时抖动等效 @ 9.6 GHz，1 Hz–1 kHz）；
        远载波本底 @ 10 MHz：6 mA → −162.4 dBc/Hz、11 mA → −165.4 dBc/Hz、20 mA → −168 dBc/Hz（双源）；
        单源本底（假设两源相等）= −171 dBc/Hz @ 10 MHz（20 mA）
      conditions: >
        两台相同 DPSSL OFC 锁至共同 cw 参考（4 cm FP 腔 PDH 稳 DFB 光纤激光），
        f_rep + f₀ 双环锁定 ~40 kHz 带宽；Discovery HLPD PIN InGaAs 探测，9 V 偏压，20°C；
        9.6 GHz 带通滤波 + 微波放大 + 平衡混频器相位鉴别；FFT 分析。
        测得相噪为两源共同贡献；单源数值在假设两源等贡献下减 3 dB。
      verification_status: observed
      confidence: established
      source:
        zotero_key: "BESI3AEE"
        claim: "For a photocurrent of 20 mA, the combined noise floor reaching −168 dBc/Hz (−171 dBc/Hz for a single oscillator assuming identical sources) represents to the best of our knowledge the lowest phase-noise floor ever demonstrated for photonics-generated microwaves using InGaAs PIN photodetectors"
    theoretical_floor:
      value: "cw 散粒噪声极限：6 mA → −165.7，11 mA → −168.4，20 mA → −171 dBc/Hz"
      basis: "pri.photodetection_shot_noise_limit（cw 近似，不含短脉冲相关性修正）"
      gap_note: >
        实测本底比 cw 散粒极限高 ~3 dB，差距来自微波放大器残余相噪；
        预期采用 mUTC 高饱和光电探测器去除放大器后可观测到 [Quinlan 2013 Nat. Photon.]
        所述的短脉冲散粒相关效应 → 压到 cw 散粒极限以下。
    historical_landmarks:
