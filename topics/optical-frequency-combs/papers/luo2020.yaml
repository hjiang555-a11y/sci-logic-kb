  note: >
    [技术论文] 华东师大（East China Normal University, ECNU）。基于 CPA 的高功率 Yb 光纤梳： (1) 250 MHz NPR 锁模种子激光 + 光纤展宽器 + 三级光纤放大（LMA DC Yb-PCF）→ 132 W 平均功率； (2) grism 压缩器补偿 GVD + TOD → 180 fs 脉冲（~99% 能量在主峰）； (3) frep 与 fceo 双锁至 Rb 钟，稳定度 8.3×10⁻¹³（frep）与 1.35×10⁻¹⁹（fceo）@ 1000 s； (4) 低噪声特性：高功率下仍保持相位噪声低水平； (5) 目标应用：UV / 中红外倍频/差频产生、双梳光谱。 本工作是高功率 Yb:fiber 梳 CPA 工程演示，132 W 输出在光纤梳中属高水平但未刷新跨平台最高功率纪录（已有 > 300 W 报道）， 归 evidence。对齐 v2 子域主线：A1-Rep（高重频 + 高功率 → 高峰值功率用于非线性转换）。
