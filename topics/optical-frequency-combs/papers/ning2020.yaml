  title: "An All-Polarization-Maintaining Multi-Branch Optical Frequency Comb for Highly Sensitive Cavity Ring-Down Spectroscopy"
  year: 2020
  first_author: Ning
  journal: "Chinese Physics Letters"
  volume: 37
  issue: 6
  pages: "064202"
  doi: "10.1088/0256-307X/37/6/064202"
  note: >
    [技术论文] 中国科学院国家授时中心。开发全 PM（polarization-maintaining）多分支 Er:fiber 频率梳
    （5 个应用端口，NALM 锁模），用于高灵敏度腔衰荡光谱（CRDS）：
    (1) NALM 非线性放大环镜锁模 → 自启动、鲁棒、低噪声（相较 NPR / SESAM）；
    (2) 全 PM 光纤架构 → 免偏振漂移（环境温度/振动/应力）；
    (3) 5 个应用端口（1064 nm / 1083 nm / 1380 nm / 1637 nm / 1750 nm）用于分子振转光谱测量；
    (4) fceo in-loop 不稳定度 5.6×10⁻¹⁸ @ 1 s, frep 不稳定度 < 1.8×10⁻¹² @ 1 s（受频率计数器噪底限制）；
    (5) 拍频 SNR > 30 dB @ 100 kHz RBW。
    本工作定位于 CRDS 应用验证（sub-kHz 分辨率分子光谱），未报告光学频率传递或光生微波性能，
    且稳定度未超越先前 NALM 梳纪录（Kuse 2015/2016, Li 2017），归 evidence。
    对齐 v2 子域主线：B-MIR（NIR 覆盖多分子吸收线）。

