    pri.dissipative_kerr_soliton / pri.lugiato_lefever_equation /
    meth.cw_pumped_microcomb_generation / meth.laser_tuning_soliton_access /
    meth.microcomb_self_referencing 定义于 kippenberg2018.yaml；
    pri.supercontinuum_octave_spanning 定义于 diddams2000.yaml；
    pri.self_referencing_f2f 定义于 udem2002.yaml。

entities:
  - id: ent.chip_scg_waveguide_g19
    name: "芯片基超连续谱波导（SCG 平台）"
    aliases: ["chip-based SCG waveguide", "photonic-chip supercontinuum waveguide"]
    hierarchy_level: 1
    status: demonstrated
    function: >
      由飞秒锁模激光器脉冲串注入的高非线性集成波导，通过 χ(3) 参量四波混频、自相位调制、
      孤子裂变与色散波辐射，将初始光谱展宽至倍频程以上，产生 CEO 可检测的相干频率梳。
      相较光子晶体光纤，芯片波导具有更高有效非线性 γ、更强色散工程自由度以及批量制造潜力。
    key_parameters:
      typical_waveguide_length: "≤5 cm"
      input_pulse_duration: "<100 fs（保持相干性）"
      input_pulse_energy: "pJ 至数十 pJ 量级（例如 Si 纳米线：16 pJ/pulse @ 2.29 μm）"
      typical_spectral_span: "≥1 octave（0.6–2.6 μm 或更宽）"
      coherence_criterion: "N_soliton < 10 且 SPM 主导"
    interface_requirements:
      input: "锁模激光器脉冲串（飞秒，具有 CEO 相干性）"
      output: "倍频程相干梳（可送入 f–2f 或 f–3f 干涉仪进行 CEO 稳定）"
    note: >
      作为 SCG 路径的框架级 Level 1 实体；具体材料子平台（Si3N4、Si、a-Si:H、硫系等）
      作为 hierarchy_level=2 子节点或 key_parameters 展开，不单独拆分。

  - id: ent.chip_comb_platform_taxonomy_g19
    name: "芯片非线性光子学平台分类表（15+ 材料对比）"
    aliases: ["chip-based nonlinear platform table", "Table 1 of Gaeta 2019"]
    hierarchy_level: 1
    status: demonstrated
    function: >
      本综述建立的跨材料平台对比框架，覆盖 Silica/Si/α-Si:H/Si3N4/Hydex/AlN/GaN/GaP/
      Diamond/AlGaAs/SiGe/Ge/LiNbO3/As2S3/As2Se3 等平台，在 1.55 μm 下列举：
      折射率 n、非线性指数 n2（m²/W）、透明窗口（μm）、KCG 是否观察到、SCG 是否观察到、
      是否具有体 χ(2)。该表构成芯片梳材料选型的权威参考。
    key_parameters:
      nonlinear_index_range: "3×10⁻²⁰ (silica) – 4.4×10⁻¹⁷ (Ge) m²/W（跨 3 个量级）"
      refractive_index_range: "1.45 (silica) – 4.33 (Ge)"
      transparency_window_coverage: "0.2–50 μm 合计（Diamond 最宽）"
      chi2_materials: ["AlN", "GaN", "GaP", "AlGaAs", "LiNbO3"]
      both_scg_and_kcg_demonstrated: ["Silica", "Si", "Si3N4", "Hydex", "AlN", "Diamond", "AlGaAs", "LiNbO3"]
    interface_requirements:
      input: "用于选择给定波长/功率/带宽需求下的最佳平台"
      output: "平台-应用匹配决策（例如：中红外选 Si/SiGe/Ge；自参考选 AlN/LiNbO3；CMOS 兼容选 Si3N4/Hydex）"
    note: >
      非物理实体，而是本综述作为"框架贡献"定义的分类表；后续微梳论文可直接引用此节点。

principles:
  - id: pri.chip_dispersion_engineering_high_index_contrast
    name: "高折射率对比波导色散工程原理"
    tier: domain
    verification_status: observed
    statement: >
      芯片波导（如 Si3N4 核/SiO2 包层）的高折射率对比（Δn ≈ 0.5）使光场可被约束到远小于
      λ² 的面积，从而 (a) 显著增强有效非线性 γ = ω₀ n₂/(A_eff c)；(b) 允许通过调整
      波导几何（宽度、厚度）在相当宽的范围内独立调节有效群速度色散（GVD），其结果
      可与体材料本征 GVD 完全不同——在近红外拉近至零甚至反常色散区。该自由度是
      芯片基 SCG 与 KCG 能以激光笔量级功率跨倍频程相位匹配参量过程的物理根源。
    domain: "集成非线性光子学，色散工程"
    formula: >
      D(δ) = Σ_{n≥2} (β_n/n!) δⁿ；δ_DW ≈ 3|β₂|/β₃（三阶色散下的色散波峰频率）；
      γ = ω₀ n₂ / (A_eff · c)
    key_insight: >
      高折射率对比同时带来"强非线性"与"可裁剪色散"——这是芯片梳相比光纤梳
      能够在 <1 W、<1 cm³ 形态下实现的关键使能机制。
    conditions: "波导模式在工作波长下主要约束于高折射率核层；制造侧壁粗糙度可控"
    preconditions:
      - "核/包层折射率对比 Δn ≳ 0.3"
      - "波导尺寸与工作波长同量级（亚微米至微米）"
      - "目标波长位于材料透明窗口内"
    invalidated_when:
      - "波长过长，模式主要外溢到低折射率包层，有效 GVD 趋近体 GVD"
      - "波导损耗主导，非线性相位积累不足"
    source_claim: >
      "This large index contrast allows for light with a wavelength λ to be strongly
      confined to an area smaller than λ², which further enhances the nonlinear
      interaction. More importantly, this tight confinement allows for dispersion
      engineering that offers control of the interaction to enhance and/or tailor
      the comb spectrum."

  - id: pri.dispersive_wave_cherenkov_radiation
    name: "色散波（Cherenkov 辐射）生成原理"
    tier: domain
    verification_status: observed
    statement: >
      当存在高于二阶的色散项时，泵浦波附近能量可通过相位匹配转移到一至数个远离泵浦的
      窄谱成分——这些谱峰位置近似由色散函数 D(δ) 的零点决定，对应 Cherenkov 辐射式的
      线性色散波。色散波是将芯片梳谱宽从单倍频扩展至倍频程以上、在预定目标波长
      （如 f–2f 所需的红蓝两端、f–3f 的近紫外端、或中红外窗口）生成强梳齿的标准工具。
    domain: "非线性光纤与波导光学，孤子动力学"
    formula: "δ_DW ≈ 3|β₂|/β₃（仅考虑到三阶色散时）；更一般情况由 D(δ) = 0 决定"
    key_insight: >
      色散波是 SCG 与 KCG 共用的谱延展机制；通过波导几何一次性设计同时决定孤子位置
      和色散波位置，可获得倍频程+自参考可用的确定性谱形。
    preconditions:
      - "存在三阶或更高阶色散"
      - "背景孤子或泵浦场提供可转换能量"
    source_claim: >
      "Dispersive waves are a result of a phase-matched process in the presence of
      dispersion that is of a higher order than the GVD that can result in the
      transfer of energy from the region near the pump wave to spectral components
      that can be as far as an octave away."

  - id: pri.microcomb_formation_regime_taxonomy_g19
    name: "Kerr 微梳形成态分类体系"
    tier: meta
    verification_status: observed
    statement: >
      CW 泵浦微谐振腔中的梳形成依赖于 (泵-腔失谐 δ₀, 泵浦功率, 腔 Q 与色散) 参数空间中
      的状态转换路径，本综述形式化以下六类相干/非相干态：
      (1) Turing rolls（"natively-spaced comb"）——最接近泵浦的一对模先受激，窄带、低噪声；
      (2) 混沌 MI 态——多组 mini-comb 交叠，高 RF 噪声、非相干；
      (3) 多孤子 DKS 态——N 个循环孤子，梳谱具有复杂调制结构；
      (4) 单孤子 DKS 态——平滑 sech² 谱形，低噪声，最常用于应用；
      (5) 孤子晶体（soliton crystals）——多孤子在腔中形成周期性角位排列的稳态；
      (6) 呼吸孤子（breathers）——孤子幅度/宽度周期性振荡的不稳定态。
      此外在正常 GVD 下存在：(7) 暗脉冲/platicon——双稳态上下支的切换波互锁。
      红失谐侧为相干态（DKS 系列）的必要失谐方向。
    domain: "微谐振腔非线性动力学"
    key_insight: >
      早期微梳低相干性的困扰源于实验停留在 (2) 混沌 MI 态；理解状态图并确定性地
      跨越至 DKS 态是微梳实用化的关键。分类体系为后续论文提供统一语言。
    preconditions:
      - "泵浦激光红失谐通过腔谐振（对 DKS 族）"
      - "反常色散（对亮孤子族）或正常色散+模式耦合（对暗脉冲/platicon）"
    invalidated_when:
      - "热非线性引起失谐漂移超过稳态区域宽度而无补偿机制"
    source_claim: >
      "researchers have shown that the system can show rich and complex nonlinear
      behaviour, including bistability, chaos, single- and multiple-soliton formation,
      soliton crystals and breather instabilities."
    open_questions:
      - "不同形成态之间的确定性切换协议（尤其单孤子 vs 孤子晶体）"
      - "呼吸孤子的完整稳定性判据"

  - id: pri.dark_pulse_normal_dispersion_comb
    name: "正常色散暗脉冲/platicon 梳原理"
    tier: domain
    verification_status: observed
    statement: >
      在正常 GVD 区域，微谐振腔支持"暗脉冲"或平顶脉冲（platicon）态：可解释为腔内双稳态
      上下支间两个切换波（switching wave）的互锁——一个波的下降沿与另一个波的上升沿
      构成局域脉冲。暗脉冲态通常由模式耦合（空间、偏振或双腔模式）引起的腔内调制不稳定
      触发，耦合强度决定梳带宽。
    domain: "微谐振腔非线性动力学"
    key_insight: >
      正常色散梳相较亮孤子梳具有显著更高的泵-梳转换效率和更平坦的谱形，
      对通信 WDM 与高功率应用特别有吸引力——但需额外设计模式耦合机制进行激发。
    preconditions:
      - "微腔在泵浦波长处为正常 GVD"
      - "存在空间模式交叉或偏振模式耦合提供调制不稳定种子"
    source_claim: >
      "Under suitable conditions, dark or bright pulses can be excited with low noise,
      which can be interpreted as the interlocked switching waves... termed a
      'platicon', can be assisted by mode coupling that gives rise to an intracavity
      modulational instability. Such normal-GVD combs offer a number of advantages
      over soliton-mode-locked combs including higher conversion efficiency."

  - id: pri.soliton_crystal_multistability
    name: "孤子晶体多稳态原理"
    tier: domain
    verification_status: observed
    statement: >
      在适当的模式交叉扰动存在时，多个腔内孤子之间的相互作用可稳定于角度等间距的
      周期性排列——"孤子晶体"。不同填充数（N = 孤子数/可用格点数）对应不同稳态，
      梳谱呈现强 FSR 倍频调制；该态可由 (热/功率/频率) 扫描确定性进入。
    domain: "微谐振腔非线性动力学"
    key_insight: >
      孤子晶体提供一种确定性访问 N-孤子态的工程路径，规避了单孤子态激发时的
      随机性问题，同时提升泵-梳转换效率（∝ N）。
    preconditions:
      - "腔内存在可控的模式交叉相位扰动"
      - "孤子间通过色散波尾或声学/热效应相互锁定"
    source_claim: >
      "the system can show rich and complex nonlinear behaviour, including...
      soliton crystals and breather instabilities."

  - id: pri.raman_limits_min_fsr_microcomb
    name: "拉曼散射限制微梳最小 FSR 原理"
    tier: domain
    verification_status: calculated
    statement: >
      当拉曼线宽 Γ_R 窄于梳间距时，拉曼受激散射（即拉曼激光）与 Kerr 参量增益竞争；
      若 Raman 增益 g_R 高于 Kerr 增益 g_K = 2γ，则 Kerr 梳/DKS 形成被破坏。
      唯一规避方式是加大 FSR 使拉曼增益峰落在两相邻腔模之间，
      对应条件 FSR > (Γ_R/2π)·√(g_R/g_K − 1)。
      对金刚石 1.56 μm：g_R = 6 cm/GW, g_K = 0.2 cm/GW → 最小 FSR ≈ 454 GHz；
      对 CaF2（g_K/g_R ≈ 1）则无此限制。
    domain: "微谐振腔非线性动力学，拉曼物理"
    formula: "FSR > (Γ_R/2π)·√(g_R/g_K − 1)"
    key_insight: >
      该原理为晶体平台（金刚石、LiNbO3 等 g_R 显著大于 g_K 的材料）的微梳设计
      设定了最小 FSR 下限——从而限制了能电子检测的梳间距的可达性。
    preconditions:
      - "拉曼线宽 Γ_R 窄于目标梳间距"
      - "g_R > g_K"
    invalidated_when:
      - "材料 g_K ≥ g_R（如 CaF2）"
      - "拉曼线宽宽于孤子带宽（→ 仅导致红移孤子而非破坏）"
    source_claim: >
      "FSR > (Γ_R/2π)(g_R/g_K − 1)^{1/2}... in diamond at 1,560 nm, g_R = 6 cm GW⁻¹
      and g_K = 0.2 cm GW⁻¹, which indicates that soliton-mode-locked combs are only
      possible with an FSR > 454 GHz."

  - id: pri.chip_comb_platform_tradeoff_space
    name: "芯片梳平台四维权衡空间原理"
    tier: meta
    verification_status: inferred
    statement: >
      芯片梳平台选型受四类主要属性的互相冲突制约：
      (i) 集成度 / CMOS 兼容性（Si3N4、Hydex ≫ Diamond、AlGaAs）；
      (ii) 腔品质因数 Q（Silica microwedge >8.75×10⁸ > Si3N4 >3.7×10⁷ > AlGaAs/Diamond）；
      (iii) 非线性强度与工作波长（AlGaAs, Ge, SiGe 带来极高 γ 但中红外或高损耗；
            Si3N4 综合最佳近红外；Si 利于中红外但双光子吸收限制近红外）；
      (iv) 是否具有 χ(2) 以便片上 f–2f 与电光调谐（AlN、LiNbO3、GaP、AlGaAs 是；
            Si3N4 本征无但可通过应力/光电迁移诱导有效 χ(2)）。
      任何单一平台均无法同时最大化四维，因此"最佳平台"严格依赖应用。
    domain: "集成光子学工程"
    key_insight: >
      本原理解释了为何芯片梳领域不收敛至单一材料——Si3N4 主导集成与 CMOS 路线；
      Silica microwedge 主导极高 Q 与低阈值；AlN/LiNbO3 主导片上自参考；
      Si/SiGe/Ge 主导中红外；AlGaAs 主导超低泵浦功率演示。
    source_claim: >
      "Critical properties of these chip-based materials are the strong nonlinearity
      and the high refractive index contrast between the core waveguide and the
      cladding layer... The last column in Table 1 indicates whether the bulk material
      possesses intrinsic χ(2)."
    open_questions:
      - "异构集成（如 LiNbO3-on-insulator + Si3N4 bus）能否同时兼顾高 Q、CMOS 与 χ(2)"
      - "AlGaAs 平台 Q 能否提升到与 Si3N4 相当（当前仍低 1–2 量级）"

methods:
  - id: meth.chip_scg_comb_generation_g19
    name: "芯片波导超连续谱梳生成方法（框架版本）"
    status: demonstrated
    applies_to: ent.chip_scg_waveguide_g19
    steps_summary: >
      (1) 选择具有合适透明窗口与 n₂ 的平台（近红外：Si3N4 / Hydex / Si3N4-rich；
      中红外：Si / SiGe / 硫系 / Ge）；
      (2) 通过波导宽/高扫描数值优化 GVD，设计目标色散波位置（f–2f 需覆盖红蓝两端）；
      (3) 注入 <100 fs 飞秒脉冲、soliton number N<10，保证相干性由 SPM 主导而非 MI；
      (4) 在切割端面或倒锥形耦合处接收倍频程输出；
      (5) 送入 f–2f 或 f–3f 干涉仪检测 CEO，必要时借助平台本征 χ(2)（AlN、LiNbO3、
      应力诱导 Si3N4）省去额外倍频晶体。
    required_hardware:
      - ent.chip_scg_waveguide_g19
      - "飞秒锁模激光器（可为 Er/Yb 光纤锁模 + 功率放大）"
    advantages:
      - "芯片化、可批量制造、形态 <1 cm³"
      - "可通过波导几何精确定位色散波与目标谱位"
      - "部分平台可片上实现 f–2f（AlN/LiNbO3/应力 Si3N4）"
    disadvantages:
      - "仍依赖外部锁模飞秒泵浦（片上电泵锁模激光器尚未成熟）"
      - "相干窗口要求 N_soliton<10，限制了脉冲能量可用范围"
    conditions:
      - "输入脉冲 CEO 相干"
      - "波导损耗低于非线性积累所需阈值"
    source_claim: >
      "to produce coherent spectra it is necessary to operate in the regime in which
      coherence of the initial mode-locked ultrashort pulse train is preserved and
      self-phase modulation is the dominant mechanism that produces the initial
      broadening rather than through the growth of spectral components from noise
