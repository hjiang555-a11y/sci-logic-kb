    [综述/框架型] Gaeta (Columbia) + Lipson (Columbia) + Kippenberg (EPFL) 2019
    Nature Photonics 综述。统一梳理光子芯片平台上的频率梳生成两大路径：
    (1) 波导中的超连续谱生成（SCG，飞秒泵浦）；(2) 微谐振腔中的 Kerr 梳生成（KCG，CW 泵浦）。
    核心框架贡献：(a) 建立芯片非线性光子学平台分类表（Si3N4、Si、a-Si:H、Hydex、AlN、GaP、
