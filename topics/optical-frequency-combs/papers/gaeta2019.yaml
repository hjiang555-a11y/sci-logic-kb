metrics:
  - id: met.platform_q_factor_g19
    name: "芯片微腔品质因数 Q（平台对比）"
    unit: "无量纲"
    description: >
      微谐振腔的固有品质因数，决定参量振荡阈值功率 P_th ∝ 1/Q²；
      本综述汇总芯片平台典型 Q 范围作为平台选型的关键工程指标。
    is_interface_metric: true
    coupling_formula: "P_th ∝ V / (Q²·n₂)"
    demonstrated_value:
      value: "Silica microwedge >8.75×10⁸；Si3N4 >3.7×10⁷（最高）及 >10⁷（典型）"
      conditions: "1.55 μm 带；本征 Q（非负载 Q）；室温"
      verification_status: observed
      confidence: established
