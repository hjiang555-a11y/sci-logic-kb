    孤子晶体、呼吸孤子、暗脉冲/platicon）；(c) 阐明色散工程-平台-功耗-带宽四维权衡空间；
    (d) 指出 Raman 散射对最小 FSR 的基本限制（gR/gK 条件）；(e) 综述芯片梳在通信、测距、光谱、
    时钟、微波综合、LiDAR、天文光谱定标等应用的成熟度。
