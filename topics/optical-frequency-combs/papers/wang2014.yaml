meta:
  zotero_key: VATLBIAD
  topic: optical-frequency-combs
  source_type: technical_paper
  contribution_type: evidence
  reliability: high
  title: "500 MHz spaced Yb:fiber laser frequency comb without amplifiers"
  year: 2014
  first_author: "Wang"
  journal: "Optics Letters"
  volume: 39
  pages: 2534-2537
  doi: 10.1364/OL.39.002534
  note: >
    [技术论文] 北京大学 + 中国计量院。500 MHz NPE 锁模 Yb:ring 光纤激光器 直接从振荡器产生 f_CEO 无需腔外放大： (1) 振荡器输出功率 450 mW（@ 1.07 W 泵浦，40% 光-光效率）； (2) 脉冲压缩至 46 fs，峰值功率 5 kW 驱动 PCF 展宽 600–1300 nm（倍频程）； (3) f-2f 干涉仪测 f_CEO 信噪比 >40 dB @ 300 kHz RBW； (4) 开放环境 >6 小时稳定；in-loop tracking 4.46×10⁻¹³/√τ，Allan ~1×10⁻¹²/s。 意义：省去腔外 EDFA/YDFA 简化系统；500 MHz 齿距更有利于天文光谱仪校准（齿可分辨）。 对齐 v2 子域主线：A1-Rep（500 MHz 基频，天文校准友好）、B-Astro（作者明确指向）。 相较 bartels2009（10 GHz）在更低功率路径实现"无放大"的工程突破。
