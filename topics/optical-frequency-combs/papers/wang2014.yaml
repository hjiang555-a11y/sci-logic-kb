methods:
  - id: meth.amplifier_free_high_frep_yb_comb
    name: "无放大高重频 Yb:fiber 振荡器直驱倍频程展宽方法"
    status: demonstrated
    applies_to: ent.yb_fiber_500mhz_comb_wang14
    steps_summary: >
      1. 短腔 NPE 锁模 Yb:ring 光纤激光器，500 MHz 基频；
      2. 高泵浦功率使振荡器单脉冲能量足以直接驱动 PCF（≥0.2 nJ 耦合）；
      3. 脉冲压缩至 46 fs 获得 5 kW 峰值功率；
      4. PCF 展宽至 600–1300 nm；
      5. f-2f 干涉仪锁 f_CEO；PZT 伺服 f_rep；
      6. 计数器 τ-统计得到 in-loop 4.46×10⁻¹³/√τ。
    required_hardware:
      - ent.yb_fiber_500mhz_comb_wang14
    advantages:
      - "去掉腔外放大器 → 系统简化、成本降低、ASE 相噪抑制"
      - "齿距更大有利于天文光谱仪单齿分辨"
    disadvantages:
      - "振荡器必须同时承担高功率与稳定锁模，工艺窗口窄"
      - "Yb 增益寿命致泵浦伺服带宽受限"

