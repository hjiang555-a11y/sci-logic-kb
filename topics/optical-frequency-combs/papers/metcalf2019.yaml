  title: "Stellar spectroscopy in the near-infrared with a laser frequency comb"
  year: 2019
  first_author: "Metcalf"
  journal: "Optica"
  volume: 6
  issue: 2
  pages: "233-239"
  doi: "10.1364/OPTICA.6.000233"
  note: >
    [应用技术里程碑] NIST（Diddams/Papp/Quinlan/Carlson/Hickstein 等）+ Penn State
    （Mahadevan/Halverson/Ramsey/Wright 等）+ UT Austin McDonald + Macquarie 等合作。
    在 McDonald 天文台 10 m HET 搭载自制 30 GHz EO+SiN 天文梳 + 低温真空 HPF 交叉色散
    echelle 光谱仪（R≈53000，28 阶，810–1280 nm），2018-05 起自动长期运行。
    梳溯源至 GPS 驯服时钟，1 s 分数稳定度 2×10⁻¹¹，>1 day <3×10⁻¹³；
    Barnard 星 3 个月 RV 散布 RMS 1.53 m/s（5 min 原始 2.83 m/s），
    仪器差分漂移 10 min 20 cm/s、300 min bin 6 cm/s。
    跨文件节点引用：ent.optical_frequency_comb 定义于 udem2002.yaml；
    ent.electro_optic_frequency_comb 与 meth.astro_comb_rv_calibration 分别位于专题顶层与
    ycas2012.yaml；pri.self_referencing_f2f 在此论文中未启用（梳直接锁到微波，
    无需 f-2f 自参考）。

