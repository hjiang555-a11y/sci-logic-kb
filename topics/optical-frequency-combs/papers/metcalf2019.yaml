      spectral_range: "810–1280 nm（28 echelle 阶）"
      detector: "2048×2048 HgCdTe H2RG，截止 1.7 µm"
      temperature_stability: "mK 级（光学平台）"
      daily_thermal_drift: "15–20 m/s 峰峰（主要来自 LN₂ 填充）"
    note: >
      本文未重新设计光谱仪本体（Mahadevan 等早前工作），但作为系统级实体记录以支撑梳-光谱仪
