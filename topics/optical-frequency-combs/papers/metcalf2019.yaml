entities:
  - id: ent.hpf_nir_astrocomb_m19
    name: "HPF 30 GHz EO + 纳米光子 NIR 天文梳（Metcalf 2019 系统）"
    aliases: ["HPF astrocomb", "30 GHz EO-SiN astrocomb", "HET comb calibrator"]
    hierarchy_level: 2
    status: demonstrated
    function: >
      以 1064 nm CW 半导体激光为种子，经集成波导 EO 调制器 + 30 GHz 微波源产生 ~100 根等间距
      （30 GHz）梳齿；通过 30 GHz Fabry–Perot 腔抑制宽带电学热噪声；Yb 光纤放大 + 色散压缩至
      ~70 fs；射入 25 mm 长 SiN 纳米光子波导（750 nm × 690 nm）产生 700–1600 nm 超连续；
      静态 + 可编程幅度滤波整形光谱平坦度；输出耦合到 HPF 光谱仪作为 NIR 实时波长标尺。
      系统装配在 60 × 152 cm 面包板上，在 HET 机房自主连续运行数月。
    key_parameters:
      mode_spacing: "30 GHz（由微波参考决定）"
      spectral_coverage: "700–1600 nm（EO + SiN SC）"
      num_modes: "~100 根（EO 初始梳）→ 展宽后覆盖 ~1 个八度"
      seed_laser: "1064 nm CW 半导体激光"
      pulse_width_after_compression: "~70 fs"
      sin_waveguide_dim: "25 mm × 750 nm × 690 nm"
      sc_input_power: "525 mW（18 pJ 脉冲能量）"
      footprint: "60 cm × 152 cm 面包板"
      autonomy: "自 2018-05 起自动运行"
    interface_requirements:
      microwave_reference: "GPS-disciplined clock（溯源到 SI 秒）"
      optical_delivery: "50 µm 多模光纤 → 300 µm 动态光纤搅动器 → 2\" 积分球 → HPF 定标光纤"
      spectrograph: "ent.hpf_spectrograph_m19"
    note: >
      Level 2 实例节点，PART-OF ent.optical_frequency_comb（定义于 udem2002.yaml）；
      同时属于 ent.electro_optic_frequency_comb 专题顶层实例。与 ent.near_ir_astro_comb_y12
