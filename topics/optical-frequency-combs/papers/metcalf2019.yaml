      input_pulse_energy: "18 pJ"
    note: >
      PART-OF ent.hpf_nir_astrocomb_m19。低耦合功率显著降低热负载，是长期无人值守运行关键。

  - id: ent.hpf_spectrograph_m19
    name: "Habitable Zone Planet Finder (HPF) 低温真空 NIR echelle 光谱仪"
