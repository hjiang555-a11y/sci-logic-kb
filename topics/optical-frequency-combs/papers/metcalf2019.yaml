  - id: ent.sin_nanophotonic_waveguide_m19
    name: "氮化硅纳米光子非线性波导（HPF 梳展宽段）"
    aliases: ["Si3N4 nanophotonic waveguide", "SiN chip"]
    hierarchy_level: 3
    status: demonstrated
    function: >
      5 mm × 3 mm SiN 芯片上刻蚀的 25 mm 长 × 750 nm 宽 × 690 nm 厚波导，
      紧束缚 + 工程化反常色散提供高非线性与宽带相位匹配，
      将 70 fs / 30 GHz EO 梳脉冲以仅 525 mW 平均功率展宽至 700–1600 nm 连续谱，
      同时保持 30 GHz 齿距与相干性（910 nm、1210 nm 高分辨率观测证实梳结构存留）。
    key_parameters:
      chip_size: "5 mm × 3 mm"
      waveguide_length: "25 mm"
      core_cross_section: "750 nm × 690 nm"
