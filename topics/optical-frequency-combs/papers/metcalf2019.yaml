principles:
  - id: pri.eo_comb_direct_ghz_spacing
    name: "电光调制器直接产生 GHz 级梳齿间距原理"
    tier: domain
    verification_status: observed
    statement: >
      以 CW 激光为载波，用微波频率 f_m（~30 GHz）驱动集成波导相位/强度 EO 调制器级联，
      生成数十到上百根严格等间距（间距 = f_m）的光学边带，构成梳齿间距直接由微波源决定的
      频率梳。相比飞秒激光锁模梳（≲1 GHz 重频），EO 梳可在不做 Fabry–Perot 模式过滤的情况下
      直接匹配天文高分辨率光谱仪像元/线对分辨需求。
    domain: "电光频率梳；天文光梳工程"
    formula: "ν_n = ν_0 + n·f_m，n ∈ [−N/2, N/2]，N 取决于调制深度与级联级数"
    key_insight: >
      把"梳齿间距"与"光谱仪分辨率"的匹配从"光学滤波（高损耗、对齐漂移）"转移为"微波源选择"，
      本质提升天文梳稳定性与可用率；代价是微波源相噪通过梳乘法转移到梳齿线宽。
    conditions:
      - "驱动微波源相噪足够低，避免梳齿线宽过宽"
      - "CW 种子激光谱纯度高，相噪不污染梳齿"
    preconditions:
      - "EO 调制器带宽 ≥ 所需齿数 × f_m"
      - "级联损耗与色散可被后续放大补偿"
    invalidated_when:
      - "需要 1 GHz 以下齿距（此时 EO 路线丧失优势，飞秒锁模更合适）"
    source_claim: >
      "The frequency comb begins with 1064 nm CW light... driven by a 30 GHz microwave source.
      This results in a comb of approximately 100 teeth spaced exactly by the microwave drive frequency."

  - id: pri.nanophotonic_supercontinuum_low_power
    name: "纳米光子波导低功率超连续展宽原理"
    tier: engineering
    verification_status: observed
    statement: >
      以亚微米截面 SiN 波导实现强模场约束（有效模面积 ~0.5 µm²）与工程化反常色散，
      在皮焦耳量级脉冲能量下即可达到 SPM + 孤子 + 色散波共同作用的相干超连续展宽，
      覆盖约一个光学八度，且热负载远低于传统 PCF 方案。
    domain: "集成非线性光子学；光梳展宽"
    formula: "L_nl ~ 1/(γ·P_peak)；γ(SiN) ≫ γ(silica PCF) → 所需 P_peak 降低 1–2 数量级"
    key_insight: >
      "低功率展宽"把超连续段从高功率自由空间/PCF 系统转为芯片级、低热漂移器件，
      这是天文梳长期无人值守连续运行的工程关键。
    conditions:
      - "波导色散设计在泵浦波长附近可支持孤子动力学"
      - "输入脉冲 ≤ 100 fs，能量 ~10 pJ 量级"
    preconditions:
      - "波导端面耦合损耗可控"
      - "SiN 层无显著双光子吸收（NIR 可满足）"
    source_claim: >
      "a supercontinuum spectrum spanning 700–1600 nm with only 525 mW of incident average power
      (18 pJ of pulse energy). This low power reduces the thermal loading and aides the long-term operability."

  - id: pri.fiber_modal_noise_nir_rv_limit
    name: "多模光纤模态噪声对 NIR RV 精度的限制原理"
    tier: engineering
    verification_status: observed
    statement: >
      当相干或准相干光通过多模光纤照射光谱仪狭缝时，光纤内的模式干涉导致出射光斑照度分布
      随机涨落，叠加到探测谱上后在波长维度产生伪漂移，直接限制 RV 精度。
      该效应在 NIR 比可见波段更严重（模式数更少、干涉斑更粗）。
      时间扰动（动态搅动器）+ 空间平均（积分球）+ 更激进的扰模只能部分抑制。
    domain: "天文仪器；光纤光学"
    key_insight: >
      即使完美光梳 + 完美光谱仪，只要定标/星光耦合链依赖多模光纤，模态噪声就是 RV 精度
      天花板之一——本论文 1.53 m/s 星 RV 与 6 cm/s 差分仪器漂移之间的差距，
      主要即由星-梳光路非共模模态噪声构成。
    conditions:
      - "星光/定标光经过多模或富模光纤"
      - "扰模不能在所有关联时间尺度上遍历全部模态分布"
    source_claim: >
      "the calibration light splays across a significant fraction of the 30 arcmin focal plane—leading to
      fiber modal noise, which is known to be worse in the NIR than the optical"
    open_questions:
      - "完整光路上的模态噪声理论下限在具体仪器上是多少？"
      - "主动（非互易）模态扰动能否把 NIR 模态噪声压到 <10 cm/s？"

  - id: pri.gps_disciplined_si_traceability
    name: "GPS-驯服时钟提供梳 SI-秒溯源原理（天文梳场景）"
    tier: engineering
    verification_status: observed
    statement: >
      以 GPS 共视驯服的本地铷/石英振荡器作为梳重频 + f_m 驱动源的参考，
      使梳齿绝对频率溯源到 SI 秒；分数稳定度 1 s ~2×10⁻¹¹，≥1 day <3×10⁻¹³，
      对 RV 定标而言已远低于光子与模态噪声限制。
    domain: "精密频率计量；天文仪器"
    key_insight: >
      天文 RV 定标对梳稳定度的需求远低于光钟；GPS-disciplined 时钟即可饱和，
      把绝对频率定标从"瓶颈"降级为"非瓶颈"，复杂度转移到光谱仪稳定性与光路模态控制。
    conditions:
      - "目标应用为天文 RV 定标而非光钟级绝对频率计量"
      - "本地 GPS 驯服的 Rb / quartz 参考源可保持 ≤10^-11 量级短期溯源性"
    source_claim: >
      "the stability of the comb matches that of the GPS-disciplined clock with fractional uncertainty of
      2 × 10⁻¹¹ at 1 s, and <3 × 10⁻¹³ for time scales of one day and longer"

methods:
  - id: meth.eo_sin_astrocomb_calibration_m19
    name: "EO + 纳米光子 SiN 天文梳 HPF 实时波长定标方法"
    status: demonstrated
    applies_to: ent.hpf_spectrograph_m19
    steps_summary: >
      1. 1064 nm CW → EO 调制产生 30 GHz × ~100 根初始梳；
      2. 30 GHz FP 腔抑制宽带电学热噪声；
      3. Yb 光纤放大 + 色散压缩至 ~70 fs；
      4. 25 mm SiN 纳米波导展宽至 700–1600 nm 超连续；
      5. 静态 + 可编程幅度滤波整形光谱包络平坦度；
      6. 50 µm MMF → 300 µm 动态搅动器 → 2\" 积分球 → 定标光纤 → HPF；
      7. HPF 在 810–1280 nm 28 阶同时记录星光 + 梳光；
      8. 用梳齿作参考反演每阶波长解，再施加到星光谱计算 RV，扣除光谱仪慢漂移。
    required_hardware:
      - ent.hpf_nir_astrocomb_m19
      - ent.sin_nanophotonic_waveguide_m19
      - ent.dynamic_fiber_scrambler_m19
      - ent.hpf_spectrograph_m19
    advantages:
      - "30 GHz 齿距天然匹配 R≈5×10⁴ 光谱仪，无需额外模式过滤"
      - "梳展宽段用纳米光子低功率方案，长期热稳定"
      - "自主连续运行 ≥ 数月，真正达到天文运行可用度"
      - "梳溯源到 GPS-SI 秒，绝对波长不漂移"
    disadvantages:
      - "微波相噪通过梳乘法转移，齿线宽高于飞秒锁模梳（对 RV 不构成瓶颈，但限制未来光钟级应用）"
      - "初始梳齿数 ~100，需 SC 展宽后才能覆盖 HPF 全阶"
      - "光谱包络整形依赖 WaveShaper 类可编程滤波，引入插损"
    conditions:
      - "SiN 波导热稳定、耦合保持"
      - "模态噪声抑制链（搅动 + 积分球）持续工作"
    source_claim: >
      "We have developed a 30 GHz optical frequency comb spanning 700–1600 nm built on integrated
      electro-optic (EO) modulators and high-efficiency nanophotonic nonlinear waveguides to provide a
      robust calibrator for long-term operation at the telescope."

  - id: meth.common_comb_differential_rv_test
    name: "同梳双光纤差分 RV 漂移表征方法"
    status: demonstrated
    applies_to: ent.hpf_spectrograph_m19
    steps_summary: >
      将同一束梳光同时注入 HPF 的 sky 与 science 两路光纤（定标光绕望远镜焦平面均匀
      分布），每 5–10 min 记一次双通道 RV，求两通道之差以消除梳共模漂移，
      剩余散布即为光谱仪 + 探测器 + 光路非共模漂移极限。多日 bin 后得到 300 min 6 cm/s。
    required_hardware:
      - ent.hpf_nir_astrocomb_m19
      - ent.hpf_spectrograph_m19
    advantages:
      - "独立于星光直接给出仪器端 RV 噪声本底"
      - "可分辨模态 / 探测器 / 数据约简残差等非共模误差"
    disadvantages:
      - "不能捕获星-梳非共模光路误差（如真实星光注入模态）"
    conditions:
      - "梳为两通道共同参考"
      - "曝光时间足够短以避免慢漂移混叠"
    source_claim: >
      "The difference of the two channels should ideally be zero within the uncertainty of the photon
      noise... the scatter of a single 10 min differential drift measurement is at the 20 cm/s level...
      the RV precision improves approximately as the square root of total measurement time to as low
      as 6 cm/s at 300 min."

