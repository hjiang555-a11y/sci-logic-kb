      300 µm 芯径光纤在压缩状态下以几 Hz 频率做扭转振荡，与 2 英寸积分球串联构成时间扰动 +
      空间平均双层模态噪声抑制，在 NIR 高模式数条件下保证送入 HPF 定标光纤的光斑照度分布稳定。
    key_parameters:
      agitator_freq: "few Hz（扭转振荡）"
      integrating_sphere: "2 inch"
      fiber_diameter: "300 µm 动态搅动 + 50 µm 多模耦合"
    note: >
      PART-OF ent.hpf_nir_astrocomb_m19 定标输出链。是限制链 pri.fiber_modal_noise_nir_rv_limit
