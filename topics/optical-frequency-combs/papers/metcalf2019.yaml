# Metcalf 2019 — 30 GHz EO + SiN 纳米光子超连续天文梳首次在 10 m HET 上支持 NIR M 型矮星 RV 光谱 [应用技术里程碑]
# 提取者：GitHub Copilot（AI草稿，待专家确认）
# 提取日期：2026-04-19
# Schema版本：v4.1
# 专题：optical-frequency-combs
# contribution_type: technical — 天文光梳/系外行星 RV 测量应用论文
#   核心贡献：
#     (1) 首次实现覆盖 700–1600 nm、30 GHz 齿距的 EO + 纳米光子 SiN 天文梳；
#     (2) 在 10 m Hobby–Eberly 望远镜 + HPF 光谱仪上运行数月，实现 NIR 首个 ~1 m/s 级 RV 精度
#         （Barnard 星 3 个月 RMS 1.53 m/s）；
#     (3) 差分仪器稳定度达到 <10 cm/s（300 min 平均 ~6 cm/s），接近光子噪声极限；
#     (4) 工程路径：EO 电光调制 → 30 GHz FP 滤波 → Yb 光纤放大 → 70 fs 压缩 → 25 mm SiN 波导
#         低功率（525 mW）展宽 + 静/动态幅度滤波整形 + GPS-disciplined 时钟溯源到 SI 秒。
#   Framework 依赖：udem2002.yaml / giunta2019.yaml 已定义 ent.optical_frequency_comb、
#     pri.femtosecond_comb_frequency_ruler；ycas2012.yaml / leopardi2017.yaml 已分别提供
#     ent.near_ir_astro_comb_y12 与 meth.astro_comb_rv_calibration。本文件是 NIR + EO + 纳米光子
#     一体化方案的首次天文部署实例。

