    NIST：首次实现基于电光调制（EOM）梳的 f-2f 自参考与光学频率合成；160 THz超连续谱， 分数频率精度 <5×10⁻¹⁴，模间距可调（取决于微波调制频率），不依赖锁模机制。
entities:
  - id: ent.eom_frequency_comb
    name: "电光调制频率梳"
    aliases: ["EOM comb", "electro-optic comb"]
    hierarchy_level: 2
    status: demonstrated
    function: >
      通过对连续波激光施加微波速率电光调制，确定性地产生频率梳。梳齿频率
      ν_n = ν_p + n·f_eo，由 CW 激光频率 ν_p 和调制频率 f_eo 共同决定。
      不依赖锁模机制，模间距可由微波频率灵活调谐。
    note: "与 ent.optical_frequency_comb 并列，为可调宽模间距梳的代表实现。
      跨文件引用：ent.optical_frequency_comb 定义于 giunta2019.yaml。"

methods:
  - id: meth.eom_comb_self_referencing
    name: "EOM梳 f-2f 自参考方法"
    status: demonstrated
    applies_to: ent.eom_frequency_comb
    steps_summary: >
      EOM梳种激光（CW，10 GHz调制）→ 光学滤波抑制电子噪声 →
      非线性展宽（SCG）至 160 THz 超连续谱 → f-2f 干涉检测 f_ceo →
      相位锁定 f_ceo 和 f_rep → 实现任意光学频率合成
    advantages:
      - "模间距可调（微波频率决定），适合宽模间距应用（通信、量子、成像）"
      - "确定性相位关系，不依赖锁模机制"
      - "EOM梳源已商品化，易重配置"
    disadvantages:
      - "EOM梳展宽效率低（窄带初始谱宽）"
      - "电子噪声按 n² 逐渐降低光学相干性，需光学滤波解决"
    source_claim: >
      "we demonstrate electro-optic generation of a 160 THz bandwidth supercontinuum and realize
      f-2f self-referencing. Coherence of the supercontinuum is achieved through optical filtering
      of electronic noise on the seed EOM comb."

