  note: >
    [技术论文] IMRA America（Fermann 组）+ Colorado（Schibli）。利用腔内石墨烯电光
    调制器（GM）做 f_CEO 与 f_rep 的快速调制，配合腔外块状 EOM 做 f_rep 细控制；
