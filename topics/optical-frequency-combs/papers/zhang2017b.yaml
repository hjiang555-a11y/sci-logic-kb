principles:
  - id: pri.polarization_rotation_cavity_loss_frequency_control_z17
    name: "偏振态旋转调制腔损驱动梳频率控制原理（Zhang Y. 2017）"
    tier: engineering
    verification_status: observed
    statement: >
      在 NPR 锁模光纤梳中，偏振态控制腔损：(a) PBS 后线偏光经腔内传输产生非线性相位移 → 返回 PBS 时偏振态旋转；
      (b) 腔内 EOM 施加外场进一步旋转偏振态 → 改变 PBS 透射/反射比例 → 调制腔损 Δℓ；
      (c) 腔损变化影响锁模动力学 → 改变 frep / fceo（增益饱和 + Kerr 非线性 + 色散相互作用）。
      关键优势：(a) 大动态范围（EOM 电压 ±200 V，偏振旋转可达数 mrad，足以覆盖 NPR 稳定锁模范围）；
      (b) 带宽不受增益寿命限制（EOM 响应 ~ns，远快于泵浦功率调制的 µs 级限制）；
      (c) 单一执行器同时影响 frep / fceo（可联合 PZT 实现独立控制）。
    domain: "光纤激光器动力学；NPR 锁模技术"
    key_insight: >
      "偏振态旋转等效于'腔内损耗调制'，但其物理机制不同于传统 EOM 相位调制——这使得在 NPR 锁模系统中，
      旋转执行器具有大动态范围的天然优势（NPR 本身依赖偏振态演化，故对偏振旋转容忍范围大）"。
    formula: "Δfrep / Δfceo ∝ Δℓ（腔损变化），Δℓ ∝ 偏振旋转角度（由 EOM 电压驱动）"
    conditions: "NPR 锁模 Er:fiber 梳；EOM 插入 PBS 后（偏振敏感位置）；NPR 稳定锁模范围足够宽"
    source_claim: >
      "Our experimental results show that frequency control dynamic ranges are at least one order of magnitude larger than those of the previous ultra-fast frequency control techniques, reaching hundreds of hertz and hundreds of megahertz for repetition rate (fr) and carrier-envelope-offset frequency (fceo), respectively."

