  title: "Steering optical comb frequencies by rotating the polarization state"
  year: 2017
  first_author: Zhang
  journal: "Optics Letters"
  volume: 42
  issue: 24
  pages: "5145-5148"
  doi: "10.1364/OL.42.005145"
  note: >
    [技术论文] 中国科学院国家授时中心。提出新型梳频率控制方法：腔内 EOM 旋转偏振态驱动 frep / fceo 调谐：
    (1) 在 NPR 锁模 Er:fiber 梳中，插入 LiNbO₃ EOM（紧邻 PBS），通过外加电场旋转偏振态 → 改变腔损 → 驱动 frep / fceo；
    (2) 动态范围：frep 数百 Hz（比传统 EOM 方法大 >10×），fceo 数百 MHz（比传统泵浦调制大 >10×）；
    (3) 带宽与传统腔内 EOM 方法相当（frep ~kHz–MHz, fceo ~100 kHz–MHz）；
    (4) 鲁棒性好（NPR 模式锁定对偏振态旋转有一定容忍范围）。
    本工作是工程优化（扩大控制动态范围，简化多执行器级联），未突破伺服带宽纪录（Kuse 2015 graphene EOM 已达 MHz），
    归 evidence。对齐 v2 子域主线：A1-Noise（高带宽控制，间接影响相噪抑制能力）。

