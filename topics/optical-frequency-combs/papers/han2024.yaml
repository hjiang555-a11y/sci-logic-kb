  note: >
    [里程碑技术论文] USTC（Pan/Zhang/Xue/Jiang 等）与新疆天文台合作，Nanshan↔Gaoyazi 两终端跨越 113 km 山地水平路径。每端独立 Rb 原子钟+USL+OFC（Er 光纤梳，fr≈250 MHz）， 两端 Δfr = 2.5 kHz。两梳经 EDFA 放大至 1 W、3 dB 带宽 7 nm @1545 nm，经 400 mm 望远镜 互发互收，接收端与本地梳干涉形成双梳干涉图。时频传递（参考 Shen 2022 @10⁻¹⁹/113 km） 将独立基准绑定，从原始 ~1 GHz 频移收窄到 10 kHz 光学频率精度；HITRAN2020 反演 CO₂/H₂O。 跨文件引用：ent.dual_comb_spectrometer、meth.dual_comb_spectroscopy、 pri.dual_comb_multiheterodyne_detection、meth.adaptive_sampling_correction 定义于 coddington2016.yaml / coddington2010 体系；ent.optical_frequency_comb 定义于 udem2002.yaml。
entities:
