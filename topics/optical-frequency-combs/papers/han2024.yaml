    note: >
      外围条件接口节点（ext）。在其它专题中此节点作为 CONDITIONED-BY 的对象出现。

principles:
  - id: pri.bistatic_two_way_dcs_geometry
    name: "双站双向双梳协议：单程大气穿越+干涉图内嵌时频比对"
    tier: engineering
    verification_status: observed
    statement: >
      两台独立锁定的飞秒梳分置两端，彼此互发互收，本地探测器测量本地梳与远端接收梳的
      多外差拍频干涉图。相较单站反射镜协议，光束仅单程穿过大气，省去了远端反射镜的
      几何孔径限制；同时两端独立 Rb+USL 基准之间的频率偏差 Δf_CW 以及 Δfr 的漂移
      会编码进干涉图相位（见论文方程 8–10），因而可以直接从同一条干涉图同步解出
      "光谱信号"和"时频比对"，无需为比对再搭建一条专用链路。
    domain: "光学频率梳 / 双梳光谱 / 时频传递"
    formula: >
      V(t,τ₀) ∝ Im Σₙ E*_{A,n} E_{B,n} E_{atm,n} exp{i2π[(ω_B−ω_A+nΔfr)t
      −n(fr+Δfr)τ₀ − ω_B τ₀ + φ_{B,n} − φ_{A,n} + φ_{atm,n}]}
    key_insight: >
      核心洞察：把"时频链路"与"光谱链路"合并为同一条干涉图，使双基准方案的附加
      不确定度仅表现为频率轴整体平移（可直接 post-processing 抠除），而不污染光谱形状。
      这使得长链路、无反射镜、卫星-地面几何成为可能。
    conditions: "两端 fCEO+fBeat=0 锁定，USL 保持相干时间 > 单个干涉图获取时间"
    preconditions:
      - "两端均有 Rb 量级频率标准 + USL"
      - "GPS 提供 <30 ns 的采样起点同步"
      - "返回信号功率足以支撑相干门限触发（>5 nW）"
    invalidated_when:
      - "两端基准漂移速率超过单干涉图相干时间的频率分辨率"
      - "大气相位在单个干涉图内未被冻结（速率超标）"
    source_claim: >
      "Here we introduce another bistatic protocol ... Both combs are sent to each other
      through the atmosphere and interfere with each other at the receiving terminals.
      ... both absorption and phase spectrum change by the atmosphere over the path can
      be achieved at each terminal. Since the comb passes through the atmosphere only
      once and no reflector is required, the link loss can be sharply reduced."
    open_questions:
      - "是否可推广到 GEO 卫星-地面（36000 km，105.8 dB 几何损耗）场景？"
      - "两端 USL 相干时间能否支持进一步延长单次相干平均？"

  - id: pri.interferogram_embedded_freq_comparison
    name: "干涉图内嵌频率比对原理（M = fr/Δfr 放大因子）"
    tier: engineering
    verification_status: observed
    statement: >
      当两端基准独立时，光学频率偏差 Δf_CW 在射频拍频域里被压缩为 Δf_CW·(Δfr/fr)，
      等价地任何残留的频率偏差在反推回光域时会被放大 M = fr/Δfr 倍；反之，
      若同时记录发射/接收两向干涉图并做相位对比，则可以从干涉图本身直接解出
      Δf_CW（论文方程 11–13），实现时频比对并反演补偿，把光学频率精度
      从 ~1 GHz（未校准）收紧到 ~10 kHz（校准后）。
    domain: "光学频率梳 / 双梳光谱"
    formula: "ν_RF = 2 f_Beat − n·Δfr − Δf_CW；M = fr / Δfr"
    key_insight: >
      核心洞察：Δfr 既是双梳多外差的"降采因子"，也是基准偏差的"放大器"；
      主动利用这一放大去测 Δf_CW 而非把它当成噪声，是实现双站协议可用性的关键。
    conditions: "两向干涉图均可获取；fCEO/fBeat 稳定锁定"
    source_claim: >
      "the frequency accuracy of the bistatic protocol is worse by a factor
      M = fr/Δfr, where fr is the repetition rate of the local comb and Δfr
      is the difference between the repetition rate of the two combs ...
      the frequency accuracy can be improved by M = fr/Δfr, that is, 5 orders
      of magnitude, which is 1 GHz before and 10 kHz after the frequency comparison."

  - id: pri.turbulence_speckle_freeze_dcs
    name: "双梳快速采集冻结湍流散斑原理"
    tier: domain
    verification_status: observed
    statement: >
      单个双梳干涉图的中心爆发获取时间（~1/Δfr）远短于大气湍流相位的典型变化时间，
      因此湍流带来的强度噪声与活塞相位噪声在单帧内被"冻结"，不污染单帧光谱；
      帧间的相干平均能进一步压低散粒噪声与探测器噪声等背景噪声，
      使长链路、低接收功率下仍可得到高 SNR 谱。
    domain: "双梳光谱 / 大气光传播"
    key_insight: >
      核心洞察：DCS 对湍流"免疫"不是因为没有湍流，而是因为采集速度超过湍流演化速度；
      这一性质是它相对 TDLAS、IPDA-lidar 的核心优势，也是 113 km 可行的基础之一。
    conditions: "单干涉图获取时间 ≪ 湍流相干时间 τ_atm"
    invalidated_when:
      - "强湍流下 τ_atm 短于单干涉图时间，单帧内就已退相干"
    source_claim: >
      "Owing to high acquisition speed for a single interferogram, the intensity noise
      and piston-like phase noise caused by turbulence are frozen. ... DCS has shown
      excellent immunity to turbulent speckle."

  - id: pri.coherent_averaging_background_noise_suppression
    name: "长时相干平均抑制散粒/探测器背景噪声原理（DCS 专用）"
    tier: domain
    verification_status: observed
    statement: >
      连续干涉图之间保持相干关系时，相干平均可使随机背景噪声（散粒噪声、探测器噪声）
      按 √N 下降，而相干信号线性累加；因此只要梳-USL-基准链路的相干时间足够长，
      SNR 可以持续改善。本文借此在 1 h 平均内构建出 6000 齿完整谱。
    domain: "双梳光谱 / 相干探测"
    key_insight: >
      核心洞察：将"时频传递+USL+锁定梳"的高相干性转化为光谱 SNR 的结构性优势。
    conditions: "梳间相对相位噪声在平均窗口内可控"
    source_claim: >
      "Coherence between each interferogram makes coherent averaging possible,
      which can resist background noise such as shot noise and detector noise.
      The advantages of immunity to turbulent speckle and background noise result
      in the capability of sensing longer distances without calibration."

  - id: pri.photon_starved_open_path_dcs_limit
    name: "光子饥饿长程 DCS 灵敏度/距离极限（散粒噪声+信道损耗）"
    tier: engineering
    verification_status: inferred
    statement: >
      开放路径 DCS 的核心瓶颈是"每根梳齿每单位时间的探测光子数"：随着路径加长，
      几何/散射/吸收损耗指数上升，回波功率进入 nW–pW 量级后散粒噪声主导，
      必须通过（a）提高发射功率、（b）缩小几何损耗（单程/大口径）、
      （c）延长相干平均时间 来补偿。本文 83 dB 损耗+5 nW 回波+1 W 发射+1 h 平均
      给出此约束面下的一个可行点。
    domain: "双梳光谱 / 自由空间光通信"
    key_insight: >
      核心洞察：长程 DCS 不是"单项指标"问题，而是"功率×几何×相干时间"的联合优化问题。
    conditions: "梳线间功率近似均匀；探测器为散粒噪声极限"
    source_claim: >
      "The main obstacle to the longer distance of DCS is the low signal-to-noise
      ratio. ... the return signal of the first interferogram is above 100 nW and
      is above 5 nW for other interferograms, equivalent to a total attenuation of 83 dB."
    open_questions:
      - "在 GEO 级 >100 dB 损耗下能否维持相干？是否需要量子极限探测（Caldwell 2023）？"

  - id: pri.bandwidth_power_tradeoff_long_path_comb
    name: "长程 DCS 高功率-大带宽权衡原理"
    tier: engineering
    verification_status: observed
    statement: >
      为了在 83 dB 损耗下仍有 nW 级回波，需要把发射功率集中到窄滤光带（20 nm→7 nm 3dB）；
      但带宽越窄可测气种越少，本文仅 50 cm⁻¹ 覆盖，导致 CH₄ 等主气种暂时无法测。
      解决路径指向功率-带宽同时提升的新型梳（如孤子自频移 1600–1700 nm 全光纤激光）。
    domain: "光学频率梳 / 双梳光谱"
    key_insight: >
      核心洞察：当前长程 DCS 的"距离"与"气种覆盖"是直接竞争的设计约束。
    conditions: "EDFA/滤光方案下的光谱功率密度需达到 nW/梳齿 级"
    source_claim: >
      "We developed high-power OFCs that helped us achieve horizontal 100 km
      measurements, but at the cost of a bandwidth of only 50 cm⁻¹. In the future,
      many new technologies such as soliton self-frequency shift can be applied
      to OFCs to simultaneously develop high-power and large bandwidths."
    open_questions:
      - "同时实现 >1 W 输出与覆盖 CH₄ 的 1.65 μm 带的最佳 OFC 方案？"

methods:
  - id: meth.bistatic_two_way_dcs_protocol_h24
    name: "双站双向双梳光谱协议（含干涉图内嵌时频比对）"
    status: demonstrated
    applies_to: ent.long_path_dcs_h24
    steps_summary: >
      (1) 两端各独立锁定 OFC 到本地 USL+Rb，fCEO+fBeat=0；
      (2) 两梳经 EDFA 放大 1 W，经 400 mm 望远镜互发；
      (3) 接收端低 NEP 平衡探测本地梳与远端梳的多外差干涉图，GPS <30 ns 同步采集起点；
      (4) 门限触发只保存中心爆发段；
      (5) 对两向干涉图做 FFT + 相位对比，直接反演 Δf_CW 与 Δfr 漂移（时频比对）；
      (6) 减去时频偏差后，用 HITRAN2020 + 复 Voigt 线型 + 加权最小二乘基线校正
          同时从幅度谱与相位谱反演 CO₂/H₂O 浓度。
    required_hardware:
      - ent.long_path_dcs_h24
      - ent.high_power_erbium_comb_h24
      - ent.bistatic_two_way_optical_link_h24
    advantages:
      - "单程穿越大气，消除远端反射镜几何损耗"
      - "无需另建时频链路"
      - "同时获得幅度谱与相位谱"
    disadvantages:
      - "两端基准漂移若未校准会带来 ~1 GHz 光频偏移"
      - "高功率下散射光与信号光干涉引入吸收/相位反演偏差"
      - "受发射带宽限制，目前仅 50 cm⁻¹ 覆盖"
    conditions:
      - "两端相对相干时间 > 单干涉图获取时间"
      - "接收功率 >5 nW（相位展开正确的下限）"
    source_claim: >
      "we demonstrate a bistatic DCS protocol combining time–frequency transfer
      technology. ... The full complex spectrum has been measured at both terminals
      over a 113 km open-air path, with a channel loss of 83 dB."

  - id: meth.threshold_triggered_ifg_acquisition_h24
    name: "门限触发干涉图采集方法"
    status: demonstrated
    applies_to: ent.long_path_dcs_h24
    steps_summary: >
      由于 100 km 自由空间链路接收功率大幅摆动，设置固定电压门限，仅当探测器电压
      超过门限时捕获以中心爆发段为中心的一段干涉图，其余时间丢弃，从而大幅
      降低存储带宽与后处理压力。
    advantages:
      - "降低存储与传输带宽压力"
      - "自动跳过湍流深衰落帧"
    disadvantages:
      - "固定门限对功率漂移不具自适应性，可能漏采弱帧"
    conditions:
      - "探测噪声远低于门限电平"
    source_claim: >
      "a threshold-triggered acquisition method is introduced: once the detector
      voltage exceeds a fixed threshold, an interferogram centred around the
      centerburst is captured."

