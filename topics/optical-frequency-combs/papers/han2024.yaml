      altitude: "2109 m / 1782 m"
      channel_loss: "83 dB"
      center_wavelength: "1545 nm"
      spectral_3db_bandwidth: "~7 nm（≈50 cm⁻¹，6455.5–6505.5 cm⁻¹）"
      repetition_rate: "fr = 250 MHz"
      repetition_difference: "Δfr = 2.5 kHz"
      comb_teeth_spanned: "~6000 对"
      frequency_resolution: "605 MHz（受 40% 干涉图截取限制）"
      comb_power_after_edfa: "1 W / 梳"
      telescope_aperture: "400 mm"
      telescope_focal_length: "1600 mm"
      received_power_first_ifg: ">100 nW"
      received_power_subsequent: ">5 nW"
      temperature_stability: "σ_T = 7 mK（TEC 控温光学模块）"
