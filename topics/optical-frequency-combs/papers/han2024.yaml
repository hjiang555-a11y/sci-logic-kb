  - id: ent.high_power_erbium_comb_h24
    name: "高功率 Er 光纤梳+两级 EDFA 放大链路"
    aliases: ["1 W Er-fiber frequency comb", "two-stage EDFA amplified OFC"]
    hierarchy_level: 3
    status: demonstrated
    function: >
      Er 光纤锁模激光器，中心 1545 nm，fr=250 MHz，载波包络偏频 fCEO 与光学拍频 fBeat
      锁定为幅值相等符号相反（fCEO+fBeat=0），使 N·fr=fCW（USL 光频）。
      输出经两级高功率 EDFA 放大至 1 W，20 nm 滤光后用于远距离发射。
      高功率是穿透 83 dB 大气信道并保持 nW 接收级的前提。
    key_parameters:
      laser_type: "Er 光纤锁模激光"
      repetition_rate: "250 MHz"
      output_power: "1 W（滤光 20 nm 之后）"
