    name: "开放大气 DCS 最长演示路径长度"
    unit: "km"
    description: >
      双梳光谱公开报道的连续水平开放大气路径长度，衡量 DCS 链路预算能力。
    is_interface_metric: true
    coupling_formula: "channel_loss ≈ geometric_loss + atmospheric_extinction"
