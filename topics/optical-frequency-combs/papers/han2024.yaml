    name: "113 km 开放大气双站双向双梳光谱系统（Han 2024）"
    aliases:
      - "Bistatic two-way long-path DCS"
      - "100 km open-air dual-comb spectrometer"
    hierarchy_level: 2
    status: demonstrated
    function: >
      两端独立的双梳光谱实例：每端包含 Rb 原子钟 + 超稳激光（USL）+ Er 光纤梳（fr=250 MHz，
      fCEO+fBeat=0 锁定）+ 两级 EDFA（输出 1 W）+ 20 nm 滤光 + 400 mm/1600 mm 望远镜 +
      低 NEP 平衡探测 + GPS 时钟同步（<30 ns）。两端梳重频差 Δfr=2.5 kHz，
      经 113 km 水平大气互发互收，本地探测回波与本地梳拍频形成双梳干涉图。
      通过干涉图本身同步提取"时频比对+光谱信息"，将两端基准锁定到 10⁻¹⁹ 量级相对稳定度。
    key_parameters:
