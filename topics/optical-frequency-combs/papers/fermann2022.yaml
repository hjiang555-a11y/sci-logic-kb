    精密频率传递技术：(1) 单分支超连续谱频率传递——跨倍频程稳定度 <1×10⁻¹⁷/1s；
    (2) 超连续谱拼接（stitching）——跨 >2 倍频程超连续谱带宽；(3) 噪声抵消技术——
    相对频率传递稳定度 ≈2×10⁻¹⁸/1s；(4) 脉冲整形优化多波段功率分配。
    同时综述：Er 光纤频率梳一般架构（NALM、G-EOM、LN-EOM 高带宽调制器）、
    XUV-to-MIR 全谱域频率扩展、功率放大、低噪声微波/毫米波生成。
