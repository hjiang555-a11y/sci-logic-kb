    [技术论文 / 突破] IMRA America + Stanford。首次在**双分支**Er:fiber 频率梳架构下达到 10⁻¹⁸ 级稳定度传递：
    (1) 从单振荡器输出分为两路：IR 分支（1000-2200 nm）+ 可见分支（780 nm 倍频后展宽至 500-1100 nm）；
