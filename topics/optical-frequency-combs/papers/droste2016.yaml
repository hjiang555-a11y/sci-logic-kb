principles:
  - id: pri.er_fiber_comb_design_space
    name: "Er:fiber 光频梳四模块设计空间原理"
    tier: domain
    verification_status: observed
    statement: >
      Er:fiber 光频梳可在四个正交子空间做设计优化：
      (i) 锁模振荡器（相噪 / 鲁棒性 / 偏振），
      (ii) 放大器（功率 / 相噪 / 脉宽），
      (iii) SC 展宽（倍频程 / 色散 / 相干性），
      (iv) 伺服执行器（f_rep / f_CEO / 带宽）。
      每个子空间的选择独立但耦合到整体性能。
    domain: "光纤光频梳工程"
    key_insight: >
      把 Er:fiber 梳视为模块化工程系统——不同应用场景（计量 vs 商用 vs 野外）
      对应不同 Pareto 最优点；该框架支撑后续所有 Er:fiber 梳论文的比较坐标。
    conditions: "模块化设计；组件成熟度足够"
    open_questions:
      - "在全 PM 架构下同时达到 Ti:sapphire 级 f_CEO 相噪的极限在哪？"
      - "硅基集成 Er:fiber 梳能否兼得光纤梳稳健性 + 微梳紧凑性？"

  - id: pri.comb_equation
    name: "光频梳基本方程 f_n = n·f_rep + f_CEO"
    tier: meta
    verification_status: observed
    statement: >
      锁模激光输出脉冲串对应光谱上等间距梳齿：f_n = n·f_rep + f_CEO；
      两个自由度（f_rep 与 f_CEO）独立锁定 → 全部 n ≈ 10⁵ – 10⁶ 条齿绝对频率确定。
    domain: "光频梳基础"
    formula: "f_n = n·f_rep + f_CEO；n ~ 10⁵–10⁶"
    conditions: "锁模稳定；脉冲光谱窄线 SNR 足够"
    source_claim: >
      "the entire comb mode structure follows the comb equation f_n = n·f_rep + f_ceo"

