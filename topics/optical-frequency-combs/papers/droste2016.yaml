  note: >
    [框架综述] NIST/Kansas State。系统综述 Er:fiber 光频梳四大构建模块：
    (1) 锁模振荡器设计（NPR / NALM / SA / graphene / carbon-nanotube）
    (2) 光纤放大器（EDFA，线性/非线性相似子放大）
    (3) HNLF 超连续谱展宽
    (4) f_rep 与 f_CEO 伺服执行器。
    给出 Er:fiber 梳"为什么成为商用/现场部署主力"的工程理由框架。
    本文件只建立 Level 1 子分类实体 + 设计约束接口原理，
    具体系统参数由各技术论文承载。

