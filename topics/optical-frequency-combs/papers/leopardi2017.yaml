entities:
  - id: ent.single_branch_erfiber_comb_l17
    name: "单分支 Er:fiber 光频梳（Leopardi 2017）"
    aliases: ["NIST single-branch Er:fiber OFC"]
    hierarchy_level: 2
    status: demonstrated
    function: >
      Er:fiber 锁模激光器（~250 MHz 重频），f-2f 自参考稳 f_CEO，
      单一 EDFA + HNLF 展宽路径同时覆盖多个光学频率拍频点，
      所有关键光纤路径保持共模（光学参考、f_CEO 探测、多 cw 拍频共用同一展宽路径），
      并整体处于伺服反馈环内；以此消除传统多分支架构中 EDFA/HNLF 不同路径间的
      非共模相位噪声，实现接近 10⁻¹⁹ 级光频合成。
    key_parameters:
      laser: "Er:fiber 锁模激光器（~1550 nm）"
      repetition_rate: "~250 MHz"
      output_power: "<100 mW（原生）"
      architecture: "单分支 EDFA + HNLF 展宽"
      servo_topology: "关键光纤路径共模 + 伺服环内"
    interface_requirements:
      optical_reference: "超稳激光作为光频参考"
    note: "Level 2 实例节点，PART-OF ent.optical_frequency_comb"

principles:
  - id: pri.common_mode_fiber_path_noise_rejection
    name: "共模光纤路径噪声共模抑制原理"
    tier: engineering
    verification_status: observed
    statement: >
      Er:fiber 梳中 EDFA 与 HNLF 引入的相位漂移与光纤温度/应变涨落相关，
      若多拍频点使用独立展宽分支，这些噪声为非共模，无法被伺服环抑制；
      若所有关键路径共用同一光纤链路并整体置于伺服反馈环内，
      光纤相位漂移变为共模扰动，可由锁相环共模拒斥，从而达到 10⁻¹⁸ 级稳定度。
    domain: "光纤光梳工程；相位噪声伺服"
    formula: "σ_y_nonCM / σ_y_CM ≈ 1/η_servo（η_servo = 伺服开环增益）"
    key_insight: >
      "共模优化" 是 Er:fiber 梳从 10⁻¹⁶ 突破到 10⁻¹⁹ 的核心工程路径；
      与多分支 + 色散外差检测（Giunta 2020）形成两条并行的解决路线。
    conditions: "单路径展宽可同时覆盖所需拍频点；伺服带宽足够抑制共模"
    invalidated_when:
      - "所需拍频点跨度过宽，单路径 SNR 不足"
      - "光纤路径非全共模（如放大器前后分叉）"
    source_claim: >
      "an erbium-fiber laser frequency comb that overcomes these conventional challenges by ensuring
      that all critical fiber paths are common mode and within the servo-controlled feedback loop"

methods:
  - id: meth.common_mode_fiber_comb_servo
    name: "单分支共模 Er:fiber 梳伺服方法"
    status: demonstrated
    applies_to: ent.single_branch_erfiber_comb_l17
    steps_summary: >
      1. Er:fiber 梳输出 → 单路 EDFA + HNLF 展宽；
      2. 同一光纤输出同时提供 f-2f、多路 cw 拍频；
      3. 梳锁定（f_CEO + 1 齿相位锁至 USL）将整个展宽链路纳入伺服环；
      4. 共模相位噪声被锁相环拒斥；
      5. 读出光频测量不确定度 → <1×10⁻¹⁹。
    required_hardware:
      - ent.single_branch_erfiber_comb_l17
    advantages:
      - "10⁻¹⁹ 级光频测量不确定度"
      - "架构简单，单一放大+展宽"
      - "适合紧凑鲁棒计量级光梳源"
    disadvantages:
      - "单路径限制拍频点谱覆盖"
      - "部分场景下 SNR 比多分支架构低"
    conditions:
      - "需要共用路径的所有拍频点在光谱上紧邻"
    source_claim: >
      "fractional optical measurement uncertainty below 1×10⁻¹⁹ and fractional frequency instabilities
      less than 3×10⁻¹⁸ at 1 s and 1×10⁻¹⁹ at 1000 s"

