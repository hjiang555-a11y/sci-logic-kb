entities:
  - id: ent.iii_v_on_si_ultradense_comb_w17
    level: 1
    name: "III-V-on-Si ultra-dense comb laser (Wang 2017)"
    description: >
      Heterogeneously integrated passively mode-locked laser combining a III-V
      (InP-based) semiconductor optical amplifier / saturable absorber gain
      stage with a long low-loss silicon waveguide extended cavity, producing a
      sub-GHz-spacing optical frequency comb on a single chip.
    note: "Novel Level-1 entity; COMPETES-WITH microresonator combs in spacing regime."

  - id: ent.iii_v_soa_gain_section_w17
    level: 2
    part_of: ent.iii_v_on_si_ultradense_comb_w17
    name: "III-V (InP) SOA gain section"
    description: "Heterogeneously bonded III-V epitaxial stack providing optical gain on Si photonic chip."

  - id: ent.saturable_absorber_w17
    level: 2
    part_of: ent.iii_v_on_si_ultradense_comb_w17
    name: "Reverse-biased saturable absorber"
    description: "III-V saturable absorber section enabling passive mode-locking via intensity-dependent loss."

  - id: ent.si_extended_cavity_waveguide_w17
    level: 2
    part_of: ent.iii_v_on_si_ultradense_comb_w17
    name: "Long low-loss silicon extended-cavity waveguide"
    description: >
      Silicon-on-insulator passive waveguide (several-cm long) that extends
      the round-trip cavity length far beyond what monolithic III-V cavities
      allow, setting the sub-GHz free spectral range.

principles:
  - id: pri.long_cavity_subghz_comb_spacing
    tier: domain
    name: "Long extended cavity → sub-GHz comb spacing"
    description: >
      In a passively mode-locked laser the fundamental repetition rate (and
      thus comb line spacing) equals c/(n_g · L_round). Increasing L via a
      low-loss Si extended cavity directly compresses the FSR into the
      sub-GHz regime while preserving mode-locking.
    conditions:
      - "Low round-trip loss in the extended passive section"
      - "Saturable absorber recovery time compatible with round-trip time"
      - "Group-velocity dispersion kept low enough over the gain bandwidth"
    applicable_when: "Heterogeneous III-V/Si integration allowing low-loss long waveguides"
    invalidated_when: "Waveguide propagation loss dominates round-trip gain"
    source:
      claim: "Extending the cavity length on the Si platform lowers the repetition rate into the GHz / sub-GHz range while maintaining mode-locking."

  - id: pri.passive_mode_locking_soa_sa
    tier: domain
    name: "Passive mode-locking via SOA + saturable absorber"
    description: >
      Combined fast saturable absorption and gain saturation in the III-V
      sections phase-lock longitudinal modes of the composite cavity, yielding
      an equidistant optical comb without external modulation.
    conditions:
      - "Net gain window shorter than round-trip time"
      - "SA recovery faster than SOA gain recovery"

  - id: pri.heterogeneous_iii_v_on_si_integration
    tier: domain
    name: "Heterogeneous III-V-on-Si integration"
    description: >
      Adhesive / molecular bonding of III-V epitaxy onto SOI waveguides
      enables co-integration of efficient III-V gain with low-loss, dispersion-
      engineered Si passive circuits in a single chip.

  - id: pri.linewidth_enhancement_factor_limit
    tier: domain
    name: "Henry linewidth enhancement factor (α) broadening"
    description: >
      Amplitude-phase coupling in semiconductor gain (α ≠ 0) broadens the
      Schawlow-Townes linewidth of each comb tooth, setting a floor on per-line
      coherence in semiconductor comb lasers.

  - id: pri.group_velocity_dispersion_comb_limit
    tier: domain
    name: "Cavity GVD limit on comb bandwidth / equidistance"
    description: >
      Residual group-velocity dispersion of the composite III-V/Si cavity
      walks off longitudinal modes from equal spacing and narrows the
      mode-locking bandwidth, limiting the number of coherent comb lines.

  - id: pri.waveguide_loss_comb_limit
    tier: domain
    name: "Si waveguide propagation loss as cavity-Q / efficiency limit"
    description: "Propagation loss in the long Si extension reduces net gain margin, limits wall-plug efficiency and ultimately caps achievable cavity length / minimum comb spacing."

methods:
  - id: meth.passive_mode_locking_iii_v_si
    name: "Passive mode-locking of III-V-on-Si extended-cavity laser"
    enabled_by: [pri.passive_mode_locking_soa_sa, pri.heterogeneous_iii_v_on_si_integration]
    description: "DC-biased SOA + reverse-biased SA in a long SOI extended cavity; no RF drive required."

  - id: meth.rf_beatnote_comb_characterization
    name: "RF beatnote / optical spectrum comb characterization"
    description: "Measure optical spectrum (line count, envelope) and RF repetition-rate beatnote (spacing, phase-noise / timing jitter) to verify comb coherence."

