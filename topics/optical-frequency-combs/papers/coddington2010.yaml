  journal: "Physical Review A"
  volume: 82
  issue: 4
  pages: "043817"
  doi: "10.1103/PhysRevA.82.043817"
  note: >
    [应用层技术论文] NIST Coddington/Swann/Newbury 组。详细阐述相干双梳光谱（DCS）
    仪设计：两台 Er:fiber 梳分别相位锁至两路 cw 参考，通过重频差 Δf_r 做多外差采样，
    实时相干平均恢复复响应（magnitude + phase）。在 HCN overtone（194 THz / 1545 nm）
    上 9 THz 带宽 × 220 MHz 分辨 → 41,000 resolution elements，平均 SNR 2500，
    峰值 SNR 4000；相位灵敏度 250 μrad，分数吸收灵敏度 0.05%。

entities:
  - id: ent.coherent_dual_comb_spectrometer_c10
    name: "相干双梳光谱仪（Coddington 2010 系统）"
    aliases: ["NIST Er:fiber DCS", "coherent DCS"]
    hierarchy_level: 2
    status: demonstrated
    function: >
      两台 Er:fiber 锁模梳（重频 ~100 MHz，Δf_r ≈ 几 kHz），通过 f-2f 自参考稳 f_CEO，
      并将两台梳各自的一个梳齿相位锁至独立 cw 参考激光（1550 nm 附近），实现跨两台梳的完整相干性。
      一台梳作为"信号梳"通过样品，另一台作为"本振梳"与其外差，光电探测器输出 RF 多外差拍频谱，
      经快速 ADC 数字化并相干实时平均恢复样品复透过函数 H̃(ν)。
    key_parameters:
      comb_type: "Er:fiber 锁模激光梳，~100 MHz 重频"
      Δf_r: "~几 kHz（失谐重频差）"
      ceo_stabilization: "f-2f 自参考"
      cw_reference: "两路 cw 激光（1550 nm），光学相位锁定"
      spectral_coverage: "9 THz（实测，展宽后）"
      spectral_resolution: "220 MHz（等于梳重频）"
      data_acquisition: "数字实时相干平均，SNR ∝ √T"
    interface_requirements:
      optical_frequency_reference: "两路独立 cw 激光，提供光学相位参考"
      sample_path: "~100 m HCN 气体吸收池"
    note: "Level 2 实例节点，PART-OF ent.dual_comb_spectrometer（定义于 coddington2016.yaml）"

principles:
  - id: pri.dual_comb_coherent_averaging_snr_scaling
    name: "双梳相干平均 SNR 标度原理"
    tier: engineering
    verification_status: observed
    statement: >
      当两台梳维持充分相干时，RF 谱幅度/相位可相干平均（而非功率平均），
      SNR ∝ √(T·M_h)，其中 T 为平均时间，M_h 为有效相干梳齿数。
      相干平均是双梳光谱在宽带 + 高分辨下获得高 SNR 的核心机制。
    domain: "双梳光谱学；射频相干信号处理"
    formula: "SNR(T) ~ √T × SNR_单次；SNR 峰值受动态范围限制（ADC 有效位数）"
    key_insight: >
      单次扫描 SNR 被 ADC 动态范围限制（~40 dB），
      多扫描相干平均可突破单次极限而不丢失频率准确度/分辨率。
    conditions: "相对相位噪声 << 2π/√T；ADC 动态范围足够覆盖峰值梳齿幅度"
    invalidated_when:
      - "相干性丧失 → 只能做功率平均，频率准确度丢失"
      - "动态范围饱和或削波"
    source_claim: >
      "the peak SNR is 4000. This peak SNR corresponds to a fractional absorption sensitivity of 0.05%
      and a phase sensitivity of 250 microradians"

