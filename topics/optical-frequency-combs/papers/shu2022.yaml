# Shu 2022 — AlGaAsOI 暗孤子微梳驱动 CMOS 硅光引擎，实现 2 Tbit/s 并行相干光互连与可重构微波光子滤波器 [技术演示/里程碑]
# 提取者：GitHub Copilot（AI草稿，待专家确认）
# 提取日期：2026-04-19
# Schema版本：v4.1
# 专题：optical-frequency-combs
# contribution_type: technical — 微梳+硅光系统集成演示
#   核心贡献：
#     (1) 将 DFB 激光直接泵浦的 AlGaAsOI 高 Q 微环（Q ≈ 1–2 M，阈值 <100 μW，10 mW 泵浦出 180 GHz 暗孤子梳）
#         与 CMOS 代工厂流片的 SOI 硅光引擎（MZM、微加热器、延迟线、Ge 光电二极管、微环滤波器）组合成单芯片尺度光电系统；
#     (2) 首次以微梳取代 WDM DFB 阵列，演示 20-通道 PAM4 @ 50 Gbaud → 2 Tbit/s 聚合速率（1.65 Tbit/s 净速率）并行相干数据链路；
#     (3) 构建可重构微波光子滤波器（MPF）：通带 0.9–1.1 GHz 可调、FSR 1.8/3.6/7.2 GHz 可重构、约 53 μs 重构速度，同时兼容非色散与色散 tap delay 方案。
#   Framework 依赖：ent.microresonator_frequency_comb / ent.si3n4_integrated_comb / pri.dissipative_kerr_soliton /
#     pri.lugiato_lefever_equation / meth.cw_pumped_microcomb_generation / meth.laser_tuning_soliton_access
#     均定义于 kippenberg2011.yaml / kippenberg2018.yaml / huang2024.yaml，本文件通过 note 跨文件引用，不重复定义。

