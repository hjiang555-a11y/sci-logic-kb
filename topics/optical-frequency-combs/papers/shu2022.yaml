principles:
  - id: pri.normal_dispersion_dark_pulse_s22
    name: "正常色散 + 避免模交叉下暗脉冲 Kerr 梳生成原理"
    tier: domain
    verification_status: observed
    statement: >
      在正常群速度色散微腔中，单一 CW 泵浦本身不支持亮孤子（需反常色散），
      但当某个谐振模因多模耦合发生 "avoided mode-crossing"（频率被推离）时，
      局部等效色散被修饰为可支持相干暗脉冲（背景 CW 上有相位扭结的凹陷脉冲）。
      相比亮孤子，暗脉冲从非相干态进入相干态的泵浦功率阶跃显著更小，
      且在大热光系数平台（AlGaAs α_T = 2.3×10⁻⁴ K⁻¹）上借助热光自稳平衡，
      将相干态接入窗口展宽到数十 GHz，实现 turnkey 无反馈启动。
    domain: "微腔 Kerr 光频梳；Lugiato–Lefever 框架"
    formula: >
      LLE 修饰色散项 β₂^eff(ω)（由 avoided mode-crossing 重整）;
      暗脉冲解：u(t) = u_CW − A·sech(t/τ_d)·exp(iφ(t));
      接入条件：Δω_detune ∈ [Δω_min, Δω_max]，宽度随 α_T·Q 增大
    key_insight: >
      "正常色散 + avoided mode-crossing + 大热光效应" 三件套是 turnkey、低阈值、长稳定微梳的工程钥匙。
      它让 DFB 直接泵浦成为系统级可行方案，取代了明孤子所需的快速频率扫描/辅助激光等复杂启动。
    conditions: "正常色散微腔 + 存在受控的 avoided mode-crossing + 显著热光效应"
    preconditions:
      - "高 Q 因子（≥10⁶）以降低阈值到 mW 级"
      - "模式串扰位置可通过腔几何/多模设计工程化"
      - "热光效应足以抵消 Kerr 自稳不稳定区"
    invalidated_when:
      - "无避免模交叉 → 正常色散纯 CW 无法相干化"
      - "温度漂移超出热光自稳范围 → 相干态丢失"
    source_claim: >
      "a dark-pulse state is used to achieve coherent microcombs. This state works in the normal
      dispersion regime with the assistance of the avoided mode-crossing effect ...
      the strong thermo-optic effects of AlGaAs (2.3 × 10⁻⁴ K⁻¹) here can be leveraged to significantly
      extend the accessibility window of the coherent comb state"
    open_questions:
      - "avoided mode-crossing 的定量设计规则（位置、耦合强度）与功率阈值如何协同最优化？"
      - "暗脉冲相位噪声与线宽极限相比明孤子的定量差异？"

  - id: pri.microcomb_replaces_laser_array_for_wdm_s22
    name: "相干微梳等效替代 WDM DFB 激光阵列原理"
    tier: engineering
    verification_status: observed
    statement: >
      相干 Kerr 微梳输出 N 条相位锁定、等频率间隔、谱包络平坦的光载波，
      其每条梳齿可等效为独立 CW 激光，同时保留梳齿间的相对频率/相位确定性。
      因此一个微梳 + 解复用器可整体替代 N 通道 DFB 激光阵列，省去通道对齐、
      频率稳定化、逐激光驱动电路等硬件与校准开销，并天然支持相干/密集 WDM。
    domain: "光通信；光电集成"
    formula: >
      Aggregate_rate = N_channels × Per_channel_rate;
      N_channels_usable ∝ (带内可用梳齿数 − FEC 裕量)
    key_insight: >
      这是微梳从"物理演示"进入"替代商用 DFB 阵列"的价值拐点——
      单激光器驱动一条片上 AlGaAsOI 微环即可获得 20+ 相干 CW 光源，
      相对 DFB 阵列大幅降低功耗、体积与组装成本。
    conditions: "微梳齿间相位/幅度噪声低于调制格式容限；每齿功率足够通过 EDFA 补偿后打 FEC 阈值"
    preconditions:
      - "相干态微梳（dissipative Kerr soliton 或 dark pulse）"
      - "齿距匹配硅光解复用器的通道栅格"
    invalidated_when:
      - "单齿功率或 OSNR 无法支持目标调制格式 → FEC 不通"
      - "齿距不匹配 WDM 栅格导致无法 demux"
    source_claim: >
      "Such a coherent comb is used to drive CMOS-foundry-based SiPh engines ...
      20 comb lines in the C-band are used as the source ... aggregate bit rate of 2 Tbit s⁻¹"
    open_questions:
      - "微梳路线在 O/E 链路总功耗（pJ/bit）上对比 DFB 阵列的真实盈亏点？"

methods:
  - id: meth.dfb_pumped_turnkey_dark_pulse_generation_s22
    name: "DFB 直接泵浦 turnkey 暗脉冲微梳生成方法（Shu 2022）"
    status: demonstrated
    applies_to: ent.algaasoi_dark_pulse_microcomb_s22
    steps_summary: >
      1. 选 AlGaAsOI 微环，设计 avoided mode-crossing 位置使其落在目标泵浦谐振附近；
      2. 将商用 InP DFB 激光芯片（mW 级，~1552 nm）直接耦合至微环，on-chip 功率 ~10 mW；
      3. 打开 DFB 即进入暗脉冲相干态（不需频率扫描、辅助激光或反馈回路）；
      4. 热光自稳维持相干态（自由运行 >7 h，小功率漂移）；
      5. 2-FSR（180 GHz）工作点输出用于下游 SiPh 引擎；预标定 laser detuning/温度 切换 FSR。
    required_hardware:
      - ent.algaasoi_dark_pulse_microcomb_s22
      - ent.siph_tr_chip_s22
    advantages:
      - "turnkey 启动：无需复杂频率扫描/辅助激光"
      - "极低阈值（<100 μW）与 mW 级相干态泵浦，可直接 DFB 驱动"
      - "长稳定（>7 h 自由运行，无反馈回路）"
      - "接入窗口 tens of GHz（~10× 明孤子），对 DFB 波长漂移鲁棒"
    disadvantages:
      - "依赖 AlGaAsOI 异质集成工艺，非纯 CMOS 代工流程"
      - "暗脉冲相位噪声、线宽相对明孤子尚未做系统表征"
      - "avoided mode-crossing 设计对工艺容差敏感"
    conditions:
      - "正常色散微腔 + 受控 avoided mode-crossing"
      - "足够强热光效应（AlGaAs 级别）"
    source_claim: >
      "Such a state can be deterministically triggered by simply turning on the laser without relying on
      any tuning control of electronics, thus showing 'turnkey' behaviour"

  - id: meth.microcomb_parallel_pam4_wdm_link_s22
    name: "微梳并行 PAM4 WDM 相干数据链路方法"
    status: demonstrated
    applies_to: ent.microcomb_driven_siph_system_s22
    steps_summary: >
      1. AlGaAsOI 暗脉冲梳在 C 波段输出 20 条 180 GHz 间隔的相干齿（5 dB 内平坦）；
      2. EDFA 补偿解复用损耗 → WSS 拆分奇偶通道；
      3. 送入 SOI T/R 芯片：每通道 PN-depletion MZM 加载 PAM4（32/40/50 Gbaud）；
      4. 2 km 单模光纤传输；
      5. 片上 Ge-Si PD 与商用 PD 并行直接检测；
      6. 按通道计算 BER，用 7% HD-FEC / 20% SD-FEC 作阈值。
    required_hardware:
      - ent.algaasoi_dark_pulse_microcomb_s22
      - ent.siph_tr_chip_s22
    advantages:
      - "20 条相干载波来自单一微梳，免除 DFB 阵列对齐/稳频"
      - "PAM4 50 Gbaud × 20 → 2 Tbit/s 聚合线速率（1.65 Tbit/s 净速率）"
      - "全 CMOS 代工厂 SOI 组件，具可扩展制造路径"
    disadvantages:
      - "EDFA 仍需外接（片上低噪放大器未集成）"
      - "DFB 泵浦下可用通道降至 7 条（448 Gbit/s）——受 DFB 功率/线宽限制"
    conditions:
      - "梳齿 OSNR + 功率通过 EDFA 后满足 FEC 余量"
    source_claim: >
      "a baud rate of 50 Gbaud per single lane, corresponding to an aggregate bit rate of 2 Tbit s⁻¹
      (1.65 Tbit s⁻¹ net rate after FEC overhead subtraction)"
    conditions_note: "ENABLED-BY pri.microcomb_replaces_laser_array_for_wdm_s22"

  - id: meth.microcomb_reconfigurable_mpf_s22
    name: "微梳驱动可重构微波光子滤波器（TDL）方法"
    status: demonstrated
    applies_to: ent.microcomb_driven_siph_system_s22
    steps_summary: >
      1. 180 GHz 梳齿作为 tap 权重集合；
      2. MZM 加载 RF 输入到所有 taps；
      3. 8-通道 add-drop 微环阵列（OSS）做 line-by-line 幅度加权（Gaussian apodization）；
      4. 片上螺旋波导（非色散，setup-1）或 SMF 光谱色散（setup-2）提供 tap delay ΔT；
      5. 高速 PD 合束 beat 出 RF 滤波响应。可通过重设梳齿间距切换 RF FSR。
    required_hardware:
      - ent.algaasoi_dark_pulse_microcomb_s22
      - ent.siph_tr_chip_s22
    advantages:
      - "~53 μs 重构速度（热调加权，远快于改变孤子态）"
      - "通带 0.9–1.1 GHz（非色散）至亚 GHz（色散）连续可调"
      - "RF FSR 1.8/3.6/7.2 GHz 可切换（支持 5G/雷达/片上信号处理）"
      - "色散方案下主旁瓣抑制 >20 dB"
    disadvantages:
      - "总 tap 数受可用梳齿数限制"
      - "EDFA/SMF 仍部分外置"
    source_claim: >
      "this work significantly advances the degree of integration and the reconfiguration speed
      (about 53 μs) ... 3-dB BW of the MPF in the non-dispersive delay scheme can be continuously
      adjusted within a range of about 1.97–2.42 GHz"

