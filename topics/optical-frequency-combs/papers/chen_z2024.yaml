principles:
  - id: pri.envelope_phase_time_ceo_free_sync_c24
    name: "脉冲包络相位时间同步免 CEO 依赖原理（Chen Z. 2024）"
    tier: engineering
    verification_status: observed
    statement: >
      光频梳脉冲包络相位时间（group-delay）与载波相位（carrier phase）不同：
      (a) 载波相位由 fceo + n·frep 决定，fceo 需稳频至 sub-mHz 级才能维持长期相位相干（对光钟可行，对微波钟困难）；
      (b) 包络相位时间主要由 frep 与光纤色散决定，fceo 影响小（仅影响 CEO slip 的绝对时间标签，非时间间隔）。
      通过测量脉冲包络质心（Kalman 滤波 + LOS），规避 fceo 锁定要求，使微波钟（相噪高于光钟）驱动的梳
      仍能维持 fs 级互相干——关键在于色散补偿 + 偏振控制消除链路漂移，使包络相位时间稳定。
    domain: "时频传递；光脉冲时域测量"
    key_insight: >
      "使用包络相位时间（而非载波相位）是微波钟同步的关键选择——因为微波钟本身 Allan 偏差在 10⁻¹⁴ 量级，
      无法稳频 fceo 至 sub-mHz（会引入更大噪声）"——本工作证明在此场景下仍可达 fs 级同步。
    formula: "时间间隔 Δt = (质心_stop - 质心_start) @ envelope phase, 独立于 fceo"
    conditions: "色散补偿；偏振控制；LOS 高灵敏度（attosecond 级）；Kalman 滤波抑制强度噪声"
    source_claim: >
      "We used the phase time of the pulse envelope instead of the carrier phase for time synchronization to remove the limit of the carrier envelope offset (CEO) frequency, since the stable carrier phase is vulnerable to fluctuations in independent sources and fiber transmission."

