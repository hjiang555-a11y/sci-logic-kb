principles:
  - id: pri.microcomb_self_injection_locking
    name: "微梳参量增益介导的自注入锁定原理"
    tier: domain
    verification_status: observed
    statement: >
      在微谐振腔频率梳中，当初始产生的束状梳（bunched comb）的子梳在频域开始重叠时，
      重叠区域的梳齿通过参量增益（四波混频）相互注入锁定。这一过程遵循 Adler 方程：
      (1/2π)·dφ/dt = Δν − (ν₀/2Q)·(E₁/E₀)·sin(φ)，
      其中 Δν 为自由运行频率差，E₁/E₀ 为注入场与自由振荡场的相对振幅，
      Q 为加载品质因子。当 |Δν| < (ν₀/2Q)·(E₁/E₀)（锁定范围），
      系统达到稳态 φ = arcsin(2QΔν/(ν₀E₁/E₀))，频率偏移被锁定为零。
      与外注入锁定不同，微梳中注入源和被锁振荡器均在同一谐振腔内产生。
    domain: "微腔光频梳，非线性光学，注入锁定"
    formula: >
      (1/2π)·dφ(t)/dt = Δν − (ν₀/2Q)·(E₁/E₀)·sin(φ(t))；
      锁定范围 Δν_lock = (ν₀/2Q)·(E₁/E₀)
    key_insight: >
      自注入锁定提供了一种不同于 DKS 孤子锁模的相位锁定机制——
      不需要超短脉冲的循环传播，仅需频域束状梳的重叠。
      这解释了实验中观察到的等间距但无确定脉冲相位关系的微梳态。
    conditions: "束状梳的子梳在频域有重叠区域；参量增益足以介导注入锁定"
    preconditions:
      - "微谐振腔在反常色散区工作，已超过 OPO 阈值"
      - "泵浦功率或失谐足以使子梳扩展至重叠"
    invalidated_when:
      - "子梳之间无频域重叠（如低泵浦功率下的孤立束状梳）——无注入锁定发生"
      - "色散过强导致子梳频率间距过大——E₁/E₀ 在重叠区太小"
    source_claim: >
      "We show the presence of a self-injection locking mechanism within the resonator
      that is mediated via the parametric gain"

  - id: pri.nondeterministic_phase_microcomb
    name: "非确定性相位关系的等间距微梳态"
    tier: domain
    verification_status: observed
    statement: >
      存在一类微梳态：梳齿间频率严格等间距（通过与参考梳比较验证偏移 <100 mHz），
      时间上相位稳定（拍频信号窄线宽），但梳齿之间的相位关系是非确定性的——
      即不对应于时域中的超短脉冲或任何简单的脉冲图案。这与传统锁模激光器
      （相位关系确定，对应傅里叶极限脉冲）和 DKS 孤子（确定的 sech² 脉冲形状）
      形成鲜明对比。
    domain: "微腔光频梳，相干性，脉冲物理"
    key_insight: >
      相位稳定 ≠ 确定性相位关系。微梳可以是频率精确且时间稳定的频率标尺，
      即使不产生超短脉冲。这拓展了"光频梳"概念的边界。
    conditions: "自注入锁定后的微梳态"
    invalidated_when:
      - "梳产生进入 DKS 孤子态——此时相位关系变为确定性"
    source_claim: >
      "we demonstrate the existence of equidistant optical frequency combs that are phase
      stable but have nondeterministic phase relationships between individual comb modes"

