principles:
  - id: pri.npe_nalm_hybrid_mode_locking
    name: "NPE+NALM 混合锁模原理"
    tier: engineering
    verification_status: observed
    statement: >
      在同一激光腔内串联两种锁模机制：NALM 通过相对慢、但鲁棒的非线性环镜等效饱和吸收提供
      自启动与宽脉冲整形；NPE 通过快（超飞秒量级）非线性偏振旋转 + PBS 振幅滤波进一步压缩脉冲。
      前者保证自启动性与对偏振/环境漂移的容差，后者将脉冲宽度压到接近腔色散补偿极限、
      同时获得低 RIN 与低相位噪声。结果是兼具 NALM 鲁棒性与 NPE 低噪声的复合方案。
    domain: "飞秒光纤激光锁模"
    formula: "有效饱和吸收 = σ_NALM(I) ⊗ σ_NPE(I)，NPE 响应时间 << NALM；整体动态范围由 NALM 决定"
    key_insight: >
      纯 NPE 腔对环境/偏振漂移敏感（易失锁），纯 NALM 腔重频低、功率小；
      混合方案借 NALM 做"粗锁模 + 启动"，借 NPE 做"精压缩 + 降噪"，突破单机制折中。
    conditions:
      - "NALM 偏振控制器状态正确，否则无法锁模"
      - "腔内净色散为负（本实验 -5000 fs²）以支持孤子脉冲整形"
      - "存在足够泵浦（本实验自启动阈值 860 mW）"
    preconditions:
      - "EDF 增益足够补偿腔损耗"
      - "NALM 脉冲能量低于孤子分裂阈值（~0.75 nJ）"
    invalidated_when:
      - "NALM 偏振控制错位 → 无法启动"
      - "脉冲能量过高触发 soliton fission → 多脉冲"
    source_claim: >
      "NALM is adopted here to initiate mode-locking and shape wide pulses. The ultrashort pulses
      are obtained in the fast NPE progress by nonlinear filtering of the pulse amplitude.
      The hybrid mode-locked scheme is more robust than lasers that only use NPE, and the RIN is
      as low as schemes based on pure NPE."
    open_questions:
      - "NPE 与 NALM 的饱和吸收参数如何独立调节以系统性优化噪声-鲁棒性折中？"

  - id: pri.am_to_pm_conversion_in_comb
    name: "梳中 RIN→PM 幅相转换限制原理"
    tier: domain
    verification_status: observed
    statement: >
      光电探测 f_rep 以及超连续展宽+f-2f 探测 f_ceo 过程中，激光强度噪声（RIN）通过探测器
      非线性、载流子动力学、以及介质非线性折射率 n₂ 诱导的强度-相位耦合，转换为 f_rep 和 f_ceo
      的相位/频率噪声。因此，降低腔内 RIN 是降低梳残余相噪的直接路径。
    domain: "光纤频率梳噪声传递"
    key_insight: >
      这是"为什么 RIN 是梳性能关键指标"的机制解释；NPE 机制因响应快、等效饱和强、
      腔内能量涨落更稳，能使 RIN 低至 -135 dBc/Hz 水平。
    conditions:
      - "f_ceo 探测依赖 SC 展宽 + HNLF 非线性过程"
      - "f_rep 由光电二极管探测，存在 AM-PM 转换系数"
    source_claim: >
      "The RIN of the mode-locked laser plays a key role in amplitude-to-phase conversion of
      f_rep detection and the conversion of intensity noise to f_ceo noise in optical combs."

  - id: pri.servo_bandwidth_limited_comb_locking
    name: "伺服带宽限制原理（泵浦调制锁 f_ceo）"
    tier: engineering
    verification_status: observed
    statement: >
      当 f_ceo 锁定通路以泵浦电流调制为执行器时，环路带宽受限于 EDF 上能级寿命（~10 ms 量级）
      与执行器响应，导致闭环增益在 ~10 kHz 处出现 gain bump，残余高频噪声无法被抑制，
      进而限制了系统对机械振动/高频环境扰动的抑制能力。
    domain: "光纤梳伺服工程"
    formula: "BW_servo ≲ 1 / (2π τ_upper_state)（EDF）"
    key_insight: >
      "伺服带宽是 f_ceo 噪声的工程天花板，而不是 NPE+NALM 机制本身的物理极限"；
      突破路径是改用更快执行器（腔内 EOM 的辅助通路、快声光调制）或前馈补偿。
    conditions:
      - "执行器为泵浦电流调制"
      - "EDF 上能级寿命较长"
    invalidated_when:
      - "切换到快执行器（EOM 泵浦前馈 / 声光）或将 f_ceo 信息前馈至下游 AOM"
    source_claim: >
      "the locking loop still has a relatively low servo bandwidth, which is indicated by the
      obvious gain bump at about 10 kHz ... This limits the vibration-resistance performance"

methods:
  - id: meth.pump_current_modulation_fceo_lock_z17
    name: "泵浦电流调制锁定 f_ceo 方法"
    status: demonstrated
    applies_to: ent.hybrid_ml_erfiber_comb_z17
    steps_summary: >
      1. 取一路输出，经 HNLF 超连续展宽 + 共光程 f-2f 干涉仪，InGaAs 放大探测器接收得 f_ceo 信号
         （SNR 35 dB @300 kHz RBW，估计线宽 ≤200 kHz）；
      2. 与外部 RF 参考混频得误差信号，经自制 loop filter；
      3. 反馈至 976 nm 泵浦 LD 电流（调谐系数 0.7 MHz/mA）完成锁定；
      4. 用频率计数器记录 1 s 门时间 Allan 偏差，同时用 FFT 分析仪记录相噪 PSD。
    required_hardware:
      - ent.hybrid_ml_erfiber_comb_z17
    advantages:
      - "泵浦电流调制为 Er:fiber 梳最成熟的 f_ceo 执行器"
      - "1 s in-loop Allan 偏差 9.0×10⁻¹⁸，积分相噪 0.53 rad（1 Hz–100 kHz）"
    disadvantages:
      - "EDF 上能级寿命长 → 环路带宽 ~10 kHz 有 gain bump"
      - "高频振动抑制不足"
    source_claim: >
      "f_ceo is locked to an external reference by modulating the pump laser current with a homemade
      loop filter. The coefficient as a function of pump current is about 0.7 MHz/mA."

  - id: meth.eom_pzt_dual_actuator_frep_lock_z17
    name: "EOM + PZT 双执行器梳齿锁定方法"
    status: demonstrated
    applies_to: ent.hybrid_ml_erfiber_comb_z17
    steps_summary: >
      1. 1555 nm 梳齿与 1555 nm 窄线宽 CW 参考激光拍频得 f_beat；
      2. 高速通道：腔内 EOM 修改光程 → 快速修正 f_rep；
      3. 低频大范围通道：PZT 移动 HR 镜补偿温度漂移；
      4. 闭环后得 Allan 偏差 9.4×10⁻¹⁸ @1 s，下降至 10⁻²⁰ @10000 s；积分相噪 0.86 rad，时基抖动 0.71 fs。
    required_hardware:
      - ent.hybrid_ml_erfiber_comb_z17
    advantages:
      - "EOM 提供高速带宽，PZT 负责长期漂移补偿"
      - "双通道覆盖从 DC 到 ~数十 kHz 的工程频带"
    disadvantages:
      - "in-loop 结果；out-of-loop 性能受参考激光限制"
    source_claim: >
      "We use both the intra-cavity EOM and PZT to stabilize a comb tooth. The comb tooth at
      1555 nm is phase-locked to a 1555-nm narrow linewidth continuous laser."

