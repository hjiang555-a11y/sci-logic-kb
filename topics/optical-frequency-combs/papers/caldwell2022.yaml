    (4) 范式转移：TPFC 不再是"固定机械齿轮箱"，而是"数字可控相干光源"——适用于多梳传感、时频计量、压缩采样、泵浦-探测； (5) 核心技术：同步数字电子实时操控两相位锁（frep + fceo）→ 脉冲时间 / 相位动态可控（slew-rate 限制下任意范围）。 本工作是 **范式转移**（TPFC 首次实现）+ **量子限制灵敏度达成**（双梳测距首次逼近散粒噪声极限），判定 breakthrough。 对齐 v2 子域主线：B-Ranging（双梳测距应用）+ A-Noise（量子限制相干探测）。
