principles:
  - id: pri.tpfc_digital_coherent_pulse_control_c22
    name: "时间可编程频率梳数字相干脉冲控制原理（Caldwell 2022）"
    tier: meta
    verification_status: observed
    statement: >
      传统自参考梳锁定 frep + fceo 后，脉冲序列时间 / 相位固定（"机械齿轮箱"）；
      TPFC 突破：同步数字电子（FPGA）实时动态操控两相位锁 → 脉冲时间 / 相位可编程（±2 as 精度，范围仅受 slew-rate 限制）；
      应用模式：a) 追踪振荡器（tracking oscillator）：锁定弱回波脉冲序列 → 量子限制相干积分；
      b) 任意时间偏移（multi-comb 传感：模拟更高 frep 系统但保留低 frep 优势）；
      c) 任意时间模式（compressive sampling / pump-probe）。
    domain: "时频计量；数字伺服；量子限制探测"
    key_insight: >
      "TPFC 从'固定尺'升级为'可编程时间基准'——这是光频梳二十年来首次范式转移：
      不再局限于 vernier 错位方案（固定 Δfrep），而是实时数字控制脉冲到达时刻与相位"——
      使多梳传感摆脱"死时间"惩罚，达到量子限制灵敏度。
    formula: "脉冲时间偏移 Δt 由 frep / fceo 相位锁动态设定（FPGA 实时计算）"
    conditions: "自参考梳（frep + fceo 可锁定）；同步数字电子（FPGA）实时控制"
    source_claim: >
      "We overlay a self-referenced optical frequency comb with synchronous digital electronics for real-time coherent control
      of the comb's pulse train output. ... The temporal placement of the comb pulses is set with ±2-attosecond (as) accuracy."

  - id: pri.tpfc_tracking_oscillator_quantum_limit_c22
    name: "TPFC 追踪振荡器量子限制探测原理（Caldwell 2022）"
    tier: domain
    verification_status: observed
    statement: >
      传统双梳：固定 Δfrep → 弱回波脉冲与本振梳错位采样（vernier）→ 有效"死时间"（非相干平均周期）→ 灵敏度远低于散粒噪声极限；
      TPFC 追踪模式：动态调整 frep / fceo → 本振梳脉冲时间 / 相位实时追踪弱回波脉冲（phase-locked tracking）→ 相干积分（无死时间）
      → 散粒噪声极限灵敏度（仅受光子数限制）。
      测距场景：TPFC 检测到平均光子数 1/77 / 脉冲（接近量子极限 2×），而传统双梳需 5000× 更强信号达到同级性能。
    domain: "量子限制探测；双梳传感"
    key_insight: >
      "TPFC 追踪振荡器本质上是'时间域相位锁环'——脉冲到达时刻的 PLL，而非传统的频率域 PLL"——
      这使弱信号检测达到量子极限（散粒噪声地板），而不是被固定 Δfrep 的死时间惩罚淹没。
    conditions: "TPFC 实时控制；弱回波脉冲序列；相干积分（无 cycle slip）"
    source_claim: >
      "This agility enables quantum-limited sensitivity in sensing applications as the programmable comb can be
      configured to coherently track weak returning pulse trains at the shot-noise limit."

