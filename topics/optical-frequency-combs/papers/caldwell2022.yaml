    [Breakthrough 论文] NIST Boulder + U. Colorado. 时间可编程频率梳（TPFC）+ 量子限制测距： (1) TPFC：数字实时相干控制脉冲时间与相位（±2 as 精度）→ 追踪弱回波脉冲序列（tracking optical oscillator in time and phase）； (2) 传统双梳：固定 frep 错位产生"死时间"（dead time）→ 远低于散粒噪声极限；TPFC 消除死时间 → 量子限制灵敏度； (3) 测距演示：a) 精度地板 0.7 nm（4.8 as 飞行时间），超越传统双梳；b) 弱信号检测：平均光子数 1/77 / 脉冲（接近量子极限 2×）；
