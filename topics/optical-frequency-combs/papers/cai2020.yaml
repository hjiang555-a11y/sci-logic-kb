principles:
  - id: pri.grin_lens_compact_f2f
    name: "GRIN 透镜微型化 f-2f 干涉仪原理"
    tier: engineering
    verification_status: observed
    statement: >
      用梯度折射率（GRIN）光纤耦合透镜替代传统非球面透镜组构建共线 f-2f 干涉仪，
      可将干涉仪体积从 100 cm³ 级压缩至 cm³ 量级，同时维持 f_CEO 探测 SNR（40 dB）。
      GRIN 镜头全光纤对接消除空气-玻璃面对准/温漂。
    domain: "光纤梳集成光学"
    conditions: "1550 nm 波段；GRIN 规格与光纤 MFD 匹配"
    invalidated_when:
      - "GRIN 长度容差失控导致 f_CEO 相位噪声上涨"

  - id: pri.single_fiber_mechanical_actuator
    name: "单光纤机械执行器大范围调谐原理"
    tier: engineering
    verification_status: observed
    statement: >
      以光纤段为机械致动元件（拉伸/形变）构成 f_rep 的唯一执行器，
      兼具大调谐范围（可吸收环境温漂，无需主动温控）与 ~1 kHz 带宽。
      与传统"EOM 高频 + PZT 低频"双执行器拓扑相比省去交叉耦合补偿。
    domain: "光纤梳伺服工程"
    conditions: "光纤机械 Q/谐振频率不限制目标带宽"
    invalidated_when:
      - "执行器低频下仍欠过行程导致锁定失效"

methods:
  - id: meth.compact_single_actuator_er_comb_lock
    name: "单光纤执行器 + GRIN f-2f 的紧凑全 PM Er 梳锁定方法"
    status: demonstrated
    applies_to: ent.compact_pm_er_comb_cai20
    steps_summary: >
      1. 全 PM Er:fiber 振荡器，200 MHz；
      2. SMF 压缩至 63 fs + HNLF 展宽；
      3. GRIN 光纤耦合透镜微型共线 f-2f 干涉仪测 f_CEO；
      4. 自研单光纤执行器驱动腔长 → f_rep 锁至 H-maser 溯源 RF；
      5. f_CEO 锁至 RF；
      6. 计数 1 s Allan 330 μHz、积分时延抖动 418 fs。
    required_hardware:
      - ent.compact_pm_er_comb_cai20
    advantages:
      - "体积 / 功耗显著降低，适合场外部署"
      - "省去主动温控简化电子链"
    disadvantages:
      - "伺服带宽 ~1 kHz 较常规 EOM 方案低"

