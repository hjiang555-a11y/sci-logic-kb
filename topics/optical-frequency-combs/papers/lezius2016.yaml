entities:
  - id: ent.spaceborne_erfiber_comb_l16
    name: "Space-qualified Er:fiber self-referenced OFC (TEXUS-51)"
    level: 2
    part_of: ent.optical_frequency_comb
    description: >
      Ruggedized Er-doped fiber mode-locked laser (100 MHz rep-rate) with
      highly nonlinear fiber supercontinuum and f-2f interferometer, packaged
      for sounding-rocket flight. Monolithic free-space-free Er:fiber oscillator
      with saturable absorber mirror mode-locking; locked to an onboard
      ultra-narrow cavity-stabilized laser reference.
    key_parameters:
      - name: repetition_rate
        value: 100
        unit: MHz
      - name: center_wavelength
        value: 1560
        unit: nm
      - name: volume
        value: 22
        unit: L
        note: "Comb optics+electronics payload envelope."
      - name: mass
        value: 22
        unit: kg
      - name: power_consumption
        value: 70
        unit: W
      - name: operating_temperature_range
        value: "10–40"
        unit: "°C"
      - name: vibration_qualification
        value: "8.1 g_rms random (20–2000 Hz), 25 g sinusoidal shock"
      - name: acceleration_launch_peak
        value: 12.8
        unit: g
    note: "Level-2 engineering instance of ent.optical_frequency_comb."

  - id: ent.texus51_rocket_platform
    name: "TEXUS-51 sounding rocket platform"
    level: 1
    kind: ext
    note: "External flight platform; ~6 min ballistic microgravity, apogee 254 km."

  - id: ent.onboard_cavity_reference_laser
    name: "Onboard cavity-stabilized 1560 nm reference laser"
    level: 2
    part_of: ent.spaceborne_erfiber_comb_l16
    note: "ULE cavity-stabilized diode laser used as optical frequency reference; comb locked to it during flight."

