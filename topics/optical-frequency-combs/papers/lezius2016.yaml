    name: "Launch/flight vibration and shock environment"
    level: 1
    kind: ext
    note: "External environmental condition node (vibration, shock, acoustic, thermal transients)."

principles:
  - id: pri.ruggedized_erfiber_comb_space_qualification
    name: "Ruggedization principles for space-qualified Er:fiber combs"
    tier: engineering
    description: >
      Engineering-tier design rules enabling a self-referenced Er:fiber comb
      to survive and operate under launch shock, broadband random vibration,
      and thermal transients: (1) all-fiber or fiber-spliced architecture
      eliminating free-space alignment-critical elements in the oscillator;
      (2) monolithic mechanical packaging with matched-CTE optomechanics and
      potted fiber spools to damp vibration coupling into cavity length;
      (3) environmentally isolated f-2f interferometer with short, rigid
      free-space paths; (4) closed-loop thermal control of critical optical
      subassemblies; (5) electronic servo bandwidths and capture ranges sized
      to absorb residual launch-induced frequency excursions without
      unlocking.
    conditions:
      - "Er:fiber mode-locked oscillator with SAM-based passive mode-locking"
      - "Launch vibration ≤ ~8 g_rms random, shock ≤ ~25 g"
      - "Thermal baseplate control within ±2 °C during flight"
    preconditions:
      - "f-2f interferometer must retain spatial overlap under vibration"
      - "Pump-diode current and temperature servos remain within capture range"
    invalidated_when:
      - "Mechanical resonances couple into oscillator cavity length above servo bandwidth"
      - "Thermal excursions exceed CTE compensation budget of optomechanics"
    source:
      claim: "Compact, robust, self-referenced Er:fiber comb survived TEXUS-51 launch and operated through microgravity."

  - id: pri.vibration_cavity_length_coupling
    name: "Vibration-induced oscillator cavity-length modulation"
    tier: domain
    description: >
      Mechanical vibration couples into the mode-locked oscillator cavity
      length and pump-coupling efficiency, producing repetition-rate and
      carrier-envelope-offset noise, and in extreme cases loss of mode-lock.
    conditions:
      - "Applies to free-space and fiber mode-locked oscillators under g-level random vibration"
    source:
      claim: "Dominant in-flight noise contributions correlate with broadband mechanical excitation."

  - id: pri.thermal_drift_comb_offsets
    name: "Thermal drift of f_rep and f_ceo in fiber combs"
    tier: domain
    description: >
      Temperature changes of the fiber oscillator shift cavity optical path
      length (f_rep) and intracavity dispersion (f_ceo), requiring active
      servo compensation with finite capture range.
    conditions:
      - "Fiber-based oscillator optical path length and intracavity dispersion are temperature-sensitive"
      - "Ambient / payload thermal transients occur on timescales comparable to servo capture dynamics"
    source:
      claim: "Payload thermal management is required to keep servos in-lock across flight profile."

methods:
  - id: meth.flight_operation_protocol_l16
    name: "Sounding-rocket OFC flight operation protocol"
    description: >
      Pre-launch: warm-up, mode-lock acquisition on pad, closure of f_ceo
      and optical lock to onboard cavity reference. Launch phase: servos
      held with wide capture range; monitor only. Microgravity phase:
      verify continuous f-2f lock, record in-flight beat SNR and lock
      residuals. Re-entry/recovery: graceful servo handoff; post-flight
      functional verification.
    enabled_by: [pri.ruggedized_erfiber_comb_space_qualification, pri.self_referencing_f2f]

