principles:
  - id: pri.two_comb_microwave_comparison
    name: "双梳比对法表征微波提取残余噪声"
    tier: domain
    verification_status: observed
    statement: >
      将两台几乎相同的Er:fiber飞秒梳锁定至同一超稳光学参考，分别独立提取微波信号后
      进行相互比对，可将共模噪声（光学参考）消除，从而测量微波提取过程本身的残余相位噪声。
      该方法是表征光频除法器噪声底的标准技术。
    domain: "光频计量 / 微波生成"
    key_insight: >
      双梳比对揭示11.55 GHz处残余相位噪声−111 dBc/Hz（@1 Hz）受读出系统限制，
      而非Er:fiber梳本身，说明梳的噪声贡献更低。
    conditions: "两台梳需共享同一超稳光学参考；读出系统需足够低噪声"
    source:
      zotero_key: "5K2FFLPG"
      claim: >
        "We make use of two erbium fiber mode-locked lasers phase locked to a common ultra
        stable laser source to generate an 11.55 GHz signal with a relative phase noise of
        -111 dBc/Hz at 1 Hz from the carrier."

