  note: >
    [技术论文] 国家授时中心/中科院合作。209 MHz Er:fiber NPE 锁模梳， 腔内 LiNbO₃ EOM + 2 cm 长程 PZT 双执行器锁 f_rep： (1) EOM 高带宽通道实现 ~230 kHz f_rep 伺服带宽（远超纯 PZT ~kHz）； (2) 闭环 3 kHz 时的长期稳定，支持小时量级连续运行； (3) common-path f-2f 干涉仪测 f_CEO，SNR 40 dB @ 3 MHz RBW； (4) 锁定后 f_CEO 1 s 偏差 0.6 mHz。 EOM-PZT 双执行器已是彼时成熟拓扑（参见 Hudson 2005、kuse2015），本工作是在 国产 Er:fiber 平台上的长期运行工程复现，故归 evidence。 对齐 v2 子域主线：A1-Robust（长期稳定）、A1-Noise（伺服带宽）。
