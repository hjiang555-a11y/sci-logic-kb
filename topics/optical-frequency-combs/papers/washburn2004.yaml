principles:
  - id: pri.dispersion_flattened_hnlf_octave_broadening
    name: "色散平坦高非线性光纤倍频程展宽原理"
    tier: engineering
    verification_status: observed
    statement: >
      在 1550 nm 波段，使用色散平坦（而非单纯异常色散）+ 高非线性系数的 HNLF，
      可使 Er:fiber 振荡器经 EDFA 放大后的脉冲直接展宽至覆盖倍频程（1100–2200 nm），
      从而免除钛宝石 + PCF 组合、实现全光纤化 f-2f 自参考的关键使能条件。
    domain: "光纤非线性；超连续谱产生"
    key_insight: >
      色散平坦设计把 SPM 与四波混频的有效作用带宽展开，使脉冲能量主要耗散在"频率扩展"
      而非"脉冲变形"，是 Er:fiber 光纤梳从 Ti:sapph 阴影中独立出来的核心器件级突破。
    conditions: "EDFA 输出 pJ-nJ 级、亚 ps 脉冲；HNLF 色散曲线在泵浦波附近平坦"
    invalidated_when:
      - "HNLF 色散不平坦导致频谱非对称且不覆盖倍频程"
      - "EDFA ASE 过高压制 f_CEO 信噪比"
    source_claim: >
      "supercontinuum output ... to span from 1100 to ~2200 nm ... with a newly developed
      highly nonlinear fiber"

methods:
  - id: meth.dual_pll_frep_fceo_rf_reference
    name: "f_r-腔长 + f_0-泵浦双 PLL 锁至 RF 参考方法"
    status: demonstrated
    applies_to: ent.er_fiber_comb_washburn04
    steps_summary: >
      1. 锁模 EDF 振荡器 + EDFA 放大 + HNLF 倍频程展宽；
      2. 标准 f-2f 干涉仪（SHG 后与高频端拍频）测 f_0；
      3. 腔内光纤拉伸器伺服 f_r 至 RF 合成器基准；
      4. 泵浦激光器电流伺服 f_0 至同一 RF 基准；
      5. 双 PLL 同时闭环 → 全部梳齿绝对频率相干锁至 RF。
    required_hardware:
      - ent.er_fiber_comb_washburn04
    advantages:
      - "单 RF 参考即可锁定全部梳齿绝对频率"
      - "光纤结构紧凑、抗振、功耗低"
    disadvantages:
      - "泵浦电流伺服带宽受 Er 增益寿命限制（~100 kHz 量级）"

