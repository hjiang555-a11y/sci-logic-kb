    [里程碑技术论文] JILA (Hall/Diddams/Cundiff/Jones/Ye) + MPQ (Hänsch/Holzwarth/Udem) + Bell Labs (Ranka/Windeler) 合作。Ti:Sa 锁模激光（~10 fs，100 MHz 重复频率）耦合入 5–10 cm 空气-石英微结构光纤，输出超连续谱覆盖 >300 THz，覆盖 1064 nm 及其 532 nm 二倍频。 测得 I₂-Nd:YAG@1064 nm 频率 563 260 223 514 ± 5 kHz，2500 s 统计不确定度 2×10⁻¹³； 同时测 HeNe/I₂@633 nm 与 Rb@778 nm，均在已有标准不确定度内。开启"一台飞秒梳取代整条分频链"时代。
entities:
  - id: ent.octave_spanning_tisa_comb_d00
    name: "倍频程 Ti:Sa 飞秒梳（Diddams 2000 系统）"
    aliases: ["300 THz Ti:sapphire frequency comb", "Kerr-lens mode-locked Ti:Sa + PCF comb"]
    hierarchy_level: 2
    status: demonstrated
    function: >
      Kerr-lens 锁模 Ti:Sa 激光器（中心波长 ~800 nm，~10 fs 脉宽，重复频率 100 MHz）
      输出耦合入空气-石英微结构光纤（air-silica microstructure fiber，~1.7 µm 芯径，5–10 cm 长），
      通过自相位调制与 χ³ 非线性将梳谱展宽至覆盖一个光学八度（1064 nm 及 532 nm），
      形成 300 THz 宽带相干光学频率标尺。重频 Δ 通过 PZT 控制腔长锁定至 10 GHz 微波参考。
    key_parameters:
