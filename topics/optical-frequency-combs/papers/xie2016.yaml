principles:
  - id: pri.high_linearity_photodiode_ofd_noise_floor
    name: "高线性度光电二极管 OFD 噪声 floor 原理"
    tier: method
    verification_status: demonstrated
    statement: >
      光频分频（OFD）微波生成的噪声 floor 最终受限于
      光电二极管的 AM-to-PM 转换和 flicker 相位噪声。
      传统 PIN 光电二极管的 flicker 噪声 floor 限制了
      OFD 微波在傅里叶频率 < 1 kHz 的相位噪声性能。
      高线性度 MUTC（Modified Uni-Traveling Carrier）
      光电二极管的 flicker 相位噪声可低至
      < −140 f⁻¹ dBc Hz⁻¹，使 OFD 微波的相位噪声 floor
      突破 −170 dBc/Hz 大关。
    domain: "微波光子学；光电二极管；相位噪声；光频分频"
    key_insight: >
      光电二极管不是"理想的光-微波转换器"——它是 OFD
      微波链的噪声 floor 决定者，其线性度直接决定系统
      的终极性能。
    conditions: "高线性度 MUTC 光电二极管；低 RIN 频率梳；光电二极管工作在高光功率（~10 mW）"
    source:
      zotero_key: "Xiaopeng Xie 2016"
      claim: "The high-linearity photodiode with flicker phase noise below −140 f⁻¹ dBc Hz⁻¹ enables the ultralow noise performance."

