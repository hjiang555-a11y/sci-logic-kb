principles:
  - id: pri.optical_phase_detection_fiber_link_m12
    name: "光学相位探测光纤链路主动稳定原理（Marra 2012）"
    tier: engineering
    verification_status: observed
    statement: >
      在光纤频率传递中，通过在光纤远端反射一部分传输光回到近端，与近端参考光直接进行光学外差探测，
      测得光纤双程相位噪声；将此相位噪声信号驱动 AOM/光纤拉伸器实时补偿光程，可将长 km 光纤的相位噪声
      从 10⁻¹² 量级抑制到 10⁻¹⁸ 量级。这使得远端接收到的光保持与近端相位相干，适用于整个频率梳结构传递。
    domain: "光纤频率/时间传递；光学计量链路"
    key_insight: >
      "光学相位探测"优于射频相位探测，原因在于不受光电探测噪声和 EDFA ASE 噪声的限制——前者在光域测量噪声，
      再反馈；后者在电域测量（需先光电转换），电噪声会直接劣化反馈信号。
    conditions: "双程光纤链路；可用 AOM/光纤拉伸器作为快速相位执行器；参考光与传输光在近端可相干外差"
    source_claim: >
      "Using an optical phase detection technique we measure the noise introduced by the fiber link and suppress it by stabilizing the optical path length."
    formula: "Δφ_detected (optical) → AOM/stretcher feedback → residual Δφ_link << 1 rad @ 1000 s"

methods:
  - id: meth.optical_phase_detection_comb_transfer_m12
    name: "光学相位探测光频梳整体传递方法（Marra 2012）"
    status: demonstrated
    applies_to: ent.npl_fiber_comb_transfer_system_m12
    steps_summary: >
      1. Er:fiber 梳经 f-2f 自参考锁 f_CEO + f_rep 至 Cs 溯源 RF；
      2. 梳输出耦合入光纤（部分功率留作近端参考光）；
      3. 光纤远端反射镜将部分光反射回近端；
      4. 近端光学外差探测"参考光 vs 返回光"，获双程相位噪声；
      5. PID 伺服驱动 AOM + 光纤拉伸器（可能组合），实时抑制噪声；
      6. 远端接收光梳信号，光电探测 f_rep/f_beat 拍频，比对 Allan 偏差 @ 10⁻¹⁸ 级。
    required_hardware:
      - "Er:fiber 梳 + f-2f 自参考"
      - "光学外差探测器（平衡探测器 / 高速光电二极管）"
      - "AOM + 光纤拉伸器（相位执行器）"
      - "Cs 原子钟溯源 RF 参考"
    advantages:
      - "梳结构完整保留，接收端可恢复所有梳齿（不同于单 CW 传递）"
      - "稳定度与先前单频超稳激光传递同级（<3×10⁻¹⁸），但覆盖整个光学谱"
      - "对齐 SI-s 通过 Cs 钟溯源，可直接用于远程光钟频率比对"
    disadvantages:
      - "需要双程光纤链路（单程应用需额外方案）"
      - "残余相位噪声受未补偿光程影响（论文未详述，但提出存在此限制）"

