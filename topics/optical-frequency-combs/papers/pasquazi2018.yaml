# ═══════════════════════════════════════════════
#  OPEN QUESTIONS & CONTESTED CLAIMS
# ═══════════════════════════════════════════════

open_questions:
  - "微梳能否实现与锁模激光器梳相当的相位噪声性能？——当前 DKS 微梳的相位噪声仍高于最佳 Er:fiber 梳数个量级"
  - "CMOS 兼容平台（Si₃N₄）能否达到体 WGM 的 Q 因子水平（>10⁹）？——当前 CMP 技术下的 Q~10⁷ 是否为极限？"
  - "微梳的全集成（泵浦激光+谐振器+探测器+电子控制）何时可实现？——异质集成 vs 混合集成的路线争论"
  - "量子微梳（纠缠光子对、压缩态）能否成为实际量子技术的光源？"
  - "正色散暗脉冲微梳在计量应用中的潜力——是否可作为 DKS 的替代方案？"

contested_claims:
  - claim: "微梳可以在集成芯片上实现完整的光学钟——替代当前的桌面级光钟"
    supporting_evidence: "2018年已有 2/3 倍频程相干微梳和参考锁定时钟演示"
    counter_evidence: "微梳的长期频率稳定性、相位噪声和环境鲁棒性仍远低于锁模激光器梳"
    status: unresolved
    note: "这是微梳领域最核心的长期愿景，也是最大的开放挑战"

  - claim: "Si₃N₄ 是微梳集成化的最终材料平台"
    supporting_evidence: "最成熟的 CMOS 工艺、宽透明窗口、无双光子吸收"
    counter_evidence: "LiNbO₃（电光调制+χ²+χ³）、AlGaAs（更高非线性）等新平台持续涌现"
    status: unresolved

