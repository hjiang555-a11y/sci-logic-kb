  year: 2018
  first_author: "Pasquazi"
  journal: "Physics Reports"
  volume: 729
  pages: "1-81"
  doi: "10.1016/j.physrep.2017.08.004"
  note: >
    [综述/框架型] Pasquazi, Peccianti, Razzari, Moss, Coen, Erkintalo, Chembo,
    Hansson, Wabnitz, Del'Haye, Xue, Weiner, Morandotti。迄今最全面的微腔光频梳综述
    （81 页，~330 篇参考文献）。系统覆盖：
    (1) 微谐振器技术平台（bulk WGM vs CMOS 兼容集成平台）；
    (2) 耦合模理论建模（线性性质、非线性耦合、热效应）；
    (3) 光学参量振荡阈值以上的微梳产生（大带宽、时域特征）；
    (4) Lugiato-Lefever 方程（LLE）及其与耦合模形式的联系；
    (5) 相干微梳产生（时域腔孤子 DKS、模式交互辅助梳产生、
        暗脉冲锁模、自注入锁定、滤波驱动 FWM 激光）；
    (6) 应用（计量学、射频光子学、光通信、量子光学微梳）。
    作为框架型综述，本文主要建立微梳领域的顶层架构——
    定义 Level 0/1 实体、tier: meta/domain 原理和跨专题接口。
    跨文件节点引用：ent.microresonator_frequency_comb 定义于 kippenberg2011.yaml；
    pri.parametric_four_wave_mixing_comb、pri.dissipative_kerr_soliton、
    pri.lugiato_lefever_equation 定义于现有文件。

# ═══════════════════════════════════════════════
#  ENTITIES — 框架型顶层定义
# ═══════════════════════════════════════════════

entities:
  - id: ent.bulk_wgm_resonator_platform
    name: "体材料耳语回廊模（WGM）微谐振器平台"
    aliases:
      - "bulk whispering-gallery mode resonator"
      - "crystalline/glass WGM resonator"
    hierarchy_level: 1
    status: demonstrated
    function: >
      基于体材料（MgF₂、CaF₂、fused silica、石英）加工的毫米至厘米级微谐振腔，
      利用耳语回廊模（WGM）的全内反射实现极高 Q 因子（>10⁹–10¹¹）。
      通过锥形光纤或棱镜渐逝波耦合泵浦。优势：最高 Q 因子、最低阈值；
      劣势：体材料难以批量集成、需要精密机械加工和抛光。
    key_parameters:
      material_examples: "MgF₂, CaF₂, fused silica, crystalline quartz"
      q_factor_range: "10⁹–10¹¹"
      fsr_range: "10–100 GHz（取决于尺寸）"
      coupling_methods: "锥形光纤、棱镜耦合"
    note: >
      Level 1 平台类别节点；COMPETES-WITH ent.cmos_integrated_resonator_platform。
      在本综述的 Section 2.1 中详细讨论。

  - id: ent.cmos_integrated_resonator_platform
    name: "CMOS 兼容集成微谐振器平台"
    aliases:
      - "CMOS-compatible integrated microresonator"
      - "on-chip microring resonator"
    hierarchy_level: 1
    status: demonstrated
    function: >
      基于 CMOS 兼容工艺（Si₃N₄、SiO₂、SiON、Si）的片上微环谐振器或微盘，
      通过光刻定义几何形状，总线波导渐逝波耦合。优势：可批量制造、可集成、
      适合商业化；劣势：Q 因子通常低于体 WGM（10⁵–10⁷），需要精密工艺控制。
      Si₃N₄ 是当前最成熟的材料（Kerr 非线性 + 低双光子吸收 + 宽透明窗口）。
      Si 因 C 波段双光子吸收限制，主要用于中红外。
    key_parameters:
      material_examples: "Si₃N₄, SiO₂ (Hydex), SiON, Si"
      q_factor_range: "10⁵–10⁷（Si₃N₄ 可达 ~10⁷–10⁸）"
      fabrication: "标准 CMOS 光刻 + 刻蚀"
      integration_advantage: "可与电子芯片、泵浦激光器、探测器单片集成"
    note: >
      Level 1 平台类别节点；COMPETES-WITH ent.bulk_wgm_resonator_platform。
      在本综述的 Section 2.2 中详细讨论。
      关键里程碑：2010年 Levy et al. 在 Si₃N₄ 中首次演示 CMOS 兼容微梳。

  - id: ent.filter_driven_fwm_laser
    name: "滤波驱动四波混频激光器（FD-FWM laser）"
    aliases:
      - "filter-driven four-wave mixing laser"
      - "FD-FWM comb laser"
    hierarchy_level: 2
    status: demonstrated
    function: >
      一种替代 CW 泵浦方案的微梳产生技术：将微谐振器嵌入光纤环路中
      （包含增益介质如 EDFA、窄带滤波器、隔离器），构成主动振荡器。
      环路中的滤波器选择谐振器的一个或少数模式进行放大，
      通过谐振器内的四波混频（FWM）自发产生宽带相干梳。
      无需外部高功率 CW 泵浦激光器，系统类似于环形激光器但以 FWM 为增益机制。
    key_parameters:
      gain_medium: "EDFA（典型）"
      cavity_element: "高 Q 微谐振器"
      filter_type: "窄带滤波器（选模）"
      comb_type: "mode-locked states（暗脉冲或亮脉冲）"
    note: >
      Level 2 技术实体。在本综述的 Section 6.4 中详细讨论。
      与传统 CW 泵浦微梳的关键区别：(1) 无需外部窄线宽 CW 激光；
      (2) 系统自洽确定梳齿频率和泵浦线——降低了相干微梳的产生难度。

# ═══════════════════════════════════════════════
#  PRINCIPLES — 框架型顶层定义
# ═══════════════════════════════════════════════

principles:
  - id: pri.thermal_instability_dks_access
    name: "热效应限制 DKS 接入——微梳核心工程挑战"
    tier: domain
    verification_status: observed
    statement: >
      在 CW 泵浦微谐振腔中进入 DKS 态时，腔内功率突然下降（从高功率 MI/混沌态
      跳变到低功率单/少孤子态），导致谐振腔温度快速变化（热光效应），
      进而使谐振频率漂移，可能导致泵浦激光"跑出"DKS 存在范围。
      这一热不稳定性是实验上可靠产生和维持 DKS 的主要工程挑战。
    domain: "微腔热管理，DKS 稳定性"
    key_insight: >
      热效应与 DKS 产生之间存在根本矛盾：DKS 需要从蓝侧快速扫到红侧，
      但扫描速率过快可能跳过 DKS 态，过慢则被热锁定"捕获"。
      解决方案包括：(1) 快速泵浦频率扫描（>MHz/μs）；
      (2) 辅助激光器加热/冷却控制；(3) 自注入锁定方案。
    conditions: "热光系数非零（几乎所有介质材料）"
    preconditions:
      - "CW 泵浦微谐振器在 MI 阈值以上工作"
    invalidated_when:
      - "热光系数极小的材料（如 MgF₂ 在室温下极小——但仍非零）"
      - "使用非 CW 泵浦方案（如 FD-FWM 激光器——绕过直接泵浦扫描）"
    source_claim: >
      "Thermal effects have proved to be an important challenge in implementing such
      adiabatic cavity de-tuning procedures for exciting CSs" (Section 6.1.1)

  - id: pri.mode_interaction_comb_generation
    name: "模式交互辅助微梳产生原理"
    tier: domain
    verification_status: observed
    statement: >
      微谐振腔中不同空间模式族（不同横模阶数、不同偏振）之间可发生
      避免交叉（avoided mode crossing），在交叉频率附近导致有效色散的
      局部修改。这可以：(1) 在正色散区域创建局部反常色散区——
      使原本不支持 MI 的正色散谐振器也能产生微梳（暗脉冲/platicons）；
      (2) 为 primary sidebands 提供优先增长点——控制梳的初始模式间距。
      模式交互的可控性（如双耦合环结构）为工程微梳的色散剖面提供了
      超越材料和几何色散的额外自由度。
    domain: "微腔光学，色散工程，微梳产生"
    conditions: "谐振器支持多个空间模式族；不同模式族的色散使其频率在某处交叉"
    invalidated_when:
      - "单模谐振器（仅支持一个模式族）——无模式交互"
      - "模式交叉频率远离泵浦——交互效果可忽略"
    source_claim: >
      "mode interactions are very useful for comb generation in the normal dispersion region"
      (Section 6.2.1)

# ═══════════════════════════════════════════════
#  METHODS — 框架型
# ═══════════════════════════════════════════════

methods:
  - id: meth.pump_detuning_scan_dks
    name: "泵浦失谐扫描产生 DKS 方法"
    tier: domain
    verification_status: observed
    statement: >
      通过将泵浦激光频率从蓝侧（Δ < 0）扫到红侧（Δ > 1），
      经过 MI/混沌态→DKS 态的转变产生相干微梳。扫描速率需足够快
      以避免热锁定阻碍进入红失谐区域，同时不能过快以免跳过 DKS 态。
      典型扫描速率：~1 GHz/μs（取决于谐振器热时间常数）。
    domain: "微梳产生技术"
    source_claim: >
      "It was first proposed theoretically by Matsko et al. and is shown in Fig. 19"
      (Section 6.1)

