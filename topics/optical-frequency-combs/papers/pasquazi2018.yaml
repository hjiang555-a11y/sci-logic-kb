    note: "综述汇总值，非单一测量"

  - id: met.microcomb_opo_threshold_p18
    name: "微梳 OPO 阈值功率汇总（Pasquazi 2018）"
    tier: domain
    verification_status: observed
    conditions: >
      OPO 阈值与 Q² 和模式体积成反比：P_th ∝ V_eff/(Q² · n₂)；
      体 WGM（Q~10¹⁰）：阈值 ~μW 级；Si₃N₄（Q~10⁶）：阈值 ~100 mW 级
    note: "框架型汇总——阈值是材料/工艺选择的核心权衡指标"

