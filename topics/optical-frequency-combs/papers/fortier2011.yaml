breakthrough_paths:
  - description: >
      首次将光学频率除法产生的微波分数频率不稳定度降至≤8×10⁻¹⁶（1 s），
      比此前最好结果改善约4倍不稳定度、相位噪声功率改善10–1000倍（1 Hz–1 MHz全谱）。
      证明无需深冷微波振荡器即可实现与最佳低温振荡器相当的微波精度，
      开创了"光子微波生成"这一新范式，为后续混合振荡器（fortier2012）、
      集成化合成器（spencer2018）等工作奠定基础。
    prior_state: "最好商用/实验室微波振荡器在1 Hz处相位噪声约−90至−100 dBc/Hz，不稳定度~2×10⁻¹⁵"
    improvement: "1s不稳定度改善4倍至≤8×10⁻¹⁶；相位噪声改善10–1000倍（全谱）"
    evidence_claim: >
      "This measurement represents a significant improvement over previous work, with a
      reduction of phase noise power by a factor of 10 to 1,000 across the measured
      spectrum (1 Hz–1 MHz) and a factor of 4 reduction in the 1s instability."
