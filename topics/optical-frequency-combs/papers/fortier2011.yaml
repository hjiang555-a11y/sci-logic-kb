entities:
  - id: ent.ti_sapphire_ofd_photonic_osc_fortier2011
    name: "Ti:sapphire OFD光子微波振荡器（Fortier 2011）"
    hierarchy_level: 2
    status: demonstrated
    function: >
      1 GHz Ti:sapphire飞秒梳锁定至超稳FP光腔（578 nm或1070 nm），
      通过光电探测10 GHz谐波将光学超稳定性转移至微波域，
      产生10 GHz信号，分数频率不稳定度≤8×10⁻¹⁶（1 s），
      是首次无需深冷即达到此精度的电子信号。

principles:
  - id: pri.ofd_optical_stability_transfer
    name: "光频除法将光学稳定性转移至微波域原理"
    tier: domain
    verification_status: observed
    statement: >
      超稳FP光腔（Q≈10¹¹，室温腔长波动~100 am/1s）锁定CW激光可实现分数频率不稳定度
      ~2×10⁻¹⁶（1–10 s）。通过相位锁定自参考飞秒梳至此光学参考，光学频率的相对波动以
      N²倍（N≈5×10⁴=500 THz/10 GHz）的相位噪声功率降低因子转移至微波重复率，
      从而将光学精度传递给微波域，使微波信号时序抖动降至760 as量级。
    domain: "频率计量 / 光子微波生成"
    key_insight: >
      光学Q因子（~10¹¹）远超微波谐振腔（即使是蓝宝石腔），且无需深冷，
      光频除法是突破微波振荡器基本噪声极限的关键技术路径。
    conditions: >
      需要自参考OFC（f-2f锁定f_ceo）和超稳光学参考；性能最终受光学腔热噪声和
      光电探测散粒噪声限制。
    source:
      zotero_key: "YMWK52FQ"
      claim: >
        "Phase-coherent division of the stable optical signal to the microwave domain
        preserves the fractional frequency instability, while reducing the phase fluctuations
        by a factor of ~5×10^4 = (500 THz/10 GHz)"

