  note: >
    里程碑成果：首次实现分数频率不稳定度≤8×10⁻¹⁶（1 s）的光学分频微波，
    超越当时最好的微波振荡器（无需深冷）。使用1 GHz Ti:sapphire OFD+超稳FP腔（578 nm
