principles:
  - id: pri.pump_rin_to_fceo_coupling
    name: "泵浦 RIN→fceo 频率噪声耦合原理（Er:fiber 梳固定点呼吸模型）"
    tier: engineering
    verification_status: observed
    statement: >
      光纤飞秒激光器中，泵浦功率扰动 δP 通过谐振增益、谱移、三阶色散、自陡与 SPM
      等机制确定性地改变腔往返时间与载波-包络相位，使 f_r 与 fceo 线性相关漂移；
      定义固定点梳齿 n_fix = (dfceo/dP)/(df_r/dP)，其他梳齿围绕 f_fix 做"呼吸运动"。
      泵浦 RIN 经低通（−3 dB @ ν_{3dB} ≈ 7 kHz，来自腔动力学与 Er 增益响应时间）
      映射为 fs 激光 RIN，再通过 AM→FM 响应平方转换为 f_r 与 fceo 频率噪声 PSD。
    domain: "光纤锁模激光器相位噪声；载波-包络偏频控制"
    formula: >
      S_ceo(ν) = (P·dfceo/dP)² · RIN_l(ν)
              = (P·dfceo/dP)² · ε·RIN_p(ν) / [1 + (ν/ν_{3dB})²]；
      S_λ(ν)  = (n_λ − n_fix)² · S_r(ν)（相对泵 RIN 主导区）；
      S_ceo / S_λ = n_fix² / (n_fix − n_λ)² = f_fix² / (f_fix − f_λ)²；
      McFerran 2007 测得 P·df_r/dP = −320 ± 8 Hz，P·dfceo/dP = −1.30 ± 0.02 GHz
    key_insight: >
      fceo 大线宽不是"非线性光纤展宽引入的附加噪声"，而是泵浦 RIN 经确定性 AM-FM
      转换后固定点呼吸运动在 fceo（远离 f_fix 的梳齿）的放大表现；该模型预测的
      S_ceo/S_1064 ≈ 6.15 与实验符合，为主动+被动噪声抑制提供物理依据。
    conditions: "泵流恒定下 n_fix 固定；测量 ν 远离环境扰动主导的低频带"
    preconditions:
      - "锁模激光器处于稳定的拉伸脉冲工作态"
      - "泵浦功率入射到 fs 腔保持恒定（由衰减器补偿）"
      - "RIN_p 显著高于电流源背景（实测 −138~−148 dBc/Hz），因此泵二极管 RIN 主导"
    invalidated_when:
      - "泵浦功率直流电平漂移 → n_fix 随之漂移（超出本模型静态假设）"
      - "Fourier 频率低于 ~200 Hz：环境振动/温度主导 f_r 噪声，偏离 (1) 预测"
      - "采用低 RIN DFB 泵浦二极管：量子噪声极限接管，白底噪抬高贡献"
    source_claim: >
      "the primary cause of frequency noise associated with the offset frequency is
      the relative intensity noise of the pump laser driving the femtosecond laser ...
      noise on the pump power will lead to linearly correlated noise on fceo and fr"
    contested_claims:
      - "早期一些工作推测 fceo 宽线宽源于 HNLF 超连续谱产生中的附加噪声；
         本文（结合 Benkler 2005 的 f_r–fceo 相关性）证伪该解释，确立泵 RIN 为主因"
    open_questions:
      - "最高电流下白噪声底（~43 dB Hz²/Hz）高于量子极限预期，其具体机制？"
      - "Bragg-grating 稳定 FP 泵二极管高 RIN 是否源于光反馈到栅？"

  - id: pri.comb_breathing_fixed_point
    name: "频率梳固定点呼吸运动原理"
    tier: engineering
    verification_status: observed
    statement: >
      在单一标量扰动（此处为泵功率）作用下，线性相关的 δf_r 与 δf_ceo 使梳 n_fix =
      (dfceo/dP)/(df_r/dP) 处梳齿频率噪声被完全抵消，其余梳齿以离 f_fix 距离为权
      发生呼吸式扩张/收缩；固定点位置通常位于激光光谱内但不等于中心频率。
    domain: "锁模激光器梳噪声学"
    formula: >
      f_n = n·f_r − f_ceo；固定点条件 df_n/dP = 0 ⇒ n_fix = (dfceo/dP)/(df_r/dP)；
      δf_n = (n − n_fix)·δf_r；本实验 n_fix ≈ 4.1×10⁶ ↔ λ_fix = 1.48 µm
    key_insight: >
      预测"梳齿噪声随波长线性变化"：光谱翼区（远离 1.48 µm）噪声远大于中心，
      fceo（n=0）噪声为最大；解释为何 1 µm 处 1064 nm 拍频噪声比 1536/1550 nm
      高 ~5.8 倍（符合 (n_fix − n_1064)² 加权）。
    conditions: "单一参数扰动（泵功率）主导；扰动在激光响应带宽内线性"
    preconditions:
      - "df_r/dP 与 dfceo/dP 符号与大小已通过低频调制标定"
      - "其他扰动（温度、振动）在关心频段内不主导"
    invalidated_when:
      - "多独立扰动共存（腔长+泵流），此时无单一固定点"
    source_claim: >
      "the comb will perform breathing motion about this fixed point ...
      n_fix = (df_ceo/dP)/(df_r/dP) ... Based on the measurements above,
      we find n_fix = 4.1 × 10⁶"
    note: "概念早期见 Benkler 2005 与 Telle 2002；本文定量化到 Er:fiber 梳并与实验核对"

methods:
  - id: meth.pump_current_feedback_fceo_lock
    name: "泵电流前馈/反馈 fceo 锁相方法（RIN 被动压制 + 快速伺服）"
    status: demonstrated
    applies_to: ent.pump_noise_suppressed_erfiber_comb_m07
    steps_summary: >
      1. 将 1480 nm 泵二极管工作电流推至 ~1 A（接近额定），使白 RIN 下降到 ~−150 dBc/Hz
         量级；用可变衰减器保持 fs 腔入射光功率恒定，避免 n_fix 漂移；
      2. 用 f-2f 干涉仪在 2060 nm 处提取 fceo 拍信号（/256 分频）；
      3. 鉴相输出送至带相位超前补偿（phase-lead）的伺服放大器；
      4. 误差信号经快速电流调制端口直接反馈至泵二极管电流，利用 fs 激光的简单
         低通（~7 kHz）响应将伺服带宽推至 ~80 kHz（由电流调制电路累积相移限制）；
      5. 锁环内测量 fceo 场谱（分辨率带宽 0.3 Hz）出现仪器极限相干峰，
         积分相噪 δφ² = ∫₀^{500 kHz} ν⁻²·S_ceo(ν)dν = 0.99 rad²。
    required_hardware:
      - ent.pump_noise_suppressed_erfiber_comb_m07
    advantages:
      - "被动（高电流压 RIN）+ 主动（相位超前伺服）双重抑制"
      - "无需替换泵源即可获得 fceo 仪器极限线宽"
      - "计数 fceo 频率误差 ≤1 mHz@1 s → ~10⁻¹⁷ 相对于 200 THz 光频"
    disadvantages:
      - "伺服带宽被泵二极管电流调制电路相移硬限制在 ~80 kHz"
      - "Bragg-grating FP 泵 RIN 底仍明显高于 DFB 可达水平"
      - "泵电流直流值改变会移动 n_fix，需辅助伺服稳 DC 入射功率"
    conditions:
      - "fs 激光处于稳定 NPR 锁模态"
      - "泵浦光衰减器已重新标定使入射 fs 腔功率恒定"
    source_claim: >
      "the in-loop linewidth of fceo can be reduced to less than 1 Hz with an integrated
      phase noise of ~1 rad using pump current feedback with a servo bandwidth of ~80 kHz"

