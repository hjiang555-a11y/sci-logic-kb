  - id: met.pump_laser_rin_m07
    name: "1480 nm Bragg-grating FP 泵二极管 RIN 谱"
    unit: "dBc/Hz"
    description: >
      泵二极管相对强度噪声谱密度，主要决定 fceo 自由运行线宽。
    is_interface_metric: true
    coupling_formula: "S_ceo(0) ∝ (P·dfceo/dP)² · ε·RIN_p(0)"
    demonstrated_value:
      value: "310 mA: 最高；1 A: 最低（相比 310 mA 下降 ~10–20 dB，近电流源底 −138~−148 dBc/Hz）"
      conditions: "Bragg-grating 稳定 FP 1480 nm 二极管；同样现象见 980 nm 泵"
      verification_status: observed
      confidence: established
      source: {zotero_key: "CNSSF9YY", claim: "A change in pump laser current has a clear influence on the relative-intensity noise of the emitted light"}

  - id: met.servo_bandwidth_m07
    name: "fceo 泵电流伺服带宽（McFerran 2007）"
    unit: "Hz"
    description: >
      通过相位超前补偿推进的 fceo 锁环闭环带宽，受 fs 激光 7 kHz 低通响应之外的
      电流调制电路累积相移限制。
    demonstrated_value:
      value: "~80 kHz（从无相位超前的 ~5 kHz 扩展）"
      conditions: "phase-lead 补偿 + 泵电流直接反馈端口"
      verification_status: observed
      confidence: established
      source: {zotero_key: "CNSSF9YY", claim: "the servo bandwidth controlling fceo has been extended well beyond the ν_{3dB} response bandwidth of the femtosecond laser by employing phase-lead compensation ... servo bumps occur approximately 80 kHz from the carrier"}

