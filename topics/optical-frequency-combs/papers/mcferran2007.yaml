    unit: "Hz"
    description: >
      自由运行与锁环内条件下 fceo 拍信号的 FWHM 线宽，受泵 RIN、ν_{3dB}、伺服带宽共同决定。
    demonstrated_value:
      value: "自由运行：数百 kHz → ~60 kHz（泵流 1 A）；锁环内：仪器极限（RBW 0.3 Hz）"
