  first_author: McFerran
  journal: "Applied Physics B"
  volume: 86
  issue: 2
  pages: "219-227"
  doi: "10.1007/s00340-006-2426-4"
  note: >
    [技术论文] NIST Boulder 光电部（McFerran/Swann/Washburn/Newbury）。Er:fiber 非线性偏振旋转
    锁模梳（50 MHz，~45 fs，1560 nm 中心）+ EDFA + HNLF 倍频程展宽（960–2200 nm）+ 2060 nm f-2f
    干涉仪。识别 Bragg 光栅稳定 Fabry-Pérot 1480 nm 泵浦二极管 RIN 为 fceo 宽线宽（数百 kHz）主因；
    提高泵流至 1 A 压低白 RIN，结合相位超前补偿将伺服带宽扩至 ~80 kHz，锁环积分相噪 ≤1 rad。
    跨文件节点引用：ent.optical_frequency_comb 与 pri.self_referencing_f2f 定义于 udem2002.yaml。

