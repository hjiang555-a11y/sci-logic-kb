principles:
  - id: pri.fundamental_ch_stretch_enhancement_mir
    name: "基频 C-H 伸缩吸收相对 NIR 倍频带增益原理"
    tier: domain
    verification_status: observed
    statement: >
      多原子有机分子的 C-H 伸缩基频（~3000 cm⁻¹，2.9–4.2 µm）线强度约为其
      NIR 倍频（1.6–1.7 µm 附近）吸收的 ~1000 倍。将 DCS 从 NIR 迁移到基频窗口，
      在相同光程和总光子通量下，可把浓度探测下限从 ppm·m 量级推进到 ppb·m / sub-ppb 量级，
      从而首次把 DCS 应用域从 CH₄/CO₂/H₂O 等高丰度分子扩展到稀有 VOC 与污染物。
    domain: "中红外分子光谱；大气痕量气体探测"
    formula: >
      S_fund / S_overtone ≈ 10³（分子相关，典型 C-H 伸缩）；
      浓度探测下限 ~ NEA / (S · L · N_gas)，S↑ 1000× ⇒ LOD↓ 1000×
    key_insight: >
      DCS 的 "相同 SNR × 吸收强度增益" 结合 "HITRAN/PNNL 已知线型 + 无仪器线形"
      使中红外基频带成为 DCS 最具科学杠杆的窗口。
    conditions: "目标分子在 2750–3150 cm⁻¹ 存在显著 C-H 伸缩振动；大气传输窗口开启"
    preconditions:
      - "中红外梳平台（DFG / OPO / QCL）可用"
      - "中红外探测器（HgCdTe 等）具备足够带宽与低噪声"
      - "已知大气干扰物（H₂O / CH₄）光谱参数可建模去除"
    invalidated_when:
      - "目标分子 C-H 基频被更强的 H₂O 连续吸收完全遮蔽"
      - "路径过长导致主要 C-H 信号饱和至 T < 0.2（本文截断阈）"
    source_claim: >
      "access fundamental vibrational transitions further in the infrared,
      which can be 1000 times stronger"

  - id: pri.common_path_comb_combining_turbulence_cancellation
    name: "传前合束共模抵消湍流相位畸变原理"
    tier: engineering
    verification_status: observed
    statement: >
      将信号梳与本振梳在送入大气前用分束器合为共轴双梳，再一起穿过湍流路径，
      湍流引入的波前相位畸变对两梳共模，差频（多外差）过程中被一阶抵消，
      故开阔大气湍流只造成幅度闪烁（amplitude scintillation），不退化外差混频效率，
      使 DCS 在公里级大气链路上仍保持 mutual coherence。
    domain: "大气光通信；开阔路径光谱"
    formula: >
      外差电流 i(t) ∝ |E₁(t)·E₂*(t)|；若两梳共路径，则 exp[iφ_turb(t)] 在两梳上相同，
      φ_turb 在 E₁·E₂* 中消除
    key_insight: >
      此技巧在 NIR [Rieker 2014, Han 2024] 已验证，本文首次把它扩展到中红外长链路。
      对比 "分路双梳 + 后验相位校正" 路线，共路径方案无需高带宽实时追踪。
    conditions: "两梳通过同一光程到达大气入口；湍流相干时间 >> 单次干涉图采集时间"
    preconditions:
      - "合束器插入损耗可接受（本文采用 50:50）"
      - "接收端仍可分离 δ_τ 双梳干涉图时序"
    invalidated_when:
      - "分路发射（两梳独立入射大气）"
      - "湍流引入的非共模极化 / 模式畸变占主导"
    source_claim: >
      "we combine both combs before propagation across the turbulent air path
      so that turbulence-driven phase front distortions are common mode.
      This eliminates turbulence-induced phase noise and retains high heterodyne
      mixing efficiency between the combs."

  - id: pri.hitran_voigt_declutter_trace_retrieval
    name: "基于 Hitran Voigt 模型的强吸收解杂原理"
    tier: engineering
    verification_status: observed
    statement: >
      当目标弱吸收（ppb 级 VOC）被强背景（大气 H₂O、CH₄）遮蔽时，
      利用 DCS 固有的高波数精度与负线形失真，以 Hitran 2016 线参数 + Voigt 卷积
      拟合出背景分子浓度并在谱域除去，可把残余基线噪声降低数量级并同时给出
      干扰物的绝对浓度，从而实现 "解杂" 与 "多物种同时定量" 的双重功能。
    domain: "大气光谱数据处理"
    formula: >
      T_clean(ν) = T_meas(ν) / ∏_k exp[−c_k L · σ_k^{Voigt}(ν; T, P)]，
      c_k 由最小二乘拟合给出
    key_insight: >
      DCS 无仪器线形的独特性质使 Voigt 模型可直接与实测谱做点对点除法，
      这是 OP-FTIR 无法做到的（FTIR 仪器线形随时间漂移）。
    conditions: "Hitran 线参数准确；大气温度/压强已知或作为拟合参数"
    preconditions:
      - "光谱分辨率 ≥ 0.01 cm⁻¹（本文 0.0067 cm⁻¹）"
      - "目标波段存在可分辨的背景吸收线"
    invalidated_when:
      - "Hitran 线形参数偏差 > 1%（文中提到 Voigt 偏离与饱和线为残余误差源）"
      - "饱和吸收（T < 0.2，本文掩去该区域）"
    source_claim: >
      "This decluttering not only cleans up the spectrum, but also extracts absolute
      concentrations of atmospheric species including H2O, semiheavy water (HDO),
      H2^18O, and CH4"

  - id: pri.simultaneous_narrow_broad_voc_retrieval
    name: "窄线小分子 + 宽带大分子同步反演原理"
    tier: engineering
    verification_status: observed
    statement: >
      在 2750–3150 cm⁻¹ 400 cm⁻¹ 宽谱覆盖下，
      以 Hitran 参数化细线物种（H₂O、HDO、H₂¹⁸O、CH₄、C₂H₆）+
      PNNL 参考谱宽带物种（丙酮、异丙醇、BTEX 潜在目标）
      的联合线性叠加模型做一次性最小二乘拟合，可在同一条光谱上给出
      数量级差异巨大（ppb–ppm·m）的多 VOC 浓度。此能力是开阔路径化学事件感知的关键。
    domain: "多物种化学计量反演"
    formula: >
      T_model(ν) = (c_base,0 + c_base,1·ν) · ∏_k exp[−c_k L · σ_k(ν)]
    key_insight: >
      宽谱（>100 cm⁻¹）+ 高分辨率（<0.01 cm⁻¹）+ 绝对频率精度 = DCS 独有。
      这是相对 OP-FTIR 的决定性优势：FTIR 低分辨率会让 CH₄ 等与 VOC 宽峰混叠。
    conditions: "目标 VOC 的 PNNL/Hitran 参考谱可获得；背景分子模型收敛"
    source_claim: >
      "detection not only of small molecules but also of larger, more broadly absorbing
      VOCs, such as acetone and isopropanol, that do not have rovibrationally resolved
      lines under atmospheric conditions"

  - id: pri.dfg_power_atmospheric_window_tradeoff
    name: "DFG 中红外功率 × 大气透明窗口折中原理"
    tier: engineering
    verification_status: observed
    statement: >
      开阔路径 MIR DCS 的可用波段受两重约束：
      (a) 大气透明窗口（2000–3300 cm⁻¹、750–1250 cm⁻¹）；
      (b) 可用中红外梳源的功率/带宽（本文 PPLN-DFG 覆盖 C-H 基频带，每梳 5 mW）。
      同时 km 级往返传输损耗（几何 + ZrF4 耦合 + 回射器捕获 + HgCdTe 量子效率）
      约束了总可用光子通量。工程上必须在 "更宽覆盖" 与 "更长路径 / 更高灵敏度" 之间折中。
    domain: "中红外 DCS 工程折中"
    formula: "photon_throughput ∝ P_comb · T_atm(ν) · η_telescope · η_link · QE_det"
    key_insight: >
      本文选择 C-H 伸缩窗口（2750–3150 cm⁻¹）作为最佳性价比点：
      (1) VOC 基频增益 1000×；(2) 大气 H₂O/CH₄ 干扰可解杂；(3) PPLN-DFG 成熟平台。
    conditions: "中红外泵浦/信号光、非线性晶体与波段匹配"
    preconditions:
      - "泵浦梳与信号光在 PPLN 内实现准相位匹配"
      - "HgCdTe 探测器灵敏带覆盖目标波长"
    invalidated_when:
      - "迁移至 750–1250 cm⁻¹ 或 5–12 µm 指纹区需要 OPO / QCL / 差频级联等不同平台"
    source_claim: >
      "there have been many DCS demonstrations in the MIR region, covering atmospheric
      transmission windows at 2000 cm⁻¹–3300 cm⁻¹ and 750 cm⁻¹–1250 cm⁻¹"

methods:
  - id: meth.midir_dcs_vocs_protocol_y19
    name: "中红外开阔路径 VOC 双梳光谱测量与反演流程（Ycas 2019）"
    status: demonstrated
    applies_to: ent.midir_dcs_vocs_y19
    steps_summary: >
      1. 两台 Er 光纤梳 → 各自 PPLN-DFG → 2750–3150 cm⁻¹ 中红外梳，200 MHz 重频；
      2. 两梳在 50:50 分束器合束，5 mW/梳 耦入 ZrF4 单模光纤；
      3. 望远镜（100 mm OAP）发射 ~75 mm 准直光束至角锥回射器，距离 162 m / 1 km；
      4. 返回光经同一望远镜 + 50:50 分束到信号路径；另一半原始合束光作为参考；
      5. 信号 + 参考 HgCdTe 探测，100 MHz 带宽；10 ms 间隔 IFG，FPGA 相干平均 1 min；
      6. FFT → 取信号/参考比得 "ratio spectrum"；
      7. Hitran 2016 Voigt 模型拟合 H₂O 同位素体 + CH₄，除去得 "decluttered spectrum"；
      8. （受控释放实验）再与释放前参考谱比值（change detection）抑制基线结构；
      9. PNNL 参考谱（丙酮、异丙醇、C₂H₆）做线性最小二乘拟合反演浓度；
      10. Allan 方差评估 1σ 灵敏度与最优积分时间。
    required_hardware:
      - ent.midir_dcs_vocs_y19
      - ent.atmospheric_turbulence_channel
    advantages:
      - "基频吸收增益 ~1000× 相对 NIR，路径积分灵敏度 ppb·m 量级"
      - "无仪器线形：DCS 谱可直接与 Hitran 模型做点对点除法（OP-FTIR 做不到）"
      - "宽谱 + 高分辨率 + 绝对波数：同一次扫描反演 6+ 物种"
      - "传前合束 → 湍流共模抵消 → 外差效率不随路径下降"
    disadvantages:
      - "灵敏度受残余基线结构限制（望远镜光学路径随时间变化 + 探测器空间非均匀）"
      - "饱和吸收区（T < 0.2）需掩去"
      - "中红外 HgCdTe 探测器热噪声 > NIR InGaAs，1 min 积分已近极限"
      - "Hitran 参数不完美（Voigt 偏离、宽线饱和）留下残余系统误差"
    conditions:
      - "大气 H₂O / CH₄ 背景可建模"
      - "目标 VOC 浓度下限受 NEA/光程/吸收截面限制"
    source_claim: >
      "Path-integrated spectra are recorded continuously... processed as shown in
      Figs. 1(c)–1(e)... The obtained 1-σ sensitivities for 1-min averaging are
      5.7 ppm·m for acetone and 2.4 ppm·m for isopropanol."

