  note: >
    [技术论文 / 里程碑] NIST Boulder (Papp, Del'Haye, Diddams) 2013 年 PRX。 首次用 **CO₂ 激光加工微棒谐振器**（fused-quartz，Q ~ 5×10⁸，<1 分钟加工时间，近 100% 良率） + **机械力控制**（压电执行器改变谐振器形状 → 调谐 FSR/f_rep）实现微梳稳定—— 梳齿间距（32.6 GHz）稳定度达 **5×10⁻¹⁵ @ 1 s**（vs. 先前微梳工作 ~10⁻¹³）， 140 根梳齿（跨 4.5 THz）间频率变化 <0.5 mHz（光谱切片稳定性验证）。 机械控制相比热光调谐优势：低功耗、简单集成、响应速度潜力快（vs. 谐振器热导时间常数）。 开创了"简易加工 + 机械稳频"微梳路线，证明微梳可支持现代光学频率标准（10⁻¹⁵ 稳定度要求）。 v2 子域主线：A2-DKS（微腔梳）主线——刷新微梳稳定度纪录（从 10⁻¹³ 到 10⁻¹⁵，提升 200 倍）+ 首次机械控制演示。 档位判定：breakthrough（首次 CO₂ 激光加工微棒 + 首次机械控制微梳 + 刷新 DKS 稳定度纪录 200 倍）。
