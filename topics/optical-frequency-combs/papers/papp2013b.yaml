    function: >
      用 CO₂ 激光（10.6 μm）熔融蒸发 fused-quartz 棒（直径 2 mm）快速加工成球状微谐振器（Q ~ 5×10⁸，<1 分钟加工，近 100% 良率）；
      通过压电执行器施加机械力改变谐振器形状 → 调谐 FSR（即微梳梳齿间距 f_rep）；
