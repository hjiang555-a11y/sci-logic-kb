methods:
  - id: meth.single_cavity_dual_comb_spectroscopy_i16
    name: "单腔双向环形激光器双梳光谱方法（Ideguchi 2016）"
    status: demonstrated
    applies_to: ent.klm_bidirectional_ring_dual_comb_i16
    steps_summary: >
      1. 构建 Ti:sapph KLM 环形腔，支持双向锁模；
      2. 启动双向脉冲（先单向锁模，再引入逆向种子或自发双向）；
      3. 利用 Kerr 非线性不对称调谐 Δf_rep（调整腔内元件位置或 Kerr 介质厚度）；
      4. 双梳输出经样品后单光电探测器检测（多外差拍频）；
      5. RF 梳信号经 ADC 采集，Fourier 变换获得光学吸收谱；
      6. 无需 f-2f 干涉仪或外部参考腔稳频（相对相干性被动稳定）。
    required_hardware:
      - ent.klm_bidirectional_ring_dual_comb_i16
    advantages:
      - "系统简化：单激光器替代双激光器，无需主动锁相系统"
      - "成本降低：去除 f-2f 干涉仪、外部参考腔、伺服反馈电路"
      - "鲁棒性提升：相对相干性被动稳定，适合非光学计量实验室环境"
    disadvantages:
      - "Δf_rep 调谐范围受限（~kHz，vs. 独立梳可达 Hz–MHz）"
      - "光谱覆盖受单激光器增益带宽限制（Ti:sapph ~700–1000 nm）"
    note: >
      该方法为双梳光谱学提供"低成本/鲁棒化"路线——虽牺牲 Δf_rep 灵活性与光谱覆盖，
      但对大多数分子光谱应用（分辨率 ~MHz，近红外波段）已足够，
      降低了双梳光谱技术的准入门槛（从"光学计量实验室专用"到"化学/生物实验室可用"）。
