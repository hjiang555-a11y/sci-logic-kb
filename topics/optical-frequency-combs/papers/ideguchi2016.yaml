  note: >
    [技术论文 / 里程碑] U Tokyo (Ideguchi, Nakamura, Kobayashi, Goda) 2016 年 Optica。
    首次用单个 KLM（Kerr 透镜锁模）Ti:sapph **双向环形激光器**实现双梳光谱——
    利用环形腔中顺时针（CW）与逆时针（CCW）方向传播的两个锁模脉冲因 Kerr 非线性不对称而具有略不同重频（Δf_rep ~ kHz），
    形成天然"双梳"配置；由于共享同一物理腔，相对相干性被动稳定，**无需主动锁相系统**（f-2f 干涉仪或外部参考腔+伺服反馈）。
    实现宽带（~700–1000 nm）双梳光谱，互相干时间 >10 s（自由运行），简化传统双梳系统（需两台独立激光器+复杂稳频）。
    开创了"单腔双梳"技术路线，为双梳光谱学的便携化/低成本化/鲁棒化提供可行方案。
    v2 子域主线：B-DCS（双梳光谱）主线首次单腔实现——刷新系统简化纪录（从"双激光器+稳频"到"单激光器+自由运行"）。

