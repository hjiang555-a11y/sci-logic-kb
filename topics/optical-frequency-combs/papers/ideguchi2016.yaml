principles:
  - id: pri.kerr_asymmetry_induced_frep_difference_i16
    name: "Kerr 非线性不对称诱导双向梳重频差原理（Ideguchi 2016）"
    tier: domain
    verification_status: observed
    statement: >
      "在环形腔中，顺时针（CW）与逆时针（CCW）方向传播的锁模脉冲因 Kerr 非线性不对称而具有略不同的腔往返时间 → 重频差 Δf_rep。
      传统观点认为'共享同一腔'的双向脉冲应重频相同，但本工作发现：Kerr 透镜锁模过程中，
      CW 与 CCW 脉冲在非线性晶体（Ti:sapph）中经历的非线性相移略不同（因光路非完全互易，如偏振元件、Kerr 效应本身的微扰），
      导致等效腔长（含非线性相移贡献）不同 → Δf_rep ~ kHz（可调）。
      由于共享同一物理腔，长期相对相干性被动稳定（腔长热漂移对 CW 与 CCW 共模抑制）→ 无需主动锁相。"
      Ideguchi 2016 证明：该效应可产生稳定 Δf_rep（>10 s 互相干时间），适用于宽带双梳光谱。
    domain: "双梳光谱；Kerr 透镜锁模；环形激光器动力学"
    key_insight: >
      双梳光谱的核心瓶颈不是"双激光器"本身（硬件成本可降低），而是"相对相干性维持"（需复杂主动锁相系统）——
      单腔双向方案通过"共享腔长"实现被动共模抑制，虽 Δf_rep 调谐范围受限（~kHz，vs. 独立梳可达 Hz–MHz），
      但对大多数双梳光谱应用（分辨率 ~MHz）已足够；这是"系统简化"vs"调谐灵活性"的工程权衡。
    conditions: >
      需环形腔（非线性往返腔，如 Ti:sapph）；需 KLM 锁模（Kerr 非线性主导）；
      需腔内非互易元件或非对称设计（产生 Δf_rep）；需精密温度/振动隔离（维持被动稳定）；
      需双向脉冲同时锁模（启动技巧：先单向锁模，再引入逆向种子）。
    formula: "Δf_rep = f_rep,CW - f_rep,CCW ~ kHz（Kerr 非线性不对称贡献）；互相干时间 τ_coh ∝ 1 / (Δf_rep 漂移率)（被动稳定下）"
    source:
      zotero_key: "PBGQXUED"
      claim: >
        "The laser is composed of a free-running Kerr-lens mode-locked laser cavity that produces 
        two broadband laser frequency combs with slightly different pulse repetition rates and a tunable yet highly stable rate difference. 
        This lasing principle, which we refer to as direction-dependent lasing due to the asymmetrical Kerr nonlinearity, 
        is based on our revisit to and further development of the effect that there exists a slight difference in cavity round-trip time 
        between the two counter-propagating mode-locked pulses."
    breakthrough_paths:
      - step: 1
        entity: pri.dual_comb_multiheterodyne_detection
        context: "双梳多外差检测原理：两梳重频差 Δf_rep 产生 RF 梳，光学频谱映射至 RF 域（跨文件引用 coddington2016.yaml）"
      - step: 2
        entity: pri.kerr_asymmetry_induced_frep_difference_i16
        context: "Kerr 非线性不对称原理：单腔双向脉冲因非互易 Kerr 效应产生 Δf_rep ~ kHz，相对相干性被动稳定（共享腔长）"
      - step: 3
        entity: ent.klm_bidirectional_ring_dual_comb_i16
        context: "应用该原理实现单腔双梳光谱（世界首次，2016），互相干时间 >10 s（无主动锁相），简化传统双梳系统"

