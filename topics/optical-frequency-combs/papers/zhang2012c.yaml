principles:
  - id: pri.comb_actuator_transfer_matrix
    name: "光频梳三参数三执行器传递函数矩阵表征原理"
    tier: domain
    verification_status: observed
    statement: >
      自参考光频梳的自由度完全由三个全局参数描述：frep（重频）、f0（CEO 频率）、A（振幅）。
      梳的 N 个执行器（PZT、泵浦电流、EOM 等）对这三个参数的影响可用 3×N 传递函数矩阵
      H(jω) 完整表征。通过矢量信号分析仪（VSA）系统测量九个（3×3）传递函数的幅度和相位
      随傅里叶频率的频率响应，可以：(1) 确定每个执行器可用的伺服带宽；
      (2) 量化交叉耦合（如 EOM→f0, EOM→A）；(3) 预测残余噪声限制；
      (4) 优化多执行器级联控制架构。
    domain: "光频梳噪声分析，伺服系统设计"
    formula: >
      [A(jω); frep(jω); f0(jω)] = H(jω) · [I_pump(jω); V_PZT(jω); V_EOM(jω)]；
      其中 H 为 3×3 复传递函数矩阵
    key_insight: >
      光频梳的噪声优化不能仅关注单个执行器-参数通道，而需考虑完整矩阵的非对角元素
      （交叉耦合），尤其在光-微波分频应用中，EOM→A 耦合通过振幅-相位转换（AM-PM）
      直接限制微波相位噪声底。
    conditions: "锁模激光器稳定运行，非线性模式锁定机制未导致梳齿间额外去相关"
    preconditions:
      - "三个全局参数（frep, f0, A）完整描述梳的状态——即梳齿间的相位和振幅关系不随时间变化"
      - "VSA 或等效测量仪器的带宽和噪声底低于被测传递函数"
    invalidated_when:
      - "锁模激光器出现多脉冲或不稳定状态——三参数描述不完整"
      - "梳齿间存在显著的去相关噪声（如超连续谱产生中的量子噪声放大）"
    source_claim: >
      "A full characterization of the comb's noise properties, therefore, requires the
      measurement of three power spectral densities... A full characterization of the
      response of the comb to the various actuators therefore requires the measurement
      of the nine transfer function matrix elements"

  - id: pri.am_pm_conversion_photodetection
    name: "光电探测 AM-PM 转换噪声原理"
    tier: domain
    verification_status: observed
    statement: >
      光电探测器在将光脉冲列转换为微波信号时，光功率波动（振幅调制 AM）
      通过探测器非线性和饱和效应耦合为微波信号的相位波动（相位调制 PM）。
      这种 AM-PM 转换是光-微波分频中微波相位噪声底的根本限制之一。
    domain: "光电探测，光微波分频，微波生成"
    formula: "α_AM-PM = ΔΦ_out / ΔP_in （AM-PM 转换系数，单位 rad/W 或 rad/dB）"
    conditions: "光功率接近探测器饱和区时 AM-PM 转换最严重"
    invalidated_when:
      - "光功率远低于探测器线性区——AM-PM 耦合系数可忽略"
      - "使用差分探测或两光电二极管平衡探测可部分抑制"
    source_claim: >
      "amplitude-to-phase coupling in the photodetection process is a strong limitation"

methods:
  - id: meth.comb_transfer_function_measurement
    name: "光频梳传递函数矩阵测量方法"
    tier: domain
    verification_status: observed
    statement: >
      使用双通道矢量信号分析仪（VSA）系统测量光频梳的传递函数：
      通道 1 连接白噪声或扫频正弦调制信号至执行器驱动（PZT、泵浦电流或 EOM），
      通道 2 连接被测参数的检测信号（frep 通过光拍频解调，f0 通过 f-2f 干涉仪，
      A 通过直接光电检测）。VSA 计算通道 1 到通道 2 的传递函数（幅度+相位 vs 频率）。
      同一 VSA 在无调制时还可测量各参数的自由运行噪声功率谱密度。
    steps: >
      (1) 搭建 frep 检测链：窄带滤波梳齿 + CW 激光拍频 + 电混频下转换；
      (2) 搭建 f0 检测链：f-2f 自参考干涉仪输出；
      (3) 搭建 A 检测链：直接光电检测 + 低噪声放大器；
      (4) 对每个执行器依次施加调制，VSA 测量九个传递函数；
      (5) 独立表征执行器驱动电路的带宽（确保不限制测量）；
      (6) 分析交叉耦合和噪声预测。
    domain: "光频梳表征，噪声计量学"
    note: >
      此方法论是系统性的、可推广的——适用于任何类型的光频梳（光纤、固态、微腔等），
      只要其自由度可由有限个全局参数描述。

