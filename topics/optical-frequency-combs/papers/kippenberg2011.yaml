# Kippenberg 2011 — 微谐振腔光学频率梳综述 [光学频率梳专题：微梳子域架构文档]
# 提取者：GitHub Copilot（AI草稿，待专家确认）
# 提取日期：2026-07-15
# Schema版本：v4.0
# 专题：optical-frequency-combs
# contribution_type: framework — 定义微谐振腔频率梳（microcomb）子域顶层架构。
#   定义：Level 1 实体 ent.microresonator_frequency_comb（与锁模激光器梳竞争的全新产生原理）；
#   Level 2 平台实例（silica microtoroid、crystalline resonator、Si₃N₄ integrated）；
#   核心原理 pri.parametric_four_wave_mixing_comb、pri.microresonator_anomalous_dispersion；
#   方法 meth.cw_pumped_microcomb_generation 及对应指标。
#   不负责：具体梳态（如孤子态、暗孤子态）的精细物理（由后续技术论文提供）。

