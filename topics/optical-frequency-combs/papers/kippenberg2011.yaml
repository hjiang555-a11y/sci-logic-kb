entities:
  - id: ent.microresonator_frequency_comb
    name: "微谐振腔光学频率梳（微梳）"
    aliases: ["microcomb", "microresonator comb", "Kerr frequency comb", "parametric frequency comb", "微梳"]
    hierarchy_level: 1
    status: demonstrated
    function: >
      基于高 Q 微谐振腔中 Kerr 非线性（χ⁽³⁾）参量四波混频产生的光学频率梳。
      CW 泵浦激光器注入微谐振腔，通过简并与非简并（级联）FWM 将泵浦光子转换为
      等间距的信号-闲频光子对，形成频率梳。梳齿间距等于腔的自由光谱范围（FSR），
      典型重复频率 10–1000 GHz，远高于传统锁模激光器梳（~100 MHz–10 GHz），
      可实现芯片级集成。泵浦激光器本身是梳齿的一部分。
    key_parameters:
      comb_equation: "fₙ = f_CEO + n·f_rep（泵浦激光为梳齿之一）"
      generation_mechanism: "参量四波混频（Kerr χ⁽³⁾ 非线性）"
      repetition_rate: "10–1000 GHz（由 FSR = c/(2πRn_eff) 决定）"
      pump_type: "CW 激光器（非脉冲锁模激光器）"
      threshold_scaling: "P_th ∝ n₀²V_eff/(n₂Q²)（参量振荡阈值）"
      demonstrated_bandwidth: ">1 octave（1000–2200 nm，silica microtoroid）"
      mode_spacing_uniformity: "优于 1 part in 10¹⁷"
      integration_potential: "CMOS 兼容工艺（Si₃N₄），芯片级封装"
    interface_requirements:
      pump_laser: "窄线宽 CW 激光器，功率 >P_th（平台相关，sub-μW 至 ~300 mW）"
      dispersion: "反常色散（anomalous GVD）或色散工程使净色散近零"
      coupling: "渐逝波耦合（锥形光纤、棱镜、波导总线）"
    note: >
      Level 1 实体节点，代表与锁模激光器梳（ent.optical_frequency_comb）本质不同的频率梳产生原理。
      工作原理为参量频率转换（虚能级，无能量存储）而非受激辐射（实能级，增益介质）。
      各具体平台（silica microtoroid、crystalline resonator、Si₃N₄ 等）为 Level 2 实例。

  - id: ent.silica_microtoroid_comb
    name: "二氧化硅微环形腔频率梳"
    aliases: ["silica toroid microcomb", "silica microtoroid comb"]
    hierarchy_level: 2
    status: demonstrated
    function: >
      基于 SiO₂ 微环形谐振腔（silicon chip 上热回流成型）的微梳平台。
      Q 因子 >10⁸（超高 Q），利用 SiO₂ 在 ~1550 nm 附近材料色散与几何色散补偿
      实现反常色散，可产生超过一个倍频程的频率梳（1000–2200 nm）。
      首次微梳演示平台（Del'Haye et al. 2007）。
    key_parameters:
      Q_factor: ">10⁸（超高 Q）"
      material: "熔融石英（fused silica）"
      coupling_method: "锥形光纤渐逝波耦合（tapered fiber）"
      demonstrated_repetition_rate: "86 GHz（首次演示）、375 GHz"
      demonstrated_bandwidth: ">1 octave（1000–2200 nm）"
      dispersion_engineering: "材料色散补偿几何色散，~1550 nm 附近零色散"
    note: >
      Level 2 实例，PART-OF ent.microresonator_frequency_comb。
      首次微梳演示平台。Del'Haye et al. 2007 (Nature 450, 1214)。

  - id: ent.crystalline_resonator_comb
    name: "晶体微谐振腔频率梳"
    aliases: ["crystalline WGM comb", "CaF₂ comb", "MgF₂ comb", "crystalline microcomb"]
    hierarchy_level: 2
    status: demonstrated
    function: >
      基于毫米尺度晶体回音壁模式（WGM）谐振腔（CaF₂、MgF₂ 等）的微梳平台。
      通过抛光圆柱坯件制备，Q 因子超过 10¹⁰（光学精细度 >10⁷），
      棱镜渐逝波耦合，可实现低至 ~12 GHz 的梳齿间距（可直接光电探测），
      透射窗口覆盖 160 nm–~8 μm，尤其适合中红外梳产生。
    key_parameters:
      Q_factor: ">10¹⁰（极高 Q）"
      optical_finesse: ">10⁷"
      material: "CaF₂ 或 MgF₂（反演对称性材料，χ⁽³⁾ 主导）"
      coupling_method: "棱镜渐逝波耦合（prismatic coupler）"
      demonstrated_repetition_rate: "低至 ~12 GHz（可直接光电探测）"
      transparency_window: "160 nm – ~8 μm（CaF₂），中红外潜力极大"
      n2: "~10⁻¹⁶ cm²/W（较低非线性系数，由超高 Q 补偿）"
    note: >
      Level 2 实例，PART-OF ent.microresonator_frequency_comb。
      Ilchenko et al. 2004 首次在晶体谐振腔中演示参量振荡。
      Savchenkov et al. 2008 演示 ~12 GHz 重频梳。

  - id: ent.si3n4_integrated_comb
    name: "氮化硅集成微梳"
    aliases: ["SiN microcomb", "Si₃N₄ integrated comb", "silicon nitride microcomb", "chip-scale comb"]
    hierarchy_level: 2
    status: demonstrated
    function: >
      基于 CMOS 兼容工艺制造的 Si₃N₄ 微环谐振腔频率梳，波导与谐振腔集成在同一芯片上。
      尽管 Q 因子较低（10⁵–10⁶），但通过强光场限制（小模式体积）和较大的 Kerr 非线性系数
      （n₂ = 2.5×10⁻¹⁵ cm²/W，约为 SiO₂ 的 10 倍）部分补偿。
      支持色散工程（通过谐振腔涂层/几何调控），可与光电探测器、调制器等光子器件单片集成，
      是芯片级频率梳的最具前景平台。
    key_parameters:
      Q_factor: "10⁵–10⁶（中等 Q）"
      material: "Si₃N₄（氮化硅）"
      n2: "2.5×10⁻¹⁵ cm²/W（SiO₂ 的 ~10 倍）"
      fabrication: "CMOS 兼容光刻工艺"
      coupling_method: "片上波导总线耦合（bus waveguide）"
      demonstrated_repetition_rate: "204 GHz"
      demonstrated_bandwidth: "2/3 octave（300 mW 泵浦 @ 1550 nm）"
      integration_advantage: "波导 + 谐振腔同片集成，支持全光子芯片封装"
    note: >
      Level 2 实例，PART-OF ent.microresonator_frequency_comb。
      Levy et al. 2010 (Nat. Photonics) 和 Foster et al. 2010 首次演示。
      芯片级集成是微梳区别于传统梳的核心竞争优势之一。

principles:
  - id: pri.parametric_four_wave_mixing_comb
    name: "参量四波混频梳产生原理"
    tier: domain
    verification_status: observed
    statement: >
      在具有 Kerr 非线性（χ⁽³⁾）的高 Q 微谐振腔中，CW 泵浦激光器的高腔内功率密度
      （~GW/cm²）驱动参量四波混频过程：两个泵浦光子湮灭，产生一对频率上移（信号 ωₛ）
      和频率下移（闲频 ωᵢ）的光子。能量守恒要求 2ħωₚ = ħωₛ + ħωᵢ，即边带相对泵浦对称。
      当信号和闲频的腔内散射率超过腔损耗率 κ 时，参量振荡发生。
      随后级联 FWM（非简并 FWM：已产生的边带作为新的"泵浦"继续产生子边带）
      将等间距性传递至整个梳谱，形成光学频率梳。
      参量振荡阈值 P_th ∝ n₀²V_eff/(n₂Q²)，高 Q 可极大降低阈值至 sub-μW 水平。
    domain: "非线性光学，微谐振腔光子学，光学频率梳"
    formula: >
      能量守恒：2ωₚ = ωₛ + ωᵢ；
      动量守恒：2βₚ = βₛ + βᵢ（β = n/R，WGM 传播常数）；
      参量振荡阈值：P_th ∝ n₀²·V_eff/(n₂·Q²)；
      折射率：n(I) = n₀ + n₂·I（Kerr 效应）
    key_insight: >
      与锁模激光器通过受激辐射产生脉冲不同，微梳通过虚能级的参量过程产生梳齿——
      非线性材料无能量存储，仅起光子频率转换作用。级联 FWM 是锁定所有梳齿相位关系、
      实现等间距梳的关键耦合机制。
    conditions: "高 Q 微谐振腔（Q > 10⁵）；χ⁽³⁾ 非线性材料；泵浦功率超过参量振荡阈值"
    preconditions:
      - "腔的回音壁模式（WGM）或波导模式与泵浦、信号、闲频频率共振"
      - "信号与闲频频率须与腔模式重合（色散限制带宽）"
      - "泵浦功率 > P_th（阈值随 1/Q² 降低）"
    invalidated_when:
      - "色散过大导致级联 FWM 效率急剧下降，梳带宽受限"
      - "双光子吸收主导（如 Si 在 1550 nm 附近），净光学损耗增加"
      - "热效应或热折射噪声破坏腔模式稳定性"
    source_claim: >
      "parametric frequency conversion will annihilate two pump photons (with angular frequency ωp) 
      and create a new pair of photons: a frequency up-shifted signal (ωs), and a frequency downshifted 
      idler (ωi). The conservation of energy (2ħωp = ħωi + ħωs) implies that the frequency components 
      are equally spaced with respect to the pump"
    open_questions:
      - "How can phase coherence of all comb modes be reliably achieved and maintained across the full bandwidth in different microresonator platforms?"
      - "What are the fundamental limits of thermo-refractive and thermo-elastic noise on microcomb frequency stability given the small mode volumes?"

  - id: pri.microresonator_anomalous_dispersion
    name: "微谐振腔反常色散条件"
    tier: domain
    verification_status: observed
    statement: >
      宽带频率梳产生要求微谐振腔在泵浦波长附近工作在反常群速度色散（anomalous GVD）区域，
      即高频光传播速度快于低频光（Δnₘ 随波长增大而增大）。色散决定了腔的自由光谱范围（FSR）
      随波长的变化：正常色散使 FSR 随波长减小，反常色散使 FSR 增大。
      当级联 FWM 产生的新梳齿偏离腔谐振模式时（因色散导致的 FSR 不均匀），
      转换效率下降，限制梳带宽。然而，Kerr 非线性引起的光学模式牵引效应
      可部分补偿色散，将梳带宽扩展至纯色散限制之外。
      色散工程（几何色散 + 材料色散设计）是实现宽带微梳的核心技术。
    domain: "非线性光学，色散工程，微谐振腔光子学"
    formula: >
      FSR ≈ c/(2πRn_eff)（WGM 谐振腔）；
      色散参数 D = dFSR/dλ < 0 为正常色散，D > 0 为反常色散；
      Kerr 模式牵引：δω_Kerr ∝ n₂·I 可补偿色散引起的模式失配
    key_insight: >
      反常色散是宽带微梳产生的必要条件，但 Kerr 模式牵引可部分放宽这一限制。
      SiO₂ 在 ~1550 nm 附近材料色散为反常，恰好补偿 WGM 的正常几何色散，
      实现零色散附近泵浦和超倍频程展宽。
    conditions: "泵浦波长位于反常 GVD 区域，或通过色散工程使净色散近零/弱反常"
    preconditions:
      - "材料色散与几何色散的总和在泵浦波长附近为反常色散"
      - "腔体几何参数（半径、截面形状）需精确控制以实现目标色散曲线"
    invalidated_when:
      - "泵浦波长位于强正常色散区域，且无法通过几何/涂层工程补偿"
    source_claim: >
      "Dispersion, the variation of the free spectral range of the cavity with wavelength, 
      ultimately limits this conversion process and leads to a finite bandwidth of the comb 
      generation process because the cascaded FWM is less efficient once the comb modes are 
      not commensurate with the cavity mode spectrum"
    open_questions:
      - "Can dispersion engineering in Si₃N₄ and crystalline resonators reliably achieve octave-spanning combs with low threshold power?"
      - "What are the limits of Kerr nonlinear mode pulling in extending comb bandwidth beyond dispersion-imposed limits?"

methods:
  - id: meth.cw_pumped_microcomb_generation
    name: "CW 泵浦微谐振腔梳产生方法"
    status: demonstrated
    applies_to: ent.microresonator_frequency_comb
    steps_summary: >
      1. 窄线宽 CW 激光器调谐至微谐振腔谐振模式 →
      2. 渐逝波耦合注入腔内（锥形光纤/棱镜/波导）→
      3. 腔内功率增强（~GW/cm² 量级），Kerr 非线性驱动简并 FWM →
      4. 参量振荡产生对称信号-闲频边带 →
      5. 级联（非简并）FWM 将已产生边带进一步转换为新边带 →
      6. 所有边带等间距排列形成光学频率梳 →
      7. 渐逝波输出耦合至光纤/波导 →
      8. 光电探测梳重复频率拍频信号
    required_hardware:
      - ent.microresonator_frequency_comb
    advantages:
      - "CW 泵浦，无需锁模激光器——系统大幅简化"
      - "天然高重频（10–1000 GHz），每根梳齿功率高（>1 mW 可能）"
      - "芯片级集成潜力（特别是 Si₃N₄ 平台）"
      - "增益仅受材料透射窗和色散限制，原则上可覆盖从 UV 到中红外"
      - "无活动部件（无可移动镜片），f_rep 和 f_CEO 可通过泵浦频率和功率电子控制"
    disadvantages:
      - "相干梳态（如孤子态）的可靠激发和维持仍具挑战性（2011 年时）"
      - "f-2f 自参考需要倍频程展宽和足够低的梳模式频率噪声"
      - "小模式体积增强热折射和热弹性噪声"
      - "将 f_rep 降至 <100 GHz 需要更大谐振腔和更高 Q"
    conditions:
      - "泵浦功率超过参量振荡阈值"
      - "微谐振腔在泵浦波长具有反常色散"
      - "渐逝波耦合效率足够高（过耦合态有利于提取效率）"
    source_claim: >
      "A new optical frequency comb generation principle has emerged that uses parametric 
      frequency conversion in high resonance quality factor (Q) microresonators"

metrics:
  - id: met.microcomb_repetition_rate_range
    name: "微梳重复频率范围"
    unit: "GHz"
    description: >
      微谐振腔频率梳的梳齿间距（等于 FSR），由谐振腔尺寸决定。
      微梳的核心竞争优势之一是天然高重频（10–1000 GHz），
      传统锁模激光器梳难以达到此范围。
    demonstrated_value:
      value: "10–1000 GHz（平台相关：crystalline ~12 GHz，Si₃N₄ ~204 GHz，silica microtoroid ~86–375 GHz）"
      conditions: "各平台已演示值：silica microtoroid 86 GHz（首次）、375 GHz；crystalline CaF₂ ~12–25 GHz；Si₃N₄ 204 GHz"
      verification_status: observed
      confidence: established
      source: {zotero_key: "", claim: "high repetition rates in the range of 10 to 1000 gigahertz through compact, chip-scale integration"}
    historical_landmarks:
      first_demonstration:
        value: "86 GHz（silica microtoroid）"
        year: 2007
        source: {zotero_key: ""}
        note: "Del'Haye et al. 2007, Nature 450, 1214 — 首次微梳演示"
      best_demonstration:
        value: "~12 GHz（crystalline CaF₂，可直接光电探测）至 >375 GHz（silica microtoroid）"
        year: 2008
        source: {zotero_key: ""}
        note: "Savchenkov et al. 2008 达到 ~12 GHz；Del'Haye et al. 2009 达到倍频程展宽"

  - id: met.parametric_oscillation_threshold
    name: "参量振荡阈值功率"
    unit: "W（或 μW/mW）"
    description: >
      在微谐振腔中启动 Kerr 参量振荡所需的最低泵浦功率。
      阈值随 1/Q² 缩放，超高 Q 腔可实现 sub-μW 阈值。
      是衡量微梳能效和实用性的关键指标。
    demonstrated_value:
      value: "sub-μW（超高 Q silica/crystalline）至 ~300 mW（Si₃N₄，Q = 10⁵–10⁶）"
      conditions: "P_th ∝ n₀²V_eff/(n₂Q²)；silica microtoroid Q > 10⁸，Si₃N₄ Q ~ 10⁵–10⁶，CW 泵浦 @ ~1550 nm"
      verification_status: observed
      confidence: established
      source: {zotero_key: "", claim: "the threshold for initiation of parametric oscillation can be strongly reduced, because the threshold scales with the inverse Q factor squared"}
    theoretical_floor:
      value: "由腔 Q 因子和模式体积决定：P_th ∝ n₀²V_eff/(n₂Q²)"
      basis: "Kerr 非线性参量振荡理论"
      gap_note: "超高 Q 腔已接近 sub-μW 极限；集成平台受限于较低 Q 因子"

  - id: met.microcomb_mode_spacing_uniformity
    name: "微梳梳齿间距均匀性"
    unit: "无量纲（相对偏差）"
