principles:
  - id: pri.integrated_photonic_optical_frequency_division
    name: "集成光子光频分频原理"
    tier: method
    verification_status: demonstrated
    statement: >
      光频分频（OFD）将超稳光频参考（~10¹⁴ Hz）分频至微波域
      （~10¹⁰ Hz），利用频率分频比的平方（M² ≈ 10⁸）天然抑制
      相位噪声。传统 OFD 使用体光学/光纤频率梳和光电二极管——
      系统复杂、体积大。集成光子 OFD 将频率梳（微腔 soliton 梳）
      和光电转换集成在单个芯片上，实现紧凑型低噪声微波源。
    domain: "光频分频；集成光子学；微波光子学"
    key_insight: >
      光频分频的真正工程瓶颈不是物理原理而是系统集成——
      芯片化使 OFD 微波源从"光学实验"变成"微波器件"。
    conditions: "集成 soliton 微腔频率梳；高速集成光电二极管；超稳 CW 激光参考"
    source:
      zotero_key: "3250 (1)"
      claim: "Two-point optical frequency division leverages the frequency ratio to suppress phase noise."

