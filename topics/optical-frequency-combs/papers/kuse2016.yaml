  note: >
    [技术论文 / A1-Noise 子域纪录] IMRA America（Fermann）+ Colorado（Schibli）。
    全保偏 Er:fiber 锁模激光器基于**非线性放大环镜（NALM）**锁模，取代 NPR：
    (1) f_CEO 积分相位噪声 <0.2 rad；
    (2) 10 kHz–10 MHz 积分时延抖动 40 as —— 当时 Er:fiber 梳纪录；
    (3) NALM 锁模兼容全 PM 光路，抗振动/温度、自启易，优于 NPR 的全 PM 难题。
    相比 Kuse 2015（OE, 石墨烯 EOM，zotero_key 3RT4U4TV）的同作者工作，本篇重点
    从"f_CEO 相噪突破"转向"**时延抖动**刷新纪录"，是不同的主要贡献——因此作为独立节点。
    对齐 v2 子域主线：A1-Noise（时延抖动 40 as 纪录）、A1-Robust（全 PM + 自启 NALM）。

