methods:
  - id: meth.nalm_all_pm_er_comb_stabilization
    name: "全 PM NALM Er 梳 f_CEO + 时延抖动联合表征方法"
    status: demonstrated
    applies_to: ent.all_pm_er_nalm_comb_k16
    steps_summary: >
      1. 全 PM Er:fiber 线性腔 + NALM 锁模器；
      2. HNLF 超连续展宽覆盖倍频程；
      3. f-2f 干涉仪 + PLL 锁 f_CEO；
      4. 高带宽 PD + 平衡光学相关仪（BOC）测 10 kHz–10 MHz 时延抖动；
      5. f_CEO 积分相噪 → <0.2 rad；时延抖动 → 40 as。
    required_hardware:
      - ent.all_pm_er_nalm_comb_k16
    advantages:
      - "NALM 自启锁模兼容全 PM → 抗机械/温度扰动"
      - "比 NPR 路径自然支持低时延抖动"
    disadvantages:
      - "NALM 参数窗口（环长、耦合比、放大倍率）需精细工艺"

