entities:
  - id: ent.attosecond_erfiber_comb_y15
    name: "阿秒分辨 Er:fiber 光频梳（Yan 2015，NTSC 系统）"
    hierarchy_level: 2
    status: demonstrated
    function: >
      232 MHz 重频 Er:fiber 锁模激光器；腔内 8 mm LiNbO₃ 电光晶体做快速腔长伺服，
      PZT 做慢漂移补偿；梳齿相位锁定至 1550 nm cw 参考（in-loop 测量）；
      f-2f 共路 f_CEO 探测，锁至 RF 参考（通过泵浦功率控制）。
      HNLF 展宽至覆盖 1–2 µm 八度。
    key_parameters:
      gain_medium: "Er:fiber（110 dB/m）"
      repetition_rate: "232 MHz"
      output_power: "~180 mW @ 1 W 泵浦"
      intracavity_modulator: "LiNbO₃ EOM（8×3.2 mm）+ PZT"
      f_ceo_actuator: "泵浦功率调制"
      f_r_actuator: "腔内 EOM（快） + PZT（慢）"
      sc_span: "1–2 µm（HNLF 展宽）"
    note: "Level 2 实例节点，PART-OF ent.optical_frequency_comb"

principles:
  - id: pri.intracavity_eom_fast_rep_rate_control
    name: "腔内 EOM 快速重频伺服原理"
    tier: engineering
    verification_status: observed
    statement: >
      腔内电光晶体通过折射率调制等效改变腔长，反馈带宽由调制电极电容与驱动阻抗决定，
      可远高于 PZT 声速极限（~几十 kHz）与泵浦调制的增益寿命极限（~100 kHz），
      从而实现 f_r 高带宽锁定 → 降低 cw 参考相噪向光梳的传递残差。
    domain: "光梳 f_r 伺服"
    key_insight: >
      腔内 EOM 是传统 Ti:Sa / Yb:fiber / Er:fiber 梳实现亚赫兹级锁定的通用硬件；
      与腔内石墨烯调制器（Kuse 2015）形成"块状 vs 2D"两条工程路径。
    conditions: "EOM 色散被精细补偿；驱动电路带宽匹配"
    source_claim: >
      "Its repetition rate is phase-stabilized to a continuous-wave laser with both an intra-cavity
      electro-optic modulator and a piezo-transducer"

methods:
  - id: meth.er_fiber_comb_dual_actuator_stabilization
    name: "Er:fiber 梳双执行器稳频方法（EOM + PZT + 泵浦）"
    status: demonstrated
    applies_to: ent.attosecond_erfiber_comb_y15
    steps_summary: >
      1. Er:fiber 锁模 → 232 MHz 脉冲串；
      2. 腔内 EOM（快）+ PZT（慢）锁 f_r 至 1550 nm cw 参考；
      3. 共路 f-2f 探测 f_CEO，反馈泵浦功率；
      4. HNLF 展宽至 1–2 µm 覆盖光频测量目标；
      5. 环内读出 σ_y <1×10⁻¹⁶ @ 1 s。
    required_hardware:
      - ent.attosecond_erfiber_comb_y15

