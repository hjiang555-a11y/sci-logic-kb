    function: >
      克尔微腔中多个DKS孤子以确定性间距周期排列形成的自组织集体态，
      有效重复频率为单孤子的n倍（n为晶体中孤子数），光谱呈特征性调制"指纹"图案，
      可通过绝热泵浦激光频率扫描确定性产生。

  - id: ent.silica_wgm_resonator_cole
    name: "二氧化硅WGM微腔（Cole 2018）"
    hierarchy_level: 2
    status: demonstrated
    function: >
      用于孤子晶体生成实验的石英WGM微环谐振腔，自由谱范围约26 GHz（高Q腔）
      和约16.4 GHz，异常色散，通过锥形光纤侧耦合泵浦（~30 mW电信波段）。

principles:
  - id: pri.soliton_crystal_formation
    name: "孤子晶体形成原理：模式简并介导的长程相互作用"
    tier: domain
    verification_status: observed
    statement: >
      在克尔微腔中，腔模式回避交叉（avoided mode crossing）在特定波长处产生局域化增强的
      四波混频转换效率，形成与泵浦激光干涉的背景波（extended background wave）。
      该背景波提供长程孤子-孤子相互作用，使多孤子间距离散化为允许的晶体态，
      抑制了正常情况下的近程吸引力导致的孤子对湮灭，从而使密排孤子晶体在
      绝热激光频率扫描下自发稳定形成。
    domain: "非线性光学 / 微腔光学"
    key_insight: >
      腔模式简并（avoided mode crossing）是孤子晶体与无序"孤子液体"的本质区别；
      n孤子晶体的有效FSR增为n×f_rep，光功率转换效率可接近理论上限。
    conditions: "需要腔体存在谱域局域增强的模式简并；泵浦激光需从蓝失谐绝热扫至红失谐"
    source:
      zotero_key: "Q7ZYAQMC"
      claim: >
        "Soliton crystallization is explained by long-range soliton interactions mediated
        by resonator mode degeneracies"

  - id: pri.soliton_crystal_fingerprint_spectrum
    name: "孤子晶体指纹光谱识别原理"
    tier: domain
    verification_status: observed
    statement: >
      孤子晶体的光学频谱由腔内所有孤子的场叠加形成，不同孤子间的相对相位和间距产生
      逐模调制的干涉图样（"指纹"），调制深度和周期唯一对应晶体结构（含孤子数、
      缺陷类型和周期性），可用于明确识别和分类各类孤子晶体态。
    domain: "微腔光学"
    key_insight: "光谱指纹图案与时域晶体结构一一对应，无需时域测量即可推断孤子排列"
    conditions: "适用于腔内多孤子共传播态，需要逐模光谱分辨"
    source:
      zotero_key: "Q7ZYAQMC"
      claim: >
        "We unambiguously identify and characterize soliton crystals through analysis of
        their 'fingerprint' optical spectra, which arise from spectral interference between
        the solitons."

methods:
  - id: meth.adiabatic_soliton_crystal_generation
    name: "绝热泵浦扫描孤子晶体生成法"
    status: demonstrated
    steps_summary: >
      1) 将泵浦激光从蓝失谐侧缓慢向红失谐扫描，经过调制不稳定梳→混沌腔场阶段；
      2) 利用腔内模式简并提供的稳定背景波，孤子晶体在混沌-晶体转变时连续生成，
         无需快速扫描或复杂控制（甚至可用手动压电调节）；
      3) 通过传输功率及RF重复频率信号的特征变化（低噪声跃变）确认晶体态的形成；
      4) 通过光谱"指纹"结合LLE数值模拟确定晶体结构。
    source_claim: >
      "we are able to generate soliton crystals by adjusting the pump laser's frequency
      by tuning the voltage across a piezoelectric crystal by hand over several seconds"

