      per_mode_power: ">0.5 mW/齿（FWHM 内）、经空间分辨后 >1 nW"
      mode_locking: "Kerr 透镜锁模（KLM），紧聚焦 + 色散平衡"
      self_reference: "f-2f 自参考，锁至 Cs 溯源 RF"
    note: >
      Level 2 实例节点，PART-OF ent.optical_frequency_comb（定义于 giunta2019.yaml）；
