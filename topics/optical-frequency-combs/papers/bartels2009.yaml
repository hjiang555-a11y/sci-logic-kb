    function: >
      紧凑腔长钛宝石 Kerr 透镜锁模（KLM）飞秒激光器，f_rep = 10 GHz 基频，
      <40 fs 脉冲、>350 THz 光谱宽度、>50 000 梳齿、1.2 W 平均功率。
      经非线性光纤展宽至覆盖倍频程后进入 f-2f 干涉仪 → f_0 自参考锁定。
      单个 10-GHz 模可经衍射光栅直接空间分辨，单齿功率 >1 nW（光谱仪校准可用）。
    key_parameters:
      repetition_rate: "10 GHz（基频，非谐波放大）"
