principles:
  - id: pri.high_frep_bandwidth_power_tradeoff
    name: "高重频梳带宽-平均功率-单齿功率三角权衡原理"
    tier: domain
    verification_status: observed
    statement: >
      对固定泵浦功率，提高 f_rep（即缩短腔长）会同时压低脉冲能量：
      若要求脉冲峰值功率仍能驱动非线性展宽覆盖倍频程（自参考前提），
      则腔内必须牺牲谱宽（长脉冲）或平均功率——这是 10 GHz 级自参考梳的核心技术瓶颈。
      Bartels 2009 通过"紧聚焦 KLM + 色散平衡 + 高泵浦"在 10 GHz 基频下同时满足：
      平均功率 1.2 W、脉冲 <40 fs、倍频程展宽、单齿 >1 nW 可分辨。
    domain: "高重频飞秒激光；梳齿功率谱"
    key_insight: >
      "基频 10 GHz 自参考"不是简单的腔长缩短问题，而是要在脉冲能量量级只有 nJ 的条件下
      同时维持非线性展宽阈值——这比 100 MHz 梳难约两个数量级。
    conditions: "Ti:sapph KLM 基频腔；倍频程展宽光纤可用；单齿功率 > 光谱仪探测阈值"
    formula: "E_pulse = P_avg / f_rep；f_rep↑ 与 supercontinuum 阈值 E_pulse≥E_th 的两难"
    source_claim: >
      "Combs with large mode spacings ... greater than 10 GHz have required compromises
      both in terms of bandwidth and average power, resulting in pulses that are too weak
      and too long in duration for efficient nonlinear spectral broadening."

methods:
  - id: meth.klm_10ghz_comb_self_reference
    name: "10 GHz 紧腔 KLM + 非线性展宽 + f-2f 自参考方法"
    status: demonstrated
    applies_to: ent.ti_sapph_10ghz_comb_bartels09
    steps_summary: >
      1. 紧腔 Ti:sapph 腔，腔长对应 f_rep = 10 GHz；
      2. 紧聚焦增强 Kerr 效应 + 精细色散平衡支持 <40 fs 脉冲；
      3. 非线性光纤展宽覆盖倍频程；
      4. 标准 f-2f 干涉仪测 f_0；
      5. 同时 PLL 锁 f_0 与 f_R 至 Cs 原子钟溯源 RF；
      6. 光栅空间分辨单 10-GHz 梳齿用于光谱仪校准。
    required_hardware:
      - ent.ti_sapph_10ghz_comb_bartels09
    advantages:
      - "单齿直接可分辨，无需模滤波 Fabry-Perot"
      - "350 THz 超宽谱覆盖，优于现有模滤波方案"
    disadvantages:
      - "紧腔对机械与热稳定性要求极高"

