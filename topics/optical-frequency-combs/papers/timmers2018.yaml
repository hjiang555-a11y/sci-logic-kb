principles:
  - id: pri.intra_pulse_dfg_super_octave_mir_t18
    name: "脉冲内差频超八度中红外梳产生原理（Timmers 2018）"
    tier: domain
    verification_status: observed
    statement: >
      "少周期脉冲（~10 fs，~1.5 μm 中心）包含宽带频率成分（Δf ~ 100 THz），
      在 χ² 非线性晶体（OP-GaP 准相位匹配）中发生脉冲内差频（intra-pulse DFG）：
      高频成分与低频成分在单个脉冲内混频 → 产生中红外（4–12 μm）光子。
      关键优势：(1) f_CEO 自然抵消（f_DFG = f_high - f_low = (n·f_rep + f_CEO) - (m·f_rep + f_CEO) = (n-m)·f_rep，无偏移频率）；
      (2) 超八度带宽（泵浦谱宽直接映射到 DFG 输出）；(3) 相位稳定（单脉冲过程，无 CEO 漂移）。"
      Timmers 2018 证明：OP-GaP 准相位匹配可高效支持 4–12 μm 超宽带 DFG，
      输出功率 0.25 mW（vs. 传统 DFG <μW），亮度匹敌同步辐射。
    domain: "中红外非线性光学；频率梳工程；分子光谱学"
    key_insight: >
      中红外梳的核心瓶颈不是"覆盖带宽"（DFG 天然宽带），而是"输出功率 + 亮度"——
      传统 DFG 用 CW 激光器或窄带泵浦，功率 <μW；脉冲内 DFG 用少周期脉冲（高峰值功率）+ OP-GaP（高 χ²），
      功率提升至 mW 级，亮度匹敌同步辐射（synchrotron IR）→ 桌面分子指纹光谱可行。
    conditions: >
      需少周期泵浦脉冲（<20 fs，峰值功率 >MW）；需宽带准相位匹配非线性晶体（OP-GaP 支持 4–12 μm）；
      需精密色散补偿（ND-HNLF + fused silica wedges）；需 DCS 配置（双梳读出）。
    formula: >
      f_DFG,i = (n-m)·f_rep（无 f_CEO，相位稳定）；
      带宽 Δλ_DFG ~ Δλ_pump²/λ_center（超八度泵浦 → 超八度输出）；
      亮度 B ~ P_DFG / (Δλ·Δθ)（匹敌同步辐射）
    source:
      zotero_key: "TFUBQQB8"
      claim: >
        "we introduce a solution for bright, stabilized LWIR frequency combs based on intra-pulse DFG 
        using a few-cycle pulse derived from commonplace and robust Er:fiber laser technology... 
        we generate spectra containing up to 0.25 mW of power and spanning 4–12 μm, 
        with this simple and robust table-top source, we produce coherent, broadband infrared light 
        exhibiting comparable brightness to an infrared beamline at synchrotron user facilities."
    breakthrough_paths:
      - step: 1
        entity: pri.nonlinear_frequency_conversion_comb
        context: "非线性频率转换梳产生原理（DFG 基本工作原理，跨文件引用 schliesser2012.yaml）"
      - step: 2
        entity: pri.intra_pulse_dfg_super_octave_mir_t18
        context: "脉冲内 DFG 超八度中红外梳原理：少周期脉冲 + OP-GaP 准相位匹配 → 4–12 μm 超宽带输出，功率 0.25 mW，亮度匹敌同步辐射"
      - step: 3
        entity: ent.opgap_super_octave_mir_comb_t18
        context: "应用该原理实现首个桌面超八度分子指纹梳（世界首次，2018），演示甲醇/乙醇双梳光谱，分辨率 100 MHz，采集速率 20 ms"

