    [技术论文 / 里程碑] NIST Boulder (Timmers, Kowligy, Lind, Cruz, Nader, Silfies, Ycas, Allison, Schunemann, Papp, Diddams) 2018 年 Optica。
    首次用**脉冲内差频（intra-pulse DFG）+ OP-GaP 晶体**实现超八度（4–12 μm，覆盖分子指纹区）
    中红外频率梳，亮度匹敌同步辐射红外光束线——克服传统 FTIR 热光源低亮度限制。
    基于 Er:fiber 梳（100 MHz）+ EDFA + 正常色散 HNLF 展宽至少周期脉冲（~10 fs），
    经 OP-GaP 准相位匹配 χ² DFG 产生 4–12 μm 超八度 LWIR 梳（0.25 mW 总功率，500,000 梳齿）；
    演示甲醇/乙醇双梳光谱，分辨率 100 MHz（0.0033 cm⁻¹），频率不确定度 <10⁻¹¹，采集速率 20 ms。
    开创了"桌面超宽带高亮度分子指纹梳"路线，为红外纳米光谱/生物医学成像提供新工具。
    v2 子域主线：B-MIR（中红外光谱）主线——刷新指纹区梳功率 + 带宽纪录。

