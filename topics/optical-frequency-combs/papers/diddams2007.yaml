principles:
  - id: pri.vipa_spatial_comb_mode_resolution_d07
    name: "VIPA 空间分辨梳模式原理（Diddams 2007）"
    tier: domain
    verification_status: observed
    statement: >
      "VIPA（virtually imaged phased array）色散器通过多重反射干涉产生高角色散（~50 GHz FSR），
      可将频率梳的单个梳齿（1 GHz 间距，经 Fabry-Pérot 滤波至 3 GHz）空间分辨为一维阵列；
      结合衍射光栅（覆盖 THz 范围）形成二维空间频率映射：x 方向分辨单齿（VIPA），y 方向覆盖宽带（光栅）。
      CCD 成像并行读出 → 数千梳齿的振幅同时测量（分子吸收调制） → 数毫秒采集完整分子指纹图谱。"
      Diddams 2007 证明：VIPA 分辨梳齿可实现高速（ms 级）、宽带（>6 THz）、高分辨（单齿可辨）分子光谱成像，
      超越传统"扫描单齿"或"拍频探测"方法（串行，慢）。
    domain: "高分辨光谱学；频率梳工程；色散光学器件"
    key_insight: >
      频率梳的本质优势不仅是"梳齿频率精确已知"（用于频率计量），
      还在于"数千齿并行存在"——若能空间分辨（而非时域/频域拍频检测），
      则可实现"百万激光器阵列"效果（每齿独立可控、可测），适用于高带宽扩频通信、相干量子控制、任意波形合成等。
      VIPA 是实现"空间并行梳齿访问"的关键技术——高色散（FSR ~50 GHz）+ 紧凑（vs. 衍射光栅需数米焦距）。
    conditions: >
      需稳定频率梳（f_rep 与 f_CEO 锁定）；需 Fabry-Pérot 滤波（降低梳齿密度至 VIPA FSR 可分辨）；
      需 VIPA 高分辨色散器 + 衍射光栅组合（二维空间频率映射）；需 CCD 成像（并行读出）。
    formula: "VIPA 角色散：dθ/dλ ~ FSR/λ²（高色散）；空间分辨率：Δλ ~ λ²/(FSR·光束质量）（单齿可辨）"
    source:
      zotero_key: "U9WDX7JI"
      claim: >
        "Here we use a high-resolution disperser to separate the individual modes of a stabilized frequency comb 
        into a two-dimensional array in the image plane of the spectrometer. 
        ...Our technique for direct and parallel accessing of stabilized frequency comb modes 
        could find application in high-bandwidth spread-spectrum communications with increased security, 
        high-resolution coherent quantum control, and arbitrary optical waveform synthesis with control at the optical radian level."
    breakthrough_paths:
      - step: 1
        entity: pri.femtosecond_comb_frequency_ruler
        context: "飞秒激光频率梳：脉冲序列形成精密频率标尺原理（跨文件引用 udem2002.yaml）"
      - step: 2
        entity: pri.vipa_spatial_comb_mode_resolution_d07
        context: "VIPA 空间分辨梳齿原理：二维色散器将梳齿映射为空间阵列，CCD 并行读出 → 数千齿振幅同时测量"
      - step: 3
        entity: ent.vipa_resolved_mode_comb_spectrometer_d07
        context: "应用该原理实现首个分辨梳模式分子指纹光谱仪（世界首次，2007），演示碘分子蒸气高分辨吸收谱，采集时间数毫秒"

