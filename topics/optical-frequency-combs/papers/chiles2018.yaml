  note: >
    [技术突破] NIST（Chiles, Diddams, Papp, Nam 等）。首次演示氘化氮化硅（SiN:D）
    通过等离子体增强化学气相沉积（PECVD / ICP-CVD）制备的集成光子平台用于非线性光学：
    (1) 峰值工艺温度 <300°C，CMOS 后端兼容；(2) 用氘化硅烷（SiD₄）替代常规硅烷（SiH₄），
    将 N-H 吸收带从 1.5 μm 移至 ~2.04 μm，C 波段损耗降至 0.31 dB/cm（vs PECVD SiN:H 的
    2.5 dB/cm，改善 8 倍）；(3) 微环谐振器 Q 因子达 1.6×10⁶ @ 1552 nm；
    (4) 演示 1 THz FSR、900 nm 带宽 MI Kerr 微梳；(5) 演示倍频程超连续谱。
    跨文件节点引用：ent.si3n4_integrated_comb 定义于 kippenberg2011.yaml；
    pri.parametric_four_wave_mixing_comb 定义于 kippenberg2011.yaml；
    pri.supercontinuum_octave_spanning 定义于 diddams2000.yaml。

entities:
  - id: ent.deuterated_sin_photonic_platform_c18
    name: "氘化氮化硅（SiN:D）PECVD 集成光子平台（Chiles 2018）"
    aliases:
      - "deuterated silicon nitride platform"
      - "SiN:D ICP-CVD photonic waveguide"
      - "PECVD SiN:D integrated photonics"
    hierarchy_level: 2
    status: demonstrated
    function: >
      通过使用氘化硅烷（SiD₄，98% 同位素纯度）作为 PECVD/ICP-CVD 前驱体，
      将传统 SiN 薄膜中的 N-H 键替换为 N-D 键。N-D 泛频吸收带移至 ~2.04 μm
      （vs N-H 的 ~1.52 μm），使 C 波段（1530-1565 nm）损耗大幅降低。
      低温沉积（270°C）使其 CMOS 后端兼容，可直接在预处理硅片上沉积，
      无需高温退火（vs LPCVD SiN 需 >700°C）或裂纹控制。
    key_parameters:
      material: "SiN:D（氘化氮化硅）"
      deposition_method: "ICP-CVD（感应耦合等离子体化学气相沉积）"
      peak_temperature: "<300°C（CMOS 后端兼容）"
      precursor: "SiD₄（98% 同位素纯度）+ N₂"
      refractive_index: "1.98 ± 0.01 @ 1548 nm"
      film_stress: "191 MPa（低拉应力，568 nm 厚膜，无裂纹）"
      max_tested_thickness: "1.05 μm（无裂纹）"
      propagation_loss_c_band: "0.31 dB/cm（C 波段最差情况，1510-1600 nm）"
      propagation_loss_improvement: "8 倍优于当时最佳 PECVD SiN:H（2.5 dB/cm）"
      nd_absorption_peak: "5.2 dB/cm @ 2.04 μm（N-D 泛频吸收）"
      quality_factor_peak: "1.6 × 10⁶ @ 1552 nm"
      quality_factor_broadband: ">1.2 × 10⁶（1510-1600 nm 全 C 波段）"
      microring_radius: "180 μm"
      etch_depth: "430 nm（部分刻蚀）"
    interface_requirements:
      pump: "CW 泵浦（Kerr 梳）或飞秒脉冲泵浦（SCG）"
