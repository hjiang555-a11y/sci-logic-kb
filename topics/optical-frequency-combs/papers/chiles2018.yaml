principles:
  - id: pri.isotope_substitution_absorption_shift
    name: "同位素替换吸收带移位原理（N-H → N-D）"
    tier: domain
    verification_status: observed
    statement: >
      分子振动频率 ω ∝ √(k/μ)，其中 k 为键力常数，μ 为约化质量。
      用氘（D，质量 ≈2 amu）替代氢（H，质量 ≈1 amu），N-D 键的约化质量增加，
      基频振动频率降低约 √2 倍。对应的泛频（overtone）吸收带也同步红移：
      N-H 泛频 @ ~1.52 μm → N-D 泛频 @ ~2.04 μm，完全移出电信 C 波段。
      同位素替换不改变键力常数（化学键类型不变），因此折射率和非线性系数
      几乎不受影响。
    domain: "材料光学，分子光谱，集成光子学"
    formula: "ω_ND/ω_NH ≈ √(μ_NH/μ_ND) ≈ √(14·1/(14+1)) / √(14·2/(14+2))) ≈ 0.73"
    key_insight: >
      同位素替换是一种优雅的材料工程手段——保持材料的折射率、非线性和机械性质，
      仅移动不需要的吸收带。对 SiN 光子学，将 C 波段损耗从 PECVD SiN:H 的
      >2.5 dB/cm 降至 SiN:D 的 0.31 dB/cm（8 倍改善）。
    conditions: "高纯度同位素前驱体（≥98% 氘纯度）"
    preconditions:
      - "PECVD/ICP-CVD 沉积工艺能兼容氘化前驱体"
      - "前驱体纯度足够高，残余 H 含量 <2% 以避免残余 N-H 吸收"
    invalidated_when:
      - "应用波段恰好与 N-D 吸收带重叠（~2 μm）——损耗反而增加"
      - "前驱体氘纯度不足——残余 N-H 吸收仍然显著"
    source_claim: >
      "employ isotopically substituted precursors during the deposition process to modify
      the bond energy of the N-H overtone (such as deuterated silane [SiD4])"

