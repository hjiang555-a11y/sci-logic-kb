# Kashiwagi 2018 — 多分支 Er 光纤梳通过"分支间光纤噪声差分消除（FNDC）"将相对频率不确定度压到 10⁻²⁰ 量级 [技术论文]
# 提取者：GitHub Copilot（AI草稿，待专家确认）
# 提取日期：2026-04-19
# Schema版本：v4.1
# 专题：optical-frequency-combs
# contribution_type: technical — 多分支光纤梳的分支间噪声工程方案
#   核心贡献：
#     (1) 指出多分支光纤梳（CEO-锁定支、拍频-锁定支、应用支各有独立 EDFA+HNLF 非公用光纤路径）
#         的支间光纤噪声差是长期分数稳定度的首要限制；
#     (2) 提出 FNDC：以 1542 nm CW 参考激光同时与 CEO-锁定支及其余两支拍频，
#         用鼓式 PZT 光纤拉伸器以 ~100 Hz 带宽抵消每支相对 CEO-锁定支的光纤相噪；
#     (3) 用两套准相同梳做光域比较，在 modified Allan 偏差下达到 9.7×10⁻²¹ @ 126500 s，
#         加权标准差（单梳）1.6×10⁻²⁰，首次将多分支光纤梳的支间相对不确定度推入 10⁻²⁰ 级。
#   Framework 依赖：ent.optical_frequency_comb、pri.self_referencing_f2f 定义于 udem2002.yaml；
#     相关方法 meth.wideband_optical_frequency_synthesis 定义于 giunta2020.yaml。

