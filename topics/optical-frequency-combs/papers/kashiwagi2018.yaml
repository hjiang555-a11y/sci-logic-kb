    [技术论文] NMIJ/AIST + JST ERATO MINOSHIMA IOS Project。自锁模 Er:fiber 振荡器
    （4.4 mW，135 fs，1560 nm，43.4 MHz）输出分为四支（其中一支未用），每支分别经 EDFA+HNLF
    获得不同应用所需谱段。f_CEO 由 CEO-锁定支的 f-2f 干涉仪探测、以泵浦 LD 电流反馈锁到 30 MHz；
    f_beat 由 1064 nm 超稳 CW 参考经腔内 WG-EOM（快）+ 腔温 TEC（慢）锁定。为抑制分支间
    独立光纤噪声差，在拍频-锁定支与应用支中各引入鼓型 PZT 光纤拉伸器；以 1542 nm CW 参考激光
    与 CEO-锁定支的拍频作参考信号，和另两支拍频作误差信号，构成 FNDC 伺服（带宽约 100 Hz）。
    两套准相同梳通过光域比较：1542 nm 拍频-锁定支混频比对 + 1700 nm 应用支直接拍频（BS+10 nm BPF）。
    跨文件节点引用：ent.optical_frequency_comb、pri.self_referencing_f2f 定义于 udem2002.yaml；
