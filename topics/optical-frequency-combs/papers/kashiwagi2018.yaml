principles:
  - id: pri.inter_branch_fiber_noise_degradation
    name: "多分支光纤梳的支间光纤相噪退化原理"
    tier: engineering
    verification_status: observed
    statement: >
      在多分支/路光纤梳结构中，振荡器输出被分到若干独立的 EDFA+HNLF 支路以覆盖不同应用波段。
      常规的 f_CEO / f_beat 反馈只锁定"CEO-探测支 + 拍频-探测支"这一条光学通路包含的相噪；
      其他支（尤其外环的应用支）除叠加自身独立光纤相噪外，还会反馈入由锁定支光纤相噪
      经反馈机制"打入"的相噪，二者联合限制了多分支梳的输出相对频率稳定度。
    domain: "光纤频率梳工程；相位噪声传递"
    formula: >
      φ_out_branch_j(t) = φ_comb(t) + φ_fiber_j(t) − φ_fiber_lock(t)
      （第 j 支观测相位 = 梳基带相位 + 本支独立光纤相噪 − 锁定支光纤相噪）
      其中 φ_fiber_j − φ_fiber_lock 即是 FNDC 目标。
    key_insight: >
      "锁 CEO + 锁 beat" 使梳在锁定支精确锁紧，却无法保证离开该支之外的输出也锁紧；
      这就是单支/单路架构（Ohmae 2017、Leopardi 2017）以 10⁻²¹–10⁻²⁰ 优势领先多支架构的原因。
    conditions: "多分支光纤梳；CEO 与 beat 只在其中一到两支中被探测/反馈"
    preconditions:
      - "各支 EDFA+HNLF 光纤路径长度达米量级，环境扰动可测"
      - "CEO-探测路径与应用输出路径不共公物理光纤"
    invalidated_when:
      - "采用单支/单路架构（所有应用输出与 CEO 探测共用同一段光纤）"
      - "所有分支共用一段 CEO 探测后的主光纤，仅在末端分束（共公光纤模式）"
    source_claim: >
      "The inter-branch/path phase noise differences degrade the frequency stabilities ...
       although the feedback control of the comb stabilization (for f_CEO or f_beat) stabilizes
       the comb frequency including the phase noise originating from the branch paths,
       another branch output suffers from not only the phase noise from the branch paths but
       also from the phase noise from the branch used for comb stabilization."
    open_questions:
      - "支间相噪与自由空间路径相噪在 100 Hz–1 kHz 区域如何精确区分？"

  - id: pri.multi_branch_fiber_noise_difference_cancellation
    name: "多分支光纤噪声差分消除原理（FNDC，本论文提出）"
    tier: engineering
    verification_status: observed
    statement: >
      以一台公共 CW 激光（波长远离各支应用波段亦可，本论文取 1542 nm）同时与 CEO-锁定支及其余每支的
      最近梳齿拍频；以"CW ↔ CEO-锁定支梳齿"拍频作伺服参考，"CW ↔ 第 j 支梳齿"拍频作误差信号；
      控制第 j 支中的光纤长度执行器（如 PZT 拉伸器）使二者同相。CW 激光自身相噪为共模项，
      在两路拍频相减时抵消；残余即是第 j 支相对 CEO-锁定支的独立光纤相噪差，该差被伺服置零。
      最终 f_CEO 与 f_beat 的常规反馈再把两支共公的剩余光纤相噪一同抵消。
    domain: "光纤频率梳相位工程；差分相位锁定"
    formula: >
      ε_j(t) = [φ_CW(t) + φ_fiber_j(t)] − [φ_CW(t) + φ_fiber_lock(t)]
             = φ_fiber_j(t) − φ_fiber_lock(t)
      （CW 激光相噪作为共模项在相减中消除；FNDC 将 ε_j → 0）
    key_insight: >
      这是把 Ma 1994 / Williams 2008 式"点对点光纤相噪消除"概念下移到了梳的"分支对分支"尺度，
      并巧妙利用公共 CW 参考使得该参考本身的长期稳定度不会成为噪声源。
    conditions:
      - "每支与 CW 参考的拍频 S/N 足以用作误差/参考信号"
      - "支内存在可用于快速相位补偿的光纤长度执行器（如 PZT 拉伸器，带宽 ≳ 100 Hz）"
      - "CW 参考激光在 FNDC 控制带宽内相位连续"
    preconditions:
      - "CEO-锁定支必须完整锁紧（f_CEO 反馈至泵浦 LD）"
      - "CW 参考激光相干时间长于 FNDC 服务环时间常数"
    invalidated_when:
      - "自由空间路径相噪 > 光纤相噪差（此时 FNDC 不再是主导限制）"
      - "PZT 驱动带宽不足以追上支间环境扰动带宽（> 100 Hz 的分量仅被 f_CEO/f_beat 反馈消除）"
    source_claim: >
      "we introduced fiber noise difference cancellation to multi-branch fiber combs.
       We detected and phase-locked the beat notes between the branch outputs and a common
       1542 nm continuous wave laser. A piezo-electric transducer-based fiber stretcher was
       installed in each branch except for the branch used as the cancellation reference."
    breakthrough_paths:
      - direction: meth.fiber_noise_difference_cancellation_k18
        expected_gain: "多分支 Er 梳相对不确定度从 10⁻¹⁸–10⁻¹⁹（应用支 without FNDC）降至 10⁻²⁰ 级"
        status: demonstrated
        source: {zotero_key: "ERNT9GV3", claim: "The cancellation improved the frequency uncertainty to a low level of 10⁻²⁰ at a 100000-s averaging time"}

  - id: pri.residual_free_space_path_noise_floor
    name: "残余自由空间路径相噪地板原理（FNDC 应用后主导长期不稳定）"
    tier: engineering
    verification_status: inferred
    statement: >
      FNDC 能抵消光纤段内的相噪差，但 f_CEO 拍频探测路径与 FNDC 拍频探测路径中仍有若干
      自由空间段落未被伺服覆盖。这些短（数十 cm 量级）但裸露的自由空间光程因环境（气压、温度、
      振动）涨落贡献 mod σ_y ≈ 2×10⁻¹⁷·τ⁻¹/²（Williams 2008），在 τ ≳ 1000 s 时主导长期稳定度。
    domain: "光频比对工程；残余相噪预算"
    formula: "mod σ_y(τ) ≈ 2×10⁻¹⁷ · τ⁻¹/² (covered free-space, 数十 cm)"
    key_insight: "FNDC 做完后，长期地板从'支间光纤差'迁移到'未封装自由空间段'。"
    conditions:
      - "自由空间段长度数十 cm，有外罩但非真空"
      - "FNDC 有效抑制 <100 Hz 的光纤相噪"
    invalidated_when:
      - "将 f_CEO 及 FNDC 探测路径全部封装或置于真空"
      - "采用全光纤化（末端分束 + 全光纤拍频）架构"
    source_claim: >
      "the limitation will be optical path length fluctuation of the uncancelled free-space parts
       caused by the environmental change. Williams et al. reported that the frequency instability
       induced by a covered free space optical path tens of cm in length was 2×10⁻¹⁷ / τ¹ᐟ² ..."

methods:
  - id: meth.fiber_noise_difference_cancellation_k18
    name: "分支间光纤噪声差分消除法（FNDC，Kashiwagi 2018）"
    status: demonstrated
    applies_to: ent.multi_branch_fiber_comb_k18
    steps_summary: >
      1. 取 CEO-锁定支为 FNDC 参考支（其光纤相噪由 f_CEO 反馈在泵浦 LD 上锁紧）；
      2. 将 1542 nm CW 激光分束送入三支，与各支最近梳齿各拍频 → 三路 RF 信号；
      3. "CW ↔ CEO-锁定支梳" 拍频作 FNDC 参考信号；"CW ↔ 第 j 支梳" 拍频作第 j 支误差信号；
      4. 伺服电子学比较参考信号与误差信号相位，驱动第 j 支的鼓型 PZT 光纤拉伸器使差相位 → 0
         （控制带宽 ~100 Hz）；
      5. 并发的 f_CEO（泵浦 LD）与 f_beat（WG-EOM + TEC）反馈回路抵消共公（CEO-锁定支）光纤相噪；
      6. CW 参考激光只需"松锁"至梳，其自身相噪作为共模在两拍频相减中消除。
    required_hardware:
      - ent.multi_branch_fiber_comb_k18
      - ent.pzt_fiber_stretcher_k18
      - ent.fndc_reference_cw_laser_1542nm_k18
    advantages:
      - "保留多分支架构在应用层面（不同波段输出独立可调谱）优势"
      - "相对不确定度达 10⁻²⁰ 级，与单支架构（Ohmae 2017、Leopardi 2017）同量级"
      - "CW 参考激光相噪为共模项，不传入最终比对"
    disadvantages:
      - "整体系统复杂：需额外的 CW 激光、三路拍频探测与三路伺服电子学"
      - "PZT 控制带宽 ~100 Hz → >100 Hz 支间相噪只能靠 f_CEO / f_beat 反馈抑制"
      - "PZT 段因布线难以置于同一隔离盒，增加低频环境噪声入口"
    conditions:
      - "每支与 CW 参考拍频 S/N 足够 (> 20 dB @ 可用带宽)"
      - "CEO-锁定支 f_CEO 已无 cycle slip 锁紧"
    source_claim: >
      "The fiber stretchers installed in the two branches controlled the fiber lengths of the branches
       and cancelled out the phase differences between the reference and the respective error signals.
       Thus, the residual fiber noise was the same in each branch."

metrics:
  - id: met.relative_frequency_instability_allan_k18
    name: "支间相对频率 Allan 偏差（Kashiwagi 2018，FNDC 开启）"
    unit: "无量纲（分数频率稳定度）"
    description: >
      两套准相同多分支 Er 光纤梳输出（1542 nm 拍频-锁定支 / 1700 nm 应用支）在光域直接比对
      得到的相对频率 Allan 偏差；报告值已除以 √2 归一到单梳。
    demonstrated_value:
      value: "1.4×10⁻¹⁶ @1 s（拍频-锁定支，FNDC on）；1.8×10⁻¹⁶ @1 s（应用支，FNDC on）；~10⁻¹⁹ @10000 s"
      conditions: >
        两套共用 1064 nm USL（f_beat）与 1542 nm CW（FNDC）；f_rep=43.4 MHz，两梳 f_beat/f_CEO 反向；
        π-type 无死时间计数器，1 s 门；tracking oscillator 于每路拍频使用。
      verification_status: observed
      confidence: established
      source: {zotero_key: "ERNT9GV3", claim: "1.4×10⁻¹⁶ and 1.8×10⁻¹⁶ at a 1-s averaging time in beat-locking and application branches, respectively"}
    theoretical_floor:
      value: "1-s：50 Hz–1 kHz 电源噪声 → ~8×10⁻¹⁷"
      basis: "相噪 PSD 在 100 Hz–20 kHz 区间积分后除以 √2；FNDC 带宽 ~100 Hz，tracking osc. 带宽 ~20 kHz"
      gap_note: >
        测值 1.4×10⁻¹⁶ 距该估计地板约 2× 差距，作者归因于 PZT 段光纤未完全封装引入的低频环境扰动。

  - id: met.relative_frequency_uncertainty_modallan_k18
    name: "支间相对频率 modified Allan 偏差（长期，Kashiwagi 2018）"
    unit: "无量纲（分数频率稳定度）"
    description: >
      为抑制白相噪贡献，对同一比对序列计算 modified Allan 偏差并外推到超长平均时间。
    demonstrated_value:
      value: "9.7×10⁻²¹ @ 126500 s（mod σ_y）；加权标准差（单梳）1.6×10⁻²⁰"
      conditions: >
        总测量时长 510000 s（mod σ_y 序列）与 600000 s（移动平均序列）；
        除以 √2 归一到单梳。
      verification_status: observed
      confidence: established
      source: {zotero_key: "ERNT9GV3", claim: "The frequency instabilities reached a sub-10⁻²⁰ order (9.7×10⁻²¹) at an averaging time of 126500 s ... a weighted standard deviation for a single comb of 1.6×10⁻²⁰"}
    historical_landmarks:
      first_demonstration:
        value: "多分支光纤梳相对不确定度首次进入 10⁻²⁰ 级"
        year: 2018
        source: {zotero_key: "ERNT9GV3"}
        note: "单支架构此前已达 10⁻²¹–10⁻²⁰（Ohmae 2017 / Leopardi 2017 / Johnson 2015 / Yao 2016）；本文首次在多分支架构做到同级。"
    theoretical_floor:
      value: "未封装自由空间路径 ~2×10⁻¹⁷·τ⁻¹/²（Williams 2008），@1000 s 约 6×10⁻¹⁹"
      basis: "数十 cm 覆盖自由空间段相噪经验值"
