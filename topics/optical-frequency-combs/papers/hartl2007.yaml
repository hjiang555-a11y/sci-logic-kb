principles:
  - id: pri.coherent_pulse_addition_passive_cavity
    name: "飞秒脉冲在被动高精细度腔内的相干叠加增强原理"
    tier: domain
    verification_status: observed
    statement: >
      当飞秒频率梳的重复率 frep 精确锁定至无源腔的自由光谱范围（FSR），且载波包络偏置频率
      f_ceo 位于腔的接受带宽（Δν_cav = FSR/F）以内时，相继脉冲在腔内相干叠加，腔内平均功率
      达到单程注入功率的精细度 F 倍，腔内峰值强度相应增大 ~F 倍（忽略脉冲展宽修正）。
    domain: "非线性光学；腔物理；飞秒激光技术"
    formula: >
      P_intracavity ≈ F/π × P_input（对行波环形腔，假设阻抗匹配）；
      I_peak = P_peak × F / A_focus；
      锁定条件：|frep − FSR| < FSR/F，且 f_ceo 在腔色散容忍范围内
    key_insight: >
      被动腔不需要增益介质即可将 MHz 级重复率光纤梳的脉冲能量提升 ~100-1000 倍，
      使峰值强度进入强场物理（HHG、光电离）所需的 10^13–10^14 W/cm² 范围，
      同时保留原始梳的相干性和重复率。
    conditions: "frep 精确锁定至腔 FSR；f_ceo 在腔接受带宽内；腔损耗低（高精细度）"
    preconditions:
      - "腔镜色散低，使梳线在腔带宽内一致增强"
      - "注入光束模式与腔基模高效匹配"
      - "frep 伺服带宽足够抑制激光/腔的相对相位噪声"
    invalidated_when:
      - "腔镜损伤导致损耗突增，精细度下降"
      - "腔内色散过大，梳线增强不均匀，脉冲压缩失效"
      - "frep/f_ceo 锁定失效（cycle slip）"
    source_claim: >
      "cavity-enhanced femtosecond laser frequency combs ... coherently add the pulses
      of a stabilized frequency comb in a high-finesse passive enhancement cavity"
    open_questions:
      - "腔内高功率等离子体对腔锁定（色散扰动）和腔镜寿命的影响如何量化？"
      - "色散补偿精度对可用精细度上限的限制是否存在基本权衡？"

  - id: pri.hhg_comb_vuv_extension
    name: "腔内 HHG 将频率梳扩展至 VUV/XUV 原理"
    tier: domain
    verification_status: observed
    statement: >
      在腔内高强度聚焦区注入贵气体（Xe、Kr、Ar、He），当峰值强度超过气体的光电离阈值
      (~10^13–10^14 W/cm²)，高次谐波产生（HHG）将基频梳在同一 frep 下相干上转换至
      VUV/XUV 频段，形成 VUV/XUV 频率梳，可用于精密光谱和阿秒科学。
    domain: "强场物理；极端非线性光学；光学频率计量"
    key_insight: >
      MHz 级重复率（136 MHz vs 通常 1–10 kHz）使 HHG 光子通量比传统放大器系统高约 10^5 倍，
      且直接保留原始梳的相干结构，无需额外的 VUV 参考源。
    conditions: >
      腔内峰值强度 >10^13 W/cm²；适当气体压力与焦点位置；
      腔内谐波输出耦合（需Brewster板或薄膜输出耦合器）
    preconditions:
      - "pri.coherent_pulse_addition_passive_cavity 成立（高腔内强度前提）"
      - "腔镜在 VUV/XUV 波段具有足够透射率以提取谐波"
    invalidated_when:
      - "等离子体密度过高，折射率变化破坏相位匹配"
      - "气体吸收在腔内积累，降低精细度"
    source_claim: >
      "the cavity-circulating beam is focused to a 150 µm² spot to generate photoionization
      events in noble gas jets at the 136 MHz repetition rate"
    breakthrough_paths:
      - direction: pri.coherent_pulse_addition_passive_cavity
        expected_gain: "提高腔内强度 → 扩展至更短谐波阶次（软 X 射线）"
        status: proposed
        source: {zotero_key: "H4DKWZWF", claim: "require high-damage-threshold, low-dispersion mirror coatings in order to overcome currently observed sporadic mirror damages"}

  - id: pri.mirror_damage_threshold_limit
    name: "腔镜损伤阈值限制原理（腔增强强场系统）"
    tier: engineering
    verification_status: observed
    statement: >
      在被动增强腔中，腔镜表面承受的峰值强度随腔内功率增强而升高；当腔内峰值强度
      超过腔镜镀层的损伤阈值（~10^11–10^13 W/cm² for standard dielectric coatings）时，
      发生散射损耗突增乃至不可逆损伤，限制可达最高功率增强因子。
    domain: "腔光学；激光损伤物理"
    key_insight: >
      腔镜损伤阈值是腔增强强场系统的硬性上限：提高精细度（更高增强）与避免损伤之间存在根本矛盾，
      需要高损伤阈值低色散镀层的材料/工艺突破才能进一步提升腔内强度。
    conditions: "腔内峰值功率达 100 MW 量级；重复率 100 MHz 级（高平均功率）"
    source_claim: >
      "require high-damage-threshold, low-dispersion mirror coatings in order to overcome
      currently observed sporadic mirror damages"
    breakthrough_paths:
      - direction: meth.intracavity_pdh_frep_lock_h07
        expected_gain: "更精确的腔锁定降低腔内瞬态功率尖峰，减少损伤概率"
        status: proposed
        source: {zotero_key: "H4DKWZWF", claim: "currently observed sporadic mirror damages"}
      - direction: pri.coherent_pulse_addition_passive_cavity
        expected_gain: "采用高损伤阈值低色散宽带镀层，在相同增强下推高损伤阈值边界"
        status: proposed
        source: {zotero_key: "H4DKWZWF", claim: "high-damage-threshold, low-dispersion mirror coatings"}

methods:
  - id: meth.intracavity_pdh_frep_lock_h07
    name: "PDH 腔锁频（frep → FSR）与 f_ceo 双路稳频方法（Hartl 2007）"
    status: demonstrated
    applies_to: ent.cavity_enhanced_yb_comb_h07
    steps_summary: >
      1. 使用 PDH 误差信号将振荡器 frep 锁定至增强腔 FSR：
         快路：腔外 PZT（带宽 70 kHz）；慢路：腔内光纤拉伸器（带宽 1 kHz）；
      2. f_ceo 稳定：慢路通过调节振荡器温度；
         快路通过调制泵浦功率（高带宽 f_ceo 控制）；
      3. 腔内光电离事件（Xe、Kr、Ar、He）在 136 MHz 重复率下持续产生，
         验证系统高稳定运行。
    required_hardware:
      - ent.passive_buildup_cavity_h07
      - ent.yb_similariton_cpa_h07
    conditions:
      - "PZT 伺服带宽 70 kHz 足以抑制腔-激光相对路径噪声"
      - "f_ceo 慢锁温度控制 + 泵浦调制兼顾长期稳定与快速响应"
    source_claim: >
      "frep is phase-locked to the cavity FSR via a piezo (70 kHz bandwidth)
      and a fiber stretcher (1 kHz bandwidth)"

