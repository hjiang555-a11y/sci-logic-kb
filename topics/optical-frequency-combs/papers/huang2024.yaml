principles:
  - id: pri.comb_calibrated_fmcw_frequency_linearity
    name: "光频梳实时校准 FMCW 调频线性度原理"
    tier: engineering
    verification_status: observed
    statement: >
      FMCW 距离分辨率与调频线性度直接相关：Δz ∝ c/(2·Δν_eff)，非线性调频会导致
      距离-频率映射弥散。光频梳提供已知频率坐标栅格（间距 = f_rep），
      将 FMCW 激光实时差频至梳上可重建真实 ν(t) 轨迹并软件反卷积补偿，
      使等效带宽利用率接近 100%，提升 SNR ≈5 dB 并把时间分辨逼近光梳齿定义精度。
    domain: "相干 LIDAR；FMCW 校准"
    formula: "Δz = c/(2·Δν_eff)，Δν_eff = 实际扫描带宽，梳校准提升 Δν_eff 有效利用率"
    key_insight: >
      把光频梳从"光钟专属"重定位为"FMCW 通用频率标尺"，
      打开光梳在相干 LIDAR/成像/测振领域的新应用面。
    conditions: "光梳带宽覆盖 FMCW 扫描范围；拍频检测 SNR 足够"
    invalidated_when:
      - "FMCW 扫描带宽远超梳覆盖"
      - "梳 f_rep 与扫描速率不匹配导致混叠"
    source_claim: >
      "the coherent scheme—frequency-modulated continuous wave calibrated by optical frequency
      comb—for high-resolution NLOS imaging, velocimetry, and vibrometry"

methods:
  - id: meth.comb_calibrated_fmcw_nlos_imaging
    name: "光梳校准 FMCW NLOS 成像方法"
    status: demonstrated
    applies_to: ent.comb_calibrated_fmcw_nlos_sensor_h24
    steps_summary: >
      1. FMCW 激光扫描 → 照射中继漫射面（NLOS 几何）；
      2. 收集漫射回波 + 本振干涉；
      3. 光频梳作参考实时测 FMCW ν(t) 非线性；
      4. 软件反卷积重建正确 τ-ν 映射；
      5. 逆向散射算法重建隐藏场景 3D 结构；
      6. 对同一像素多帧相位 → 振动测量。
    required_hardware:
      - ent.comb_calibrated_fmcw_nlos_sensor_h24
    advantages:
      - "NLOS 亚毫米定位"
      - "NLOS 测振数十 Hz 精度"
      - "强环境光下仍有效"
      - "SNR 5 dB 提升"
    disadvantages:
      - "需宽带梳覆盖 FMCW 扫描"
      - "多次漫反射信号弱，采集时间长"

