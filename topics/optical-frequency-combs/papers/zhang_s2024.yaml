principles:
  - id: pri.gated_detection_phase_coherent_snr_enhancement_z24
    name: "门控探测利用梳齿相位相干性增强 SNR 原理（Zhang S. 2024）"
    tier: engineering
    verification_status: observed
    statement: >
      频率梳齿之间存在高相位相关（共享 fceo + n·frep），而探测器噪声（shot noise / 热噪声 / 电噪声）在时间域随机分布。
      通过在脉冲到达时刻打开"门控"（gate）探测窗口（短时采样），仅积累相干信号能量，同时抑制门控窗口外的
      非相干噪声——相当于提高"有效占空比"下的信噪比。关键在于：
      (a) 门控时延必须与脉冲到达时刻精确对齐（可调延迟脉冲发生器）；
      (b) 门控器件本身引入的噪声必须低于传统探测器（本工作采用自制低噪声电路）；
      (c) 平衡探测可进一步抑制共模光强噪声（RIN / ASE）。
    domain: "光电探测技术；精密计量信号处理"
    key_insight: >
      "门控探测的 SNR 增益与梳齿相位相干时间有关——对于稳频梳，相干时间可达毫秒级，
      远超门控窗口（纳秒级），故噪声抑制倍数巨大"——这使得单齿功率受限的梳（如空间应用 / 辐射环境）
      仍能获得高 SNR 拍频。
    formula: "SNR_gated ≈ SNR_direct × sqrt(N_comb) / sqrt(duty_cycle) × noise_suppression_factor"
    conditions: "稳频梳（fceo + frep 锁定）；高相位相干性；门控器件低噪声；时延精确对准"
    source_claim: >
      "Leveraging this characteristic [phase correlation between teeth], Deschênes et al. proposed a gated-detection scheme to increase the energy-utilization efficiency of the frequency comb and suppress the noise in the raw beat note."

