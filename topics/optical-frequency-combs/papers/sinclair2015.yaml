principles:
  - id: pri.pm_fiber_digital_feedback_phase_slip_free_s15
    name: "全 PM 光纤 + 数字反馈实现长期无相位滑动原理（Sinclair 2015）"
    tier: engineering
    verification_status: observed
    statement: >
      通过高 SNR 控制信号（fceo / frep 探测）+ 数字 PLL（FPGA 实现）+ 全 PM 光纤（免偏振漂移），
      可在移动平台振动环境下维持频率梳 >90 小时无 phase slip（即 frep / fceo 反馈环路持续相位锁定，无周期跳变）。
      关键在于：(a) PM 光纤消除环境偏振漂移导致的模式跳变；(b) SESAM 自启锁模（无需 NPR 调校）；
      (c) 数字 PLL 自适应增益调整 + 高动态范围（14-bit DAC）。
    domain: "鲁棒性光频梳工程；移动计量平台"
    key_insight: >
      "Phase-slip free 是时间频率传递应用的关键指标——单次 phase slip（2π 跳变）会导致积分频率计数错误，
      无法通过事后校准完全消除"——NIST 该方案通过 SNR 主导设计（而非单纯追求最低相噪）达成。
    conditions: "全 PM 光纤 + SESAM / NALM 锁模；数字 PLL；高 SNR fceo / frep 探测（> 35 dB）"
    source_claim: >
      "Digital control enables phase coherent operation for over 90 h, critical for phase-sensitive applications such as timekeeping. We show that this phase-slip free operation follows the fundamental limit set by the SNR of the control signals."

