  doi: "10.1063/1.4928163"
  note: >
    [Invited Article / 综合技术论文] NIST Boulder。综述并详细描述 NIST 团队开发的紧凑全 PM 光纤频率梳
    （~1 liter 体积，200 MHz frep，笔记本大小），专为移动平台、野外应用设计：
    (1) 全 PM 光纤 + SESAM 锁模 → 免对准、抗环境扰动；
    (2) 高 SNR 控制信号 + 数字反馈 → 相位相干锁定 >90 小时（无 phase slip）；
    (3) 脉间时间抖动 < 3 fs（适用于绝大多数频率梳应用）；
    (4) 三台几乎相同的梳性能指标一致（可重复性）；
    (5) 应用场景：痕量气体探测、激光雷达、时频传递。
    本文不报告新的性能突破（稳定度 / 相噪 / SNR 与先前 NIST 工作同级），主要整合并公开详细设计规范，
    使社区可复制——定位为 framework（工程指南 + 复现基准）。对齐 v2 子域主线：A1-Robust（紧凑/移动/鲁棒性）。

