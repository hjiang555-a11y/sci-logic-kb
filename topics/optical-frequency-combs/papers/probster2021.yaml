principles:
  - id: pri.dual_comb_mode_number_self_determination
    name: "双梳自主模式数确定原理"
    tier: engineering
    verification_status: observed
    statement: >
      若已知两梳 f_rep 与 f_CEO 与拍频频率，可对同一未知光频同时建立两个独立方程
      ν = n₁·f_rep1 + f_ceo1 ± f_bep1 = n₂·f_rep2 + f_ceo2 ± f_bep2，
      通过 (n₁, n₂) 整数解的唯一性自主确定光学模式数；在空间应用中不需 wavemeter。
    domain: "双梳；光频计量"
    formula: "联立两梳方程的整数最小残差唯一确定 (n₁, n₂)"
    key_insight: >
      双梳不只是冗余备份，还是消除对 wavemeter 依赖的必要几何手段，
      适合无人空间载荷的全自主运行。
    conditions: "两梳 f_rep 有足够差分；f_CEO、f_bep 都被精确测量"

methods:
  - id: meth.space_qualified_comb_integration
    name: "空间兼容光梳载荷集成方法"
    status: demonstrated
    applies_to: ent.fokus_ii_space_dual_comb_p21
    steps_summary: >
      1. NOLM 光纤激光器（相位噪声低、锁模稳）集成于真空兼容机架；
      2. 双梳冗余 + 自主模式数判定；
      3. 与 JOKARUS 碘 cw 标准通过光纤耦合；
      4. TEXUS 探空火箭零重力飞行验证全系统；
      5. 评估飞行过程中锁模、f-2f、模式数判定稳定性。
    required_hardware:
      - ent.fokus_ii_space_dual_comb_p21
    advantages:
      - "TRL 向空间应用推进"
      - "双梳冗余 + 自主判定"
      - "真空 / 零重力兼容"
    disadvantages:
      - "仍需优化长期辐射环境耐受性"

