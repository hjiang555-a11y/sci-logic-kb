principles:
  - id: pri.hybrid_ofd_slco_noise_complementarity
    name: "OFD+SLCO混合振荡器噪声互补原理"
    tier: domain
    verification_status: observed
    statement: >
      光频除法器（OFD）在接近载波偏移频率处具有极低相位噪声（源自超稳光学腔），
      但受光电探测散粒噪声限制，远端偏移噪声底约−153 dBc/Hz，难以进一步降低。
      室温蓝宝石腔振荡器（SLCO）热噪声底可达约−190 dBc/Hz（远端偏移），
      但接近载波噪声较高。将SLCO锁定至OFD信号可取二者互补，
      在全谱范围（1 Hz–5 GHz）实现最优噪声性能，单台振荡器时序抖动420 as。
    domain: "光子微波生成 / 振荡器技术"
    key_insight: >
      散粒噪声是OFD在高偏移频率处的基本限制；SLCO提供更低的热噪声底，
      混合锁定消除了二者各自的缺陷频段。
    conditions: "SLCO控制带宽需覆盖OFD的散粒噪声超越点（>10 kHz）"
    source:
      zotero_key: "PJEYSD8M"
      claim: >
        "we circumvent this limit by disciplining a room temperature sapphire loaded cavity
        oscillator (SLCO) to the microwave signal generated via optical frequency division"

