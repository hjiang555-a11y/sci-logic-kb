entities:
  - id: ent.integrated_ofc_synthesizer_spencer2018
    name: "集成光子学光频合成器（Spencer 2018）"
    hierarchy_level: 2
    status: demonstrated
    function: >
      基于芯片集成的DKS双梳（Si₃N₄ THz梳 + SiO₂ 22 GHz梳）和III-V/Si可调谐激光器，
      将10 MHz微波钟相干倍频至光频，输出覆盖C波段4 THz、频率分辨率1 Hz的稳定光信号。

  - id: ent.sin_thz_kerr_comb
    name: "Si₃N₄ 1 THz间距微腔梳"
    hierarchy_level: 2
    status: demonstrated
    function: >
      八倍频程展宽的Si₃N₄微腔DKS梳，重复频率约1 THz，用于f-2f自参考锁定载波包络
      偏频f_ceo，为合成器提供光频刻度锁定。

  - id: ent.sio2_22ghz_kerr_comb
    name: "SiO₂楔形微腔22 GHz梳"
    hierarchy_level: 2
    status: demonstrated
    function: >
      SiO₂楔形WGM微腔DKS梳，重复频率22 GHz（Q≈1.8×10⁸），锁定至射频时钟，
      为C波段可调谐激光器提供密集梳齿参考网格。

  - id: ent.iii_v_si_tunable_laser
    name: "III-V/Si异质集成可调谐激光器"
    hierarchy_level: 2
    status: demonstrated
    function: >
      基于III-V增益芯片与硅光波导异质集成的窄线宽可调谐CW激光器，输出C波段
      1520–1580 nm，被相位锁定至DKS双梳，作为合成器的最终输出端口。

principles:
  - id: pri.integrated_ofc_synthesis_chain
    name: "集成光子学微波-光频相干倍频链原理"
    tier: domain
    verification_status: observed
    statement: >
      通过将射频时钟（10 MHz）相位相干地倍增至光频，可在单芯片架构中实现光频合成。
      具体路径：射频钟 → 锁定DKS梳重复频率(f_rep,GHz) → 锁定DKS梳载波包络偏频(f_ceo,THz)
      → 锁定可调谐激光输出 → 总倍频因子约19,403,904，覆盖C波段4 THz。
      集成光子学使毫瓦级泵浦功率即可产生梳，芯片尺寸大幅缩小。
    domain: "光频计量 / 集成光子学"
    key_insight: >
      利用Si₃N₄八倍频程梳实现f-2f自参考，结合SiO₂ 22 GHz梳密集参考网格，无需外置
      光纤梳即可完成从微波到光频的完整相干链。
    conditions: "需要octave-spanning DKS梳及低相位噪声射频基准"
    source:
      zotero_key: "4I37D6SD"
      claim: >
        "we establish the precise factor of 19,403,904 phase-coherent multiplication from
        10 MHz to the optical domain"

methods:
  - id: meth.dual_dks_synthesizer
    name: "DKS双梳光频合成法"
    status: demonstrated
    steps_summary: >
      1) 用泵浦激光器激发Si₃N₄微腔产生1 THz间距DKS梳（八倍频程）；
      2) 将22 GHz SiO₂梳的f_rep锁定至10 MHz射频钟；
      3) 利用PPLN倍频+拍频锁定Si₃N₄梳的f_ceo；
      4) 将III-V/Si可调谐激光器相位锁定至22 GHz梳模式；
      5) FPGA查找表编程设定输出频率，步进精度1 Hz。
    source_claim: >
      "By phase-stabilizing both comb spacings (f_rep,THz and f_rep,GHz) and the silicon
      nitride comb's offset frequency, f_ceo,THz, we establish the precise factor of
      19,403,904 phase-coherent multiplication from 10 MHz to the optical domain."

