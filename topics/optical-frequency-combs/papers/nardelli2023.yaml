principles:
  - id: pri.er_yb_co_doping_pump_noise_suppression_n23
    name: "Er/Yb 共掺杂抑制泵浦强度噪声耦合原理（Nardelli 2023）"
    tier: engineering
    verification_status: observed
    statement: >
      Er³⁺ 对 980 nm 吸收弱，Yb³⁺ 吸收强；共掺杂后能量转移链路为"980 nm → Yb³⁺ excited (⁴F₅/₂) → Er³⁺ excited (⁴I₁₁/₂) → Er³⁺ laser state (⁴I₁₃/₂) → 1550 nm"。
      Yb³⁺ 作为中间缓冲层，高频泵浦 RIN 被长寿命增益介质平滑（τ_upper ~ 7.9 ms），对 fceo 高频噪声耦合低于
      单掺 Er:fiber 平台。同时磷酸盐玻璃高声子能量使 ⁴I₁₁/₂ 寿命缩短至 2-3 µs，降低 Er→Yb 逆转移，提高泵浦效率。
    domain: "固体激光增益介质；锁模激光动力学"
    key_insight: >
      "Er/Yb:glass 梳的低固有噪声既源于低腔损（自由空间对准，非光纤拼接损耗），
      也源于增益介质本身的能量转移路径对泵浦 RIN 的高频滤波效应"——这使其达到 Ti:sapph 同级稳定度，
      但无需 Ti:sapph 的高功率可见光泵浦（532 nm，昂贵）。
    conditions: "Er/Yb 共掺杂磷酸盐玻璃；980 nm 二极管泵浦；腔长足够长（500 MHz 量级，非 GHz 级紧腔）"
    source_claim: >
      "The laser also exhibits low intrinsic noise due, in part, to the low intra-cavity loss and the co-doping of Er and Yb that suppresses high-frequency pump intensity noise."

methods:
  - id: meth.dual_usl_locked_er_yb_glass_comb_n23
    name: "Er/Yb:glass 梳双超稳激光锁定方法（Nardelli 2023）"
    status: demonstrated
    applies_to: ent.er_yb_glass_comb_nardelli23
    steps_summary: >
      1. Er/Yb:glass 振荡器 SESAM 自启锁模 → 500 MHz 脉冲序列；
      2. EDFA 放大 + HNLF 非线性展宽至倍频程 → f-2f 干涉仪测 fceo；
      3. 1070 nm 超稳激光与梳齿拍频，PLL 锁 frep（腔长 PZT）；
      4. 1157 nm 超稳激光与梳齿拍频，PLL 锁 fceo（泵浦功率调制）；
      5. 高速光电二极管探测 500 MHz 梳重频 → 光生微波输出；
      6. 两路拍频与超稳激光比对，Allan 偏差 <10⁻¹⁸ @ 1 s。
    required_hardware:
      - "Er/Yb:glass 振荡器 + SESAM + 980 nm 泵浦"
      - "EDFA + HNLF + f-2f 干涉仪"
      - "两台超稳激光（1157 nm / 1070 nm）"
      - "双 PLL 伺服（PZT + 泵浦功率调制）"
    advantages:
      - "SESAM 自启，无需 NPR/NALM 的偏振调校"
      - "500 MHz frep 高于典型 Er:fiber（100-200 MHz），拍频 SNR 更好"
      - "固有噪声低（co-doping + 低腔损），与 Ti:sapph 同级但泵浦简单（980 nm 二极管）"
    disadvantages:
      - "磷酸盐玻璃热损伤阈值低，泵浦功率受限"
      - "500 MHz frep 仍低于 Ti:sapph 10 GHz 级高重频方案"

