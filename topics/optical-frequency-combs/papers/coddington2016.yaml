  year: 2016
  first_author: Coddington
  journal: Optica
  volume: 3
  issue: 4
  pages: 414-426
  doi: 10.1364/OPTICA.3.000414
  note: '[综述论文 / 应用层子类框架文档] NIST Coddington, Newbury, Swann 团队 2016 年 Optica 综述。 在
    Picqué 2019 定义的六大光谱方法中，双梳光谱是覆盖波段最广、发展最迅速的子类。 产生 RF 梳，将光学谱以压缩因子 m = f_rep/Δf_rep
    映射到射频域； (2) 阐明互相干（mutual coherence）要求——两梳相对线宽须远小于 Δf_rep； (3) 给出 SNR 标度律 SNR ≈
    √(τ·n_comb)/M（散粒噪声极限）； (4) 对比 FTIR：无移动部件、微秒级采集、Hz 级频率精度、激光源亮度优势； (5) 总结三类实现：自由运行梳、互相干梳、全参考梳；
    (6) 覆盖近红外、中红外、远红外、THz 各波段 DCS 演示。 ent.optical_frequency_comb 定义于 giunta2019.yaml；pri.self_referencing_f2f
    定义于 giunta2019.yaml。

    '

# Schema版本：v4.1
entities:
- id: ent.dual_comb_spectrometer
  name: 双梳光谱仪
  aliases:
  - dual-comb spectrometer
  - DCS system
  - multiheterodyne spectrometer
  - dual-comb spectroscopy system
  hierarchy_level: 1
  status: demonstrated
  function: '基于两个重复频率略不同（Δf_rep）的光学频率梳的宽带光谱测量系统。 两梳干涉在单个光电探测器上产生 RF 梳，将光学频谱以压缩因子 m
    = f_rep/Δf_rep （典型值 3×10⁴–10⁶）映射至射频域，实现无需色散光谱仪或机械干涉仪的 宽带高分辨率光谱测量。频率分辨率由单根梳齿线宽（kHz–MHz）决定，
    频率精度继承梳齿的绝对频率标定（Hz 级），采集速度可达微秒量级。

    '
  key_parameters:
    operating_principle: 多外差拍频：两梳光学齿逐对拍频生成 RF 梳
    compression_factor: m = f_rep/Δf_rep，典型 3×10⁴–10⁶
    rf_comb_spacing: Δf_rep（典型 100 Hz–1 kHz，可变）
    spectral_coverage: 近红外覆盖 >100 THz（展宽后），中红外/远红外持续扩展
    acquisition_time: 单次干涉图 ~1/Δf_rep（ms 量级），窄带可达 <1 μs
    spectral_elements: '>10⁵ 同时测量的光谱通道'
    nyquist_constraint: Δν ≤ f_rep²/(2·Δf_rep)
    detection: 单光电探测器 + RF 电子学
    configurations: 色散型（单梳过样品）或对称型（双梳过样品）
  note: 'Level 1 实体节点。DCS 是频率梳最广泛应用的宽带光谱技术。 与 FTIR 竞争：无移动部件、更高频率精度、更快采集速度， 但光谱覆盖范围目前仍不及传统
    FTIR。

    '
- id: ent.ftir_spectrometer
  name: 傅里叶变换红外光谱仪
  aliases:
  - FTIR
  - Fourier-transform infrared spectrometer
  - FTS
  hierarchy_level: 1
  status: demonstrated
  function: '基于迈克尔逊干涉仪的经典宽带光谱仪。通过机械移动反射镜扫描光程差， 记录干涉图后傅里叶变换获得光谱。使用热光源（黑体辐射）， 光谱覆盖范围极宽（近红外到远红外），是分析化学和分子光谱的标准工具。

    '
  key_parameters:
    light_source: 热光源（黑体辐射，非相干）
    resolution_limit: 由最大光程差决定，典型 0.001–1 cm⁻¹
    moving_parts: 需要精密扫描反射镜（机械干涉仪）
    spectral_coverage: 极宽（近红外至远红外全覆盖）
    frequency_accuracy: 受仪器标定限制
  note: 'Level 1 实体节点，作为 DCS 的主要竞争方案。 本文明确将 DCS 与 FTIR 进行系统比较，DCS 在分辨率、精度和速度上有优势，
    FTIR 在光谱覆盖范围上仍占优。

    '
principles:
- id: pri.dual_comb_multiheterodyne_detection
  name: 双梳多外差检测原理
  tier: domain
  verification_status: observed
  statement: '两个重复频率分别为 f_rep 和 f_rep + Δf_rep 的光学频率梳在光电探测器上干涉时， 每对光学梳齿（频率差为 n·Δf_rep）产生一个独立的射频拍频信号。
    所有拍频信号构成 RF 梳，间距为 Δf_rep，将光学频谱以压缩因子 m = f_rep/Δf_rep 映射至射频域。光学带宽 Δν 的信息被压缩至 Δν/m
    的 RF 带宽内。 Nyquist 条件要求 Δν ≤ f_rep²/(2·Δf_rep) 以避免 RF 混叠。 时域等价描述：一个梳的飞秒脉冲以有效时间步长
    ΔT ≈ 1/(m·f_rep) 异步采样 另一个梳的脉冲序列，产生类似 FTIR 干涉图的降采样波形。

    '
  domain: 光学频率梳，宽带光谱学
  formula: 'RF 梳齿频率：f_RF,n = n·Δf_rep； 压缩因子：m = f_rep/Δf_rep； Nyquist 约束：Δν ≤ f_rep²/(2·Δf_rep)；
    有效时间步长：ΔT = Δf_rep/(f_rep·(f_rep+Δf_rep)) ≈ 1/(m·f_rep)

    '
  key_insight: 'DCS 将宽带光学频谱（~THz–100 THz）通过两梳异步拍频无损映射至 RF 域（~MHz）， 用单个光电探测器即可同时分辨
    >10⁵ 根梳齿，无需色散光谱仪或机械扫描。

    '
  conditions: '两梳须维持互相干；Δf_rep 须足够小以满足 Nyquist 约束； 光电探测器须有足够带宽和线性度

    '
  preconditions:
  - 两个频率梳须具有高度相似的梳齿结构（均为等间距）
  - 光电探测器带宽须 ≥ f_rep/2
  - RF 数字化系统须支持 ≥ f_rep 采样率
  invalidated_when:
  - 两梳相对线宽 > Δf_rep（退化为自由运行模式，丧失梳齿分辨能力）
  - 光学带宽 > f_rep²/(2·Δf_rep)（RF 混叠，一对一映射破坏）
  source_claim: '"DCS effectively maps the optical spectrum of width, Δν, to an rf
    spectrum of width, Δν/m, where m = f_r/Δf_r. Here, f_r is the comb repetition
    frequency and Δf_r is the repetition frequency difference between the two combs.
    Compression factors m of 30,000–1,000,000 are common, and several hundred thousand
    comb teeth, spanning tens to hundreds of THz, can be mapped into a 100 MHz rf
    band and digitized."

    '
  open_questions:
  - 能否通过 I/Q 检测将 Nyquist 带宽翻倍，实现更宽光学覆盖？
  - 微腔/EOM 梳的高重复频率（>10 GHz）能否在牺牲光谱密度的同时实现 <1 μs 超快采集？
- id: pri.mutual_coherence_requirement
  name: 双梳互相干要求
  tier: domain
  verification_status: observed
  statement: 'DCS 要求两个频率梳在测量时间内维持足够的互相干性——即两梳的相对光学线宽 须远小于 RF 梳间距 Δf_rep。若相对线宽 > Δf_rep，RF
    梳齿重叠， 丧失单根梳齿分辨能力，退化为低分辨模式。互相干时间决定最大有效平均时间 τ， 从而限制 SNR（SNR ∝ √τ）。实现互相干的三种途径： (1)
    主动相位/定时反馈——两梳锁定至共同 CW 激光参考； (2) 数字相位/定时校正——记录误差信号，后处理重采样； (3) 模拟自适应采样——模拟电子学实时校正载波相位和采样时钟。

    '
  domain: 双梳光谱，相干光学测量
  formula: '互相干条件：δν_relative ≪ Δf_rep； 最大有效平均时间 τ_max ≈ 1/δν_relative； SNR 标度律：SNR
    ∝ √τ（在互相干时间内）

    '
  key_insight: '互相干是 DCS 从"概念验证"升级为"高 SNR 精密测量工具"的关键瓶颈。 三种实现途径在实验复杂度与校正精度之间权衡。

    '
  conditions: '适用于所有 DCS 实现（近红外、中红外、THz）； THz 和 EOM 梳因长波长/共源天然具有更好的互相干性

    '
  preconditions:
  - 须有共同参考源（如两根 CW 激光或单腔稳频激光）用于比较两梳的相位/定时
  - 数字校正方案须有足够快的 ADC 和 FPGA 实时处理能力
  invalidated_when:
  - 单次采集 SNR 已足够（如极短测量时间 <1/Δf_rep，无需多次平均）
  source_claim: '"DCS ''doubles'' that challenge by requiring two such combs with
    high mutual coherence. In practice, DCS has been demonstrated over a wide range
    of frequency comb performance. Coarsely, DCS demonstrations can be broken into
    three categories: free-running combs, mutually coherent combs, and fully referenced
    combs."

    '
  open_questions:
  - 单腔双梳（dual-comb from a single laser cavity）能否完全消除互相干问题？
  - 数字校正的有效带宽能否扩展至处理 >10 GHz 重复频率梳的相位噪声？
methods:
- id: meth.dual_comb_spectroscopy
  name: 双梳光谱方法
  status: demonstrated
  applies_to: ent.dual_comb_spectrometer
  steps_summary: '1. 两个频率梳（f_rep 和 f_rep+Δf_rep）经同一样品路径或色散/对称配置照射样品 → 2. 样品的吸收/色散响应编码在梳光上
    → 3. 信号梳与本振梳在光电探测器上拍频，生成 RF 梳 → 4. 数字化 RF 梳信号（采样率 ≥ f_rep），傅里叶变换获得 RF 频谱 → 5.
    归一化（除以无样品参考谱），获得样品线性响应（幅度+相位） → 6. 可选：相干叠加多次干涉图以提升 SNR

    '
  required_hardware:
  - ent.optical_frequency_comb
  - ent.dual_comb_spectrometer
  advantages:
  - 无移动部件（机械干涉仪被两个频率梳取代）
  - 微秒级单次采集速度（1/Δf_rep）
  - 频率分辨率由梳齿线宽决定（kHz–MHz），远优于 FTIR 仪器分辨率
  - 频率精度继承梳齿绝对标定（Hz 级），可溯源至频率标准
  - 激光源亮度：单空间模式输出，支持长光程高灵敏度测量
  - 同时测量吸收和色散（色散配置）
  disadvantages:
  - 需要两个高度相干的频率梳（系统复杂度和成本高）
  - 光谱覆盖范围目前不及 FTIR（尤其在中红外/远红外）
  - 单探测器多路复用惩罚：SNR ∝ 1/M（M 为光谱元素数）
  - 需要高动态范围光电探测器以避免非线性失真
  - 光谱归一化困难：梳齿功率可有 >20 dB 变化
  conditions:
  - 两梳须维持互相干（主动锁定或后处理校正）
  - 光学带宽须满足 Nyquist 约束：Δν ≤ f_rep²/(2·Δf_rep)
  - 光电探测器须有足够线性度和动态范围
  source_claim: '"Dual-comb spectroscopy is an emerging new spectroscopic tool that
    exploits the frequency resolution, frequency accuracy, broad bandwidth, and brightness
    of frequency combs for ultrahigh-resolution, high-sensitivity broadband spectroscopy."

    '
- id: meth.adaptive_sampling_correction
  name: 自适应采样校正方法
  status: demonstrated
  applies_to: ent.dual_comb_spectrometer
  steps_summary: '1. 两梳各自与一对共同 CW 参考激光拍频，生成误差信号 → 2a. 数字方案：误差信号与干涉图同步数字化，后处理重采样消除载波相位噪声和定时抖动
    → 2b. 模拟方案：误差信号驱动模拟电子学，实时校正载波相位并调整 ADC 采样时钟 → 3. 校正后干涉图可长时间相干叠加（小时至天），SNR 线性增长（∝
    √τ） → 4. FPGA 实时实现：可达 24 小时连续相干平均，SNR 达 316,000

    '
  required_hardware:
  - ent.optical_frequency_comb
  - ent.dual_comb_spectrometer
  advantages:
  - 数字校正避免高带宽主动反馈的实验困难
  - 允许无限长相干平均（已演示连续 24 小时和 3 天）
  - FPGA 实时处理：数据量压缩 100–1000 倍，解决存储瓶颈
  - 记录 figure of merit ~2×10⁸ Hz^(1/2)，超越所有其他技术
  disadvantages:
  - 仍需低带宽主动反馈保持信号在有用频率窗口内
  - 需要高速 ADC 和 FPGA 硬件
  - 模拟方案的校正精度不及数字方案
  conditions:
  - 需要两根共同 CW 参考激光（间隔数 THz）用于误差信号生成
  - 数字化系统须支持 ≥ f_rep 采样率的多通道同步采集
  source_claim: '"References [42,44] developed an analog adaptive sampling approach
    that also leads to tooth-resolved spectra and is more accessible to many laboratories...
    the digital phase/timing correction approach to full coherent averaging is particularly
    attractive, as it combines all of the processing above on a single real-time platform
    and with high effective correction bandwidths."

    '
