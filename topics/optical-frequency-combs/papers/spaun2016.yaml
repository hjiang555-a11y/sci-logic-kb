principles:
  - id: pri.buffer_gas_cooling_spectral_simplification_s16
    name: "缓冲气体冷却简化复杂分子光谱原理（Spaun 2016）"
    tier: domain
    verification_status: observed
    statement: >
      "室温下复杂分子（>10 原子）占据数百万振转态（Boltzmann 分布），
      吸收谱线高度重叠 → 不可分辨、不可赋值。通过缓冲气体冷却（He 背景气，~10 K），
      分子振转能级布居塌缩至最低几个态（T ∝ exp(-E/kT)），谱线数降低 ~10⁵ 倍；
      同时 Doppler 展宽降低 √(T_cold/T_hot) ~ √30 倍 → 谱线窄化、峰值增强、分辨率提升 >100 倍。"
      Spaun 2016 证明：结合腔增强梳光谱（灵敏度增益 ~10⁴），
      可在 ~10 K 连续冷样品中实现 ~50 kHz 分辨率的复杂分子红外谱——突破室温光谱"不可解析"限制。
    domain: "低温分子物理；高分辨红外光谱；缓冲气体冷却技术"
    key_insight: >
      复杂分子光谱学的核心瓶颈不是仪器分辨率（腔增强梳已达 kHz 级），
      而是"谱线拥挤"（Boltzmann 分布 + Doppler 展宽 → 室温下不可解析）——
      冷却是根本解法（布居塌缩 + Doppler 窄化），比"超高分辨仪器"或"多光子选择规则"更直接。
    conditions: >
      需缓冲气体冷却池（He 流，~10 K，连续运行）；需腔增强梳光谱系统（高精细度腔 + 中红外梳）；
      需精密腔锁（f_rep 整数倍匹配 FSR）；需低振动环境（腔稳定度维持）。
    formula: >
      Doppler FWHM ∝ √T；振转态布居 ∝ exp(-E_rot/kT)（塌缩至基态）；
      谱线分辨率提升因子 ~ √(T_hot/T_cold) × (态数降低因子) ~ 10²–10³
    source:
      zotero_key: "NNLDMCDD"
      claim: >
        "Targeting more complex molecules requires methods that can record broadband infrared spectra 
        with both high resolution and high sensitivity. However, infrared spectroscopic techniques have hitherto been limited 
        either by narrow bandwidth and long acquisition time, or by low sensitivity and resolution. 
        ...Here we show that this problem can be overcome by using buffer gas cooling to produce continuous, cold samples 
        of molecules that are then subjected to CE-DFCS."
    breakthrough_paths:
      - step: 1
        entity: pri.cavity_enhanced_comb_spectroscopy
        context: "腔增强频率梳光谱原理：高精细度腔增强吸收路径 ~4 个数量级（跨文件引用 picque2019.yaml）"
      - step: 2
        entity: pri.buffer_gas_cooling_spectral_simplification_s16
        context: "缓冲气体冷却简化谱线原理：~10 K 冷却 → 振转态布居塌缩 + Doppler 窄化 → 谱线分辨率提升 >100 倍"
      - step: 3
        entity: ent.cedcs_cold_molecule_system_s16
        context: "应用该组合原理实现首个连续冷分子腔增强梳光谱（世界首次，2016），演示硝基甲烷/萘等复杂分子高分辨红外谱"

