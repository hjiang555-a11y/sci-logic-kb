paper_id: matsas1992
title: "Selfstarting passively mode-locked fibre ring soliton laser exploiting nonlinear polarisation rotation"
authors: [V. J. Matsas, T. P. Newson, D. J. Richardson, D. N. Payne]
year: 1992
journal: "Electronics Letters"
volume: 28
issue: 15
pages: "1391-1393"
doi: null
contribution_type: breakthrough
abstract: >-
  Nonlinear birefringence effects in a fibre ring laser cavity have been exploited
  to produce selfstarting, passive modelocking to give 1.5 ps soliton pulses.
  The study demonstrates a self-starting passively mode-locked erbium-doped fibre laser (EDFL)
  using nonlinear polarisation rotation (NPR) in a multibeatlength regime to generate
  fundamental solitons.

