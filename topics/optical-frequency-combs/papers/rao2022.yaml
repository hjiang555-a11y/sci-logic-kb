    (4) 应用：CO / CH₄ 等分子吸收光谱测量（CRDS 技术）。 本工作是多支路光纤梳 CRDS 应用演示（8 波长并行输出），未刷新跨平台技术指标，归 evidence。 对齐 v2 子域主线：B-Spectro（频率梳光谱学应用）。
