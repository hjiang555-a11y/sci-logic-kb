  name: 痕量气体检测灵敏度
  unit: ppb（体积混合比）或 cm⁻¹（最小可探测吸收系数）
  description: '中红外频率梳光谱系统对痕量气体的检测灵敏度。 受限于单梳齿功率、有效吸收路径长度和探测器噪声。 腔增强技术可提升灵敏度数千倍。

    '
  demonstrated_value:
    value: ~1 ppb（H₂O₂ @ ~3.75 μm，腔增强频率梳傅里叶变换光谱）
    conditions: OPO 中红外频率梳 + 高精细度增强腔（finesse >3800）+ Michelson-based FTIR
