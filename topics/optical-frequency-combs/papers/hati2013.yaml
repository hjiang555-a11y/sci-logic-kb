entities:
  - id: ent.ofd_photonic_rf_source_hati2013
    name: "OFD光子微波信号源（Hati 2013 NIST）"
    hierarchy_level: 2
    status: demonstrated
    function: >
      通过光频除法（OFD）将超稳光学参考频率转换为高纯度RF信号（100 MHz / 1 GHz），
