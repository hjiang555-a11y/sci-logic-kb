principles:
  - id: pri.optical_frequency_division_rf_generation
    name: "光频除法RF信号生成原理"
    tier: domain
    verification_status: observed
    statement: >
      通过光频梳将超稳光学振荡器（如ULE腔稳激光，频率~10^14 Hz）的频率稳定度
      按N²比例缩减至微波频段（~10^9 Hz）。N≈10^5的除频比使相位噪声降低
      约20·log10(N)≈100 dB，产生远优于任何纯电子振荡器的RF信号。
    domain: "光子微波生成 / 时频计量"
    key_insight: >
      光学频率稳定度的绝对优势（Q因子~10^10更高）可通过OFD直接转化为微波域，
      突破电子振荡器的热噪声和闪烁噪声基本限制。
    conditions: "需超稳光学参考（ULE/晶体腔）；光电探测散粒噪声为最终限制"
    source:
      zotero_key: "JNDRRJTZ"
      claim: >
        "optical frequency division of a cavity-stabilized laser provides
        state-of-the-art RF signal generation"

methods:
  - id: meth.ofd_absolute_timing_jitter_measurement
    name: "OFD微波信号绝对时序抖动测量"
    status: demonstrated
    steps_summary: >
      使用两套独立OFD系统产生相同标称频率（100 MHz或1 GHz）的RF信号，
      通过双通道互相关相位噪声分析仪测量两路信号差，假设两路贡献相等，
      推算单路绝对时序抖动。
    source_claim: >
      "absolute timing jitter 0.72 fs integrated from 1 Hz to 100 MHz"

