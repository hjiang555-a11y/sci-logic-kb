  journal: "Physical Review Letters"
  volume: 85
  issue: 11
  pages: "2264-2267"
  doi: "10.1103/PhysRevLett.85.2264"
  note: >
    [Breakthrough 论文 / 里程碑] MPQ（德国马普量子光学所）+ U. Bath（英国）。首台 PCF 倍频程自参考梳光学频率综合器：
    (1) 飞秒激光（~fs 脉冲）经光子晶体光纤（PCF）非线性展宽至 > 1 倍频程（覆盖 f → 2f）→ f-2f 干涉仪测 fceo；
    (2) fceo + frep 双锁至 10 MHz RF 参考（Cs 溯源）→ 所有梳齿绝对频率可控；
    (3) 两套独立频率链比对，不确定度上限 5.1×10⁻¹⁶（首次将 RF 参考一步相干链接至光频域）；
    (4) 范式转移：传统谐波频率链（heroic efforts，大型、易损、单频定制）→ 紧凑通用光学频率综合器（~10⁶ 光频可用）；
    (5) 这是**现代自参考光学频率梳的诞生**——开启光频计量 / 光钟 / 精密光谱新纪元。
    本工作是 **landmark 共识**（教科书 / 综述反复引用的奠基性工作）+ **首次实现 f-2f 自参考梳**（5.1×10⁻¹⁶ 不确定度），
    判定 breakthrough。对齐 v2 子域主线：A1-Rep（自参考梳诞生）+ B-FreqSyn（光学频率综合）。

  primary_metric_exempt_reason: landmark_consensus
