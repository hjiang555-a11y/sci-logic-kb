    name: "地面移动平台振动环境（外部条件节点）"
    aliases: ["ground-vehicle vibration", "shaker table profile"]
    hierarchy_level: 1
    kind: ext
    status: characterized
    function: >
      车辆路况（减速带、砂石路）产生峰值 >0.5 g 的加速度；
      振动台 1/f 谱（~10 Hz 至 1 kHz）对应 0.035 / 0.067 / 0.13 / 0.25 / 0.5 / 1.3 g rms 工况。
      与典型 air-mount（2.5 Hz 自然频率，6% 阻尼）配合后可对应船、卡车（美国公路）、C-5 飞机振动谱（MIL-STD-810G）。
    note: "外部条件节点（ext），通过 CONDITIONED-BY 与 ent.ruggedized_field_comb_s14 接口。"

principles:
  - id: pri.pm_fiber_splice_vibration_immunity
    name: "全 PM 光纤拼接免调校振动免疫原理"
    tier: engineering
    verification_status: observed
    statement: >
      采用全保偏光纤 + 光纤拼接/连接头、彻底去除自由空间段后，振动主要通过光纤长度起伏耦合；
      此类起伏对 f-2f 干涉仪的两路共模，可通过在线（in-line）结构取消；
      同时避免了自由空间光学对准偏移与偏振漂移（非线性偏振旋转锁模方案对 PM 光纤拼接不兼容）。
      这是把"实验室飞秒梳"演化为"现场可运行相干梳"的关键设计原理。
    domain: "光纤光学；现场化飞秒梳工程设计"
    key_insight: >
      "简单重包装典型实验室系统不足以实现鲁棒现场梳"——必须从拓扑上消灭对振动/偏振敏感的自由空间节点。
    conditions:
      - "SESAM 或其它与 PM 光纤兼容的被动锁模机制"
      - "PM HNLF 用于低噪超连续展宽"
      - "f-2f 使用波导 PPLN + PM 在线干涉仪完成光纤内倍频与群延补偿"
    preconditions:
      - "飞秒激光灌胶（potted）并将光纤组件环氧固定于金属底板"
      - "腔长反馈 PZT 直接贴于光纤并阻尼任何光纤谐振"
    invalidated_when:
      - "存在可观的自由空间段或裸机架结构谐振耦合入腔长"
      - "机械谐振频率落入反馈带宽以外（伺服无法跟踪）"
    source_claim: >
      "the system is completely based on PM fiber and PM telecom-grade fiber optics components.
      All fiber connections are spliced or connectorized; there are no free-space sections,
      reducing sensitivity to vibration and alignment drift."
    open_questions:
      - "在更高振动（>1 g rms）下 PZT 伸缩器动态范围耗尽后，如何延长 f_opt 锁可用加速度上限？"

  - id: pri.vibration_fopt_linear_coupling
    name: "振动→光学相位（f_opt）线性耦合原理"
    tier: engineering
    verification_status: observed
    statement: >
      对本架构，随机振动引入的腔长起伏导致光频（f_opt）残余相噪随加速度近似线性增长：
      本实验测得积分相噪斜率 ≈ 3.8 rad/g，对应脉间时间抖动 ≈ 3.1 fs/g；
      而 f_ceo 相噪对振动水平近似无关，因此整体 5 fs 级时间抖动由 f_ceo 主导，对振动不敏感。
    domain: "飞秒梳相噪；机电耦合"
    formula: "σ_φ,fopt (rad, integrated 1 Hz–5 MHz) ≈ 3.8 × a_rms (g)"
    key_insight: >
      f_ceo 与 f_opt 对振动的响应解耦：SESAM+PM 结构使 f_ceo 基本免疫，
      f_opt 对腔长振动敏感——需要在 PZT 动态范围 + 机械/气动隔振 + 参考激光鲁棒性之间权衡。
    conditions:
      - "振动谱 10 Hz – 1 kHz，1/f 形；0.035–1.3 g rms 范围"
      - "PM Er:fiber SESAM 梳 + PZT 腔长伺服"
    preconditions:
      - "f_opt 锁路仍在 PZT 动态范围内（>0.5 g rms 后 PZT 伸缩器饱和）"
    invalidated_when:
      - "机械谐振进入 f_opt 伺服带宽以外"
      - "参考激光本身相噪主导（此时公式不再线性于加速度）"
    source_claim: >
      "the integrated phase noise on fopt increased roughly linearly with vibration level at 3.8 rad/g
      with a corresponding contribution to the timing jitter of 3.1 fs/g ... the fceo phase noise was unchanged"

  - id: pri.optical_lock_lever_arm_timing_jitter
    name: "光锁杠杆臂降低脉间时间抖动原理"
    tier: engineering
    verification_status: observed
    statement: >
      通过把梳的一根梳齿锁到光参考（而不是直接稳定重频），利用 f_opt / f_rep ≈ 10⁶ 的杠杆臂，
      使折算到脉间时间抖动上的相噪下降约 6 个数量级；
      整体抖动 ≈ √(σ_φ,fceo² + σ_φ,fopt²) / (2π·ν_opt) ≈ 2.4 fs（实验室）至 5 fs（现场）。
    domain: "飞秒梳相位/时间抖动"
    formula: "Δt_pp = √(σ_φ,fceo² + σ_φ,fopt²) / (2π · ν_opt),  ν_opt ≈ 192 THz"
    key_insight: >
      光锁方案使 2.9 rad (f_ceo) + 0.23 rad (f_opt) 积分相噪折算为 2.4 fs 脉间时间抖动，
      这是无光参考的 rf 锁方案难以达到的。
    conditions: "存在光参考激光（cavity-stabilized 或 free-running cw），PZT 带宽足以跟踪"
    source_claim: >
      "The use of an optical lock to a single comb mode rather than direct stabilization of the repetition rate
      provides the large lever arm to produce the low pulse-to-pulse timing jitter."

  - id: pri.transportable_cavity_reference_coupling
    name: "可移动腔稳激光作为光参考的接口原理"
    tier: engineering
    verification_status: inferred
    statement: >
      现场相干梳的最终性能上限由其所锁到的光参考的相噪与稳定度决定；
      使用鲁棒可移动的 cavity-stabilized cw 参考（如 Leibrandt 2011/2013 紧凑便携腔）取代 free-running cw 参考，
      可消除在车辆测试中观测到的温度漂移/频率跳动所需的人工泵浦补偿。
    domain: "光频参考工程；ent.fp_cavity_system 接口"
    key_insight: >
      现场 f_opt 相噪对振动线性（pri.vibration_fopt_linear_coupling）只是"相对于参考激光"的相对相噪，
      绝对光学稳定度要求参考腔本身的低加速度灵敏度（<10⁻¹² /g 级）。
    conditions: "参考激光具备 <Hz 级线宽、低加速度灵敏度、可移动封装"
    invalidated_when:
      - "参考激光自身漂移/相噪主导，梳相干带宽不再以锁点为中心展开"
    source_claim: >
      "Even more stable comb operation would be achieved using a robust, mobile, cavity-stabilized cw
      reference laser such as in [16,17]."
    open_questions:
      - "车载 cavity-stabilized 参考激光与梳的联合加速度灵敏度预算如何分配？"

methods:
  - id: meth.ruggedized_fiber_comb_optical_lock_s14
    name: "现场化 PM 光纤梳光参考锁定方法（Sinclair 2014）"
    status: demonstrated
    applies_to: ent.ruggedized_field_comb_s14
    steps_summary: >
      1. SESAM 启动 PM Er:fiber 自锁模；2. Er 光纤放大 + PM HNLF 生成 1.05–>2.3 μm 超连续；
      3. 波导 PPLN 倍频 2128 nm → 1064 nm，进入 PM 在线干涉仪补偿 0.7 ps 群延，探测 f_ceo；
      4. f_ceo 上混至 640 MHz → ÷64 → 锁至 10 MHz 参考，经相位超前补偿反馈至泵浦电流，带宽 150 kHz；
      5. 梳齿与 cw 参考激光外差得 f_opt，÷8 → 锁至 9 MHz 参考，反馈至 2 mm PZT (高带宽) + 大 PZT 堆栈 (大行程)，带宽 90 kHz；
      6. 大 PZT 串联电阻在 200 Hz 滚降以抑制机械谐振。
    required_hardware:
      - ent.ruggedized_field_comb_s14
      - ent.pm_inline_f2f_interferometer_s14
    advantages:
      - "Hz 级光学线宽 + <1 rad 光相噪 + 2.4–5 fs 时间抖动，堪比实验室梳"
      - "全 PM 光纤 + 无自由空间 → 振动/对准免疫"
      - ">35 h 无相位滑移连续运行"
      - "在 0.5 g rms 振动与 >0.5 g 峰值车辆加速度下保持全锁"
    disadvantages:
      - "f_opt 锁在 >0.5 g rms 时受限于 PZT 伸缩器动态范围"
      - "f_ceo 相噪 ~3 rad 使相干带宽 ~140 THz（非全 1–2 μm 光谱）"
      - "使用 free-running cw 参考时，长时间温度漂移需人工泵浦调整"
    conditions:
      - "车辆或振动台 10 Hz–1 kHz，1/f 谱，≤0.5 g rms"
      - "cw 参考激光（cavity-stabilized 或 free-running）可用"
    source_claim: >
      "This fully phase-locked frequency comb has been successfully operated in a moving vehicle with
      0.5 g peak accelerations and on a shaker table with a sustained 0.5 g rms integrated acceleration,
      while retaining its optical coherence and 5-fs-level timing jitter."

metrics:
  - id: met.residual_optical_linewidth_s14
    name: "残余光学梳齿线宽（Sinclair 2014）"
    unit: "Hz"
    description: >
      梳齿与第二台腔稳参考激光之间 out-of-loop 外差的残余线宽（仪器分辨率受限 1 Hz）。
    demonstrated_value:
      value: "< 1 Hz（out-of-loop，仪器受限）"
      conditions: "实验室，1565 nm cavity-stabilized 参考锁点，1535 nm 第二腔稳参考做 out-of-loop 测量"
      verification_status: observed
      confidence: established
      source: {zotero_key: "D9ANIZW6", claim: "residual optical linewidths of < 1 Hz ... the linewidth is instrument-limited at 1 Hz"}

  - id: met.integrated_phase_noise_fopt_s14
    name: "光学相位环（f_opt）积分相位噪声"
    unit: "rad (1 Hz–5 MHz)"
    description: >
      梳齿-参考光外差锁路积分相噪，表征光学相干度；定义 <1 rad 为"光相干"。
    demonstrated_value:
      value: "0.22 rad（实验室，1 Hz–5 MHz）；0.3 rad（车辆）；~0.5 rad @ 低振动 → 0.5 g rms 时 ~1.9 rad（斜率 3.8 rad/g）"
      conditions: "实验室：1565 nm cavity-stabilized 参考；车辆/振动台：1535 nm free-running 参考"
      verification_status: observed
      confidence: established
      source: {zotero_key: "D9ANIZW6", claim: "integrated phase noise is ... 0.22 rad for fopt from 5 MHz to 1 Hz ... fopt increased roughly linearly with vibration level at 3.8 rad/g"}

  - id: met.integrated_phase_noise_fceo_s14
    name: "CEO 相位环（f_ceo）积分相位噪声"
    unit: "rad (1 Hz–5 MHz)"
    description: >
      f-2f 锁路积分相噪，决定相干带宽 Δν ≈ 1 rad / (σ_φ,fceo · 2π / (2ν_opt))。
    demonstrated_value:
      value: "2.9 rad（实验室）；6.2 rad（车辆，因泵浦电流控制器带宽降低）；~6 rad（振动台，EMI 主导），与振动水平无关"
      conditions: "反馈至泵浦功率 (52 MHz/mW)，150 kHz 带宽；车辆测试使用不同泵浦电流源"
      verification_status: observed
      confidence: established
      source: {zotero_key: "D9ANIZW6", claim: "integrated phase noise is 2.9 rad for fceo ... as the vibration was increased beyond 1g, the fceo phase noise was unchanged"}

  - id: met.pulse_to_pulse_timing_jitter_s14
    name: "脉间时间抖动（Sinclair 2014）"
    unit: "fs"
    description: >
      由 f_ceo 与 f_opt 积分相噪按 √(σ²_fceo + σ²_fopt)/(2π·ν_opt) 折算，ν_opt ≈ 192 THz。
    demonstrated_value:
      value: "2.4 fs（实验室）；5 fs（车辆 & 振动台 0.5 g rms）；~3.1 fs/g 随加速度线性"
      conditions: "锁至 cw 参考，积分 1 Hz–5 MHz"
      verification_status: calculated
      confidence: established
      source: {zotero_key: "D9ANIZW6", claim: "residual pulse-to-pulse timing jitter of 2.4 - 5 fs, when locked to an optical reference ... 3.1 fs/g"}

  - id: met.vibration_tolerance_s14
    name: "维持光锁的振动耐受水平"
    unit: "g rms (10 Hz–1 kHz) 及 g peak"
    description: >
