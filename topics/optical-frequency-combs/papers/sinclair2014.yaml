  title: "Operation of an optically coherent frequency comb outside the metrology lab"
  year: 2014
  first_author: Sinclair
  journal: "Optics Express"
  volume: 22
  issue: 6
  pages: "6996-7006"
  doi: "10.1364/OE.22.006996"
  note: >
    [工程里程碑技术论文] NIST Boulder (Sinclair/Coddington/Swann/Rieker/Hati/Iwakuni/Newbury)。
    200 MHz PM Er:fiber + SESAM 自锁模梳，全 PM 光纤拼接、无自由空间段、飞秒激光灌胶减振；
    PM HNLF 展宽到 1.05–>2.3 μm（倍频程），波导 PPLN + PM 在线干涉仪探测 f_ceo（SNR 35 dB/470 kHz）；
    f_ceo 经 150 kHz 带宽反馈至泵浦功率，f_opt 经 90 kHz PZT 反馈至腔长锁至 cw 参考激光。
    车辆测试（>0.5 g 峰值）与振动台测试（0.035→1.3 g rms，10 Hz–1 kHz）均保持锁定，
    f_opt 积分相噪对振动的斜率约 3.8 rad/g，f_ceo 相噪对振动不敏感；
    光学相干覆盖约 140 THz（以锁点 1565 nm 为中心）。本文件定义 Level-2 实例 ent.ruggedized_field_comb_s14。

