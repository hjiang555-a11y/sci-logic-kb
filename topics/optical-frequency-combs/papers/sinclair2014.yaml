# Sinclair 2014 — 全 PM 光纤 + SESAM 自锁模 Er 光纤梳首次在移动车辆与振动台（0.5 g rms）上保持光学相干锁定 [工程里程碑技术论文]
# 提取者：GitHub Copilot（AI草稿，待专家确认）
# 提取日期：2026-04-19
# Schema版本：v4.1
# 专题：optical-frequency-combs
# contribution_type: technical — 首次将"锁定到光参考"级别的相干飞秒梳带出计量实验室
#   核心贡献：
#     (1) 全保偏（PM）光纤 + SESAM 自锁模 + 波导 PPLN + PM 在线 f-2f 干涉仪的可现场化架构；
#     (2) 车载运行（>0.5 g 峰值加速度）与振动台（0.5 g rms，10 Hz–1 kHz）下保持 f_ceo 和 f_opt 全锁定，
#         残余光学线宽 < 1 Hz、亚弧度光学相噪、2.4–5 fs 脉间时间抖动；
#     (3) 连续 35 h 无相位滑移运行；映射至 typical air-mount 下可用于船、卡车、C-5 飞机等平台。
#   跨文件引用：
#     - ent.optical_frequency_comb（udem2002.yaml）
#     - pri.self_referencing_f2f（udem2002.yaml）
#     - ent.fp_cavity_system（ultrastable-laser/papers/numata2004.yaml，用作光频参考腔）
#   相关节点：与 ent.spaceborne_erfiber_comb_l16（lezius2016.yaml）并列，同属"ruggedized Er:fiber comb"家族，
#     但 Sinclair 2014 锁至光参考（光学相干），Lezius 2016 锁至 rf 参考（火箭飞行）。

