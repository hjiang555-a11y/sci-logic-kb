    interface_requirements:
      optical_reference: "cw 参考激光（实验室：cavity-stabilized 1565 nm；车辆/振动台：free-running 1535 nm）"
      rf_reference: "10 MHz（f_ceo 锁点）、9 MHz（f_opt 锁点）"
      power_environment: "小型汽油发电机供电（车载测试）"
    note: >
      Level-2 PART-OF ent.optical_frequency_comb（权威定义于 udem2002.yaml）。
      与 ent.spaceborne_erfiber_comb_l16（lezius2016.yaml）COMPETES-WITH：后者 rf 锁、探空火箭场景；
      本实例光锁、地面车辆/振动台场景，强调"光学相干出实验室"。

  - id: ent.pm_inline_f2f_interferometer_s14
    name: "PM 光纤在线 f-2f 干涉仪（Sinclair 2014）"
    aliases:
      - "PM in-line f-2f interferometer"
    hierarchy_level: 3
    status: demonstrated
    function: >
      紧跟波导 PPLN 后，用 45° 拼接把倍频光与基频 1064 nm 光同时投射到一段 PM 光纤的快慢轴上；
      ~1.6 m PM 光纤快慢轴差分群延补偿 PPLN 后 ~0.7 ps 的基频-倍频时序差，
      再一次 45° 拼接回到原基矢，偏振分束器取慢轴输出。插入损耗 ~6 dB，
      由于所有光纤长度起伏对两路共模，不向 f_ceo 引入额外相位噪声。
    key_parameters:
      pm_fiber_length: "~1.6 m"
      compensated_delay: "0.7 ps"
      insertion_loss: "~6 dB"
      common_mode_advantage: "光纤长度/温度起伏共模，不引入 f_ceo 额外相噪"
    note: "PART-OF ent.ruggedized_field_comb_s14；解决了波导 PPLN 长尾纤无法再做光纤长度微调的问题。"

