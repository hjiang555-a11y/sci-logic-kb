      pulse_bandwidth: "10 nm"
      pulse_energy: "25 pJ（5 mW 平均输出）"
      cavity_length: "~50 cm"
      net_cavity_dispersion: "~−0.02 ps²"
      sescs_parameters: "SESAM 3% 饱和损耗 / 6% 非饱和 / 20 μm 光斑 / 2× saturation fluence"
      supercontinuum_span: "1.05 μm → >2.3 μm（倍频程）"
      hnlf_length: "20 cm PM HNLF"
      fceo_snr: "35 dB @ 470 kHz RBW"
      fceo_lock_bandwidth: "150 kHz（反馈至泵浦功率，52 MHz/mW）"
