  title: "Fully phase-stabilized 1 GHz turnkey frequency comb at 1.56 µm"
  year: 2020
  first_author: Lesko
  journal: "OSA Continuum"
  volume: 3
  issue: 8
  pages: "2070-2079"
  doi: "10.1364/OSAC.396597"
  note: >
    [技术论文] NIST/CU Boulder 团队（Lesko, Lind, Hoghooghi, Kowligy, Timmers, Sekhar,
    Rudin, Emaury, Rieker, Diddams）。采用商用交钥匙 1 GHz MENHIR-1550 Er:fiber 振荡器，
    配合 PM 色散管理放大器（12 mW → 680 mW）、1.7 m PM-HNLF 超连续谱展宽（覆盖 1–2 µm）、
    内联式 1 mm PPLN f-to-2f 干涉仪，实现全相位稳定光频梳。
    f_CEO 锁至 H-maser（泵浦电流调制，20 kHz BW），积分相位噪声 438 mrad；
    f_beat 锁至 1550 nm 腔稳 CW 激光（腔内压电陶瓷，100 kHz BW），积分相位噪声 40.6 mrad。
    两台相同振荡器表现一致，验证了商业平台的可重复性。

