# ═══════════════════════════════════════════════
#  PRINCIPLES（原理）
# ═══════════════════════════════════════════════

principles:
  - id: pri.inline_f2f_soliton_shift
    name: "内联 f-to-2f 孤子自频移供能原理"
    tier: engineering
    verification_status: observed
    statement: >
      在 PM-HNLF 中，脉冲超连续谱展宽过程中产生的孤子通过拉曼散射（孤子自频移，SSFS）
      将功率从泵浦波长（~1.56 µm）连续转移至长波（~2 µm），
      为内联 f-to-2f 中 PPLN SHG（1 µm → 2 µm）提供所需的 2 µm 频谱分量，
      无需体光学延迟臂或独立 2 µm 光源。
    domain: "非线性光纤光学；光频梳自参考"
    key_insight: >
      孤子自频移将超连续谱展宽与 f-to-2f 干涉两步融合为单段光纤内的一体化过程，
      极大简化全光纤路径的紧凑性；要求 HNLF 色散参数（D = 5.7 ps/nm/km）与长度（1.7 m）
      精确设计以保证 2 µm 波段有足够功率。
    conditions: >
      PM-HNLF（D = 5.7 ps/nm/km，长度 ~1.7 m）；
      峰值功率 ≥ 7 kW（89 fs 脉冲）；
      需 PPLN 相位匹配至 ~1 µm（周期 30.80 µm）进行 SHG
    preconditions:
      - "振荡器脉冲必须经放大并压缩至亚 100 fs（足够峰值功率驱动 SSFS）"
      - "HNLF 必须为 PM 型以抑制偏振串扰"
    invalidated_when: >
      峰值功率不足以触发 SSFS（如直接用振荡器输出而不放大）；
      或 HNLF 长度/色散不匹配导致孤子无法移至 2 µm
    source:
      claim: >
        "soliton shifts to 2 µm in the HNLF, providing the long-wavelength arm
         of the f-to-2f interferometer without additional bulk optics"
      paper: "Lesko et al. 2020, OSA Continuum 3(8), 2070–2079"

  - id: pri.high_frep_dcs_speed_advantage
    name: "高重频梳 DCS 采集速度优势原理"
    tier: domain
    verification_status: inferred
    statement: >
      双梳光谱（DCS）的单次采集时间 T_acq ∝ 1/f_rep²（在固定光谱分辨率与 SNR 要求下），
      因此将重复频率从 100 MHz 提高至 1 GHz 可使数据采集速度提升约 100 倍，
      适用于瞬态分子光谱、气体流场成像等需要高时间分辨率的场景。
    domain: "双梳光谱学；快速分子传感"
    key_insight: >
      f_rep = 1 GHz 的 DCS 系统可在 µs–ms 时间尺度内完成单次扫描，
      比 100 MHz 系统快约两个数量级，但每个梳齿对应的光谱采样间隔也增大至 1 GHz，
      需确保目标分子谱线宽度 >> 1 GHz（常压气体碰撞加宽通常满足此条件）。
    conditions: >
      目标气体谱线压强加宽线宽 ≫ 1 GHz（常压条件通常满足）；
      双梳重频差 Δf_rep 设计保证足够采样点数覆盖分子特征
    preconditions:
      - "两台梳重频相对差 Δf_rep 需精确控制以避免欠采样"
    invalidated_when: >
      目标分子谱线窄于 1 GHz（如低压冷分子束）——此时需要更密梳齿（低 f_rep）以充分采样
    open_questions:
      - "1 GHz DCS 在低压（Doppler-limited）分子光谱中的实用性尚待系统评估"
    source:
      claim: >
        "repetition rate of 1 GHz enables acquisition rates ~100× faster than
         100 MHz combs for broadband DCS applications"
      paper: "Lesko et al. 2020, OSA Continuum 3(8), 2070–2079"

# ═══════════════════════════════════════════════
#  METHODS（方法）
# ═══════════════════════════════════════════════

methods:
  - id: meth.pm_dispersion_managed_amplification
    name: "PM 色散管理光纤放大（PM-CFBG 预啁啾 + Er:fiber MOPA）"
    applies_to: ent.ghz_turnkey_erfiber_comb_l20
    description: >
      采用保偏（PM）光纤布拉格光栅（PM-CFBG）对振荡器输出脉冲施加反向啁啾预补偿，
      再经保偏 Er:fiber 主振荡功率放大（MOPA）将功率放大至 680 mW，
      放大后脉冲经光栅或光纤压缩器还原至 89 fs，
      使峰值功率达到驱动 HNLF 超连续谱展宽的阈值（7.4 kW）。
    key_steps:
      - "PM-CFBG 负啁啾预压缩（抵消后续 PM 光纤正色散积累）"
      - "Er:fiber 放大级（12 mW → 680 mW，17.5 dB）"
      - "输出端脉冲压缩至 89 fs（7.4 kW 峰值功率）"
    performance:
      gain_dB: "17.5"
      compressed_pulse_fs: "89"
      peak_power_kW: "7.4"
    note: "新节点；适用于全 PM 光纤路径的 GHz 重频梳功率放大场景"

