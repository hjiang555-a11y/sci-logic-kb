methods:
  - id: meth.triple_stage_1to1_splitter_8branch_h21
    name: "三级 1:1 耦合器 8分支拓扑（Hisai 2021）"
    status: demonstrated
    applies_to: ent.nmij_8branch_er_comb_h21
    steps_summary: >
      1. NPR 振荡器输出 → 99:1 耦合器（1% 检测 frep，99% 主输出）；
      2. 主输出 → Coupler1 (50:50) → 2 路；
      3. 两路各 → Coupler2/3 (50:50) → 4 路 → 8 路总计；
      4. Branch 1 → HNLF + f-2f 干涉仪测 fceo；
      5. Branch 2-8 → 各自 EDFA + 非线性展宽（HNLF / PCF / PPLN SHG）至目标波长；
      6. 各应用端口与对应 CW 激光拍频（高 SNR PLL 锁定或频率测量）；
      7. 同时锁定 4 个再泵浦/晶格激光 + 测量 2 个时钟激光（Sr 578 nm / Yb 698 nm）。
    required_hardware:
      - "NPR Er:fiber 振荡器（50 MHz）"
      - "三级 50:50 光纤耦合器"
      - "8 套 EDFA + 非线性模块（HNLF / PCF / PPLN）"
      - "7 台 CW 激光（Sr/Yb 各波段）"
    advantages:
      - "单梳服务双光钟所有频率需求（减少独立腔稳激光数量）"
      - "分支间功率分配灵活（各 EDFA 独立增益）"
      - "系统可靠性高（论文验证长期稳定运行）"
    disadvantages:
      - "未报告跨支路相位同步精度（σ_y / 相噪比对）"
      - "分支数量多 → 各支路平均功率低（需大增益 EDFA 补偿）"

