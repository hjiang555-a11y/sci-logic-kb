      beat_snr: "> 30 dB @ 300 kHz RBW（各应用端口）"
      frep_lock: "1005 MHz（20th harmonic）混频至 UTC(NMIJ) 1 GHz"
      fceo_lock: "锁至 RF 合成器（Keysight 33500B）"
