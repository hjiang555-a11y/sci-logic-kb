# Suh 2019 — 首次将微谐振腔孤子微梳用作天文光谱仪校准源（Keck II/NIRSPEC）[里程碑技术论文]
# 提取者：GitHub Copilot（AI草稿，待专家确认）
# 提取日期：2026-04-19
# Schema版本：v4.1
# 专题：optical-frequency-combs
# contribution_type: technical — 天文光梳（astrocomb）方向的首次微腔实施
#   核心贡献：
#     (1) 首次将 DKS 孤子微梳（22.1 GHz 线距，1550 nm 附近）搬上 10 m 级望远镜（Keck II）
#         并直接对天文近红外光谱仪 NIRSPEC 进行校准；
#     (2) 利用微腔 FSR 原生 22.1 GHz 与天文光谱仪分辨率天然匹配，
#         **无需外加 Fabry-Pérot 模式过滤**即达到可分辨梳线——区别于 Ti:Sa/EO 类传统 astrocomb；
#     (3) 方案整体简化（CW 泵浦 + 芯片微腔 + HCN 锁定 + Rb 钟），
#         达到 ≤5 m/s 的定标不确定度（受 f0 锁定的 ~1 MHz 主导，等效 ~1 m/s RV）。
#   注：本论文实际工作在 **近红外 ~1550 nm**（NIRSPEC, echelle orders 44-51, 1471–1620 nm），
#       并非可见光/HIRES/SHG。任务指示中的 "620–690 nm via SHG / HIRES" 与实际 PDF 内容不符，
#       本文件按论文实际内容提取；SHG 到可见的微梳 astrocomb 方案是后续工作（如 Obrzud 2019）。
#   Framework 依赖：
#     ent.microresonator_frequency_comb（权威定义：kippenberg2018 / yi2016）
#     ent.silica_microtoroid_comb / ent.silica_wedge_microresonator（权威定义：yi2016）
#     pri.dissipative_kerr_soliton（权威定义：herr2014 / yi2016）
#     meth.laser_tuning_soliton_access（权威定义：herr2014 / yi2016）

