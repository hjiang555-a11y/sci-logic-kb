  topic: optical-frequency-combs
  source_type: technical_paper
  contribution_type: technical
  reliability: high
  title: "Searching for exoplanets using a microresonator astrocomb"
  year: 2019
  first_author: Suh
  journal: "Nature Photonics"
  volume: 13
  pages: "25-30"
  doi: "10.1038/s41566-018-0312-3"
  temporal_role: proposes
  verification_status: observed
  note: >
    Caltech Vahala 组 + NIST/JILA Papp/Diddams + JPL + UCLA + Keck Observatory 合作。
    3 mm 直径硅基二氧化硅（silica wedge）微腔，Q≈3×10^8，CW 光纤激光泵浦产生单孤子态，
    孤子脉宽 145 fs，重频 22.1 GHz。offset 通过与锁定在 H¹³C¹⁴N (HCN) P(16) 线的参考激光拍频确定，
    frep 通过 AOM 锁定。输出经非线性展宽覆盖 NIRSPEC 八个 echelle 级（1471–1620 nm），
    2017-09-10 UTC 在 Keck II 上与传统 EO astrocomb 交替校准，作用于 51 Peg、HD 187123。
    梳线质心在 30 min 内的 1-σ 稳定度 ~2 m/s，整体定标不确定度 ≤5 m/s。

