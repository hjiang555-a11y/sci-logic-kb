principles:
  - id: pri.native_mode_spacing_matching
    name: "微梳 FSR 与天文光谱仪分辨率原生匹配原理"
    tier: domain
    statement: >
      当光学频率梳的线间距 Δν_rep 大于天文 echelle 光谱仪的分辨率线宽 Δν_res 时，
      仪器可直接分辨每根梳齿，无需外部 Fabry-Pérot 模式过滤级。
      微谐振腔由于其 mm 级几何尺度天然具有 10–30 GHz 量级 FSR，
      使得 Δν_rep (≈22 GHz) > Δν_res (NIR echelle 典型 ~几 GHz)，从而满足该条件。
    conditions:
      - "梳线间距 > 光谱仪分辨率线宽"
      - "梳包络稳定可重复（soliton mode-locking 保证）"
    preconditions:
      - "微腔处于单 DKS 孤子态（envelope 稳定）"
      - "frep 与 f0 均有独立锁定"
    invalidated_when:
      - "目标光谱仪分辨率提高到接近或超过 FSR 时（则梳齿变得不可分辨，需要更大 FSR 微腔）"
    note: "该原理是 microcomb astrocomb 相对于 Ti:Sa/Er 飞秒梳 astrocomb 的核心优势。"

  - id: pri.microcomb_to_astrocomb_adaptation
    name: "微谐振孤子梳适配为天文光梳的系统原理"
    tier: domain
    statement: >
      基于 DKS 的微谐振腔梳经以下三要素适配即可作为天文光谱仪定标源：
      (i) frep 的射频锁定（受 Rb/Cs 钟约束）；
      (ii) f0 的光学锚定（通过与原子/分子线锁定参考激光拍频确定，无需 f-2f 自参考）；
      (iii) 非线性展宽至覆盖目标 echelle 多级次。
    conditions:
      - "存在稳定 CW 泵浦与 AOM 快速伺服"
      - "存在分子/原子线锁定的光学参考激光"
    preconditions:
      - "微腔已进入并保持单孤子态（meth.laser_tuning_soliton_access）"
    note: >
      f0 锚定通过 HCN 参考激光而非 f-2f 自参考，是与 diddams2000 类传统梳的关键差别，
      降低了对八度谱与高峰值功率的硬件门槛。

  - id: pri.microcomb_rv_calibration_limit
    name: "微梳 astrocomb 径向速度定标不确定度极限"
    tier: domain
    statement: >
      微梳作为 astrocomb 时，最终 RV 定标不确定度由 f0 锁定精度、frep 锁定精度、
      以及梳齿在光谱仪上的质心提取精度共同决定；在 Suh 2019 条件下 f0 抖动 ~1 MHz
      成为主导项，对应 ~1 m/s RV 等效，而整体定标 ≤5 m/s。
    conditions:
      - "Rb 钟参考，20 s 积分"
      - "HCN 锁定参考激光 <1 MHz"
    note: "可通过更稳定的光学参考（光钟/光纤网链路）降低 f0 项。"

