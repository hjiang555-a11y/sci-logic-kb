principles:
  - id: pri.sin_waveguide_low_power_f2f_c17
    name: "SiN 波导低功率 f-2f 自参考原理（Carlson 2017）"
    tier: engineering
    verification_status: observed
    statement: >
      SiN 波导的高非线性（χ³ + 零色散波长可调）+ 紧约束波导几何（~µm 级模场直径）使脉冲能量门槛降低 10×
      相比 HNLF：110 pJ 即可产生两倍频程展宽（覆盖 780 nm → 1560 nm）。
      780 nm 色散波（蓝移端）与 1560 nm 基频（红端）倍频后（ppKTP）混频产生 fceo 拍频，
      避免了高功率 EDFA 放大需求——对便携式 / 空间应用关键（电功率预算 < 5 W）。
    domain: "集成光子学；非线性光学"
    key_insight: >
      "SiN 波导的低损耗（< 2 dB 耦合）+ 高非线性使自参考功率降至 11.3 mW，
      这是光纤梳迈向芯片级集成的关键——无需 EDFA，仅振荡器 + 波导即可完成 f-2f"——
      对电光梳、微梳等低功率系统自参考路径的开拓。
    conditions: "SiN 波导（~3 µm 宽，700 nm 厚）；Er:fiber 梳（~100-200 MHz frep）；入射功率 > 11 mW"
    source_claim: >
      "This is approximately 10 times lower than conventional approaches using nonlinear fibers and
      is enabled by low-loss (<2 dB) input coupling and the high nonlinearity of silicon nitride."

