principles:
  - id: pri.intracavity_eom_group_delay_modulation
    name: "腔内 EOM 群延迟调制实现高带宽重频控制原理"
    tier: domain
    verification_status: observed
    statement: >
      腔内电光调制器（EOM）通过外加电压改变晶体折射率（电光效应），
      产生电压控制的群延迟变化，从而改变激光腔的光程长度，直接调制重复频率 frep。
      与 PZT 的机械谐振限制（典型 ~10 kHz）不同，EOM 的带宽仅受晶体自身声学谐振
      （~900 kHz 处的锐谐振）和驱动电路带宽限制，可实现数百 kHz 至 ~1 MHz 的 frep 控制带宽。
      在级联控制架构中，EOM 负责高傅里叶频率（>6-10 kHz），PZT 负责低频率大范围调谐。
    domain: "光频梳频率控制，电光效应，激光稳定"
    formula: >
      Δf_rep/f_rep ≈ -Δn·L_EOM / L_cavity（其中 Δn = n³·r·V/(2d)，r 为电光系数，
      V 为施加电压，d 为晶体厚度）
    key_insight: >
      EOM 突破了 PZT 机械谐振对 frep 伺服带宽的限制，使固态激光器 OFC 的 frep 锁定带宽
      从 ~10 kHz 提升至 ~700 kHz，使 DPSSL 达到与光纤激光器 EOM 相当的控制性能。
    conditions: "EOM 晶体声学谐振频率 > 目标带宽；EOM 驱动电路带宽 > 目标带宽"
    preconditions:
      - "EOM 晶体安装于激光腔内，不显著增加腔损耗"
      - "驱动电路能提供足够的电压摆幅（HV 放大器带宽 ≥1 MHz）"
    invalidated_when:
      - "EOM 晶体声学谐振处于所需控制带宽内——产生锐增益峰导致不稳定"
      - "PM-to-AM 耦合过大——改变腔内功率，干扰 fCEO 和振幅稳定性"
    source_claim: >
      "The large feedback bandwidth of such modulators allows disciplining the comb
      repetition rate on a cavity-stabilized continuous-wave laser with a locking
      bandwidth up to 700 kHz. This surpasses what can be achieved with any other
      type of actuator reported so far."
    open_questions:
      - "EOM 声学谐振对更高带宽（>1 MHz）的根本限制程度——是否可通过更短晶体或新材料进一步提升？"
      - "PM-to-AM 耦合对高精度光微波分频的残余相位噪声影响的定量边界"

methods:
  - id: meth.eom_pzt_cascade_frep_lock
    name: "EOM+PZT 级联重频锁定方法"
    tier: domain
    verification_status: observed
    statement: >
      采用双执行器级联架构稳定光频梳的 frep：腔内 EOM 作为快速执行器
      （负责 >6-10 kHz 傅里叶频率），PZT（安装 SESAM 的压电陶瓷）作为慢执行器
      （负责低频率和大范围腔长调谐）。PI²D 模拟控制器输出同时驱动 EOM 的 HV 放大器
      和经积分的 PZT 信号。锁定信号来源于梳齿与 PDH 稳 CW 激光的光拍频。
    steps: >
      (1) 光频梳输出经窄带滤波器（1.2 nm @ 1560 nm）后与 CW 激光混频；
      (2) 光电二极管检测拍频信号，选取单梳齿拍频，电带通滤波+放大；
      (3) 拍频信号送入混频器（相位检测器），与氢钟参考合成器比相；
      (4) 误差信号送入 PI²D 控制器（Vescent D2-125，10 MHz 带宽）；
      (5) 控制信号同时驱动 EOM 的 1 MHz HV 源（快通道）和 PZT（慢通道，经积分）。
    domain: "光频梳频率控制，伺服回路设计"
    note: >
      与 Zhang et al. 2012 (IK6MW5Q4) 的光纤激光器 EOM+PZT 架构类似，
      但本文为固态激光器中的首次实现。交叉点频率 ~6-10 kHz。

