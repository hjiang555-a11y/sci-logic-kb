principles:
  - id: pri.high_temp_gas_suppresses_steady_state_plasma_p18
    name: "高温气体抑制高重频 HHG 稳态等离子体原理（Porat 2018）"
    tier: domain
    verification_status: observed
    statement: >
      "在高重频（f_rep > 10 MHz）飞秒增强腔 HHG 中，稳态等离子体积累是阻碍相位匹配的根本原因——
      每个脉冲产生的离子在下一脉冲到来前未能清空焦点，逐渐积累形成高密度等离子体，其色散完全掩盖中性气体色散，
      使相位匹配无法达成。通过提升气体背压温度 T，原子平动速度 v_gas ∝ √(RT/M_avg) 提升，
      束流逗留参数 ξ_beam = (beam_diameter)/(v_gas·τ_rep) 降低 → 稳态等离子体密度指数级下降 → 相位匹配恢复。"
      Porat 2018 实验证明：T = 300 K 时 η_steady ~ 1（完全电离），T = 800 K 时 η_steady ~ 10⁻²（<1% 电离），
      使 77 MHz HHG 从"不可相位匹配"变为"可相位匹配"，XUV 功率提升 ~20 倍。
    domain: "高次谐波产生；高重频 XUV 频率梳；非线性光学相位匹配"
    key_insight: >
      高重频 HHG 的核心瓶颈不是峰值功率（腔增强可解决），而是"稳态等离子体积累破坏相位匹配"——
      只有当 ξ_beam < 1（原子在下一脉冲到来前飞离焦点）时，稳态等离子体才能被抑制；
      加热气体是提升 v_gas 的直接手段，比降低 f_rep（技术路线倒退）或用更轻的气体（限制谐波阶数）更优。
    conditions: >
      需高精细度飞秒增强腔（f_rep ≥ 10 MHz，腔内功率 ≥ 10 kW）；
      需气体喷嘴背压加热系统（T ≤ 800 K）；需 Ar+He 混合比优化以平衡 HHG 效率与等离子体色散；
      需精密对焦（beam waist < 50 μm）与气体密度梯度控制。
    formula: >
      ξ_beam = σ_FWHM / (v_gas · τ_rep)，其中 v_gas = √(RT/M_avg)；
      η_steady ∝ exp(-ξ_beam)（定性标度）；
      相位匹配条件：Δk = k_HHG - q·k_laser + Δk_Gouy + Δk_plasma ≈ 0（Δk_plasma 降低至可补偿）
    source:
      zotero_key: "L88UAAEQ"
      claim: >
        "we use high-temperature gas mixtures as the generation medium to increase the gas translational velocity, 
        thereby reducing the steady-state plasma in the laser focus. 
        This allows phase-matched XUV emission inside a femtosecond enhancement cavity at f_rep = 77 MHz, 
        enabling a record generated power of ~2 mW in a single harmonic order."
    breakthrough_paths:
      - step: 1
        entity: pri.cavity_enhanced_hhg_comb
        context: "飞秒增强腔 HHG 频率梳的相位匹配可行性在高重频（>10 MHz）下受稳态等离子体积累限制"
      - step: 2
        entity: pri.high_temp_gas_suppresses_steady_state_plasma_p18
        context: "通过提升气体背压温度至 800 K，将 ξ_beam 降至 <1，稳态等离子体密度降低两个数量级，相位匹配恢复"
      - step: 3
        entity: ent.high_temp_gas_mixture_hhg_p18
        context: "实现 77 MHz 相位匹配 XUV 梳产生，单谐波功率 ~2 mW（先前纪录 <100 μW，提升 20 倍），为 XUV 频率梳光谱学提供实用化光源"

