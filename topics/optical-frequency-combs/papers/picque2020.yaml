principles:
  - id: pri.self_referencing_f2f_framework
    name: "f-2f 自参考原理（框架陈述）"
    tier: meta
    verification_status: observed
    statement: >
      覆盖一个倍频程的光梳可通过同梳第 n 齿的二次谐波与第 2n 齿拍频得到 f_CEO，
      从而将光学频率"绝对锁定"到无线电频率 → 实现光/微波双向相干"齿轮箱"。
      这是 1999–2000 奠基的核心原理，也是所有后续光频梳应用的基石。
    domain: "光频梳基础物理；光-微波桥"
    formula: "f_CEO = 2·(n·f_rep + f_CEO) − (2n·f_rep + f_CEO)  （倍频程梳中 f-2f 直接测量）"
    key_insight: >
      自参考把光梳从"仅仅是等间距齿的集合"提升为"可绝对定位的频率标尺"，
      是光频梳整个科学应用链条的起始点。
    conditions: "梳谱覆盖至少一个倍频程；f_CEO 可测/可锁"
    source_claim: >
      "the technique of self-referencing, by which the optical frequencies of the comb are
      locked in an absolute sense to a radio frequency reference"

  - id: pri.optical_microwave_coherent_gearbox
    name: "光-微波相干齿轮箱原理（Level 0 范式原理）"
    tier: meta
    verification_status: observed
    statement: >
      光频梳同时提供上百个 THz 间距相干的光频与一个可计数的 RF（=f_rep），
      以"齿轮箱"方式在两域间双向传递相位相干性，包括：
      (i) RF 频标 → 光钟精度（光频合成）
      (ii) 光钟 → 超低噪声微波（OFD）
      (iii) 光谱覆盖全光电磁谱的多路并行频标。
    domain: "跨域频率计量"
    key_insight: >
      梳不仅是测量工具，更是一个"频率域翻译机"。
    conditions: "梳自参考锁定；f_rep 有稳定参考源"

