principles:
  - id: pri.monolithic_sesam_graphene_bypass_gain_lifetime_l15
    name: "单片 SESAM+graphene 绕过增益寿命带宽限制原理（Lee 2015）"
    tier: engineering
    verification_status: observed
    statement: >
      传统 fceo 稳频通过泵浦功率调制，带宽受增益介质寿命限制（Er:fiber ~µs → 带宽 ~100 kHz）。
      Graphene EOM 通过栅极电压直接调制 Fermi 能级 → 调制光学吸收损耗（纯损耗调制，non-dispersive）→ 绕过增益介质，
      可达 MHz 级带宽。单片集成 SESAM+graphene：(a) SESAM 提供锁模（无需 NPR/NALM 调校）；(b) graphene 提供高带宽损耗调制；
      (c) 集成在单一端镜 → 简化腔设计，无额外插入损耗，适合紧凑全 PM 光纤梳。
    domain: "锁模激光器动力学；集成光子学"
    key_insight: >
      "单片集成的关键价值不仅在技术性能（带宽/损耗），更在于工程简化——传统方案需在腔内插入 graphene 金属镜（Lee 2012）
      或腔外 AOM（复杂且损耗大），单片器件作为端镜即可实现双功能"——这为野外可部署梳（无专家维护）铺平道路。
    formula: "fceo 带宽 ∝ 1/τ_modulator（graphene 响应 ~ns）>> 1/τ_gain（Er:fiber ~µs）"
    conditions: "全 PM 光纤梳；SESAM 锁模兼容；graphene 单层转移工艺；低电压驱动电路"
    source_claim: >
      "We demonstrate a device that integrates a III-V semiconductor saturable absorber mirror with a graphene electro-optic modulator, which provides a monolithic solution to modelocking and noise suppression in a frequency comb. The device offers a pure loss modulation bandwidth exceeding 5 MHz and only requires a low voltage driver."

