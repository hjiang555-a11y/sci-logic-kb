principles:
  - id: pri.monolithic_free_running_comb_low_noise
    name: "自由运行单片锁模激光低相噪原理"
    tier: engineering
    verification_status: observed
    statement: >
      单片腔通过 (a) 超低腔内损耗 (b) 近零净色散 (c) 增益介质与间隔物直接热接触 (d) 免对准
      从根本上抑制腔长/温度/声学扰动；配合锁模激光固有的量子极限脉冲间隔，
      使自由运行下的 f_rep 相位噪声逼近量子/散粒极限，可以省掉传统 OFD 所需的超稳腔 +
      主动相位锁定环节。
    domain: "光子微波生成；锁模激光相噪工程"
    key_insight: >
      "被动腔工程"替代"主动伺服"——将相噪源在硬件层消除，比事后伺服更彻底；
      为紧凑可搬移光子微波源开辟新路径。
    conditions: "单片腔免对准；低损伤增益介质；机械声学隔离良好"
    invalidated_when:
      - "腔长/温度长期漂移超出光子微波所需时标"
    source_claim: >
      "mode-locked monolithic lasers (MMLL) offer ultra-low noise performance without any phase
      noise stabilization"

  - id: pri.photodetection_shot_noise_limit
    name: "光电探测散粒噪声光微波相噪极限原理"
    tier: domain
    verification_status: observed
    statement: >
      光电二极管将光脉冲串转换为 RF 信号时，散粒噪声在每个 RF 谐波上以 N₀/2 的
      基底叠加，限制了光生微波相噪本底；在高光功率 + 低温冷却功分器降低热噪声时，
      散粒噪声成为 −180 dBc/Hz 级的最终天花板。
    domain: "光微波生成；探测器噪声"
    formula: "L(f) ≥ hν/(η·P̄_avg·f_rep²) （散粒噪声近似）"
    key_insight: >
      超低相噪光微波的最终极限是光电探测量子噪声，
      降低热/伺服噪声后必须提高光功率或用低噪声探测方案。
    conditions: "光功率足够高以突破探测器热噪声底；探测器线性"
    source_claim: >
      "a cryogenically cooled power splitter to demonstrate a state-of-the-art phase noise floor
      of less than −180 dBc/Hz below 1 MHz offset"

