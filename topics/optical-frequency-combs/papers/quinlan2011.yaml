principles:
  - id: pri.high_rep_rate_ofd_low_shot_noise
    name: "高重复率OFD降低散粒噪声底原理"
    tier: domain
    verification_status: observed
    statement: >
      光频除法器中光电探测的散粒噪声功率谱密度与重复率频率的平方成反比：散粒噪声底
      L_shot ∝ 1/(I_avg × f_rep²)。提高重复率（如从100 MHz到200 MHz）可使散粒噪声底
      降低6 dB（对同等探测光功率），从而在高偏移频率处提升相位噪声性能。
      腔内高速调制器（LiNbO₃）对于提高重复率控制带宽（~300 kHz）至关重要。
    domain: "光子微波生成 / 频率计量"
    key_insight: >
      200 MHz重复率是Er:fiber OFD达到与1 GHz Ti:sapphire OFD相当散粒噪声性能的关键，
      同时保持Er:fiber在1550 nm波长的传输和成本优势。
    conditions: "适用于光电探测功率恒定时；实际还受光电二极管饱和效应限制"
    source:
      zotero_key: "LMJN9MGA"
      claim: >
        "key to our demonstration of low phase noise is a 200 MHz repetition rate laser,
        with a high-speed intracavity modulator, and low intrinsic relative intensity noise (RIN)"

