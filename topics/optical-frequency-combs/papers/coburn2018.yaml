principles:
  - id: pri.open_path_dcs_attribution_chain
    name: "开放路径 DCS 痕量气体溯源推理链原理"
    tier: domain
    verification_status: observed
    statement: >
      多路径开放 DCS 测得的积分浓度 c_i(t) 结合实时风场与大气扩散模型 f(x, y, t)，
      可反演源位置 x_s 与流量 q_s：c_i(t) = Σ_s G(x_i, x_s, t) · q_s + ε；
      多光束时间序列提供足够约束以分辨多个源。
    domain: "大气反演；DCS 应用"
    formula: "c_i(t) = Σ_s G_is(t)·q_s + ε；源定位与量化通过贝叶斯反演"
    key_insight: >
      双梳的"宽带 + 高精度 + 快采集"使开放路径方案首次同时具备源溯源所需的
      时间连续性、空间稀疏采样与高灵敏度，突破传统点测网或卫星瞬时覆盖的不足。
    conditions: "梳光束可穿透大气（1550 nm 波段好）；风场稳定或已测；足够光束覆盖多源"
    preconditions:
      - "多光束几何对目标源可分辨"
      - "大气扩散模型在区域尺度有效"
    invalidated_when:
      - "大气扩散模型失效（强对流、复杂地形）"
      - "光束数量不足导致源位置欠约束"
    source_claim: >
      "the first remote field deployment of dual frequency comb technology, coupled with innovations
      in atmospheric inversion modeling, to enable the continuous detection, location and quantification
      of small trace gas sources over several square kilometer regions"

methods:
  - id: meth.open_path_dcs_field_monitoring
    name: "开放路径双梳野外监测方法"
    status: demonstrated
    applies_to: ent.field_deployed_dcs_c18
    steps_summary: >
      1. Er:fiber 双梳光源在中心站发射 → 稀疏布置回反射器；
      2. 每路开放路径测积分吸收谱 → HITRAN 拟合得路径积分浓度 c_i(t)；
      3. 实时接入风场 + 大气扩散模型；
      4. 贝叶斯反演求 (x_s, q_s) → 定位源 + 估算流量；
      5. 连续运行覆盖天/周时间尺度。
    required_hardware:
      - ent.field_deployed_dcs_c18
    advantages:
      - "10³× 灵敏度提升（相对传统区域方法）"
      - "连续时间分辨"
      - "可同时检测多物种"
    disadvantages:
      - "依赖风场模型准确性"
      - "需要多个回反射器与 km 级光程对准"
    source_claim: >
      "the technology achieves the goal of detecting, quantifying, and attributing emissions sources
      continuously through time, over large areas, and at emissions rates ~1000× lower"

