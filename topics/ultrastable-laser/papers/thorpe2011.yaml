  title: Frequency stabilization to 6×10⁻¹⁶ via spectral-hole burning
  year: 2011
  first_author: Thorpe
  journal: Nature Photonics
  volume: 5
  pages: 688-693
  doi: 10.1038/nphoton.2011.215
  note: '技术分支：光谱烧孔稳频（Spectral Hole Burning Frequency Reference） 首次演示 FP 腔 + SHB 两级稳频方案，
    激光先预稳定至 FP 腔（σ_y < 1×10⁻¹³）， 再锁定至 Eu³⁺:Y₂SiO₅ 光谱烧孔模式达 σ_y ≤ 6×10⁻¹⁶ @ 2–8 s。 测量光谱孔对温度（16
    kHz/K²）、压力（-11.4 Hz/Pa）和加速度（7×10⁻¹²/g）的灵敏度。 核心贡献：SHB 稳频的里程碑——首次达到 10⁻¹⁶ 级。

    '
entities: []
principles: []
methods:
- id: meth.two_stage_shb_fp_lock_thorpe11
  name: 两级稳频方法：FP腔预稳 + SHB锁定（Thorpe 2011）
  type: stabilization_technique
  purpose: '通过两级锁定方案实现超稳激光：先将激光预稳定到FP腔， 再将预稳激光锁定到Eu³⁺:Y₂SiO₅光谱烧孔模式

    '
  steps:
  - 将激光锁定到FP参考腔实现预稳定（σ_y < 1×10⁻¹³）
  - 在Eu³⁺:Y₂SiO₅晶体中烧制光谱孔
  - 使用预稳激光作为探针检测光谱孔频率
  - 将激光频率锁定到光谱孔中心
  - 测量环境灵敏度（温度、压力、加速度）
  key_parameters:
    fp_prestability: σ_y < 1×10⁻¹³
    shb_stability: σ_y ≤ 6×10⁻¹⁶ @ 2–8 s
    temperature: 4 K
