      IBS 工艺成熟、成本低、波长覆盖广；AlGaAs 制备复杂（MBE+基底转移）、有固有双折射（4 MHz 劈裂）。

principles:
  - id: pri.crystalline_coating_low_brownian_noise
    name: "单晶镀层低布朗热噪声原理"
    tier: domain
    verification_status: observed
    statement: >
      传统 IBS 介质镀层（SiO₂/Ta₂O₅ 等）的非晶结构引起高机械损耗（φ ~ 4×10⁻⁴）。
      单晶半导体多层反射镜（AlGaAs/GaAs）的有序晶体结构使损耗角降至 φ ~ 2.5×10⁻⁵（Q ~ 4×10⁴，室温），
      根据涨落耗散定理，布朗热噪声功率谱密度降低约 10×（损耗角之比）。
      低温（10 K）下 AlGaAs Q 可进一步提升约 6×，损耗角降至 ~4.5×10⁻⁶。
    domain: "精密光学镀层，低热噪声干涉仪"
    formula: "S_x,c(f) ∝ φ_c × k_B × T / (π × f × k_eff)；φ_AlGaAs / φ_IBS ≈ 1/16（室温）"
    key_insight: >
      镀层热噪声突破不在于改进 IBS 工艺（受限于非晶本质），
      而在于改变材料体系：有序单晶结构从根本上降低机械损耗。
    conditions: "T = 300 K（室温）；键合界面无附加损耗（van der Waals 直接键合 + 退火）"
    applicable_when: "AlGaAs/GaAs DBR，650 nm–3 μm 波长范围"
    source_claim: >
      "we observe a thermally limited noise floor consistent with a tenfold reduction
       in mechanical damping when compared with the best dielectric multilayers"

