  demonstrated_value:
    value: 5.6×10⁻¹⁶ @1s (单腔推断); 7.9×10⁻¹⁶ @1s (双腔拍频)
    conditions: 10 cm ULE 间隔物 + FS 镜, 1064 nm, 振动不敏感设计, 温度稳定
    verification_status: observed
