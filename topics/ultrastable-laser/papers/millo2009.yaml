meta:
  zotero_key: GLXHEIPV
  source_type: technical_paper
  contribution_type: evidence
  reliability: high
  title: Ultra-stable lasers based on vibration insensitive cavities
  year: 2009
  first_author: Millo
  journal: Physical Review A
  volume: 79
  pages: 053829
  doi: 10.1103/PhysRevA.79.053829
  note: '两台使用 FS（熔融石英）镜基底的振动不敏感腔超稳激光：竖直光轴+水平光轴两种设计。 振动灵敏度 ≤1.5×10⁻¹¹ per m/s²（各方向），支撑点位置依赖极低（无需精细调谐）。
    稳定度 5.6×10⁻¹⁶ @1s（单腔推断），为该腔长（10cm）最佳结果。 首次使用 FS 镜降低热噪声（较全 ULE 腔提升 ~2×）。 LNE-SYRTE（Santarelli/Lemonde
    组），1064 nm。

    '
methods:
- id: meth.vibration_insensitive_cavity_design_m09
  name: 振动不敏感腔设计（Millo 2009）
  full_name: Vibration-insensitive cavity design with low support-point sensitivity
  status: demonstrated
  category: 腔体设计方法
  applies_to: ent.fp_cavity_system
  steps_summary: '设计竖直和水平光轴两种10 cm FP腔，采用FS镜基底降低热噪声，通过对称支撑点设计和优化几何形状， 使振动灵敏度对各方向≤1.5×10⁻¹¹
    per m/s²，且支撑点位置依赖性极低，无需精细调谐。

    '
  advantages:
  - 低振动灵敏度（各方向≤1.5×10⁻¹¹ per m/s²）
  - 支撑点位置依赖低，易于安装
  - FS镜降低热噪声（相比全ULE腔）
  disadvantages:
  - FS镜CTE不为零，需温控
  - 仅10 cm腔长，热噪声极限相对较高
  note: 'Millo 2009首次演示FS镜腔，振动灵敏度达到当时最佳水平。

    '
  source_claim: '"Vibration sensitivity components measured are equal to or better
    than 1.5×10⁻¹¹ per m/s² for each spatial direction"

    '
