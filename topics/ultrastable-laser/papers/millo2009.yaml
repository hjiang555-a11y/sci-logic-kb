meta:
  zotero_key: "GLXHEIPV"
  source_type: technical_paper
  reliability: high
  title: "Ultra-stable lasers based on vibration insensitive cavities"
  year: 2009
  first_author: Millo
  journal: "Physical Review A"
  volume: 79
  pages: "053829"
  doi: "10.1103/PhysRevA.79.053829"
  note: >
    两台使用 FS（熔融石英）镜基底的振动不敏感腔超稳激光：竖直光轴+水平光轴两种设计。
    振动灵敏度 ≤1.5×10⁻¹¹ per m/s²（各方向），支撑点位置依赖极低（无需精细调谐）。
    稳定度 5.6×10⁻¹⁶ @1s（单腔推断），为该腔长（10cm）最佳结果。
    首次使用 FS 镜降低热噪声（较全 ULE 腔提升 ~2×）。
    LNE-SYRTE（Santarelli/Lemonde 组），1064 nm。

