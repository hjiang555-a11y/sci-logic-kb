methods:
  - id: meth.optical_freq_purification_w24
    name: "光频净化中继方法（双级控制 + 周期跳变消除）"
    status: demonstrated
    steps_summary: >
      本地超稳激光锁定至参考腔（PDH）→
      第一级：开环频率补偿消除大频率漂移 →
      第二级：10 Hz 带宽闭环相位锁定至上游传输光频 →
      FPGA 实时检测并消除相位周期跳变 →
      净化光频输出供后续传输
    source_claim: >
      "Utilizing a cavity-stabilized hertz-linewidth laser, we synchronized the phase noise
      with that of the signal received from the previous link within a 10 Hz bandwidth."

