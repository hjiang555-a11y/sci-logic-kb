  first_author: Grabielle
  journal: Optics Express
  volume: 33
  issue: 16
  pages: '35028'
  doi: 10.1364/OE.33.035028
  note: '研究光纤延迟线 PDH 锁频中的锁定过程噪声。 白频率噪声底限来自频率鉴频器非线性。 通过增大锁定带宽降低此噪声至非线性不再限制的水平。 核心贡献：识别并解决光纤延迟线锁频的锁定噪声限制。

    '
entities: []
principles:
- id: pri.fdl_locking_noise_nonlinearity
  name: 光纤延迟线锁定噪声——鉴频器非线性
  tier: domain
  verification_status: observed
  statement: '光纤延迟线 PDH 频率稳定中，频率鉴频器的非线性 将残余频率波动转换为白频率噪声底限。 增大锁定带宽可降低残余频率波动，从而降低非线性噪声贡献。

    '
  domain: 光纤延迟线稳频
  key_insight: 鉴频器非线性是 FDL 锁定的一个重要噪声源，可通过增大带宽解决。
  conditions: 适用于 PDH 锁定到光纤延迟线的配置
  source_claim: white frequency noise floor... focusing on the role of frequency discriminator
    nonlinearity
methods:
- id: meth.fdl_locking_bandwidth_optimization
  name: 光纤延迟线锁定带宽优化（Grabielle 2025）
  procedure:
  - 分析光纤延迟线PDH锁定系统中的频率鉴频器非线性。
  - 测量不同锁定带宽下的频率噪声谱。
  - 确定非线性引起的白频率噪声底限。
  - 增大锁定带宽以减少残余频率波动，从而降低非线性噪声贡献。
  domain: laser_stabilization
  subdomain: noise_analysis
  inputs:
  - fiber_interferometer
  - pdh_system
  outputs:
  - optimized_locking_bandwidth
  note: 该方法识别并解决了光纤延迟线锁定的一个关键噪声源。
