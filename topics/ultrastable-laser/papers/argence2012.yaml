principles:
  - id: pri.midplane_rigid_mounting_space
    name: "中平面刚性固定空间腔安装原理"
    tier: engineering
    verification_status: observed
    statement: >
      将腔体在其轴向对称的中平面通过环形法兰刚性固定，
      利用 Invar CFD 的双悬臂梁结构解耦热膨胀差异和机械应力。
      中平面固定确保轴向加速度对腔长的影响因对称性而消失，
      同时提供足够刚度承受空间发射振动（数 g）。
    domain: "空间/可搬运参考腔设计"
    key_insight: "中平面对称固定 + 双悬臂梁解耦，可同时满足低振动灵敏度和高机械鲁棒性。"
    conditions: "适用于圆柱形腔体，需要精密 FEM 优化加工公差"
    preconditions:
      - "腔体和 CFD 的加工公差控制在 FEM 分析允许范围内"
