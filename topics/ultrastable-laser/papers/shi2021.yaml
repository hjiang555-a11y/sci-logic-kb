  title: Thinly coated hollow core fiber for improved thermal phase-stability performance
  year: 2021
  first_author: Shi
  journal: Optics Letters
  volume: 46
  issue: 20
  pages: 5177-5180
  doi: 10.1364/OL.46.005177
  note: '实验证明空心光纤（HCF）涂层对热相位灵敏度的显著影响： 涂层贡献可使 HCF 热灵敏度恶化数倍。 薄外壁 HCF（~20 μm）受涂层影响尤为显著。
    核心贡献：解释了 HCF 热灵敏度文献差异的物理机制。

    '
entities: []
principles:
- id: pri.hcf_coating_thermal_sensitivity
  name: 空心光纤涂层热灵敏度机制
  tier: domain
  verification_status: observed
  statement: 'HCF 的热相位灵敏度不仅来自玻璃本身， 涂层材料的热膨胀（α_coating = 180 ppm/K）通过应力耦合 使光纤有效热膨胀系数显著增加。
    当涂层截面积与玻璃截面积可比时，涂层贡献可与玻璃本身相当或更大。 这解释了文献中 HCF 热灵敏度差异的 3–20 倍范围。

    '
  domain: 空心光纤 / 热稳定性
  key_insight: 涂层热膨胀通过应力耦合主导了薄壁 HCF 的热灵敏度。
  conditions: HCF 玻璃外壁较薄（~20 μm），涂层截面积不可忽略
  source_claim: coating contribution lies behind most of the discrepancies in the
    thermal sensitivity measured for HCFs
methods:
- id: meth.coating_thermal_sensitivity_characterization_shi21
  name: 空心光纤涂层热灵敏度表征方法
  description: '通过测量不同涂层厚度空心光纤的温度依赖性相位变化， 分离涂层与玻璃本体的热膨胀贡献，量化涂层对整体热灵敏度的影响。 实验使用可调温环境箱和干涉仪相位测量系统。

    '
  applicable_when: 需要评估涂层对HCF热稳定性的影响，尤其是薄壁光纤
  implementation_hints: '对比不同涂层厚度样品，测量相位随温度变化斜率； 通过截面几何参数计算涂层截面积占比； 拟合得到涂层热膨胀系数有效贡献。

    '
