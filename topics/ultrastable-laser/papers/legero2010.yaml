meta:
  zotero_key: "MW3RDB68"
  source_type: technical_paper
  reliability: high
  title: "Tuning the thermal expansion properties of optical reference cavities with fused silica mirrors"
  year: 2010
  first_author: Legero
  journal: "Optics Letters"
  volume: 35
  pages: "1275-1277"
  doi: "10.1364/OL.35.001275"
  note: >
    研究 LTE（低热膨胀）间隔物 + 熔融石英（FS）镜的混合材料腔热膨胀特性。
    发现 FS 镜导致 CTE 零点温度比全 ULE 腔降低约 20 K，
    但通过在 FS 镜背面光学贴合 ULE 环可调谐零点温度范围 ~30 K。
    PTB（Legero/Kessler/Sterr），为后续 Millo 2009 等 FS 镜低热噪声腔提供工程基础。
    CTE 调谐技术作为腔热漂移控制的子内容记录，不单独建立原理节点。

