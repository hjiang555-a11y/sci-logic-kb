principles:
  - id: pri.ram_pdh_frequency_offset
    name: "RAM引起PDH频率偏移原理"
    tier: domain
    verification_status: observed
    statement: >
      在PDH锁频中，EOM产生的残余幅度调制（RAM）在调制频率ωm处产生
      与锁定信号叠加的虚假信号，导致锁定点偏离腔谐振中心，
      产生频率偏移。RAM引起的分数频率不稳定度为：
        σ_y = σ_RAM × κ / ν
      其中κ为腔线宽，ν为光学频率。
      对固定RAM幅度σ_RAM（ppm量级），腔越窄（κ越小）或光频越高（ν越大），
      RAM引起的σ_y越小，故更长（窄线宽）的腔或更高光频对RAM更不敏感。
    domain: "激光频率稳定，PDH锁频"
    formula: "σ_y = σ_RAM × (κ / ν)"
    key_insight: >
      RAM是PDH锁频中除热噪声和振动外的第三类系统误差来源；
      在腔热噪声极限处于10⁻¹⁶–10⁻¹⁷时，RAM抑制至ppm量级是必要条件。
    conditions: "PDH锁频工作状态，RAM < 腔线宽"
    source_claim: >
      "RAM introduces frequency offset noise to the servo error signal and
       thus degrades the laser frequency stability"

  - id: pri.ram_active_cancellation
    name: "RAM双通道主动消除原理"
    tier: engineering
    verification_status: observed
    statement: >
      EOM产生的RAM包含两个分量：
        同相分量：由EOM晶体自然双折射引起，DC电场可直接补偿（sin(Δφ+ΔφDC)=0）；
        正交分量：由EOM压电致弹光效应和光束不均匀性引起，需温度反馈抑制。
      DC电场对同相响应比正交响应大20倍；温度反馈对正交响应比同相响应大5倍。
      两路并行伺服分别抑制两分量，实现综合56 dB RAM抑制（至~30 ppm残余，
      受光路中残余标具效应限制）。
    domain: "激光频率稳定，EOM控制"
    key_advantage: >
      同时消除RAM的长期漂移（正交伺服带宽<0.1 Hz，由EOM热响应时间限制），
      是相较于仅使用DC场反馈的以往方法的关键改进。
    conditions: >
      波导型EOM（减少光束位置变化引起的RAM相位漂移）；
      同相伺服带宽~200 kHz；正交伺服带宽<0.1 Hz
    source_claim: >
      "The DC electric field affects the in-phase response 20 times larger
       than the quadrature response ... working in tandem, suppress both
       the in-phase and quadrature components of the RAM to the 1 ppm level"

methods:
  - id: meth.dual_channel_ram_cancellation_z14
    name: "双通道 RAM 主动消除方法（Zhang 2014）"
    description: "通过同相DC电场和正交温度反馈双通道伺服将RAM抑制至1 ppm的方法"
    core_principle: pri.ram_active_cancellation
    key_entity: ent.eom
    reliability: established
    verification_status: observed
    source: {zotero_key: "S5GJNVG8", claim: "active servo comprising in-phase and quadrature RAM corrections allows frequency stabilization comparable to fundamental thermal noise limit"}

metrics:
  - id: met.ram_fractional_instability
    name: "RAM引起的分数频率不稳定度"
    unit: "无量纲（Allan偏差）"
    description: "因RAM导致的PDH锁频系统分数频率不稳定度上限"
    demonstrated_value:
      value: "σ_y ≤ 1×10⁻¹⁶（35 mm腔，κ=28 kHz，σ_RAM=1 ppm）"
      conditions: "波导EOM + 双通道主动RAM消除伺服；1 ppm RAM稳定度，1–1000 s"
      verification_status: observed
      confidence: established
      source: {zotero_key: "S5GJNVG8", claim: "σ_RAM at 1 ppm corresponds to σ_y of 1×10⁻¹⁶ for 35 mm cavity"}
    note: >
      对210 mm Si腔（κ=3 kHz），5 ppm RAM → σ_y=8×10⁻¹⁷，接近Si腔热噪声极限。
      RAM不再是限制因素（贡献低于腔热噪声极限）。

