  hierarchy_level: ext
  status: demonstrated
  function: 以光纤干涉仪为参考，实现可大范围扫频且频率噪声极低的激光源
  note: '重构后降级为 ext（外围条件/系统描述）。 agile_laser_system 实质是 ent.laser_source + ent.fiber_interferometer
    + meth.fiber_delay_locking 的组合， 不是独立的频率参考部件。其指标（met.freq_noise_psd_fiber, met.allan_deviation_fiber）
    反映的是整个光纤稳频系统的性能。

    '
  key_parameters:
    laser_type: 外腔半导体激光（ECDL，通用光纤波段）
    sweep_range: 可在数 GHz 至数十 GHz 范围线性扫频
    actuators_slow: PZT 腔长调节（低频，< 几 kHz）
    actuators_fast: AOM0（高频偏频，带宽约 20 kHz）
  key_performance:
    freq_noise_psd_static: 约 10—100 Hz²/Hz @ 1 Hz（静态，接近 ULE 腔稳激光水平）
    allan_deviation_static: ~10⁻¹⁴ @ 0.1—1 s（静态）
    sweep_linearity: < ppm 级偏差（使用伺服补偿后）
