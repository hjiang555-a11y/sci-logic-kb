    光纤对温度的敏感性远高于 ULE 腔（ULE 有 CTE 零点，光纤没有）。

    '
principles:
- id: pri.fiber_delay_line_frequency_ref
  name: 光纤延迟线频率参考原理
  tier: domain
  verification_status: observed
  statement: '长光纤作为光延迟线（Delay Line），使同一激光在不同时刻的相位 通过干涉进行比较。延迟时间 τ = n·L/c（L 为光纤长度，n
    为折射率）。 激光频率起伏 δν 转化为干涉相位起伏 δφ = 2π·δν·τ， 经 AOM 外差探测后提取误差信号并反馈。

    '
  domain: 激光频率稳定（替代方案）
  formula: δφ = 2π · δν · τ = 2π · δν · nL/c
  key_advantage: 不依赖光学谐振，天然支持扫频（可捷变）
  key_limitation: '对高于 1/τ 的频率噪声敏感度下降（高频区响应弱）； 参考本身（光纤延迟线）受温度、振动影响，长期稳定度低于刚性腔。

    '
  conditions: '光纤延迟线长度足以提供所需的频率鉴别灵敏度（nL/c ≫ 1/f_max）； 光纤为工作波长单模；法拉第旋转镜或等效偏振补偿保证干涉可见度；
    AOM 外差频率远离光纤声学/机械噪声频段；光纤温度环境足够稳定。

    '
  source_claim: "\"fiber interferometer as an optical frequency reference provides\n\
    \ ultra-low frequency noise while allowing laser frequency agility\"\n"
  preconditions:
  - 'Fiber delay line length L is sufficient to provide adequate frequency discrimination
    sensitivity: δφ = 2π·δν·nL/c requires nL/c ≫ 1/f_max where f_max is the highest
    Fourier frequency of interest'
  - Fiber is single-mode at operating wavelength (higher-order mode interference would
    corrupt error signal)
  - Faraday rotation mirrors (FRM) or equivalent polarization compensation is employed
    to maintain stable interference visibility despite fiber birefringence drift
  - AOM heterodyne detection frequency is well outside the acoustic/mechanical noise
    band of the fiber spool
  - Fiber thermal environment is sufficiently stable that temperature-induced optical
    path length drift does not saturate the servo dynamic range on the measurement
    timescale
  invalidated_when:
  - Fiber birefringence changes faster than FRM can compensate (e.g., rapid mechanical
    stress on fiber spool)
  - Temperature drift rate exceeds servo tracking bandwidth × frequency capture range
    (servo loses lock)
  - Rayleigh backscattering noise exceeds signal during frequency sweep (sweep rate
    × fiber length product too large)
  - Acoustic/vibrational noise on fiber spool exceeds thermal noise floor (insufficient
    acoustic isolation)
  - Fiber length thermally drifts sufficiently to shift operating point outside linear
    range of error signal
- id: pri.rayleigh_backscattering_noise
  name: Rayleigh 背向散射（RBS）——扫频时的根本噪声极限
  tier: domain
  verification_status: observed
  statement: '光纤中的微观折射率不均匀性（密度/组分涨落）产生 Rayleigh 散射。 向后散射的光（RBS）与正向传输光在探测器上干涉， 形成随机频率分布的"寄生干涉条纹"（fake
    fringe）。 在静态锁频时，RBS 信号时间平均后相对稳定，影响可接受； 在快速扫频（啁啾）时，每个散射点对应不同延迟， 大量 RBS 贡献叠加后形成动态随机噪声，成为扫频误差的根本极限。

    '
  domain: 光纤干涉仪稳频，扫频激光
  key_insight: 'RBS 是光纤干涉仪（对比 FP 腔）特有的根本噪声机制， 无法通过普通滤波或信号处理消除。

    '
  mitigation_strategies:
  - 降低光纤注入功率（减少受激 RBS，但会降低 SNR）
  - 使用偏振分集接收（减少偏振相关 RBS 干涉）
  - 采用更短光纤（减少总 RBS，但降低灵敏度/延迟时间）
  engineering_tradeoff:
    description: 'Rayleigh 背向散射噪声随光纤长度和光功率积累。 缩短延迟线或降低注入功率可减轻扫频时的 RBS 条纹噪声， 但同时会减小延迟时间
      τ、降低频率鉴别灵敏度或牺牲误差信号信噪比。

      '
    scaling: RBS burden ↑ with effective fiber length and optical power; sensitivity
      ∝ τ
    note: 原独立节点 pri.shorter_delay_line_rbs_tradeoff 已并入此字段
  conditions: 扫频（线性啁啾）时特别显著；静态锁频时相对可控
  source_claim: "\"Rayleigh backscattering is the fundamental limitation of the\n\
    \ fiber interferometer reference during frequency chirping\"\n"
  preconditions:
  - Analysis assumes single-mode fiber with standard Rayleigh scattering coefficient
    (~αR = 4.5×10⁻⁵ /m for SMF-28 at 1550 nm)
  - Backscattered light is coherent with forward-propagating light within coherence
    length of the laser
  - Fiber is operated in the spontaneous (not stimulated) Brillouin scattering regime
    — i.e., optical power is below stimulated Brillouin threshold
  - Interference between backscattered and forward light occurs at the detector with
    appreciable visibility (polarization not fully orthogonal)
  invalidated_when:
  - Hollow-core fiber is used instead of solid-core fiber — Rayleigh backscattering
    is reduced by >40 dB (Michaud-Belleau 2021), making other noise sources dominant
  - Static (non-sweeping) operation where backscattering produces a fixed phase offset
    that can be calibrated out
  - Optical power exceeds stimulated Brillouin threshold — stimulated scattering dynamics
    replace spontaneous RBS as the limiting mechanism
  - Very short fiber lengths (<10 m) where total accumulated backscattering is negligible
    compared to detector noise
  open_questions:
  - Can hollow-core antiresonant fiber (NANF) eliminate Rayleigh backscattering as
    a limitation while maintaining sufficient delay-line thermal stability for sub-Hz
    linewidth applications?
  - What is the minimum fiber length at which RBS transitions from negligible to dominant
    noise source during typical sweep rates (1-100 GHz/s)?
  - Can polarization-diverse detection schemes completely separate RBS interference
    from the heterodyne error signal, or is there a fundamental cross-coupling limit?
- id: pri.aom_heterodyne_fiber_detection
  name: AOM 外差检测（光纤干涉仪误差信号提取）
  tier: domain
  verification_status: observed
  statement: '在参考臂中插入 AOM（声光调制器），使参考臂光偏移固定频率 f_AOM（约 40 MHz）。 与信号臂（延迟臂）光干涉后，在探测器产生差拍信号。
    该差拍信号的相位包含激光频率起伏信息， 经相敏解调（类 PDH）后得到误差信号，反馈到激光。

    '
  domain: 光纤干涉仪稳频
  conditions: AOM 偏频频率远大于伺服带宽；参考臂与信号臂的偏振态需匹配（或使用 FRM 保偏）
  key_advantage: 可分离载波与误差信号，抑制强度噪声（外差优势）
  analogy: '在功能上类似 PDH 的射频外差探测， 区别在于参考频率偏移来自 AOM（而非 EOM 产生的光学边带）。

    '
  source_claim: "\"AOM heterodyne detection in the reference arm provides the frequency\n\
    \  error signal for the servo loop\"\n"
methods:
- id: meth.fiber_delay_locking
  name: 光纤延迟线锁频（Fiber Delay Line Locking）
  full_name: 光纤迈克尔逊干涉仪 AOM 外差稳频法
  status: demonstrated
  applies_to: ent.fiber_interferometer
  steps_summary: '激光分束 → 参考臂（含 AOM，移频 f_AOM）→ 延迟臂（长光纤 2.5 km，FRM 反射）→ 两臂干涉 → AOM 频率处外差探测
    → 相敏解调得误差信号 → 快速反馈至 AOM0（偏频）+ 慢速反馈至 PZT（腔长）

    '
  required_hardware:
  - ent.fiber_interferometer
  advantages:
  - 天然支持大范围扫频（可捷变），FP 腔方案扫频困难
  - 无需精密光学装调（ULE 腔需极其精密的机械设计）
  - 成本低，工程化友好
  disadvantages:
  - 长期频率稳定度不如 ULE 腔（缺乏 CTE 零点和绝对参考）
  - 扫频时 RBS 噪声成为根本限制
  - 温度/振动影响光纤长度（需额外隔振控温）
  conditions:
  - 对扫频线性度要求高（如 FMCW LiDAR、光频梳锁定）
  - 对绝对频率稳定度要求不如计量级实验严格
  source_claim: "\"fiber interferometer approach is particularly suited for agile\
    \ lasers\n requiring low noise and high sweep linearity\"\n"
