  title: "An agile laser with ultra-low frequency noise and high sweep linearity"
  year: 2010
  first_author: "Jiang"
  journal: "Optics Express"
  volume: 18
  pages: 3284-3297
  doi: 10.1364/OE.18.003284
  note: >
    演示了以光纤迈克尔逊干涉仪（非刚性 FP 腔）作为频率参考的超低噪声可捷变激光。 在非扫频条件下频率噪声接近 ULE 腔稳激光水平； 扫频时的根本限制：Rayleigh 背向散射（RBS）产生的干涉条纹噪声。 核心贡献：光纤干涉仪方案与 FP 腔方案的工程权衡得到量化比较。
entities:
- id: ent.fiber_interferometer
  name: 光纤迈克尔逊干涉仪（频率参考）
  aliases:
  - fiber Michelson interferometer
  - 光纤频率参考
  - fiber delay line interferometer
  hierarchy_level: 1
  status: demonstrated
  function: '以长光纤线轴（2.5 km SMF-28 单模光纤）作为延迟臂， 构成迈克尔逊干涉仪（含法拉第旋转镜 FRM，消除偏振漂移）； 通过 AOM
    异差探测，提取激光频率相对于光纤延迟线的误差信号， 作为频率参考替代刚性 FP 腔。

    '
  key_parameters:
    fiber_length: 2.5 km SMF-28
    interferometer_type: Michelson with Faraday Rotation Mirrors (FRM)
    detection_scheme: AOM heterodyne（AOM3 在参考臂中，移频约 40 MHz）
    packaging: 光纤线轴盘绕，放置于隔振箱内
    equivalent_q_factor: Q_eff = π·ν₀·τ_delay ≈ 10⁹（远低于 FP 腔的 ~10¹⁰，但无共振增强）
    temperature_sensitivity: dn/dT ≈ 1.1×10⁻⁵/K（无 CTE 零点，与 FP 腔的 ULE/Si 材料物理不同）
    internal_components:
      faraday_rotation_mirror: 法拉第旋转镜（FRM）——将反射光偏振态旋转 90°，补偿光纤双折射引起的偏振漂移，保证干涉信号对比度稳定
      aom_reference: AOM3 在参考臂中，移频约 40 MHz，用于外差检测
  interface_requirements:
    temperature: 温度稳定性 < 0.1 K/day（以保持长期频率稳定度）
    vibration: 机械振动 < mrad/s 量级（避免光纤相位扰动）
  key_advantage: 可在宽频率范围内扫频（可捷变）；无需精密 ULE 腔
  key_limitation: '非刚性结构，腔长随温度/应力缓慢漂移（长期频率参考不如 ULE 腔）； 扫频时 Rayleigh 背向散射（RBS）是根本限制。

    '
  thermal_noise_specific:
    mechanism: Thermorefractive noise (dn/dT fluctuations) and thermoelastic noise
      (thermal expansion α fluctuations) in silica fiber core
    key_difference_from_fp_cavity: 'Unlike FP cavity thermal noise (dominated by mirror
      surface displacement via FDT/Brownian motion), fiber thermal noise is dominated
      by thermorefractive index fluctuations in the fiber core material. The noise
      scales with fiber length L (more material → more fluctuation) but also with
      1/L in terms of fractional frequency (longer delay line → better frequency discrimination).
      Net effect: longer fiber generally wins for short-term stability but worsens
      long-term temperature drift.

      '
    preconditions:
    - Fiber core is solid silica (standard SMF-28 or similar); thermorefractive coefficient
      dn/dT ≈ 1.1×10⁻⁵/K dominates over thermal expansion α ≈ 0.55×10⁻⁶/K
    - No CTE zero crossing exists for silica fiber — unlike ULE/Si cavity materials,
      temperature sensitivity cannot be nulled by operating at a specific temperature
    - Thermal noise limit assumes all technical noise (vibration, laser intensity,
      RAM) has been suppressed below the thermorefractive floor
    failure_conditions:
    - Hollow-core fiber fundamentally changes the thermal noise mechanism — thermorefractive
      noise from silica walls is replaced by gas thermodynamics (pressure, composition)
    - Very short fiber (<10 m) where thermal noise amplitude is below detector noise
      floor — system becomes detector-noise limited
    - 'Cryogenic operation of fiber spool: silica dn/dT decreases at low temperatures,
      but no CTE zero crossing eliminates the fundamental sensitivity'
    scaling: Phase noise PSD ∝ k_B T² × (dn/dT)² × L / (A_eff × κ × f²) — Wanser model
      for thermorefractive noise
    source:
      zotero_key: T8JR8IJ7
      note: Jiang 2010 discusses thermal limits; detailed thermal noise models in
        Wanser 1992 and Duan 2010
