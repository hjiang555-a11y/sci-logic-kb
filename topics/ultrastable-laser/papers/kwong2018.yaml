principles:
- id: pri.nexcera_dimensional_stability
  name: NEXCERA 陶瓷长期尺寸稳定性
  tier: domain
  verification_status: observed
  statement: 'NEXCERA 是一种可机械加工的超低热膨胀陶瓷，CTE 在室温（约 23°C）附近过零， |α| < 0.03×10⁻⁶ K⁻¹（23°C）。本文首次精确测量其长期分数长度漂移率为
    −(1.74±0.01)×10⁻⁸ yr⁻¹，优于 Zerodur（约 10⁻⁷ yr⁻¹）， 但比最优 ULE（~0.4×10⁻⁸ yr⁻¹）稍大，约为
    ULE 较差值（~2.5×10⁻⁸ yr⁻¹）的量级。 杨氏模量 140 GPa 高于 ULE（67.6 GPa）和 Zerodur（90.3 GPa），力学刚度更强。

    '
  domain: 精密光学腔间隔体材料
  formula: L⁻¹dΔL/dt = −(1.74±0.01)×10⁻⁸ yr⁻¹
  key_insight: NEXCERA CTE 零点在室温附近，无需低温运行，但长期漂移仍大于最优 ULE
  conditions: 室温（约 22.9°C CTE 零点）；N118C 批次；光学腔法精密测量
  source:
    zotero_key: JP6J4EQD
    claim: At room temperature, we found a fractional length drift rate L^-1 d∆L/dt
