methods:
- id: meth.optical_cavity_dimensional_metrology
  name: 光学谐振腔尺寸稳定性精密测量法
  status: demonstrated
  applies_to: ent.nexcera_optical_cavity_k18
  steps_summary: '将待测材料制成光学腔间隔体 → Nd:YAG 参考激光（锁定至超稳 ULE 腔）注入待测腔 → 光频梳（氢钟参考）测量激光绝对频率
    → EOM 边带扫描确定腔模频率 → 长期（数月）重复测量腔频率变化 → 提取分数长度漂移率

    '
  source_claim: '"An extremely sensitive method for determining the long-term dimensional
    stability of a material consists of manufacturing the material into a spacer for
    an optical cavity. One of the mode frequencies of such a cavity is then measured
    repeatedly against an atomic frequency standard."

    '
