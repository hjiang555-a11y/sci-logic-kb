principles:
  - id: pri.shg_excess_phase_noise_limit
    name: "二次谐波产生额外相位噪声极限"
    tier: domain
    verification_status: observed
    statement: >
      PPLN 波导 SHG 的额外相位噪声来源包括：
      (1) 温度波动引起的折射率变化，
      (2) Kerr 效应（χ⁽³⁾ 或级联 χ⁽²⁾ 过程的强度依赖相移），
      (3) 热噪声。
      在稳态工作条件下，PPLN 波导 SHG 的额外相位噪声谱密度
      比当前最佳硅腔稳定激光噪声低至少两个数量级（<10 Hz）。
      光功率变化导致的相位啁啾是需要关注的系统效应。
    domain: "频率倍频 / 光钟"
    key_insight: "PPLN 波导 SHG 在稳态下不是光钟激光性能的限制因素。"
    conditions: "稳态工作，光功率变化缓慢"
    preconditions:
      - "SHG 模块温度稳定"
      - "输入光功率稳定"
    invalidated_when:
      - "光功率快速切换导致的相位啁啾超过钟精度预算"
    source_claim: >
      "excess phase noise of the doubler under steady-state operation is at least two orders of
      magnitude lower than the noise of today's best interrogation lasers"
    open_questions:
      - "光功率变化引起的相位啁啾的补偿方案是否可以做到完全透明？"

methods:
  - id: meth.dual_shg_differential_h19
    name: "双 SHG 模块差分对比测量方法"
    description: >
      使用两个相同的 PPLN 波导 SHG 模块进行差分对比测量，以分离出倍频器本身的额外相位噪声，
      排除共模激光噪声。测量时，同一超稳激光源分束后分别输入两个 SHG 模块，
      输出二次谐波拍频，其相位噪声谱即为 SHG 额外相位噪声的两倍。
    status: demonstrated
    source_claim: >
      "We compare the phase noise of two identical frequency doublers using a common laser source."
    implements: [pri.shg_excess_phase_noise_limit]
    characterizes: [met.shg_excess_phase_noise_h19]
    used_with: [ent.ppln_shg_module_h19]

