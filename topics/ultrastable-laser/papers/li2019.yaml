    name: "大型光纤陀螺仪热相位噪声"
    tier: foundational
    verification_status: observed
    statement: >
      光纤中的热力学温度波动通过热光效应和热膨胀
      引起折射率和长度变化，产生相位噪声。
      在大型 IFOG（L > 10 km）中，热相位噪声不可忽略，
      成为限制探测灵敏度和带宽的基本噪声源。
      高阶本征频率调制可抑制漫步分量，但残余噪声限制高频带宽。
