meta:
  zotero_key: "LCMWCIWB"
  source_type: technical_paper
  reliability: high
  title: "Optical performance of large-area crystalline coatings"
  year: 2018
  first_author: Marchio
  journal: "Optics Express"
  volume: 26
  issue: 5
  pages: "6114-6125"
  doi: "10.1364/OE.26.006114"
  note: >
    首次系统表征 50.8 mm（2 英寸）直径 GaAs/AlGaAs 晶体镀层的光学性能，
    包括透射（6 ppm）、吸收（≤0.8 ppm）、散射（6–9.5 ppm）和缺陷密度（0.85/mm²）。
    验证大面积晶体镀层可达到与 IBS 非晶镀层相当的光学品质，
    为引力波探测器和超稳激光参考腔的应用铺平道路。

entities:
  - id: ent.large_area_crystalline_coating_m18
    name: "大面积 GaAs/AlGaAs 晶体镀层（2 英寸）"
    aliases: ["large-area crystalline coating", "50.8 mm AlGaAs coating"]
    hierarchy_level: 2
    status: demonstrated
    function: >
      将基底转移法制备的 GaAs/Al₀.₉₂Ga₀.₀₈As 多层晶体镀层扩展到 2 英寸直径，
      在熔融石英和蓝宝石基底上实现引力波探测器级的光学品质。
      35.5 周期结构设计在 1064 nm 实现 6 ppm 透射率和极低吸收。
    key_parameters:
      diameter: "50.8 mm (2 inch)"
      coating_structure: "35.5-period GaAs/Al₀.₉₂Ga₀.₀₈As"
      design_wavelength: "1064 nm"
      transmission_at_1064nm: "6 ppm (both substrates)"
      absorption_fused_silica: "≤0.8 ppm"
      absorption_sapphire: "below noise floor"
      tis_fused_silica: "9.5 ppm"
      tis_sapphire: "6 ppm"
      defect_density: "0.85 defects/mm²"
      roughness_fused_silica: "0.4 nm rms (1 μm–1 mm)"
      roughness_sapphire: "0.15 nm rms (1 μm–1 mm)"
    practical_limitations:
      - description: "早期原型的缺陷密度仍高于目标，大尺寸缺陷（>100 μm）需改善"
        source_claim: "total number of large defects (at the 100 μm or greater size scale) is higher than that of the test masses of Virgo"
        impact: "散射损耗可能限制高功率引力波探测器应用"
      - description: "蓝宝石基底表面质量不理想导致粘合界面缺陷"
        source_claim: "sapphire samples had an excessively poor surface figure"
        impact: "限制蓝宝石基底的良率和光学品质"
    note: "与 ent.algaas_crystalline_mirror_c13（定义于 cole2013.yaml）相关，本文聚焦大面积制造。"

