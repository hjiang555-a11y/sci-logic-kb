entities:
  - id: ent.cutout_cavity_mount_w07
    name: "切口腔体安装设计（Webster 2007）"
    aliases: ["cutout cavity", "vibration insensitive optical cavity", "cutout spacer with 4-point mount"]
    hierarchy_level: 2
    status: demonstrated
    function: >
      通过底部方形切口（补偿竖直加速度引起的腔体不对称形变）
      和四点对称橡胶球支撑（保证水平方向力学对称），
      使腔镜面中心间距在外部加速度作用下保持不变，
      从而实现全向振动不敏感性，替代依赖被动隔振来降低振动影响的传统方案。
    key_parameters:
      spacer_length: "99.8 mm（水平卧式）"
      spacer_diameter: "60 mm，ULE 玻璃（E=67.6 GPa，ν=0.17）"
      mirror_spec: "31 mm 直径，8 mm 厚，R=350 mm，反射率 0.99998，ULE 玻璃，光学接触"
      cutout_geometry: "底部方形切口，设计参数 c（切深）/ x（支撑横坐标）/ z（轴向坐标）"
      optimal_design: "c=18.45 mm, x=22 mm, z≈20.3 mm（实验最优竖直零点）"
      contact_type: "Case B：3 mm 橡胶球，四点均匀支撑（力学对称性最佳）"
      cavity_orientation: "光轴水平（卧式）"
      structural_resonance: "~10 kHz（第一结构谐振）"
    design_rationale: >
      切口参数存在一个"零点面"（zero locus plane in x,z,c space），
      支撑位置 z 可在实验中连续调节以找到竖直零点；
      设计对单参数误差有内在稳健性。
      水平不敏感性依赖四点安装的几何对称和橡胶球的力学均匀性。
    interface_requirements:
      vibration: "有效频段：DC 至 ~10 kHz（结构谐振前）；>10 Hz 段主动隔振平台提供额外 35 dB 衰减"
    note: >
      Level 2 PART-OF ent.fp_cavity_system（定义于 numata2004.yaml）。
      与 ent.vibration_isolation（young1999.yaml）为同一 L1 下不同振动抑制策略（非 COMPETES-WITH 关系）：
      几何补偿在 DC–10 kHz 有效，灵敏度降低 >1000×，与增长腔兼容；
      被动隔振在 >2 Hz 衰减好、实现简单；最优方案两者结合。

principles:
  - id: pri.cavity_deformation_compensation
    name: "腔体形变补偿——振动不敏感设计原理"
    tier: domain
    verification_status: observed
    statement: >
      水平卧式 FP 腔在外部加速度作用下发生结构形变，但通过腔体几何优化
      （底部切口 + 支撑位置选择），可使两腔镜面中心点的轴向位移量等大、符号相反，
      从而使光学路径长度（腔长 L）保持不变，即 ΔL = 0，Δν = 0。
      零点条件在参数空间（x, z, c）中构成一个面（zero locus plane），
      支撑位置 z 可在实验中连续调节找到零点，设计对参数误差有稳健性。
    domain: "精密光学谐振腔，超稳激光振动噪声抑制"
    formula:
      null_condition: "w_O(x, z, c) = 0，w_O 为腔镜面中心轴向位移"
      zero_locus: "零点在 (x, z, c) 三维参数空间中构成一个面（非唯一解）"
    key_insight: >
      振动不敏感不依赖"减少振动传入"（隔振），
      而是"减少腔对振动的响应系数"（几何补偿）；
      与被动隔振互补：隔振在 >2 Hz 有效，几何补偿从 DC 到结构谐振均有效。
    conditions: >
      振动频率 << 腔体第一结构谐振频率（~10 kHz），可视为准静态；
      四点支撑力学对称（橡胶球优于刚性触头）；
      腔体材料均匀（ULE 等低膨胀玻璃）。
    source_claim: >
      "ensure that the distance between the two points at the centers of the
       mirror surfaces remains invariant when a force is applied to the support"
    applicable_when: "水平轴腔，低频加速度（< 腔体结构谐振频率）"
    condition_variables:
      - symbol: "c, x, z"
        name: "腔体几何参数（切深/支撑横坐标/轴坐标）"
        analytical_relation: "零点在 (x,z,c) 参数空间内构成一个面；z 为可实验调节参数"
        current_value: "c=18.45 mm, x=22 mm, z≈20.3 mm（Webster 2007 最优值）"
        best_demonstrated:
          value: "<0.1 kHz/ms⁻²（竖直）；3.7 kHz/ms⁻²（水平）"
          source: {zotero_key: "UCNS7EM7", claim: "minimum response of 0.1 (3.7) kHz/ms⁻² for vertical (horizontal)"}
        constraints: "水平对称性要求四接触点支撑力均匀；刚性接触难以实现，橡胶球更优"

