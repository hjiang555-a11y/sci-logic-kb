  title: "Subhertz linewidth laser by locking to a fiber delay line"
  year: 2015
  first_author: "Dong"
  journal: "Applied Optics"
  volume: 54
  pages: 1152-1156
  doi: 10.1364/AO.54.001152
  note: >
    首次实现光纤延迟线锁频的亚赫兹线宽（0.67 Hz 拍频线宽，单激光 < 0.5 Hz）， 分数频率不稳定度 5×10⁻¹⁵ @ 0.1–1 s。 核心贡献：将 Kéfélian 2009 方案推进到亚赫兹线宽里程碑。 频率噪声在 200 Hz–1 kHz 由光纤热噪声和射频放大器热噪声联合主导。 在知识图谱中填补光纤稳频链路的亚赫兹线宽首次实现。
entities: []
principles:
- id: pri.fiber_thermal_noise_wanser
  name: 光纤固有热噪声（Wanser 热力学噪声模型）
  tier: domain
  verification_status: calculated
  statement: '标准单模光纤（SMF-28）中折射率的热涨落产生固有的相位噪声， Wanser (1992) 给出解析模型。热噪声功率谱密度与温度 T²、
    光纤长度 L、热折射系数 (dn/dT)² 成正比，与光纤有效面积 A_eff 和导热系数 κ 的乘积成反比。 本文实验证实高傅里叶频率段（200 Hz–1
    kHz）噪声与 Wanser 理论一致。 Duan (2010) 基于涨落耗散定理（FDT）的一维模型在低频段（< 3.6 Hz） 也与实验吻合，但中间频段（3.6–100
    Hz）的 1/f 噪声成因尚有争议。

    '
  domain: 光纤干涉仪稳频
  formula: S_φ(f) ∝ k_B T² × (dn/dT)² × L / (A_eff × κ × f²) — Wanser model
  key_insight: '光纤热噪声是光纤延迟线频率参考的内在物理极限， 类似于 FP 腔中的布朗热噪声（pri.brownian_thermal_noise_fdt）。
    与 FP 腔热噪声的关键区别：主导机制是热折射噪声（体效应）， 而非镜面布朗运动（表面效应）。

    '
  conditions: 实心石英光纤（SMF-28 或类似），Fourier 频率在声波传播时间范围内
  preconditions:
  - 光纤为实心二氧化硅纤芯（SMF-28 或类似材料）
  - 工作温度范围内 dn/dT ≈ 1.1×10⁻⁵/K 基本恒定
  - 所有技术噪声（振动、强度噪声、RAM）已被抑制到热噪声地板以下
  invalidated_when:
  - 使用空心反谐振光纤——热折射噪声大幅减小，噪声机制改变
  - 极低温运行——dn/dT 随温度下降可能改变噪声缩放关系
  open_questions:
  - Dong 2015 中间频段 3.6–100 Hz 的 1/f 噪声似与 Duan FDT 模型一致但超出该模型理论频率限制（f < 1/τ_l），这一矛盾是否意味着需要新的理论框架？
  source_claim: "\"the frequency noise from 200 Hz to 1 kHz is dominated by the combination\
    \ of\n thermal noise and RF amplifier thermal noise with only about 2 dB discrepancy\n\
    \ with the measured result\"\n"
methods:
- id: meth.fiber_delay_locking_improved_d15
  name: 光纤延迟线锁频改进实现（Dong 2015）
  category: frequency_stabilization
  description: '在 jiang2010 提出的光纤延迟线锁频方案基础上的改进实现，首次达到亚赫兹线宽（<0.5 Hz）。 关键改进：500 m SMF-28×2
    光纤延迟线、主动热补偿、低噪声 RF 放大器、激光器 RIN 抑制。

    '
  verification_status: demonstrated
  reference_implementation: Dong 2015 实验系统：两台相同光纤锁定激光器拍频线宽 0.67 Hz
  note: '基于 meth.fiber_delay_locking（定义于 jiang2010.yaml），本文首次实现亚赫兹线宽， 验证了光纤延迟线方案在热噪声极限下的性能潜力。

    '
