entities:
- id: ent.fpga_multiloop_autolock_xia25
  name: 全数字多环路超稳激光自动锁定系统（Xia 2025）
  hierarchy_level: 2
  status: demonstrated
  function: '基于单片 FPGA 实现的三环路（PDH + FNC + LPS）全数字自动锁定系统， 高速高精度 ADC/DAC 与 FPGA 协同，支持载波锁定和偏频锁定两种模式，
    中断后 10 s 内自动复锁，快反馈环路开环带宽 1.3 MHz。

    '
  key_parameters:
    fast_loop_bandwidth: 1.3 MHz
    instability_carrier_lock: 1.5×10⁻¹⁵ @ 1 s
    instability_offset_lock: 2.5×10⁻¹⁵ @ 1 s
    digital_noise_contribution: 2.9×10⁻¹⁶ @ 1 s
    fnc_noise_suppression: 75 dB @ 1 Hz
    lps_noise_suppression: 40 dB @ 1 Hz
    relock_time: < 10 s
  note: PART-OF ent.ultrastable_laser_system
methods:
- id: meth.fpga_digital_multiloop_locking_xia25
  name: FPGA 全数字多环路自动锁定方法
  status: demonstrated
  steps_summary: 'FPGA 高速 ADC 采样 PDH/FNC/LPS 误差信号 → 数字 PI 控制器分别处理三环路 → 高速 DAC 驱动 PZT/EOM/VVA
    执行机构 → 自动锁定算法检测锁失并在 10 s 内复锁

    '
  source_claim: '"The auto-locking process is implemented using a field programmable
    gate array with high-speed and high precision analog-to-digital and digital-to-analog
    converters."

    '
