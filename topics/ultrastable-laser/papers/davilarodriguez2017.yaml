entities:
- id: ent.compact_ule_cavity_25mm_d17
  name: 25 mm ULE 圆柱参考腔（Davila-Rodriguez 2017）
  hierarchy_level: 2
  status: demonstrated
  function: '25 mm 长、50 mm 直径 ULE 圆柱腔，大径长比设计在圆周方向存在挤压力不灵敏点（约 22 mm）。 低损耗熔融石英镜基板（平面
    + R=10.2 m 凹面）光学接触于 ULE 间隔体， 外侧附加 ULE 衬环将 CTE 零点调至室温附近。 总腔组件长约 50 mm，体积 61 mL。Invar
    平行板通过三对弹性体球（3.2 mm）夹持。 精细度约 400,000 @ 1070 nm，光模场直径约 490 μm（FWHM）。

    '
  note: 腔体置于真空腔中，无主动温控；EOM 温控但无 RAM 主动抑制。
principles:
- id: pri.squeeze_insensitive_cylindrical_cavity
  name: 圆柱腔挤压不灵敏持腔原理
  tier: engineering
  verification_status: observed
  statement: '有限泊松比圆柱体在轴向挤压时轴缩短、在径向（圆周）挤压时轴伸长， 存在一个特定的直径-长度比使两效应抵消，腔长对挤压力一阶不灵敏。 FEM
    仿真表明 25 mm 长腔的挤压不灵敏直径 >40 mm，本文选 50 mm。 实测最大加速度灵敏度约 4.5×10⁻¹⁰ g⁻¹（腔轴方向，持腔半径 24.5
    mm 最小化）， 仍高于预期，可能受装配非对称性主导。

    '
  domain: 紧凑型腔稳激光振动抑制
  key_insight: 大径长比圆柱腔在圆周方向存在挤压力零点，无需复杂几何即可实现刚性夹持
  conditions: 圆柱 ULE 腔；有限弹性（泊松比 > 0）；FEM 计算；25 mm 长，50 mm 直径
  source:
    zotero_key: NHG79KDA
    claim: For a 25-mm-long spacer, we find that the zero crossing of the holding
      force sensitivity exists for spacer diameters larger than ~40 mm
- id: pri.large_mode_thermal_noise_reduction_d17
  name: 大光斑模场热噪声降低原理
  tier: domain
  verification_status: observed
  statement: '增大腔镜上的光斑尺寸可降低镜面涂层和基板的热噪声（Brownian、热弹性、热折射）。 通过选择接近不稳定腔的曲率半径（近平凹腔，R →
    ∞ 方向）可显著增大光斑。 本文选 R = 10.2 m（平面 + 凹面），在 25 mm 短腔中实现 490 μm FWHM 光模， 使热噪声极限降至约
    −9 dBrad²/Hz @ 1 Hz（与 40 mm 腔用标准 50 cm ROC 镜等效）。

    '
  domain: 热噪声极限光学腔
  key_insight: 接近不稳定腔设计用大曲率半径镜在短腔内获得大光斑，抑制热噪声
  conditions: 近平凹腔设计；R = 10.2 m；腔长 25 mm；室温
  source:
    zotero_key: NHG79KDA
    claim: Increasing the spot size can be achieved either by increasing the ROC of
      the mirrors or by adopting a near-concentric cavity. We have chosen a plano-10.2m
      ROC design, yielding an optical mode with intensity full width at half-maximum
      of ~490 μm
