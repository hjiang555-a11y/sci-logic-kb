principles:
  - id: pri.silicon_cte_asymptotic_zero_4k
    name: "硅单晶 4 K 热膨胀系数渐近零（热力学第三定律）"
    tier: domain
    verification_status: observed
    statement: >
      根据热力学第三定律，固体在 T → 0 时熵趋于零，热容 C_p → 0，
      线热膨胀系数 α(T) → 0（非零点处的过零，而是渐近趋向零）。
      硅单晶在 ~124 K 和 ~17 K 存在两个 CTE 严格零点（α=0 并过零变号），
      而在 4 K 以下 α(T) 趋近于零但不严格过零（严格意义已无负值区域，
      量级 |α(4K)| << |α(124K)|）。
      因此 4 K Si 腔对温度波动的一阶敏感度（∂ν/∂T = ν₀·α(T)）极低，
      但二阶或技术耦合仍可存在（见 Robinson 2019 中的 4 Hz/K 室温耦合）。
    domain: "低温光学谐振腔，固体物理"
    formula: "α(T) → 0 as T → 0（热力学第三定律）；|α(4K)| << |α(124K)| ≈ 0（严格零点处）"
    key_insight: >
      4 K 操作不依赖于精确定位 CTE 零点温度（不同于 124 K 操作需控制在 ±mK 量级），
      而是依赖于 α(T) 在极低温度下自然趋近于零的物理规律，
      对绝对温度的敏感度天然降低，但技术噪声（振动、光功率）相对重要性提升。
    conditions: "单晶硅，T < 10 K；忽略杂质和应力导致的偏差"
    applicable_when: "4 K 附近操作的 Si 腔，无需精确定位 CTE 零点"
    source_claim: >
      "Using a closed-cycle cryocooler to reach 4 K where the silicon thermal expansion
       asymptotically approaches zero, a cryogenic 6 cm long silicon cavity has already
       demonstrated fractional frequency instability of 1×10⁻¹⁶"

  - id: pri.optical_power_cavity_drift
    name: "光腔内循环功率驱动频率漂移（Robinson 2019 发现）"
    tier: engineering
    verification_status: observed
    statement: >
      低温光学腔的长期频率漂移（线性分量）与腔内循环光功率成线性关系。
      在 Robinson 2019 Si4（4 K，6 cm Si 腔）中，漂移率 ∝ -7×10⁻²¹/s/nW（传输功率），
      漂移方向始终为负（腔变长），指向镀层热膨胀/蠕变机制（镀层与基底 CTE 失配
      → 功率吸收 → 温度相关蠕变）。
      功率突变后出现特征时间常数 1–2 天的频率瞬变，需等待数个时间常数后再拟合线性漂移。
      零功率外推漂移接近零，表明辐照消除后可达极低漂移。
    domain: "精密光学腔，低温激光稳频"
    formula: >
      df/dt = a × P_trans + b；a ≈ -7×10⁻²¹ /s/nW（Robinson 2019 Si4）；
      b ≈ 0（零功率外推）；
      特征时间常数 τ_transient ≈ 1–2 天
    key_insight: >
      腔频率漂移不仅来自材料蠕变和温度漂移，还受激光照射功率直接驱动。
      降低腔内循环功率是减小低温腔漂移的关键实用方法，
      指向"偶发扫描"测腔频率方案（Wiens et al., 2016）。
    conditions: >
      低温光学腔（Si，4 K），IBS 或类似镀层，腔内功率 mW 量级（40 nW 传输 → 2 mW 腔内）；
      镀层与基底 CTE 失配假设成立
    applicable_when: "功率变化后需等待 5× 时间常数（~10 天）才能测量稳态漂移率"
    source_claim: >
      "We present the first rigorous characterization of a power-dependent frequency drift
       in an optical cavity. The slope of the power dependence is roughly −7×10⁻²¹/s/nW."

methods:
  - id: meth.low_power_cavity_drift_characterization_r19
    name: "低功率腔漂移表征方法（Robinson 2019）"
    full_name: "Low-power cavity drift characterization method"
    status: demonstrated
    category: "表征方法"
    applies_to: ent.fp_cavity_system
    steps_summary: >
      通过扫描腔内循环功率（~40 nW 传输功率），测量腔频率漂移率与功率的线性关系。
      在功率突变后等待1–2天特征瞬态时间，再提取稳态漂移率；外推至零功率获得本征漂移极限。
    advantages:
      - "定量分离功率依赖漂移与材料蠕变"
      - "外推获得零功率漂移极限（理论上接近零）"
    disadvantages:
      - "测量周期长（需数天等待瞬态）"
      - "仅适用于低温腔"
    note: >
      Robinson 2019首次严格表征光功率驱动的腔频率漂移，为低漂移腔设计提供关键方法。
    source_claim: >
      "We present the first rigorous characterization of a power-dependent frequency drift in an optical cavity. The slope of the power dependence is roughly −7×10⁻²¹/s/nW."

metrics:
  - id: met.fractional_freq_instability_r19
    name: "分数频率不稳定度（Robinson 2019，4 K Si 腔，热噪声极限）"
    unit: "无量纲（修正 Allan 偏差 mod σ_y(τ)）"
    description: >
      Si4（4 K）与 Si3（124 K，Matei 2017）拍频，正交减去 Si3 贡献（4×10⁻¹⁷）后，
      提取 Si4 个体分数频率不稳定度；首次证明 4 K 腔达到热噪声极限。
    demonstrated_value:
      value: "mod σ_y = 6.5×10⁻¹⁷（0.8 s ≤ τ ≤ 80 s，热噪声 flicker floor）"
      conditions: >
        1.5 μm（1542 nm），T = 4 K，Si4 6 cm 腔；
        参考 Si3（124 K，PTB，mod σ_y = 4×10⁻¹⁷）拍频三角帽法；
        24,000 s 测量记录，dead-time free λ 型计数器；
        线性漂移（~3×10⁻¹⁸/s）去除后计算
      verification_status: observed
      confidence: established
      source: {zotero_key: "JIZCUZLY", claim: "Si4 instability reaches 6.5×10⁻¹⁷ for averaging times of 0.8 < τ < 80 s, which is consistent with the predicted thermal noise floor"}
    theoretical_floor:
      value: "mod σ_y（预测值，由 IBS 镀层 φ=5.15×10⁻⁴ 决定，文中与实测吻合）"
      basis: >
        FDT 计算：6 cm Si 腔，IBS 镀层 φ_IBS = 5.15×10⁻⁴（从频率噪声 PSD 拟合提取），
        Si 基底和间隔物低温高 Q 使基底热噪声可忽略，仅镀层主导
      gap_note: "已达镀层热噪声极限；提升需晶体镀层（AlGaAs，φ~2.5×10⁻⁵，降低 10×）或更低损耗设计"
    comparison:
      si3_124k_matei2017: "mod σ_y = 4×10⁻¹⁷（Si3，124 K，IBS，Matei 2017）——Si4 6.5×10⁻¹⁷ 较 Si3 高约 1.6×，因 Si4 腔长更短（6 cm vs ~21 cm equiv.）"
      zhang2017_4k_prev: "~1×10⁻¹⁶（Zhang 2017，同一系统前身，未达热噪声极限）"

  - id: met.laser_linewidth_r19
    name: "激光线宽（Robinson 2019，Si4 4 K 腔）"
    unit: "mHz（FWHM）"
    description: >
      Si3–Si4 拍频 FFT 分析（1542 nm，混频降至 10 Hz，ADC 数字化），
      128 s 测量时间，Hanning 窗（Fourier 极限 10.9 mHz），重复 100 次测量统计分布。
      Si4 对拍频线宽的相对贡献因子 0.85（由热噪声比 σ_Si4/√(σ²_Si3+σ²_Si4) 决定）。
    demonstrated_value:
      value: "Si4 个体线宽中位值 16 mHz（100 次测量统计）"
      conditions: >
        1.5 μm（1542 nm），Si3（124 K）与 Si4（4 K）拍频，
        128 s 记录，Hanning 窗，Lorentzian 拟合 FWHM，100 次重复
      verification_status: observed
      confidence: established
      source: {zotero_key: "JIZCUZLY", claim: "The median laser linewidth for the distribution in Fig. 3B is 16 mHz, representing the lowest observed to date for a laser locked to an optical cavity placed inside a closed-cycle cryocooler."}
    note: "16 mHz 为当时封闭循环制冷机腔激光的最低线宽纪录；与 Matei 2017 Si3 激光 5–10 mHz 相差约 2×"

  - id: met.algaas_coating_loss_angle_ibs_4k_r19
    name: "IBS 镀层损耗角（Robinson 2019，4 K Si 腔提取）"
    unit: "无量纲（损耗角 φ = 1/Q_mech）"
    description: >
      从 Si4 频率噪声功率谱密度 PSD 拟合（Sy = a·f⁻¹，a = 4.125×10⁻³³）提取的 IBS 镀层损耗角，
      使用 Kessler 2012 / Matei 2017 的 FDT 全表达式，结合硅的 Young 模量和 Poisson 比。
    demonstrated_value:
      value: "φ_IBS(4K) = 5.15×10⁻⁴（SiO₂/Ta₂O₅ IBS 镀层）"
      conditions: >
        6 cm Si4 腔，4 K，PSD 拟合范围 5 mHz – 2 Hz，Sy = a·f⁻¹ 模型；
        Young 模量和 Poisson 比取自 Si 文献值
      verification_status: calculated
      confidence: moderate
      source: {zotero_key: "JIZCUZLY", claim: "we extract a loss angle for the SiO₂/Ta₂O₅ mirror coatings to be ϕ = 5.15×10⁻⁴"}
    comparison:
      ibs_room_temp_standard: "φ_IBS ~ 4×10⁻⁴（室温标准 SiO₂/Ta₂O₅，Numata 2004）"
      algaas_4k_estimate: "φ_AlGaAs(4K) 尚未在此系统测量；cole2013 报告 10 K 约 4.5×10⁻⁶（自由谐振器）"
    note: >
      φ_IBS(4K) = 5.15×10⁻⁴ 与室温 IBS 值（~4×10⁻⁴）同量级，
      说明降温至 4 K 对 IBS 镀层损耗改善有限；
      关键路径是换用 AlGaAs 晶体镀层（φ 降低 10–100×），而非继续降温保持 IBS。

  - id: met.cavity_frequency_drift_r19
    name: "腔频率漂移率（Robinson 2019，功率相关，Si4 4 K）"
    unit: "无量纲分数频率漂移率（/s）"
    description: >
      Si4 腔长期线性频率漂移率，是传输光功率的线性函数；
      最低漂移在 40 nW 传输功率时实现。
    demonstrated_value:
      value: "-3×10⁻¹⁹ /s（40 nW 传输功率，最低漂移测量点）"
      conditions: >
        40 nW 传输（对应 2 mW 腔内循环功率，F=500,000，T=2 ppm），
        等待 5 个时间常数（~10 天）后拟合线性漂移；
        Si3 漂移（-3×10⁻¹⁹/s，2.8 μW 传输）已从拍频去除
      verification_status: observed
      confidence: established
      source: {zotero_key: "JIZCUZLY", claim: "The lowest drift is attained at a transmitted power of 40 nW, giving a fractional frequency drift of −3×10⁻¹⁹/s."}
    comparison:
      si3_drift: "-3×10⁻¹⁹/s（Si3，124 K，2.8 μW 传输，Hagemann 2014）——与 Si4@40nW 相当，但功率差 ~70×"
      higher_power_drift: ">10⁻¹⁸/s（较高光功率下，线性外推）"

