methods:
  - id: meth.two_point_ofd_sin_comb_k24
    name: "两点光频分频（2P-OFD，SiN 微腔梳）"
    status: demonstrated
    steps_summary: >
      两路 SIL DFB 激光 PDH 锁定至微型 F-P 腔 →
      暗孤子 SiN 双环微腔产生 ~20 GHz 梳 →
      两路 SIL 激光分别与最近梳齿拍频 →
      混频得中间频率 f_IF = f_b1 + f_b2（与梳中心无关）→
      锁定 f_IF 实现 2P-OFD 噪声压制 →
      MUTC 探测器提取 20 GHz 低噪声微波
    source_claim: >
      "We address this challenge by leveraging advances in integrated photonics to demonstrate
      low-noise microwave generation via two-point optical frequency division."

