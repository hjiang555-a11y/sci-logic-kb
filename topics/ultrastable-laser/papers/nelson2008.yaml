methods:
- id: meth.rin_suppression_reuse_modulator
  name: 复用调制器的RIN抑制方法
  description: '利用射频光子链路中已有的强度调制器，通过闭环伺服同时实现 微波信号编码和激光相对强度噪声（RIN）抑制的方法。伺服系统检测 光功率波动并反馈调节调制器偏置，在10
    MHz带宽内实现10–50 dB抑制。

    '
  applicable_context: 射频光子链路（如光电振荡器），其中已有强度调制器。
  key_steps:
  - 检测光链路输出功率波动（RIN）。
  - 通过反馈回路调节强度调制器的偏置电压。
  - 同时进行微波信号编码。
  note: Nelson 2008报道的方法，避免额外硬件插入损耗。
