  tier: foundational
  verification_status: theoretical
  statement: 'N 个原子在高 Q 腔中集体发射时，相位信息存储在原子集体而非腔场中。 腔仅作为输出耦合器，其热噪声不直接影响激光线宽。 集体相位扩散速率远小于单原子退相速率，
    理论线宽可达 mHz 级。

    '
  domain: 量子光学 / 超辐射
  key_insight: 相位信息锚定于原子集体而非腔场，绕过腔的热噪声限制。
