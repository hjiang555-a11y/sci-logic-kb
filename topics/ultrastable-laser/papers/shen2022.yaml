  journal: Nature
  doi: 10.1038/s41586-022-05228-5
  note: '首次实现 113 km 自由空间光学时频传递达 10⁻¹⁹ 稳定度（USTC/CAS，新疆乌鲁木齐）。 每端配备超稳激光（USL，1550.12
    nm，3×10⁻¹⁵ @1 s）作为时钟源， 两路高功率光频梳（1545 nm 和 1563 nm，各 1 W 输出）双向传输， 线性光学采样（LOS）实现飞秒精度相位探测，
    自适应光学（可变形镜）补偿大气波前畸变。 链路不稳定度 < 4×10⁻¹⁹ @10,000 s；时间偏移 6.3×10⁻²⁰ ± 3.4×10⁻¹⁹。

    '
entities:
- id: ent.freespace_tf_link_113km_sh22
  name: 113 km 自由空间时频传递链路（Shen 2022）
  hierarchy_level: 2
  status: demonstrated
  function: '跨 113 km 自由空间双向光学时频传递系统：两端（南山实验室↔高崖子实验室，海拔差 327 m） 各配超稳激光 + 两路高功率光频梳（250
    MHz @1545 nm；200 MHz @1563 nm，均 1 W） + 线性光学采样（LOS）模块 + 400 mm 卡塞格林望远镜（含快速导星、自适应光学）。
    正交偏振分离双向光路，可变形镜补偿大气波前畸变。

    '
  key_parameters:
    link_distance: 113 km
    locations: 南山（43°28'N, 87°10'E, 2109 m）↔ 高崖子（43°31'N, 88°34'E, 1782 m）
    usl_wavelength: 1550.12 nm
    usl_instability: 3×10⁻¹⁵ @ 1 s
    comb_wavelengths: 1545 nm (250 MHz), 1563 nm (200 MHz)
    comb_power: 1 W each
    telescope_aperture: 400 mm
    instability_10ks: < 4×10⁻¹⁹
    time_offset: 6.3×10⁻²⁰ ± 3.4×10⁻¹⁹
  note: 超稳激光（ent.ultrastable_laser_system）作为每端时钟源；光频梳为 ent.fiber_delay_line_reference
    关联技术
methods:
- id: meth.freespace_los_tf_transfer_sh22
  name: 自由空间双向光频梳线性光学采样时频传递
  status: demonstrated
  steps_summary: '超稳激光（USL）锁定参考腔 → 光频梳（OFC）锁相至 USL → 双向高功率（1 W）啁啾脉冲发射至 113 km 自由空间信道
    → 线性光学采样（LOS）飞秒精度相位探测 → 自适应光学 + 快速导星补偿大气湍流 → 双向互相关消除公共模噪声 → 提取时间偏移和频率不稳定度

    '
  source_claim: '"we develop here an optical frequency comb (OFC)-based link, which
    combines features of high-precision optical phase detection and a large ambiguous
    range."

    '
