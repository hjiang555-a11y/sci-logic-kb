principles:
  - id: pri.gaussian_beam_resonator_theory
    name: "高斯光束与谐振腔理论"
    tier: foundational
    verification_status: established
    statement: >
      激光谐振腔中的光场以高斯光束模式为基础，
      光斑大小由腔镜曲率半径和腔长决定。
      腔的稳定性条件为 0 ≤ g₁g₂ ≤ 1（g = 1 - L/R）。
      这些关系决定了 FP 腔中光斑在镜面上的大小，
      直接影响热噪声水平。
    domain: "激光物理 / 谐振腔"
    key_insight: "光斑大小 w₀ 由腔几何确定，是热噪声的关键参数。"
    conditions: "适用于稳定球面镜 FP 腔"
    source_claim: "theory of laser beams and resonators"

