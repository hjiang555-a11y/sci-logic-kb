  first_author: Didier
  journal: Applied Optics
  volume: 57
  issue: 22
  pages: 6470-6473
  doi: 10.1364/AO.57.006470
  note: '首次实验表征 25 mm 金字塔形 ULE 参考腔，配备 AlGaAs 晶体镀层， 含真空腔室和光学组件总体积仅 30 L。 σ_y(1s) ≈
    7.5×10⁻¹⁵，主要受限于腔体尺寸（热噪声）和技术噪声。 核心贡献：极端紧凑化方向的探索，适合嵌入式和空间应用。

    '
entities:
- id: ent.ultracompact_pyramid_cavity_d18
  name: 超紧凑金字塔形 ULE 参考腔（Didier 2018）
  aliases:
  - 25 mm pyramid cavity
  - ultracompact cavity Didier
  hierarchy_level: 2
  status: demonstrated
  function: '25 mm 长金字塔形 ULE 腔体，配备 AlGaAs 晶体镀层降低热噪声。 紧凑真空腔室（立方形）允许光学元件直接安装在腔壁上，总体积
    30 L。 被动不锈钢热屏蔽 + 主动铜屏蔽（Peltier）温度控制。

