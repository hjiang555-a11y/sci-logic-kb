principles:
  - id: pri.high_bandwidth_pzt_cavity_servo
    name: "高带宽 PZT 光腔长度伺服原理"
    tier: method
    verification_status: observed
    statement: >
      PDH 稳频需要一个快速执行器（通常为 PZT 驱动腔镜或
      激光频率调谐）来抑制腔长/激光频率的噪声。执行器的
      伺服带宽决定了噪声抑制的有效频率范围。传统 PZT 的
      机械共振通常限制伺服带宽在 ~100 kHz 以下。
      Briles 2010 通过优化 PZT 元件的机械安装和匹配网络，
      将平坦幅频响应和 >135° 相位裕度扩展到 200 kHz，
      允许 180 kHz 单位增益频率——大幅扩展了 PDH 锁频
      环路的噪声抑制带宽。
    domain: "超稳激光；伺服控制；压电执行器"
    key_insight: >
      伺服带宽瓶颈不在电学（PDH 误差信号可达 MHz），
      而在执行器力学。PZT + 镜面的结合机械共振决定了
      相位翻转频率。正确设计可使共振推至 >500 kHz。
    conditions: "PZT + 镜面机械共振高于所需伺服带宽；相位裕度足够保证稳定性"
    source:
      zotero_key: "oe-18-10-9739"
      claim: "allowing a 180 kHz unity gain frequency to be achieved in a closed servo loop."

