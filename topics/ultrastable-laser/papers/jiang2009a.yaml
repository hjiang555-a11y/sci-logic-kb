entities:
  - id: ent.fiber_michelson_1km_j09
    name: "1 km 光纤非平衡迈克尔逊干涉仪（Jiang 2009a）"
    hierarchy_level: 2
    status: demonstrated
    function: >
      单模光纤（SMF-28）构成 1 km 长臂非平衡迈克尔逊干涉仪，两臂末端使用法拉第反射镜
      消除偏振态不确定性（无需偏振控制器）。长臂插入 AOM 产生外差拍频信号（2×f_AOM），
      避免直流漂移，实现外差探测。铝盒热隔离封装（26 cm×26 cm×16.5 cm），
      置于商用主动隔振平台。
    note: "全光纤元件（含 AOM、FM），无需自由空间光路准直；温度系数约 10⁻⁵/°C（SMF-28）。"

principles:
  - id: pri.fiber_delay_line_frequency_ref
    name: "光纤延迟线频率参考原理"
    tier: domain
    verification_status: observed
    statement: >
      非平衡光纤干涉仪将激光频率噪声转换为相位噪声，传递函数为
      T_f(f) = (1 − e^{−i2πτf})/(if)，其中 τ 为延迟时间不平衡量。
      低频处灵敏度约为 2πτ（正比于延迟长度）；在 1/τ 整数倍频率处响应为零（设计时需回避）。
      负反馈锁定后，频率噪声由光纤热噪声（Wanser 公式）、电子噪声和误差信号噪声共同决定。
      1 km SMF-28 热噪声本底远低于 1 Hz²/Hz（室温），且可通过增加光纤长度进一步降低。
    domain: "光纤延迟线激光稳频"
    formula: "T_f(f) = (1 − e^{−i2πτf}) / (if)"
    key_insight: "延迟越长灵敏度越高，但控制带宽与延迟存在折中；外差探测消除偏振噪声"
    conditions: "非平衡迈克尔逊结构；法拉第反射镜；外差探测（2×f_AOM）"
    source:
      zotero_key: "G2IXLQ3G"
      claim: "It converts the laser frequency noise into the phase noise with transfer function: Tf(f)=(1-e^{-i2πτ})/if"
    note: "跨文件引用：此原理在 jiang2010.yaml 中有更完整定义，本文为会议版首次报告"

methods:
  - id: meth.fiber_delay_locking
    name: "光纤延迟线稳频方法"
    status: demonstrated
    applies_to: ent.fiber_michelson_1km_j09
    steps_summary: >
      光纤激光器 → AOM1（慢速反馈） + AOM2（快速反馈，70 MHz）→
      1 km 非平衡迈克尔逊干涉仪（外差检测，2×f_AOM）→
      PI 控制器 → PZT 慢速修正 + AOM 快速修正 →
      DDS 调谐（频率可调）→ 频率噪声 <1 Hz²/Hz（1 Hz–10 kHz）
    source_claim: >
      "Through negative feedback of the output of the interferometer to the laser control port
      we can frequency-lock the stabilized laser frequency to the fiber delay."
    note: "跨文件引用：meth.fiber_delay_locking 在 jiang2010.yaml 中有更完整定义"

