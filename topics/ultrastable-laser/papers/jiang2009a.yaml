entities:
- id: ent.fiber_michelson_1km_j09
  name: 1 km 光纤非平衡迈克尔逊干涉仪（Jiang 2009a）
  hierarchy_level: 2
  status: demonstrated
  function: '单模光纤（SMF-28）构成 1 km 长臂非平衡迈克尔逊干涉仪，两臂末端使用法拉第反射镜 消除偏振态不确定性（无需偏振控制器）。长臂插入
    AOM 产生外差拍频信号（2×f_AOM）， 避免直流漂移，实现外差探测。铝盒热隔离封装（26 cm×26 cm×16.5 cm）， 置于商用主动隔振平台。

    '
  note: 全光纤元件（含 AOM、FM），无需自由空间光路准直；温度系数约 10⁻⁵/°C（SMF-28）。
