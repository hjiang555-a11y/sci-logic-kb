principles:
  - id: pri.piezo_tuning_stability_tradeoff
    name: "压电调谐范围与频率稳定度的权衡"
    tier: engineering
    verification_status: observed
    statement: >
      压电驱动器的调谐系数（MHz/V）决定了给定电压范围内的调谐范围，
      但同时也决定了驱动电压噪声到频率噪声的转换增益。
      高调谐系数意味着：(1) 更低驱动电压可覆盖整个 FSR，
      (2) 但驱动器电压噪声的频率等效贡献更大。
      实验表明，在短路或低噪声驱动条件下，压电驱动器不是频率稳定度的限制因素。
      PZN-PT 单晶的调谐系数（19.1 MHz/V）比 PZT 叠层（1.8 MHz/V）高 10 倍。
    domain: "参考腔频率调谐"
    key_insight: "压电驱动器本身不限制频率稳定度；限制来自实验环境（振动、倾斜、强度噪声）。"
    conditions: "适用于内置压电驱动器的 FP 参考腔"
    preconditions:
      - "压电驱动器与腔镜之间的胶合充分固化"
      - "驱动电压源的噪声足够低"
    invalidated_when:
      - "驱动电压噪声谱密度超过目标频率稳定度对应的等效电压噪声"
    source_claim: >
      "the frequency stability of the piezo cavities is not limited by the piezo actuator
      but by the experimental setup"

methods:
  - id: meth.piezo_cavity_integration_characterization_m13
    name: "压电可调谐腔集成与表征方法"
    description: >
      系统评估四种压电材料（PZT叠层、PZT管、石英、PZN-PT单晶）在10 cm Zerodur高精细度腔中的性能。
      方法包括：(1) 压电驱动器三点环氧树脂（Eccobond 285）胶合到腔镜，(2) 电学短路条件下的频率稳定度测量，
      (3) 调谐系数和范围测量，(4) 频率噪声谱分析，识别噪声来源。
      通过对比相同腔体不同压电材料的性能，分离压电驱动器本身贡献与环境噪声。
    inputs:
      - "10 cm Zerodur高精细度腔"
      - "四种压电驱动器（PZT叠层、PZT管、石英、PZN-PT）"
      - "Eccobond 285环氧树脂"
      - "低噪声电压源和测量系统"
    outputs:
      - "各压电材料的调谐系数（MHz/V）"
      - "调谐范围（>1 FSR）"
      - "短路条件下的频率稳定度（<1×10⁻¹⁴）"
      - "噪声来源分析"
    verification_status: observed
    evidence: "Table 1: Characteristics of the piezo actuators; Fig. 3: Frequency noise spectra"
    limitations:
      - "环氧树脂固化需要10-12周达到最佳稳定度"
      - "高调谐系数材料对驱动电压噪声更敏感"

