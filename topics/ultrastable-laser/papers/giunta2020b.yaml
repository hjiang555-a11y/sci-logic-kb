principles:
  - id: pri.optical_freq_division_microwave_giunta20b
    name: "光频分频产生超稳微波原理（OFD）"
    tier: domain
    verification_status: observed
    statement: >
      光学频率参考（~194 THz）经 Er:fiber 频率梳相干分频至微波频率（12 GHz），
      分频比 n ≈ 194 THz / 12 GHz ≈ 1.6×10⁴，微波相位噪声理想情况下压低
      Sφ,μ = Sφ,ν / n²，实现约 84 dB 噪声压制。
      实际限制来自参考腔热噪声（Brownian）和梳分频/探测残余噪声。
    domain: "光子微波振荡器"
    formula: "S_φ,μ = S_φ,ν / n²，n = ν_optical / f_microwave"
    key_insight: "光频分频将腔热噪声限制的光学相位噪声转移至微波，获得远优于电子振荡器的相噪。"
    conditions: "Er:fiber 梳完全相锁至超稳光学参考，脉冲宽度压缩至 ~120 fs 以降低振幅-相位转换噪声"
    source:
      zotero_key: "H7A8L8LT"
      claim: >
        "For an ideal optical frequency divider (OFD), the phase noise of the OFR is reduced to
        Sϕ,μ = Sϕ,ν/n², where ... n is the ratio (~10⁴) between the optical (ν) and microwave
        carrier (μ) signals."

