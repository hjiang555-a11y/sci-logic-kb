entities:
  - id: ent.titanium_fiber_spool_l09
    name: "钛合金低振动灵敏度光纤线轴（Li 2009a）"
    hierarchy_level: 2
    status: demonstrated
    function: >
      钛合金（Ti）圆环形线轴，轴对称结构，通过单中心柱非对称支撑。
      可容纳 >2 km 光纤，首谐振频率约 1.5 kHz。
      FEM 优化 h₂ 参数（约 5.2 mm）使垂直振动灵敏度在理论上可归零。
      实际缠绕 300 m SMF-28 光纤，与 1 km 非平衡迈克尔逊干涉仪配合使用。
    note: "钛合金刚度高、质量轻，优于其他金属材料；线轴振动灵敏度受尾纤约束方式显著影响。"

principles:
  - id: pri.asymmetric_spool_vibration_nulling
    name: "非对称支撑线轴振动灵敏度调零原理"
    tier: engineering
    verification_status: observed
    statement: >
      通过调整中心柱长度参数 h₂（支撑柱高度），可调节线轴上光纤绕线面的加速度引起的变形分布。
      存在一个最优 h₂ 值（约 5.2 mm）使得垂直方向（轴向）振动对光纤延迟的贡献理论上归零。
      其他几何参数（中心宽度 e₁、外径 R）也影响零点位置：增大 e₁ 使零点向 h₂ = 0 靠近，
      增大 R 使零点向反方向偏移。此设计使振动灵敏度对夹持边界条件不敏感。
    domain: "光纤延迟线激光稳频振动抑制"
    key_insight: "FEM 优化单参数 h₂ 可实现特定方向振动灵敏度归零，解耦于夹持边界条件"
    conditions: "钛合金圆环形线轴；中心柱支撑；SMF-28 光纤；FEM 假设光纤延迟随支撑面变形"
    source:
      zotero_key: "SI2N2B8N"
      claim: "the vertical vibration sensitivity can be zeroed with an optimized value of h2 ≈ 5.2mm"

methods:
  - id: meth.fiber_spool_vibration_characterization
    name: "光纤线轴振动灵敏度测量方法"
    status: demonstrated
    applies_to: ent.titanium_fiber_spool_l09
    steps_summary: >
      光纤激光器（1542.14 nm）→ 锁定至光纤干涉仪 → 测量激光频率噪声基底 →
      主动隔振平台施加竖向啁啾扫频激励 → HP89410 矢量信号分析仪测传递函数
      T(f) = (S_ν(f)/S_a(f))^(1/2) → 计算振动灵敏度 Γ(f) = T_r(f)/ν₀ →
      对不同尾纤约束方式重复测量
    source_claim: >
      "The transfer function of frequency noise to vertical acceleration T(f) is measured by a
      vector signal analyzer HP89410. This instrument generates a chirp modulation signal
      injected in the active vibration isolation platform and then calculates the transfer
      function between acceleration noise S(f) and the measured frequency noise S(f)"

