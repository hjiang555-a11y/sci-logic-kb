entities:
- id: ent.spherical_ule_cavity_l13b
  name: 球形 ULE 腔（Leibrandt 2013b）
  hierarchy_level: 2
  status: demonstrated
  function: '50 mm 直径球形 ULE 间隔体，两端磨平并光学接触 Ø12.7 mm 熔融石英镜 （曲率半径 50 cm，精细度 7.9×10⁵ @
    1070 nm）。 球形几何对称性被动降低加速度灵敏度。不锈钢 304 柔性弹簧双点支撑， Torlon 球接触，适合转动测量平台使用。

    '
  note: 腔体含温控辐射屏蔽，CTE 零点约 −17°C，工作温度 24°C。
principles:
- id: pri.inertial_force_feedforward_l13b
  name: 惯性力实时前馈（全自由度）
  tier: engineering
  verification_status: observed
  statement: '用六轴加速度计（四面体排布）和三轴 MEMS 陀螺仪同时测量线加速度、转动加速度与转动角速度， 通过 FPGA 数字前馈修正 AOM 频率，可将腔加速度灵敏度从
    2×10⁻¹¹ g⁻¹ 降低约 50 倍至 <10⁻¹² g⁻¹（低频，0–300 Hz）。 相比之前仅修正一阶线性/转动加速度（0.06–450 Hz），本文扩展至包含转动角速度
    的全六自由度惯性力前馈，带宽延伸至零频。

    '
  domain: 腔稳激光振动抑制
  key_insight: 全自由度惯性力前馈可将加速度灵敏度压制至 10⁻¹² g⁻¹ 量级以下
  conditions: 低频（0–300 Hz）；被动振动隔离光学平台
  source:
    zotero_key: H5MYBTXH
    claim: reduced by a factor of 50 to below 10^-12 g^-1 for low-frequency accelerations
      by real-time feedforward corrections of all of the aforementioned inertial forces
- id: pri.temperature_feedforward_cavity_l13b
  name: 温度前馈频率漂移修正
  tier: engineering
  verification_status: observed
  statement: '在腔真空腔外壁安装热敏电阻，将温度信号数字前馈至激光 AOM 修正频率， 可将温度波动引起的激光频率漂移降低 70 倍。与主动温控（TEC）结合使用。

    '
  domain: 腔稳激光温度抑制
  key_insight: 温度传感器前馈可大幅降低残余温漂，无需提高主动温控精度
  conditions: 腔真空腔外壁热敏电阻；24°C 工作温度（ULE CTE 零点远低于此温度）
  source:
    zotero_key: H5MYBTXH
    claim: laser frequency drift due to temperature fluctuations is reduced by a factor
      of 70 via real-time feedforward from a temperature sensor located on the outer
      wall of the cavity vacuum chamber
methods:
- id: meth.six_axis_inertial_feedforward_l13b
  name: 六轴惯性力前馈方法
  status: demonstrated
  applies_to: ent.spherical_ule_cavity_l13b
  steps_summary: '六个单轴电容式加速度计（四面体排布）→ 三个单轴 MEMS 陀螺仪 → FPGA 实时数字计算全惯性力 → AOM 频率前馈修正
    → 加速度灵敏度 <10⁻¹² g⁻¹（0 Hz 延伸）

    '
  source_claim: '"Linear and rotational accelerations are measured by six one-axis
    variable-capacitance accelerometers... Rotational velocity is measured by three
    one-axis MEMS gyroscopes... Feedforward is implemented digitally by use of a second
    FPGA which controls the frequency of an AOM."

    '
