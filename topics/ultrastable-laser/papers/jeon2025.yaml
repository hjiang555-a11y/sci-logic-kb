        year: 2025
        source: {zotero_key: "SBPRDKPV"}
        note: "首次自零差光纤延迟线锁频达到 10⁻¹⁵ 级短期稳定度（无真空系统）"

  - id: met.freq_noise_psd_fiber_jeon25
    name: "频率噪声谱密度（Jeon 2025，自零差 1 km 光纤）"
    unit: "Hz²/Hz"
    description: >
      自零差光纤锁定后激光的频率噪声谱密度。
      相对于自由运行激光，在 4 Hz–10 kHz 频段最高降低约 10⁴ 倍，并在 4–200 Hz 触及光纤热噪声地板。
    demonstrated_value:
      value: "4 Hz–10 kHz 频段最高降噪约 10⁴；4–200 Hz 达到 1 km 光纤往返热噪声极限"
      conditions: "1 km 光纤线轴（2 km 有效往返长度），短期频噪测量，多次重复试验一致"
      verification_status: observed
      confidence: established
      source:
        zotero_key: "SBPRDKPV"
        claim: "the frequency noise is reduced by up to 10^4 times in the Fourier frequency range from 4 Hz to 10 kHz"
    theoretical_floor:
      value: "fiber thermal-noise limit of the 1-km fiber round trip"
      basis: "thermomechanical + thermo-refractive fiber noise"
      gap_note: "BPD 电噪声低于该极限，因此系统能真实触及热噪声地板"
    historical_landmarks:
      first_demonstration:
        value: "4–200 Hz 频段触及 1 km 光纤往返热噪声极限"
        year: 2025
        source: {zotero_key: "SBPRDKPV"}
        note: "首次在无真空自零差光纤延迟线模块中明确达到该热噪声极限"

  - id: met.laser_linewidth_jeon25
    name: "激光线宽（Jeon 2025，自零差光纤锁频）"
    unit: "Hz"
    description: >
      由稳定后频率噪声估算的线宽。
      短时间窗内达到亚赫兹，而从 1 Hz Fourier 频率起积分则受较长时间热漂移影响。
    demonstrated_value:
      value: "< 1 Hz（0.1 s 时间窗）；12 Hz（从 1 Hz Fourier 频率起积分）"
      conditions: "基于 β-separation line 与稳定后频率噪声 PSD 估算"
      verification_status: inferred
      confidence: likely
      source:
        zotero_key: "SBPRDKPV"
        claim: "the linewidth within 0.1 s is less than 1 Hz ... The integrated linewidth from a 1-Hz Fourier frequency is calculated as 12 Hz"
    note: "两种线宽数值对应不同积分时间窗，反映短期热噪声极限与长期热漂移的区分"

