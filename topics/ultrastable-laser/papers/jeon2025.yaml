# Jeon 2025 — 自零差光纤延迟线锁频达到光纤热噪声极限
# 提取者：GitHub Copilot（AI草稿，待专家确认）
# 提取日期：2026-04-16
# Schema版本：v4.1

meta:
  zotero_key: "SBPRDKPV"
  source_type: technical_paper
  contribution_type: evidence
  reliability: high
  title: "10⁻¹⁵-level laser stabilization down to fiber thermal noise limit using self-homodyne detection"
  year: 2025
  first_author: Jeon
  journal: "Optics Letters"
  volume: 50
  issue: 4
  pages: "1057-1060"
  doi: "10.1364/OL.541281"
  note: >
    采用 1 km 全单模光纤迈克尔逊自零差干涉仪与平衡探测，
    在无真空系统条件下将 1550 nm 连续激光稳定到光纤热噪声极限，
    实现 6.3×10⁻¹⁵ @ 16 ms 的频率不稳定度。
    核心贡献：把光纤延迟线稳频从“自外差 + AOM/RF”推进到“自零差 + 单 BPD”
    的极简架构，并在 4–200 Hz 频段达到 1 km 光纤往返热噪声地板。

entities: []
  # 复用 ent.fiber_interferometer（定义于 jiang2010.yaml）和 ext 条件节点；
  # 本文的便携金属气密封装作为实现细节并入方法/关系条件，不单建新实体。

principles:
  - id: pri.self_homodyne_balanced_detection
    name: "自零差平衡探测原理（光纤延迟线）"
    tier: domain
    verification_status: observed
    statement: >
      在光纤迈克尔逊干涉仪中，两臂返回的同频光场直接在 50:50 耦合器输出端形成互补干涉，
      平衡光电探测器对两路光功率做差，可直接输出随激光频率失谐变化的误差信号。
      由于不需要 AOM 频移或后续 RF 解调，系统可仅依靠被动光纤器件和单个 BPD 实现稳频；
      同时，共模强度噪声在差分探测中被显著抑制，使系统噪声地板可降至光纤热噪声极限以下。
    domain: "光纤干涉仪稳频 / 误差信号探测"
    key_insight: "自零差平衡探测将光纤延迟线频率鉴别与强度噪声抑制合并到单个无 RF 的探测环节。"
    conditions: "适用于迈克尔逊型光纤延迟线，两路返回光保持足够相干且 BPD 两路平衡良好"
    preconditions:
      - "两臂干涉光的偏振态经 FRM 或等效手段匹配，以维持高对比度干涉"
      - "BPD 的本底电噪声低于目标光纤热噪声地板"
      - "激光锁定点工作在干涉曲线线性区（近正交点）"
    invalidated_when:
      - "两输出端的平衡探测失配严重，共模强度噪声重新耦合到误差信号"
      - "需要高频频移标记或远离直流的异频探测时，自零差不再具备结构优势"
    source_claim: >
      "this system uses only a few passive optical components and a single balanced
      photodetector (BPD) to generate the error signal"
    open_questions:
      - "在保持无 AOM/无 RF 极简结构的前提下，自零差方案的长期漂移抑制是否能逼近 Huang 2023 那样的 1 s 级最佳光纤稳定度？"

methods:
  - id: meth.self_homodyne_fiber_locking
    name: "自零差光纤延迟线锁频"
    status: demonstrated
    applies_to: ent.fiber_interferometer
    steps_summary: >
      激光进入光纤迈克尔逊干涉仪 → 1 km 光纤延迟臂与短参考臂分别往返反射 →
      两输出端在 BPD 上做平衡差分得到误差信号 → PI 伺服反馈至激光电流调制端 → 实现连续波激光稳频
    required_hardware:
      - ent.fiber_interferometer
    advantages:
      - "无需 AOM、EOM、混频器或额外 RF 电子学，硬件显著简化"
      - "仅用全单模无源光纤器件和单个 BPD，结构紧凑，适合便携部署"
      - "平衡探测抑制激光强度噪声，使 1 km 光纤系统在 4–200 Hz 达到热噪声极限"
      - "不需要真空系统即可获得 10⁻¹⁵ 级短期稳定度"
    disadvantages:
      - "长期稳定度仍受光纤长度漂移限制，0.1 s 以上积分线宽可增至 ~12 Hz"
      - "锁定带宽受 1 km 延迟限制，约 100 kHz 处出现带宽峰"
      - "现场应用仍依赖低振动线轴设计与气密封装来抑制声学/机械扰动"
    conditions:
      - "使用 1 km 级低振动灵敏度光纤线轴与 FRM 迈克尔逊结构"
      - "BPD 电噪声低于 2 km 有效光纤往返的热噪声"
      - "激光可通过电流调制端接受 PI 伺服反馈"
    source_claim: >
      "we adopt an all-single-mode (SM) fiber self-homodyne interferometric configuration with a 1-km vibration-insensitive optical fiber delay"
    note: >
      新方法节点，作为 meth.fiber_delay_locking（jiang2010.yaml 中 AOM 自外差实现）的
      极简替代分支；新节点边界待专家审核。

metrics:
  - id: met.fractional_freq_instability_jeon25
