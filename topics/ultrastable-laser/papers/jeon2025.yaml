    description: >
      两台独立自零差光纤锁定 1550 nm 激光拍频得到的短期频率不稳定度。
      最低值出现在 16 ms 平均时间，达到 10⁻¹⁵ 量级。
    demonstrated_value:
      value: "6.3×10⁻¹⁵ @ 16 ms"
      conditions: "两台 1550 nm CW 激光，各锁定到独立 1 km 光纤自零差迈克尔逊干涉仪，拍频约 78.9 MHz"
      verification_status: observed
      confidence: established
      source:
        zotero_key: "SBPRDKPV"
        claim: "The frequency instability reaches a minimum of 6.3 × 10−15 at a 16-ms averaging time"
    theoretical_floor:
      value: "1 km 光纤往返热噪声极限"
      basis: "Jeon 2025 采用 thermomechanical + thermo-refractive fiber noise 求和表述"
      gap_note: "4–200 Hz 频段实测频噪已达到该极限；更长平均时间仍受光纤长度漂移影响"
    note: "该热噪声下限与跨文件原理 pri.fiber_thermal_noise_wanser（定义于 dong2015.yaml）对应"
    historical_landmarks:
      first_demonstration:
