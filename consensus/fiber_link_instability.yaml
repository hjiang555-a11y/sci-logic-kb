metric: met.fiber_link_frequency_instability
metric_name: "Optical frequency transfer instability — by distance scale"
context: "Fiber link limitations by distance. Non-reciprocity compensation (Sagnac, thermal asymmetry) is solved by bidirectional schemes. The dominant remaining limit is Polarization Mode Dispersion (PMD)."
domain: time-frequency-transfer
updated: 2026-05-09
confidence: established

limitation_stack:
  - name: "Compensation non-reciprocity"
    status: "SOLVED"
    principle: "Bidirectional transmission + synchronous phase measurement at both ends cancels common-mode path-length fluctuations"
    solved_by: "Calosso 2013 (two-way passive); Bercy 2014 (100 km, 5×10⁻²¹); Xu 2019 ((0.5±2.0)×10⁻²¹ residual over 33 days)"
    residual: "~10⁻²¹ — at fundamental Sagnac + thermal asymmetry floor"

  - name: "Polarization Mode Dispersion (PMD)"
    status: "ACTIVE — dominant remaining limit"
    principle: "PMD causes polarization-dependent group delay between two orthogonal polarization modes. Under environmental perturbation (temperature, stress), the differential delay fluctuates, introducing non-reciprocal phase noise that bidirectional compensation cannot fully cancel."
    impact: "Polarization fading → optical beat signal dropout → detection loss-of-lock; limits continuous operation to <50% duty cycle without mitigation"
    breakthrough: "Dual-polarization coherent receiver + active polarization tracking (Clivati 2020) — maintains lock through polarization scrambling"
    remaining_challenge: "Residual PMD-induced phase noise at the 10⁻²⁰ level for links >500 km; active polarization control adds complexity"

  - name: "Amplifier noise accumulation"
    status: "Active for links >500 km"
    principle: "Each EDFA adds spontaneous emission noise; cascaded amplifiers accumulate both phase noise and amplitude noise"
    breakthrough: "Brillouin amplification (Raupach 2015) — distributed gain reduces amplifier count"

  - name: "Free-space atmospheric turbulence"
    status: "Active for satellite/ground links"
    principle: "Atmospheric turbulence induces beam wander and scintillation, breaking spatial reciprocity"
    breakthrough: "Tip-tilt active tracking (Sinclair 2016); quantum-limited detection (Caldwell 2023)"

consensus:
  best_demonstrated_value: "σ_y = 5×10⁻²¹ @ 4,000 s (Bercy 2014, 100 km bidirectional passive)"
  best_demonstrated_accuracy: "(0.5±2.0)×10⁻²¹ over 33 days (Xu 2019, non-reciprocity verified)"
  best_long_distance: "1.5×10⁻¹⁹ flicker floor (Predehl 2012, 920 km)"
  dominant_limit_current: "PMD — polarization fading limits continuous operation; dual-polarization receivers emerging"
  remaining_gap: "Non-reciprocity: SOLVED (~10⁻²¹). PMD: 10-100× above non-reciprocity floor for links >500 km"

