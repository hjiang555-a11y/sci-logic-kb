trend: "Non-reciprocity compensation is SOLVED (Xu 2019). The current bottleneck is PMD — polarization fading causes detection loss-of-lock, limiting operational duty cycle. Dual-polarization receivers (Clivati 2020) are the key breakthrough. Next frontier: PMD compensation for >500 km links and space-based global clock networks."
