metric: met.comb_timing_jitter
metric_name: "Optical frequency comb absolute timing jitter and phase noise"
context: "OFC as the time-frequency application gateway — the core output metric determining microwave generation quality"
domain: optical-frequency-combs
updated: 2026-05-09
confidence: established

consensus:
  best_demonstrated_jitter: "139 attoseconds (f_beat, 1 Hz-1 MHz integration)"
  best_demonstrated_system: "Digital servo all-PM Er:fiber comb (Wang 2025)"
  best_demonstrated_fceo_jitter: "0.12 fs (f_beat, Zhang 2022); 469 mrad (f_ceo, Wang 2025)"
  best_demonstrated_phase_noise: "<-180 dBc/Hz @ 1 MHz offset (Kalubovilage 2022)"
  best_demonstrated_residual_jitter: "<1 fs inter-mode timing jitter (Endo 2018, BOMPD locked to ultrastable laser)"
  theoretical_limit: "Shot noise floor (~50 as estimated); photodetection quantum limit"
  remaining_gap: "~3× from current best (139 as) to shot noise limit (~50 as)"
  contested: false

timeline:
