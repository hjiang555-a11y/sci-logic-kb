    status: "Fundamental — Shen 2022 Nature characterized at 113 km"
    principle: "Kolmogorov turbulence dominates at all practical distances. Tip-tilt tracking (Sinclair 2016) mitigates beam wander."
  - name: "Link budget (∝ 1/L²)"
    status: "GEO feasible — Caldwell 2023 Nature demonstrated 102 dB budget"
    principle: "Free-space loss limits received power. Quantum detection enables single-photon-level operation."
  - name: "Satellite Doppler (10⁻⁶-10⁻⁷)"
    status: "Solvable — demonstrated at sub-fs level"
    principle: "LEO 7 km/s → 10⁻⁵ Doppler; compensated via ephemeris or two-way cancellation"

vs_fiber:
