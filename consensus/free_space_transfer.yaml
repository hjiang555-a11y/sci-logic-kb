metric: met.free_space_transfer_instability
metric_name: "Free-space optical time-frequency transfer instability"
context: "Free-space transfer — fundamentally distinct from fiber. Atmospheric turbulence replaces PMD as dominant noise source. Nature 2022 (Shen) and Nature 2023 (Caldwell) are the definitive consensus papers."
domain: time-frequency-transfer
updated: 2026-05-09
confidence: established

consensus:
  best_demonstrated_instability: "σ_y < 4×10⁻¹⁹ @ 113 km (Shen 2022, Nature — THE benchmark)"
  best_demonstrated_short_range: "σ_y = 6.1×10⁻²¹ @ 300 s (Gozzard 2022, 2 km)"
  best_demonstrated_link_budget: "102 dB with 4.0 mW (Caldwell 2023, Nature — ground↔GEO feasible)"
  best_demonstrated_timing_precision: "0.7 nm / 4.8 as (Caldwell 2022, Nature — quantum-limited ranging)"
  best_doppler_immunity: "<1 fs TDEV with 10⁻⁷ Doppler (Bergeron 2019, Nature Comms)"
  theoretical_limit: "Quantum detection limit (single-photon); atmospheric outer scale (~10-100 m)"
  remaining_gap: "113 km demonstrated at <4×10⁻¹⁹ (Shen Nature 2022). Scaling to GEO (40,000 km) requires closing 10-100× gap via quantum detection and larger apertures."

definitive_references:
